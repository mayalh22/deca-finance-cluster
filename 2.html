  {q:"Many stakeholders feel it's not enough for a company to simply be profitable. The company must also:",opts:["Appoint government officers","Facilitate the lowering of capital","Demonstrate social responsibility","Increase the chance of corruption"],ans:2,exp:"Corporate social responsibility is the duty of businesses to contribute to the well-being of society. Many stakeholders expect companies to be both profitable and socially responsible."},
  {q:"Which S-component of the McKinsey 7-S model would most likely assess the company's management functions?",opts:["Skills","Shared values","Strategy","Structure"],ans:3,exp:"The structure component assesses organizational hierarchy—chain of command, managerial configuration, and employee responsibilities—making it most relevant to management functions."},
  {q:"Corporate governance can greatly impact company decision-making because governance processes act as __________ reaching company goals.",opts:["A framework for","Stakeholders","Brainstorming before","A bulwark against"],ans:0,exp:"Governance processes act as a framework for reaching company goals, being part of nearly all areas of management and strategy."},
  {q:"Lena is deciding whether to purchase flood insurance for her company. This is an example of a(n) __________ issue in risk management.",opts:["Political","Financial","Technological","Ethical"],ans:3,exp:"Insurance decisions involving risk to employees and cost to the company present ethical dilemmas—risk managers must look out for the best interests of employees and companies."},
  {q:"Emi wants to compare her company's financial performance over several years. To compare historical data over multiple accounting periods, Emi should use __________ analysis.",opts:["Break-even","Horizontal","SWOT","Vertical"],ans:1,exp:"Horizontal analysis looks at year-over-year changes across multiple periods—looking left and right across financial statements. Vertical analysis looks at one period's proportions."},
  {q:"Which of the following helps businesses predict risk for a given strategy or initiative?",opts:["Risk checklist","Retroactive risk","Risk tolerance","Risk model"],ans:3,exp:"A risk model helps businesses predict risk for a given strategy or initiative by inputting data or goals to get a prediction that informs decision-making."},
  {q:"Which of the following is a possible legal result of effective risk management?",opts:["Decreased compliance with laws","Increased workplace safety","Reduced liability exposure","Improved operational efficiency"],ans:2,exp:"Effective risk management helps reduce a company's liability exposure—a legal result. Improved operational efficiency and increased workplace safety are operational results."},
  {q:"Which of the following is an example of external risk?",opts:["Ineffective leadership","Union strikes","Changes in import laws","Outdated technology"],ans:2,exp:"Changes in import laws are a political risk factor (external). Ineffective leadership and union strikes are human-factor risks (internal); outdated technology is technological risk (internal)."},
  {q:"Which of the following is an example of internal risk?",opts:["Changes in export laws","An economic downturn","Injured employees","An earthquake"],ans:2,exp:"Injured employees are a human-factor risk (internal). Changes in export laws are political risk (external); economic downturns are economic risk (external); earthquakes are natural risk (external)."},
  {q:"Which of the following best describes enterprise risk management?",opts:["Traditional strategy","Bottom-up approach","Divisive approach","Firmwide strategy"],ans:3,exp:"ERM is a firmwide, top-down business strategy considering risk management from the perspective of the entire organization, not by distinct business units."},
  {q:"A company implementing ERM has placed a keypad at the entry of a sensitive area as an internal control measure. This is an example of __________ control.",opts:["Quality","Preventative","Self","Detective"],ans:1,exp:"Preventative internal controls stop something before it happens (a keypad prevents unauthorized entry). Detective controls recognize when something has happened (an alarm after a breach)."},
];

// State
let pileX=[], pileY=[], pileU=[], current=null, answered=false, queue=[], queueSource='';

function initPiles() {
  pileX=[]; pileY=[];
  pileU=ALL_QUESTIONS.map((_,i)=>i);
  buildQueue();
}

function buildQueue() {
  if(pileU.length>0){queue=shuffle([...pileU]);queueSource='unseen';}
  else if(pileY.length>0){queue=shuffle([...pileY]);queueSource='review';}
  else{queue=shuffle([...pileX]);queueSource='mastered';}
}

function shuffle(arr) {
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}

function nextQuestion() {
  if(queue.length===0){showRoundComplete();return;}
  current=queue.shift();
  render();
}

function render() {
  const q=ALL_QUESTIONS[current];
  document.getElementById('count-x').textContent=pileX.length;
  document.getElementById('count-y').textContent=pileY.length;
  document.getElementById('count-u').textContent=pileU.length;
  document.getElementById('progress-bar').style.width=`${(pileX.length/ALL_QUESTIONS.length)*100}%`;
  document.getElementById('meta').textContent=`Question from ${queueSource==='review'?'Review Pile':queueSource==='mastered'?'Mastered Pile':'Unseen Pile'}`;
  document.getElementById('question').textContent=q.q;
  const opts=document.getElementById('options');
  opts.innerHTML='';
  q.opts.forEach((o,i)=>{
    const btn=document.createElement('button');
    btn.className='opt';
    btn.textContent=`${['A','B','C','D'][i]}. ${o}`;
    btn.onclick=()=>choose(i);
    opts.appendChild(btn);
  });
  document.getElementById('explanation').style.display='none';
  document.getElementById('wrong-choice-note').style.display='none';
  document.getElementById('next-btn').style.display='none';
  answered=false;
}

function choose(i) {
  if(answered)return;
  answered=true;
  const q=ALL_QUESTIONS[current];
  const btns=document.querySelectorAll('.opt');
  btns.forEach(b=>b.disabled=true);
  const correct=q.ans;
  btns[correct].classList.add('correct');
  const exp=document.getElementById('explanation');
  if(i===correct){
    pileU=pileU.filter(x=>x!==current);pileY=pileY.filter(x=>x!==current);
    if(!pileX.includes(current))pileX.push(current);
    exp.className='';exp.style.display='block';
    exp.innerHTML=`<strong>✓ Correct → Mastered Pile.</strong> ${q.exp}`;
    document.getElementById('wrong-choice-note').style.display='none';
  } else {
    btns[i].classList.add('wrong');
    pileU=pileU.filter(x=>x!==current);pileX=pileX.filter(x=>x!==current);
    if(!pileY.includes(current))pileY.push(current);
    const wrongNote=document.getElementById('wrong-choice-note');
    wrongNote.style.display='block';
    wrongNote.innerHTML=`<strong>You chose: ${['A','B','C','D'][i]}. ${q.opts[i]}</strong> — This is incorrect.`;
    exp.className='wrong-exp';exp.style.display='block';
    exp.innerHTML=`<strong>✗ Incorrect → Review Pile.</strong> Correct answer: <strong>${['A','B','C','D'][correct]}. ${q.opts[correct]}</strong><br><br>${q.exp}`;
  }
  document.getElementById('count-x').textContent=pileX.length;
  document.getElementById('count-y').textContent=pileY.length;
  document.getElementById('count-u').textContent=pileU.length;
  document.getElementById('progress-bar').style.width=`${(pileX.length/ALL_QUESTIONS.length)*100}%`;
  document.getElementById('next-btn').style.display='inline-block';
}

function showRoundComplete() {
  document.getElementById('quiz-screen').style.display='none';
  const rc=document.getElementById('round-complete');
  rc.style.display='block';
  if(pileU.length===0&&pileY.length===0){
    document.getElementById('round-title').textContent='🎉 All Questions Mastered!';
    document.getElementById('round-sub').textContent=`You've mastered all ${ALL_QUESTIONS.length} questions!`;
    document.getElementById('continue-btn').textContent='Review All Again →';
  } else if(pileU.length===0){
    document.getElementById('round-title').textContent='All Unseen Questions Done!';
    document.getElementById('round-sub').textContent=`Mastered: ${pileX.length} | Review pile: ${pileY.length} questions to retry.`;
    document.getElementById('continue-btn').textContent='Start Review Pile →';
  } else {
    document.getElementById('round-title').textContent='Review Round Complete!';
    document.getElementById('round-sub').textContent=`Mastered: ${pileX.length} | Still in review: ${pileY.length} | Unseen: ${pileU.length}`;
    document.getElementById('continue-btn').textContent='Continue →';
  }
}

document.getElementById('next-btn').onclick=()=>nextQuestion();
document.getElementById('continue-btn').onclick=()=>{
  document.getElementById('round-complete').style.display='none';
  document.getElementById('quiz-screen').style.display='block';
  if(pileU.length===0&&pileY.length===0){pileX=[];pileU=ALL_QUESTIONS.map((_,i)=>i);}
  buildQueue();nextQuestion();
};

initPiles();nextQuestion();
</script>
