  {q:"Ben is a VP of State Street Savings and Loan. Which organization would best help him network within his profession?",opts:["Young Professionals Association","Local chamber of commerce","College alumni group","National Bankers Association"],ans:3,exp:"Professional organizations specific to finance (like the National Bankers Association) allow networking with others in the same field, unlike chambers of commerce or alumni groups."},
  {q:"Building professional, long-term relationships with others in the financial industry requires:",opts:["A formal agreement or contract","Consistent communication","Membership in unrelated trade organizations","A detached attitude"],ans:1,exp:"Consistent, ongoing communication—getting to know the other person—is the key to building long-term professional relationships and earning trust."},
  {q:"One reason companies implement protocols, policies, and procedures is to:",opts:["Result in decreased employee morale","Allow companies to break the law","Foster a competitive environment","Reinforce company values"],ans:3,exp:"A company's policies lay out what is most important to the organization, helping employees and customers understand its mission, vision, and values."},
  {q:"Which of the following presents an ethical issue that may increase a business's level of risk?",opts:["Developing processes to test product durability","Communicating business information to customers","Hiring a family member who lacks necessary job skills","Striving to achieve higher sales than coworkers"],ans:2,exp:"Nepotism—hiring unqualified family members—is an ethical issue that creates financial risk (paying for poor performance) and possible safety hazards."},
  {q:"A company purchases an expensive new software system and divides the cost between two departments that will use it. This is an example of cost:",opts:["Precision","Accumulation","Dividing","Allocation"],ans:3,exp:"Cost allocation is the assignment of costs to cost objects, such as departments. The company is allocating the software cost between two departments."},
  {q:"The MIB Company uses protective computer software programs to minimize losses associated with customers' financial transactions. It is managing risks associated with:",opts:["Purchasing","Security","Overhead","Performance"],ans:1,exp:"Using technology like firewalls and security software minimizes security risks and protects confidential financial data from hackers."},
  {q:"If an accounting firm deliberately conceals information about a client's financial status, the government may charge the business with:",opts:["Substantiation","Expropriation","Breach of contract","Obstruction of justice"],ans:3,exp:"Obstruction of justice applies to individuals or businesses that hide important information from law enforcement. Concealing financial data from investigators fits this charge."},
  {q:"The entire market has just collapsed. This is an __________ risk known as a(n) __________ factor.",opts:["Internal; economic","External; economic","External; political","Internal; technological"],ans:1,exp:"A market collapse is an external risk (occurs outside the company) and an economic risk factor (a change in market conditions)."},
  {q:"Tyrese and his team are creating a list of their company's critical enterprise-wide risks. They are compiling:",opts:["A risk inventory","A risk assessment","Enterprise risk management","A risk control"],ans:0,exp:"A risk inventory is a listing of all of an organization's critical enterprise-wide risks. A risk assessment evaluates specific risks; ERM is the overall management approach."},
  {q:"Liz has two employees that report to her. She is one of several managers with staffs of similar size. Liz's organization has a:",opts:["Flat structure","Wide span of control","Narrow span of control","Hands-off approach"],ans:2,exp:"A narrow span of control means managers have a small number of direct reports. Liz only has two employees, indicating narrow span of control."},

  // Test 1286
  {q:"A true statement about difficult customers is that they are:",opts:["Usually female","Easy to spot","Of all ages","Frequently older"],ans:2,exp:"Difficult customers come in all shapes and sizes—all ages, economic levels, and either gender. They're difficult to distinguish until their problems arise."},
  {q:"When the stock market rises, people are more confident and willing to spend, which leads to:",opts:["Economic growth","Recession","Deflation","Fewer loans"],ans:0,exp:"A rising stock market signals economic strength, boosting consumer confidence and spending, which causes the economy to grow."},
  {q:"Jordan plans to expand despite his advisor Anna warning that a recession is likely, resulting in financial loss. What is most likely causing Jordan's poor decision?",opts:["Overconfidence","Self-interest","Incrementalism","Framing"],ans:0,exp:"Overconfident executives are so sure of themselves that they can't see the risks, even when warned by colleagues. Framing involves how situations are posed; incrementalism is gradual ethical decline."},
  {q:"The addition of too many workers on a job may cause the marginal product to turn:",opts:["Positive","Upward","Variable","Negative"],ans:3,exp:"The law of diminishing returns states that too many workers causes productivity to decrease and can turn negative—spending more to produce than the products generate in income."},
  {q:"A managerial accountant can help a company market its products by:",opts:["Developing a target market analysis","Creating a budget for hiring increases","Examining the relevant costs of advertising options","Determining whether to make or buy a component"],ans:2,exp:"Managerial accountants can use relevant cost analysis to assist marketers in comparing advertising options and their costs."},
  {q:"Your personal vision should address your future career, family life, personal/social relationships, and:",opts:["Your academic goals for the semester","Your to-do list for the next two weeks","Your role in your community","Your New Year's resolution for this year"],ans:2,exp:"A personal vision addresses the impact you hope to have in your community through the various roles in your life. Academic goals, to-do lists, and resolutions are too short-term."},
  {q:"Information management should ensure that information is:",opts:["Retrievable","Pleasant","Inaccessible","Abundant"],ans:0,exp:"Information management ensures information is retrievable—accessible to those who need it when necessary. Information should only be inaccessible to unauthorized individuals."},
  {q:"A strong professional relationship is usually a(n) __________ relationship.",opts:["Easily maintained","Reciprocal","Majority-rule","One-sided"],ans:1,exp:"Strong professional relationships must be reciprocal—each member helps the other. Finance professionals often refer clients to each other for different services."},
  {q:"John is generally a good worker, except he lacks the ability to see what needs to be done without being told. What personal trait is John lacking?",opts:["Initiative","Honesty","Creativity","Empathy"],ans:0,exp:"Initiative is willingness to act without being told and sometimes accepting additional duties. Creativity is generating unique ideas; empathy is understanding others' feelings."},
  {q:"Which is a distinguishing feature of a consolidation in the finance industry?",opts:["All former entities no longer exist, and a single, new legal entity is formed.","All entities continue operating, connected by a parent-subsidiary relationship.","The acquirer does not have to purchase 100% of the target company's equity.","One of the entities continues to exist, absorbing 100% of another entity's stock."],ans:0,exp:"In a consolidation, two businesses create a new entity so one can take over the net assets of the other—neither original entity continues to exist."},
  {q:"To prevent unauthorized access to a computer system or network, businesses typically install:",opts:["Firewall software","Spyware applications","Debugger applications","Compression software"],ans:0,exp:"Firewalls secure and protect computer networks from unauthorized users. Spyware monitors user activity; debuggers fix programming errors; compression reduces file size."},
  {q:"The advantage to businesses that use mobile-application technology is that their salespeople can obtain and send customer information from their:",opts:["Data banks","Smartphones","Fax machines","Autoresponders"],ans:1,exp:"Smartphones include cellular telephone capabilities plus computer applications, enabling salespeople to call, check email, verify inventory, and place orders remotely."},
  {q:"Cost accounting budgets allow __________ to __________.",opts:["Stakeholders; anticipate future advertising costs","Management; anticipate future advertising costs","Management; consider a business's total cost of production","Stakeholders; consider a business's total cost of production"],ans:2,exp:"Cost accounting is a form of managerial accounting providing information to leadership. It considers total cost of production—labor, materials, overhead—not advertising costs."},
  {q:"An example of price competition is a hotel's promotion of its:",opts:["Airport shuttle bus","Special weekend room rates","Trained service staff","Sauna and exercise equipment"],ans:1,exp:"Special weekend room rates encourage customers to book by offering reduced pricing—price competition. Shuttle, staff, and amenities are nonprice competition."},
  {q:"What do managers need to do to help employees understand their specific responsibilities in achieving the organization's goals?",opts:["Create work subcultures","Collect information","Develop a mission statement","Communicate priorities"],ans:3,exp:"Employees need managers to communicate work priorities so they can perform the most important tasks before less important ones to achieve organizational goals."},
  {q:"Which element is included in a quality-management plan?",opts:["Standards","Risks","Change","Schedule"],ans:0,exp:"A quality-management plan includes standards for how quality will be measured. Scheduling, changes, and risks are covered in other parts of the project plan."},
  {q:"A business buying specific products from a vendor that delivers at predetermined times and guarantees a set price for one year is an example of the __________ purchasing method.",opts:["Competitive-bid","Lowest-bidder","Standing-order","Blank-check"],ans:2,exp:"The standing-order method involves a vendor automatically delivering a predetermined amount at a predetermined time for a guaranteed price, with no need to call each time."},
  {q:"What type of company is most likely to focus on achieving stability as its primary goal?",opts:["Large","New","Old","Small"],ans:1,exp:"Many startup companies fail within their first few years, so simply achieving stability is a main goal. After stability is achieved, the company can focus on growth."},
  {q:"Joanna is a purchaser for 193 Inc. and forgets to purchase a large order of shipping materials. What will most likely happen as a result?",opts:["Orders will increase","The client's order will be delayed","Productivity will increase","Inventory will go down"],ans:1,exp:"Without materials to ship, the client's order cannot be shipped in time and will be delayed. Productivity will decrease, not increase."},
  {q:"One way to show respect for foreign clients' cultural and social differences is to:",opts:["Always speak in your native language","Embrace cultural stereotypes","Use slang and idioms frequently","Pronounce their names correctly"],ans:3,exp:"Learning to say clients' names properly shows respect for their culture. Mispronouncing a name can insult or hurt feelings."},
  {q:"Which of the following statements is true of finance careers?",opts:["People skills are not necessary.","Soft skills are extremely important.","Only mathematical skills are necessary.","Communication skills are not important."],ans:1,exp:"Soft skills—including people skills and communication skills—are extremely important in every industry, including finance."},
  {q:"Which of the following are examples of deposit-taking financial institutions?",opts:["Commercial banks, corporations, and mutual savings banks","Credit unions, savings and loan associations, and commercial banks","Commercial banks, credit unions, and brokerages","Savings and loan associations, mutual savings banks, and insurance firms"],ans:1,exp:"Credit unions, savings and loan associations, and commercial banks all accept customer deposits and pay interest. Corporations, brokerages, and insurance firms are not deposit-taking institutions."},
  {q:"The economy is part of a business's __________ environment.",opts:["Tangible","Physical","External","Internal"],ans:2,exp:"The external environment consists of uncontrollable surroundings like the economy, demographics, and society. Internal elements include inventory and capital. The economy is intangible."},
  {q:"A budgeting software feature that connects directly to bank accounts to automatically download expense information is commonly known as automatic:",opts:["Tracking","Affirmation","Alerts","Backup"],ans:0,exp:"Automatic tracking transmits expense information from the bank to the budgeting application without human intervention. Alerts remind users of upcoming payments; backup saves files."},
  {q:"A key factor in successful human relations involves treating others with:",opts:["Reverence","Admiration","Respect","Indifference"],ans:2,exp:"Respect—showing regard for other people and their ideas—is key to successful human relations. You don't need to admire everyone, but you should not treat anyone with indifference."},
  {q:"Written communication tends to be more formal than other methods because it:",opts:["Is the preferred method of communication for all jobs","Is always composed of facts, not opinions","Is always used by knowledgeable people","Allows individuals to organize their thoughts meaningfully"],ans:3,exp:"Written communication allows individuals to collect and organize their thoughts in a meaningful and purposeful way, making it more formal than verbal communication."},
  {q:"To perform a proper data analysis, the researcher should be:",opts:["Untrained","Unbiased","Inconsistent","Judgmental"],ans:1,exp:"For proper data analysis, the researcher should be unbiased, nonjudgmental, trained, and consistent."},
  {q:"Bill disciplines each of his children exactly the same way when they break the rules. Bill is being:",opts:["Consistent","Biased","Generous","Empathetic"],ans:0,exp:"Consistency means treating everyone the same regardless of the situation or circumstances. Bill treats all his children the same—he is being consistent."},
  {q:"Cocoa beans and corn are examples of investments that people make in which of the following financial markets?",opts:["Soft commodities","Selective property","Money","Insurance"],ans:0,exp:"Agricultural goods like cocoa beans and corn are types of soft commodities. The commodities market facilitates buying and selling of resources like agricultural goods."},
  {q:"Six months ago, Xander bought 500 shares at $25 per share, then sold them for $48 per share. What type of tax is Xander obligated to pay?",opts:["Stock sales tax","Luxury tax","Capital gains tax","Excise tax"],ans:2,exp:"A capital gain is the increase in an asset's value from purchase to sale. The federal government charges capital gains taxes on most capital gains."},
  {q:"A certificate of deposit is a short-term debt security that is sold through __________ markets.",opts:["Commodities","Money","Modified","Capital"],ans:1,exp:"Money markets facilitate buying and selling of short-term, low-risk financial products such as treasury bills and certificates of deposit."},
  {q:"How can the owner of the Rainy Day Cafe figure out how much money they will make by adding a new salad to the menu?",opts:["Eliminate indirect costs","Determine labor costs","Discover sunk costs","Perform marginal analysis"],ans:3,exp:"Marginal analysis helps businesses understand the additional benefits compared to the costs of an activity. Adding a salad has revenue and cost implications—marginal analysis evaluates both."},
  {q:"Juan noticed a positive variance of $2,000 in the email marketing section of his budget and concluded it demonstrated efficient use of funds. What is another possible explanation?",opts:["Email marketing is not an important activity","The planned email marketing campaigns were not completed","Email marketing was not effective","The budget did not allocate enough resources for email marketing"],ans:1,exp:"If money wasn't spent on email marketing, the campaigns may never have been carried out—which wouldn't demonstrate efficient use of funds."},
  {q:"Which work situation would best demonstrate a job with high depth and high scope?",opts:["A manager is responsible for developing the monthly work schedule for employees.","The manager signs employee time cards at the end of each work week.","The manager of a restaurant selects the monthly menu and designs a newspaper advertisement.","The manager evaluates employee performance according to the owner's standard."],ans:2,exp:"Selecting the menu and designing an advertisement represent a variety of tasks (high scope) and a high degree of decision-making latitude (high depth)."},
  {q:"One manager argues material costs should halt production; another says these costs should not be considered in the decision because:",opts:["It is a differential cost","It is coming from a biased source","It is a sunk cost","It was the cheapest option"],ans:2,exp:"Sunk costs have already been incurred and cannot be recovered by any decision—they should not factor into future decisions."},
  {q:"When her coworkers share concerns that Katie's idea won't work, Katie should:",opts:["Explain that there is no proof her idea wouldn't work","Remind coworkers they are sharing opinions, not facts","Acknowledge their concerns and respond in a respectful manner","Repeat her proposal because it is based on quality research"],ans:2,exp:"To objectively defend an idea, acknowledge concerns, consider them, and respond respectfully. Coworkers' opinions may be based on years of experience."},
  {q:"Human resources management has been influenced by modern employees' emphasis on:",opts:["Unionization","Work-life balance","Maximizing wealth at any cost","Friendships"],ans:1,exp:"Modern employees emphasize work-life balance, influencing HR managers to offer flexible work arrangements like remote work."},
  {q:"When giving constructive criticism, it's important to do so in a __________ manner.",opts:["Public","Nonthreatening","Forceful","Humorous"],ans:1,exp:"Constructive criticism should be nonthreatening. People don't respond well to criticism when afraid. It should never be given in public, as that could embarrass the receiver."},
  {q:"Which of the following is a legal consideration that pertains to accounting?",opts:["Computer hacking","Gift giving","Entertaining","Tax reporting"],ans:3,exp:"Tax reporting is a legal accounting consideration. It is illegal to misrepresent financial information or fail to report and pay required taxes. Gift giving and entertaining are ethical considerations."},
  {q:"What are the two major sections of a statement of changes in stockholders' equity?",opts:["Capital stock and retained earnings","Net income and retained earnings","Capital stock and dividends declared","Net income and total stockholder's equity"],ans:0,exp:"Capital stock shows current value of stocks issued; retained earnings shows net income retained minus dividends declared. These are the two major sections."},
  {q:"DeMarcus behaves ethically at his job even when no coworkers or supervisors are watching. DeMarcus is displaying:",opts:["Greed","Transparency","Integrity","Viability"],ans:2,exp:"Integrity means acting ethically even when no one is watching. Transparency involves open communication; viability relates to sustainability. Greed is the opposite of integrity."},
  {q:"To reduce the risk of loss due to fire or power outages, a financial business should protect its computer data by:",opts:["Monitoring data-transmission rates","Using encryption techniques","Implementing an authorization process","Conducting backup procedures"],ans:3,exp:"Backup procedures duplicate computer records and store them in a different location, allowing retrieval if data is lost due to crashes, power outages, or fires."},
  {q:"What is the first step in designing a multi-table query?",opts:["Locate the correct tables","Pinpoint exactly what you want to know","Set the correct join direction","Determine the criteria"],ans:1,exp:"The first step is figuring out exactly what question you want the database to answer. Without knowing this, the database cannot provide useful information."},
  {q:"Which of the following is a graphic aid that uses text to depict a sequence of events or the order of a process?",opts:["Geographic map","Bar chart","Pie chart","Flowchart"],ans:3,exp:"A flowchart presents visual depictions of activities or processes in sequential order using text. Bar charts compare variables; pie charts show distribution; geographic maps show locations."},
  {q:"Ford Motor Company purchased tires from one tire company for all automobiles in its manufacturing plants. This is an example of __________ purchasing.",opts:["Resale","Retail","Dispersed","Industrial"],ans:3,exp:"Industrial purchasing is buying goods and services for internal consumption or conversion into a final product. Ford uses the tires to manufacture cars."},
  {q:"Alexei determines who in his company is permitted to read data within the financial information management system. Alexei has assumed responsibility for the __________ stewardship of the company's financial information.",opts:["Definition","Access","Environmental","Geospatial"],ans:1,exp:"Access stewardship is the ability to decide who is permitted or denied access to data within the financial information management system."},
  {q:"Corporate governance is intended to:",opts:["Promote the company to customers","Decrease the accountability of a company","Defend the company in court","Mitigate risk and avoid problems"],ans:3,exp:"Corporate governance helps a company mitigate risk and avoid problems while increasing accountability. Marketing promotes; lawyers defend; governance mitigates."},
  {q:"Dante received a $500 check from his parents. If he invests it at 5% annual interest, how much will it be worth in a year?",opts:["$505","$575","$525","$550"],ans:2,exp:"FV = $500 × (1 + 0.05) = $500 × 1.05 = $525."},
  {q:"Which of the following are factors that affect a business's decision to offer credit to a customer?",opts:["Credit rating, objectives, and income","Debt ratio, credit rating, and education","Income, debt ratio, and credit rating","Debt ratio, education, and objectives"],ans:2,exp:"Income, debt ratio, and credit rating indicate whether a customer is a good credit risk. Objectives and education are not primary considerations."},
  {q:"Which of the following is a benefit of compliance in the finance industry?",opts:["It builds and maintains public trust in the financial system","It eliminates all risks an organization may face","It makes it easier to manipulate the market or market prices","It leads to decreased regulatory scrutiny and regulation"],ans:0,exp:"Financial compliance builds and maintains the public's trust in the financial system while managing risk and reducing financial crime."},
  {q:"Which would afford finance professionals the best opportunity to build long-lasting relationships with other finance professionals?",opts:["Actively participating in a local professional association for the finance industry","Regularly attending trade shows for the finance industry","Actively attending meetings sponsored by the local chamber of commerce","Occasionally auditing classes at a local postsecondary institution"],ans:0,exp:"Active participation in a finance-specific professional association (serving on committees, holding offices, attending seminars) builds long-term local relationships."},
  {q:"If a company spends all of its financial resources to discover a new way to purify water, it could be classified as a __________ organization.",opts:["Zero-risk","Risk-tolerant","Risk-seeking","Risk-adverse"],ans:2,exp:"A risk-seeking organization hopes to gain from a risky endeavor. Risk-adverse and risk-tolerant organizations don't seek new risks; zero-risk eliminates all possible risks."},
  {q:"Which of the following is a cost of credit?",opts:["Lower prices","Annual fees","Credit unions","Budget credit"],ans:1,exp:"Annual fees are charged by some credit card providers for the privilege of using their cards. Credit unions are sources of credit; budget credit is a type; lower prices are a benefit."},
  {q:"Which of the following is the accounting equation?",opts:["Assets = Liabilities - Owner's Equity","Liabilities = Owner's Equity + Assets","Owner's Equity = Assets X Liabilities","Assets = Liabilities + Owner's Equity"],ans:3,exp:"The accounting equation is: Assets = Liabilities + Owner's Equity. A business obtains all its assets through two sources—borrowing and investment."},
  {q:"A business risks losing its good reputation if it:",opts:["Provides accurate information to stockholders","Encourages employees to report questionable behavior","Uses questionable tactics to achieve profitability","Requires new suppliers to provide credit information"],ans:2,exp:"Continuously using questionable tactics may get a business a poor reputation, causing customers to shop elsewhere. The other options are ethical actions."},
  {q:"What is a possible reason for not allocating costs?",opts:["A cost is fixed rather than variable","The budget has already been exceeded","A cost is not controlled by any department","Costs are not high enough to be allocated"],ans:2,exp:"If no departments can control a cost, it is acceptable to refrain from allocating it to any specific department. Fixed vs. variable and amount do not determine allocation."},
  {q:"To effectively solve problems in business, employees need to:",opts:["Respect the opinions of others","Be aggressive if necessary","Stand firm in their beliefs","Obtain support for their side"],ans:0,exp:"Respecting others' opinions and finding acceptable compromises is key to problem-solving. Aggression, standing firm, and taking sides divide the workforce."},
  {q:"Insurance institutions are different from banks because insurance institutions:",opts:["Are subject to federal and state oversight","Ensure their customers against certain risks","Act as an intermediary between savers and investors","Have a mismatch between their liabilities and assets"],ans:1,exp:"Insurance institutions insure customers against certain risks in exchange for regular premiums. Banks are subject to federal and state oversight; insurance is state-only."},
  {q:"Knowing a bad storm is coming, a company shuts down a construction site to prevent injuries. This is an example of what risk control technique?",opts:["Loss prevention","Separation","Avoidance","Duplication"],ans:2,exp:"Avoidance is choosing not to do something considered risky. The company avoids risk by not operating the site during the storm."},
  {q:"Terry owns stock in Good Eatz and wants to know how much profit the company made in the last six months. What financial statement should he reference?",opts:["Balance sheet","Income statement","Cash flow statement","Shareholders' equity"],ans:1,exp:"An income statement (profit-and-loss statement) summarizes income and expenses over a period of time. A balance sheet shows condition at a specific point in time."},
  {q:"Each year, the Magnolia Corporation compiles information to send to shareholders and interested parties about the company's status. What is this information typically called?",opts:["Financial statement","SWOT analysis","Executive summary","Annual report"],ans:3,exp:"An annual report outlines the company's financial situation, plans, and other information. A financial statement is one component of an annual report."},
  {q:"Erica is looking at a stock with a current price of $50.75 and a dividend of 2.50. What is the yield percentage?",opts:["20.3%","4.9%","5.9%","21.4%"],ans:1,exp:"Yield percentage = Dividend / Current Price = $2.50 / $50.75 = 0.049 = 4.9%."},
  {q:"Financial globalization helps investors reduce their exposure to:",opts:["Regulatory liberalization","Business cycle risks","Speculative bubbles","Capital appreciation"],ans:1,exp:"By investing in many countries, investors diversify risk and reduce exposure to business cycle risks. Globalization actually increases risks of speculative bubbles."},
  {q:"In developed societies, intrinsic motivation is generally more powerful than extrinsic motivation because it:",opts:["Comes from outside of the individual's personal desires","Is independent of factors that are already satisfied","Is tied to external rewards such as money or prizes","Can be easily changed based on the person's environment"],ans:1,exp:"When basic needs are met, intrinsic motivation—rooted in individual ambitions and self-actualization—becomes more powerful than external rewards."},
  {q:"Phoebe needs to discuss her employee's frequent lateness and absences. What channel of communication should Phoebe use?",opts:["Face-to-face conversation","A video conference","An email message","A company-wide memo"],ans:0,exp:"Face-to-face communication is best for sensitive issues—it is the richest form with the least risk of misinterpretation. Memos would be inappropriate for an individual issue."},
  {q:"Charlotte, an investment advisor, provides ongoing investing advice and helps clients select investments best for them. Charlotte acts as her clients':",opts:["Credit analyst","Fiduciary","Institutional investor","Accountant"],ans:1,exp:"A fiduciary acts on behalf of another, putting that client's interests ahead of their own. Charlotte does more than sell—she manages clients' interests."},
  {q:"When Arthur brings back souvenirs from overseas, he discovers he has to pay a tax on them. Arthur must pay the:",opts:["Customs duty","Souvenir tax","Travel tax","Travel duty"],ans:0,exp:"Goods brought across international borders are subject to customs duties, which control the flow of goods. 'Souvenir tax,' 'travel tax,' and 'travel duty' are not real terms."},
  {q:"A clothing manufacturer builds quality into its operating system, placing responsibility on each employee. This process is known as quality:",opts:["Inspection","Guarantee","Delivery","Assurance"],ans:3,exp:"Quality assurance prevents defective products from being created. Quality inspection checks for defects after production—it doesn't build quality into the process."},
  {q:"Iliana, an accountant, provides information to executives about the costs of implementing recyclable packaging. This is an example of how:",opts:["Financial information can assist in sustainability reporting","Financial information should only be shared with top-level executives","Accountants can help organizations use activity-based costing","Sustainability efforts are usually too expensive to implement"],ans:0,exp:"Providing cost information about sustainable practices like recyclable packaging is an example of financial information supporting sustainability reporting."},
  {q:"Which type of financial analysis is best for comparing a single company's historical financial information to determine trends?",opts:["Liquidity analysis","Horizontal analysis","Vertical analysis","Leverage analysis"],ans:1,exp:"Horizontal analysis compares data from a single company's financial statements over multiple years to determine trends. Vertical analysis compares companies within the same industry."},
  {q:"Which of the following business activities is most likely to impact an organization's governance structures?",opts:["Hiring a new sales representative","Developing a marketing strategy","Raising prices on consumer goods","Borrowing money from a bank"],ans:3,exp:"Banks often require organizations with loans to follow external control mechanisms that impact governance structures. Hiring, marketing, and pricing do not typically affect governance."},
  {q:"Why is it important for businesses to keep accurate accounts-receivable information?",opts:["To monitor aging accounts","To classify stocks","To forecast sales","To evaluate interest rates"],ans:0,exp:"Accounts receivable should be monitored carefully because they affect cash flow and the ability to pay employees and creditors—aging accounts need follow-up."},
  {q:"Wonka Industries runs routine internal audits and divides responsibilities among managers. This is an example of the impact of __________ on decision-making and management functions.",opts:["Community involvement","External regulations","Corporate governance processes","Public relations efforts"],ans:2,exp:"Internal corporate governance processes—like audits and segregation of duties—ensure smooth operations, clarify chains of command, and measure performance."},
  {q:"The nature of an agent's work and the level of an agent's control are factors that determine if a __________ relationship exists.",opts:["Controller-associate","Tutor-student","Principal-collaborator","Employer-employee"],ans:3,exp:"The employer-employee relationship in law refers to the amount of control a principal (employer) has over an agent (employee), used to address liability questions."},
  {q:"Kaleb is removing duplicate records from his company's customer-relationship-management system. Kaleb is conducting:",opts:["Data cleansing","Environmental scanning","Technical analysis","Exploratory research"],ans:0,exp:"Data cleansing corrects, removes, and formats questionable customer records. Environmental scanning gathers external business information."},
  {q:"Makayla wants to know whether or not her customer can pay short-term debts. What type of financial ratio analysis should Makayla use?",opts:["Asset turnover","Profit margin","Working capital","Debit/Equity"],ans:2,exp:"Working capital (current assets minus current liabilities) measures short-term financial health and indicates whether a company can cover its current debts."},
  {q:"What is an advantage of using technology in compliance?",opts:["Increased efficiency","Ease of transitions","Decreased cost","Risk of increased fraud"],ans:0,exp:"Technology makes the compliance process more efficient by processing information much faster. Transitions are not necessarily easy, and fraud detection software can decrease, not increase, fraud."},
  {q:"Which of the following factors may influence supply?",opts:["Standard of living","Natural disasters","Product utility","Number of consumers"],ans:1,exp:"Natural disasters like frosts, floods, and hail can impact supply by affecting production. Standard of living, product utility, and number of consumers influence demand."},
  {q:"If three employees have the same level of ability and competence, what factor might a business use to decide which one to promote?",opts:["Gender","Age","Seniority","Tenure"],ans:2,exp:"When ability and competence are equal, businesses often promote based on seniority—length of employment. Promoting based on gender or age is illegal. Tenure is a teacher-specific status."},
  {q:"Sharon is in charge of examining and preparing financial records at her company. What category of finance careers does she likely work in?",opts:["Securities and investments","Banking services","Insurance","Accounting"],ans:3,exp:"Examining and preparing financial records is the core description of accounting careers, which include bookkeeping, systems design, analysis, and interpretation."},
  {q:"Taylor notices a sharp cutting tool left on the floor after boxes were opened. He should immediately:",opts:["Ignore it","Try to find out who left it there","Pick it up and put it away","Notify his supervisor"],ans:2,exp:"This is a safety hazard Taylor can easily correct himself before someone gets hurt. Looking for who left it or ignoring it doesn't correct the problem."},
  {q:"What does a group's leader do?",opts:["Takes the meeting minutes","Makes sure the group members agree","Puts the group on a certain course","Follows up with everyone"],ans:2,exp:"A leader puts the group on a certain course. Group members do not have to agree, and the leader doesn't necessarily take minutes or follow up with everyone."},
  {q:"In which of the following ways can employees contribute to the achievement of governance objectives?",opts:["Report progress to shareholders","Create policies to enforce objectives","Draft bylaws that all must follow","Provide feedback to improve objectives"],ans:3,exp:"Employees provide feedback to improve governance objectives, aligning them with the company's vision and making employees more likely to work toward them."},
  {q:"The primary purpose of placing headings and subheadings in a long business report is to:",opts:["Organize content in a cohesive, manageable way","Attract attention to the writer's hidden agenda","Solicit an opinion or response from the audience","Provide supporting evidence for key points"],ans:0,exp:"Headings and subheadings organize content into related chunks so the audience can understand different sections. The primary purpose is not to convey hidden agendas or solicit opinions."},
  {q:"Which of the following is an example of a capital good?",opts:["Coal","A pine forest","A highway","A cashier"],ans:2,exp:"Capital goods are manufactured/constructed items used in production of goods and services. Highways enable producers to distribute goods. Coal and forests are natural resources; cashiers are human resources."},
  {q:"Which of the following is an example of a tax liability?",opts:["Value of an exemption","Deduction for a charitable contribution","Amount due on an inheritance","Interest paid on a mortgage"],ans:2,exp:"A tax liability is the total tax owed. An inheritance tax is a debt individuals must pay when receiving an inheritance. Deductions, exemptions, and mortgage interest reduce tax liability."},
  {q:"A benefit of enterprise risk management is that it gives companies the opportunity to:",opts:["Consider risks in a positive way","Focus on risks by department","Respond to events as they happen","Take a reactive approach to problem-solving"],ans:0,exp:"ERM focuses on both the downside and upside of risks, allowing businesses to take advantage of calculated risks for growth. Focusing by department and reacting are traditional risk management approaches."},
  {q:"Drew, a high-ranking employee, tells his friend about an upcoming product recall before it's public so his friend can sell their stock. Drew's actions demonstrate:",opts:["Internet fraud","Pump-and-dump schemes","Insider trading","Boiler room tactics"],ans:2,exp:"Insider trading includes tipping others off using nonpublic, confidential information. Drew shared confidential recall information, allowing his friend to profit."},
  {q:"It is important to be honest about the time commitment when interviewing potential employees for a new business because:",opts:["Entrepreneurs shouldn't hire employees with busy personal lives","Being honest should weed out people who aren't dedicated","Employees are not legally allowed to work more than 40 hours per week","Employees who are overburdened are unlikely to stay with the company"],ans:3,exp:"Employees hired under false impressions about hours will not stay and will resent management. Honesty provides transparency for all prospective workers."},
  {q:"When providing product information to clients, finance professionals should use:",opts:["Financial acronyms","Simple explanations","Standard responses","Technical terms"],ans:1,exp:"Finance professionals should use simple, clear language clients understand. Clients may not be familiar with industry jargon, acronyms, or technical terms."},
  {q:"Accounting software applications facilitate a business's ability to efficiently track income and expenses, manage inventory, and:",opts:["Plan work projects","Process payroll","Organize media transcripts","Establish insurance policies"],ans:1,exp:"Comprehensive accounting software can process payroll and taxes, forecast sales, and manage inventory. Project management software handles projects."},
  {q:"What web-based tool will help Aidan save and organize websites containing relevant information for his final report?",opts:["Browser bookmarking applications","Personal intranet connection","Notebook with color-coded dividers","Word-processing memo template"],ans:0,exp:"Browser bookmarking applications allow users to select websites, store their URLs, and organize sites into folders for easy access. Intranets are internal networks."},
  {q:"Why would a financial advisor use standard deviation to evaluate an investment?",opts:["To find the range","To understand potential risk","To determine the average price","To solve for mode"],ans:1,exp:"Standard deviation measures differences from the mean. A high standard deviation indicates more volatility—greater potential risk—in an investment."},
  {q:"An organization's board of directors must always act in the best interest of the organization rather than themselves. What word best describes this responsibility?",opts:["Ad hoc","Fair market","Actuary","Fiduciary"],ans:3,exp:"A fiduciary duty is the commitment to act in the best interests of another person or organization, even when those interests conflict with your own."},
  {q:"Businesspeople from one country need to be aware of cultural differences to avoid:",opts:["Discussing finances","Being insulting or rude","Asking questions","Meeting face-to-face"],ans:1,exp:"Without knowing cultural norms, businesspeople risk accidentally insulting or being rude—for example, through misunderstood nonverbal communication or meeting etiquette."},
  {q:"What type of organizational goal involves setting standards in relation to the target market's expectations?",opts:["Consumer","Employee","Technology","Financial"],ans:0,exp:"Consumer-oriented goals set standards to accommodate the target market's needs and wants. Financial goals are measured in terms of money."},
  {q:"When Violet makes a mistake, she admits it to her boss and tries to make things right. Violet is demonstrating:",opts:["Loyalty","Empathy","Consistency","Dependability"],ans:3,exp:"Dependability includes being accountable for your actions and mistakes. Admitting mistakes and trying to correct them demonstrates dependability."},
  {q:"The Sun Valley Granola Company spent more on advertising than quality control and received more complaints from dissatisfied customers. What financial information management function did the company neglect?",opts:["Policy setting","Planning","Budgeting","Stewardship"],ans:3,exp:"Financial stewardship ensures financial resources are allocated appropriately and ethically to fulfill the company's mission. Spending on promotion over quality neglects this stewardship."},
  {q:"When a business actively takes steps to ensure it complies with safety standards, its goal is to reduce:",opts:["Property disputes","Social responsibility","Liability exposure","Fraudulent activity"],ans:2,exp:"Complying with safety standards reduces liability exposure (lawsuits, damaged reputation, financial loss). It doesn't reduce social responsibility or relate to property disputes."},
  {q:"Why are financial institutions using tokenization?",opts:["To protect online transactions","To overcome government-regulated quotas","To provide incentives for increased investing","To create credit cards"],ans:0,exp:"Tokenization substitutes a random number for an account number to process transactions online, protecting customer data from fraud."},

  // 2023 ICDC
  {q:"Marcus, one of the earliest investors for a new teeth-whitening kit, has convinced several others to invest, allowing early backers to profit. What type of investment scam is this scenario describing?",opts:["Viatical investment scam","Boiler room","Ponzi scheme","Predatory lending"],ans:2,exp:"A Ponzi scheme lures new investors by promising high rates of return, paying early investors out of funds from later investors."},
  {q:"Which of the following statements about insider trading is true?",opts:["It is always legal","It is always illegal","Information traded is public","It can result in fines or jail time"],ans:3,exp:"Insider trading can be legal or illegal. Illegal insider trading (trading on nonpublic information) can result in fines or jail time. Legal insider trading must be reported to the SEC."},
  {q:"Which of the following is something that may be subject to a luxury tax?",opts:["Flat-screen TV","Commercial plane ticket","Smart phone","Mansion"],ans:3,exp:"Luxury taxes are imposed on nonessential goods affordable only to wealthy consumers. A mansion qualifies; flat-screen TVs, smartphones, and plane tickets are accessible to most."},
  {q:"A compliance department typically has five areas of responsibility. Which are two of those areas?",opts:["Identification and prevention","Resolution and investigation","Monitoring/detection and discipline","Advisory and complexity"],ans:0,exp:"A compliance department's five areas are identification, prevention, monitoring and detection, resolution, and advisory. Investigation and discipline are not in this list."},
  {q:"Mina has a $3,000 investment for four years at 10% interest paid annually. What is the future value?",opts:["$5,100","$3,500","$4,200","$3,400"],ans:2,exp:"Using simple interest: FV = PV × (1 + [i × n]) = $3,000 × (1 + (0.10 × 4)) = $3,000 × 1.4 = $4,200."},
  {q:"Virtual audits are different from traditional audits in that virtual audits:",opts:["Must offer printed copies of data","Cannot be done remotely","Don't rely on technology","Involve sharing documents online"],ans:3,exp:"Virtual audits occur via the internet, requiring businesses to share documents digitally. They can be done remotely and rely on technology."},
  {q:"Which of the following is an advantage of using a virtual audit?",opts:["Increased efficiency","Longer implementation time","Decreased flexibility","Lack of rapport"],ans:0,exp:"Virtual audits offer increased efficiency and flexibility, and better alignment with remote work. Lack of rapport and longer implementation are potential disadvantages."},
  {q:"The letter of the law refers to the __________ of the law, while the spirit of the law refers to the __________ of the law.",opts:["Intent; literal meaning","Enforcement; intent","Literal meaning; intent","Literal meaning; enforcement"],ans:2,exp:"The letter of the law is its literal, word-for-word meaning. The spirit of the law is its intent—the social and moral consensus of how to interpret it."},
  {q:"When a business is looking to employ communication styles appropriate for its target audience, which should it do?",opts:["Research the needs of the target audience beforehand","Avoid changing the message, no matter the reaction","Prioritize business needs over the target audience's needs","Tailor messages to the general public rather than the target audience"],ans:0,exp:"Researching the target audience's needs allows the business to tailor its messages accordingly. Messages should be specific, not general, and should adapt if the audience doesn't respond as intended."},
  {q:"Which statement best represents the Cornell Method of note-taking?",opts:["Notes are separated and organized into boxes","Information is organized into several columns","The page is divided into three or four sections","Notes are divided into branches and connected with arrows"],ans:2,exp:"The Cornell Method divides the page into three or four sections: a title row, a summary row at the bottom, a narrow left column for keywords, and a wide right column for notes."},
  {q:"Max wants his magazine team to start sending daily emails to subscribers. What type of professional writing should they use?",opts:["Newsletter","Report","Business letter","Agenda"],ans:0,exp:"Newsletters provide information of interest to particular groups, often sent via email to keep subscribers engaged. Reports are documents; business letters communicate between companies."},
  {q:"Which of the following is a true statement about financial advisors?",opts:["They only help clients with investing and budgeting","They help clients execute trades in the market","They meet with their clients once","They can only help wealthy people"],ans:1,exp:"Financial advisors help execute trades in the market, construct personalized financial plans, and offer advice for saving, budgeting, investing, and tax strategies for anyone."},
  {q:"When a customer-centric business constantly strives to align its objectives with customer needs by stressing innovation and technology, it is engaging in:",opts:["Customer experience management","Continuous improvement","Business process management","Organizational structure"],ans:2,exp:"Business process management is when a customer-centric business constantly aligns its objectives with customer needs through innovation and technology."},
  {q:"A company utilizes customer relationship management data to:",opts:["Increase profits and expenses","Weed out unreliable customers","Be more like its competition","Better understand its customers"],ans:3,exp:"CRM strategies use information about customers and market trends to better understand customers, helping market and sell products while meeting their needs."},
  {q:"With an effective customer strategy, a business can increase revenues by:",opts:["Providing products and services customers want","Prioritizing new customers over existing customers","Helping sales staff close deals at a slower pace","Prioritizing existing customers over new customers"],ans:0,exp:"An effective CRM strategy helps businesses identify customer needs, making it easier to provide exactly what customers want, increasing revenues."},
  {q:"Which statement best represents a seller's market?",opts:["There is low demand, high supply, and low prices","There is high demand, low supply, and rising prices","Producers produce less and consumers buy more","It is the best time for consumers to buy"],ans:1,exp:"A seller's market results from excess demand—high demand, low supply, and rising prices. Buyers' markets have low demand, high supply, and low prices."},
  {q:"There are two basic ways a business can increase profit. Which is most likely to help a business increase its sales?",opts:["Change what it provides","Increase worker efficiency","Eliminate some free services","Avoid extra payroll expenses"],ans:0,exp:"Changing what a business provides (e.g., new flavors, styles) can attract new buyers and increase sales. The other options decrease expenses, not increase sales."},
  {q:"Which of the following is an advantage of unions for businesses?",opts:["They increase costs and decrease control","They help with the recruitment of new employees","They lead to higher wages and better benefits","They improve working conditions for employees"],ans:1,exp:"Unions help with recruitment of new employees and provide a security of labor contract. Higher wages, better benefits, and improved conditions are advantages for workers, not businesses."},
  {q:"Economic activities can be impacted by __________ changes like droughts, floods, and blizzards.",opts:["Psychological","Political","Climatic","Demographic"],ans:2,exp:"Climatic changes can impact economic activities, especially agriculture and construction. Droughts, floods, and blizzards are climatic events."},
  {q:"Which statement about resistance to change is accurate?",opts:["Resistance can occur at any point in the change process","Resistance shouldn't be addressed when implementing change","Resistance is a bad thing when leading change","Resistance can only occur after a change has been made"],ans:0,exp:"Resistance can occur at any point in the change process. It's not always bad—it can strengthen your case. Resistance should be addressed, not ignored."},
  {q:"Samantha wants to make a more conscious effort of setting goals. Which tip could help her set smart goals?",opts:["Not tying goals to a timetable","Writing down her goals","Keeping them vague and qualifiable","Making them easily attainable"],ans:1,exp:"Writing down goals makes them feel more solid and real, increasing motivation. Goals should be tied to a timetable, specific, and challenging but achievable."},
  {q:"As a team member, you find motivational techniques such as saying 'thank you' and giving verbal praise especially effective because they:",opts:["Guarantee you a promotion","Encourage fierce competition","Are at virtually no cost to you","Make your group members laugh"],ans:2,exp:"Saying 'thank you' and giving verbal praise boost morale and productivity at virtually no cost. The goal is to inspire, not encourage competition or guarantee promotions."},
  {q:"When a discussion becomes emotionally heated or the other person does not like what you say, you can use __________ to shift the power.",opts:["BATNA","Deadlines","Alternative planning","Silence"],ans:3,exp:"Silence can shift power during a heated discussion. Deadlines can increase tension; BATNA (best alternative to a negotiated agreement) is a negotiation concept."},
  {q:"Sam asked a classmate to create a few slides for their group presentation. Sam recognized he could not do everything himself and decided to:",opts:["Prioritize","Delegate","Overcommit","Divulge"],ans:1,exp:"Delegating is assigning tasks to others. It's important when one cannot do everything alone or has overcommitted. Prioritizing means ordering tasks by importance."},
  {q:"Which of the following are two guidelines for using power appropriately?",opts:["Maintain perspective and show respect","Avoid commitments and maintain perspective","Show respect and hold onto power","Hold onto power and avoid commitments"],ans:0,exp:"Leaders should maintain perspective, communicate effectively, and show respect. They should share power (not hold onto it) and follow through on commitments."},
  {q:"Which of the following is a reason why businesses offer credit?",opts:["To diminish convenience","To encourage customers to save","To increase interest rates","To be competitive"],ans:3,exp:"Being competitive is a major reason businesses offer credit. If a similar competitor offers credit, a business may offer it to attract customers. Interest rates are costs, not reasons."},
  {q:"When looking at a personal budget, which of the following is an example of something that may be included as an expense?",opts:["Interest payment in savings account","Cash birthday gift","Bi-weekly paycheck","Rent and utilities"],ans:3,exp:"Rent and utilities are money spent—expenses. Bi-weekly paychecks and interest from savings accounts are income. A cash birthday gift can be income."},
  {q:"Lyla recently earned her doctorate and wants to meet with a financial advisor. Which step should she do first?",opts:["Determine what type of financial advisor she needs","Understand how financial advisors are compensated","Check for complaints about the financial advisor","Make sure the financial advisor has reputable credentials"],ans:0,exp:"Determining what type of financial advisor is needed comes first. There are many types with different focuses. Once the type is determined, credentials and compensation can be evaluated."},
  {q:"Which of the following best explains the overall purpose of accounting?",opts:["To control finances by keeping accurate financial information","To reduce financial uncertainty and make accidental loss manageable","To help a business make the most money possible","To identify external opportunities and threats"],ans:0,exp:"The overall purpose of accounting is to control finances by keeping accurate financial information. Businesses cannot make good decisions without maintaining control of their money."},
  {q:"Which of the following is a consequence of noncompliance in the financial industry?",opts:["Improved communication","Audits and damaged reputation","Rule violation prevention","Protection from lawsuits"],ans:1,exp:"Noncompliance can result in audits, damaged reputation, financial penalties, suspension, and imprisonment. Rule violation prevention and protection from lawsuits are benefits of compliance."},
  {q:"To calculate the future value of money, you need the present value, the length of time, and the:",opts:["Interest rate","Wage","Utility","Bottom line"],ans:0,exp:"The future value formula FV = PV × (1 + i)^n requires present value, interest rate, and time period."},
  {q:"Which of the following statements about financial statements is true?",opts:["They don't include a cash flow statement","They include a mission statement","They communicate an entity's financial activities","They are presented in an unstructured manner"],ans:2,exp:"Financial statements are structured records showing a business's financial activities, including balance sheet, income statement, cash flow statement, and statement of changes in equity."},
  {q:"Which of the following is an external source of corporate information that can aid an organization in understanding securities?",opts:["Sales reports","Customer records","Accounts receivable","Investment research firms"],ans:3,exp:"Investment research firms are external sources. Sales reports, customer records, and accounts receivable are all internal data sources."},
  {q:"If you want to find out the greatest price at which a stock was traded over the last year, what part of the stock table would provide this information?",opts:["52-week high","Ask price","Dividend yield","52-week low"],ans:0,exp:"The 52-week high is the highest price at which a stock has traded over the last 52 weeks. The 52-week low is the lowest."},
  {q:"When looking at a stock on a stock table, what information does the volume section provide?",opts:["The ratio between the stock's price and the company's earnings","The lowest price of the stock in the last 52 weeks","The amount of shares of the stock that were traded in that day","The change in the stock's price from the previous day's closing price"],ans:2,exp:"Volume refers to the number of shares traded in that day. Net change is the price difference from the previous day's close; P/E ratio is price vs. earnings."},
  {q:"Which statement about commercial banks is true?",opts:["They are only available online","They do not offer credit cards","They are owned and operated by members","They offer checking and savings accounts"],ans:3,exp:"Commercial banks offer checking and savings accounts, secured and unsecured loans, and bank credit cards. Credit unions are owned and operated by members."},
  {q:"An insurance company is different from a bank in that an insurance company:",opts:["Insures its customers against certain risks","Accepts short-term deposits and makes long-term loans","Is part of a centralized clearing and payment system","Is not considered a financial institution"],ans:0,exp:"Insurance companies insure customers against certain risks in exchange for regular premiums. Banks accept short-term deposits and make long-term loans."},
  {q:"Which statement about the equity market is true?",opts:["Equity investments typically involve less risk than debt securities","It is where investors and traders buy and sell stock","Stocks are the most common form of debt investment","It is where investors and traders buy and sell bonds"],ans:1,exp:"The equity market (stock market) is where stocks are bought and sold. Equity investments involve more risk than debt securities. Bonds are the most common debt investment."},
  {q:"Which of the following best represents what happens in the spot market?",opts:["Creation and sale of new securities","Trade of financial instruments for immediate delivery","Delivery of an asset and funds at a future date","Purchase and sale of loans"],ans:1,exp:"The spot market is where financial instruments are traded for immediate delivery. Futures markets involve future delivery dates."},
  {q:"If a company is looking to consolidate, it will __________ its assets.",opts:["Combine","Destroy","Increase","Sell"],ans:0,exp:"Consolidation refers to combining assets, liabilities, and other financial items of two or more entities into one."},
  {q:"Which of the following are two indicators of a recession?",opts:["Sales rise and income falls","Sales fall and production rises","Production and employment fall","Employment and income rise"],ans:2,exp:"A recession is characterized by production, employment, income, and sales all falling. Employment and income rising indicates expansion."},
  {q:"After 10 years, Marco was laid off and has struggled to find a new job. Which is a result of Marco being unemployed?",opts:["Less disposable income for his family","Greater contribution to the economy","Less work for his former colleagues","Greater purchasing power"],ans:0,exp:"When unemployed, workers and their families lose wages and have less disposable income. This also reduces their purchasing power and their contribution to the economy."},
  {q:"Which of the following factors can lead an investor to develop a home bias?",opts:["Fewer barriers to entry in foreign markets","Higher risk associated with international investing","Less availability of domestic investments","Better familiarity with foreign markets"],ans:1,exp:"Home bias is a preference for domestic investments. Higher risk in international investing—and unfamiliarity with foreign markets—leads investors to prefer domestic options."},
  {q:"Which sentence about equity statements is true?",opts:["Companies need to prepare them once a month","Companies are not required to prepare them","Using them typically increases a company's equity","They report changes in a company's equity"],ans:3,exp:"An equity statement (statement of changes in equity) reports changes in a company's equity. Companies are required to prepare them at the end of the financial year."},
  {q:"Which of the following is the formula used to calculate retained earnings?",opts:["Beginning period retained earnings − Net income (or loss) + Net dividends","Beginning period retained earnings + Net income (or loss) − Net dividends","Capital expenditures + Net income (or loss) − Net dividends","Operating cash flow − Capital expenditures + Net income (or loss)"],ans:1,exp:"Retained earnings = Beginning period retained earnings + Net income (or loss) − Net dividends. Capital expenditures and operating cash flow relate to free cash flow."},
  {q:"Which of the following is considered a direct cost?",opts:["Raw materials","Rent","Office supplies","Utilities"],ans:0,exp:"Raw materials can be directly connected to a specific cost objective like a product. Rent, utilities, and office supplies are indirect costs spread across departments."},
  {q:"A large corporation closes one of its branches. The previous costs of running that branch—rent, utilities, and equipment—would all be considered __________ costs.",opts:["Appraisal","Employment","Avoidable","Mixed"],ans:2,exp:"Avoidable costs can be eliminated by no longer engaging in a business activity. Closing the branch eliminates all associated costs."},
  {q:"Which statement about marginal analysis is true?",opts:["Marginal cost is often equal to fixed costs","The goal is for costs to outweigh benefits","It is not necessary when looking to expand","Companies use it to maximize profits"],ans:3,exp:"Companies use marginal analysis to maximize profits by comparing additional benefits and costs. The goal is for benefits to equal or outweigh costs, not the reverse."},
  {q:"The goal of marginal analysis should be to ensure that:",opts:["Marginal revenue exceeds marginal cost","Opportunity cost equals marginal revenue","Marginal cost equals opportunity cost","Marginal cost exceeds marginal revenue"],ans:0,exp:"Businesses profit when marginal revenue (from an additional unit) is greater than marginal cost (to produce that unit). If marginal cost exceeds revenue, the company takes a loss."},
  {q:"As opposed to financial accountants, managerial accountants primarily:",opts:["Hire externally","Report externally","Hire internally","Report internally"],ans:3,exp:"Managerial accounting is focused on reporting financial information internally to aid decision-making. Financial accounting reports to outside entities like investors and lenders."},
  {q:"Which of the following is most likely to impact a company's corporate governance?",opts:["Suppliers","Board of directors","Global citizens","Auditors"],ans:1,exp:"The board of directors governs the activities of a corporation and is responsible for handling responsibility toward shareholders—directly impacting corporate governance."},
  {q:"Shemar is doing a quantitative study into the difference between planned and actual behavior. He is conducting a(n) __________ analysis.",opts:["Environmental","Break-even","Cash flow","Variance"],ans:3,exp:"Variance analysis quantitatively investigates the difference between planned and actual behavior or outcomes."},
  {q:"Cost accounting is an activity used mainly in __________ accounting.",opts:["Managerial","Forensic","Financial","Electric"],ans:0,exp:"Cost accounting assesses variable and fixed costs for internal use—making it a form of managerial accounting. Financial accounting reports to external parties."},
  {q:"Companies that effectively allocate costs:",opts:["Improve short-term and hurt long-term decision-making","Increase profits and expenses","Spread costs among departments","Determine one department to cover all costs"],ans:2,exp:"Cost allocation spreads costs among departments (cost objects), helping identify which are profitable and improving both short-term and long-term decision-making."},
  {q:"Employee payroll is an example of a(n) __________ cost.",opts:["Direct","Indirect","Manufacturing","Utility"],ans:1,exp:"Payroll cannot be directly allocated to a specific product or project—it is used across various departments, making it an indirect cost."},
  {q:"Which of the following is an advantage for a company that implements a financial management information system?",opts:["Decreased efficiency","Less capacity to plan","More inaccuracies","Better decision-making"],ans:3,exp:"A financial management information system provides timely, reliable, accurate data that leads to better, faster decision-making. Other advantages include improved planning and increased accuracy."},
  {q:"Which statement about accounting information systems is true?",opts:["They typically avoid the use of internal controls","They help a company's different departments work together","They use software, but not hardware, to store and retrieve data","They collect data to be used only by accountants"],ans:1,exp:"AIS helps different departments work together. It uses both hardware and software, includes internal controls, and its data is used by many people beyond accountants."},
  {q:"Following ethical financial accounting practices often leads to:",opts:["Receiving fines or sanctions","Maintaining public faith","Losing revenue","Pushing away investors"],ans:1,exp:"Ethical accounting practices establish trustworthiness and maintain public faith, attracting investors. Unethical practices lead to fines, loss of revenue, and pushing away investors."},
  {q:"A financial organization is most likely to have which of the following standards in its code of ethics?",opts:["Share confidential information and data","Provide people with subjective information","Disclose positive and negative information","Welcome conflicts of interest"],ans:2,exp:"Disclosing both positive and negative information is an ethical standard in finance. Financial professionals should avoid sharing confidential information and conflicts of interest."},
  {q:"By reviewing an income statement to see how every line item compares to revenue, Anna conducted a __________ analysis.",opts:["Horizontal","Vertical","Break-even","SWOT"],ans:1,exp:"Vertical analysis reviews line items as a proportion of revenue—looking up and down (vertically) a financial document. Horizontal analysis looks at year-over-year changes."},
  {q:"Which of the following statements about ethics and risk management is true?",opts:["Ethical risk management starts at the bottom","Ethical codes of conduct can support and go above and beyond legal compliance","Only management must be concerned about promoting ethics in risk management","It's helpful to reward unethical behavior"],ans:1,exp:"Ethical codes can meet and exceed legal compliance requirements. Ethical risk management starts at the top, and everyone in the organization should be involved."},
  {q:"By using a central data repository for financial information, companies receive:",opts:["Up-to-date data","Slower responses to queries","Less predictability","Inconsistent data"],ans:0,exp:"A central data repository houses data in one location, keeping it up-to-date and consistent, with faster response to queries and better predictability."},
  {q:"Audrey is working with a management team to develop a budget forecasting revenues and expenses for the coming year. What type of budget is Audrey's company using?",opts:["Cash budget","Operating budget","Promotional budget","Long-term budget"],ans:1,exp:"An operating budget helps companies forecast expected revenues and expenses for a period (usually a year), often developed just before the fiscal period begins."},
  {q:"Nathan runs a budget past management to ensure they understand and agree before implementation, helping the company coordinate efforts. This demonstrates the importance of __________ in developing an effective budget.",opts:["Rewards","Accuracy","Company-wide support","Long-term motivation"],ans:2,exp:"Company-wide support ensures the budget is implemented effectively across departments as they work toward shared company goals."},
  {q:"Zach wants to run financial analyses comparing his company's practices and standards with other firms in his industry. What strategy is Zach using?",opts:["Smishing","Benchmarking","Forecasting","Exporting"],ans:1,exp:"Benchmarking compares a company's financial performance with other specific companies or industry standards using benchmarks as reference points."},
  {q:"Which statement about the use of technology in financial analysis is true?",opts:["Its use is declining within certain industries","It is reserved for legal corporations","It only supports outdated methodologies","It helps inform and support decision-making"],ans:3,exp:"Technology organizes large data sets efficiently, informing and supporting decision-making. Its use is growing across industries of all sizes."},
  {q:"Which methodology focuses most on eliminating waste to maximize value?",opts:["Licensing","Six Sigma","Sustainability","Lean"],ans:3,exp:"Lean production focuses on maximizing customer value while minimizing waste. Six Sigma targets process variations; Lean Six Sigma combines both."},
  {q:"A cell phone company is focusing on communicating with customers and putting its products in an accessible location. What two marketing elements is it prioritizing?",opts:["Promotion and product","Promotion and place","Place and price","Price and product"],ans:1,exp:"Promotion involves communicating with customers; place involves making products accessible. Product and price are not indicated in this scenario."},
  {q:"Which statement about creating a basic web page is true?",opts:["Finding a host for the page isn't necessary","You should learn basic HTML code","You will not need a web editor","Previewing your page is a waste of time"],ans:1,exp:"HTML is the building block of web pages. Basic HTML knowledge helps build and maintain pages. A web editor, host, and previewing are all necessary."},
  {q:"If you want to explore a topic in depth through a group discussion, which procedure for obtaining information would you use?",opts:["Survey group","Focus group","Observation","Interview"],ans:1,exp:"A focus group is formed specifically to discuss a topic in depth, providing a range of information in a short time. Surveys, observations, and interviews are individual methods."},
  {q:"When ethics are part of information management:",opts:["Personal files can be corrupted","Personal privacy can be invaded","Piracy is more likely","Information is better protected"],ans:3,exp:"When ethics are followed in information management, information is better protected. Without ethics, privacy invasion, file corruption, and piracy are more likely."},
  {q:"Data normalization involves creating a(n) __________ for all data within an organization.",opts:["Anomaly set","Search query","Group command","Standard format"],ans:3,exp:"Data normalization creates a standard format for all organizational data, enabling more accurate analysis, more storage space, and better segmentation."},
  {q:"Brody uses Benford's Law when reviewing a financial statement because it helps:",opts:["Predict financial performance","Locate the break-even point","Detect the possibility of fraud","Disseminate information"],ans:2,exp:"Benford's Law explores digit distribution in large data sets. Deviations from expected patterns can indicate fraudulently manufactured numbers."},
  {q:"If there is an accident in the workplace, in what time frame should a manager complete an initial incident report?",opts:["3 weeks","24 hours","10 days","1 week"],ans:1,exp:"An initial incident report should be completed and sent within 24 hours. A follow-up report should start within 48 hours and be completed within 30 days."},
  {q:"Phil spends at least 1 hour of every workday playing games on his phone but consistently logs 8 hours. Phil is guilty of:",opts:["Time theft","Impartiality","Misusing company equipment","Unethical inventory management"],ans:0,exp:"Time theft occurs when an employee spends company time on personal matters when they should be working, causing a loss in productivity and profitability."},
  {q:"During a one-on-one meeting, Joe learned important information about a high-profile client. His boss asked him not to share the information so it would remain:",opts:["On the record","Public","Confidential","Personal"],ans:2,exp:"Confidential information is meant to be held in confidence and shared only when authorized. Public information is widely available; personal information can be traced to an individual."},
  {q:"Russell sets smaller project goals for his team that contribute to long-term goals. As a result, his team is very organized. This is an example of how planning is:",opts:["Influenced by the potential risks","Impacted by the project's leadership","Emphasized by the political environment","Affected by the project's budget"],ans:1,exp:"Whoever is in charge of a project impacts how it is planned. Russell's organizational habits and approach to setting smaller goals directly shape his team's planning."},
  {q:"Two of Toby's close friends get into a fight, and both demand he hear their perspective and resolve the matter. This is an example of a __________ problem.",opts:["School","Work","Peer","Personal"],ans:2,exp:"Problems with peers occur among people similar in age and background. Though it may affect personal, school, or work life, it is fundamentally a peer problem."},
  {q:"A claims adjuster is most likely to work within which area of the finance industry?",opts:["Securities and investments","Corporate finance","Insurance","Banking services"],ans:2,exp:"Claims adjusters work in the insurance industry, which protects individuals and businesses from financial losses through risk transfer."},
  {q:"Which of the following job tasks is most likely to fall within the finance industry?",opts:["Investigating fraud","Advertising products","Planning a vacation","Growing a business"],ans:0,exp:"Investigating fraud is a finance job. Advertising is marketing; planning vacations is hospitality/tourism; growing a business is entrepreneurship."},
  {q:"Which statement about professional associations in the finance industry is true?",opts:["The financial services industry only has national associations","Financial advisors are required to join a professional association","Professional associations are uniform in cost, size, and history","Joining a professional association can help with networking"],ans:3,exp:"Professional associations offer networking, continuing education, and industry support. They are not required, vary widely, and exist at national, state, and local levels."},
  {q:"Which policy encourages a healthy work-life balance for employees?",opts:["No paid leave rollover","Restrictive maternity leave","A flexible work schedule","Working weekends"],ans:2,exp:"Flexible work schedules (flexible hours, remote days, reduced workweeks) encourage healthy work-life balance. The other options restrict time away from work."},
  {q:"Corporate governance is important because it:",opts:["Often results in scandals and bankruptcy","Produces noncompliant financial documents","Balances the interests of different stakeholders","Makes it difficult to oust ineffective leaders"],ans:2,exp:"Corporate governance helps balance the interests of all stakeholders—employees, management, shareholders, and the public—in the efficient running of a company."},
  {q:"A possible consequence of poorly-executed corporate governance is:",opts:["Limited profitability","Increased ethics","Decreased risk","Greater payroll"],ans:0,exp:"Poor corporate governance can limit profitability by preventing effective decision-making and goal achievement. It leads to decreased, not increased, ethics."},
  {q:"Generally, a company's board of directors makes decisions on behalf of the company as a(n):",opts:["President","Actuary","Fiduciary","Consumer"],ans:2,exp:"A fiduciary acts on behalf of another, putting that client's interests ahead of their own. The board makes decisions for the company's benefit, not their own."},
  {q:"A company's board of directors frequently provides timely, accurate, and clear information about anticipated risks and financial performance. What ethical principle is demonstrated?",opts:["Fairness","Respect","Accountability","Transparency"],ans:3,exp:"Transparency involves maintaining open and honest communications. Providing timely, accurate, and clear information is a key component of transparency."},
  {q:"What is a benefit of setting organizational goals?",opts:["It is easier to assess organizational progress","Organizations will be unable to make changes","There is no need for channel management","Organizations will have fewer expenses"],ans:0,exp:"Clear organizational goals allow a coherent vision and the ability to monitor progress toward achieving those goals. Organizations can still change direction when needed."},
  {q:"How do employees benefit from being involved in achieving governance objectives?",opts:["Increased job satisfaction","Reduced communication","Limited union support","Greater profits"],ans:0,exp:"Involving employees in achieving governance objectives leads to increased job satisfaction and a positive attitude. Greater profits benefit the company, not individual employees."},
  {q:"A company budgeted $20,000 for monthly sales but only earned $16,000. When conducting a variance analysis, what is the variance?",opts:["$4,000","$36,000","$16,000","$20,000"],ans:0,exp:"Variance is the difference between the budgeted and actual amounts: $20,000 − $16,000 = $4,000."},
