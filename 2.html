<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DECA Finance Quiz</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Roboto', sans-serif; background: #fff; color: #152238; min-height: 100vh; }
  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
  #app { max-width: 720px; margin: 0 auto; padding: 40px 24px; }
  #progress-bar-wrap { background: #e0e0e0; height: 4px; border-radius: 2px; margin-bottom: 32px; }
  #progress-bar { background: #009b47; height: 4px; border-radius: 2px; transition: width 0.3s; }
  #meta { font-size: 13px; color: #888; margin-bottom: 20px; font-weight: 500; letter-spacing: 0.5px; }
  #pile-info { font-size: 13px; color: #555; margin-bottom: 12px; display: flex; gap: 16px; }
  .pile-badge { padding: 3px 10px; border-radius: 12px; font-weight: 700; font-size: 12px; }
  .pile-x { background: #e6f9ef; color: #009b47; border: 1px solid #009b47; }
  .pile-y { background: #fff0f0; color: #c0392b; border: 1px solid #c0392b; }
  .pile-u { background: #f0f0f0; color: #888; border: 1px solid #ccc; }
  #question { font-size: 18px; font-weight: 500; line-height: 1.5; margin-bottom: 28px; color: #152238; }
  .opt { display: block; width: 100%; text-align: left; background: #fff; border: 2px solid #e0e0e0; color: #152238; padding: 14px 18px; margin-bottom: 10px; font-size: 15px; font-family: 'Roboto', sans-serif; cursor: pointer; border-radius: 4px; transition: border-color 0.15s; }
  .opt:hover:not(:disabled) { border-color: #009b47; }
  .opt.correct { border-color: #009b47; background: #f0fff6; color: #152238; }
  .opt.wrong { border-color: #c0392b; background: #fff5f5; color: #152238; }
  .opt:disabled { cursor: default; }
  #explanation { display: none; background: #f7f7f7; border-left: 4px solid #009b47; padding: 16px 18px; margin-top: 20px; font-size: 14px; line-height: 1.6; color: #333; border-radius: 0 4px 4px 0; }
  #explanation.wrong-exp { border-left-color: #c0392b; }
  #wrong-choice-note { display: none; background: #fff5f5; border-left: 4px solid #c0392b; padding: 12px 18px; margin-top: 12px; font-size: 14px; line-height: 1.6; color: #333; border-radius: 0 4px 4px 0; }
  #next-btn { display: none; margin-top: 24px; background: #009b47; color: #fff; border: none; padding: 14px 32px; font-size: 15px; font-family: 'Roboto', sans-serif; font-weight: 700; cursor: pointer; border-radius: 4px; letter-spacing: 0.5px; }
  #next-btn:hover { background: #007a38; }
  #round-complete { display: none; text-align: center; padding: 60px 0; }
  #round-complete h2 { font-size: 28px; font-weight: 700; color: #152238; margin-bottom: 8px; }
  #round-complete p { font-size: 16px; color: #555; margin-bottom: 32px; }
  #continue-btn { background: #c0392b; color: #fff; border: none; padding: 14px 36px; font-size: 15px; font-family: 'Roboto', sans-serif; font-weight: 700; cursor: pointer; border-radius: 4px; }
  #continue-btn:hover { background: #a93226; }
</style>
</head>
<body>
<div id="app">
  <div id="quiz-screen">
    <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
    <div id="pile-info">
      <span class="pile-badge pile-x">✓ Mastered: <span id="count-x">0</span></span>
      <span class="pile-badge pile-y">✗ Review: <span id="count-y">0</span></span>
      <span class="pile-badge pile-u">? Unseen: <span id="count-u">0</span></span>
    </div>
    <div id="meta"></div>
    <div id="question"></div>
    <div id="options"></div>
    <div id="wrong-choice-note"></div>
    <div id="explanation"></div>
    <button id="next-btn">Next →</button>
  </div>
  <div id="round-complete">
    <h2 id="round-title"></h2>
    <p id="round-sub"></p>
    <button id="continue-btn">Keep Going →</button>
  </div>
</div>
<script>
const ALL_QUESTIONS = [
  // Test 1267
  {q:"Which of the following is a characteristic of a legally binding contract?",opts:["The contract must be written and signed.","One of the parties must be in agreement.","The contract must include an expiration date.","Something of value must be exchanged."],ans:3,exp:"A legally binding contract requires that something of value be exchanged AND both parties be in agreement. It does not need to be written, signed, or include an expiration date."},
  {q:"Chris purchased stock, posted false information online to hype it up, quickly sold at a profit, then the price crashed. What type of investment scam did Chris commit?",opts:["Ponzi scheme","Pump and dump","Pyramid scheme","Phishing"],ans:1,exp:"Pump and dump involves buying stock, hyping it with false information to drive up the price, then selling at the peak and leaving other investors with losses."},
  {q:"The tendency to respond to situations based on how those situations are posed or viewed is known as:",opts:["Framing","Obedience to authority","Groupthink","Overoptimism and overconfidence"],ans:0,exp:"Framing is the tendency to respond to situations based on how they are posed or viewed. Groupthink involves group decision-making that discourages individual responsibility."},
  {q:"Colin bought 35 shares at $23.50 and sold all for $53.00 per share. What type of tax will Colin pay?",opts:["Sales","Excise","Capital gains","Gift"],ans:2,exp:"When investments like stocks are sold at a profit, the stockholder may pay a capital gains tax on the difference between the purchase price and sales price."},
  {q:"What is an advantage of setting ideal standards?",opts:["Reduce the frustration associated with easily attainable goals","Allocate time for rework when errors occur","Recognize that errors can occur in production","Provide a lofty goal for employees to strive for"],ans:3,exp:"Ideal standards are set so high they are nearly unattainable, challenging employees to strive for more than they would with lower, attainable standards."},
  {q:"Which of the following is a benefit of using artificial intelligence in compliance?",opts:["Reduces human error","Increases costs","Reduces efficiency","Increases false positives"],ans:0,exp:"AI helps increase efficiency and effectiveness of compliance, lowers chances of human error, and decreases false positives—though initial adoption can be costly."},
  {q:"Martin was speeding a couple miles over the limit to keep up with traffic. Martin was most likely breaking __________ law but not __________ law.",opts:["the letter of the; the spirit of the","criminal; civil","civil; criminal","the spirit of the; the letter of the"],ans:0,exp:"The letter of the law is its literal wording (the speed limit). The spirit of the law is its intent (drive safely). Keeping up with traffic violates the letter but arguably not the spirit."},
  {q:"Which of the following is an example of a verbal acknowledgment response a listener can use to show a speaker they are listening?",opts:["Making eye contact","Leaning forward","Nodding their head","Saying, 'I understand.'"],ans:3,exp:"Verbal acknowledgment responses are words or utterances showing you are paying attention. Eye contact, leaning, and nodding are nonverbal, not verbal, responses."},
  {q:"Samantha has been chosen for a group discussion on a topic she knows little about. What should she do to become a valuable participant?",opts:["Ask to be excused from the group","Take the leadership role to give an open mind","Resist commenting until she becomes an expert","Ask questions to clarify other participants' comments"],ans:3,exp:"Asking clarifying questions helps the entire group learn. No one knows everything, and diverse viewpoints are the purpose of group discussion."},
  {q:"Which of the following is a type of simple written report usually distributed to employees within a business?",opts:["Memorandum","Handbook","Proposal","Newsletter"],ans:0,exp:"Memorandums are brief, informal written communications exchanged within a business to update employees on projects or policy changes."},
  {q:"One way that organizations can achieve their corporate governance objectives is by:",opts:["Allowing senior managers to serve on the board of directors","Preventing stakeholders from viewing financial information","Encouraging employee participation at board meetings","Releasing an annual report detailing their failures and losses"],ans:2,exp:"Encouraging employees to participate at board meetings gives them a voice to raise questions or concerns, supporting governance objectives."},
  {q:"Which of the following is a characteristic of effective verbal communication?",opts:["Precise speech","Good use of slang","Lack of clarity","Lack of tact"],ans:0,exp:"Precise speech—choosing the most accurate words—creates clarity so the listener receives the intended message. Effective communication should also be tactful and avoid slang."},
  {q:"Which of the following is considered a presale touchpoint?",opts:["Shipping/Delivery","Installation","Interaction with a salesperson","Advertising"],ans:3,exp:"Advertising is a presale touchpoint—interaction before the buying process. Interaction with a salesperson is during the sale; shipping and installation are post-sale."},
  {q:"If a financial planner fails to stay informed about new laws impacting the financial products they sell, which ethical principle are they failing to observe?",opts:["Objectivity","Confidentiality","Honesty","Competence"],ans:3,exp:"Competence means maintaining the knowledge necessary to provide accurate information. Failing to stay current makes the planner incompetent. Honesty and objectivity relate to truthfulness and bias."},
  {q:"One action an ethical business can take to build long-term trust and loyalty of customers is to:",opts:["Implement a comprehensive customer privacy policy","Send daily opt-in email messages to customers","Sell its customer list to third parties without permission","Maintain detailed information about customers' transactions"],ans:0,exp:"Developing and adhering to a customer privacy policy—such as limiting employee access and not selling customer lists—earns customers' trust."},
  {q:"What is the primary purpose of data-cleansing processes?",opts:["To control employees' intranet access","To correct non-response errors","To maintain a useful customer database","To monitor the system for security breaches"],ans:2,exp:"Data cleansing removes duplicates, updates expired data, and completes incomplete fields—resulting in a useful, accurate database for sound business decisions."},
  {q:"Which of the following statements regarding the financial-information management function is true?",opts:["Data in a financial-information management system are typically at least four-to-six months old.","The financial-information management function's responsibilities have declined in recent years.","The financial-information management function is an electronic, web-based activity.","A financial-information management system can be used to support operations management decisions."],ans:3,exp:"Operations managers can use a financial-information management system to determine operating efficiency, manage inventory, and evaluate suppliers."},
  {q:"One of the advantages of a market economy is:",opts:["Absence of taxes","Government control","Freedom of competition","Assigned occupations"],ans:2,exp:"In a market economy, businesses are free to compete for labor and customers. Workers choose their own occupations, and government's role is limited."},
  {q:"Which of the following represents a natural risk for the owner of a delivery service?",opts:["Accident","Snowstorm","Government intervention","Rising prices"],ans:1,exp:"Natural risks result from nature—floods, storms, etc. A snowstorm can slow deliveries. Accidents are human risks; government intervention and rising prices are economic risks."},
  {q:"As operations manager, you know inputs and outputs of your business for the last fiscal year. What can be calculated from this information?",opts:["Disposable income","Business productivity","Quality of work life","Gross domestic product"],ans:1,exp:"Business productivity is the amount of goods/services produced from a set of resources, calculated by dividing outputs by inputs."},
  {q:"Jordan gives an unhappy employee more responsibility and decision-making authority. Jordan is increasing the employee's job:",opts:["Rotation","Depth","Automation","Scope"],ans:1,exp:"Job depth is the amount of control and decision-making authority an employee has. Job scope is the number of tasks and their frequency."},
  {q:"Which trait differentiates entrepreneurs from small-business owners?",opts:["Job creation","Size of workforce","Willingness to take risks","Impact on economic growth"],ans:2,exp:"Risk-taking is a defining trait of entrepreneurship. Small-business owners may not focus as strongly on innovation and risk."},
  {q:"When a leader keeps trying in spite of setbacks, they are demonstrating which characteristic of emotional intelligence?",opts:["Confidence","Perseverance","Positive working relationships","Proactive behavior"],ans:1,exp:"Perseverance is keeping trying despite setbacks. Proactive behavior is taking action before problems develop—different from overcoming setbacks."},
  {q:"What seems to be almost an automatic response to criticism for many people?",opts:["Anger","Acceptance","Patience","Initiative"],ans:0,exp:"Anger is the most common defensive reaction to criticism. Patience and acceptance are traits that help control this reaction."},
  {q:"A person reacting to conflict by trying to persuade others to take a certain course of action is an example of:",opts:["Problem-solving","Yielding","Negotiating","Forcing"],ans:2,exp:"Negotiating involves persuading others to take a certain course of action and finding compromise. Yielding means giving in; forcing uses physical or emotional pressure."},
  {q:"If you want to exhibit self-confidence in a job interview, you should:",opts:["Dress well in clothing that makes you feel good","Use defensive body language","Not plan for things that could go wrong","See perfection as your only option"],ans:0,exp:"Dressing well in clothing that makes you feel good helps exhibit self-confidence. Confident people use open body language and are prepared for imperfection."},
  {q:"Isaac's boss says the first step in handling workplace change is understanding that change is:",opts:["Negative","Unavoidable","Unnecessary","Intimidating"],ans:1,exp:"Understanding that change is unavoidable is the first step to accepting it. Looking at change as negative or intimidating won't help adjustment."},
  {q:"Which of the following is a sign of high achievement orientation?",opts:["A lack of competitiveness","An entrepreneurial spirit","Impatience","Poor-quality work"],ans:1,exp:"An entrepreneurial spirit signals high achievement orientation because achievement-oriented people enjoy challenges, are competitive, patient, persistent, and produce high-quality work."},
  {q:"Mr. Field makes all important decisions and gives employees very specific instructions. Which management style describes Mr. Field?",opts:["Open","Laissez-faire","Authoritarian","Democratic"],ans:2,exp:"Authoritarian managers rely on their own judgment and tell employees exactly how to do their jobs. Democratic managers seek employee input. Laissez-faire provides only general guidance."},
  {q:"Kali promised to get good grades and studies every day, completes assignments, and attends review sessions. Kali is __________ getting good grades.",opts:["Being pressured into","Committed to","Not focused on","Uninterested in"],ans:1,exp:"Kali is committed to getting good grades—she follows through on her promise by taking necessary steps consistently."},
  {q:"If a drama club member adopts other members' negative attitude even though she doesn't approve, she is demonstrating:",opts:["Acceptance","Emotional intelligence","Status quo bias","Groupthink"],ans:3,exp:"Groupthink is adopting a group's attitude without personally agreeing. Acceptance is consciously agreeing. Status quo bias is preferring the current state."},
  {q:"Cornell wants to start a business but isn't sure what product to pursue. What is the first step of the entrepreneurial process he should focus on?",opts:["Verification","Idea generation","Illumination","A feasibility study"],ans:1,exp:"Idea generation is the first step—without an idea, none of the other steps can be completed. A feasibility study, illumination, and verification come after."},
  {q:"When validating your credit report, it is important to:",opts:["Destroy financial documents that contradict your report","Ignore any mistakes because they will be removed automatically","Compare your report with your own financial documents","Send your findings to your employer and/or school administrator"],ans:2,exp:"Comparing your credit report with your own financial documents ensures accuracy. Mistakes won't be removed automatically and should be disputed."},
  {q:"Which of the following is a true statement regarding budgets?",opts:["They are set for specific time periods","Some businesses don't need them","To be successful, they must stay the same from year to year","They are required by law"],ans:0,exp:"Budgets are estimates of income and expenses for specific time periods. They should be flexible, are not required by law, and every business needs one."},
  {q:"The two major sections on a balance sheet are:",opts:["Assets and liabilities","Assets and income","Expenses and assets","Cash flow and liabilities"],ans:0,exp:"Assets and liabilities are the two major sections that must balance on a balance sheet. Cash flow, income, and expenses appear on other financial statements."},
  {q:"What part of a company's website likely contains its most recent annual report?",opts:["Public Relations","Sustainability","Leadership","Investor Relations"],ans:3,exp:"Most publicly traded companies have an Investor Relations section where annual reports and other public filings are found."},
  {q:"Before reviewing stock performance in a securities table, investors must locate the company's abbreviated name followed by the:",opts:["Trademark","Trade number","Yield code","Ticker symbol"],ans:3,exp:"The ticker symbol is a unique set of letters identifying a company in a stock table, helping investors quickly locate stock information."},
  {q:"What might a company's higher-than-usual sales volume for a day indicate?",opts:["Investors have recalculated the PE.","Investors believe the yield percentage has changed.","Investors have received their dividends.","Investors have reacted to news about the company."],ans:3,exp:"Higher-than-usual volume typically indicates investors heard something about the company that could affect the stock price."},
  {q:"Commercial banks and brokerage firms are examples of:",opts:["Legislative groups","Financial intermediaries","Nonprofit organizations","Insurance institutions"],ans:1,exp:"Financial intermediaries help move financial products between producers and end users. Banks and brokerage firms are classic examples."},
  {q:"Which of the following is an example of a deposit-taking institution?",opts:["Premier Insurance Company","Insight Credit Services","First Street Credit Union","Delaware Mortgage Company"],ans:2,exp:"Credit unions offer savings and checking accounts for members. Insurance, credit services, and mortgage companies do not take deposits."},
  {q:"How are very small companies and companies with poor credit ratings most likely to trade their stock?",opts:["On the New York Stock Exchange (NYSE)","On the Over the Counter Bulletin Board (OTCBB)","On the Toronto Stock Exchange (TSX)","On the American Stock Exchange (AMEX)"],ans:1,exp:"The OTCBB is a regulated electronic exchange with no listing requirements, making it accessible to small or low-credit-rated companies. NYSE and TSX have listing requirements."},
  {q:"Which of the following is a function of financial markets?",opts:["Customer service","Borrowing and lending","Auctions","Productivity"],ans:1,exp:"Borrowing and lending allows financial markets to exist. Auctions are an example of a financial market, not a function. Customer service and productivity are unrelated."},
  {q:"When individuals purchase high-performance sports cars, rare collectibles, and jewelry with large gemstones, they must often pay __________ taxes.",opts:["Gift","Property","Luxury","Estate"],ans:2,exp:"Luxury taxes are charged on nonessential, expensive goods such as high-end cars, collectibles, and jewelry."},
  {q:"Oscar placed company money into an offshore account only he could access. He was arrested for:",opts:["Securities fraud","Espionage","Embezzlement","Insider trading"],ans:2,exp:"Embezzlement is theft of valuables entrusted to someone's care. Oscar stole company money he was supposed to deposit elsewhere."},
  {q:"Margaret died with a large estate. Who is legally responsible for managing and distributing her wealth according to her wishes?",opts:["Her attorney","An executor","A beneficiary","Her daughter"],ans:1,exp:"An executor has a fiduciary duty to manage the deceased's assets and distribute them according to their last wishes."},
  {q:"In relation to the business cycle, the stock prices of non-cyclical industries tend to:",opts:["Remain steady throughout all phases","Steadily decrease during the expansion phase","Increase dramatically during the contraction phase","Increase slightly during the trough phase"],ans:0,exp:"Non-cyclical industries (food, healthcare) have consistent demand throughout the business cycle, so their stock prices tend to remain steady."},
  {q:"A country's unemployment rate impacts the economy because when people are unemployed, they lose their:",opts:["Individual identity","Purchasing power","Absolute advantage","Corporate connection"],ans:1,exp:"When unemployed, people lose wages and thus purchasing power—their ability to buy goods and services, reducing their contribution to the economy."},
  {q:"What is a characteristic of an emerging market?",opts:["High-yield bond markets that operate in a secure economic climate","Strong and highly developed infrastructure","Unstable stock markets in a transitional economy","Low gross domestic product due to high foreign investment"],ans:2,exp:"Emerging markets arise when a country moves from a closed to an open economy—untried and relatively unstable markets that carry high risk but potential for high returns."},
  {q:"Which of the following has contributed to the globalization of financial markets?",opts:["Higher currency exchange rates","Increased banking regulations","Greater restrictions on foreign financial transactions","Increased use of the internet in financial transactions"],ans:3,exp:"Increased internet use for financial transactions created global competition for customers. Higher rates, more regulations, and greater restrictions would decrease globalization."},
  {q:"What is another way to describe financial information that is true, complete, and faithfully represented?",opts:["Reliable","Comparable","Timely","Understandable"],ans:0,exp:"Reliable financial information is true, complete, and faithfully represented. Comparable allows comparison between sets; timely means up-to-date; understandable means comprehensible."},
  {q:"A statement of changes in equity is most useful for:",opts:["Investors","Managers","Customers","Employees"],ans:0,exp:"The statement of changes in equity shows how invested wealth has grown or changed, making it most useful to investors who care about the effect on their investments."},
  {q:"When dividends are paid to stockholders, how are they represented on a statement of stockholders' equity?",opts:["They are subtracted from the net income.","They are listed as a percentage of the net income.","They are simply listed on the statement.","They are added to the net income."],ans:0,exp:"Dividends paid to stockholders are taken from net income and subtracted from net income on the statement of stockholders' equity."},
  {q:"What type of variance analysis involves determining the difference between the standard costs and actual costs of raw materials used for production?",opts:["Fixed overhead","Material yield","Selling price","Purchase price"],ans:3,exp:"Purchase price variance monitors variances in the price of raw materials. Material yield involves quantity variances. Fixed overhead involves expenses that don't change with sales volume."},
  {q:"Which technique can best help managerial accountants evaluate how well they have budgeted?",opts:["Variance analysis","Cost-benefit analysis","Marginal analysis","Competitive analysis"],ans:0,exp:"Variance analysis determines how much actual numbers differ from those projected in the budget, helping accountants see how accurate their budgets are."},
  {q:"Incorporating technology into compliance is a way for organizations to:",opts:["Increase staff","Avoid the effects of regulation","Improve customer experience","Reduce costs"],ans:3,exp:"Compliance technology is more efficient, saves time, and can replace expensive labor costs, reducing overall compliance costs."},
  {q:"When creating a master budget, Jamila determined that the marketing department is responsible for a new email platform purchase. Jamila is:",opts:["Performing marginal analysis","Allocating costs","Eliminating sunk costs","Performing cost-benefit analysis"],ans:1,exp:"Cost allocation is assigning costs to cost objects like departments. Jamila is allocating the email platform cost to the marketing department."},
  {q:"What type of economic system allows buyers and sellers to make decisions without government interference?",opts:["Market economy","Command economy","Socialism","Communism"],ans:0,exp:"A market economy (free enterprise/capitalism) is owned and controlled by individuals and businesses, with buyers and sellers making their own decisions."},
  {q:"How can a financial-information management system contribute to the development of future budget requirements?",opts:["Organizing and analyzing past resource usage data","Managing company assets","Restricting access to confidential information","Collecting and analyzing competitive data"],ans:0,exp:"A financial-information management system can use past resource usage data to determine future budget requirements."},
  {q:"Pamela shared her username and password so a coworker could access a restricted customer database. Pamela failed to fulfill her responsibilities as a data:",opts:["Auditor","Steward","Sponsor","Processor"],ans:1,exp:"A data steward ensures the integrity of an organization's data and that data is used ethically and only by authorized individuals. Pamela violated this responsibility."},
  {q:"Kramer Bank's software identifies additional business opportunities with commercial customers. The bank should share this with personnel who specialize in:",opts:["Relationship management and pricing","Relationship management and sales","Risk management and pricing","Risk management and sales"],ans:1,exp:"Cross-selling opportunity information should be shared with relationship management and sales professionals who pursue additional business with existing customers."},
  {q:"Financial information that a credit card issuer analyzes when reviewing applications includes the customers':",opts:["Income and preferred standard of living","Loan balances and consumption rates","Payment history and current level of debt","Employment status and financial goals"],ans:2,exp:"Payment history reveals how reliably a customer pays; current debt level shows if they can take on more. Financial goals and standard of living are not primary factors."},
  {q:"Which of the following is a technological tool businesses use to archive financial records?",opts:["Electronic data interchange","Direct-response software","Web-development programs","Digital microfilm scanner"],ans:3,exp:"A digital microfilm scanner converts existing microfilm records into digital formats, allowing businesses to view data on computers and share information quickly."},
  {q:"Software downloads and printable worksheets that help manage income and expenses are types of:",opts:["Organizational charts","Statistical information","Legal data","Budgeting tools"],ans:3,exp:"Budgeting tools help businesses plan and manage income and expenses. Software and worksheets are common budgeting tools available online."},
  {q:"What is a benefit of managing budgeting data efficiently through budgeting applications?",opts:["Increases management's confidence in budgets","Decreases the need for having an audit trail","Decreases auditors' ability to trace the numbers used in budgets","Increases amount of time that must be spent on value-added activities"],ans:0,exp:"Efficient budgeting applications reduce errors, increase accuracy, and increase management's confidence in budgets, financial statements, and performance scorecards."},
  {q:"Seth's manager asked him to compare their company's fourth-quarter performance with others in its industry. Which financial-analysis software feature should Seth use?",opts:["DuPont modeling","Ratio analysis","Benchmarking","Forecasting"],ans:2,exp:"Benchmarking compares a company's financial performance with other specific companies in its industry or with industry standards."},
  {q:"A current employee asked to help orient a new employee will be serving as the new employee's:",opts:["Sponsor","Manager","Apprentice","Trainee"],ans:0,exp:"A sponsor is a current employee who volunteers or is asked to assist a new employee with job information, advice, and other job-related help."},
  {q:"Most automobile salespeople try to get an idea of the price range a customer can afford. This is part of which marketing function?",opts:["Pricing","Marketing-information management","Selling","Distribution"],ans:2,exp:"Selling involves determining client needs and wants and responding through personalized communication. Understanding what a customer can afford is part of the selling function."},
  {q:"Computer database programs make it easier for businesses to manage:",opts:["Large amounts of related information","Customers' buying habits","Internet search engines","Problem-solving skills"],ans:0,exp:"Database programs collect and sort many types of information—customer lists, financial data, product tracking, and personnel records."},
  {q:"Which is the most effective way to use text in a PowerPoint presentation?",opts:["Include full paragraphs to provide context","Use bullet points organized by topic","Use a rainbow of colors as well as text","Include every word you plan to say"],ans:1,exp:"Bullet points organized by topic indicate key points to the audience. Full paragraphs and every word the presenter plans to say would confuse listeners."},
  {q:"When a shoe company looks at current industry data to determine what is popular and unpopular, it is analyzing business:",opts:["Trends","Licenses","Productivity","Finances"],ans:0,exp:"Business trends are tendencies and changes in the business world. The company is identifying what is currently popular in the industry."},
  {q:"What computer component is responsible for storing information needed by software applications currently in use?",opts:["Central processing unit","Web-hosting service","Random access memory","Hard disk drive"],ans:2,exp:"RAM is the computer's short-term memory for currently running applications. The CPU performs calculations; the HDD is long-term storage; web hosting keeps websites running."},
  {q:"Which of the following is a true statement about a management information system (MIS)?",opts:["It may be one part of a business's overall information management program.","It does not assist with a business's information management program.","It is the same thing as an information management program.","It includes people, processes, and practices."],ans:0,exp:"An MIS is just hardware and software—it may be one part of an overall information management program. The overall program involves people, processes, and practices."},
  {q:"Mira is reviewing a financial statement using Benford's Law. What can this help her do?",opts:["Estimate business viability","Find opportunities for profit","Identify personnel issues","Detect the possibility of fraud"],ans:3,exp:"Benford's Law explores digit distribution in large data sets. Deviations from expected patterns can indicate fraudulently manufactured numbers."},
  {q:"Equipment inspections, fire drills, and employee safety training are examples of a business's __________ management efforts.",opts:["Financial","Time","Resource","Risk"],ans:3,exp:"Risk management involves procedures to reduce possible hazards. Safety inspections, drills, and training are all attempts to reduce risks and hazards."},
  {q:"Retailers' and wholesalers' primary purpose for purchasing is for:",opts:["Resale","Conversion into a final product","Consumption","Use in the business"],ans:0,exp:"Retailers and wholesalers engage in purchasing primarily for resale. Industrial purchasing is for internal consumption, conversion into a final product, or business use."},
  {q:"What is one of the most important components of the production process?",opts:["New technology","Human resources","Goods and services","Inputs and outputs"],ans:1,exp:"Human resources—the people who work to produce goods and services—is one of the most important production components. Even automated facilities need people to oversee operations."},
  {q:"A project manager may schedule a meeting with their project team when closing the project to:",opts:["Establish the project's long-term goals","Evaluate the project's successes and obstacles","Determine project priorities and processes","Delegate the project's tasks to team members"],ans:1,exp:"During project closing, the team evaluates successes and obstacles, summarized in a 'lessons learned' document for future similar projects."},
  {q:"What is the first step you should take when planning a project?",opts:["Develop a draft plan","Identify resources","Determine quality standards","Identify the project's stakeholders"],ans:3,exp:"Identifying stakeholders is the first step—you don't want to start planning without getting their input and including them throughout the process."},
  {q:"While there are general parts of any project to evaluate, you should focus on:",opts:["Measures that are most important for your specific project","Whatever your stakeholders ask you to do","The aspects of the project that bring in money","Project scope because it is the only part that truly matters"],ans:0,exp:"The most important evaluation criteria relate directly to your project's specific objectives. Project scope is not the only thing that matters."},
  {q:"A major purpose of establishing personal goals is to:",opts:["Identify your wants","Get help from others","Achieve success in life","Decrease personal needs"],ans:2,exp:"Success is reaching the goals you have set for yourself. By establishing well-defined goals, you greatly increase the chances of achieving success in life."},
  {q:"Melissa works with hazardous materials but is never provided protective clothing or equipment. What employee right is her employer failing to address?",opts:["Right to expect recognition and criticism","Right to form unions and collective bargain","Right to a safe working environment","Right to fair and unprejudiced treatment"],ans:2,exp:"All employees are entitled to a safe working environment. Employers who expose workers to hazardous materials must provide appropriate protective equipment."},
  {q:"Under which circumstances should applicants send interview follow-up messages?",opts:["When they are sure they will get the job","Only if they are interested in the job","After every employment interview","If they are convinced they are qualified"],ans:2,exp:"Job applicants should send follow-up messages after every employment interview to thank the interviewer and create a favorable impression."},
  {q:"When preparing cover letters for jobs with very little work experience, individuals should stress their:",opts:["Activities","References","Personality","Education"],ans:3,exp:"Education and academic achievements show prospective employers the applicant has the training and ability to perform well, even without work experience."},
  {q:"One of the main reasons businesses participate in trade shows is to:",opts:["Research their market","Promote their products","Train their salespeople","Meet their competitors"],ans:1,exp:"Trade shows allow businesses to promote their products to many potential customers in one place at one time."},
  {q:"Leah's primary duties at TRN Bank involve soliciting borrowers and assisting them through home or office building purchases. Her job title is most likely:",opts:["Senior bank teller","Controller","Insurance underwriter","Mortgage loan officer"],ans:3,exp:"Mortgage loan officers solicit borrowers for real estate purchases, oversee the application process, and assist in loan closings."},
  {q:"A worker who records, classifies, summarizes, analyzes, and communicates a business's financial information is a(n):",opts:["Compliance analyst","Accountant","Bank manager","Insurance agent"],ans:1,exp:"An accountant records, classifies, summarizes, analyzes, and communicates a business's financial information for decision-making."},
  {q:"Troy met Melissa at a neighbor's cookout and they exchanged business cards to discuss business opportunities. What type of situation did they form a professional relationship in?",opts:["Social gathering","Educational setting","Corporate environment","Formal event"],ans:0,exp:"Professional networking can occur in social gatherings like a cookout. They did not meet at a formal event, educational setting, or corporate environment."},
  {q:"Hank wants to meet regularly in person with other financial planners in his geographic area. Which organization would best meet his needs?",opts:["Federal Organization of Financial Planners","National Association of Professional Financial Advisors","International Financial Planning Association","Local Society of Financial Planning Professionals"],ans:3,exp:"A local organization's members work in close proximity and are more likely to hold face-to-face meetings regularly. National and international groups may not have a local chapter."},
  {q:"Who typically reviews and approves the guidelines for running a corporation (corporate governance policies)?",opts:["The investors","The management team","The shareholders","The board of directors"],ans:3,exp:"A corporation's board of directors reviews and approves corporate governance policies. Shareholders, management, and investors are affected by these rules but don't approve them."},
  {q:"Which is a positive characteristic for members of a corporation's board of directors to possess?",opts:["Independent thinking","Indecisiveness","Single-minded attitude","Conformity"],ans:0,exp:"Independent thinking—questioning current policies and proposed actions—helps the board act in the best interests of the corporation and its shareholders."},
  {q:"A business letter that presents its message in as few words as possible would be described as having:",opts:["Clarity","Conciseness","Courtesy","Completeness"],ans:1,exp:"Conciseness means being specific and brief, eliminating unnecessary words. Clarity means easily understood; completeness means containing all pertinent information."},
  {q:"Which employee reports directly to a corporation's board of directors?",opts:["Accounting manager","Vice president of operations","Chief executive officer","Director of sales"],ans:2,exp:"The CEO reports directly to the board. The VP of operations reports to the CEO; accounting manager and director of sales are mid-level managers."},
  {q:"Which factor differentiates the governance structure of a small business from a large business?",opts:["The impact of governance policies","The need for a board of directors","The number of owners","The presence of investors"],ans:2,exp:"A large, publicly listed corporation has many owners, while a small company has one or few shareholders. Both need boards and are impacted by governance."},
  {q:"To manage risks from unethical conduct, many companies build internal infrastructures including audit procedures, a code of conduct, and a __________ policy.",opts:["Monetary","Whistleblower","Constituent","Credit"],ans:1,exp:"A whistleblower policy encourages and enables employees to report unethical behavior without fear of negative repercussions like demotion or firing."},
  {q:"What is the relationship between ethics and risk management?",opts:["Risk management prevents ethical behavior.","Ethics and risk management are the same.","Ethics and risk management rely on one another.","Risk management is generally unethical."],ans:2,exp:"Ethics and risk management rely on one another—managing risks is ethical, and unethical behavior is risky. They are not the same, and risk management encourages ethical behavior."},
  {q:"Using appropriate software to protect confidential data stored on a company's computer systems is an important part of managing:",opts:["Physical safety risks","Security risks","Natural disasters","Environmental hazards"],ans:1,exp:"Businesses use technology like firewalls to minimize security risks and prevent hackers from obtaining confidential financial data."},
  {q:"Real-time reporting has helped risk management teams __________ the time between when a risk is documented and when it reaches people who can act on it.",opts:["Monetize","Decrease","Increase","Escalate"],ans:1,exp:"Real-time reporting and automated processes decrease the communication lag time in risk management, alerting key personnel immediately."},
  {q:"To reduce the risk of future legal problems, a company might require its business partners to sign a formal:",opts:["Warrant","Premium","Invoice","Contract"],ans:3,exp:"A written contract documenting the terms reduces misunderstanding about what is expected and provided. Without documentation, legal action may be needed if problems arise."},
  {q:"Which of the following is a legal result of implementing risk management procedures?",opts:["Increased liability exposure","Decreased employee satisfaction","Less workplace safety regulation","Avoidance of negligence lawsuits"],ans:3,exp:"Risk management practices reduce the chance of negligence lawsuits. It reduces (not increases) liability exposure and ensures workplace safety regulations are followed."},
  {q:"Which of the following is an example of a material resource?",opts:["A long-term employee","A marketing-research study","A bank loan","A piece of manufacturing equipment"],ans:3,exp:"Material resources are the equipment and supplies businesses need to produce goods and services. Employees are human resources; a study is informational; a loan is financial."},

  // Test 1248
  {q:"After being fired, Jack wrote blog posts with many untrue negative comments about his former company and employees. What tort is Jack committing?",opts:["Defamation","Invasion of privacy","Battery","Negligence"],ans:0,exp:"Defamation is publishing an untrue statement that subjects an entity to ridicule or contempt. Jack is publishing false information out of spite."},
  {q:"An important purpose of regulations in the finance industry is to:",opts:["Prevent the banking system from failing","Limit the amount of money individuals can earn","Challenge the integrity of the financial system","Ensure companies are held accountable for product safety"],ans:0,exp:"Regulations require safeguards that help ensure the banking system does not collapse by preventing and offsetting the negative effects of bank failures."},
  {q:"One benefit of using technology in compliance is that technology is typically more __________ than maintaining manual compliance processes.",opts:["Costly","Efficient","Time-consuming","Error prone"],ans:1,exp:"Technology makes compliance processes more efficient and effective. Manual compliance processes can be more costly, more time-consuming, and more error prone."},
  {q:"What are import quotas and tariffs designed to do?",opts:["Eliminate the movement of illegal merchandise","Prevent harmful substances from entering a country","Prevent illegal immigration across national borders","Protect a country's economy from foreign competition"],ans:3,exp:"By imposing tariffs or quotas, a country reduces the economic impact of imported products. They do not prevent illegal merchandise, harmful substances, or immigration."},
  {q:"Which of the following is a characteristic of the illegal practice of affinity fraud?",opts:["Primarily involves buying and selling commodities","Targets identifiable groups of people","Fails to offer testimonials during sales pitches","Pays a minimal dividend to encourage additional investment"],ans:1,exp:"Affinity fraud targets members of the same group (church, civic organization, etc.), with the scammer claiming an association with the group to gain trust."},
  {q:"Which of the following actions would be considered illegal insider trading?",opts:["Gaining access to competitors' data","Discussing how a new CEO will affect company stock prices with a coworker","Buying the stock of your own company","Selling a company's stock after an employee tells you about its upcoming merger before that knowledge is public"],ans:3,exp:"Insider trading is buying or selling securities while in possession of material, nonpublic information. Selling stock based on a confidential upcoming merger is illegal."},
  {q:"Which of the following is a tax-deductible expense?",opts:["A computer for a home-based business","Personal phone charges","Athletic-club membership fees","International leisure travel"],ans:0,exp:"Business-related items like a computer for a home-based business can be claimed as tax deductions. Personal expenses like leisure travel and gym memberships are not deductible."},
  {q:"Aiden is researching for a school project and finds an article online. Which would indicate the author is most likely a credible source?",opts:["The author has included their personal Twitter handle.","There is no background information provided about the author.","The author lists their professional background and qualifications.","The author is currently a student in college."],ans:2,exp:"Credible authors provide background about themselves such as where they received education or training. Student articles generally should not be used as primary sources."},
  {q:"Cynthia and Gerald are proposing a new project to their boss. When the boss questions Gerald about something he says, what should Gerald do?",opts:["Explain to the boss that Cynthia wrote their project proposal","Ask for clarity on the question and make sure he answers it fully","Answer a different question that Gerald definitely knows the answer to","Act defensive because the boss doesn't understand the project"],ans:1,exp:"Asking for clarity ensures Gerald fully understands the question and gives the best possible answer. Deflecting or acting defensively reflects poorly on Gerald."},
  {q:"You want to show how much profit your company made in each of the past 12 months. Which visual aid should you choose?",opts:["A photograph","A pie chart","A line graph","A video"],ans:2,exp:"Line graphs are best for showing changes over time. Pie charts show how categories relate to a whole. Photographs and videos won't showcase numerical data."},
  {q:"In addition to name, address, and phone number, what should Dwight include in his corporate email signature?",opts:["His position, work history, and email address","His work history, company, and email address","His position, company, and email address","His position, company, and references"],ans:2,exp:"A professional email signature should include name, address, phone, position, company, and email address. Work history and references are not appropriate for email signatures."},
  {q:"Who is responsible for approving corporate governance goals and policies?",opts:["Shareholders","Chief executive officer","Board of directors","Management team"],ans:2,exp:"The board of directors approves high-level corporate governance goals and policies. The CEO and management team recommend goals; shareholders as a whole do not approve them."},
  {q:"Which of the following is a result of building and maintaining relationships with customers?",opts:["Increased loyalty","Fewer brand advocates","Decreased satisfaction","Customer turnover"],ans:0,exp:"Customers who have relationships with companies are more likely to remain loyal, become brand advocates, and have higher satisfaction—reducing customer turnover."},
  {q:"Are customers who do not complain a more difficult problem for businesses than customers who do complain?",opts:["No, because the salesperson can satisfy customers who do not complain within company guidelines.","Yes, because records of complaints cannot be maintained.","No, because customers who do not complain do not express ill feelings.","Yes, because the salesperson does not have an opportunity to handle the complaint."],ans:3,exp:"Non-complaining customers still express ill feelings to friends and relatives, damaging the business's image. Salespeople cannot fix a problem they don't know about."},
  {q:"A primary factor that has led to the consolidation of financial firms is the desire:",opts:["To lower costs","For fewer products","For fewer assets","To lower risks"],ans:0,exp:"Consolidation achieves economies of scale, resulting in reduced redundancy and lower costs. It can actually increase assets and expand products."},
  {q:"When discussing your personal finances with a financial advisor, it's important to:",opts:["Be open and transparent","Exaggerate your income","Keep certain debts secret","Be guarded and skeptical"],ans:0,exp:"Being open and transparent lets the advisor best meet your needs. Lying, exaggerating, or keeping secrets prevents the advisor from helping you effectively."},
  {q:"While filing an insurance claim, Mrs. Ramirez was disconnected and couldn't remember the representative's name. What type of CRM data would help identify the representative?",opts:["Self-provided data","Demographic data","Interaction data","Historical data"],ans:2,exp:"Interaction data contains details about phone calls and instances when a customer contacted the call center, which would identify the specific representative."},
  {q:"Environmental degradation occurs because of:",opts:["Nationalism","Offshoring","Increased production","Decreased competition"],ans:2,exp:"The more goods being produced, the greater the chances for pollution and loss of natural resources. Increased production drives environmental degradation."},
  {q:"Nadia's employee Roger rarely does what he's supposed to do, forgets appointments, and misses work frequently. An employee like Roger is an example of a(n) __________ risk.",opts:["Hazard","Operational","Strategic","Financial"],ans:1,exp:"Operational risks result from employee actions, core processes, and daily business activities. Human errors like Roger's are operational risks."},
  {q:"If the economy is sluggish, what might a central bank do to encourage spending and investing?",opts:["Lower interest rates","Double interest rates","Eliminate interest rates","Disregard interest rates"],ans:0,exp:"A central bank may lower interest rates during a sluggish economy to encourage spending and investing. Doubling, eliminating, or disregarding interest rates are not appropriate responses."},
  {q:"Avoiding the use of slang falls under which guideline for dealing effectively with people from different cultures?",opts:["Strive to communicate clearly","Show respect","Expect differences to arise","Be patient"],ans:0,exp:"Avoiding slang is a way to communicate more clearly with those from other cultures who might not understand hidden meanings."},
  {q:"Althea wants to know how much money will actually be deposited in her bank account from her paycheck. She should look at the:",opts:["Gross pay","Net pay","Federal income tax","State tax"],ans:1,exp:"Net pay is the actual amount received after withholdings are taken out—the money deposited in her bank account. Gross pay is before withholdings."},
  {q:"Robyn is a United States citizen traveling to Ireland for business. Which document does she need to bring?",opts:["Her Social Security card","A bank statement","Her passport","A recent utility bill"],ans:2,exp:"A passport is required when traveling to another country as proof of identity and U.S. citizenship."},
  {q:"As Ben assesses his personal strengths and weaknesses, what can he do to keep from focusing too much on his weaknesses?",opts:["Compare himself to others","Identify one strength for every weakness","Develop a list of false generalizations","Ask others for critical feedback"],ans:1,exp:"Identifying one strength for every weakness keeps a realistic, balanced self-assessment. Comparing to others and making false generalizations hinder accurate assessment."},
  {q:"Alex has a naturally outgoing and talkative personality. How could this relate to his values?",opts:["He might have more confidence in his values.","His values might not align with his behavior.","He might place less emphasis on his values.","He might place a high value on social interaction."],ans:3,exp:"Personality, temperament, and preferences can impact values. Alex's outgoing personality might encourage him to place a high value on social interaction."},
  {q:"You can use your voice to express interest and enthusiasm by speaking:",opts:["With the same inflection","In a loud voice","In one tone of voice","At a variety of pitches"],ans:3,exp:"Varying pitch and volume expresses interest and enthusiasm, putting emphasis on certain words. Speaking in one tone or the same inflection conveys monotony."},
  {q:"When their regular duties have been completed, employees with initiative look for:",opts:["Pleasant tasks","Enjoyable reading","Additional work","Easy jobs"],ans:2,exp:"Employees with initiative look for work that needs to be done—not just pleasant, easy, or enjoyable tasks. Reading on company time may be met with disapproval."},
  {q:"Which of the following statements is true about managing commitments?",opts:["Only overcommitted people struggle to manage commitments.","Procrastination can make it difficult to manage commitments.","If you decline commitments, you are a disorganized person.","Perfectionists always have a reasonable number of commitments."],ans:1,exp:"Procrastination and disorganization make managing commitments difficult. Overcommitment is not the only struggle, and declining commitments doesn't mean you're disorganized."},
  {q:"Which of the following topics is appropriate for John to bring up with his coworkers during lunch?",opts:["The details of his divorce proceedings","What he watched on TV last night","The job he'd like to have in 5 years","The church service he'd like his coworkers to attend"],ans:1,exp:"What he watched on TV is unlikely to offend anyone. Divorce, career aspirations, and religion are sensitive topics that could create awkward workplace dynamics."},
  {q:"When two people in the same department disagree about how to allocate their budget, they are experiencing a(n):",opts:["Internal conflict","External conflict","Labor dispute","Irreconcilable dispute"],ans:1,exp:"External conflict occurs with another person or group. Internal conflict is within oneself. The budget must be allocated, so it cannot be irreconcilable."},
  {q:"Which of the following is an example of an ethical principle?",opts:["Accountability","Humor","Intelligence","Charisma"],ans:0,exp:"Ethical principles are standards governing behavior. Accountability—accepting responsibility for your decisions—is an ethical principle. Humor, intelligence, and charisma are characteristics, not ethical principles."},
  {q:"An important characteristic of being adaptable is being:",opts:["Content with the way things are","Willing to leave your comfort zone","Able to assume high levels of risk","Pleased about changes when they occur"],ans:1,exp:"Adaptability means willingness to modify attitudes and behavior to new situations. Leaving your comfort zone means accepting new ideas and challenges."},
  {q:"It is important to be honest about the time commitment when interviewing potential employees for a new business because:",opts:["Being honest should weed out people who aren't dedicated","Entrepreneurs shouldn't hire employees with busy personal lives","Employees who are overburdened are unlikely to stay with the company","Employees are not legally allowed to work more than 40 hours/week"],ans:2,exp:"Employees hired under false impressions about work hours will not stay long and will likely resent management. Honesty provides transparency for all prospective workers."},
  {q:"Scarlet is setting personal financial goals. What is the first step she should take to reach them?",opts:["Evaluate her budget","Prioritize her goals","Make a list of her goals","Automate payments"],ans:2,exp:"The first step to achieving financial goals is identifying and listing them. Prioritizing comes after listing; evaluating budget and automating payments come later."},
  {q:"When you use money to make money, you are:",opts:["Investing","Saving","Rationing","Reimbursing"],ans:0,exp:"Using money to make money is called investing. Saving is setting aside income for future use. Rationing determines resource distribution; reimbursing is paying someone back."},
  {q:"Melanie is determining her personal net worth. Which of the following should she consider a liability?",opts:["Personal valuables","Stocks she owns","Her life insurance policy","Student loan debt"],ans:3,exp:"A liability is a debt or payment owed to someone else. Student loan debt is a liability. Stocks, life insurance policies, and personal valuables are assets."},
  {q:"Why is it important for a businessperson to adapt their behavior to the customs and mannerisms of the country they are visiting?",opts:["It shows the businessperson does not care too much about their own native culture","It is a sign of respect that can improve relations among businesspeople of different cultures","It is a display of authority that can lead to increased cooperation","It is proof that the businessperson is intelligent and should be trusted"],ans:1,exp:"Adapting to cultural norms shows respect for that culture, leading to positive relations and increasing the likelihood of a business partnership."},
  {q:"Deposit-taking institutions are commonly responsible for:",opts:["Making payments on behalf of savers to creditors","Raising funds for clients by issuing securities","Carrying out regulatory and supervisory functions","Using funds from insurance premiums to offer loans"],ans:0,exp:"Deposit-taking institutions (banks, credit unions) accept deposits from savers and use them to make payments to creditors or offer loans. Investment banks issue securities."},
  {q:"What is the primary function of the foreign exchange market?",opts:["To trade currency","To sell stocks","To buy bonds","To underwrite policies"],ans:0,exp:"The foreign exchange market trades one currency for another and determines each currency's conversion rate. Stock exchanges sell stocks; bond markets buy/sell bonds."},
  {q:"What do finance professionals need to do to build long-term relationships with their clients?",opts:["Be honest, open, and trustworthy","Follow up with clients every two years","Invest all clients' money conservatively","Require clients to sign a short-term contract"],ans:0,exp:"Finance professionals earn clients' trust by behaving ethically and being honest and open. They also communicate consistently and help clients set comfortable goals."},
  {q:"What type of economic indicator are stock market returns commonly considered to be?",opts:["Lagging","Leading","Coincident","Exploratory"],ans:1,exp:"Stock market returns are leading indicators—they often decline in advance of economic decline and improve before the overall economy does."},
  {q:"One factor that contributed to financial globalization was the shift of many developed countries from __________ exchange rates to __________ exchange rates.",opts:["Fixed; floating","Floating; fixed","Pegged; declining","Declining; pegged"],ans:0,exp:"Moving from fixed (government-set) to floating (market-determined) exchange rates enabled capital to flow more freely internationally."},
  {q:"Business decision makers can best analyze the financial impact of increased production by evaluating __________ cost.",opts:["Marginal","Sunk","Fixed","Average"],ans:0,exp:"Marginal cost is compared against marginal revenue to determine profitability of increased production. Sunk, fixed, and average costs occur regardless of production level."},
  {q:"James wants to borrow $2,500 to buy a car. Which financial institution is most likely to lend James the money?",opts:["Financial holding company","Investment bank","Mortgage company","Retail bank"],ans:3,exp:"Retail banks offer services like checking accounts, credit cards, and automobile loans for consumers. Investment banks underwrite securities; mortgage companies only handle real estate."},
  {q:"What type of financial statement includes an accounting of the shareholders' equity for a company?",opts:["Balance sheet","Income statement","Cash flow statement","Annual report"],ans:0,exp:"The balance sheet's liabilities section indicates shareholders' equity—the value of outstanding stock, calculated by subtracting liabilities from assets."},
  {q:"What do investors often consult to monitor the success of their investment portfolios?",opts:["Financial almanacs","Securities tables","Foreign news reports","Investment guides"],ans:1,exp:"Securities tables (stock tables) contain information about the status of different securities, allowing investors to assess their portfolio's overall health."},
  {q:"The 52-week high and low can tell investors:",opts:["If the company has a lot of debt","How many times a stock has been sold","Whether to invest in a stock or mutual fund","If it is a good time to buy or sell"],ans:3,exp:"The 52-week high and low shows the price range over a year, helping investors judge whether the current price is a good one to buy or sell at."},
  {q:"A statement of equity helps companies make decisions about how to:",opts:["Organize income statements","Analyze financial trends","Control their production costs","Reinvest their retained earnings"],ans:3,exp:"The statement of equity shows how much money the business has at the end of an accounting period, enabling decisions about reinvesting—like remodeling or hiring."},
  {q:"Angelica has determined that many of her colleagues are acting unethically. Whom should she talk to first?",opts:["Her supervisor","The colleagues involved","Top company executives","The authorities"],ans:1,exp:"The first party to talk to is those directly involved, to clarify details and give colleagues a chance to explain before escalating to supervisors or authorities."},
  {q:"When making business decisions, which costs are most likely evaluated using qualitative information versus numerical data?",opts:["Opportunity costs","Sunk costs","Direct costs","Indirect costs"],ans:0,exp:"Opportunity costs often require qualitative analysis—like a supplier's reputation—rather than pure numerical data. Sunk, direct, and indirect costs are typically numerical."},
  {q:"The main objective of using marginal analysis in decision-making is to determine whether a business activity will result in:",opts:["A net revenue smaller than marginal revenue","A marginal revenue equal to or greater than marginal cost","A marginal expense that is greater than marginal cost","A net revenue larger than marginal revenue"],ans:1,exp:"Marginal analysis identifies profitable options by determining if marginal revenue is equal to or greater than marginal cost. If costs exceed revenue, the activity is not profitable."},
  {q:"Financial globalization helps investors reduce their exposure to:",opts:["Speculative bubbles","Business cycle risks","Regulatory liberalization","Capital appreciation"],ans:1,exp:"By investing in many countries, investors diversify and reduce exposure to business cycle risks. Globalization actually increases risks of speculative bubbles."},
  {q:"Which cost classification can help a decision maker determine how well different department managers performed?",opts:["Classification by function","Classification by controllability","Classification by behavior","Classification by relevance"],ans:1,exp:"Classification by controllability is based on a manager's control over particular costs, helping evaluate how well managers handle costs they personally impact."},
  {q:"Variance analysis helps a business:",opts:["Compare itself with competitors","Make choices between two alternatives","Maintain budgetary control","Predict future trends"],ans:2,exp:"Variance analysis determines the difference between planned and actual results, ensuring the company is following the budget and maintaining budgetary control."},
  {q:"Monica wants to be a good employee. Which of the following actions should she take?",opts:["Come to work even when she's sick or has a family emergency","Plan her vacation time wisely to make sure she isn't absent at crucial times","Make sure not to be more than half an hour late each day","Make up for missing many days by working harder when at work"],ans:1,exp:"Planning vacation wisely ensures she isn't absent at critical times. Coming in sick, being late, or missing many days are all problematic regardless of compensation."},
  {q:"Which of the following is a function of cost accounting budgets?",opts:["Determining cash flow","Controlling finances","Understanding profitability","Analyzing sources of income"],ans:1,exp:"Cost accounting budgets are financial plans used to project revenue and expenses with the aim of controlling finances."},
  {q:"Which of the following is an example of ethics in business?",opts:["Using company resources wisely","Praising your friends","Striving for a promotion","Asking for a raise"],ans:0,exp:"Ethical behavior at work means doing the right thing and following ethical principles, including using company resources wisely."},
  {q:"You invest $5,000 at 6% compound interest and $15,000 at 9% compound interest. How much will you have in five years?",opts:["$27,766","$29,770","$36,292","$40,228"],ans:1,exp:"$5,000 × (1.06)^5 = $6,691. $15,000 × (1.09)^5 = $23,079. Total = $29,770."},
  {q:"A primary responsibility of financial-information management is to:",opts:["Implement sales policies","Negotiate contracts with vendors","Develop new products","Report financial transactions"],ans:3,exp:"Financial-information management maintains data about financial transactions (accounts receivable, accounts payable) and develops reports to aid decision-making and compliance."},
  {q:"Smooth operations, clearly defined chains of command, and measurement of performance are all goals of __________ in corporate governance.",opts:["Independent audits","Debt management","External control mechanisms","Internal control mechanisms"],ans:3,exp:"Internal control mechanisms (oversight of management, internal audits, segregation of duties) ensure smooth operations, clarify chains of command, and measure performance."},
  {q:"The first step in the project-planning process is to:",opts:["Determine the project's purpose and scope","Determine project costs","Identify needed resources","Identify project deliverables"],ans:0,exp:"Determining the project's purpose and scope is the foundation for the entire project. Costs, resources, and deliverables are identified in later steps."},
  {q:"Which of the following is a fixed budget used by managers to measure profit or performance?",opts:["Operating budget","Rolling budget","Dynamic budget","Master budget"],ans:3,exp:"The master budget (also called a static or fixed budget) does not change—managers use it as a guideline and compare it to actual results. A rolling budget is constantly updated."},
  {q:"A business uses benchmarking applications when it wants to:",opts:["Determine taxes owed to the federal government","Measure the amount of time it needs to convert assets into cash","Calculate dividends to be paid to stockholders","Compare its performance with other companies in the industry"],ans:3,exp:"Benchmarking provides comparison points against other specific companies or industry standards, helping businesses see how they measure up."},
  {q:"Reinhardt Manufacturing believes waste results from unnecessary production steps; Burke Manufacturing believes waste comes from variations within the production process. They practice __________ and __________ methodology respectively.",opts:["Lean; Six Sigma","Six Sigma; Lean","Sustainability; Lean","Lean; Sustainability"],ans:0,exp:"Lean targets unnecessary steps in the production process. Six Sigma targets variations within the process."},
  {q:"Businesses consider a customer's income when determining whether to:",opts:["Charge interest","Accept cash sales","Restructure policies","Offer credit"],ans:3,exp:"Before offering credit, a business analyzes financial status including income to determine if a customer is a good credit risk and can make payments."},
  {q:"Which of the following is a technique a business could use to analyze its customer financial information?",opts:["Comparing profit ratios by region","Tracking average product shipping delays","Determining who exceeded sales quotas","Discovering which products sold the most"],ans:0,exp:"Comparing profit ratios by region reveals which market segments are most profitable, informing future business decisions about customer financial data."},
  {q:"Training and continuing education, rewarding ethical behavior, leading by example, and an open door policy are all ways to:",opts:["Ensure adherence to an ethics code","Reduce employee creativity","Increase competition and mistrust","Heighten conflict among employees"],ans:0,exp:"These activities reinforce an ethics code and ensure employees understand and follow ethical standards."},
  {q:"What is a purpose of standard cost systems?",opts:["To establish quality standards","To evaluate performance","To return unused inventory","To create industry standards"],ans:1,exp:"Standard cost systems determine variances between forecasted and actual costs, thereby evaluating business performance."},
  {q:"Microsoft Windows, Linux, and macOS are examples of:",opts:["Operating systems","Computers","Internet providers","Antivirus software"],ans:0,exp:"Operating systems organize and control hardware and software. All computers have operating systems."},
  {q:"Which of the following is an acceptable file name for a word-processing document?",opts:["Office Calendar 3/30/2021*","Office Calendar 3 30 2021","Office Calendar: 3/30/2021","Office Calendar <3 30 2021>"],ans:1,exp:"File names cannot contain \\ / : * ? < > | characters. 'Office Calendar 3 30 2021' is the only option without prohibited symbols."},
  {q:"Dmitri needs to register a __________ to obtain a web address for his new site.",opts:["Site builder","Web host","Domain name","Street address"],ans:2,exp:"The domain name is the unique address of a website. A web host keeps the site running; a site builder creates the layout; a street address is physical, not digital."},
  {q:"Jonas is looking through his firm's databases and eliminating redundant data. Jonas is performing:",opts:["Data normalization","Digital analysis","Data filtering","Information scanning"],ans:0,exp:"Normalization efficiently organizes data in a database by eliminating redundant data and ensuring data is stored sensibly."},
  {q:"The purpose of descriptive analysis is to summarize the past, whereas the purpose of predictive analysis is to:",opts:["Predict what could have happened if the past were different","Use existing data to forecast what could happen in the future","Hypothesize why the past happened the way it did","Verify that the descriptive analysis was accurate"],ans:1,exp:"Predictive analysis looks at historical data and analyzes it to predict the most likely future occurrences."},
  {q:"Which statement about environmental scanning is true?",opts:["The information gathered during environmental scanning is dynamic.","Environmental scanning should be done once or twice a year.","Only managers and supervisors should be involved in environmental scanning.","All trends identified must be acted upon immediately."],ans:0,exp:"Environmental information is dynamic—it changes constantly. Scanning must be continuous, involves all employees, and not all trends can or must be addressed immediately."},
  {q:"Which computer application helps manufacturers track and manage inventory used to produce goods?",opts:["Critical path","Job sequencing","Reverse Logistics Systems (RLS)","Material requirements planning (MRP)"],ans:3,exp:"MRP software helps manufacturers streamline production, determine quantities of raw materials needed, and manage delivery systems."},
  {q:"Businesses such as banks that keep large amounts of cash on hand may be common targets for:",opts:["Pilferage","Robbery","Fraud","Shoplifting"],ans:1,exp:"Robbery involves the use of force, violence, or fear—making cash-rich businesses like banks prime targets. Pilferage is small-scale theft; fraud is deception; shoplifting is customer theft."},
  {q:"A business can protect its confidential computer information from unauthorized users by:",opts:["Encrypting computer files","Developing internet message boards","Conducting annual virus scans","Classifying business data"],ans:0,exp:"Encryption transforms information into a secret code readable only by specified individuals. Annual (not continuous) virus scans and classifying data don't prevent unauthorized access."},
  {q:"What might happen if your customers are not satisfied with your project work?",opts:["You might have to adjust your quality standards.","You might have to redo the project work.","You will need to start the planning process over.","You will need to find different customers."],ans:1,exp:"If customers aren't happy with end results, you might need to redo the project work or complete another project to satisfy their needs."},
  {q:"What is the end result of identifying project resources?",opts:["Gaining a clear understanding of what is needed","Becoming a better, more cooperative team member","Eliminating unforeseen problems","Becoming more independent"],ans:0,exp:"Identifying resources results in a clear understanding of what is needed for the project to succeed. It doesn't eliminate unforeseen problems, just helps you be ready for them."},
  {q:"Why has online technology's use increased in financial-information management?",opts:["Removal of electronic information exchange procedures","Passage of laws that recognize electronic documents as legally binding","Recognition that security of transactions is no longer an issue","Protection of customers' right to privacy"],ans:1,exp:"As businesses became more comfortable with electronic information, passage of laws recognizing electronic documents and signatures as legally binding encouraged adoption."},
  {q:"When you keep your workspace organized, you are less likely to:",opts:["Forget important phone numbers","Misuse office equipment","Misplace important documents","Discard unnecessary paperwork"],ans:2,exp:"Maintaining files systematically keeps documents in a specific location, preventing misplacement. Forgetting phone numbers is a cognitive ability unrelated to workspace organization."},
  {q:"Mario expresses himself well in class because he knows how to use words effectively. Mario would be described as having:",opts:["Physical coordination","Emotional traits","Nonverbal skills","Verbal aptitude"],ans:3,exp:"Verbal aptitude is the ability to use words effectively—an important skill for most careers. Nonverbal skills involve body language."},
  {q:"What is the difference between skills and traits?",opts:["Skills are not learned with training, and traits are behaviors that are constantly changing.","Skills are repeated behaviors that become a part of the personality, and traits are abilities that are practiced.","Skills are learned through training, and traits are repeated behaviors that become a part of the personality.","Skills are usually easy to learn, and personality traits cannot be changed or altered."],ans:2,exp:"Skills are abilities acquired through education, training, and practice. Traits are repeated behaviors that become part of the person over time. Both can be improved."},
  {q:"Colin is an experienced programmer who contacted an organization to help him find a job in another city. After placing him, his new employer will pay a fee. What type of organization is helping Colin?",opts:["Private employment agency","Academic counseling center","Government job placement office","Internet referral service"],ans:0,exp:"Private employment agencies match professionals with companies needing specific expertise. Employers often pay a percentage of the new hire's salary as a fee."},
  {q:"Lynnette at Main Street Bank determines if the bank should lend funds to customers. What is Lynnette's most likely job title?",opts:["Bank agent","Collections officer","Chartered financial consultant","Credit analyst"],ans:3,exp:"Credit analysts research and confirm loan applicants' employment, income, and credit history to determine if the bank should lend funds."},
  {q:"Well-executed corporate governance ensures that an organization is managed in a way that is:",opts:["Beneficial for all stakeholders","Most helpful for company leaders","Detrimental for competitors","Irrelevant to the public eye"],ans:0,exp:"Good corporate governance benefits employees, management, shareholders, and the general public—not just company leaders."},
  {q:"How can an accountant best contribute to an organization's governance objectives?",opts:["Determining whether profit margins are shrinking","Minimizing risks associated with the objectives","Ensuring strong community relations","Allocating funds for the objectives in the budget"],ans:3,exp:"An accountant can contribute by understanding governance objectives and accounting for them in the budget, ensuring resources are allocated toward those goals."},
  {q:"Ethical financial-information management practices make a business:",opts:["Susceptible to regulatory investigation","Safe from the possibility of security breaches","More volatile in the financial marketplace","More attractive to investors and customers"],ans:3,exp:"Companies with ethical, transparent financial practices appear more trustworthy, attracting investors and customers. Ethics reduce, not eliminate, security breach risks."},
  {q:"Which of the following are considered the owners of a corporation?",opts:["Managers","Stockholders","CEOs","Lower-level employees"],ans:1,exp:"Stockholders are the owners of a corporation. Managers, CEOs, and lower-level employees work for the corporation but do not own it."},
  {q:"Many businesses use infographics to help persuade readers because:",opts:["Readers spend more time viewing infographics","Original artwork usually takes longer to create","Most people are lazy and don't like to read","Infographics raise the perception of quality"],ans:3,exp:"A well-designed infographic raises the reader's perception of quality, making it more likely to persuade. The quality, not viewing time, is what persuades."},
