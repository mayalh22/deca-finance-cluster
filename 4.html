  {q:"Information management can be a challenge because the business world is:",opts:["constantly changing.","suffering from a lack of information.","not open to new technology.","completely dependent on paper files."],ans:0,exp:"The constantly changing business world means companies can't assume current information management programs will continue to suffice — they must stay alert and adapt. Businesses often suffer from too much, not too little, information."},
  {q:"What aspect of a computer system acts as a go-between for software and hardware applications?",opts:["Server","Operating system","Hard drive","Application software"],ans:1,exp:"The operating system runs the computer and serves as an intermediary between hardware and software applications. It also provides computer security. A hard drive stores data; application software performs tasks."},
  {q:"Jillian wants to email her boss about coworker conflicts but is afraid of misinterpretation. Using proper email etiquette, she should:",opts:["be informal and make jokes so she won't appear too negative.","use emoticons in her email so she won't seem like she's complaining.","write a lengthy email to make sure her boss won't misunderstand her.","talk to her boss in person instead of sending an email."],ans:3,exp:"To avoid misinterpretation and prevent coworkers from seeing the email, Jillian should speak in person. Avoid emoticons, informality, and lengthy emails when communicating with supervisors."},
  {q:"When using presentation software to develop a slideshow, it is best to:",opts:["limit the presentation to twelve or fewer slides.","avoid the use of decorative fonts.","include flashy background designs.","use a lot of clipart to add interest."],ans:1,exp:"Decorative fonts are hard to read and should be avoided. Flashy backgrounds and excessive clipart distract from the message. The number of slides should match the content — not be artificially limited to twelve."},
  {q:"What application enables a business to identify when a record was added to a database?",opts:["Date/Time stamp","Validation rules","Data replication","Sort"],ans:0,exp:"A date/time stamp records when a record was added to the database, helping track employee keying activities and customer additions. Validation rules restrict data input; sort and replication serve other functions."},
  {q:"Inflation is a factor involved in which category of an environmental scan?",opts:["Demographics","Technology","Economy","Competition"],ans:2,exp:"Inflation is an economic factor. The economy greatly affects businesses and their decisions. Inflation is not part of technology, demographics (population characteristics), or competition categories."},
  {q:"Warehousing and shipping methods are operations considerations related to:",opts:["expense control.","scheduling.","maintenance needs.","logistics."],ans:3,exp:"Logistics manages the flow of goods from production to consumption, including warehousing and shipping. Scheduling is about timetables; maintenance is about facility upkeep; expense control manages costs."},
  {q:"Why might a company decide to use computer-aided design (CAD)?",opts:["It increases time spent designing products.","It is a fast way of manufacturing the product.","It controls and orders stock.","It is cheaper than producing a physical prototype."],ans:3,exp:"CAD saves time and money compared to creating physical prototypes. It's a design tool — not a manufacturing method. Stock control and ordering require different software (inventory management)."},
  {q:"What is the first thing that an employee should do if a customer trips over a box and falls?",opts:["Determine the severity of the injury.","Call the emergency squad.","Notify the department manager.","Complete an accident report form."],ans:0,exp:"First, determine injury severity to decide if it's life-threatening. Then call emergency services if needed, notify the manager, and complete an accident report after the customer has been cared for."},
  {q:"Project management can benefit greatly from user-generated, user-updated websites called:",opts:["wikis.","forums.","encyclopedias.","flash drives."],ans:0,exp:"Wikis are user-generated, user-updated websites that allow collaborative, real-time content editing — a valuable tool for project management coordination."},
  {q:"When project managers prepare to-do lists and schedule activities, they are using __________ skills.",opts:["information-based","time-management","creative-thinking","problem-solving"],ans:1,exp:"Time-management skills involve controlling events to accomplish priorities. Preparing to-do lists and scheduling activities are classic time-management techniques for project managers."},
  {q:"What are two things that a purchasing specialist should consider when making a make-or-buy decision?",opts:["The company's production capabilities and the cost of making the needed parts","The company's production capabilities and the sales of the finished product","The cost of making the needed parts and the sales of the finished product","The purchasing department structure and the marketing mix"],ans:0,exp:"A make-or-buy decision requires evaluating whether the company can produce the parts and whether it's cost-effective to do so in-house versus purchasing from an external supplier."},
  {q:"Employees who record all purchases made with money from the petty cash fund are helping the business to:",opts:["improve cash flow.","comply with the law.","control its expenses.","reduce major spending."],ans:2,exp:"Recording petty cash purchases allows the business to monitor and control the amount spent on small purchases and protects the fund from theft. There is no law requiring petty cash records."},
  {q:"Employees who have innovation skills are able to:",opts:["think in new ways.","behave aggressively.","react to problems.","socialize effectively."],ans:0,exp:"Innovation skills enable employees to think in new ways, generating new ideas and solutions to work-related issues. This is about proactive creative thinking, not reacting, aggression, or socializing."},
  {q:"An efficient way to organize a work area is to:",opts:["keep reference materials out of your office.","avoid using filing cabinets.","remove all materials from the work surface.","arrange everything within easy reach."],ans:3,exp:"Arranging everything within easy reach prevents wasted time and movement. Reference materials should be kept close for quick access; filing cabinets organize documents; work surfaces should be clear of clutter but ready for use."},
  {q:"Determine the meaning of the following want ad: F/T Mgr. Needed Immed. Two Yrs. Exp. Req. EOE",opts:["Fast-track manager needed immediately. Two years' experience requested. Enlist only extras.","For trade. Manager needed immediately. Two years' experience requested. Experience on equipment.","Full-time manager needed immediately. Two years' experience required. Equal opportunity employer.","Fully talented manager needed immediately. Two years' experience required. Educated only eligible."],ans:2,exp:"F/T = full-time, Mgr. = manager, Immed. = immediately, Yrs. Exp. Req. = years' experience required, EOE = equal opportunity employer — standard classified ad abbreviations."},
  {q:"When signing sections of an employment application that require a signature, applicants should avoid using a(n):",opts:["nickname.","initial.","surname.","title."],ans:0,exp:"Nicknames are informal and unprofessional for business documents. Applications should use the applicant's correct full name, including surname (last name) and can include titles and initials."},
  {q:"Lynnette works at Main Street Bank. Her primary job responsibility is to determine if the bank should lend funds to customers. Lynnette is working as a(n):",opts:["collections officer.","credit analyst.","chartered financial consultant.","bank agent."],ans:1,exp:"Credit analysts research and verify loan applicants' employment, income, and credit history to determine if the bank should lend funds. Collections officers handle past-due payments."},
  {q:"Eduardo is in charge of finding money for his company and then making sure that money is managed correctly. What category of finance does Eduardo work in?",opts:["Insurance","Banking services","Securities and investments","Corporate finance"],ans:3,exp:"Corporate finance manages policy and strategy for liquidity and solvency — finding and managing money for a company. This is distinct from banking services, insurance, and securities."},
  {q:"Which of the following is a positive characteristic for the members of a corporation's board of directors to possess?",opts:["Single-minded attitude","Conformity","Indecisiveness","Independent thinking"],ans:3,exp:"Independent thinking — questioning current policies and proposed actions — helps the board act in the best interests of the corporation and shareholders. Conformity leads to groupthink that may harm the organization."},
  {q:"Which employee reports directly to a corporation's board of directors?",opts:["Vice president of operations","Accounting manager","Chief executive officer","Director of sales"],ans:2,exp:"The CEO is elected/selected by the board of directors and reports directly to them. VPs, accounting managers, and directors report up through the executive hierarchy to the CEO."},
  {q:"Business employees often obtain current industry information by reading:",opts:["consumer reports.","trade publications.","news magazines.","local periodicals."],ans:1,exp:"Trade publications are industry-specific journals that provide current information on trends and events in a specific industry. Consumer reports, news magazines, and local papers target broad audiences."},
  {q:"Troy met Melissa, owner of a large financial-planning company, at his neighbor's cookout. They exchanged cards and set up an appointment to discuss business opportunities. In what type of situation did they form a professional relationship?",opts:["Formal event","Social networking","Educational setting","Corporate environment"],ans:1,exp:"Professional networking can occur in social situations — like a neighborhood cookout. Troy and Melissa did not meet at a formal event, educational setting, or corporate environment."},
  {q:"Which of the following is an ethical hazard in risk management?",opts:["Understating loss experience and exposure to an insurance underwriter","Working with a public accounting firm that has a whistleblower mechanism","Contracting with an insurer with a reputation of adequate claims reserving","Questioning a supplier's history of disobeying state and federal regulations"],ans:0,exp:"Understating loss experience or exposure to an underwriter to reduce insurance premiums exposes the company to legal and financial risks — an ethical hazard. The other options represent good ethical practices."},
  {q:"What technology can businesses use to reduce the risk of network security breaches?",opts:["Concurrency control applications","Teleprompter devices","Intrusion detection systems","Pirated software programs"],ans:2,exp:"Intrusion detection systems monitor and detect hacking activities that compromise network security. Concurrency control addresses simultaneous data access; teleprompters display scripts; pirated software is illegal."},
  {q:"The Kramer Pharmaceutical Company lists possible side effects of its cold medicine on the packaging. By disclosing this information, the company is reducing risks associated with:",opts:["product returns.","mechanical product defects.","product recalls.","inadequate product warnings."],ans:3,exp:"Pharmaceutical companies must disclose dosage, side effects, and interactions. Failure to do so risks lawsuits related to inadequate product warnings. Product recalls occur for quality issues after release."},
  {q:"A company installs automatic sprinklers in all its facilities. Which technique is the company using to combat the internal threat of fire?",opts:["Loss avoidance","Loss reduction","Loss prevention","Risk transfer"],ans:1,exp:"Loss reduction lessens the impact of a loss after it occurs. Sprinklers don't prevent fire from starting, but they reduce the damage it causes — loss reduction. Loss prevention stops losses from occurring."},
  {q:"The ABC Corporation identifies all the risks that threaten the company, decides which to focus on, and shares this information with its stakeholders. The company is practicing:",opts:["environmental risk planning.","corporate risk organization.","competitive risk assessment.","enterprise risk management."],ans:3,exp:"Enterprise risk management (ERM) involves identifying all organizational risks, prioritizing focus areas, and communicating with stakeholders — a comprehensive, strategic approach to risk."},
  {q:"The president of the Acme Company identifies the jobs to be accomplished and assigns responsibility for completing those jobs to specific departments. What management function is the president performing?",opts:["Planning","Organizing","Staffing","Controlling"],ans:1,exp:"Organizing involves setting up how work will be done — identifying jobs, assigning responsibility, establishing departments, and determining management spans. Planning decides what will be done; staffing finds workers; controlling monitors work."}
];

let pileX = [], pileY = [], pileU = [], current = null, answered = false, queue = [], queueSource = '';

function initPiles() {
  pileX = []; pileY = [];
  pileU = ALL_QUESTIONS.map((_,i)=>i);
  buildQueue();
}

function buildQueue() {
  if (pileU.length > 0) { queue = shuffle([...pileU]); queueSource = 'unseen'; }
  else if (pileY.length > 0) { queue = shuffle([...pileY]); queueSource = 'review'; }
  else { queue = shuffle([...pileX]); queueSource = 'mastered'; }
}

function shuffle(arr) {
  for (let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}

function nextQuestion() {
  if (queue.length === 0) { showRoundComplete(); return; }
  current = queue.shift();
  render();
}

function render() {
  const q = ALL_QUESTIONS[current];
  document.getElementById('count-x').textContent = pileX.length;
  document.getElementById('count-y').textContent = pileY.length;
  document.getElementById('count-u').textContent = pileU.length;
  document.getElementById('progress-bar').style.width = `${(pileX.length/ALL_QUESTIONS.length)*100}%`;
  document.getElementById('meta').textContent = `Drawing from: ${queueSource === 'review' ? 'Review Pile' : queueSource === 'mastered' ? 'Mastered Pile' : 'Unseen Pile'}`;
  document.getElementById('question').textContent = q.q;
  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.opts.forEach((o,i)=>{
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.textContent = `${['A','B','C','D'][i]}. ${o}`;
    btn.onclick = ()=>choose(i);
    opts.appendChild(btn);
  });
  document.getElementById('explanation').style.display = 'none';
  document.getElementById('wrong-choice-note').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';
  answered = false;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const q = ALL_QUESTIONS[current];
  const btns = document.querySelectorAll('.opt');
  btns.forEach(b=>b.disabled=true);
  btns[q.ans].classList.add('correct');
  const exp = document.getElementById('explanation');
  if (i === q.ans) {
    pileU = pileU.filter(x=>x!==current); pileY = pileY.filter(x=>x!==current);
    if (!pileX.includes(current)) pileX.push(current);
    exp.className = ''; exp.style.display = 'block';
    exp.innerHTML = `<strong>✓ Correct → Mastered Pile.</strong> ${q.exp}`;
    document.getElementById('wrong-choice-note').style.display = 'none';
  } else {
    btns[i].classList.add('wrong');
    pileU = pileU.filter(x=>x!==current); pileX = pileX.filter(x=>x!==current);
    if (!pileY.includes(current)) pileY.push(current);
    const wn = document.getElementById('wrong-choice-note');
    wn.style.display = 'block';
    wn.innerHTML = `<strong>You chose: ${['A','B','C','D'][i]}. ${q.opts[i]}</strong> — This is incorrect.`;
    exp.className = 'wrong-exp'; exp.style.display = 'block';
    exp.innerHTML = `<strong>✗ Incorrect → Review Pile.</strong> Correct answer: <strong>${['A','B','C','D'][q.ans]}. ${q.opts[q.ans]}</strong><br><br>${q.exp}`;
  }
  document.getElementById('count-x').textContent = pileX.length;
  document.getElementById('count-y').textContent = pileY.length;
  document.getElementById('count-u').textContent = pileU.length;
  document.getElementById('progress-bar').style.width = `${(pileX.length/ALL_QUESTIONS.length)*100}%`;
  document.getElementById('next-btn').style.display = 'inline-block';
}

function showRoundComplete() {
  document.getElementById('quiz-screen').style.display = 'none';
  const rc = document.getElementById('round-complete');
  rc.style.display = 'block';
  if (pileU.length===0 && pileY.length===0) {
    document.getElementById('round-title').textContent = '🏆 All Questions Mastered!';
    document.getElementById('round-sub').textContent = `You've mastered all ${ALL_QUESTIONS.length} questions! Keep reviewing to stay sharp.`;
    document.getElementById('continue-btn').textContent = 'Review All Again →';
  } else if (pileU.length===0) {
    document.getElementById('round-title').textContent = 'All Unseen Questions Done!';
    document.getElementById('round-sub').textContent = `Mastered: ${pileX.length} | Review pile: ${pileY.length} questions to retry.`;
    document.getElementById('continue-btn').textContent = 'Start Review Pile →';
  } else {
    document.getElementById('round-title').textContent = 'Round Complete!';
    document.getElementById('round-sub').textContent = `Mastered: ${pileX.length} | Still in review: ${pileY.length} | Unseen: ${pileU.length}`;
    document.getElementById('continue-btn').textContent = 'Continue →';
  }
}

document.getElementById('next-btn').onclick = ()=>nextQuestion();
document.getElementById('continue-btn').onclick = ()=>{
  document.getElementById('round-complete').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  if (pileU.length===0 && pileY.length===0) { pileX=[]; pileU=ALL_QUESTIONS.map((_,i)=>i); }
  buildQueue(); nextQuestion();
};

initPiles();
nextQuestion();
</script>

</html>
