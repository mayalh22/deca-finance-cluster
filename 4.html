<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DECA Finance Quiz</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Roboto', sans-serif; background: #fff; color: #152238; min-height: 100vh; }
  #app { max-width: 720px; margin: 0 auto; padding: 40px 24px; }
  #progress-bar-wrap { background: #e0e0e0; height: 4px; border-radius: 2px; margin-bottom: 32px; }
  #progress-bar { background: #009b47; height: 4px; border-radius: 2px; transition: width 0.3s; }
  #meta { font-size: 13px; color: #888; margin-bottom: 20px; font-weight: 500; letter-spacing: 0.5px; }
  #pile-info { font-size: 13px; color: #555; margin-bottom: 12px; display: flex; gap: 16px; }
  .pile-badge { padding: 3px 10px; border-radius: 12px; font-weight: 700; font-size: 12px; }
  .pile-x { background: #e6f9ef; color: #009b47; border: 1px solid #009b47; }
  .pile-y { background: #fff0f0; color: #c0392b; border: 1px solid #c0392b; }
  .pile-u { background: #f0f0f0; color: #888; border: 1px solid #ccc; }
  #question { font-size: 18px; font-weight: 500; line-height: 1.5; margin-bottom: 28px; color: #152238; }
  .opt { display: block; width: 100%; text-align: left; background: #fff; border: 2px solid #e0e0e0; color: #152238; padding: 14px 18px; margin-bottom: 10px; font-size: 15px; font-family: 'Roboto', sans-serif; cursor: pointer; border-radius: 4px; transition: border-color 0.15s; }
  .opt:hover:not(:disabled) { border-color: #009b47; }
  .opt.correct { border-color: #009b47; background: #f0fff6; color: #152238; }
  .opt.wrong { border-color: #c0392b; background: #fff5f5; color: #152238; }
  .opt:disabled { cursor: default; }
  #explanation { display: none; background: #f7f7f7; border-left: 4px solid #009b47; padding: 16px 18px; margin-top: 20px; font-size: 14px; line-height: 1.6; color: #333; border-radius: 0 4px 4px 0; }
  #explanation.wrong-exp { border-left-color: #c0392b; }
  #wrong-choice-note { display: none; background: #fff5f5; border-left: 4px solid #c0392b; padding: 12px 18px; margin-top: 12px; font-size: 14px; line-height: 1.6; color: #333; border-radius: 0 4px 4px 0; }
  #next-btn { display: none; margin-top: 24px; background: #009b47; color: #fff; border: none; padding: 14px 32px; font-size: 15px; font-family: 'Roboto', sans-serif; font-weight: 700; cursor: pointer; border-radius: 4px; letter-spacing: 0.5px; }
  #next-btn:hover { background: #007a38; }
  #round-complete { display: none; text-align: center; padding: 60px 0; }
  #round-complete h2 { font-size: 28px; font-weight: 700; color: #152238; margin-bottom: 8px; }
  #round-complete p { font-size: 16px; color: #555; margin-bottom: 32px; }
  #continue-btn { background: #c0392b; color: #fff; border: none; padding: 14px 36px; font-size: 15px; font-family: 'Roboto', sans-serif; font-weight: 700; cursor: pointer; border-radius: 4px; }
  #continue-btn:hover { background: #a93226; }
</style>
</head>
<body>
<div id="app">
  <div id="quiz-screen">
    <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
    <div id="pile-info">
      <span class="pile-badge pile-x">✓ Mastered: <span id="count-x">0</span></span>
      <span class="pile-badge pile-y">✗ Review: <span id="count-y">0</span></span>
      <span class="pile-badge pile-u">? Unseen: <span id="count-u">0</span></span>
    </div>
    <div id="meta"></div>
    <div id="question"></div>
    <div id="options"></div>
    <div id="wrong-choice-note"></div>
    <div id="explanation"></div>
    <button id="next-btn">Next →</button>
  </div>
  <div id="round-complete">
    <h2 id="round-title"></h2>
    <p id="round-sub"></p>
    <button id="continue-btn">Keep Going →</button>
  </div>
</div>
<script>
const ALL_QUESTIONS = [
  // ── TEST 1312 ──
  {q:"Which of the following best represents the correct order for organizing a job that must be completed?",opts:["Identify, classify, prioritize, schedule, perform","Classify, identify, prioritize, perform, schedule","Identify, prioritize, classify, schedule, perform","Prioritize, identify, classify, perform, schedule"],ans:0,exp:"The best order is to identify your activities, classify/determine frequency, prioritize by importance, schedule in a time plan, then perform them."},
  {q:"Which of the following statements most accurately describes the financial-services industry today?",opts:["Banks, insurance companies, securities firms, and other financial institutions are sometimes owned by a single large firm offering a complete range of financial services.","The financial-services industry is largely unregulated, with little federal oversight.","The only place to pursue a career as a securities broker is a traditional financial securities firm on Wall Street.","It is highly segmented, with separate businesses for separate services."],ans:0,exp:"Since the Gramm-Leach-Bliley Act of 1999 deregulated the industry, financial-services providers are allowed to offer a broad range of services under one firm."},
  {q:"Tiana is responsible for receiving all shipments for the Castle of Chocolate. She fails to notice that several items ordered and paid for were not shipped. Her error is most likely to:",opts:["create unhappy customers.","decrease inventory cost.","increase inventory cost.","increase shipping costs."],ans:2,exp:"When an employee fails to notice missing received items, the business paid for goods it didn't receive, increasing inventory costs."},
  {q:"Which of the following is an example of a long-term business goal?",opts:["Develop departmental budgets","Expand into new markets","Hire an accountant","Create a sales presentation"],ans:1,exp:"Expanding into new markets typically takes over a year and is a long-term goal. The others can be accomplished in a year or less."},
  {q:"Which of the following are common categories of commodities?",opts:["Metals, grains, and consumer goods","Energy, grains, and consumer goods","Energy, metals, and consumer goods","Energy, metals, and grains"],ans:3,exp:"Commodities are raw primary products commonly categorized as energy, metals, and agricultural products (including grains). Consumer goods are finished products, not raw commodities."},
  {q:"One factor that has stimulated financial globalization is an increase in:",opts:["foreign regulation.","domestic investment preferences.","protectionism.","domestic competition."],ans:3,exp:"Due to increased domestic competition, financial companies have sought new markets in foreign countries, stimulating financial globalization."},
  {q:"Companies that effectively allocate costs:",opts:["increase profits and expenses.","improve short-term and hurt long-term decision-making.","spread costs among departments.","determine one department to cover all costs."],ans:2,exp:"Cost allocation spreads costs among departments (cost objects) to determine which parts of a business are responsible for which costs, helping make better-informed decisions."},
  {q:"If you are taking out a mortgage loan on a new home, which of the following is most likely to be used as collateral?",opts:["Cash in your savings account","Your car","The new home","Future paychecks"],ans:2,exp:"A mortgage is a secured loan where the collateral is almost always the home itself. If the loan isn't repaid, the lender has the right to foreclose the home."},
  {q:"Which aspect of a company's financial statements can provide information about its bottom line?",opts:["Cash flow trends","Earnings and revenue growth","Dividends paid","Liabilities"],ans:1,exp:"Earnings and revenue growth indicate whether a company is profitable and by how much — this is the 'bottom line.'"},
  {q:"Duncan works for a marketing firm but has taken a second job doing marketing for a local business. What is a potential ethical issue?",opts:["Conflict of interest","Lack of accountability","Misuse of resources","Product liability"],ans:0,exp:"A conflict of interest arises when a second job could compete with or take focus from the primary job, creating an ethical risk for employers."},
  {q:"The way you follow up with a customer when showing a customer service mindset will vary according to:",opts:["the customer's level of frustration.","the type of service you have provided the customer.","how far away the customer is located.","how much attention your supervisor paid to the customer."],ans:1,exp:"Follow-up should vary by the type of service provided to ensure continued customer satisfaction. All customers are equally important."},
  {q:"When you know what your values are and align your behavior with them, you will:",opts:["be able to set priorities and goals easily.","feel conflicted in your decision-making.","never again struggle with an ethical dilemma.","find fulfillment in career but not personal life."],ans:0,exp:"Knowing and living by your values allows you to set priorities and goals that make you feel fulfilled, motivated, and happy."},
  {q:"An important purpose of full-disclosure laws and regulations is to:",opts:["provide information to investors so they can make informed decisions.","prevent a stock's par value from dropping below its market value.","require companies to disclose all information about their operations.","allow company employees to use inside information for personal gain."],ans:0,exp:"Full-disclosure laws require companies to publicize information that could affect stock value so investors can make informed buy, hold, or sell decisions."},
  {q:"Which of the following is an example of job loss due to cyclical unemployment?",opts:["Ryan recently lost his job in the construction industry during a time of economic contraction.","Tristan lost his management job when the coal supply had been depleted at the mine.","Lizzy's temporary job at a gourmet food company ended in January after the holiday rush.","Hannah left her position as a human resources manager to attend graduate school."],ans:0,exp:"Cyclical unemployment occurs during periods of low demand due to economic conditions. Ryan's layoff during economic contraction is a classic example."},
  {q:"A business determines how much it costs to make a product and then adds a predetermined markup to set its selling price. This is an example of:",opts:["price-based costing.","economies of scale.","cost-based pricing.","gross profit."],ans:2,exp:"Cost-based pricing involves determining production costs and adding a predetermined markup. Price-based costing works in reverse — starting with what customers will pay."},
  {q:"What are the basic components of a business budget?",opts:["Inventory, variable costs, and profits","Fixed costs, variable costs, and semi-variable costs","Fixed assets, inventory, and investments","Total revenues, total costs, and profit"],ans:3,exp:"The basic budgeting equation is: Total Revenues − Total Costs = Profit. Fixed, variable, and semi-variable costs combine into total costs."},
  {q:"If a company pays more in dividends than it receives in net income, the statement of changes in equity will show that retained earnings will be:",opts:["the same as the previous period.","zero.","lower than the previous period.","higher than the previous period."],ans:2,exp:"Formula: Beginning retained earnings + Net income − Dividends = Retained earnings. If dividends exceed net income, retained earnings fall below the prior period."},
  {q:"Stacy chose her dog's groomer based on the friendliness and attentiveness of the staff. Even though prices are higher, she would never go elsewhere. This demonstrates the importance of:",opts:["building and maintaining customer relationships.","setting prices higher to create an image of luxury.","outpricing the competition through sales and giveaways.","earning new customers rather than focusing on current ones."],ans:0,exp:"Excellent customer service builds loyal relationships. It is more expensive to acquire new customers than to retain current ones."},
  {q:"Which of the following is a tool that can be used to carry out scanning activities?",opts:["Manufacturing equipment","Market research studies","Personnel records","Budgeting software"],ans:1,exp:"Market research studies provide useful information about customer attitudes and demographic changes, making them a tool for environmental scanning."},
  {q:"Casey's Tree Removal Services adheres strictly to rules, practices, and processes, resulting in no major ethics problems and positive relationships with stakeholders. This demonstrates the benefits of:",opts:["good corporate governance.","setting SMART goals.","ethics training in the workplace.","public relations initiatives."],ans:0,exp:"Corporate governance is the combined set of rules, practices, and processes by which an organization is managed. Benefits include fewer incidents of misconduct and better stakeholder relationships."},
  {q:"Capital gains taxes may be imposed on:",opts:["stocks, real estate, and financial gifts.","stocks, bonds, and financial gifts.","bonds, real estate, and financial gifts.","stocks, bonds, and real estate."],ans:3,exp:"Capital gains taxes apply to stocks, bonds, and real estate when sold at a profit. A gift tax — not capital gains tax — applies to financial gifts."},
  {q:"While making a sale, an employee decides to keep the customer's money rather than ringing up the sale. This is an example of business risk caused by __________ human behavior.",opts:["careless","dishonest","incompetent","ethical"],ans:1,exp:"Dishonest behavior includes all forms of stealing, cheating, or lying. Failing to ring a sale and keeping the money is dishonesty — a form of human risk."},
  {q:"Which of the following types of data should be maintained in an effective financial-information management system?",opts:["Reports on the effectiveness of ad campaigns","Data on current customer trends","Statistics on demographic shifts","Information on external market conditions"],ans:3,exp:"Financial-information management systems store data about organizational finances, internal operational information, and external market conditions. Ad effectiveness and demographic data are more relevant to marketing."},
  {q:"Lean operations focus on increasing efficiency by reducing __________, while Six Sigma focuses on continuously improving __________ throughout the business.",opts:["wages; automation","standards; waste","automation; standards","waste; quality"],ans:3,exp:"Lean operations eliminate waste to improve efficiency. Six Sigma is a quality-management framework that continuously sets higher goals of perfection to improve quality."},
  {q:"Michelle is a small business owner who has outdated customer information in her computer files. What type of application should she use to update her database?",opts:["Environmental scanning","Customer relationship management","Tabulation analysis","Application programming interface"],ans:1,exp:"CRM (Customer Relationship Management) applications allow businesses to easily manage, update, and organize customer information."},
  {q:"Matthew received a $20,000 loan from a financial institution to help pay for college. When he graduates, he will repay the institution. This is an example of which form of financial exchange?",opts:["Bitcoin","Debit","Cash","Credit"],ans:3,exp:"Credit is borrowed money used to purchase goods or services now, to be repaid later with applicable interest. This is distinct from cash, debit, or bitcoin."},
  {q:"Which of the following is the most effective way to avoid excessive credit card debt?",opts:["Pay off your balance each month.","Use credit card cash advances to pay debt.","Choose a credit card with a high limit.","Pay off low-interest credit cards first."],ans:0,exp:"Paying off the full balance each month avoids interest charges. Cash advances carry very high interest. Choose low-limit cards and pay high-interest cards first if carrying a balance."},
  {q:"ABC Education Company wants to compare its business practices and performance to that of other organizations within its industry. Which financial analysis tool would be most helpful?",opts:["Benchmarking","Trending","Forecasting","Ratio analysis"],ans:0,exp:"Benchmarking uses a reference point to compare a company's performance against competitors or industry standards. Trending identifies patterns over time; forecasting predicts future events."},
  {q:"Building professional, long-term relationships with others in the financial industry requires:",opts:["membership in unrelated trade organizations.","a detached attitude.","consistent communication.","a formal agreement or contract."],ans:2,exp:"The key to building long-term professional relationships is consistent, ongoing communication that builds rapport and earns trust."},
  {q:"Which of the following is the formula used to calculate retained earnings?",opts:["Operating cash flow − Capital expenditures + Net income (or loss)","Capital expenditures + Net income (or loss) − Net dividends","Beginning period retained earnings − Net income (or loss) + Net dividends","Beginning period retained earnings + Net income (or loss) − Net dividends"],ans:3,exp:"Retained earnings = Beginning period retained earnings + Net income (or loss) − Net dividends. Capital expenditures are not part of this formula."},
  {q:"Firewalls, intrusion detection systems, and encryption are all methods used by companies to:",opts:["protect and secure financial information.","screen qualified job applicants.","sort and organize customer data.","ensure the security of their office buildings."],ans:0,exp:"These are technological methods that protect sensitive financial information. They are not used for hiring, data organization, or physical building security."},
  {q:"In corporate governance, oversight of management, segregation of control, and policy development are all examples of:",opts:["transparency in management.","external control mechanisms.","internal control mechanisms.","tasks of the board of directors."],ans:2,exp:"Internal control mechanisms monitor and correct organizational activities. External control mechanisms are controlled by outside entities like governments or trade unions."},
  {q:"To reduce the risk of unauthorized access to confidential data, businesses use security software to protect their:",opts:["corporate policies.","intranet systems.","intercom systems.","spam email."],ans:1,exp:"An intranet is a business's internal computer network. Businesses use security software like encryption and passwords to protect confidential data stored on their intranet."},
  {q:"Comparing the prices offered by different vendors for the same goods and services is what part of the purchasing process?",opts:["Receipt of goods","Bid analysis","Invoice payment","Price fixing"],ans:1,exp:"Bid analysis involves comparing vendor prices for the same goods/services to find the best deal. Price fixing is an illegal agreement between businesses to set prices."},
  {q:"What is the key distinction between a word processor and a text editor?",opts:["A text editor is a simplified type of word processor.","A text editor is more focused on the visual formatting elements of a document.","A text editor offers users more control over layout and colors.","A text editor is a more advanced word processor."],ans:0,exp:"A text editor is designed for quick writing with less formatting focus, making it a simplified version of a word processor."},
  {q:"What form of communication is best for a manager to use to obtain immediate feedback from employees and gauge their nonverbal cues?",opts:["Phone call","Instant messaging","Face-to-face meeting","Email"],ans:2,exp:"Face-to-face meetings allow managers to get immediate verbal and nonverbal feedback. Body language cannot be observed through phone, messaging, or email."},
  {q:"Whether prices go up or down, the relationship between relative prices does not change if the __________ remains the same.",opts:["value","resource","ratio","market"],ans:2,exp:"A ratio is a fixed relation in degree between two similar things. If the ratio stays constant, relative prices remain the same even if absolute prices change."},
  {q:"What type of insurance company serves as a financial intermediary?",opts:["Liability","Health","Property","Life"],ans:3,exp:"Life insurance companies receive funds from customers (savers) and lend funds to borrowers, acting as financial intermediaries. Property, liability, and health insurers do not lend funds."},
  {q:"Marcus is one of the earliest investors in a new teeth-whitening kit. He has convinced others to invest, allowing early backers to profit from later investments. What type of investment scam is this?",opts:["Ponzi scheme","Viatical investment scam","Boiler room","Predatory lending"],ans:0,exp:"A Ponzi scheme pays returns to early investors using funds from later investors rather than legitimate investment returns."},
  {q:"In which stage of project management does risk analysis take place?",opts:["Closing","Execution","Planning","Initiation"],ans:2,exp:"Risk analysis occurs in the planning stage so project managers can prepare to minimize risks. Initiation assesses the idea; execution does the work; closing delivers the final product."},
  {q:"How can the stock market affect the economy?",opts:["Rising stock markets cause consumer prices to decrease.","The stock market performs better during long-term stagnation.","Interest rates are lower when the economy is in recession.","Declines in stock markets decrease consumer confidence."],ans:3,exp:"When stock prices fall, businesses and consumers lose confidence and are less likely to spend, negatively affecting the economy."},
  {q:"Which of the following is a good source of detailed information about specific career opportunities in business?",opts:["Community-college student centers","Professional organization websites","Classified ads in urban newspapers","Corporate human-resource departments"],ans:1,exp:"Most business specialties have professional organizations with websites that include job information, required training, and member listings. Corporate HR only covers their own openings."},
  {q:"When your parents tell you to vacuum the living room, you are receiving __________ directions.",opts:["social","written","oral","nonverbal"],ans:2,exp:"When a person speaks, they are giving oral directions. This is verbal (spoken) communication, not written or nonverbal."},
  {q:"What can a business do if it is exposed to risks that commercial insurance companies do not cover?",opts:["Acquire a professional association","Create a trade union","Form a captive insurance company","Establish a risk management committee"],ans:2,exp:"Organizations form captive insurance companies — their own insurance entities — to cover risks that commercial insurers won't. They control underwriting, premium rates, and claims processing."},
  {q:"Isaac has $10,000 to invest and wants to calculate its future value over 1 year. What pieces of information does he need?",opts:["Past value and principal","Income and interest rate","Present value and discount rate","Past value and present value"],ans:2,exp:"Future Value = Present Value × (1 + Discount Rate). Isaac's $10,000 is the present value; the discount rate is the expected interest rate earned."},
  {q:"Like food service is just one segment of the hospitality industry, __________ is one component of __________.",opts:["risk control; risk management","risk management; risk control","internal risk; external risk","external risk; internal risk"],ans:0,exp:"Risk control (specific actions to mitigate risk) is one component of the broader risk management function, just as food service is one part of hospitality."},
  {q:"Which of the following involves obtaining and evaluating data for the purpose of helping businesses make long-term decisions?",opts:["Applied research","Communications networks","Information management","Organizational development"],ans:2,exp:"Information management is the process of accessing, processing, maintaining, evaluating, and disseminating knowledge and data to assist business planning and decision-making."},
  {q:"What is a good source of information for a managerial accountant whose company needs to determine how much money is available for a marketing campaign?",opts:["Sales forecast","Variance analysis","Budget","Cost-benefit analysis"],ans:2,exp:"A budget is a financial plan that shows how money is organized for future operations. It shows what funds are available for specific activities like marketing campaigns."},
  {q:"What type of economic indicator are stock market returns commonly considered to be?",opts:["Lagging","Exploratory","Coincident","Leading"],ans:3,exp:"Stock market returns are leading indicators — they often decline before an economic decline and improve before positive economic movement."},
  {q:"How does a student with initiative handle a situation that increases their workload?",opts:["Asks their teacher how to handle it","Waits until their teacher notices","Asks other students to assist them","Finds ways to adjust to the situation"],ans:3,exp:"People with initiative are flexible and adjust to changes. Waiting or asking others to handle it does not demonstrate initiative."},
  {q:"The commercials Sierra sees always portray men as the only demographic that enjoys sports. The idea that only men watch football is an example of a(n):",opts:["unconscious bias.","prejudice.","discriminatory statement.","stereotype."],ans:3,exp:"Stereotypes are set images or assumptions about a group. Believing only men enjoy sports is a stereotype — a widely recognized but often inaccurate assumption."},
  {q:"If all individuals who own a business share unlimited liability for the business's losses, these individuals are part of a(n):",opts:["private corporation.","'C' corporation.","'S' corporation.","general partnership."],ans:3,exp:"In a general partnership, all partners are personally liable for the business's debts. Corporate structures (C, S, private) provide limited liability."},
  {q:"How do employees benefit from being involved in achieving governance objectives?",opts:["Limited union support","Reduced communication","Greater profits","Increased job satisfaction"],ans:3,exp:"Involving employees in governance objectives leads to increased job satisfaction and a positive attitude. Greater profits benefit the company; greater communication (not less) typically results."},
  {q:"You want to take a vacation day. Your manager initially disagrees, but you change their attitude and convince them by using:",opts:["bullying.","intimidation.","threats.","persuasion."],ans:3,exp:"Persuasion is the ability to influence people to change their attitudes or behavior. Bullying, threats, and intimidation may force compliance but don't truly change attitudes."},
  {q:"If Danita invests $6,000 at a simple annual interest rate of 5%, the future value of her investment at the end of a 5-year period will be:",opts:["$1,200.","$1,650.","$1,500.","$4,500."],ans:2,exp:"Simple interest: $6,000 × 0.05 = $300/year × 5 years = $1,500 in interest earned over 5 years."},
  {q:"Which situation is an example of using marginal analysis to make a segment profitability decision?",opts:["A furniture company must decide whether to sell its pieces assembled or unassembled.","A company must decide whether to use an outside marketing firm or hire someone internally.","A clothing retailer must decide how many units of each product to sell.","A restaurant chain manager must decide whether to keep a certain franchise open."],ans:3,exp:"Segment profitability decisions involve keeping or dropping an unprofitable segment (like a franchise). The others are sell-or-process-further, make-or-buy, and sales mix decisions."},
  {q:"If a company requests that managers monitor and verify the accuracy of their departments' income and expenses as reported by the accountant each month, it is creating a corporate governance structure that uses:",opts:["external control mechanism.","unethical method of monitoring.","internal independent audit.","external independent audit."],ans:2,exp:"When a company uses employees or managers to verify accounting, it is using an internal independent audit. External controls come from governments, unions, or financial institutions."},
  {q:"A financial institution fails to comply with an important government regulation. The financial institution will most likely:",opts:["avoid an audit.","pay a fine.","get a better reputation.","gain new business."],ans:1,exp:"Financial institutions typically pay fines for noncompliance. Clients may be reluctant to do business with an institution known for breaking rules, hurting reputation and business."},
  {q:"To endorse a check, the payee must sign their name on the:",opts:["check's memo line.","back of the check.","check's 'Pay to the order of' section.","signature block of the check."],ans:1,exp:"Endorsement requires signing the back of the check to transfer funds from payer to payee. The front of the check is completed by the payer."},
  {q:"Aria must obtain data from Mateo before she can enter a customer's insurance claim. To process the claim, Aria and Mateo must:",opts:["coordinate their work activities.","develop departmental goals.","obtain management's approval.","improve their communication."],ans:0,exp:"When employees perform specific parts of a whole task so others can do their work, they are coordinating their work activities."},
  {q:"Emi wants to compare her company's financial performance over several years. To compare historical data over multiple accounting periods, she should use __________ analysis.",opts:["horizontal","SWOT","vertical","break-even"],ans:0,exp:"Horizontal analysis looks at data over multiple periods (e.g., year-over-year). Vertical analysis examines line items as a proportion of revenue within a single period."},
  {q:"When employees can retrieve only the computer data important for their job, the business is applying the:",opts:["principle of least authority.","doctrine of organizational structure.","law of diminishing capacity.","concept of intrusion prevention."],ans:0,exp:"The principle of least authority limits employee data access to what's needed for their work, protecting confidential information and reducing internal fraud risks."},
  {q:"The two main divisions of the trade industry are:",opts:["producers and retailers.","wholesalers and producers.","wholesalers and retailers.","manufacturers and wholesalers."],ans:2,exp:"Trade industries buy and sell goods. Wholesalers sell to retailers, who sell to consumers. Manufacturers and producers are not part of the trade industries."},
  {q:"The primary responsibility of all financial-services providers is:",opts:["improving the community's standard of living.","lobbying the government on behalf of the industry.","purchasing and selling securities.","growing and protecting their clients' wealth."],ans:3,exp:"Financial-services providers (planners, bankers, insurance agents) are primarily responsible for growing and protecting their clients' wealth through sound advice and appropriate financial products."},
  {q:"The 52-week high and low numbers are a good indicator of the stock's:",opts:["net change.","volatility.","yield.","volume."],ans:1,exp:"The 52-week high and low show how sharply a stock's price has risen or fallen — a measure of volatility. Yield, volume, and net change are different metrics."},
  {q:"Which of the following statements about effective business writing is true?",opts:["It is direct, clear, and simple.","It uses complex terms and language.","It doesn't keep the audience in mind.","It is designed to be read slowly."],ans:0,exp:"Effective business writing is direct, clear, simple, and designed to be read quickly. It uses simple word choices and keeps audience concerns in mind."},
  {q:"When a large bank acquires or merges with another bank, it has the opportunity to:",opts:["instantly gain many new customers.","avoid or eliminate federal banking regulations.","transfer financial risk to the newly acquired bank.","decrease the federal interest rate."],ans:0,exp:"Gaining large numbers of new customers is a primary motivation and benefit of bank mergers. Banks cannot eliminate regulations, decrease federal interest rates, or transfer risk away."},
  {q:"Which of the following is the first step a financial planner typically takes when meeting a new client?",opts:["Recommend steps to eliminate debt","Determine client's tolerance for risk","Create long-term financial goals","Assess current financial situation"],ans:3,exp:"The first step is assessing the client's current financial situation — reviewing assets, debt, goals, and risk tolerance — before making any recommendations."},
  {q:"What is a primary responsibility of an investment bank?",opts:["Use funds from premiums to offer loans","Pool contributions and invest them for employees","Help firms raise funds by issuing securities","Accept deposits from individual savers"],ans:2,exp:"Investment banks help firms raise funds by issuing securities (stocks and bonds). Insurance companies collect premiums; pension funds pool contributions; deposit institutions accept savings."},
  {q:"Which of the following factors has increased financial globalization and made it easier to communicate across country borders?",opts:["Deregulation","Technology","Exchange rates","Competition"],ans:1,exp:"The internet and digital communication tools have made it easier to work across borders, directly increasing financial globalization. Competition is an effect of globalization, not a cause."},
  {q:"The primary force influencing corporate governance is a company's:",opts:["independent directors.","chief executive officer.","board of directors.","shareholders."],ans:2,exp:"The board of directors is the primary force in corporate governance, responsible for important decisions, representing shareholders, and ensuring ethical business practices."},
  {q:"Why do many people pursue finance careers?",opts:["Careers in finance are typically easier than other careers.","There is a positive outlook for finance careers.","Finance careers generally have small salaries.","Finance careers do not require much education or training."],ans:1,exp:"A positive career outlook is a primary attraction of finance careers. Finance careers generally have large salaries and do require significant education and training."},
  {q:"A manager must decide whether to make products in-house or outsource manufacturing. In this scenario, the company's committed costs are likely to be:",opts:["cash inflows.","irrelevant costs.","relevant costs.","cash receipts."],ans:1,exp:"Committed costs are already set aside for future expenses and cannot be altered, making them irrelevant to this make-or-buy decision."},
  {q:"Which of the following is an example of a cost-of-goods expense a business may pay?",opts:["Wages for its employees","Electricity for its building","Rent for its land/property","Raw materials for its products"],ans:3,exp:"Cost of goods refers to money paid for raw materials used to produce products. Wages, electricity, and rent are operating expenses — the costs of running the business."},
  {q:"A guideline for writing effective business letters is that each letter should:",opts:["entertain the reader.","display the writer's vocabulary.","have a clear purpose.","contain indirect questions."],ans:2,exp:"Every business letter should have a clear, stated purpose. It should not be written to entertain, show off vocabulary, or contain indirect questions."},
  {q:"One of the most important benefits of setting goals is:",opts:["achieving success in life.","learning how to lead others.","becoming a good example.","avoiding everyday problems."],ans:0,exp:"Success is defined as reaching the goals you set for yourself. Without goals, you are less likely to succeed. Setting goals enables achievement of success in life."},
  {q:"Which of the following is most likely to incur a luxury tax?",opts:["Wool coat with faux fur collar","Five-carat diamond ring","Laptop computer","Used minivan with leather interior"],ans:1,exp:"Luxury taxes are levied on expensive, nonessential items such as luxury cars, valuable artwork, and expensive jewelry like a five-carat diamond ring."},
  {q:"Which of the following actions is most likely to lead to a serious legal penalty?",opts:["Possession of legal medication without a prescription","Missing a couple of days of school due to a family vacation","Refusing to speak when a police officer questions you","Being noisy with your friends at an amusement park"],ans:0,exp:"Possessing legal medication without a valid prescription is illegal. You have the right to remain silent with police, and brief absences from school are not criminal offenses."},
  {q:"The balance sheet has a close relationship with the company's:",opts:["fair market value.","statement of financial position.","income statement.","mortgage."],ans:2,exp:"The balance sheet and income statement are closely related — changes to the income statement directly affect balance sheet numbers. Statement of financial position is just another name for the balance sheet itself."},
  {q:"Which type of risk is easier to reduce because it can be forecasted?",opts:["External","Economic","Natural","Internal"],ans:3,exp:"Internal risks come from within the organization. Because the company knows itself well, it can more easily forecast and control internal risks compared to external ones."},
  {q:"In an association rule: 'If a customer purchases peanut butter, they are 70% likely to also purchase jelly.' The antecedent is __________ and the consequent is __________.",opts:["being a customer at the store; buying jelly","buying jelly; being a customer at the store","buying jelly; buying peanut butter","buying peanut butter; buying jelly"],ans:3,exp:"In an if/then association rule, the 'if' part is the antecedent (buying peanut butter) and the 'then' part is the consequent (buying jelly). The relationship cannot be reversed."},
  {q:"Which of the following is an example of an employee behaving ethically at work?",opts:["Performing work-related tasks in efficient ways","Making social plans with friends on company time","Using office supplies for personal business","Accepting credit for a project that a coworker completed"],ans:0,exp:"Ethical employees complete tasks efficiently, follow company rules, and are honest. Using office supplies for personal use, making personal plans on company time, and taking undue credit are unethical."},
  {q:"Ann-Marie is preparing an annual report. While many people might look at the report, this report's main audience is:",opts:["shareholders.","the CEO.","customers.","possible employees."],ans:0,exp:"Annual reports must be shared with stakeholders/shareholders who have invested in the company. While others may see it, shareholders are the primary intended audience."},
  {q:"Which of the following most likely led to a greater emphasis on governance structures in recent years?",opts:["Competitor saturation","Stock market crash","Accounting fraud","New technology in the industry"],ans:2,exp:"Accounting fraud is an internal factor that impacts governance structures. Stock market crashes and technological changes are external factors less likely to affect governance structures."},
  {q:"Which of the following is an example of a routine decision?",opts:["Choosing a career to pursue","Picking a new roommate","Selecting which car to buy","Ordering pizza for dinner"],ans:3,exp:"Routine decisions are minor and made almost unconsciously. Ordering pizza is routine; choosing a career, roommate, or car are major decisions requiring much more deliberation."},
  {q:"Which of the following is the best example of misusing company resources?",opts:["Juan takes notepads from the supply closet.","Nate flies first class when he travels for work.","Yazmin often leaves her shift early without clocking out.","Ashley pays for a business lunch with a company credit card."],ans:2,exp:"Leaving early without clocking out means being paid for time not worked — a misuse of company resources (company time). The others may be acceptable under company policy."},
  {q:"A local bank has partnered with a life insurance company, allowing the insurer to sell its products to the bank's clients. This partnership is an example of:",opts:["consolidation.","amalgamation.","bancassurance.","market extension."],ans:2,exp:"Bancassurance is an arrangement where an insurance company sells its products through a bank's client base. Consolidation/amalgamation involve merging into one entity."},
  {q:"Lawrence's manager asked him to create a visual representation of key performance indicators including cash flow, liquidity, profitability, and liability. He should create a(n):",opts:["operating agreement.","financial scorecard.","cost standard.","profit-and-loss statement."],ans:1,exp:"A financial scorecard displays key financial indicators and up-to-date metrics like cash flow, liquidity, profitability, and liability in charts and graphs."},
  {q:"Virtual audits are different than traditional audits in that virtual audits:",opts:["don't rely on technology.","must offer printed copies of data.","cannot be done remotely.","involve sharing documents online."],ans:3,exp:"Virtual audits occur via online means. Documents are shared digitally with auditors, eliminating the need for printed copies, and can be done remotely using technology."},
  {q:"Consensus building is a process that often enables a group to:",opts:["reach an agreement.","express an attitude.","create a stalemate.","define a philosophy."],ans:0,exp:"Consensus requires substantial agreement from each group member. Consensus building helps groups reach agreements and avoid stalemates."},
  {q:"An organization with a strong culture typically has:",opts:["weak managers.","clear values.","unclear values.","no rules."],ans:1,exp:"Organizations with clear values that are shared and acted upon by all employees have strong cultures. Unclear values lead to weak organizational culture."},
  {q:"Jerry's coworker Greg dented a truck and blamed Jerry. When the supervisor yells at Jerry, what is the most appropriate thing for Jerry to do?",opts:["Accept responsibility.","Maintain self-control.","Blame someone else.","Get even with Greg."],ans:1,exp:"Maintaining self-control allows Jerry to defend himself without losing his temper. He should not accept blame for something he didn't do, and getting even is rarely a good idea."},
  {q:"Which of the following budgeting software applications tracks a business's cash, interest, and dividends?",opts:["Revenue recognition","Capital expenses","Workflow management","Inventory planning"],ans:0,exp:"Revenue recognition applications track various sources of revenue including cash flows, interest, and dividends, helping businesses determine how to allocate funds."},
  {q:"Why do some companies decide against using variance analysis?",opts:["Real causes cannot be correctly identified.","Horizontal analysis requires much less time.","Variance analysis is not based on real, tangible data.","Variance analysis involves too much of a time delay."],ans:3,exp:"Variance analysis is based on monthly reports, creating a time delay that some businesses find too slow to correct problems quickly. Real causes can be uncovered with careful analysis."},
  {q:"Which of the following is a function of financial markets?",opts:["Customer service","Borrowing and lending","Auctions","Productivity"],ans:1,exp:"A core function of financial markets is borrowing and lending of funds, which allows financial markets to exist and operate. Auctions are a type of market, not a function."},
  {q:"Data normalization involves creating a(n) __________ for all data within an organization.",opts:["anomaly set","search query","group command","standard format"],ans:3,exp:"Data normalization creates a standard format for all organizational data, enabling more accurate and efficient analyses and reducing redundancy."},
  {q:"Risk should be managed:",opts:["as a part of business strategy.","on a case-by-case basis.","through the purchase of insurance.","after an incident has occurred."],ans:0,exp:"Enterprise risk management is a plan-based business strategy. Risk managed case-by-case isn't unified; after an incident it's too late; insurance alone doesn't cover all risks."},
  {q:"A primary reason why businesses implement financial audit trails is to:",opts:["reduce risks associated with intentional data tampering.","monitor the daily activities of the securities exchanges.","ensure that financial reports are prepared quickly.","evaluate their profitability ratios."],ans:0,exp:"Audit trails record the step-by-step process of financial transactions, enabling businesses to trace unethical behavior and deter intentional data tampering."},
  {q:"Which of the following is a function of cost accounting budgets?",opts:["Understanding profitability","Controlling finances","Analyzing sources of income","Determining cash flow"],ans:1,exp:"Budgets are financial plans used to project revenue and expenses, and their primary aim is to control finances. Profitability, cash flow, and income analysis are separate functions."},
  {q:"Hank wants to meet regularly in person with other financial planners in his geographic area. Which professional organization would best meet his needs?",opts:["International Financial Planning Association","Local Society of Financial Planning Professionals","Federal Organization of Financial Planners","National Association of Professional Financial Advisors"],ans:1,exp:"A local organization is most likely to hold face-to-face meetings regularly with members in close proximity. National or international organizations may not have local chapters nearby."},

  // ── TEST 1274 ──
  {q:"Which of the following is an example of a policy that's influenced by environmental law?",opts:["Medicine must be approved to be marketed to the public.","In many places, seatbelts are required by the government.","Drinking water must meet state, provincial, and federal quality standards.","Drivers must obey posted speed limits."],ans:2,exp:"Environmental law includes regulations that protect water quality, requiring drinking water to meet standards. Seatbelts, medicine approval, and speed limits are governed by other types of law."},
  {q:"A primary responsibility of administrative law is to:",opts:["establish congressional/parliamentary committees.","interpret constitutional laws.","overturn lower courts' decisions.","enforce agency regulations."],ans:3,exp:"Administrative law deals with rules and regulations established by governmental agencies, which have authority to enact and enforce regulations for aviation, taxation, commerce, etc."},
  {q:"A public corporation's board of directors has the fiduciary responsibility to ensure the company makes decisions that protect the financial interests of:",opts:["board members.","all shareholders.","the community at large.","government entities."],ans:1,exp:"Fiduciary responsibility means acting in the best interest of benefactors. A board consists of individuals appointed to make decisions on behalf of shareholders — the company's owners."},
  {q:"Erin convinced Sebastian to invest in her business promising 10% monthly returns. Instead, she used his investment to financially reward earlier investors. What type of scheme is this?",opts:["Ponzi scheme","Prime bank scheme","Annuities scam","Predatory lending"],ans:0,exp:"A Ponzi scheme pays returns to early investors using later investors' funds rather than legitimate profits. Erin's actions fit this definition exactly."},
  {q:"Which of the following is a tax-deductible gift?",opts:["Inherited items","Stocks","Charitable donation","Vacation home"],ans:2,exp:"Charitable donations are tax-deductible gifts, reducing the donor's tax liability. Vacation homes, stocks, and inherited items are taxable gifts."},
  {q:"The Frank and Fitzer Corporation pays federal and state income tax on its earnings, and stockholders also pay taxes on dividends received. Frank and Fitzer's earnings are subject to __________ taxation.",opts:["proportional","regressive","double","progressive"],ans:2,exp:"Double (dual) taxation occurs when the same income is taxed twice — once at the corporate level and again when distributed as dividends to shareholders."},
  {q:"Which of the following statements about effective business writing is true? (1274)",opts:["A financial institution that fails compliance will avoid an audit.","Better risk management is a benefit of using technology in compliance.","Long-term thinking is a common compliance problem for financial institutions.","Growing importance of technology is a compliance problem."],ans:1,exp:"Compliance technology facilitates more communication, transparency, and risk preparation. It does not reduce the need for policies, lower costs, or decrease transparency."},
  {q:"A benefit of using technology in compliance is:",opts:["Less need for procedures and policies","Better risk management","Lower cost of implementing compliance","Decreased transparency"],ans:1,exp:"Compliance technology facilitates better risk communication and transparency, helping companies prepare for likely risks. It does not reduce need for policies or necessarily lower costs."},
  {q:"Megan is listening to her group member and says things like 'I see,' 'uh-huh,' and 'I understand.' Which active listening skill is Megan demonstrating?",opts:["Paraphrasing the message to test her understanding","Collecting all the information possible","Repeating critical information","Using a verbal acknowledgment response"],ans:3,exp:"Short verbal responses like 'I see' and 'uh-huh' let the speaker know you're actively listening. This is a verbal acknowledgment response, distinct from paraphrasing or repeating critical info."},
  {q:"Which of the following is an example of an informational message geared toward an external audience?",opts:["An inventory report","An office calendar","An employee handbook","A print advertisement"],ans:3,exp:"Print advertisements communicate product information to customers/potential customers — an external audience. Inventory reports, office calendars, and employee handbooks target internal audiences."},
  {q:"To contribute to a discussion in a useful way, you should avoid:",opts:["blurting out statements without thinking.","talking about what's on your mind.","stating opinions and stick to the facts.","paying attention when others are speaking."],ans:0,exp:"Think before speaking in discussions. You should talk about what's on your mind, share both facts and opinions appropriately, and pay attention when others speak."},
  {q:"An employee with a prominent company position regularly uses offensive language criticizing government leaders in his personal social media posts. He is putting his company at risk of:",opts:["higher corporate taxation rates.","developing a social media footprint.","developing a negative public image.","being prosecuted for defamation."],ans:2,exp:"Personal social media posts can transfer negative impressions to the employer. This builds a negative public image for the company, not a defamation prosecution of the company."},
  {q:"What is a guideline for employees to follow in handling customer inquiries?",opts:["Try to make a sale while you're answering each inquiry","Make sure you clearly understand customers' inquiries","Don't try to handle inquiries when you are busy with a sale","Spend as little time as possible answering customers' inquiries"],ans:1,exp:"Employees should clearly understand what customers are asking to give accurate answers. Inquiries should be handled as courteously as sales, spending whatever time is needed."},
  {q:"Handling customer complaints may allow a business to:",opts:["gather more accurate product and marketing information.","expand its facilities.","learn inside information about its competitors.","afford raises for all of its employees."],ans:0,exp:"Customer complaints provide valuable product and marketing information, such as frequent product issues or updated contact information for repeat customers."},
  {q:"Anna at Bank Plus developed a new customer relationship strategy emphasizing better understanding of customer needs and a recognition program for quality service. Her primary goal is likely:",opts:["Promoting the bank's new products and services","Publicly recognizing outstanding bank employees","Developing stronger long-term customer relationships","Reducing the number of forms new customers must fill out"],ans:2,exp:"By better understanding needs and rewarding quality service, Anna aims to build stronger long-term customer relationships and loyalty — the hallmark of a CRM strategy."},
  {q:"Trevor referred several friends to Catherine, his financial planner of 10 years, because she kept him updated and had his best interests in mind. The benefit to Catherine is that she:",opts:["received referrals from an existing client.","gained a positive reputation through social media applications.","obtained recognition from her colleagues.","earned a sizable commission from Trevor's investments."],ans:0,exp:"When satisfied clients recommend a financial planner to others, the planner receives referrals that expand their client base and earning potential."},
  {q:"The Middleton Company uses CRM software to categorize customers by their sales-dollar volume over a specific period. It is using __________ analytics to segment customers.",opts:["differed","profitability","product","demographic"],ans:1,exp:"Segmenting customers by sales-dollar volume analyzes their profitability to the business. Demographic segmentation considers age, gender, etc. Differed analytics is fictitious."},
  {q:"Which of the following statements about economic resources is true?",opts:["As human resources become limited, natural resources and capital goods become limited.","As capital goods and natural resources become limited, human resources become limited.","As capital goods and human resources become limited, natural resources become limited.","As natural and human resources become limited, capital goods become limited."],ans:3,exp:"Capital goods are manufactured from natural and human resources. When those inputs become limited, the production of capital goods is also limited."},
  {q:"A business periodically moves its employees from one department to another to boost morale and combat boredom. This is an example of:",opts:["task specialization.","task interdependency.","job rotation.","job security."],ans:2,exp:"Job rotation involves periodically moving employees between jobs to broaden perspective, boost morale, reduce boredom, and cross-train as backup resources."},
  {q:"The connection between the social responsibility of a business and the community is that the business's social responsibility __________ the community.",opts:["targets the area outside","targets only","has an effect on","depends upon"],ans:2,exp:"A business's social responsibility affects the community by influencing employment levels, supporting cultural activities, and contributing to worthy causes — not just targeting or depending on it."},
  {q:"Which of the following is a reason a company would decide to offer its products in other countries?",opts:["To subsidize developing countries","To expand to new, untapped markets","To provide jobs to people in other countries","To sell obsolete, outdated products"],ans:1,exp:"International expansion allows businesses to reach new markets and sell products to customers they couldn't previously reach, increasing market share and revenues."},
  {q:"Which of the following factors affects society's basic values and behaviors that influence buying decisions?",opts:["Environmental","Economic","Cultural","Political"],ans:2,exp:"Cultural factors — values, beliefs, preferences — influence buying decisions. Businesses must understand their customers' culture to avoid offending and to meet needs effectively."},
  {q:"When you accept criticism and use it in a constructive manner, it becomes:",opts:["desirable.","more frequent.","anticipated.","very valuable."],ans:3,exp:"Using criticism constructively to improve yourself makes it very valuable. Proper use should result in less frequent criticism, not more. For most, it doesn't become desirable or anticipated."},
  {q:"Writing a letter to your grandparent is an example of:",opts:["verbal communication.","nonverbal communication.","body language.","speech."],ans:0,exp:"Verbal communication is the exchange of information using words, including both writing and speech. Writing uses words, so it is verbal (not nonverbal) communication."},
  {q:"Assertive people believe that they have the right to ask other people to respond to their:",opts:["whims.","needs.","directions.","orders."],ans:1,exp:"Assertive people understand they have the right to ask others to respond to their needs, while also being able to accept legitimate refusals. Aggressive people expect responses to their whims or orders."},
  {q:"Rewards and recognition fulfill a very basic human need for:",opts:["self-esteem.","understanding.","friendship.","safety."],ans:0,exp:"Humans have a basic need to feel important and respected. Rewards and recognition help shape self-esteem and self-respect by acknowledging efforts and contributions."},
  {q:"Which of the following is an example of demonstrating integrity in your personal life?",opts:["Being honest with a friend and telling them that you dislike their outfit","Keeping the money that someone left in the ATM","Admitting to your parents when you forget to empty the dishwasher","Using a white lie as an excuse to get out of an obligation"],ans:2,exp:"Integrity includes being honest and admitting mistakes. Keeping found money, white lies, and tactless honesty do not demonstrate integrity."},
  {q:"For several months, June has felt very tired at work, has difficulty focusing, is often irritated at coworkers, and has turned in late assignments — but feels considerably better at home. June is experiencing:",opts:["employee stress.","employee burnout.","organizational change.","employee turnover."],ans:1,exp:"Burnout results from prolonged negative stress and manifests as lethargic behavior and irritability. It's distinct from general stress (shorter-term) and is specific to the work environment."},
  {q:"If you are considering the possible consequences of each decision you could make, you are:",opts:["focusing on creativity.","assessing risk.","practicing mindfulness.","staying calm."],ans:1,exp:"Assessing risk means focusing on possible consequences and outcomes of decisions and actions. This is distinct from creativity, mindfulness, or staying calm."},
  {q:"Anna's boss frequently demanded unpaid overtime, causing Anna to lose respect for her boss and seek a new job. This example demonstrates:",opts:["how fairness has little impact on decision-making.","how the justice approach to fairness is limited.","how fairness is important to professional relationships.","how a lack of empathy undermines equality."],ans:2,exp:"When someone is treated unfairly (unpaid overtime), the relationship loses respect and trust, demonstrating that fairness is essential for positive professional relationships."},
  {q:"A credit account where the purchaser makes a down payment and signs a contract for scheduled payments and finance charges describes:",opts:["Open account","Revolving credit","Layaway plan","Installment credit"],ans:3,exp:"Installment credit involves a down payment and a contract for scheduled payments, commonly used for big-ticket items. Open accounts use 30-day cycles; revolving credit has a credit limit with interest."},
  {q:"Which of the following is an example of a real estate investment?",opts:["Land to be developed in the future","A certificate of deposit","A corporate bond","Partial ownership of a corporation"],ans:0,exp:"Real estate is property such as land. CDs and bonds are lending investments; partial ownership of a corporation is stock (equity investment)."},
  {q:"Jack broke his leg snowboarding and won't work for three months. What type of insurance will help cover his living expenses while recovering?",opts:["Liability","Disability","Term life","Health"],ans:1,exp:"Disability insurance provides a percentage of wages when an employee cannot work due to illness or injury. Health insurance covers medical expenses; liability covers lawsuits; term life pays upon death."},
  {q:"Shawn wants to know if his company is staying on budget, so he looks at the difference between the budgeted amount and the amount actually spent. Shawn is analyzing a(n):",opts:["sales forecast.","asset.","expense.","variance."],ans:3,exp:"A variance is the difference between a budgeted amount and an actual amount, telling businesses where they're on track and where they're not."},
  {q:"How much will $5,000 be worth in five years if invested at an 8% compound interest rate?",opts:["$5,400","$5,045","$7,347","$8,000"],ans:2,exp:"Future Value = $5,000 × (1.08)^5 = $5,000 × 1.46933 ≈ $7,347. Add 1 to the rate, raise to power of years, multiply by principal."},
  {q:"Stefan invests $1,200 in a stock earning 9% this year. What will be the total value of his investment?",opts:["$1,200","$1,308","$1,420","$1,080"],ans:1,exp:"Interest earned: $1,200 × 0.09 = $108. Total value: $1,200 + $108 = $1,308."},
  {q:"What does an income statement show about a company over a period of time?",opts:["Profitability","Liabilities","Reliability","Equity"],ans:0,exp:"The income statement shows a company's profitability over a time period. Liabilities appear on the balance sheet; equity appears on the statement of equity; reliability is not a financial metric."},
  {q:"Seamus is calculating the value of all outstanding Google stock owned by Google's shareholders. Seamus is determining:",opts:["cash flow.","shareholder's equity.","liability.","revenue."],ans:1,exp:"Shareholder's equity = Assets − Liabilities. It represents the value of all outstanding stock owned by shareholders."},
  {q:"An investor using a securities table can learn about a stock's volatility by checking the stock's:",opts:["CLOSE.","52-Week HI/LO.","VOL.","DIV."],ans:1,exp:"The 52-week high and low show how much a stock's price has fluctuated over the past year — a measure of volatility. Volume, closing price, and dividends indicate different things."},
  {q:"A stock with a high dividend yield is typically __________ than one with a low yield.",opts:["less established","more established","less volatile","more volatile"],ans:2,exp:"A higher yield percentage indicates less volatility. A company paying dividends is seen as more established, and its stock price tends to be more stable."},
  {q:"As financial intermediaries, what is all financial institutions' primary responsibility?",opts:["Transferring money from those who have it to those who need it","Investing clients' money in mid-cap growth companies","Calculating the opportunity costs of clients' potential investments","Conducting fundamental and technical analyses to evaluate securities"],ans:0,exp:"All financial institutions serve as intermediaries by transferring money from savers (who have it) to borrowers (who need it), facilitating the flow of money through the economy."},
  {q:"Which type of financial institution facilitates the buying and selling of securities between investors?",opts:["Savings and loan associations","Brokerage firms","Insurance companies","Credit unions"],ans:1,exp:"Brokerage firms act as intermediaries between investors who buy and sell securities. S&Ls specialize in mortgages; insurance companies manage risk; credit unions are not-for-profit cooperatives."},
  {q:"Mortgages and government bonds are examples of:",opts:["interest-free services.","debt instruments.","equity products.","unrated investments."],ans:1,exp:"Debt instruments generate income through interest. Mortgages earn interest for the lender; bondholders earn interest from the issuer. Equity instruments involve ownership (e.g., stock)."},
  {q:"Which of the following is a characteristic of a call market?",opts:["Buyers and sellers determine prices.","Buy orders are made at specific times.","Trades occur continuously.","Prices change from moment to moment."],ans:1,exp:"In call markets, transactions occur at specific designated times. Analysts determine optimal prices, and all transactions occur simultaneously. Continuous trading characterizes auction markets."},
  {q:"Which of the following is an ethical principle applicable to finance?",opts:["Incrementalism","Competence","Self-interest","Framing"],ans:1,exp:"Competence — the ability to do what needs to be done with skill — is an ethical responsibility for finance professionals. Incrementalism, self-interest, and framing are ethical challenges, not principles."},
  {q:"The Money for You Bank recently merged with the Keeping You Safe Insurance Company. This is an example of __________ in the finance industry.",opts:["tactical planning","consolidation","convergence","licensing"],ans:2,exp:"Convergence occurs when financial providers from different sectors (banking + insurance) merge. Consolidation is when providers within the same sector merge (bank + bank)."},
  {q:"When a business reviews a customer's credit application, it is evaluating risks associated with the:",opts:["customer's beneficiaries.","business's reporting strategies.","business's accounting processes.","customer's ability to pay."],ans:3,exp:"Before offering credit, the business evaluates the customer's financial status — income, assets, debt ratio, credit history — to assess their ability to pay."},
  {q:"According to most analysts, the three economic indicators that stock market investors should pay closest attention to are:",opts:["gross domestic product, overhead expenses, and unemployment.","gross domestic product, unemployment, and inflation.","inflation, unemployment, and bond rates.","interest rates, overhead expenses, and inflation."],ans:1,exp:"GDP, unemployment, and inflation are the three most important economic indicators for stock market investors. Overhead expenses and bond rates are not standard economic indicators."},
  {q:"When a country is experiencing a recession, which of the following typically occurs first?",opts:["Stock prices increase","A stock market crash","A stock market recovery","Stock prices decrease"],ans:3,exp:"During recession, investors expect lower profits and sell stock, causing prices to decrease. A market crash is more extreme; a recovery indicates coming out of recession."},
  {q:"Which of the following statements about hedge funds is true?",opts:["Hedge funds involve private investment partnerships.","Government agencies usually manage hedge funds.","Investment options for hedge funds are limited in scope.","Hedge funds are designed to generate conservative financial returns."],ans:0,exp:"Hedge funds are pooled investment funds involving a limited number of investors (private partnership) requiring large minimum investments. They use aggressive strategies to maximize returns."},
  {q:"An increase in free-flowing capital is a benefit of:",opts:["global protectionism.","economic conservatism.","investor innovation.","financial globalization."],ans:3,exp:"Financial globalization involves the free flow of capital across national borders, offering equal market access regardless of home country. Protectionism hinders capital flow."},
  {q:"When preparing a statement of equity, what does a business deduct from its total net income to obtain its retained earnings?",opts:["Bad debt","Depreciation of assets","Sales tax payable","Dividends paid"],ans:3,exp:"Retained earnings are income kept after paying dividends. Depreciation, sales tax payable, and bad debt are not part of the statement of equity formula."},
  {q:"One of the benefits of marginal analysis is:",opts:["understanding the impact of sunk costs.","optimal decision-making.","improved workplace communication.","improved long-term strategy."],ans:1,exp:"Marginal analysis helps companies optimize resource use and maximize profits by selecting the best financial option. It is better for short-term than long-term decisions and doesn't focus on sunk costs."},
  {q:"Which of the following is a responsibility of a managerial accountant?",opts:["Compiling the company's financial information for release to the public","Training employees and management on personal financial literacy","Making managerial decisions regarding planning, pricing, and sales","Conducting a cost analysis and explaining the findings to management"],ans:3,exp:"Managerial accountants conduct cost analyses and explain findings to management. They don't release information publicly, make management decisions, or train on personal financial literacy."},
  {q:"In corporate governance, oversight of management, segregation of control, and policy development are all examples of: (1274 version)",opts:["tasks of the board of directors.","internal control mechanisms.","transparency in management.","external control mechanisms."],ans:1,exp:"Internal control mechanisms monitor organizational activities and make corrections. External mechanisms are controlled by outside entities like governments and trade unions."},
  {q:"Budgets are important to the management process because they:",opts:["remove the possibility of financial constraints.","shift focus from future events to daily issues.","ensure that organizational goals come before personal goals.","help determine roles and responsibilities."],ans:3,exp:"Budgets help determine roles, responsibilities, and performance measures so resources are used wisely. They don't eliminate constraints or put organizational goals above personal ones."},
  {q:"Which of the following is a cost driver that could affect the cost of internet service in a coffee shop?",opts:["Number of ingredients per product","Number of products sold","Number of direct labor hours","Number of customers"],ans:3,exp:"Internet service costs more as more people use it. The number of customers drives internet service cost. Other factors listed drive other types of costs but not internet specifically."},
  {q:"A financial information management system is often responsible for:",opts:["assisting in the preparation of financial statements.","supervising the accounting and finance departments.","purchasing raw materials for production.","developing a corporate investment portfolio."],ans:0,exp:"Financial information management systems collect, maintain, and report financial transaction data, and assist in preparing financial statements. They don't supervise departments or purchase materials."},
  {q:"Financial information management is responsible for collecting, maintaining, and reporting data about financial transactions. Business managers often use these data to:",opts:["develop secondary equity markets.","determine if liability insurance is needed.","forecast financial inflows and outflows.","calculate the level of corporate groupthink."],ans:2,exp:"Financial data from information management systems is used to forecast financial inflows and outflows, which is extremely helpful when developing a budget."},
  {q:"To guard against intentional ethical violations such as deliberate financial data tampering, an organization should maintain:",opts:["hard copies of all documents.","audit trails of data changes.","daily balance sheets.","an accounts receivable schedule."],ans:1,exp:"Audit trails record details of any financial data changes or tampering, enabling recovery and restoration of data. Hard copies of every document are unnecessary."},
  {q:"Which of the following can be used to trace a financial transaction from beginning to end to ensure data accuracy?",opts:["Accounting standards","Supply chain","Audit trail","Separation of duties"],ans:2,exp:"An audit trail allows review of all documents pertaining to a transaction to determine if recorded data are accurate or altered. Separation of duties requires multiple people to complete a task."},
  {q:"By reviewing a prospective customer's borrowing and repayment history, a business can determine if it should:",opts:["provide the prospective customer with a high credit rating.","charge sales tax.","offer credit to the prospective customer.","increase the prime lending rate."],ans:2,exp:"Credit history reveals how reliably a customer pays debts, helping the business decide whether to offer credit. Government sets the prime rate and tax requirements."},
  {q:"Which of the following statements regarding convergence and consolidation in the finance industry is true?",opts:["A desire for lower costs has slowed the pace of convergence and consolidation.","When multiple financial firms merge, they often end up with less capital to invest.","Technological advancements have increased the costs of offering new and different products.","Financial companies often enjoy higher earnings as a result of convergence and consolidation."],ans:3,exp:"Convergence and consolidation often result in economies of scale, reduced redundancy, and higher earnings. Technology has reduced costs; mergers typically result in more, not less, liquid capital."},
  {q:"One step that financial-services companies can take to protect clients' online transactions from hackers is to:",opts:["use intranet capabilities.","install firewalls.","limit the number of client transactions.","avoid encryption methods."],ans:1,exp:"Firewalls interface between the computer system and the internet, protecting sensitive information from hacking. Encryption is another tool; limiting transactions doesn't secure data."},
  {q:"When employees can retrieve only the computer data important for performing their job, the business is applying the: (1274 version)",opts:["concept of intrusion prevention.","doctrine of organizational structure.","principle of least authority.","law of diminishing capacity."],ans:2,exp:"The principle of least authority limits data access to what's needed for the job, protecting confidential information and reducing internal fraud risks."},
  {q:"Joanna is drafting a budget to determine if her construction company has enough money to start building a new high-rise, examining accounts payable and receivable. Joanna is drafting a(n) __________ budget.",opts:["static","operating","cash flow","master"],ans:2,exp:"Cash flow budgets project when cash will flow in and out. Joanna examines accounts payable/receivable — cash inflows and outflows — making this a cash flow budget."},
  {q:"Spreadsheets, database applications, and other software are often used by businesses for:",opts:["staff communication.","financial analysis.","employee recognition.","public relations."],ans:1,exp:"Spreadsheets, databases, and other software make it easier to perform financial analysis, create budgets, predict future performance, and review financial health."},
  {q:"Which of the following is a result that is likely to occur when companies take negative actions?",opts:["Increased efficiency","Excellent business reputation","High employee turnover","Bankruptcy"],ans:2,exp:"Negative actions lead to unhappy employees who look for other jobs, creating high turnover. This costs time and money in hiring and training — not increased efficiency or a good reputation."},
  {q:"Google Calendar and Microsoft Outlook are both examples of:",opts:["personal information management systems.","smartphone operating systems.","mobile geolocation tracking systems.","virtual reality applications for smart TVs."],ans:0,exp:"Personal information management systems help track important dates, meetings, and deadlines. Google Calendar and Outlook are PIM systems, not operating systems or geolocation apps."},
  {q:"What type of business record can a gift shop review to determine how many customers purchased items on Tuesday?",opts:["Cash balances","Quarterly credit statements","Inventory status records","Daily sales receipts"],ans:3,exp:"Sales receipts record each transaction and provide data including which products were purchased, dollar volume, payment method, and customer count for a specific day."},
  {q:"One of the primary purposes of information management is to provide businesses with the strategic information they need to:",opts:["create sales presentations.","develop a short-term advertising campaign.","make long-term decisions.","write an annual report."],ans:2,exp:"Information management provides strategic information for long-term planning and decision-making about growing the business over years. Creating presentations or reports is not its primary purpose."},
  {q:"Determine if the following statement is true or false: It is acceptable for a business to distribute its customers' personal information without their consent to third parties.",opts:["True; most international trade agreements include provisions allowing this.","True; after collecting it, the business owns it and can do whatever it wants.","False; it is unethical to distribute customers' personal information without permission.","False; a business that does this is breaking antitrust laws."],ans:2,exp:"Distributing customer information without consent is unethical and illegal in many jurisdictions. Trade agreements don't permit this; antitrust laws address competition, not privacy."},
  {q:"William notices that in his company's large dataset, numbers beginning with '1' are far more common than those beginning with '9.' This is an example of what universal law?",opts:["Numerical law","The law of diminishing returns","Benford's law","The law of supply and demand"],ans:2,exp:"Benford's law states that in large numerical datasets, numbers beginning with lower digits occur more frequently than those beginning with higher digits."},
  {q:"The purpose of data normalization is to:",opts:["improve data integrity.","increase data redundancy.","remove new types of data.","delete conforming data."],ans:0,exp:"Data normalization improves data integrity by reducing redundancy, removing anomalies, and making it easier to accommodate new types of data."},
  {q:"A small food market calls several vendors to obtain prices and places an order with the lowest bidder. This is the __________ buying method.",opts:["informal","competitive-bid","negotiated","standing-order"],ans:0,exp:"The informal buying method involves calling vendors for verbal prices and ordering from the lowest bidder. It reduces paperwork. Competitive-bid, negotiated, and standing-order are formal methods."},
  {q:"Employees who are responsible for paying a business's bills can help the business control expenses by:",opts:["paying bills within the discount period.","paying all bills as soon as they are received.","asking vendors to negotiate dating terms.","controlling the business's trade credit."],ans:0,exp:"Most suppliers grant discounts for early payment. Employees should pay within the discount period to save the discount amount. Paying immediately ignores extended payment periods that free up capital."},
  {q:"Operations activities are most closely related to a business's:",opts:["location.","product.","name.","taxes."],ans:1,exp:"Operations activities are most directly related to the business's product. The product affects every aspect of operations, from production to delivery."},
