<style>

* { margin: 0; padding: 0; box-sizing: border-box; }

body { font-family: 'Roboto', sans-serif; background: #fff; color: #152238; min-height: 100vh; }

@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');

#app { max-width: 720px; margin: 0 auto; padding: 40px 24px; }

#progress-bar-wrap { background: #e0e0e0; height: 4px; border-radius: 2px; margin-bottom: 32px; }

#progress-bar { background: #009b47; height: 4px; border-radius: 2px; transition: width 0.3s; }

#meta { font-size: 13px; color: #888; margin-bottom: 20px; font-weight: 500; letter-spacing: 0.5px; }

#pile-info { font-size: 13px; color: #555; margin-bottom: 12px; display: flex; gap: 16px; }

.pile-badge { padding: 3px 10px; border-radius: 12px; font-weight: 700; font-size: 12px; }

.pile-x { background: #e6f9ef; color: #009b47; border: 1px solid #009b47; }

.pile-y { background: #fff0f0; color: #c0392b; border: 1px solid #c0392b; }

.pile-u { background: #f0f0f0; color: #888; border: 1px solid #ccc; }

#question { font-size: 18px; font-weight: 500; line-height: 1.5; margin-bottom: 28px; color: #152238; }

.opt { display: block; width: 100%; text-align: left; background: #fff; border: 2px solid #e0e0e0; color: #152238; padding: 14px 18px; margin-bottom: 10px; font-size: 15px; font-family: 'Roboto', sans-serif; cursor: pointer; border-radius: 4px; transition: border-color 0.15s; }

.opt:hover:not(:disabled) { border-color: #009b47; }

.opt.correct { border-color: #009b47; background: #f0fff6; color: #152238; }

.opt.wrong { border-color: #c0392b; background: #fff5f5; color: #152238; }

.opt:disabled { cursor: default; }

#explanation { display: none; background: #f7f7f7; border-left: 4px solid #009b47; padding: 16px 18px; margin-top: 20px; font-size: 14px; line-height: 1.6; color: #333; border-radius: 0 4px 4px 0; }

#explanation.wrong-exp { border-left-color: #c0392b; }

#wrong-choice-note { display: none; background: #fff5f5; border-left: 4px solid #c0392b; padding: 12px 18px; margin-top: 12px; font-size: 14px; line-height: 1.6; color: #333; border-radius: 0 4px 4px 0; }

#next-btn { display: none; margin-top: 24px; background: #009b47; color: #fff; border: none; padding: 14px 32px; font-size: 15px; font-family: 'Roboto', sans-serif; font-weight: 700; cursor: pointer; border-radius: 4px; letter-spacing: 0.5px; }

#next-btn:hover { background: #007a38; }

#round-complete { display: none; text-align: center; padding: 60px 0; }

#round-complete h2 { font-size: 28px; font-weight: 700; color: #152238; margin-bottom: 8px; }

#round-complete p { font-size: 16px; color: #555; margin-bottom: 32px; }

#continue-btn { background: #c0392b; color: #fff; border: none; padding: 14px 36px; font-size: 15px; font-family: 'Roboto', sans-serif; font-weight: 700; cursor: pointer; border-radius: 4px; }

#continue-btn:hover { background: #a93226; }

</style>

</head>

<div id="app">

<span class="pile-badge pile-u">? Unseen: <span id="count-u">0</span></span>

</div>

<div id="meta"></div>

<div id="options"></div>

<div id="wrong-choice-note"></div>

<div id="explanation"></div>

</div>

<h2 id="round-title"></h2>

<p id="round-sub"></p>

<button id="continue-btn">Keep Going →</button>

</div>

</div>

<script>

const ALL_QUESTIONS = [

// Test 1184

{q:"Businesses must comply with regulations that limit the amount and type of pollution and waste they produce. These regulations are referred to as __________ laws.",opts:["Environmental","Antitrust","Property","Industrial"],ans:0,exp:"Environmental laws protect the natural environment—air, soil, and water—and govern how businesses dispose of waste. Noncompliant businesses may be fined or shut down."},

{q:"What form of business ownership is best to use when the business owners have difficulty acquiring enough money to pay for startup costs and initial operating expenses?",opts:["Partnership","Sole proprietorship","Franchise","Corporation"],ans:3,exp:"By starting a corporation, owners can sell stock to raise capital. A partnership is limited to the partners' resources. A sole proprietorship is owned by one person."},

{q:"An important purpose of full-disclosure laws and regulations is to:",opts:["Allow company employees to use inside information for personal gain","Provide information to investors so they can make informed decisions","Require companies to disclose all information about their operations","Prevent a stock's par value from dropping below its market value"],ans:1,exp:"Full-disclosure laws require companies to publicize any information that could affect stock value, so investors can make informed buy, hold, or sell decisions."},

{q:"Which of the following is a tax-deductible gift?",opts:["Stocks","Vacation home","Charitable donation","Inherited items"],ans:2,exp:"Charitable donations are tax deductible—the donor pays reduced or no tax depending on type and value. Vacation homes, stocks, and inherited items are taxable gifts."},

{q:"Which of the following is an example of a preventive internal control?",opts:["Physical inventories","Data reconciliations","Variance analyses","Segregation of duties"],ans:3,exp:"Preventive controls like segregation of duties attempt to prevent noncompliance from occurring. Data reconciliations, variance analyses, and physical inventories are detective controls."},

{q:"What type of technology do businesses use to inspect financial transactions and ensure compliance with government regulations?",opts:["Domain computing","Cyber mapping","Virtual auditors","Simulation browsers"],ans:2,exp:"Virtual auditors use multiple reasoning processes to identify errors affecting compliance and help businesses fix problems quickly."},

{q:"A researcher should consider an author's expertise when assessing the validity of written articles to:",opts:["Analyze the author's emotional intelligence","Verify the timeliness of the information","Evaluate the author's level of credibility","Confirm personal understanding of the information"],ans:2,exp:"A person with extensive expertise in a topic is more credible and more likely to present reliable information."},

{q:"What method of note-taking involves using headings and subheadings to record relationships and content in a multi-level structure?",opts:["Sentence","Outline","Mapping","Shorthand"],ans:1,exp:"The outline format organizes content in levels. Under each heading, the note taker writes key points that relate to that heading."},

{q:"In a formal business letter, the salutation is written:",opts:["After the body of the letter","On the front of the envelope","On the back of the envelope","Before the body of the letter"],ans:3,exp:"The salutation is a greeting written immediately before the body of the letter. It is not written on envelopes or after the body."},

{q:"What is an example of a topic addressed in an informational message?",opts:["Request for payment on a past-due account","Date and time of appointment with customer","Charitable appeal for a corporate donation","Invitation to speak at a national conference"],ans:1,exp:"Informational messages send routine information such as appointment confirmations. Requests for payment, charity appeals, and speaking invitations are persuasive messages."},

{q:"Because Caroline does not have enough time to read an entire 400-page business report, what section should she review?",opts:["Appendices","Table of contents","Executive summary","Conclusions"],ans:2,exp:"The executive summary provides an overview of the entire report and contains the most important information for those with time constraints."},

{q:"What type of information is often transmitted through upward communication?",opts:["Instructions","Suggestions","Evaluations","Corrections"],ans:1,exp:"Upward communication allows employees to send suggestions to management. Instructions, evaluations, and corrections typically flow downward."},

{q:"It is appropriate for a participant to ask questions during a staff meeting when:",opts:["S/he needs a point clarified","Another participant is speaking","The agenda is being distributed","S/he does not agree with the speaker"],ans:0,exp:"Asking for clarification is appropriate; however, interrupting another speaker or asking when the agenda is distributed is not."},

{q:"A customer asked a salesperson whether a hair dryer purchased last month could be returned or exchanged. To answer, the salesperson should be familiar with the business's:",opts:["Finances","Promotions","Policies","Products"],ans:2,exp:"Policies ensure employees make consistent decisions. Return and exchange policies guide salespeople in handling these transactions."},

{q:"Which CRM software would be most appropriate for a company looking for a more efficient way to track potential new clients?",opts:["Matching engine technology","Campaign management software","Personalization technology","Sales force automation"],ans:3,exp:"Sales force automation (SFA) technology tracks leads, prospects, and customers, and includes contact management and sales forecasting."},

{q:"What is the most common reason for a client to leave or fire his/her financial advisor?",opts:["Location of the office","Poor investment return","High commission fees","Lack of communication"],ans:3,exp:"The most common reason clients fire financial advisors is lack of communication. Clients expect regular contact, prompt replies, and account updates."},

{q:"Businesses use data-cleansing applications to:",opts:["Calculate statistical data","Update their databases","Duplicate internal records","Generate necessary reports"],ans:1,exp:"Data-cleansing removes duplicate records, updates expired data, and completes incomplete fields, keeping databases current for accurate reporting."},

{q:"Justin is deciding between a video game or concert tickets with his $50. If he chooses the video game, what is the opportunity cost?",opts:["Birthday check","Video game","Concert tickets","$50"],ans:2,exp:"Opportunity cost is the benefit lost when choosing one option over another. Justin gives up the concert tickets, so that is the opportunity cost."},

{q:"Which of the following is most likely to affect the selling price of roses?",opts:["A large number of rose bushes are killed by disease","Plants and small shrubs are also sold at the flower shop","The flower shop also carries silk flowers","A reorder shipment of roses arrives"],ans:0,exp:"Disease killing rose bushes reduces supply, which increases price. Assortment changes do not affect other products' prices."},

{q:"What must a business be organized to do to contribute to society?",opts:["Preserve the environment","Earn a profit","Sell an idea","Hire an advisor"],ans:1,exp:"Businesses contribute to society through jobs and community support, but none of this is possible unless the business is organized to earn a profit."},

{q:"Which of the following is a result of globalization?",opts:["Shrinking product life cycles","Decreased competition","Increased consumer spending","Higher productivity"],ans:3,exp:"When countries concentrate on goods where they have a production advantage, productivity goes up worldwide. Globalization also increases competition."},

{q:"What type of tax are businesses required to pay on the profits they earn?",opts:["Excise","Income","Sales","Property"],ans:1,exp:"Income tax is a tax on profit. Excise and sales taxes differ. Property tax applies to material goods, not profit."},

{q:"Allowing employees to make more decisions, set their own work pace, and supervise coworkers is considered to be job:",opts:["Rotation","Satisfaction","Enrichment","Enlargement"],ans:2,exp:"Job enrichment adds interest and satisfaction by giving employees more decision-making authority and responsibility."},

{q:"The rate of underemployed workers is often highest when a nation is experiencing an economic:",opts:["Recession","Expansion","Peak","Inhibition"],ans:0,exp:"During a recession, jobs are scarce and workers take jobs for which they are overqualified, increasing underemployment."},

{q:"Businesspeople must understand the importance of nonverbal cues when dealing internationally, which include the use of:",opts:["Proper grammar","Accurate word pronunciation","Hand gestures","Interactive feedback"],ans:2,exp:"Nonverbal communication involves gestures rather than words. A hand gesture may mean friendship in one culture and disrespect in another."},

{q:"Which of the following is a main cause of prejudice and discrimination?",opts:["A lack of knowledge about a group of people","Exposing yourself to new situations","Openly discussing bias with others","Naturally occurring differences of opinion"],ans:0,exp:"Not knowing people who are different can lead to discomfort and prejudicial thinking. Exposure and discussion decrease prejudice."},

{q:"What is Jason doing when he blames the office assistant for the out-of-stock washers?",opts:["Denying that a problem exists","Helping Susan resolve the problem","Providing Susan with a valid reason for the stock-out","Blaming another person for his mistake"],ans:3,exp:"Taking responsibility means admitting mistakes. Jason blames the office assistant but is the employee responsible for ordering the washers."},

{q:"Should Joe meet with the vendor for lunch at 1:00 p.m. at a restaurant 30 minutes away, given he must return by 2:00 p.m.?",opts:["Yes, if the vendor changes the reservation to 12:45","No, it is rude for the vendor to assume Joe has time","Yes, if Joe reschedules his training session","No, Joe would have only 30 minutes to meet before returning"],ans:3,exp:"Joe needs 30 minutes to travel, leaving only 30 minutes to meet—not enough for a one-hour luncheon before his 2:00 training."},

{q:"Typical characteristics of a person with a negative attitude are that s/he is:",opts:["Courteous and considerate toward others","Inflexible and resistant to change","Generous and helpful to others","Flexible and open to new ideas"],ans:1,exp:"Negative people tend to be inflexible and resistant to change. Positive attitudes involve being flexible, generous, and open."},

{q:"When you react defensively to criticism, the result is likely to be:",opts:["Pleasant","Sympathetic","Negative","Cooperative"],ans:2,exp:"A defensive response usually irritates the person offering criticism, triggering an unpleasant, unsympathetic, or uncooperative reaction."},

{q:"Being able to put yourself in another person's place means that you have:",opts:["Perspective","Respect","Empathy","Understanding"],ans:2,exp:"Empathy is the ability to walk in another person's shoes. Respect is esteem. Perspective is how people view life. Understanding is the ability to comprehend."},

{q:"What is the first step toward building trusting relationships?",opts:["Increasing sales","Increasing productivity","Developing ideas","Being transparent"],ans:3,exp:"Being transparent is the first step. Increased productivity, better ideas, and increased sales are benefits of transparency."},

{q:"An example of assertive verbal behavior would be:",opts:["Complimenting someone to obtain a favor","Maintaining appropriate eye contact","Initiating conversations with others","Giving a progress report in a staff meeting"],ans:2,exp:"Taking initiative to start conversations is assertive verbal behavior. Eye contact is nonverbal. Complimenting for favors is manipulative."},

{q:"Ethical behavior increases productivity and morale because it:",opts:["Makes employees want to support the organization's mission","Makes sure people are following the rules","Leads to increased profits and more product sales","Makes sure laws are never broken"],ans:0,exp:"When people behave ethically, everyone feels respected and wants to contribute. Productivity and morale rise because employees support the mission."},

{q:"When a person is inspired, s/he is:",opts:["Driven to take action","Disengaged from work","Uninterested and bored","Likely to break the rules"],ans:0,exp:"An inspired person is driven to take action and is typically more engaged and enthusiastic about work."},

{q:"Unethical actions:",opts:["Are acceptable if everyone else does them","Always have legal consequences","Are not always illegal","Only affect the person doing them"],ans:2,exp:"Being unethical doesn't always mean breaking the law. Unethical behavior can affect everyone, not just the person doing it."},

{q:"At what stage of the entrepreneurial process does an entrepreneur determine the amount of capital needed to launch the business?",opts:["Actualization","Discovery","Development","Harvesting"],ans:2,exp:"Capital needs are determined in the development stage. Discovery explores feasibility. Actualization is launching. Harvesting is exiting."},

{q:"By understanding the time value of money concept, you know that:",opts:["Saving money can buy time on debt payment","It is better to receive $101 a year from now than $100 today","It is better to receive $100 today than $101 a year from now","Time and money are related by due date"],ans:2,exp:"Money available now is worth more because of its earning potential. Receiving money later costs you the opportunity to earn interest."},

{q:"Margot wants her money, house, and cars to go to her sister when she dies. Margot should create a:",opts:["Will","Retirement fund","College savings fund","Bank account"],ans:0,exp:"A will is a legal document outlining how assets are distributed after death. Retirement funds and bank accounts don't guarantee asset distribution."},

{q:"When should you record bank transactions in your check register?",opts:["When checks bounce","When bank statements are received","As bank statements are reconciled","As soon as each check is written"],ans:3,exp:"Recording transactions as they occur prevents inaccuracies and overdrafts. Waiting can result in errors when reconciling statements."},

{q:"Which international financial institution provides financing and advice to countries to encourage economic development?",opts:["Commonwealth of Nations","Small Business Administration","World Bank Group","Liberty Institute"],ans:2,exp:"The World Bank Group provides financing and advice to impoverished countries to encourage economic development and eliminate poverty."},

{q:"Which of the following statements regarding debt and equity markets is correct?",opts:["If a company suffers financially, stockholders are paid before bondholders","Investors who purchase bonds gain partial ownership of the business","Bonds are typically less risky investments than stocks","Common stock, a debt instrument, is traded on the equity market"],ans:2,exp:"Bonds are debt instruments and typically less risky than stocks. Bondholders are paid before stockholders. Stocks, not bonds, provide ownership."},

{q:"The Money for You Bank recently merged with the Keeping You Safe Insurance Company. This merger is an example of __________ in the finance industry.",opts:["Licensing","Consolidation","Tactical planning","Convergence"],ans:3,exp:"Convergence is when financial providers from different sectors (banking and insurance) merge. Same-sector mergers are consolidation."},

{q:"When the unemployment rate rises, stock values typically:",opts:["Increase","Decrease","Stabilize quickly","Remain unchanged"],ans:1,exp:"Rising unemployment signals a possible recession. Investors sell stocks and businesses hold funds, causing stock values to decrease."},

{q:"Which of the following has contributed to financial globalization?",opts:["An increase in restrictions on foreign investment and trade","An increase in taxes on international financial transactions","A reduction in foreigners' access to domestic financial markets","A movement from fixed exchange rates to floating exchange rates"],ans:3,exp:"Moving from fixed to floating exchange rates enables capital to flow more freely across national borders, contributing to globalization."},

{q:"Which of the following is a true statement about stock information resources?",opts:["It has never been easier to find stock information","There are very few stock information sources","Only wealthy investors have access to stock information","It is very difficult to find stock information"],ans:0,exp:"A few years ago only professionals had access to in-depth stock information. Now there is a great deal of easy-to-find information available to all investors."},

{q:"Based on a securities table, Home Depot closed at $35.01 with a net change of +$0.62. Which statement is most accurate?",opts:["The previous day's closing price was $34.39","Home Depot's stock is 2.7 times higher than earnings per share","The lowest price in the last year was $18.92","An investor with 100 shares earned $27 in dividends last quarter"],ans:0,exp:"To find the previous day's close, subtract net change from today's close: $35.01 - $0.62 = $34.39."},

{q:"Certificates of deposit and collectibles are types of:",opts:["Earnings","Accounts","Securities","Investments"],ans:3,exp:"CDs and collectibles are types of investments. CDs pay guaranteed interest; collectibles may gain or lose value over time."},

{q:"When preparing a statement of changes in owner's equity, which is specifically represented on the statement?",opts:["New investments by the owner","Property taxes paid by the owner","Depreciation of company assets","Lost revenue due to discharged debt"],ans:0,exp:"New investments or withdrawals by the owner are specifically listed. Property taxes, depreciation, and lost revenue factor into net income/loss."},

{q:"Which of the following is an example of a finance professional exhibiting responsible behavior?",opts:["A financial planner asks Colin specific questions about his financial goals","Katherine tries to sell a high-risk product to earn a large commission","A financial advisor delays contacting Olivia about declining stock value","Ryan shares a client's portfolio details at a dinner party"],ans:0,exp:"Responsible planners ask questions to understand clients' goals and risk tolerance before recommending products."},

{q:"A new employee left JRB Manufacturing two weeks after completing training. The expense of training is a(n) __________ for the company.",opts:["External cost","Sunk cost","Current asset","Capital liability"],ans:1,exp:"Sunk costs are incurred and cannot be recovered. The training money spent cannot be recouped since the employee no longer works there."},

{q:"A managerial accountant can help a company market its products by:",opts:["Examining the relevant costs of advertising options","Determining whether to make or buy a component","Developing a target market analysis","Creating a budget for hiring increases"],ans:0,exp:"Managerial accountants use relevant cost analysis to help marketers decide between advertising options by comparing their costs."},

{q:"What type of variance analysis involves the difference between standard and actual costs of raw materials used for production?",opts:["Selling price","Purchase price","Material yield","Fixed overhead"],ans:1,exp:"Purchase price variance monitors variances in the price of raw materials. Material yield involves quantity variances. Fixed overhead involves unchanging expenses."},

{q:"Kenneth is easily able to guide his employees' actions by referring to his budget. This is an example of which function of budgets?",opts:["Controlling","Planning","Directing","Monitoring"],ans:2,exp:"Directing is executing goals by guiding employees' actions with the budget. Planning sets goals. Controlling compares results. Monitoring tracks progress."},

{q:"Gathering and communicating financial information for planning a business's operations is the focus of __________ accounting.",opts:["Accrual","Managerial","Financial","Equity"],ans:1,exp:"Managerial accounting obtains and analyzes financial data to help businesses make operational decisions such as budgeting and cost analysis."},

{q:"Which of the following is an example of an indirect cost in an automobile factory?",opts:["Shipping","Glass","Electricity","Assembly line workers' salaries"],ans:2,exp:"Electricity is used for many purposes throughout the factory and cannot be assigned to a specific product—it's an indirect cost."},

{q:"What is one of the main purposes of a business's sales budget?",opts:["To estimate income","To forecast trends","To predict the economy","To track the competition"],ans:0,exp:"The sales budget estimates income from goods and services, helping determine if the business will be profitable."},

{q:"Yazmin earned $5,000 from her summer job. If she invests it at 5%, how much will it be worth in two years?",opts:["$5,025.50","$10,250","$5,500","$5,512.50"],ans:3,exp:"FV = $5,000 × (1.05)² = $5,000 × 1.1025 = $5,512.50"},

{q:"What is the most negative information possible on a credit report?",opts:["Collection agency report","Late payment","Lien","Bankruptcy"],ans:3,exp:"Bankruptcy has the most negative impact on a credit report. Late payments, liens, and collection reports also appear but have less impact."},

{q:"Reports from a financial-information management system are being used to reallocate funds to improve profitability. In this situation, the reports are:",opts:["Guiding decision-making","Ensuring compliance","Improving customer service","Tracking purchasing behavior"],ans:0,exp:"Financial reports help managers make sound decisions about how to use or reallocate money to operate more efficiently."},

{q:"Pamela was dismissed for sharing her login with a coworker to access an off-limits database. Pamela failed in her responsibilities as a data:",opts:["Processor","Auditor","Sponsor","Steward"],ans:3,exp:"A data steward ensures data integrity and ethical use—only by authorized individuals. Pamela allowed unauthorized access."},

{q:"Why has online technology's use increased in financial-information management?",opts:["Protection of customers' right to privacy","Removal of electronic information exchange procedures","Recognition that transaction security is no longer an issue","Passage of laws recognizing electronic documents as legally binding"],ans:3,exp:"As laws began recognizing electronic documents and signatures as legally binding, businesses became more comfortable using online financial management."},

{q:"What computer application enables a business to access data from its ERP software for use in budgeting software?",opts:["Cross-reference","Automated data transfer","Group","Data-validation"],ans:1,exp:"Automated data transfer applications quickly move financial information stored in one program (like ERP) to another (like budgeting software)."},

{q:"Helena's manager asked her to compile a report with financial ratios including the current ratio and rate of return on equity. She should use __________ software.",opts:["Data-mining","Budgeting","Financial analysis","Field service"],ans:2,exp:"Financial analysis applications calculate and report financial ratios and compare a business's performance to competitors and industry standards."},

{q:"Tank's Trucking Company is focusing on eliminating waste and creating more value with fewer resources. Which methodology is it using?",opts:["Sustainability","Six sigma","Activity-based costing","Lean"],ans:3,exp:"Lean is a production practice focused on eliminating wasteful processes that don't add value, increasing implementation speed and productivity."},

{q:"What is the primary reason that creditors analyze their customers' financial information?",opts:["To determine how often their customers' inventory turns over","To know whether they're making a good investment","To determine the likelihood of getting paid","To understand the type of accounting method customers use"],ans:2,exp:"Creditors take risks extending credit and analyze financial information to assess whether customers are likely to repay their debts."},

{q:"Latisha is writing a list of skills, knowledge, and characteristics for a nurse position. She is working on a(n):",opts:["Onboarding activity","Job description","Strategic plan","Job specification"],ans:3,exp:"A job specification describes what a person in a position should be—their education, traits, and characteristics. A job description describes what they do."},

{q:"Marketing encourages people from different countries to __________ frequently.",opts:["Train","Trade","Think","Travel"],ans:1,exp:"Marketing creates exchanges between people and nations, encouraging frequent trade. Traveling, training, and thinking are not specifically encouraged by marketing."},

{q:"A benefit of informed decisions is that they:",opts:["Reduce a business's risk","Are usually bad decisions","Cost less money","Hurt a business's chances at competing"],ans:0,exp:"Informed decisions are better decisions that reduce a business's risk and help businesses compete more effectively."},

{q:"Why is it important for businesses to manage employee information in a way that keeps it secure?",opts:["To beat the competition","To be secretive","To be ethical","To avoid publicity"],ans:2,exp:"Businesses have an ethical obligation to protect confidential employee and customer information from becoming public and causing harm."},

{q:"A legal issue associated with the use of information might involve the violation of __________ laws.",opts:["Patent","Copyright","Trademark","Contract"],ans:1,exp:"Copyright protects books and artistic works. Using copyrighted material without permission violates copyright laws and can result in substantial penalties."},

{q:"What type of system synchronizes sales and marketing efforts?",opts:["Customer relationship management","Transaction processing","Supply chain management","Decision support"],ans:0,exp:"CRM systems accumulate and track customer activities and allow for interactions between customers and businesses to synchronize sales and marketing."},

{q:"Which is a computer-based time-management tool that helps employees track appointments and activities?",opts:["Perpetual calendar","Electronic task organizer","Instant-messaging program","Alarm clock"],ans:1,exp:"Electronic task organizers and calendars help employees track appointments and tasks, making them more efficient and productive."},

{q:"What is the first step in designing a multi-table query?",opts:["Determine the criteria","Pinpoint exactly what you want to know","Locate the correct tables","Set the correct join direction"],ans:1,exp:"The first step is determining exactly what question you want the database to answer. Without this, no other step will be successful."},

{q:"Businesses may review invoices to evaluate their customers':",opts:["Storage needs","Business plans","Purchasing habits","Selling policies"],ans:2,exp:"By analyzing past invoices, a business determines what customers are buying, when, and how much—helping forecast future sales."},

{q:"Philippe wants to find the average length of time visitors spend on his website. Which data would be most useful?",opts:["Receiving data","External data","Clickstream data","Qualitative data"],ans:2,exp:"Clickstream data includes how long people visit a website and what they do while there. External and qualitative data would not provide this."},

{q:"Halifax Retail uses computer applications to track inventory and order goods from vendors. What technology is the company using?",opts:["Customer relationship management (CRM)","Global positioning system (GPS)","Electronic data interchange (EDI)","Territorial routing application (TRA)"],ans:2,exp:"EDI systems allow businesses to transmit inventory and ordering information to and from suppliers, streamlining the purchasing process."},

{q:"The most important reason why workplace accidents that don't result in injuries should be reported to supervisors is because:",opts:["The next accident could result in an injury","This is required by state law","The report prevents future liability","This is an OSHA requirement"],ans:0,exp:"A non-injurious accident should be reported so circumstances can be corrected, potentially preventing a future injurious accident."},

{q:"What should you do when creating a schedule for your project?",opts:["Break down the work into specific activities and tasks","Figure out exactly when you will get each part done","Determine when certain parts of the project are due","Identify risks that could affect your schedule"],ans:2,exp:"When creating a project schedule, determine when certain parts are due. Breaking down tasks happens before, and risk identification happens after."},

{q:"In which stage of project management does risk analysis take place?",opts:["Closing","Initiation","Execution","Planning"],ans:3,exp:"Risk analysis takes place in the planning stage so project managers can prepare to minimize its effects. Execution is when the work is done."},

{q:"Determining project costs involves taking the information gained from assessing needed resources and:",opts:["Asking the client for at least twice as much funding","Using it for scheduling purposes","Adjusting the project purpose as necessary","Translating it into a realistic budget"],ans:3,exp:"Project costs are determined by translating resource assessment into a realistic budget with client input."},

{q:"Comparing the prices offered by different vendors for the same goods and services is what part of the purchasing process?",opts:["Price fixing","Bid analysis","Invoice payment","Receipt of goods"],ans:1,exp:"Bid analysis compares vendor prices to find the best option. Price fixing involves businesses agreeing on prices. Invoice payment is paying for received goods."},

{q:"What can you do to help your company control expenses?",opts:["Focus strictly on how much work you can get done","Follow company policies and procedures","Handle sales transactions as quickly as possible","Carry out research and development activities"],ans:1,exp:"Following company policies—like return policies—prevents losing money. Focusing only on speed or quantity can lead to costly errors."},

{q:"Which of the following is a benefit of putting your goals in writing?",opts:["Clarifies the goals","Develops your perseverance","Makes the goals attainable","Provides a challenge"],ans:0,exp:"Writing out goals helps clarify them, makes them real, and serves as a reminder. Perseverance must be developed on your own."},

{q:"Which of the following is a true statement about creativity?",opts:["Creativity is primarily demonstrated through entertainment and the arts","Only people born with a natural gift can display creativity","Creativity is a skill we only use on special occasions","People show creativity in a variety of ways"],ans:3,exp:"People show creativity in many ways, not just through arts. Creativity is a skill used regularly, and anyone can develop it."},

{q:"If a question on a job application does not apply to you, how should you respond?",opts:["Leave it blank","Make up a response","Write 'does not apply'","Write 'cannot answer'"],ans:2,exp:"Writing 'does not apply' shows you read and completed the application. Leaving it blank may suggest you forgot; 'cannot answer' implies hiding something."},

{q:"Why will it benefit you to learn as much as possible about a prospective employer before a job interview?",opts:["It prepares you to ask good questions","It shows that you do a lot of reading","It ensures that you'll be considered for the job","It gives you something to discuss during the interview"],ans:0,exp:"Research prepares you to ask intelligent questions, demonstrating your interest. It doesn't guarantee consideration or dictate what the interviewer discusses."},

{q:"What should job applicants offer to do in the closing paragraph of an interview follow-up letter?",opts:["Send an appropriate gift","Work for a reduced salary","Provide further information","Accept any available job"],ans:2,exp:"Offering to provide further information shows interest and reinforces the desire to be hired without stating it directly."},

{q:"Bobbi is responsible for calculating the risk of loss, establishing premium rates, and designing insurance policies. Bobbi works as a(n):",opts:["Underwriter","Agent","Accountant","Financial analyst"],ans:0,exp:"Underwriters calculate risk, establish premium rates, and design policies. Agents sell insurance. Analysts evaluate companies and make investment recommendations."},

{q:"Which of the following statements regarding corporate governance is true?",opts:["Corporate governance makes shareholders accountable to managers","Corporate governance emphasizes individual goals over group goals","Corporate governance aligns the interests of individuals, corporations, and society","Corporate governance is only used to protect shareholder interests"],ans:2,exp:"Corporate governance aligns the interests of all stakeholders, emphasizes group goals, and makes managers accountable to shareholders."},

{q:"One way that organizations can achieve their corporate governance objectives is by:",opts:["Encouraging employee participation at board meetings","Preventing stakeholders from viewing financial information","Allowing senior managers to serve on the board","Releasing an annual report detailing failures and losses"],ans:0,exp:"Employees should be encouraged to participate in board meetings to raise questions or concerns about company actions."},

{q:"Internal audits are used by __________, while external audits are used by __________.",opts:["Management; stakeholders","Stakeholders; employees","Creditors; management","Employees; competitors"],ans:0,exp:"Internal audits are for management to analyze risks. External audits by outside firms are used by stakeholders like investors and creditors."},

{q:"Which of the following serves as an organization's conscience during decision-making?",opts:["The public","The 'C-Suite' (CEO, CFO, etc.)","Employees","Board of directors"],ans:3,exp:"The board of directors guides the organization during decision-making to ensure it accomplishes its mission efficiently and ethically."},

{q:"Brynn serves on trade association committees, co-authors articles, and treats contacts to dinner or golf. These activities are forms of:",opts:["Advertising","Cooperating","Networking","Up-selling"],ans:2,exp:"Networking connects individuals who can help accomplish professional goals. These activities create opportunities to build beneficial professional relationships."},

{q:"How can management reduce the business's level of risk associated with ethics?",opts:["Advise employees that following ethics depends on the situation","Allow employees to follow their own set of ethics","Assume employees know what constitutes ethical behavior","Train employees about expectations in relation to workplace ethics"],ans:3,exp:"Ethics training helps employees understand the business's ethical standards and expectations, reducing the risk of unknowing violations."},

{q:"A business can protect its computerized financial data from losses associated with fire, flood, and electrical outages by:",opts:["Changing passwords and encryption techniques periodically","Installing intrusion detection systems","Performing backup procedures on a regular basis","Implementing a manual filing system"],ans:2,exp:"Regular backups stored off-site protect against loss from fire, floods, or electrical outages. Manual systems are less efficient than computer systems."},

{q:"When businesses in an industry carry risks that commercial insurance won't cover, they often form __________ to __________ risk.",opts:["Captive insurance companies; transfer","Insurance rating companies; avoid","Insurance brokerage firms; assume","Independent life insurance agencies; minimize"],ans:0,exp:"Captive insurance companies are owned by the founding organizations. By purchasing insurance through their own company, they transfer unusual risks."},

{q:"Why is the choice of a risk measure for internal and external risk of great practical importance?",opts:["It determines the maximum number of clients that can be served","It determines the minimum reserve requirements in financial trading","It identifies the types of risks the institution will encounter","It designates the audience for resulting financial reports"],ans:1,exp:"Different risk measures can result in lower or higher minimum reserve requirements, directly affecting the financial institution's profit."},

{q:"Which of the following is a true statement regarding enterprise risk management (ERM)?",opts:["All risks considered in ERM are negative","ERM focuses on the combined impact of all risks","ERM can make achieving goals more difficult","Risks usually relate to relationships between employees"],ans:1,exp:"ERM takes into account all risks (positive and negative) an organization may face and looks at their combined impact to help achieve goals."},

{q:"Setting overall goals for a business, guiding activities, and keeping the business moving toward its goals are part of the role of:",opts:["Employees","Managers","Consultants","Supervisors"],ans:1,exp:"Managers set overall goals and motivate employees to accomplish them. Employees work toward goals. Supervisors guide employees in carrying out activities."},

{q:"When your self-concept is high, you usually believe that you are a(n) __________ person.",opts:["Valuable","Unimportant","Witty","Aggressive"],ans:0,exp:"Individuals with a high self-concept believe they can make significant contributions. Feeling unimportant indicates low self-concept."},

{q:"Francesca returned to her previous car dealer because she could trust them to be honest and fair. In this case, integrity helped build:",opts:["A stable work environment","Relationships between coworkers","Francesca's personal ethics","Strong customer loyalty"],ans:3,exp:"Honesty and integrity build loyal customers who count on your company, encouraging repeat purchases."},

{q:"Determining the needs of others sometimes includes:",opts:["Making a written list of potential outcomes","Creating knowledge gaps","Treating two people differently in the same situation","Putting yourself first"],ans:2,exp:"Determining others' needs sometimes means treating people differently in the same situation—like talking to a 5-year-old differently than a 15-year-old."},

{q:"A business can protect its confidential computer information from unauthorized users by:",opts:["Conducting annual virus scans","Developing Internet message boards","Encrypting computer files","Classifying business data"],ans:2,exp:"Encryption transforms information into a secret code readable only by specified individuals, protecting it from unauthorized internal and external access."},

{q:"When you monitor projects and make appropriate corrections, this affects team members by:",opts:["Building stronger team relationships","Motivating them by reducing stress and building confidence","Discouraging them from feeling accountable","Helping them learn from their mistakes"],ans:1,exp:"When corrections keep a project running smoothly, team members feel less stressed and more capable, increasing motivation."},

{q:"Which of the following is a true statement regarding a project champion?",opts:["S/He is the same person as the project manager","S/He can mobilize the necessary resources to get the project done","S/He is usually a low-ranking employee","S/He is closely involved in the work of the project"],ans:1,exp:"The project champion is a high-ranking person who sponsors the project and can mobilize resources, but isn't directly involved in the work."},

{q:"The Taguchi quality-control method focuses on:",opts:["Reducing waste","Conformance to standards","Product design and development","Manufacturing processes"],ans:2,exp:"The Taguchi method focuses on product design and development, not on manufacturing processes or conformance to standards."},

{q:"Considered together, salaries and sales commissions are a:",opts:["Direct production cost","Capital expenditure","Semi-fixed expense","Type of payroll tax"],ans:2,exp:"Salaries and commissions together are a semi-variable (semi-fixed) expense—part fixed (salary) and part variable (commission)."},

{q:"A company's manager did not protect confidential information about a conflict between two employees. What is a likely consequence?",opts:["Costly lawsuits","Loss of clients","Damaged workplace environment","Claims of workplace discrimination"],ans:2,exp:"Disclosing employee conflict information damages workplace culture. Employees lose trust in management and may not feel unified or cooperative."},

{q:"What is the purpose of an occupational interest inventory?",opts:["It predicts your possibilities of success","It tests individual skills and training","It measures your intelligence quotient","It shows the kind of work you might like"],ans:3,exp:"Occupational interest inventories ask about preferences for work activities to identify occupations that would interest you."},

{q:"Caitlin tends to remain positive even when times are tough for her business. What characteristic of entrepreneurship is she exhibiting?",opts:["Innovation","Organization","Optimism","Determination"],ans:2,exp:"Optimistic entrepreneurs have a positive outlook and look for growth opportunities even when facing challenges and setbacks."},

{q:"What is one thing that all potential employees should do when filling out a job application?",opts:["Leave questions blank","Provide specific salary requirements","Keep applications consistent with their résumés","Fill the application out as fast as possible"],ans:2,exp:"Keeping all information consistent between résumés and applications shows organization and trustworthiness."},

{q:"Which of the following statements describes banking careers?",opts:["They can involve accepting deposits and lending funds","They primarily consist of bank tellers","They are only found at commercial banks","They are not found at credit unions or insurance companies"],ans:0,exp:"Banking careers involve many roles beyond tellers. They can be found at savings and loan associations, credit unions, and insurance companies."},

{q:"What is a benefit of corporate governance?",opts:["Ability to bypass sustainability efforts","Increased distance from investors","Improved access to capital","Freedom from stakeholder interference"],ans:2,exp:"Well-governed companies receive higher market valuations and have increased capital flows due to greater accountability and transparency."},

{q:"Which of the following is an external control used to govern companies?",opts:["Segregation of duties","Whistleblower policy","Safety laws","Managerial oversight"],ans:2,exp:"External controls are set by governments. Safety laws are external. Whistleblower policies, segregation of duties, and managerial oversight are internal."},

{q:"Which employee reports directly to a corporation's board of directors?",opts:["Chief executive officer","Accounting manager","Vice president of operations","Director of sales"],ans:0,exp:"The CEO reports directly to the board. The VP of operations reports to the CEO. Accounting and sales directors are mid-level managers."},

{q:"Where else could Eugenia include the name and date of her workshop besides the title slide?",opts:["Headers","Footers","Animations","Transitions"],ans:1,exp:"Footers appear at the bottom of slides and can include the presentation name, date, and slide numbers."},

{q:"Jan has been helping Sarah with professional advice, feedback, and encouragement. Jan is Sarah's:",opts:["Mentor","Supervisor","Editor","Companion"],ans:0,exp:"A mentor is an experienced worker who acts as a guide to less experienced workers, providing advice, feedback, and encouragement."},

{q:"Studies have shown that organizations with a strong code of conduct:",opts:["Are not honest or ethical","Have trouble attracting employees","Experience less misconduct","Experience decreased efficiency"],ans:2,exp:"Organizations with a strong code of conduct experience less misconduct, positively impacting overall performance."},

{q:"Which of the following is a possible effect of bypassing the chain of command?",opts:["Your manager will appear to be a strong communicator","You may be considered for a promotion","Other employees may not trust you","You will appear to be a strong leader"],ans:2,exp:"Going against the chain of command can damage your reputation for reliability, causing other employees to distrust your intentions."},

{q:"Which of the following is an example of acting ethically in regards to insurance?",opts:["Keeping insurance information concealed from staff","Maintaining the same policies for as long as possible","Obtaining the insurance required by law","Telling the whole truth to insurance agents"],ans:3,exp:"Risk managers must tell the truth to insurance companies. Misleading them is unethical."},

{q:"What technology can businesses use to reduce the risk of network security breaches?",opts:["Pirated software programs","Teleprompter devices","Concurrency control applications","Intrusion detection systems"],ans:3,exp:"Intrusion detection systems monitor and detect computer hacking activities that compromise the security of business computer data."},

{q:"Which of the following statements is true regarding risk retention groups?",opts:["They tend to pay higher licensing fees than traditional insurance companies","A risk retention group may insure companies from many different industries","Group members control risk by retaining equity and transferring liability","The insurance policy holders are also the company's stockholders"],ans:3,exp:"A risk retention group is owned by its members—the stockholders. As owners, they control their liability rather than transferring it."},

{q:"The entire market has just collapsed. This is an __________ risk known as a(n) __________ factor.",opts:["Internal; economic","External; economic","External; political","Internal; technological"],ans:1,exp:"A market crash is external (outside the company) and economic (a change in market conditions)."},

{q:"The ABC Corporation identifies all risks, decides which to focus on, and shares information with stakeholders. The company is practicing:",opts:["Environmental risk planning","Corporate risk organization","Competitive risk assessment","Enterprise risk management"],ans:3,exp:"Enterprise risk management involves identifying all risks, deciding which to focus on, and sharing that information with stakeholders."},

{q:"Which of the following is an example of an external financial risk that a company might experience?",opts:["Poorly produced products","Significant accounting errors","Poor budgeting and planning","Change in currency exchange rates"],ans:3,exp:"A change in currency exchange rates is outside a company's control and is therefore an external risk. Accounting errors, poor budgeting, and poor products are internal risks."},

{q:"Sheree asked her attorney to prepare a document to protect her famous chicken noodle soup recipe. This document is designed to protect Sheree's:",opts:["Copyright","Trade secret","Trademark","Patent"],ans:1,exp:"A trade secret is undisclosed information that gives a business a competitive advantage. Recipes can be protected as trade secrets."},

{q:"What is typically the most significant role of a compliance officer in a bank, investment company, or insurance company?",opts:["To ensure that the company is following financial laws","To enforce the business's code of conduct","To educate employees on industry ethics","To ensure employees follow company policies and procedures"],ans:0,exp:"Compliance officers in financial services are primarily responsible for ensuring the company follows financial laws and external regulations."},

{q:"An annual audit is an example of a(n) __________ internal control.",opts:["Corrective","Detective","Reconciliation","Preventative"],ans:1,exp:"Detective controls like annual audits identify existing financial problems. Preventive controls prevent errors. Corrective controls fix identified errors."},

{q:"Which of the following is a benefit of using artificial intelligence in compliance?",opts:["Increases costs","Increases false positives","Reduces human error","Reduces efficiency"],ans:2,exp:"AI technology increases efficiency, lowers the chance for human error, and decreases false positives in compliance systems."},

{q:"Mooreshead Bank has placed a claim on Marc's property to protect itself from financial loss if Marc can't pay back his loan. Mooreshead has secured a __________ against Marc's property.",opts:["License","Lien","Label","Ledger"],ans:1,exp:"A lien is a legal claim to a property that protects the creditor from financial loss if the borrower doesn't complete payments."},

{q:"Charlotte provides investing advice to clients, discusses their goals, and helps select investments best for them. Charlotte acts as her clients':",opts:["Credit analyst","Accountant","Fiduciary","Institutional investor"],ans:2,exp:"A fiduciary acts on behalf of another person and manages financial assets in the client's best interest."},

{q:"Robert learned about upcoming layoffs and sold his stock options before the news went public, telling friends to do the same. This is an example of:",opts:["Extortion","Corporate espionage","Corporate fraud","Insider trading"],ans:3,exp:"Insider trading occurs when someone trades stock based on non-public information. Robert's actions and tipping off friends are both illegal insider trading."},

{q:"Raheem sold an investment he owned for five years for considerably more than he paid. He is likely to owe __________ tax on the profit.",opts:["Income","Long-term capital gains","Short-term capital gains","Excise"],ans:1,exp:"Investors pay long-term capital gains tax on assets owned more than a year. Short-term applies to assets held one year or less."},

{q:"What is a benefit of having established policies for taking breaks and requesting time off?",opts:["Less confusion among employees","More power for management","More open door policies","Fewer government incentives"],ans:0,exp:"Clear policies set expectations, reducing confusion. Employees who understand break and time-off policies tend to be more productive."},

{q:"Which is a good way to end a business phone call?",opts:["Offer your email address if the caller needs additional information","List all of the points made in the call","Make small talk about the caller's day","Wait for the caller to speak before deciding the call is over"],ans:0,exp:"Providing your email creates another line of communication and politely signals the call is ending without being abrupt."},

{q:"What should be included early in a written report?",opts:["A description of the research method and findings","A broad sentence detailing numerous arguments","A listing of the printed and online sources cited","A specific sentence that highlights the main idea of the report"],ans:3,exp:"The introduction should include a specific sentence detailing the main idea or purpose of the report."},

{q:"A video conference call is a __________ channel of communication.",opts:["Lean","Rich","Slight","Detailed"],ans:1,exp:"A rich communication channel involves multiple senses (sight and hearing). A video call lets you see faces and hear voices."},

{q:"A magazine advertisement is an example of:",opts:["Word-of-mouth marketing","Publicity","A touchpoint","A brand promise"],ans:2,exp:"A touchpoint is any interaction between a business and a customer or potential customer. Ads, publicity, and word-of-mouth are all touchpoints."},

{q:"Which form of customer management is most likely to look outward and have a customer-centric focus?",opts:["Customer relationship management","Customer experience management","Structured customer management","Inverse customer management"],ans:1,exp:"Customer experience management (CEM) looks outward with a customer-centric focus. CRM tends to look inward, using touchpoints to learn about the customer."},

{q:"What is the primary role of financial planners?",opts:["To ensure businesses are compliant with government regulation","To make the most money for their own firms","To trade with other planners in the stock market","To help clients make wise investments and prepare for the future"],ans:3,exp:"Financial planners help clients make smart financial choices, particularly wise investments and preparation for the financial future."},

{q:"What is the primary purpose of customer-relationship management technology?",opts:["To compile a mass email list","To make phone calls to keep customers interested","To archive past sales only","To establish stronger connections with customers"],ans:3,exp:"CRM technology helps businesses build, maintain, and maximize long-term customer relationships through information and targeted communication."},

{q:"Businesses use marginal analysis for the purpose of:",opts:["Maximizing profit","Increasing productivity","Eliminating mistakes","Maintaining reputation"],ans:0,exp:"Marginal analysis assesses the potential benefits of a business activity compared to its costs, helping businesses make decisions that maximize profit."},

{q:"Valerie can now order her favorite beach candy online and have it whenever she wants. This is an example of how:",opts:["Utility is constant and unchanging","Place utility is not important","Business can create form utility","The Internet has changed utility"],ans:3,exp:"The Internet has changed place utility—customers can get products they want regardless of physical distance from the business."},

{q:"A company moves manufacturing to another country to pay employees much less. What reason might they use to defend themselves?",opts:["The action is acceptable in a foreign culture","The action is committed by unethical employees","The action is beneficial for employees","The action results in a negative public image"],ans:0,exp:"What is considered unethical in America may be acceptable in another culture, particularly regarding wages and working conditions in developing countries."},

{q:"A company's board of directors is often responsible for __________ and __________ the top executives.",opts:["Encouraging; shadowing","Supporting; assessing","Replacing; auditing","Promoting; networking"],ans:1,exp:"The board of directors hires, supports, and assesses the performance of top executives to ensure organizational goals are met."},

{q:"In the 1970s, OPEC increased oil prices as political protest, pushing up costs of many U.S. goods. This is an example of:",opts:["Cost-push inflation","Demand-pull deflation","Cost-push deflation","Demand-pull inflation"],ans:0,exp:"Cost-push inflation occurs when commodity prices increase, driving up the costs of related goods and services throughout the economy."},

{q:"The biggest traders of currency on the foreign exchange market are:",opts:["Individual traders","Commercial and investment banks","Investment funds","Businesses and corporations"],ans:1,exp:"Banks make up about half of forex trading volume, trading on interbank markets for clients and for speculative profit."},

{q:"Jackson is sure that no one will notice if he steals merchandise from his employer. He is facing an ethical dilemma because of:",opts:["A bad role model","A lack of consequences","Pressure from others","A desire to prove himself"],ans:1,exp:"The threat of punishment keeps most people honest. If Jackson believes he won't get caught, he may be tempted to steal."},

{q:"Which strategy can help you develop cultural sensitivity in the workplace?",opts:["Reading about different cultures","Pretending cultural differences do not exist","Asking everyone to dress the same","Joking about every culture equally"],ans:0,exp:"Educating yourself about other cultures through reading, attending cultural events, or diversity training builds cultural sensitivity."},

{q:"Which of the following is an advantage of transparent communication in the workplace?",opts:["Increased information security","Increased worker productivity","Increased employee turnover","Increased manager turnover"],ans:1,exp:"Transparent communication allows employees to ask questions and reduces misunderstandings, leading to a more productive work environment."},

{q:"Which of the following is an effective approach to negotiation?",opts:["Be willing to adjust your strategy based on the other side's approach","Do not have a specific goal or target in mind","Display strong emotional reactions","Try to trick the other side with carefully chosen language"],ans:0,exp:"Effective negotiators are aware of the other side's tactics and willing to adjust their strategy while maintaining their objectives."},

{q:"Which statement best describes office politics?",opts:["Engaging in office politics will advance your career","Office politics are negative and should be avoided","Engaging in office politics can be beneficial","Office politics are damaging to work relationships"],ans:2,exp:"Office politics exist in almost every workplace and can be beneficial when used for positive networking and relationship-building."},

{q:"How are vote taking and consensus building different?",opts:["In consensus building, every group member must agree on a decision","In vote taking, every group member must agree on a decision","In vote taking, a minority of group members make a decision","In consensus building, a minority of group members make a decision"],ans:0,exp:"In consensus building, every group member must agree before a decision is made. In vote taking, the majority rules even if some disagree."},

{q:"Why do active listeners paraphrase what a speaker has said?",opts:["To help the listeners recognize the speaker's nonverbal cues","To help the speaker learn how to speak more clearly","To show that they agree with the speaker's message","To confirm the speaker's message and show understanding"],ans:3,exp:"Paraphrasing confirms the speaker's message and demonstrates understanding. It does not necessarily indicate agreement."},

{q:"Which of the following is most likely to limit your ability to assess the long-term impact of a decision?",opts:["Negative outcomes","Personal experience","Positive outcomes","Personal bias"],ans:3,exp:"Personal bias can prevent considering the full impact of decisions. Personal experience can actually be helpful in assessing long-term impact."},

{q:"What do open-end investment funds and closed-end investment funds have in common?",opts:["They can issue an unlimited number of shares over time","They are run by professional portfolio managers","Their pricing is determined by supply and demand","They are also known as mutual funds"],ans:1,exp:"Both types must be professionally managed by an advisor registered with the SEC. Only open-end funds can issue unlimited shares; only open-end funds are mutual funds."},

{q:"Sam participates in the London Stock Exchange, where investors trade stock among themselves without involvement from issuing companies. This best describes a:",opts:["Virtual market","Primary market","Secondary market","Tertiary market"],ans:2,exp:"The secondary market is where investors trade securities after companies sold them on the primary market. It includes major stock exchanges."},

{q:"Which of the following is true about the debt market?",opts:["It is known for being unstable by nature","It is commonly called the stock market","Its participants may benefit from dividends","Its investments typically involve less risk"],ans:3,exp:"The debt market is known for lower risk and lower reward compared to the equity (stock) market. Dividends are equity market benefits."},

{q:"One risk of business consolidation is:",opts:["Growth of market share","Elimination of redundancy","Diversification of products","Clashes in corporate culture"],ans:3,exp:"When two businesses merge, different corporate cultures can clash. Without addressing these differences, the consolidation might fail."},

{q:"Clara works for a bank that now sells insurance products to its clients. This is known as a __________ arrangement.",opts:["Bait-and-switch","BATNA","Brick-and-click","Bancassurance"],ans:3,exp:"Bancassurance is the sale of insurance products by a bank, allowing banks to profit from additional revenue and increase customer satisfaction."},

{q:"A country's unemployment rate impacts the economy because when people are unemployed, they lose their:",opts:["Absolute advantage","Individual identity","Purchasing power","Corporate connection"],ans:2,exp:"Unemployed people lose income and the opportunity to contribute to the economy through purchasing power."},

{q:"James demonstrates home bias in his investments, which means he:",opts:["Is limited by the markets of foreign countries","Maintains a diversified investment portfolio","Takes advantage of increased financial globalization","Could be heavily affected by a domestic market event"],ans:3,exp:"Home bias means investing primarily in domestic equities. This concentration means a single domestic market event can heavily affect the portfolio."},

{q:"Ann-Marie is preparing an annual report. While many might look at it, her main audience is:",opts:["The CEO","Customers","Possible employees","Shareholders"],ans:3,exp:"Annual reports contain financial information required for stakeholders who have invested in the company. Shareholders are the primary audience."},

{q:"If a company wants to list securities on the New York Stock Exchange, it must select a __________ ticker symbol.",opts:["4-letter","Double digit","Unique","Color"],ans:2,exp:"Ticker symbols are unique series of characters assigned to a security—no two are the same. The NYSE uses alphabetical symbols up to three letters."},

{q:"Corinne has decided to put her money into a lending investment. Which might she choose?",opts:["Collectibles","Stocks","Bonds","Real estate"],ans:2,exp:"Bonds are lending investments where you lend money to a government or corporation at a set interest rate. Stocks, collectibles, and real estate are ownership investments."},

{q:"How can accountants demonstrate due care?",opts:["Request competitive compensation","Serve local communities for free","Refrain from making any mistakes","Engage in professional development"],ans:3,exp:"Due care means performing the role of accountant as well as possible by continuously deepening knowledge and skills through professional development."},

{q:"Which of the following is a source of cash that flows into a business?",opts:["Loans","Taxes","Payroll","Rent"],ans:0,exp:"Loans bring money into a business. Taxes, payroll, and rent are examples of cash that flow out of a business."},

{q:"Jane examined the equity statement for a company in which she invested to see her:",opts:["Par value","Retained earnings","Treasury stock","Dividends"],ans:3,exp:"Dividends are payments made to investors. Retained earnings and treasury stock appear on equity statements but belong to the company, not investors."},

{q:"The Kodiak Company does not pay dividends. In which equity statement component would this money appear instead?",opts:["Treasury stock","Outstanding shares","Retained earnings","Cash flow"],ans:2,exp:"Retained earnings reflect income the company keeps. If dividends aren't paid, that money is retained earnings."},

{q:"In general, what is the relationship between finance managers and accountants?",opts:["Finance managers determine what monetary records accountants keep","Accountants approve the decisions that finance managers make about money","Accountants record the information that finance managers need to make decisions","Finance managers rely on accountants to decide on the acquisition of funds"],ans:2,exp:"The accounting function records and generates the information needed to plan and make decisions in the finance function."},

{q:"One key difference between out-of-pocket costs and sunk costs is:",opts:["Value","Timing","Accessibility","Ownership"],ans:1,exp:"Out-of-pocket costs must be paid now or in the future. Sunk costs have already been incurred. The difference is timing."},

{q:"A manager must decide whether to make products in-house or outsource. The company's committed costs are likely to be:",opts:["Relevant costs","Irrelevant costs","Cash inflows","Cash receipts"],ans:1,exp:"Committed costs are already set aside for a future expense and cannot be altered. Since they can't be changed, they are irrelevant to the decision."},

{q:"A company is choosing between two CRM software options with different cost structures. Which technique would help determine which is more cost-effective?",opts:["Marginal analysis","Return on investment","Vertical analysis","Sales forecasting"],ans:0,exp:"Marginal analysis compares relevant costs of each alternative to determine the difference in cost, helping make the most cost-effective decision."},

{q:"What is one way in which CRM data cleansing is useful to businesses?",opts:["Data cleansing helps businesses create duplicate data","CRM software has a limited data capacity","Data cleansing helps businesses archive old data","CRM software lengthens sales cycles"],ans:2,exp:"Data cleansing archives old data and removes inaccurate/duplicate information, typically reducing wasted time and shortening sales cycles."},

{q:"Managerial accountants provide assistance to management by:",opts:["Calculating probability of risky events","Preparing financial statements for public review","Gathering information on social media trends","Accumulating data on costs and profits"],ans:3,exp:"Managerial accountants accumulate data on business costs and profits to help managers make informed decisions."},

{q:"Variance analysis documents the difference between actual and planned behavior and:",opts:["Investigates why that discrepancy occurred","Arranges this information for public review","Changes operations to address any issues","Suspends activity until numbers are aligned"],ans:0,exp:"Variance analysis identifies discrepancies and provides an explanation for why and how the difference happened."},

{q:"Material, labor, and overhead are all components that might be the focus of:",opts:["Performance evaluation","Marketing management","Variance analysis","Sales reporting"],ans:2,exp:"Variance analysis focuses on discrepancies between actual and planned behavior, including material, labor, and overhead costs."},

{q:"Cost accounting budgets allow __________ to __________.",opts:["Management; anticipate future advertising costs","Management; consider a business's total cost of production","Stakeholders; anticipate future advertising costs","Stakeholders; consider a business's total cost of production"],ans:1,exp:"Cost accounting is a form of managerial accounting providing leadership with information about total production costs (labor, materials, overhead, etc.)."},

{q:"The main difference between managerial accounting and financial accounting is the __________ of the information.",opts:["Arrangement","Scope","Audience","Quality"],ans:2,exp:"Financial accounting provides information to external audiences. Managerial accounting provides information to internal company leadership."},

{q:"In a company of 100 people, Tess's department has 10 employees and is responsible for 10% of insurance costs. This is an example of:",opts:["Cost estimate","Cost allocation","Cost per contact","Cost-effective pricing"],ans:1,exp:"Cost allocation divides costs between entities—here by headcount. 10% of employees means 10% of insurance costs."},

{q:"A successful budget should be:",opts:["Rigid","Well planned","Secret","Aggressive"],ans:1,exp:"Budgets should be well planned based on knowledge, past budgets, and external factors. They should be flexible, communicated, and realistic."},

{q:"When calculating the future value of money, you will need to know the:",opts:["Par value and interest rate","Present value and interest rate","Present value and exchange rate","Par value and exchange rate"],ans:1,exp:"FV = Present Value × (1 + Interest Rate). You need present value and interest rate. Par value applies to bonds; exchange rate applies to currency."},

{q:"Ajay just won $100. To maximize the value of his money, when should he accept it?",opts:["Now","In six months","In one year","In five years"],ans:0,exp:"The time value of money means money now is worth more than the same amount later because of its earning potential. Accept it now."},

{q:"Without accurate financial records, it is difficult to demonstrate __________ to __________.",opts:["Incentives; tax collectors","Product specifications; vendors","Product benefits; customers","Profitability; investors"],ans:3,exp:"Accurate financial records demonstrate a business's profitability to potential investors who want assurance before financing the company."},

{q:"Which of the following is a common challenge for financial-information management?",opts:["Financial managers typically use Microsoft Office for recordkeeping","Many financial data are stored in custom software and are not easily accessible","Financial-information management focuses on protecting customer financial data","Managerial accountants prepare information for use by external stakeholders"],ans:1,exp:"Many companies house financial data in custom task-specific software, making it difficult for others without that software to access it."},

{q:"Which of the following is a potential consequence of a company being accused of unethical accounting practices?",opts:["Increased employee loyalty","Stock price instability","Increased public faith","Shareholder incentives"],ans:1,exp:"When investors sell stock due to unethical accounting accusations, rapid price drops can create further instability as more investors sell."},

{q:"What is a way in which technology has improved the management of financial information?",opts:["Data are transferred instantly from information management to point-of-sale systems","The security of financial information is no longer a concern","Calculations can be completed more quickly and efficiently","The amount of time required to compare financial records has increased"],ans:2,exp:"Technology enables faster, more efficient financial calculations. Security remains a concern; data generally flows from point-of-sale to information management, not the reverse."},

{q:"What are the basic components of a business budget?",opts:["Fixed costs, variable costs, and semi-variable costs","Total revenues, total costs, and profit","Inventory, variable costs, and profits","Fixed assets, inventory, and investments"],ans:1,exp:"The basic budgeting equation is: Total Revenues - Total Costs = Profit. Fixed, variable, and semi-variable costs combine to make total costs."},

{q:"Which type of financial analysis is best for comparing a single company's historical financial information to determine trends?",opts:["Vertical analysis","Horizontal analysis","Leverage analysis","Liquidity analysis"],ans:1,exp:"Horizontal analysis compares a single company's income statements over multiple years to determine trends and forecast future performance."},

{q:"Which is a reason to calculate a company's debt-to-equity (D/E) ratio?",opts:["To compare multiple companies in different industries","To assess the level of risk involved in investing in the company","To compare the current year's performance to a previous year's","To assess the ability of a company to hire more employees"],ans:1,exp:"A high D/E ratio suggests higher investment risk because much of the financing has been done through borrowing."},

{q:"In the lean approach to accounting, inventory is treated as a(n):",opts:["Asset","Liability","Revenue","Equity"],ans:1,exp:"Unlike traditional accounting where inventory is an asset, lean accounting treats inventory as a liability because holding it requires labor, storage, and other expenses."},

{q:"Obtaining a credit score, contacting references, and calculating financial ratios are all ways to:",opts:["Determine whether a customer is worthy of purchasing on trade credit","Determine whether an investor is capable of financing a startup","Help a financial manager decide whether to open a new location","Help a financial manager decide whether to take a company public"],ans:0,exp:"These methods assess the creditworthiness of a business customer before offering trade credit."},

{q:"Liquidity ratios are most often used to determine whether a company:",opts:["Has controlled its expenses and is in a position to generate a profit","Has the resources to pay its short-term debts","Is likely to be successful in the long term","Is going to be a good investment"],ans:1,exp:"Liquidity ratios measure a company's ability to turn short-term assets into enough cash to cover short-term liabilities."},

{q:"A company uses social media to improve its response time to customer complaints. Doing so helps the company directly:",opts:["Achieve stability","Develop new goods and services","Improve customer satisfaction","Improve profitability"],ans:2,exp:"Faster response to customer complaints directly improves customer satisfaction."},

{q:"Mira is analyzing a financial statement and uses Benford's Law. What can this help her do?",opts:["Estimate business viability","Find opportunities for profit","Identify personnel issues","Detect the possibility of fraud"],ans:3,exp:"Benford's Law helps identify deviations from expected digit distribution patterns in data, which can indicate fraudulently manufactured numbers."},

{q:"Which of the following statements about data analytics is true?",opts:["Descriptive analytics provide forecasts of the future","Descriptive analytics recommend specific courses of action","Prescriptive analytics recommend specific courses of action","Predictive analytics provide descriptions of the past"],ans:2,exp:"Prescriptive analytics recommend specific courses of action. Descriptive analytics describe the past. Predictive analytics forecast possible futures."},

{q:"Which data mining method, often used in market segmentation, involves placing observable data into naturally occurring groups?",opts:["Forecasting","Prediction","Market basket analysis","Cluster analysis"],ans:3,exp:"Cluster analysis groups data points into naturally occurring clusters. When used with consumers, it creates market segments for targeted marketing."},

{q:"Which type of business records includes information on deductions, withholdings, and employee pay?",opts:["Tax records","Asset records","Customer records","Legal records"],ans:0,exp:"Tax records include employee pay, deductions, and withholdings. Asset records track depreciation. Customer records include contact info. Legal records include contracts."},

{q:"Regulations are a factor relating to which category of an environmental scan?",opts:["Demographics","Competition","Technology","Government"],ans:3,exp:"Government regulations affect organizations from the outside. Regulations are a government factor in an environmental scan."},

{q:"Which operations activity involves ensuring adequate supply without running out or holding too much?",opts:["Quality control","Inventory control","Scheduling","Logistics"],ans:1,exp:"Inventory control tracks items and balances supply to avoid stockout costs while minimizing holding costs."},

{q:"If Saeed is concerned that a data breach altered the completeness of his information, he is concerned about the __________ of the data.",opts:["Availability","Confidentiality","Integrity","Privacy"],ans:2,exp:"Data integrity involves the wholeness or completeness of data. A breach of integrity is often called data corruption."},
