<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DECA Quiz Launcher</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body{
  font-family:'Roboto',sans-serif;
  background:#fff;
  color:#152238;
  min-height:100vh;
}

@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');

#app{
  max-width:720px;
  margin:0 auto;
  padding:60px 24px;
}

h1{
  font-size:32px;
  font-weight:700;
  margin-bottom:10px;
}

.subtitle{
  color:#666;
  margin-bottom:40px;
  font-size:16px;
}

.quiz-list{
  display:flex;
  flex-direction:column;
  gap:14px;
}

.quiz-btn{
  display:block;
  text-decoration:none;
  border:2px solid #e0e0e0;
  padding:18px 20px;
  border-radius:4px;
  font-size:16px;
  font-weight:500;
  color:#152238;
  transition:all .15s;
}

.quiz-btn:hover{
  border-color:#009b47;
  background:#f6fff9;
}

.quiz-number{
  font-weight:700;
  color:#009b47;
  margin-right:8px;
}
</style>
</head>

<body>

<div id="app">

<h1>DECA Practice Tests</h1>
<p class="subtitle">Select a test to begin practicing.</p>

<div class="quiz-list">

<a class="quiz-btn" href="1.html">
<span class="quiz-number">Test 1</span> Finance Practice Exam
</a>

<a class="quiz-btn" href="2.html">
<span class="quiz-number">Test 2</span> Finance Practice Exam
</a>

<a class="quiz-btn" href="3.html">
<span class="quiz-number">Test 3</span> Finance Practice Exam
</a>

<a class="quiz-btn" href="4.html">
<span class="quiz-number">Test 4</span> Finance Practice Exam
</a>

<a class="quiz-btn" href="5.html">
<span class="quiz-number">Test 5</span> Finance Practice Exam
</a>
<a class="quiz-btn" href="6.html">
<span class="quiz-number">Test 6</span> Finance Practice Exam
</a>


</div>

</div>

</body>
</html>
