<script>
  // ---------- WebSocket push (optional) ----------
  const socket = new WebSocket('wss://yourserver.com/reload');
  socket.onmessage = (event) => {
    if (event.data === 'reload') {
      console.log('Reload triggered via WebSocket');
      location.reload(true);
    }
  };
</script>

<script>
  // ---------- Polling fallback every 1 second ----------
  let lastVersion = null;

  async function checkIndex() {
    try {
      const response = await fetch('/index.html', { cache: 'no-cache' });
      const latestContent = await response.text();

      if (lastVersion && latestContent !== lastVersion) {
        console.log('Reload triggered via polling');
        location.reload(true);
      }

      lastVersion = latestContent;
    } catch (err) {
      console.error('Could not check index.html version:', err);
    }
  }

  setInterval(checkIndex, 1000); // check every 1 second
  checkIndex(); // check immediately on load
</script>
