<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DECA Finance Quiz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Roboto', sans-serif; background: #fff; color: #152238; min-height: 100vh; }
  #app { max-width: 720px; margin: 0 auto; padding: 40px 24px; }
  #progress-bar-wrap { background: #e0e0e0; height: 4px; border-radius: 2px; margin-bottom: 32px; }
  #progress-bar { background: #009b47; height: 4px; border-radius: 2px; transition: width 0.3s; }
  #meta { font-size: 13px; color: #888; margin-bottom: 20px; font-weight: 500; letter-spacing: 0.5px; }
  #pile-info { font-size: 13px; color: #555; margin-bottom: 12px; display: flex; gap: 16px; }
  .pile-badge { padding: 3px 10px; border-radius: 12px; font-weight: 700; font-size: 12px; }
  .pile-x { background: #e6f9ef; color: #009b47; border: 1px solid #009b47; }
  .pile-y { background: #fff0f0; color: #c0392b; border: 1px solid #c0392b; }
  .pile-u { background: #f0f0f0; color: #888; border: 1px solid #ccc; }
  #question { font-size: 18px; font-weight: 500; line-height: 1.5; margin-bottom: 28px; color: #152238; }
  .opt { display: block; width: 100%; text-align: left; background: #fff; border: 2px solid #e0e0e0; color: #152238; padding: 14px 18px; margin-bottom: 10px; font-size: 15px; font-family: 'Roboto', sans-serif; cursor: pointer; border-radius: 4px; transition: border-color 0.15s; }
  .opt:hover:not(:disabled) { border-color: #009b47; }
  .opt.correct { border-color: #009b47; background: #f0fff6; color: #152238; }
  .opt.wrong { border-color: #c0392b; background: #fff5f5; color: #152238; }
  .opt:disabled { cursor: default; }
  #explanation { display: none; background: #f7f7f7; border-left: 4px solid #009b47; padding: 16px 18px; margin-top: 20px; font-size: 14px; line-height: 1.6; color: #333; border-radius: 0 4px 4px 0; }
  #explanation.wrong-exp { border-left-color: #c0392b; }
  #wrong-choice-note { display: none; background: #fff5f5; border-left: 4px solid #c0392b; padding: 12px 18px; margin-top: 12px; font-size: 14px; line-height: 1.6; color: #333; border-radius: 0 4px 4px 0; }
  #next-btn { display: none; margin-top: 24px; background: #009b47; color: #fff; border: none; padding: 14px 32px; font-size: 15px; font-family: 'Roboto', sans-serif; font-weight: 700; cursor: pointer; border-radius: 4px; letter-spacing: 0.5px; }
  #next-btn:hover { background: #007a38; }
  #round-complete { display: none; text-align: center; padding: 60px 0; }
  #round-complete h2 { font-size: 28px; font-weight: 700; color: #152238; margin-bottom: 8px; }
  #round-complete p { font-size: 16px; color: #555; margin-bottom: 32px; }
  #continue-btn { background: #c0392b; color: #fff; border: none; padding: 14px 36px; font-size: 15px; font-family: 'Roboto', sans-serif; font-weight: 700; cursor: pointer; border-radius: 4px; }
  #continue-btn:hover { background: #a93226; }
</style>
</head>
<body>
<div id="app">
  <div id="quiz-screen">
    <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
    <div id="pile-info">
      <span class="pile-badge pile-x">✓ Mastered: <span id="count-x">0</span></span>
      <span class="pile-badge pile-y">✗ Review: <span id="count-y">0</span></span>
      <span class="pile-badge pile-u">? Unseen: <span id="count-u">0</span></span>
    </div>
    <div id="meta"></div>
    <div id="question"></div>
    <div id="options"></div>
    <div id="wrong-choice-note"></div>
    <div id="explanation"></div>
    <button id="next-btn">Next →</button>
  </div>
  <div id="round-complete">
    <h2 id="round-title"></h2>
    <p id="round-sub"></p>
    <button id="continue-btn">Keep Going →</button>
  </div>
</div>
<script>
const ALL_QUESTIONS = [
  // 2011 Exam
  {q:"A basic principle of procedural due process involves __________ before taking action.", opts:["Awarding damages","Obtaining witnesses","Providing notice","Creating evidence"], ans:2, exp:"Due process requires that individuals be notified of accusations or lawsuits (providing notice). Obtaining witnesses is a pretrial activity, awarding damages is a possible remedy, and creating evidence is not part of due process."},
  {q:"Walt purchased stock based on false information from an online message board. Scammers posted the info, bought the stock, hyped it to drive up the price, then sold off, leaving Walt with worthless stock. Walt was the victim of:", opts:["A pyramid scheme","Pump and dump","Affinity fraud","Phishing"], ans:1, exp:"Pump and dump involves buying a stock, hyping it online to drive up the price, then selling at the peak—leaving victims with worthless shares. A pyramid scheme collects fees from recruits. Affinity fraud targets specific groups. Phishing steals personal info online."},
  {q:"Frank is an officer of MUD corporation who recently sold his shares of MUD stock based on confidential company information. Frank is guilty of illegal:", opts:["Affinity fraud","Insider trading","Accounting fraud","Phishing"], ans:1, exp:"Illegal insider trading occurs when corporate insiders trade their company's stock based on non-public information. Affinity fraud targets specific groups. Accounting fraud involves publishing incorrect financial statements. Phishing steals personal info."},
  {q:"Six months ago, Xander bought 500 shares at $25/share. Today he sold all 500 for $48/share. What type of tax is he obligated to pay?", opts:["Luxury tax","Capital gains tax","Excise tax","Stock sales tax"], ans:1, exp:"A capital gain is the increase in an asset's value from purchase to sale. The federal government charges capital gains taxes on most capital gains. Luxury and excise taxes are placed on specific goods. Stock sales tax is a fictitious term."},
  {q:"Which is often cited as the most significant stumbling block in achieving compliance goals within large financial organizations?", opts:["Poor data quality","Lack of training","Inadequate funding","Improper accounting system"], ans:0, exp:"Due to the size and complexity of large financial organizations, data quality is the biggest challenge. Multiple business units and product lines make it difficult to properly integrate data for compliance while retaining data quality and integrity."},
  {q:"Which quality management approach is often used in the finance industry to sustain regulatory compliance?", opts:["Just-in-Time","Six Sigma","Reassurance","Crisis management"], ans:1, exp:"Six Sigma's closed-loop control principles (define-measure-analyze-improve-control) are incorporated in compliance processes. Just-in-Time, reassurance, and crisis management are not quality management approaches used for compliance."},
  {q:"Which compliance reasoning process detects unbalanced journal entries?", opts:["Symbolic reasoning","Contextual reasoning","Temporal reasoning","Cross-source reasoning"], ans:0, exp:"Symbolic reasoning searches for known compliance exceptions including unbalanced journal entries and duplicate journal entries. Contextual reasoning examines transaction circumstances. Temporal reasoning considers timing. Cross-source reasoning compares multiple records."},
  {q:"Which potential compliance issue would temporal reasoning detect?", opts:["A travel-expense account has a credit balance at end of period rather than a debit balance","Purchase orders 2870 and 2870a from similar companies are very similar","A new customer placed an order three times larger than average","Jack temporarily changed a vendor file to divert funds to his personal account"], ans:0, exp:"Temporal reasoning considers timing of transactions, such as identifying accounts with irregular balances at the end of an accounting period. Comparative reasoning detects similar records. Contextual reasoning flags unusually large orders. Incremental reasoning detects the vendor file tampering scenario."},
  {q:"To be reimbursed for expenses, Luke must obtain a form, attach receipts, and submit to his manager. What is Luke doing?", opts:["Developing company policies","Following company procedures","Evaluating company feedback","Assessing company guidelines"], ans:1, exp:"A procedure is the step-by-step process that personnel follow performing a specific task. Policies are general rules. Luke was following the steps for reimbursement, not developing, evaluating, or assessing anything."},
  {q:"Rosemary is making a sales presentation to potential customers. What communication style is most appropriate?", opts:["Cooperative","Casual","Persuasive","Traditional"], ans:2, exp:"In a sales presentation, Rosemary must professionally encourage the audience to buy. This requires persuasive communication. Casual is for family/friends. Cooperative is for working together. Traditional is not a communication style."},
  {q:"An accounts-receivable employee places delinquent accounts into folders: 30, 60, and 90 days past due. How is the information organized?", opts:["Name","Invoice number","Location","Time"], ans:3, exp:"Each interval represents a different time frame (30, 60, 90 days), requiring different actions such as mailing notices, calling, or turning over to collections. This is organization by time."},
  {q:"Which statement is true about professional writing standards and manuals?", opts:["Employers aren't concerned about which writing style employees use","Most businesses use a different citation method for each type of report","Some employers use a different style manual than experts suggest","The most widely-used style manuals format bibliographies the same way"], ans:2, exp:"Some organizations do not use the writing style experts suggest. Employers can be very rigid about style as it affects professional integrity. Businesses do not usually change styles per report type. Each writing style formats bibliographies differently."},
  {q:"Lucille created a six-page synopsis to include at the beginning of her 224-page report. What should she call this section?", opts:["Executive summary","Bibliography","Footnotes","Results and recommendations"], ans:0, exp:"An executive summary is placed at the beginning of a long report to provide an overview. A bibliography lists sources. Footnotes appear at the bottom of pages. Results and recommendations is a specific section where the writer provides outcomes and suggestions."},
  {q:"What is the most important aspect of a company's brand promise?", opts:["Profit maximization","Consistent follow-through","Ongoing promotion","Long-term planning"], ans:1, exp:"A brand promise is an agreement to meet customers' expectations. The company must follow through consistently to fulfill it. Planning helps develop strategies, but unless carried out consistently, it's useless. Promotion maintains awareness but doesn't fulfill the promise."},
  {q:"How can a business build customers' trust and communicate its commitment to ethical practices?", opts:["Publish its confidentiality statement","Develop liberal business policies","Hire employees with a positive attitude","Post its earnings on its website"], ans:0, exp:"Publishing a confidentiality statement communicates that the business won't share customer info with third parties and takes measures to secure transactions. Other options may help trust but don't specifically communicate commitment to ethics."},
  {q:"Which scenario best illustrates a finance professional's commitment to customer service?", opts:["Ann strives to solve customer problems promptly and accurately","Patricia wears a business suit every day including casual Fridays","Jake takes a cell phone call while meeting with a customer","Gennifer uses technical jargon when speaking with customers"], ans:0, exp:"Finance professionals should respond promptly to customer needs and problems. Taking cell phone calls during meetings and using jargon are poor practices. Wearing business attire doesn't directly demonstrate customer service commitment."},
  {q:"Jonathan explains pros AND cons of his products. Hank only explains why customers should buy. Who is more likely to retain and grow his client base?", opts:["Jonathan, because he gives customers too much information","Jonathan, because his customers feel they can trust him","Hank, because he doesn't scare customers away","Hank, because he is a very optimistic, upbeat person"], ans:1, exp:"Jonathan presents himself as truthful and trustworthy. Customers return to and refer others to advisors they trust. Hank may lose clients who get angry when something goes wrong that he could have warned them about."},
  {q:"CRM data are called 'perishable' data because:", opts:["They are often duplicated","They can become inaccurate over time","They may be non-standardized or unformatted","They often contain junk or garbage"], ans:1, exp:"CRM data are 'perishable' because while true when recorded, they likely become inaccurate over time (e.g., addresses and phone numbers change). Duplication, non-standardization, and junk data are other CRM issues, but don't make data 'perishable.'"},
  {q:"Mrs. Ramirez was disconnected from a call center rep during an insurance claim. She doesn't remember the rep's name. What CRM data would most help identify the rep?", opts:["Self-provided data","Demographic data","Interaction data","Historical data"], ans:2, exp:"Interaction data contains details about phone contacts, visits, and call center interactions—including which rep assisted a customer. Demographic data is basic info like age/gender. Self-provided data is voluntarily shared info. Historical data is old data used for new purposes."},
  {q:"SuperCard International moved its customer-service function from Vancouver to Delhi, India to lower costs. What business practice is this?", opts:["Licensing","Diversification","Offshoring","Free agency"], ans:2, exp:"Offshoring is the practice of producing goods or services in foreign countries, typically moving domestic jobs overseas. Diversification spreads investments. Licensing authorizes use of IP. Free agency is an athlete's ability to renegotiate contracts."},
  {q:"A brokerage firm must implement new financial reporting activities due to regulation changes. What positive action helps employees adapt?", opts:["Hire employees knowledgeable about the regulations","Survey employees about their opinions on the changes","Revise the firm's vision statement to include regulatory importance","Educate and train employees about the regulatory changes"], ans:3, exp:"Training and education help employees understand changes so they can effectively transition to new ways of doing things. Surveys, vision statement revisions, and hiring won't directly help existing employees adapt."},
  {q:"Which of the following is an example of a subsidy?", opts:["Financial grant","Tax increase","Processing fee","Legal sanction"], ans:0, exp:"A subsidy is financial aid provided by the government. Grants are financial aid that recipients don't need to repay. Taxes, processing fees, and legal sanctions (fines) are methods governments use to acquire funds, not provide them."},
  {q:"One factor that may cause demand-pull inflation is:", opts:["A decrease in demand","A shortage of supply","A fluctuation of interest rates","A change in credit ratings"], ans:1, exp:"Demand-pull inflation results when demand exceeds supply. When there isn't enough of something, producers raise prices. Normal interest-rate fluctuations are unlikely to dramatically affect inflation. Credit ratings indicate creditworthiness."},
  {q:"A Chilean businessperson said 'Hello, Mr. Winchester. I'm happy to see your feet' instead of a proper English greeting. This is an example of a cultural issue related to:", opts:["Spatial differences","Offensive gestures","Inappropriate gift-giving","Language translation"], ans:3, exp:"Incorrect translations are embarrassing and may offend foreigners. Gestures are nonverbal actions. Gift-giving may be viewed as bribery in some cultures. Spatial issues involve personal space during interpersonal interaction."},
  {q:"Which statement is true about self-esteem?", opts:["To have high self-esteem, you must overlook your faults","Your level of self-esteem depends on your ability to accept yourself as you are","Low self-esteem usually motivates a person to try harder","To build self-esteem, you must value your abilities above others'"], ans:1, exp:"High self-esteem means accepting yourself—both positive and negative qualities—and striving to improve. High self-esteem doesn't mean overlooking faults. Low self-esteem typically makes people less likely to try due to fear of failure. Self-esteem doesn't require comparing yourself to others."},
  {q:"Which is an example of violating a coworker's privacy in the workplace?", opts:["Ruby walked away from a serious coworker discussion","Joe opened Ali's desk drawer to look for a pen while she was away","Thomas changed wording on Carrie's report with her approval","Paige sent a personal e-mail from her work computer"], ans:1, exp:"Going through coworkers' desks, files, or personal belongings violates privacy. Walking away from a discussion and making changes with approval are fine. Sending personal email from work wastes company resources but isn't an invasion of privacy."},
  {q:"Before beginning negotiations, what should you be prepared to do?", opts:["Exhibit a competitive mindset","Focus only on your interests","Minimize your expectations","Compromise on some points"], ans:3, exp:"Experienced negotiators concede small points before larger ones to maximize agreement. Focusing only on your interests and using aggressive strategies create distrust. Enter negotiations with an open mind and desire for mutually beneficial outcomes."},
  {q:"A primary difference between groups and teams is that team members _________, while group members _________.", opts:["Are personally accountable, share accountability","Function independently, function interdependently","Follow authority, assume leadership roles","Work collaboratively, work separately"], ans:3, exp:"In teams, all members collaborate, share accountability, set goals together, and assume leadership roles. In groups, there is one leader, members work separately (independently), follow the leader's rules, and are held personally accountable."},
  {q:"Eric e-mails staff that their Q3 performance exceeded goals and each will receive a $200 bonus. What technique is Eric using to motivate staff?", opts:["Public recognition","Verbal encouragement","Acknowledgment plaque","Financial incentive"], ans:3, exp:"A financial incentive such as a bonus rewards staff and encourages continued hard work. Since Eric communicated by e-mail, there's insufficient info to determine if it was public recognition or verbal encouragement. No plaque was mentioned."},
  {q:"Terri, Adele, and Jeff work in different departments but have been discussing ways to convince management to upgrade a shared outdated computer system. They have formed a:", opts:["Political coalition","Public-relations board","Departmental project team","Workplace grievance committee"], ans:0, exp:"A political coalition forms when employees come together for a single issue for a limited time to accomplish a specific goal. It's not a departmental team (they're in different departments), not grievance-related, and not public-relations focused."},
  {q:"Every pay period, Amanda places $100 from her paycheck into a savings account earning 4.5% interest. In this situation, money functions as a:", opts:["Medium of exchange","Store of value","Form of barter","Measure of income"], ans:1, exp:"Money functions as a store of value when saved rather than spent, retaining value for future purchasing power. Medium of exchange is when money buys goods/services. Bartering trades goods for goods. Measure of value assesses what one is willing to pay."},
  {q:"Zach invested $300 at 10% yearly. After year 1: $330. After year 2: $363. After year 3: $399. His investment grew as a result of:", opts:["Compounding","Opportunity cost","Banking services","Globalization"], ans:0, exp:"Compounding earns interest on interest. Each year Zach earned 10% on his original $300 plus on the interest already earned. Opportunity cost is the trade-off of choosing one alternative over another."},
  {q:"Alexander's savings account earns 1.50% interest. Using the Rule of 72, how many years to double?", opts:["108 years","15 years","36 years","48 years"], ans:3, exp:"The Rule of 72 divides 72 by the interest rate: 72 ÷ 1.50 = 48 years for Alexander's savings to double."},
  {q:"To endorse a check, the payee must sign on the:", opts:["Back of the check","Signature block of the check","Check's memo line","Check's 'Pay to the order of' section"], ans:0, exp:"Endorsement involves signing the back of the check, allowing funds to be transferred from payer to payee. The payer completes the front including the signature line and 'Pay to the order of' section. The memo line identifies the purpose."},
  {q:"Jane can determine her credit rating by:", opts:["Asking her employer for the information","Adding together her credit-card balances","Obtaining a report from a credit bureau","Applying for an account with a credit union"], ans:2, exp:"Credit reports from authorized credit bureaus contain credit ratings. Individuals validate their credit history before applying for additional credit. An employer might obtain a report but may not have the most current info. Adding balances and applying for credit union accounts don't reveal credit ratings."},
  {q:"Which type of investment institution helps firms raise funds by issuing securities?", opts:["Pension fund","Investment company","Investment bank","Securities exchange"], ans:2, exp:"Investment banks help businesses raise funds by issuing securities (stocks or bonds). Investment companies (mutual funds) pool investor funds. Pension funds pool employee contributions. Securities exchanges create opportunities to buy and sell securities."},
  {q:"Which statement regarding financial institutions is true?", opts:["Finance and insurance institutions hinder the flow of money","If money flow into an institution slows, less is available to lend or invest","Financial institutions concentrate risk among a small number of borrowers","Because each institution functions independently, one failure has little effect on others"], ans:1, exp:"When a financial institution brings in less money, it has less to lend or invest. Institutions facilitate (not hinder) money flow. They reduce risk by spreading funds among many borrowers. Institutions are interconnected—one failure can cause a chain reaction."},
  {q:"Corporate stocks, long-term government securities, state/local government bonds, and bank commercial loans are traded on the __________ market.", opts:["Spot","Money","Debt","Capital"], ans:3, exp:"Longer-term securities (maturing in more than one year) are traded on the capital market. Money market securities mature in one year or less. Bonds and loans are debt instruments but stocks are equity—both trade on the capital market. Spot market is a form of commodities market."},
  {q:"Which is a drawback of convergence and consolidation in the finance industry?", opts:["Fewer customer loans","Fewer different products","Increased customer risk","Increased liquidity constraints"], ans:2, exp:"Convergence and consolidation create 'one-stop shopping' but increase customer risk—if a customer relies on one firm for all financial needs, they suffer more if that firm has difficulties. Convergence typically provides more products, more liquid capital, and more loan availability."},
  {q:"What type of financial firm offers multiple types of financial products using one pool of capital?", opts:["Financial holding company","Universal bank and trust corporation","Fully integrated financial services provider","Consolidated cross-product parent company"], ans:2, exp:"A fully integrated financial services provider offers multiple products (loans, insurance, trust services) using one pool of capital. A universal bank uses subsidiaries with separate capital pools. A financial holding company owns subsidiaries that each have their own capital. The other options are fictitious terms."},
  {q:"Stock market returns are a(n) __________ economic indicator.", opts:["Coincident","Lagging","Leading","Acyclic"], ans:2, exp:"Stock market returns are leading indicators because the stock market typically changes before the economy does. Lagging indicators change after the economy. Coincident indicators move with the economy. Acyclic indicators have no relation to the economy."},
  {q:"What type of economic indicator are nominal interest rates?", opts:["Procyclic and lagging","Countercyclic and lagging","Procyclic and coincident","Countercyclic and coincident"], ans:2, exp:"Nominal interest rates (not adjusted for inflation) are procyclic and coincident—they move in the same direction as and at the same time as the general economy. Countercyclic indicators like unemployment move opposite to the economy. Lagging indicators change months after the economy."},
  {q:"Financial globalization helps investors reduce their exposure to:", opts:["Capital appreciation","Speculative bubbles","Regulatory liberalization","Business cycle risks"], ans:3, exp:"By investing in many countries, investors diversify risk and reduce exposure to business cycle risks in any particular country. Financial globalization seems to increase risks of speculative bubbles. Capital appreciation is a positive aspect of investing—not something to avoid."},
  {q:"To enable capital to flow more freely across national borders, many countries have:", opts:["Encouraged foreign investors to demonstrate a home bias","Moved from floating to fixed exchange rates","Increased tariffs on imports and lowered taxes on international transactions","Removed limits on foreigners' access to domestic financial markets"], ans:3, exp:"Liberalization and deregulation have increased financial globalization. Nations removed limits on foreigners' access to domestic markets. Moving from fixed to floating exchange rates (not the other way) increased global investment. Nations want investors to eliminate home biases, not demonstrate them."},
  {q:"What type of financial statement includes an accounting of shareholders' equity?", opts:["Balance sheet","Income statement","Cash flow statement","Annual report"], ans:0, exp:"The balance sheet lists assets and liabilities; the liabilities section includes shareholders' equity (assets minus liabilities). The income statement shows profitability over time. The cash flow statement tracks money flow. An annual report contains financial statements but isn't itself a financial statement."},
  {q:"Which is a well-regarded source of information about stocks?", opts:["Mediaweek","Security Dealer","Value Line","Financial Executive"], ans:2, exp:"The Value Line Investment Survey provides detailed reports on approximately 1,700 stocks. Security Dealer is for security system professionals. Mediaweek focuses on television. Financial Executive covers news for senior financial executives, not individual stocks."},
  {q:"From the securities table: Home Depot (HD), P/E 18.92, Close 35.01, Change +.62, Earnings 1.85, Div 0.95, Yield 2.7. Which statement is most likely accurate?", opts:["Home Depot's stock is 2.7 times higher than its earnings per share","The previous day's closing price was $34.39","The lowest price in the last year was $18.92","An investor with 100 shares earned $27 in dividends last quarter"], ans:1, exp:"Subtract the net change from the close: $35.01 - $0.62 = $34.39 for the previous day's closing price. The P/E (18.92) shows how much higher the price is vs. earnings. The 52-week low was $26.62. 100 shares × $0.95 dividend = $95, not $27."},
  {q:"Which insurance ensures your beneficiaries receive an inheritance?", opts:["Disability insurance","Term life insurance","Universal life insurance","Long-term care insurance"], ans:2, exp:"Universal life insurance covers you for life and lets you build savings tax-free so beneficiaries receive an inheritance. Term life covers a set period only. Disability insurance pays while you're disabled and ends when disability ends. Long-term care covers loss of independence."},
  {q:"Which is a computer application that increases efficiency of the accounts-receivable function?", opts:["Sales forecasting","Inventory valuation","Payroll taxation","Batch invoicing"], ans:3, exp:"Batch invoicing groups billable goods/services within a date range to generate invoices quickly—directly benefiting accounts receivable. Sales forecasting, inventory valuation, and payroll taxation are accounting applications not directly related to accounts receivable."},
  {q:"Which would a business classify as a current liability on its balance sheet?", opts:["Marketable securities","Interest accumulated","Production equipment","Sales-tax payable"], ans:3, exp:"Liabilities are debts owed to others. Sales-tax payable is a current liability (due soon). Marketable securities and accumulated interest are assets. Production equipment is a long-term asset."},
  {q:"Which is the most common flaw in financial-information management?", opts:["Non-financial managers have difficulty accessing needed financial data","Non-financial managers are bombarded with excess financial data","Financial-information management personnel maintain operational instead of financial data","Most large companies don't have a financial-information management system"], ans:0, exp:"Because financial data are often in disparate structures, it's difficult for non-financial managers to access them. Rather than being bombarded, most non-financial managers suffer from lack of financial data. Most large companies do have some financial-information management system."},
  {q:"A financial-information management system is often responsible for:", opts:["Assisting in preparation of financial statements","Developing a corporate investment portfolio","Purchasing raw materials for production","Supervising the accounting and finance departments"], ans:0, exp:"Financial-information management systems collect, maintain, and report transaction data; assist in preparing financial statements; support budgeting; and store/protect customer financial information. Investment portfolios are a finance department task. Raw materials purchasing is operations. The system doesn't supervise departments."},
  {q:"By protecting financial information from tampering, loss, and unauthorized use, a financial-information management professional acts as a(n) __________ of that financial information.", opts:["Interpreter","Steward","Analyst","Agent"], ans:1, exp:"Stewardship involves protecting financial data from tampering, loss, unauthorized access, and use. Interpreting or analyzing data are different functions. An agent is an intermediary who assists in sale/promotion of goods without taking title to them."},
  {q:"Which can be used to identify unethical manipulation of records in a financial-information management system?", opts:["Long-term liabilities","What-if planning","Audit trails","Direct checks"], ans:2, exp:"Audit trails record all actions including erasures—so even if someone deletes transactions, the audit trail shows it happened. What-if planning applies different assumptions to data. Long-term liabilities are debts. Direct checks verify received goods against purchase orders."},
  {q:"Which software application is commonly used when conducting financial analysis?", opts:["Database","Groupware","Spreadsheet","Presentation"], ans:2, exp:"Spreadsheets organize financial data in logical formats and allow analysis using integrated math formulas. Finance professionals use them for what-if planning. Databases store data. Groupware supports remote collaboration. Presentation software creates slide shows."},
  {q:"More consistent/up-to-date data, faster query response, and economies of scale are benefits of using a(n) __________ to store financial data.", opts:["Financial holding company","Disparate data system","Intrusion detection system","Central data repository"], ans:3, exp:"A central data repository is a comprehensive database containing financial data from across the organization. Disparate data systems have inconsistent, scattered databases. An intrusion detection system ensures security. A financial holding company owns financial subsidiaries."},
  {q:"Which contains the steps to perform data mining in the proper order?", opts:["Choose technique; define objectives; gather data; interpret; create models; use data","Create models; define objectives; gather data; interpret; choose technique; use data","Gather data; choose technique; create models; interpret; define objectives; use data","Define objectives; gather data; choose technique; create models; interpret; use data"], ans:3, exp:"Data mining steps: (1) Define objectives—why are you mining? (2) Gather and organize data. (3) Choose the data-mining technique. (4) Search for patterns and create models. (5) Interpret and validate data. (6) Use the data as specified in objectives."},
  {q:"Which question would be the LEAST difficult to answer using data mining techniques?", opts:["What product will a particular customer order next?","When will this customer place his/her next order?","Why did this customer move her checking account to another bank?","What makes some customers a better credit risk than others?"], ans:3, exp:"Data mining excels at classifying groups—like identifying what differentiates good credit risks from bad ones. It's less effective for pinpointing individual customer behavior (predicting one person's next order, timing, or motivations), where probability models work better."},
  {q:"A small-business owner's budgeting software connects directly to his bank accounts so it downloads expenses automatically. This feature is commonly known as automatic:", opts:["Tracking","Back up","Alerts","Affirmation"], ans:0, exp:"Automatic tracking transmits expense information from the bank to the budgeting application without human intervention. Automatic back-up saves files regularly. Alerts remind users of upcoming payments. Affirmation refers to a present or desired strength."},
  {q:"Which statement regarding business budgeting software is true?", opts:["Most budgeting software can measure the impact of different actions on the budget","Creating line-item projections using budgeting software is extremely time-consuming","Budgeting software makes it difficult to adapt to changing economic conditions","Most budgeting software is appropriate for both business and personal use"], ans:0, exp:"Budgeting software lets owners see the impact of different actions on a budget. It actually shortens the time for line-item projections compared to spreadsheets. Budgeting software is more nimble—easier to adapt to changing conditions than spreadsheets. Many programs are designed for either business or personal use, not both."},
  {q:"Helena's manager asked for a report with financial ratios including current ratio and rate of return on equity. To create it, Helena should use __________ software.", opts:["Budgeting","Financial analysis","Data mining","Field service"], ans:1, exp:"Financial analysis software calculates and reports financial ratios, compares performance to competitors/industry standards, and increases productivity. Budgeting software manages budgets. Data mining finds patterns in large datasets. Field service software is for service teams working outside the office."},
  {q:"Shelley's business uses financial analysis software to align operational and long-term plans and develop key performance indicators. This supports which business activity?", opts:["Cost and profitability management","Payment behavior analysis","Financial and management reporting","Strategic management and scorecards"], ans:3, exp:"Strategic management and scorecards involves aligning plans and developing key performance indicators to monitor overall performance. Payment behavior analysis evaluates payment histories. Financial and management reporting creates reports for managers. Cost and profitability management allocates overhead costs."},
  {q:"Jill needs to find several records with similar but not identical information in her company database. She should use a(n) __________ query.", opts:["Action","Crosstab","Sum function","Wildcard"], ans:3, exp:"Wildcard queries use symbols (like *) to represent unknown characters—finding all records beginning with 'Jac' for example. Crosstab queries group data into rows/columns. Action queries insert, update, or delete entries."},
  {q:"Managers often use financial data and reports to determine a business's profitability, competitiveness, and:", opts:["Personal net worth","Human resources needs","Internal accounting controls","Operational inefficiencies"], ans:3, exp:"Inefficiencies arise when businesses spend too much to produce goods/services, making financial reports useful for identifying them. Financial reports are less helpful for HR needs and internal accounting controls. Personal net worth applies to individuals, not companies."},
  {q:"Which is a likely consequence of reporting inaccurate financial data to lenders and investors?", opts:["Two-for-one stock splits","A large influx of capital","Civil and/or criminal penalties","An economic contraction"], ans:2, exp:"Misleading lenders and investors with inaccurate financial data can result in civil and/or criminal penalties for executives and financial managers. Inaccurate data won't cause a stock split. One company's actions are unlikely to cause economic contraction."},
  {q:"Which statement regarding accounting and finance is correct?", opts:["Accounting focuses on the past, while finance focuses on the future","Accounting is much broader than finance, which focuses on investments","Financial managers typically report to the vice president of accounting","The finance department focuses on assets, while accountants track liabilities"], ans:0, exp:"Accountants track/analyze past financial transactions. Finance uses that information to predict and plan for the future. Finance (broader than accounting) focuses on money, capital markets, investments, and financial management. Private accountants report to a controller who reports to the VP of finance."},
  {q:"What field of accounting develops very detailed, specialized internal reports for managers as frequently as necessary?", opts:["Accrual","Financial","Tax","Managerial"], ans:3, exp:"Managerial accountants provide highly detailed, specialized financial information to internal users (officers and managers) as frequently as needed for specific decisions. Financial accountants report to external users quarterly/annually. Tax accountants prepare returns. Accrual is a recording method, not a field."},
  {q:"Auto mechanics and attorneys are likely to use a __________ cost accounting system.", opts:["Job order","Process","Consumer","Cyclic"], ans:0, exp:"Job order cost accounting tracks costs to specific jobs. Attorneys charge each client for specific expenses; mechanics charge each client individually. Process cost accounting works for businesses producing standard products continuously. Consumer and cyclic are fictitious terms."},
  {q:"Which is a trend that financial information can be used to identify?", opts:["A bakery's artisan breads are growing in popularity","Jeannie ordered a red velvet birthday cake for her father","The delivery truck typically arrives 10 minutes early","Customers say sourdough bread tastes better than rye bread"], ans:0, exp:"Financial information helps identify which products are most/least profitable and which are growing in popularity and sales. A single customer's order is not a trend. Delivery timing trends are found through operational data, not financial information. Customer taste preferences come from marketing research."},
  {q:"Which financial tool is often used to identify trends?", opts:["Financial ratios","Accrual accounting","Financial goals","Actuaries"], ans:0, exp:"Many use financial ratios to identify trends—comparing each ratio over time (monthly, quarterly, annually) and against industry competitors. Accrual accounting is a recording method. Financial goals are money-measured objectives. Actuaries assess financial impact of risk."},
  {q:"Bonnie is determining whether to extend credit to a potential business customer. The customer's trade reference information should include:", opts:["The current balance the customer owes to each existing supplier","The name of the purchasing agent who buys from suppliers","The articles of incorporation for each supplier","A list of items the business typically purchases from each supplier"], ans:0, exp:"Trade references from 3-4 existing suppliers should provide credit line, high balance, current balance, and payment history. This helps determine creditworthiness. The purchasing agent's name, articles of incorporation, and product lists are not typically needed for credit evaluation."},
  {q:"Kramer Bank's software identifies additional business opportunities with commercial customers. The bank should share these opportunities with personnel who specialize in:", opts:["Risk management and sales","Relationship management and sales","Relationship management and pricing","Risk management and pricing"], ans:1, exp:"Cross-selling opportunity information goes to relationship management and sales professionals who can then pursue additional business with existing customers. Risk management and pricing personnel are not typically involved in pursuing cross-selling opportunities."},
  {q:"IHF Company doesn't have enough cash for payroll but expects a large customer payment in four weeks. They'll obtain a short-term loan. By analyzing financial data, management was able to identify:", opts:["Ways to reduce the cost of credit","Methods to reduce expenses","Possible investment opportunities","Financial risks and deficiencies"], ans:3, exp:"By analyzing financial data, management determined the company faces a risky situation—insufficient cash to pay employees. This identifies a financial risk/deficiency, prompting them to temporarily borrow capital to cover expenses."},
  {q:"What technology is most effective to interview a job applicant 1,500 miles away?", opts:["Intranet","Text messaging","Web-based e-mail","Videoconferencing"], ans:3, exp:"Videoconferencing allows the interviewer to see the applicant and their reactions to questions. Text messaging and e-mail involve typing and don't allow seeing or hearing the applicant. An intranet is a business's internal computer network."},
  {q:"A financial-services company allocates earnings to a college scholarship fund for business students. This demonstrates:", opts:["Personal competence","Corporate responsibility","Due diligence","Profit orientation"], ans:1, exp:"Corporate/social responsibility involves contributing to society's well-being. Charitable donations and scholarship funds demonstrate support for the community, reinforcing reputation. Personal competence is an individual's job ability. Due diligence is researching options before acting."},
  {q:"To find an article called 'The Truth About Commercial Interest Rate Increases,' which search entry gives most accurate results?", opts:['[-the -truth -about -commercial -interest -rate -increases]','{ truth_ commercial interest rate_ increases}','"the truth about commercial interest rate increases"','"{-the_truth_about_commercial_interest_rate_increases-}"'], ans:2, exp:"Placing quotes around a phrase tells the search engine to show results containing that exact phrase. Dashes mean 'exclude this word.' Underscores and parentheses are less likely to retrieve exact results."},
  {q:"Before Pedro includes someone else's journal article about portfolio diversification in his e-newsletter, what must he do?", opts:["Request the trademark registration code from the originator","Acknowledge the author in the republished article","Obtain written permission from the copyright owner","Inform the patent agency that he wants to publish the article"], ans:2, exp:"To avoid copyright infringement, contact the copyright owner for written permission to reprint. Trademarks protect symbols/designs/words. Patents protect inventions. Simply acknowledging the author is not sufficient without permission."},
  {q:"Claire receives many emails daily. A client sent a request for info not available until next week. What should Claire do to remind herself?", opts:["Place the client's name in her address book","Flag the message for follow-up","Forward the message to her supervisor","Move the message to her spam folder"], ans:1, exp:"The follow-up flag/function reminds the recipient to follow up later, often color-coded so flagged messages stand out. Forwarding to a supervisor shifts responsibility inappropriately. Spam folders are for junk mail. Adding to the address book doesn't create a reminder."},
  {q:"A company mailed to 20,000 customers; 3,241 pieces were returned costing $1,100 in postage due to wrong addresses. The company could have avoided this by:", opts:["Paying for express mail instead of bulk-mail","Calling customers a few days before mailing","Requesting alternate addresses from the post office","Continuously updating their customers' contact information"], ans:3, exp:"Continuously updating customer contact information prevents outdated addresses. Calling 20,000 customers is impractical. The post office may not have all forwarding addresses. Express mail would cost even more. The mailing method doesn't fix incorrect addresses."},
  {q:"Because a business didn't maintain air-circulation systems, employees were exposed to dangerous chemicals. The government is likely to fine the business for:", opts:["Failing to secure property","Disregarding storage standards","Violating health regulations","Breaking product-safety laws"], ans:2, exp:"Laws require businesses to maintain building systems to ensure employee/customer safety. Employees exposed to dangerous chemicals indicates a health regulation violation. There's insufficient information to determine if storage or property security is the issue. The situation doesn't involve product safety."},
  {q:"An important reason why employees should follow instructions when using heavy machinery is to:", opts:["Avoid serious injury","Eliminate ongoing problems","Stop malfunctions from occurring","Reduce production conflicts"], ans:0, exp:"Machinery can be dangerous—improper handling can seriously injure employees and damage equipment at great cost. Following instructions will not eliminate all problems or stop all malfunctions from occurring."},
  {q:"Ingrid must analyze a completed project by comparing results with objectives. What process will she use?", opts:["Internal audit","Administrative appraisal","Team review","Productivity evaluation"], ans:0, exp:"An internal audit evaluates all aspects of a project—resource utilization, team productivity, process efficiency, and stakeholder satisfaction by comparing objectives with actual results. The findings help develop 'lessons learned' for future similar projects."},
  {q:"Why does Dan order extra copy paper, post-it notes, and printer ink when placing supply orders?", opts:["To ensure product quality","To prevent stockouts","To meet minimal expectations","To reduce the need to forecast"], ans:1, exp:"Safety/buffer stock is extra inventory ordered to prevent stockouts. When supplies run out, employees can't perform their jobs. Dan would order exactly what's needed if only meeting minimal expectations. Extra stock doesn't ensure quality or reduce the need to forecast."},
  {q:"Stan listens to staff suggestions and implements many of their ideas for improvement to 'do the job right the first time.' What is Stan doing?", opts:["Supporting external resources","Creating a quality culture","Developing new products","Reorganizing priorities"], ans:1, exp:"A quality culture believes every employee has valuable ideas. It nurtures an environment where all employees are committed to quality standards and look for improvement. This involves nurturing creativity, streamlining processes, and improving goods and services."},
  {q:"True or false: Employers are more concerned with employees' job skills than with personal appearance.", opts:["False – appearance can influence customers' perceptions about the company","False – employers are most concerned with ability to work well with others","True – employees must have skills because most employers don't have training resources","True – clothing and hygiene are not as important as efficiency levels"], ans:0, exp:"While employers want job skills and interpersonal skills, personal appearance is also critical. Appearance reflects company image and influences customers' perceptions and buying decisions. Most employers must still provide some training even when hiring skilled employees."},
  {q:"Before you can collect information about a problem, you must first:", opts:["Solicit others' input","Evaluate solutions","Brainstorm ideas","Define the problem"], ans:3, exp:"The first step in problem solving is defining what the problem is. After defining it, you collect and analyze information, solicit input, brainstorm ideas, and then select, implement, and evaluate the solution."},
  {q:"To develop a professional-looking résumé, the writer should:", opts:["Proofread the document for spelling errors","Organize information in chronological order","Begin by describing work history","Create interest by using colorful text"], ans:0, exp:"Professional résumés are uncluttered, concise, and error-free. Employers view spelling/grammar errors as indicating a lack of attention to detail. The organizational order depends on the individual's preferences and experience. Colorful text can be distracting."},
  {q:"Bobbi calculates risk of loss, establishes premium rates, and designs insurance policies. Bobbi works as a(n):", opts:["Accountant","Underwriter","Agent","Financial analyst"], ans:1, exp:"Underwriters calculate risk of loss, establish premium rates, and design policies. Insurance agents sell policies. Accountants prepare and verify financial data. Financial analysts evaluate companies and recommend buying/selling securities."},
  {q:"Which is NOT essential to having a successful career?", opts:["Learning to work well with others in teams","Accepting responsibility at work when you make a mistake","Communicating clearly both verbally and in writing","Knowing the right people that will get you your first job"], ans:3, exp:"While knowing people in your desired industry can be helpful, it is not essential. Accepting responsibility, communicating clearly, and working well with others are all essential skills for career success."},
  {q:"Chartered Financial Analysts (CFAs) possess extensive knowledge of:", opts:["Banking services","Securities and investments","Insurance","Entrepreneurship"], ans:1, exp:"The CFA designation (offered by the CFA Institute) requires 4 years of investment work experience, ethics commitment, and passing exams on portfolio management, types of investments, financial reporting, and economics."},
  {q:"Which topic is most likely included on a certification exam for accounting professionals?", opts:["Law of diminishing returns","Actuarial science","Futures and swaps","Auditing and assurance"], ans:3, exp:"Accountants offer auditing and assurance services, verifying that financial records are accurate and properly maintained. Actuaries work in insurance/finance assessing risk. Futures and swaps are more relevant to investment professionals. Law of diminishing returns is economics."},
  {q:"Which professional relationship is most likely to be successful?", opts:["Competing financial planners socialize at association meetings","An investment planner takes donuts to a tax accountant every Monday","A trust officer sends birthday and holiday cards to her clients","A real estate agent and an insurance broker refer clients to each other"], ans:3, exp:"Relationships that benefit everyone involved are most likely to survive and succeed. Mutually referring clients creates substantial mutual benefit. Social activities, donuts, and cards can build relationships but aren't as likely to create enduring, mutually beneficial ones."},
  {q:"To build professional relationships, Brynn serves on trade association committees, co-authors articles, and treats contacts to dinner or golf. These are forms of:", opts:["Advertising","Cooperating","Networking","Up-selling"], ans:2, exp:"Networking connects individuals who might help accomplish career goals. Cooperating shows willingness to work together to resolve differences. Advertising is paid nonpersonal presentation. Up-selling suggests higher-priced alternatives to customers."},
  {q:"Which is most likely an unethical risk management activity?", opts:["Securing fair, favorable premium rates from insurers","Paying a share of loss exposures pooled through insurance","Reporting that an employee is embezzling","Withholding pertinent information from insurance underwriters"], ans:3, exp:"Withholding or misrepresenting information to underwriters to get lower premiums is highly unethical and causes long-term problems. Securing fair rates ethically is acceptable. Paying appropriate loss shares is required. Reporting embezzlement is good ethical risk management."},
  {q:"Sarta Company's RMIS contains a master list of all claims, claim status data, and exposure bases like payroll and number of employees. These data are likely in the __________ section.", opts:["Risk map","Property exposure","Liability","Catastrophe modeling"], ans:2, exp:"The liability section of an RMIS houses claims data, exposure base information (payroll, number of employees, vehicles), and liability insurance coverage terms. Property exposure lists company properties. A risk map determines likelihood of risks. Catastrophe modeling estimates disaster losses."},
  {q:"Risk managers use computerized catastrophe modeling to estimate losses from:", opts:["Hurricanes, earthquakes, and terrorist attacks","Hurricanes, embezzlement, and terrorist attacks","Robberies, embezzlement, and terrorist attacks","Robberies, embezzlement, and sexual harassment claims"], ans:0, exp:"Catastrophe modeling estimates losses from natural disasters and significant calamities like terrorist attacks. While risk managers analyze robberies, embezzlement, and harassment claims, they don't use specialized catastrophe modeling software for these risks."},
  {q:"Risk retention groups are typically only allowed to offer __________ insurance coverage.", opts:["Liability","Life","Homeowners","Health"], ans:0, exp:"Risk retention groups are liability insurance companies owned by their members (businesses, professionals, municipalities unable to get traditional liability insurance). They offer errors and omissions, malpractice, directors/officers, product liability, etc. They're not permitted to offer life, homeowners, or health insurance."},
  {q:"Vanessa developed guidelines for her fitness center (medical history, equipment instructions, CPR certification) hoping to avoid __________ lawsuits.", opts:["Private nuisance","Negligence","Breach-of-contract","Discrimination"], ans:1, exp:"Negligence lawsuits occur when a business fails to protect customers from harm. Risk managers develop policies and procedures to protect customers and avoid negligence claims. Private nuisance involves disrupting peaceful home life. Breach-of-contract involves failing to fulfill promises."},
  {q:"A company installs automatic sprinklers in all its facilities. Which technique is used to combat the internal threat of fire?", opts:["Loss reduction","Loss avoidance","Loss prevention","Risk transfer"], ans:0, exp:"Loss reduction lessens the impact of a loss after it occurs—sprinklers won't prevent fires but minimize damage when they occur. Loss avoidance means not engaging in risky activity. Loss prevention stops losses from occurring. Risk transfer involves purchasing insurance."},
  {q:"Loss prevention, loss avoidance, and loss reduction are risk- __________ techniques.", opts:["Control","Transfer","Financing","Retention"], ans:0, exp:"Risk control methods reduce or minimize loss. Loss prevention stops losses, loss avoidance avoids risky activities, and loss reduction lessens impact. Risk financing sets aside funds for unavoidable losses. Risk transfer purchases insurance. Risk retention self-insures losses."},

  // 2012 Exam
  {q:"A contract is unenforceable if it:", opts:["Violates a statute","Is unilateral","Requires collateral","Contains stipulations"], ans:0, exp:"If a contract involves illegal activities, it's unenforceable because it requires breaking laws. Unilateral contracts (promises by one party), contracts requiring collateral, and contracts with stipulations can all be legal if they meet the features of legal contracts."},
  {q:"Jack told his sister that Farkle Corporation is about to declare bankruptcy before the public announcement. If she sells her shares first, Jack and his sister could be prosecuted for:", opts:["Affinity fraud","Accounting fraud","Insider trading","Market capitalization"], ans:2, exp:"Illegal insider trading occurs when a corporate insider shares non-public information with someone who trades on it. Accounting fraud involves incorrect financial statements. Affinity fraud targets specific groups with scams. Market capitalization is the total dollar value of a company's stock."},
  {q:"Chris posted false information about HRR stock to drive up its price, then sold his shares for a large profit. What type of investment scam did Chris commit?", opts:["Pump and dump","Pyramid scheme","Ponzi scheme","Phishing"], ans:0, exp:"Pump and dump involves buying a small stock, hyping it to drive up the price, then selling at the peak. A pyramid scheme collects initial fees from recruits. A Ponzi scheme lures investors with promises of high returns. Phishing steals personal information online."},
  {q:"Which is commonly used to reduce an investor's capital gains tax burden?", opts:["Value stocks","Short-term investments","Puttable bonds","Capital losses"], ans:3, exp:"Capital losses (from depreciation of investments) can be subtracted from capital gains—you only pay taxes on the difference. Long-term investments help more than short-term (taxed at lower rates in the US). Puttable bonds and value stocks typically don't affect capital gains taxes."},
  {q:"In addition to ensuring regulatory compliance, what else is a chief compliance officer often responsible for?", opts:["Evaluating the company's channels of distribution","Investigating possible conflicts of interest within the company","Determining the company's point of diminishing returns","Preparing and submitting the company's financial statements"], ans:1, exp:"The CCO develops compliance policies and investigates conflicts of interest that might interfere with regulatory compliance. Distribution channels are a marketing concern. Point of diminishing returns is an operations concern. Financial statements are prepared by the accounting department."},
  {q:"To evaluate the effectiveness of their compliance programs, many businesses conduct:", opts:["Direct trading","Training sessions","Marketing research","Internal audits"], ans:3, exp:"Internal auditors (company employees) review reports, policies, procedures, training, and corrective actions to determine if the compliance function is working properly. Training sessions are for learning, not evaluating. Marketing research and direct trading are unrelated to compliance evaluation."},
  {q:"What virtual-auditor reasoning technique is most likely to detect segregation of duties violations?", opts:["Incremental","Symbolic","Temporal","Cross-source"], ans:1, exp:"Symbolic reasoning (based on actual auditors' expertise) examines patterns of events and looks for common signs of questionable activities including segregation of duties violations and general ledger errors. Incremental detects building compliance violations. Temporal considers transaction timing. Cross-source compares multiple financial systems."},
  {q:"To be most effective, continuous-inspection compliance technology should have access to transactional information:", opts:["Liquidity ratios","Biweekly","Samples","At its source"], ans:3, exp:"To prevent tampering, compliance technology must access information at its source as transactions actually occur. Working biweekly is insufficient for continuous inspection. Reviewing samples misses many issues. Liquidity ratios are unrelated to compliance technology access."},
  {q:"It is important for employees to apply written directions in the order they are presented to:", opts:["Prioritize daily tasks","Correct mistakes","Perform tasks properly","Formulate plans"], ans:2, exp:"If employees don't follow directions in the proper sequence, they may perform tasks incorrectly, requiring costly corrections. Applying directions in order doesn't directly help prioritize daily tasks or formulate plans."},
  {q:"Jeff asked: 'Did you say the crime rate decreased by 10% or 15% last year?' What type of question did Jeff ask?", opts:["An open-ended question to obtain the speaker's personal opinion","A relevant question to clarify information the speaker had provided","A follow-up question that had little to do with the topic at hand","A reflective question requiring careful wording"], ans:1, exp:"Jeff asked the speaker to clarify a stated fact about area crime rate—a topic directly relevant to the presentation. It was a close-ended inquiry (10% or 15%), not open-ended or reflective. A follow-up question clarifies a previous question, and there's no indication Jeff had asked one before."},
  {q:"Which visual aid is often used to clearly illustrate a company's sales by region?", opts:["Geographical map","Organizational chart","Flowchart","Venn diagram"], ans:0, exp:"Maps color-coded by sales range clearly illustrate geographic sales data. A flowchart (including org charts) shows sequential activities or hierarchies. A Venn diagram shows overlapping relationships among finite data sets."},
  {q:"Luke is writing a complex report for the board of directors and has supplemental information not necessary for the body. In what section should he include this?", opts:["Executive summary","Bibliography","Appendix","Table of contents"], ans:2, exp:"Supplemental information for long/complex reports goes in an appendix at the end. An executive summary provides an overview at the beginning. A bibliography lists sources. The table of contents lists sections with page numbers."},
  {q:"During a staff meeting, Lindsay started asking Tom a question while he was presenting his report. What did Lindsay do wrong?", opts:["She strayed from the topic at hand","She expressed an opinion","She used distracting gestures","She interrupted the speaker"], ans:3, exp:"It's rude to interrupt someone while they're speaking. Lindsay should have waited until Tom finished before asking a question. There's insufficient information to determine if she strayed from the topic, expressed opinions, or used gestures."},
  {q:"After Mr. Schwarz's order was delayed, Karl investigated immediately and called back with specific delivery information. Mr. Schwarz thanked Karl for responding quickly. Karl reinforced the company's image by:", opts:["Giving vague answers","Providing efficient follow-up","Delegating work tasks","Complimenting the customer"], ans:1, exp:"Efficient follow-up means working quickly to find answers and immediately contacting the customer with specific information—building favorable customer relationships. There's insufficient information to determine if Karl delegated tasks or complimented Mr. Schwarz."},
  {q:"The advantage to businesses using mobile-application technology is that salespeople can obtain and send customer information from their:", opts:["Fax machines","Autoresponders","Data banks","Smartphones"], ans:3, exp:"Smartphones include cellular capabilities plus computer applications, enabling salespeople to call customers remotely, check email, verify inventory, and place orders. Autoresponders send automatic email responses. Data banks and fax machines are not mobile-application technology."},
  {q:"Before recommending specific products or services to clients, what should a finance professional do?", opts:["Place a stop or buy order","Conduct a needs analysis","Develop a proxy statement","Conduct dollar cost averaging"], ans:1, exp:"Ethical finance professionals first determine what clients truly desire/require through a needs analysis, then select products meeting those needs. Finance professionals don't place orders, develop proxy statements, or conduct dollar cost averaging before making recommendations."},
  {q:"What is the most common reason for a client to leave or fire his/her financial advisor?", opts:["Poor investment return","Lack of communication","High commission fees","Location of the office"], ans:1, exp:"The most common reason is lack of communication. Financial clients expect advisors to return calls quickly, reply to emails promptly, and contact them regularly. Poor returns, high fees, and office location may influence decisions but aren't the most common reason."},
  {q:"What CRM analytic is most suitable for sorting clients based on how likely they are to repurchase a particular product?", opts:["Profitability analysis","Account personalization","Event monitoring","Customer segmentation"], ans:3, exp:"Customer segmentation groups customers based on likelihood to purchase or repurchase a product. Personalization markets to specific customers based on CRM data. Event monitoring identifies when customers reach thresholds. Profitability analysis identifies most profitable customers."},
  {q:"Kaleb is removing duplicate records from his company's CRM system. Kaleb is conducting:", opts:["Exploratory research","Environmental scanning","Technical analysis","Data cleansing"], ans:3, exp:"Data cleansing corrects, removes, and/or formats questionable customer records. Environmental scanning collects info about the business environment. Technical analysis uses historical market data to evaluate securities. Exploratory research helps define business issues."},
  {q:"Jacob will not sell the oak desk he made for less than $235. This is an example of the __________ price.", opts:["Demand","Supply","Equilibrium","Market"], ans:1, exp:"The supply price is the minimum price producers are willing to receive. The demand price is the maximum buyers are willing to pay. The equilibrium price occurs when quantity demanded equals quantity supplied. The market price is the actual prevailing price at any given time."},
  {q:"Which is an example of a business involved in offshoring activities?", opts:["BVC Corporation and Tyrone Industries combine resources to open a new company in Belgium","DigiTech moves its production facility from Los Angeles to Jaipur, India to cut costs","Canadian-based Randall Enterprises purchases an existing firm in Venezuela","A German company operates offices in Japan, South Africa, and Australia"], ans:1, exp:"Offshoring moves operations from the home country to other countries to lower costs. Combining resources to open a new company is a joint venture. Purchasing a foreign firm creates a wholly owned subsidiary. Operating offices in multiple countries is a multinational firm."},
  {q:"When the government requires businesses to pay employees a minimum hourly wage, it is:", opts:["Regulating workplace conditions","Protecting business property","Conserving the environment","Providing public welfare programs"], ans:0, exp:"Minimum-wage laws regulate workplace conditions, protecting workers by guaranteeing a living wage. Protecting business property involves trademarks and patents. Environmental laws protect natural resources. Public welfare programs assist those unable to provide for themselves."},
  {q:"Consumer spending is most likely to increase when:", opts:["The government tightens the money supply","Manufacturers scale back production","Businesses expand and hire additional staff","Unemployment rates begin to increase"], ans:2, exp:"When businesses expand and hire, workers have income to spend. Tight money supply reduces spending. Scaled-back production leads to layoffs and unemployment. Increased unemployment means less consumer income and reduced spending."},
  {q:"Which is a characteristic of a society that has a low tolerance of uncertainty?", opts:["Engages in high risk taking","Embraces differing opinions","Values individual accomplishments","Prefers rules and structure"], ans:3, exp:"Uncertainty-avoidance cultures prefer structure, rules, safety, and low risk taking. High uncertainty-tolerance cultures are open to differing opinions. Individualist societies value individual accomplishments. Each characteristic belongs to a different cultural dimension."},
  {q:"Assessing your personal strengths and weaknesses objectively involves:", opts:["Working to improve most of your weaknesses at one time","Basing a strength or weakness on one isolated incident","Comparing your attributes with others' skills and talents","Looking for behavior patterns that occur regularly over time"], ans:3, exp:"Successful self-assessment requires awareness of behavior patterns over time. Avoid making false generalizations from isolated incidents. Avoid comparing yourself to others since everyone is different. Try improving one weakness at a time—taking on too many changes at once is frustrating."},
  {q:"Lara arrived at work on Tuesday to cover Martin's shift, just as she had promised. In terms of ethical work habits, Lara demonstrated that she is:", opts:["Productive","Empathic","Reliable","Resourceful"], ans:2, exp:"Reliable people follow through on their promises—they do what they say they will do. Empathy is putting yourself in another's place. Productive people complete required tasks correctly and efficiently. Resourceful people act imaginatively when new solutions are required."},
  {q:"Dexter said, 'Our companies need to reach agreement by next Tuesday, or we will need to find another supplier. Our project is already three weeks behind.' What negotiation tactic is Dexter using?", opts:["Deadline driven","Limited authority","Bargaining","Good cop/Bad cop"], ans:0, exp:"The deadline-driven strategy gives the other party a time limit to act. Limited authority claims someone must consult an absent decision-maker. Bargaining is a 'give-and-take' strategy. Good cop/Bad cop sets up one person as reasonable and another as unreasonable."},
  {q:"Parker, Lily, Paula, and David are from different departments working together from March to December to develop an intranet application. This is a(n):", opts:["Quality circle","Project team","Standing committee","Short-term committee"], ans:1, exp:"A project team works together for a set period to complete a specific task (March to December = defined timeframe). A quality circle studies work problems and recommends solutions. A standing committee works over a long period. A short-term committee has an immediate goal like planning an event."},
  {q:"Rita thinks she won't be able to learn the new computer program quickly and will make many mistakes. Rita's resistance to the change is based on:", opts:["Indifference","Anger","Jealousy","Fear"], ans:3, exp:"Rita is afraid of not being able to learn quickly and making mistakes—her resistance is based on fear. This can be addressed by explaining the training program and normalizing that mistakes happen when learning new skills. There's no indication of anger, jealousy, or indifference."},
  {q:"Emily is married, lives on a farm, and likes sewing and puzzles. Becca is single, lives in the city, and enjoys skiing and running marathons. Their differences are based on:", opts:["Personality","Age","Education","Lifestyles"], ans:3, exp:"Lifestyles are defined by how people lead their daily lives—their activities, interests, and situations (married/single, city/farm, hobbies). There's insufficient information to determine if they differ in personality, age, or education."},
  {q:"Under which circumstance is a co-signer held legally responsible for paying the balance owed on a bank loan?", opts:["The lender's interest rate increases","The lender defaults on the loan","The borrower's interest rate increases","The borrower defaults on the loan"], ans:3, exp:"A co-signer is legally responsible if the borrower defaults (fails to make scheduled payments). The co-signer steps in when the borrower cannot repay. Changes in interest rates don't affect a co-signer's legal responsibility."},
  {q:"Brandon's financial plan goal is to save enough to buy a new car in two years. Has Brandon set a SMART goal?", opts:["Yes, his goal is attainable and specific","No, his goal is not attainable or results-oriented","Yes, his goal is time-bounded and measurable","No, his goal is not specific or measurable"], ans:3, exp:"SMART goals are Specific, Measurable, Attainable, Results-oriented, and Time-bounded. Brandon's goal is time-bounded (2 years) and results-oriented (a car), but NOT specific or measurable because he hasn't stated how much he wants to save or how he'll save it."},
  {q:"Cheryl invested $6,000. Year 1: grew to $6,600. Year 2: grew to $7,260. Her monetary gains are the result of:", opts:["Compounding","Phishing","Diversifying","Market timing"], ans:0, exp:"Compounding is earning interest upon previous interest earnings. Cheryl earned 10% on $6,000 then 10% on $6,600 (including the first year's interest). Phishing is identity theft. Diversifying spreads investments. Market timing buys low and sells high."},
  {q:"Kim's dad gave her a $10 bill a year ago. Now it has less buying power than it did. What caused this?", opts:["Unemployment","Taxes","Globalization","Inflation"], ans:3, exp:"Inflation is an increase in the cost of goods and services—what your dollar buys today won't be the same next year. Taxes, globalization, and unemployment levels can impact the economy but aren't the direct cause of declining buying power of a saved bill."},
  {q:"Incorrect information on an individual's credit report may hinder his/her ability to:", opts:["Withdraw money from a savings account","Obtain a bank loan","Pay monthly credit-card balances","Earn interest on stock holdings"], ans:1, exp:"Banks use credit reports to decide whether to provide loans. Inaccurate reports can prevent loan approval. Credit reports don't affect withdrawals from savings accounts, the ability to pay credit-card balances, or interest earned on stocks."},
  {q:"As financial intermediaries, what is all financial institutions' primary responsibility?", opts:["Investing clients' money in mid-cap growth companies","Transferring money from those who have it to those who need it","Calculating opportunity costs of clients' potential investments","Conducting analyses to evaluate securities"], ans:1, exp:"All financial institutions act as intermediaries by facilitating the flow of money from those who have it (savers) to those who need it (borrowers). Investment analysis, opportunity cost calculations, and specific investment types are activities of some but not all institutions."},
  {q:"Deposit-taking institutions are commonly responsible for:", opts:["Using funds from insurance premiums to offer loans","Raising funds for clients by issuing securities","Carrying out regulatory and supervisory functions","Making payments on behalf of savers to creditors"], ans:3, exp:"Deposit-taking institutions accept deposits and use them to make payments on behalf of savers to creditors. Insurance companies use premium funds for loans. Investment banks raise funds by issuing securities. Government/semigovernment institutions carry out regulatory functions."},
  {q:"The largest, most liquid financial market in the world is the __________ market.", opts:["Debt","Foreign exchange","Equity","Commodity"], ans:1, exp:"The foreign exchange market has more active traders and higher trading volume than any other market. Very liquid markets experience gradual, small price changes. Debt = bond market, equity = stock market, commodity = raw materials market."},
  {q:"Which are common categories of commodities?", opts:["Energy, metals, and grains","Energy, metals, and consumer goods","Energy, grains, and consumer goods","Metals, grains, and consumer goods"], ans:0, exp:"Commodities are raw, primary products categorized as energy (natural gas, crude oil), metals (gold, silver, copper), and agricultural products (grains, livestock, softs). Consumer goods are finished products—not raw/primary products—so they're not commodities."},
  {q:"Which statement regarding convergence and consolidation in the finance industry is true?", opts:["Financial companies often enjoy higher earnings as a result","When multiple firms merge, they end up with less capital","A desire for lower costs has slowed convergence","Technological advancements increased costs of offering new products"], ans:0, exp:"Financial companies often enjoy higher earnings from convergence/consolidation. Merging typically results in MORE liquid capital. A desire for lower costs has DRIVEN convergence. Technological advancements have REDUCED the costs of offering new products."},
  {q:"What do bond yields typically do during an economic expansion?", opts:["Gradually decrease","Increase","Drop to near zero","Remain unchanged"], ans:1, exp:"During economic expansion, production, employment, income, and demand for money all increase. Businesses borrow more to expand, and when they borrow more at higher rates, bond yields go up."},
  {q:"An economic trend that typically precedes an upturn in commodity prices is the __________ for at least a year.", opts:["Stock market in decline","Dollar increasing in value","Growth of the money supply declining","Yield curve leveling out"], ans:1, exp:"An upturn in commodity prices is typically preceded by the dollar increasing in value, the stock market improving, the money supply growth increasing (not declining), and the yield curve steepening—all for at least a year."},
  {q:"Which securities are commonly used to reduce the impact of significant fluctuations in exchange rates and commodities?", opts:["Derivatives","Stocks","Bonds","Real estate"], ans:0, exp:"Derivatives (options, futures, swaps) are complex instruments whose value depends on other assets—commonly used globally to hedge against fluctuations in currency exchange rates and commodity prices. Stocks, bonds, and real estate are not typically used for this purpose."},
  {q:"By investing funds in several different countries, investors:", opts:["Reduce foreigners' access to domestic financial markets","Demonstrate their liberalization and home biases","Easily avoid integrated and emerging financial markets","Reduce their exposure to business cycle risks"], ans:3, exp:"Investing in multiple countries diversifies risk and reduces exposure to business cycles in any particular country. International investors demonstrate they DON'T have a home bias. Liberalization actually INCREASES foreigners' access to domestic markets."},
