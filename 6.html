  {q:"Which part of a company's annual report is most valuable for potential investors to examine?", opts:["Listing of management/directors","Auditor's report","Financial statements","Letter to the shareholders"], ans:2, exp:"Financial statements are the most valuable data in an annual report, showing the company's financial health, profitability, cash position, and money management. The auditor's report verifies accuracy. The management listing and letter to shareholders provide narrative/biographical information."},
  {q:"Before purchasing Upside Corporation stock, Anna wants to study financials. Where on Upside's website is the annual report most likely found?", opts:["Sustainability","Investor Relations","Public Relations","Leadership"], ans:1, exp:"Investor Relations sections of company websites contain annual reports and public filings. Sustainability emphasizes environmental/social impact. Public Relations has press releases and media kits. Leadership has executive biographies."},
  {q:"Which component of a securities table indicates the last price paid when trading ended for the day?", opts:["Volume","Net change","Close","Yield"], ans:2, exp:"Close (sometimes listed as Last) represents the final trading price for the day. Net change compares closing price to previous day. Volume shows how many shares were traded. Yield is the rate of return (dividend divided by closing price)."},
  {q:"Which are types of lending investments?", opts:["Money market accounts, certificates of deposit, and bonds","Bonds, certificates of deposit, and collectibles","Savings accounts, collectibles, and stocks","Certificates of deposit, stocks, and real estate"], ans:0, exp:"Lending investments let borrowers use your money for a specified rate of interest: money market accounts, CDs, bonds, and savings accounts. Ownership investments (stocks, real estate, collectibles) involve purchasing a portion of an asset."},
  {q:"Each time Ethan needs medical attention, he must pay $25 to the doctor's office. This out-of-pocket expense is Ethan's:", opts:["Total premium","Copayment","Surrender charge","Waiver"], ans:1, exp:"A copayment is a predetermined out-of-pocket expense paid at time of service. The balance is applied to the annual deductible or covered by insurance. A surrender charge is a life insurance fee for surrendering a policy. A waiver releases one from an obligation."},
  {q:"Which is the first step in a business's accounting cycle?", opts:["Collecting the source documents","Journalizing transactions","Balancing the books","Preparing financial statements"], ans:0, exp:"The accounting cycle first requires collecting source documents (checks, receipts, invoices, purchase orders). Without this basic information, the business cannot journalize transactions, balance books, or prepare financial statements—all of which are subsequent steps."},
  {q:"Which is a common cause of disparate data structures within large corporations' financial-information management systems?", opts:["Channels of distribution","Mergers and acquisitions","Capital structure","Accounting method"], ans:1, exp:"Mergers and acquisitions commonly cause disparate data structures—two companies' historical financial data may be incompatible or housed in different structures, making data merging difficult. Distribution channels, capital structure, and accounting method don't typically cause this issue."},
  {q:"In addition to collecting/maintaining/reporting transaction data, financial-information management is also responsible for analyzing and reporting:", opts:["Recent third-party agreements","Participative decision-making","Dominant buying motives","Market and competitive indicators"], ans:3, exp:"Financial-information management also maintains internal operational data and analyzes/reports external market and competitive indicators. It's not typically responsible for third-party agreements, participative decision-making processes, or buying motives."},
  {q:"Alexei determines who in his company is permitted to read data within the financial-information management system. Alexei has assumed responsibility for the __________ stewardship.", opts:["Access","Definition","Environmental","Geospatial"], ans:0, exp:"Access stewardship is the ability to decide who is permitted or denied access to data. Definition stewardship determines what data within the system mean. Environmental stewardship protects natural resources. Geospatial is not a form of data stewardship."},
  {q:"Which can be used to trace a financial transaction from beginning to end to ensure data are accurate and unaltered?", opts:["Supply chain","Separation of duties","Accounting standards","Audit trail"], ans:3, exp:"An audit trail traces all documents related to a transaction to verify accuracy and detect alterations. Separation of duties requires multiple people for one task (internal control). Accounting standards govern how financial information is recorded. The supply chain moves products from supplier to user."},
  {q:"More consistent/up-to-date data, faster query response, and economies of scale are all benefits of using a(n):", opts:["Intrusion detection system","Encryption technology","Central data repository","Principle of least authority"], ans:2, exp:"A central data repository is a centralized comprehensive database with benefits including consistent data, faster queries, and economies of scale. Encryption and intrusion detection ensure security. The principle of least authority limits user access to only necessary data."},
  {q:"What data mining application is used to identify anomalies in a data set?", opts:["Visualization","Regression","Prediction","Outlier detection"], ans:3, exp:"Outlier detection measures distance between data objects and identifies data significantly dissimilar to the rest of the set. Regression identifies relationships between independent and dependent variables. Prediction estimates future values from current patterns. Visualization converts data into clear visual patterns."},
  {q:"Rule-induction data mining techniques are commonly used to:", opts:["Create a set of if-then permutations to predict future behavior","Modify existing solutions to create new, more useful solutions","Present complex data in readily understandable graphs and charts","Conduct statistical exploratory research and identify variable distribution"], ans:0, exp:"Rule-induction techniques determine if-then relationships in data, then use those rules to predict future behavior (decision trees are a common type). Genetic algorithms modify existing solutions. Data visualization presents complex data visually. Statistical-inference techniques conduct exploratory research."},
  {q:"Carrie wants to transition her home business to a paperless office due to space constraints. She should use budgeting software with __________ capabilities.", opts:["Internal-control","Forecasting","Scanning","Variance"], ans:2, exp:"Scanning capabilities allow users to scan and save documents digitally, potentially eliminating paper copies and freeing up space. While forecasting, internal-control, and variance-analysis capabilities are helpful, only scanning directly addresses the space/paperless goal."},
  {q:"Xavier is inputting predicted cost of vehicle maintenance and predicted revenue from an asset into his budgeting software. Xavier is entering __________ into the software.", opts:["Internal controls","Marketing data","Expense data","Key assumptions"], ans:3, exp:"Key assumptions are the predicted values of various budget items. While vehicle maintenance cost is expense data, predicted revenue from an asset is not—both together represent key assumptions. There's no indication of marketing data or internal controls being entered."},
  {q:"Lawrence's manager asked him to create a visual representation of key performance indicators including cash flow, liquidity, profitability, and liability. Lawrence should create a(n):", opts:["Profit-and-loss statement","Financial scorecard","Cost standard","Operating agreement"], ans:1, exp:"Financial scorecards contain key financial indicators presented in charts and graphs within financial analysis applications. A profit-and-loss statement summarizes transactions showing net profit. Cost standards are specifications for product costs. An operating agreement defines LLC/LLP terms."},
  {q:"Ginny set up two related database tables so that when an entry in the primary table is modified, all matching entries in the related table automatically update. What type of relationship did Ginny create?", opts:["Logical design","Hyperlinked","Object-oriented","Cascading upward"], ans:3, exp:"A cascading upward relationship automatically updates all matching entries in related tables when the primary table is modified. Hyperlinks jump to other documents. Object-oriented is a database model type. Logical design is typically the first stage of database lifecycle."},
  {q:"Yvonne is running a query to create, delete, or modify other database objects. What type of query is Yvonne running?", opts:["Pass-through","Select","Crosstab","Data-definition"], ans:3, exp:"Data-definition queries tell the database to create, delete, or modify other database objects. Select and crosstab queries retrieve and present specific data. A pass-through query tells the database engine to pass the query to a remote server for processing."},
  {q:"Investors and financial analysts are most likely to study a publicly-traded company's financial statements to:", opts:["Measure the firm's competitiveness and performance","Identify new products the firm plans to introduce","Determine the size and makeup of the firm's workforce","Assess the effectiveness of the firm's risk-management system"], ans:0, exp:"Investors and analysts study financial statements to measure competitiveness and performance. If statements underestimate performance, investors may avoid the company; if overstated, they may distrust it. New products, workforce size, and risk-management effectiveness aren't typically found in financial statements."},
  {q:"Which of the following individuals is an internal user of a business's financial data?", opts:["Tax collector","Investor","Creditor","Manager"], ans:3, exp:"Managers are internal users who use financial data in custom reports to control day-to-day operations and make financial decisions. Investors, creditors, and government tax collectors are external users because they don't work for the company."},
  {q:"Which statement about accounting and finance is true?", opts:["Accounting obtains business funds; finance keeps business records","Finance focuses on the past; accounting focuses on the future","Accounting focuses on the past; finance focuses on the future","The accounting function is broader than the finance function"], ans:2, exp:"Accounting keeps and interprets past financial records. Finance uses accounting information to predict and plan for the future. Finance (broader than accounting) focuses on money, capital markets, investments, and financial management."},
  {q:"The emphases in accounting are on documenting and reporting financial data, while the emphasis in finance is on:", opts:["Liquidity ratios","Bookkeeping","Closing the books","Decision making"], ans:3, exp:"Finance's emphasis is on decision making—determining what assets to own, the proper mix, and financing methods. Bookkeeping and closing the books are accounting activities. Liquidity ratios may be calculated by finance managers but are just one of many analytical tools."},
  {q:"What accounting method involves journalizing income and expenditures at the time they occur even if no money changes hands?", opts:["Cash","Accrual","Tax","Double entry"], ans:1, exp:"Accrual accounting journalizes income and expenditures when they occur, regardless of when money changes hands. Cash accounting records transactions when money is actually received or paid. Tax accounting focuses on tax returns. Double entry records each transaction in two or more accounts."},
  {q:"What type of accounting involves preparing and reporting financial data to internal users who use it to plan, direct, and control business operations?", opts:["Tax","Financial","Cash","Cost"], ans:3, exp:"Cost accounting (also called management/managerial accounting) prepares financial data for internal users (managers) to control operations and make decisions. Financial accounting reports to external users quarterly/annually. Cash accounting records transactions when money changes hands. Tax accounting prepares returns."},
  {q:"Which is often used to identify trends and patterns over time for a company?", opts:["Financial ratios","Bookkeeping","Opportunity cost","Market timing"], ans:0, exp:"Financial ratios compare numbers from financial statements, and comparing them over time (monthly, quarterly, annually) and against competitors identifies trends and patterns. Bookkeeping is an accounting activity. Opportunity cost is what's lost when choosing one option over another. Market timing buys low and sells high."},
  {q:"Stefania hopes to identify trends by reviewing and comparing data on her small business's financial statements for the last five years. Stefania is planning to conduct __________ analysis.", opts:["Break-even","Vertical","Horizontal","Competitive"], ans:2, exp:"Horizontal analysis (also called trend analysis) reviews and compares data across several quarters or years to identify trends. Vertical analysis reports each amount as a percentage of another item on the same statement. Break-even analysis identifies sales needed to break even. Competitive analysis compares to competitors."},
  {q:"An automotive parts supplier must decide whether to extend a credit line to a new business customer. What should the supplier do first?", opts:["Evaluate qualifications and work histories of the customer's management team","Contact shareholders and ask for permission to extend credit","Discuss the request with the supplier's financial accountants","Analyze the customer's credit application, credit report, bank information, and financial statements"], ans:3, exp:"Before approving or denying credit, analyze the customer's credit application, credit report, bank information, and financial statements. Management qualifications aren't typically needed. Shareholders don't approve credit decisions. Financial accountants aren't the decision-makers for credit extension."},
  {q:"Jack is studying the difference between budgeted labor cost and actual labor spending last quarter. What type of analysis is Jack conducting?", opts:["Variance","Break-even","Fundamental","Cash-flow"], ans:0, exp:"Variance analysis determines if businesses spent or received more or less than budgeted—investigating causes and handling discrepancies. Break-even analysis identifies sales needed to cover costs. Fundamental analysis studies a company to understand intrinsic value. Cash-flow analysis predicts whether cash covers expenses."},
  {q:"The accounting treatment of capital expenditures should be __________ over multiple reporting periods.", opts:["Consistent","Flexible","Hedged","Callable"], ans:0, exp:"Treating the same accounts and transactions consistently over time keeps data comparable and meaningful. If treatment varies without valid explanation, investors may avoid the company. Flexible, hedged, or callable accounting treatment would make data incomparable across periods."},
  {q:"A human-resources manager is working to have a new employee's paycheck directly deposited. What HR activity is the manager carrying out?", opts:["Interviewing","Recruiting","Organizing","Onboarding"], ans:3, exp:"Onboarding activities occur when new employees join (tax/insurance forms, direct deposit setup, orientation). Recruiting seeks and attracts qualified employees. Interviewing discusses qualifications with job candidates. Organizing is the management function of structuring how work gets done."},
  {q:"Trevor usually purchases janitorial supplies from the store across the street from his office. His buying behavior is most likely based on:", opts:["Brand insistence","Convenience","Price","Product dependability"], ans:1, exp:"Trevor's close proximity to the store suggests convenience drives his buying behavior. While brand, price, and dependability might influence him, there's insufficient information to determine those factors are important to Trevor in this situation."},
  {q:"The most efficient way to get current interest rates on Main Street Community Bank's certificates of deposit is to:", opts:["Visit the bank's website","Call the bank's financial officer","Make an appointment with a bank teller","Go to the bank to get a product brochure"], ans:0, exp:"Many businesses post and update product info on their websites, available 24/7. The financial officer doesn't usually take routine customer-service calls. Appointments with tellers aren't typically needed. Brochures may not contain current rates since interest rates change."},
  {q:"Stella finished designing her web page. Next, she needs to select a __________ and register the website's __________.", opts:["File link, ethernet","Hyperlink, modem","Media permit, server","Web host, domain name"], ans:3, exp:"After creating a web page, a developer needs a web host (server) to post/store it and must register a domain name (web address) through ICANN or via the web host. File links, hyperlinks, modems, media permits, and ethernet are unrelated to publishing a website."},
  {q:"Businesses may review invoices to evaluate their customers':", opts:["Business plans","Purchasing habits","Storage needs","Selling policies"], ans:1, exp:"Invoices record sales details (buyer, seller, items, amounts, prices, delivery, terms). Analyzing past invoices reveals what customers buy, when, and how much—helping forecast future sales. Invoices don't reveal customers' business plans, storage needs, or selling policies."},
  {q:"To remain competitive and reduce the risk of failure, a business should:", opts:["Monitor emerging trends","Access competitors' records","Appeal to all markets","Expand internationally"], ans:0, exp:"Businesses must continuously monitor trends and adjust accordingly to remain competitive. Accessing competitors' confidential records is improper. Successful businesses select target markets carefully—appealing to all markets isn't feasible. International expansion depends on business type and goals."},
  {q:"When a business has too much inventory on hand for an extended period, what type of business cost increases?", opts:["Holding","Maintenance","Production","Stockout"], ans:0, exp:"Holding costs include storage space, taxes, and insurance—these increase when inventory sits. Maintenance costs are for facility/equipment upkeep. Production costs are for creating goods/services. Stockout costs arise from running OUT of inventory—the opposite situation."},
  {q:"FGH Company received several warnings from a government agency to fix unsafe electrical wiring. According to common law, the company has breached its duty of:", opts:["Reasonable care","Personal reform","General authority","Charitable trust"], ans:0, exp:"Reasonable care is the common-law principle that individuals and businesses should use caution and act socially responsibly. FGH failed to fix known dangers, breaching this duty and placing employees and customers at risk. The other options are not related legal duties."},
  {q:"A business can protect its confidential computer information from unauthorized users by:", opts:["Developing Internet message boards","Encrypting computer files","Conducting annual virus scans","Classifying business data"], ans:1, exp:"Encryption transforms information into a secret code that only authorized individuals can read—protecting confidential files from unauthorized internal and external access. Annual virus scans are insufficient (should be continuous). Message boards and classifying data don't protect against unauthorized access."},
  {q:"Which tool is specifically designed to schedule and track projects?", opts:["Venn diagram","Pyramid diagram","Bubble chart","Gantt chart"], ans:3, exp:"The Gantt chart (developed by Henry Gantt) is a bar chart that graphically depicts a project's work breakdown structure in a horizontal format relative to time—specifically designed for scheduling and tracking projects. Pyramid, bubble, and Venn diagrams are not designed for project tracking."},
  {q:"Claire maintains an inventory of routine office supplies. To determine optimal inventory levels, she should consider:", opts:["Employees' individual preferences","Average product usage amount per month","Business's budgeting method","Vendors' daily sales promotions"], ans:1, exp:"Determining average monthly usage (e.g., 2 cases in June, 3 in July, 4 in August = 3 case average) sets the optimal inventory level—avoiding overstocking or stockouts. Employee preferences, budgeting methods, and vendor promotions aren't primary factors for inventory optimization."},
  {q:"What is a common activity that takes place during the 'determining possible solutions' stage of the problem-solving process?", opts:["Detecting issues","Collecting relevant data","Brainstorming ideas","Checking assumptions"], ans:2, exp:"Brainstorming generates as many ideas as possible without evaluating them—common during the 'determining possible solutions' stage. Detecting issues and checking assumptions happen earlier. Collecting relevant data occurs after defining the problem. Solutions are selected, implemented, and evaluated after brainstorming."},
  {q:"Margaret financially supports others' business ventures. Now she wants to support Marcus Williams in starting his new business. Margaret is a(n) __________, and Marcus is a(n) __________.", opts:["Licensor, sponsor","Franchisee, franchisor","Angel investor, entrepreneur","Manager, loan officer"], ans:2, exp:"An angel investor provides start-up money to new businesses. An entrepreneur identifies opportunities, creates new value, assumes business-starting risks, and receives financial and personal rewards. A licensor owns IP. A franchisor sells rights to use their business model. A manager coordinates resources."},
  {q:"The reason to write a letter of application to submit with your résumé is to:", opts:["List former employers willing to serve as references","Summarize why you are a good candidate for the job","Include critical information left out of the résumé","Indicate days and times available for an interview"], ans:1, exp:"A letter of application introduces yourself, expresses interest in the job, and briefly describes why you're a good candidate. References go in a separate document. Critical information should be in the résumé, not the letter. Indicating availability for interviews is considered rude and arrogant."},
  {q:"Which finance professional typically oversees a company's cash management, capital raising, and investment activities?", opts:["Treasurer","Risk manager","Cash manager","Underwriter"], ans:0, exp:"A corporate treasurer oversees cash management, capital raising, investment activities, and financial goals/objectives. Risk managers oversee risk management programs. Cash managers monitor cash flow. Underwriters calculate risk of loss and establish insurance premium rates."},
  {q:"Kyrie is licensed to buy and sell securities and offer financial advice. She is most likely to find employment with a(n):", opts:["Insurance carrier","Investment bank","Brokerage house","Actuarial service"], ans:2, exp:"Brokerage houses specialize in trading securities, employing brokers/stockbrokers who must pass exams for licensing to trade on stock exchanges. Investment banks help corporations issue securities and facilitate mergers. Insurance carriers sell insurance policies. Actuarial services assess risk statistically."},
  {q:"Who should take continuing education classes to keep up with changes in tax regulations?", opts:["Gwen Colbert, Accounts Receivable Supervisor","Paul Stanton, Corporate Security Advisor","Martha Winters, Certified Public Accountant","Carlos Ramirez, Product Acquisition Manager"], ans:2, exp:"CPAs work with financial data and need to keep up with changing regulations including taxes. Security advisors, AR supervisors, and product-acquisition managers don't typically require extensive knowledge of tax regulation changes."},
  {q:"Tosha prepares monthly financial reports for senior executives, helps create budgets, reviews tax returns, and analyzes company finances. She is most likely a:", opts:["Certified Internal Auditor (CIA)","Certified Public Accountant (CPA)","Certified Management Accountant (CMA)","Certified Fraud Examiner (CFE)"], ans:2, exp:"The CMA designation is most appropriate for management accountants who prepare internal financial reports, create budgets, review tax returns, and analyze company finances. CPAs serve multiple clients. CIAs assess internal accounting records/controls. CFEs detect and prevent accounting fraud."},
  {q:"Hank would like to meet regularly in person with other financial planners in his geographic area. Which organization best meets his needs?", opts:["National Association of Professional Financial Advisors","Federal Organization of Financial Planners","Local Society of Financial Planning Professionals","International Financial Planning Association"], ans:2, exp:"A local organization has members working in close proximity who are more likely to hold regular face-to-face meetings. A national or international organization may not have a chapter in Hank's area or may not meet in-person regularly nearby."},
  {q:"A strong professional relationship is usually a(n) __________ relationship.", opts:["One-sided","Reciprocal","Majority-rule","Easily maintained"], ans:1, exp:"Strong professional relationships are reciprocal—each member helps the other (e.g., mutual client referrals). Finance professionals help each other as equals, not one-sided or majority-rule relationships. Strong professional relationships typically require ongoing effort to maintain."},
  {q:"Which is an ethical hazard in risk management?", opts:["Contracting with an insurer with a reputation for adequate claims reserving","Working with a public accounting firm that has a whistleblower mechanism","Understating loss experience and exposure to an insurance underwriter","Questioning a supplier's history of disobeying state and federal regulations"], ans:2, exp:"Understating loss experience or exposure to get lower premiums is highly unethical and exposes the company to legal and financial risks. Working with reputable insurers and accounting firms with whistleblower mechanisms, and questioning supplier ethics, are all responsible risk management actions."},
  {q:"Siobhan is using risk-management technology to quantify potential losses if a tornado destroyed her company's largest manufacturing plant. What technique is she using?", opts:["Risk transference","Cost-benefit analysis","Risk modeling","Fundamental analysis"], ans:2, exp:"Risk modeling quantifies potential losses from specific events. Cost-benefit analysis quantifies costs and benefits of projects. Risk transference moves risk impact to someone else (e.g., insurance). Fundamental analysis studies a company to understand its intrinsic value."},
  {q:"What type of risk-management technology can track individual traders' risk limits and notify management immediately if any trader exceeds their limit?", opts:["Data aggregation","Stress testing","Automated oversight","Corporate governance"], ans:2, exp:"Automated oversight assigns risk limits to individuals and immediately notifies management if limits are exceeded. Stress testing determines financial instrument stability in extreme conditions. Data aggregation pulls data from multiple systems into one repository. Corporate governance is how directors handle shareholder responsibilities."},
  {q:"How does forming a captive insurance company typically impact a corporation's federal tax liability?", opts:["Eliminates the corporation's state tax liabilities","Increases tax due on the captive's loss reserves","Increases the corporation's sales tax liabilities","Reduces tax due on the captive's premiums"], ans:3, exp:"Forming a captive insurance company can reduce, eliminate, or defer federal taxes on the corporation's insurance premiums. A captive typically DECREASES (not increases) tax due on loss reserves. It doesn't eliminate state tax liabilities or increase sales tax liabilities."},
  {q:"Reggie learned that four consumers injured themselves using a blender his company sells. He's urging management to discontinue sales. Reggie is attempting to limit the company's __________ liability exposure.", opts:["Employment","Employee","Product","Fiduciary"], ans:2, exp:"Product liability lawsuits occur when products injure consumers. Continuing to sell the potentially dangerous blender exposes the company to expensive product-liability suits. Employment liability relates to hiring/firing practices. Employee liability relates to worker issues. Fiduciary liability involves breach of trust."},
  {q:"Which statement regarding internal control systems is true?", opts:["If a company has an internal control system, monitoring and reporting are unnecessary","The purpose of an internal control system is to eliminate risk","Many companies use internal control systems instead of risk management","Internal controls are a component of enterprise risk management"], ans:3, exp:"Internal control systems and risk management are both key components of enterprise risk management (ERM). Internal controls can't eliminate all risk—only reduce it. Internal controls and risk management work together; one doesn't replace the other. Periodic monitoring and reporting remain necessary even with internal controls."},
  {q:"What type of control is typically used to help company executives understand the impact of external risks on the organization and its long-range plans?", opts:["Process","Management","Strategic","Variable"], ans:2, exp:"Strategic controls help executives understand the impact of external forces and risks on business and long-range plans. Management controls focus on internal risk throughout the organization. Process controls are specific to certain business activities. Variable controls are not associated with risk management."},

  // 2013 Exam
  {q:"Samantha agrees to buy a bicycle from Tony for $225. This is an example of a(n):", opts:["Unilateral contract","Bilateral contract","Renegotiated agreement","Nonverbal agreement"], ans:1, exp:"In bilateral contracts, both parties make promises—Samantha promises to pay $225, Tony promises to give her the bike. Unilateral contracts involve promises made by only one party. There's insufficient info to determine if it was nonverbal or renegotiated."},
  {q:"Lucy authorized her accountant, attorney, and life-insurance agent to care for her assets and make decisions about her money and property. They are her:", opts:["Relationship experts","Bookkeepers","Fiduciaries","Economists"], ans:2, exp:"A fiduciary is responsible for caring for another person's assets and making decisions regarding them. Trusted financial advisors (accountants, attorneys, insurance agents) serve as fiduciaries. An economist studies economic decisions. A bookkeeper analyzes and journalizes financial transactions."},
  {q:"Mary is accused of understating tax on her returns for 5 years unrelated to tax shelters. She's concerned about fines or jail. Which statement is true?", opts:["If a CPA prepared her return, she can probably avoid government penalties","Mary is likely to be jailed for understating tax because she didn't use an approved tax shelter","The agency should recognize the understatement as a tax shelter because Mary is 45","Mary should store her assets in an offshore bank account"], ans:0, exp:"Since clients trust tax professionals to prepare returns appropriately, the government is more likely to penalize negligent tax preparers than their clients. A tax shelter is a legal method to minimize taxable income—Mary's understatement is not a tax shelter. Offshore accounts wouldn't benefit her situation."},
  {q:"Retirement accounts and real estate are examples of:", opts:["Intangible assets","Garnishments","Tax shelters","Derivatives"], ans:2, exp:"Tax shelters are methods of minimizing taxable income. Retirement programs defer taxes until withdrawal. Homeowners minimize taxes by writing off mortgage interest. Garnishment is a court-ordered salary transfer to a third party. Real estate is a tangible asset. Derivatives are securities based on other assets."},
  {q:"Which group is most likely to enforce public corporations' compliance with financial reporting standards?", opts:["World Bank representatives","Local law enforcement officers","A securities regulatory commission","The federal judicial system"], ans:2, exp:"Securities regulatory commissions (like the SEC in the US) create and enforce compliance with financial reporting standards. Local law enforcement handles general crimes, not securities. The World Bank aids developing countries. The federal judicial system interprets laws; the executive branch enforces them."},
  {q:"Which quality-management methodology is often used in the finance industry to sustain regulatory compliance?", opts:["Cost Standards","Six Sigma","Strategic planning","First-in, First-out"], ans:1, exp:"Six Sigma (define-measure-analyze-improve-control) is used by financial institutions to determine how to improve processes and develop more efficient ones for compliance. Cost standards measure project costs. Strategic planning is long-range company planning. First-in, First-out is an inventory calculation method."},
  {q:"Money Plus Bank needs to improve processes for calculating and reporting risk-weighted assets to meet Basel II compliance. The best course of action is to:", opts:["Encourage customers to utilize the bank's online account system","Improve the bank's new-employee training program","Increase cross-functional cooperation among employees","Switch from manual to automated calculation and reporting methods"], ans:3, exp:"Basel II requires banks to calculate and report risk-weighted assets. Automating these processes with technology that gathers data and calculates risk-weighted assets best meets compliance requirements. Training, cooperation, and customer systems don't directly address the calculation/reporting compliance need."},
  {q:"A governance, risk, and compliance (GRC) software system identifies and measures risk; monitors the risk-management system; routinely checks adherence to policies; and ensures compliance with:", opts:["Union demands","Reporting requirements","Product standards","Contingency plans"], ans:1, exp:"GRC software serves four functions: identifies/measures risk, monitors risk management, checks policy adherence, and ensures compliance with reporting requirements from federal/state government agencies and regulatory commissions. It's not designed to ensure compliance with union demands, product standards, or contingency plans."},
  {q:"Jake is researching career trends in accounting. Which source is most likely to contain the most current, credible information?", opts:["An early edition of the Managerial Accounting in Practice textbook","The federal government's labor and workforce website","An online newspaper article written by a well-known compliance expert","The latest edition of the Insurance News Monthly trade publication"], ans:1, exp:"Federal government labor and workforce websites (like the US Occupational Outlook Handbook) are regularly updated with current career trend information. Early textbook editions are outdated. There's insufficient info to verify the newspaper article's relevance. An insurance trade publication focuses on insurance, not accounting."},
  {q:"An individual calls asking to speak with Rhonda Hoffman, who is not available. What should you do?", opts:["Tell the caller you'd be glad to take his/her order","Advise the caller to call again in a few minutes","Ask the caller if s/he would like to leave a message","Put the caller on hold while you track down Rhonda"], ans:2, exp:"The most courteous response to an unavailable person is to offer to take a message or suggest voicemail. You can't assume the caller wants to place an order or that you can help them. Placing callers on hold for an extended time or telling them to call back are rude responses."},
  {q:"Lana wants to include a two-dimensional graphic showing groupings and patterns of multiple variables. Which would best illustrate the data?", opts:["Table","Pie chart","Timeline","Scatter chart"], ans:3, exp:"A scatter chart places points on a graph to indicate relationships or patterns among two or more variables. A pie chart shows parts of a whole. A timeline shows sequential events. Tables present exact individual values of data."},
  {q:"The HR manager sends an email to all employees about parking lot repairs on Tuesday. This is an example of a(n):", opts:["Business proposal","Projection report","Informational message","Formal inquiry"], ans:2, exp:"Communicating information involves providing others with facts. The manager is informing employees about a parking lot issue—factual information sharing. It's not a proposal (requesting something), projection report (forecasting), or formal inquiry (seeking information through formal channels)."},
  {q:"Which is an example of horizontal communication in the workplace?", opts:["An employee provides his manager with a status report about the company's new website","A supervisor provides a line worker with feedback about job performance","A manager provides a new employee with advice on job advancement","An employee sends an email to a coworker about a short-term project"], ans:3, exp:"Horizontal communication occurs between employees with the same level of authority. Employees emailing coworkers are at the same level. Supervisors/managers providing feedback or advice to employees is downward/vertical communication. Employees reporting to managers is upward communication."},
  {q:"Before you can adapt your communication style to relate to businesspeople from other countries, you must first:", opts:["Learn to speak the country's language fluently","Realize that cultural differences exist","Develop an ethnocentric attitude","Change your personal values and beliefs"], ans:1, exp:"The key to adapting communication style is recognizing that differences exist, then researching how to avoid offense. You don't need to be fluent or change your values—just respect different ones. Ethnocentrism (believing your culture is better) hinders positive cross-cultural relationships."},
  {q:"When helping a slow/methodical type of customer, salespeople should:", opts:["Follow the customer around the store explaining product benefits","Show the customer as many options as possible","Take care not to overwhelm the customer","Press the customer to select one of two options"], ans:2, exp:"Slow/methodical customers have difficulty making purchasing decisions, so salespeople must be patient and not overwhelm them. Following them around, showing too many options, and pressing them to decide before they're ready are all likely to frustrate and drive them away."},
  {q:"Anna developed a new customer relationship strategy at Bank Plus emphasizing better understanding of customer needs, plus a recognition program for quality service. Her PRIMARY goal is most likely:", opts:["Promoting the bank's new products and services","Publicly recognizing outstanding bank employees","Developing stronger long-term customer relationships","Reducing the number of forms new customers must fill out"], ans:2, exp:"By better understanding and meeting customers' needs, the bank develops stronger long-term relationships, creating loyal customers. Recognizing employees is a means, not the primary goal. Based on the information provided, the strategy isn't about new products or reducing forms."},
  {q:"An important aspect of ethical behavior by financial-services providers is ensuring that their clients:", opts:["Purchase high-risk investments to generate better financial returns","Understand the potential risks and rewards of different financial products","Diversify portfolios by investing more than half of their money in hedge funds","Preplan future investment strategies for unexpected financial bonuses"], ans:1, exp:"Ethical financial-services providers act in clients' best interests by communicating rewards AND risks of different financial instruments. It's unethical to suggest high-risk investments clients can't afford. Diversification doesn't mean putting over half in one product. Markets constantly change, making it infeasible to plan investments for money not yet available."},
  {q:"Beverly discovered $25,628 in erroneous duplicate accounts-receivable entries that caused collection letters to be sent to customers who had already paid. What should she do to save relationships AND prevent future issues?", opts:["Use funds from accounts payable to pay the debt","Complete an accounting software update","Contact each customer by phone and apologize","Complete a data cleansing of the erroneous entries"], ans:3, exp:"Data cleansing removes erroneous entries from the system, preventing future incorrect collection letters. An accounting software update doesn't fix existing erroneous entries. Calling to apologize is helpful but doesn't prevent recurrence. The $25,628 is not a debt—it's the sum of erroneous entries."},
  {q:"An accounts payable analyst is using technology to collect and isolate customer records from the disbursing system—retrieving and organizing massive numbers of records quickly. What technology is this?", opts:["Computer-aided design","A CRM database","A neural network","GPS technology"], ans:1, exp:"A CRM database is a virtual storage unit that gathers, organizes, analyzes, and stores customer data efficiently. Computer-aided design is for planning/designing products. A neural network simulates brain activity to recognize patterns. GPS uses satellite technology for location/directions."},
  {q:"To keep up with social, political, economic, and regulatory changes affecting their business, companies should:", opts:["Conduct environmental scans","Implement internal analyses","Plan customer interviews","Prepare organizational inspections"], ans:0, exp:"Environmental scanning monitors external factors so companies can adapt. Internal analyses and organizational inspections focus on what's happening inside the company. Planning customer interviews is just preparation—companies must actually conduct them to get the information."},
  {q:"Members of the air-traffic controllers' union stopped working to support the pilots' union that recently went on strike. This is an example of a:", opts:["Boycott","Lockout","Sympathetic strike","Wildcat strike"], ans:2, exp:"A sympathetic strike occurs when one union stops working to support another union on strike. A wildcat strike happens without national union consent. A lockout closes the business temporarily, preventing employees from working. A boycott is when union members refuse to buy a company's products."},
  {q:"A manufacturer has more workers than production equipment. What economic principle does this exemplify?", opts:["Law of minimal utility","Law of diminishing returns","Economies of scale","Economies of scoring"], ans:1, exp:"The law of diminishing returns states that after a certain point, adding more employees with fixed equipment decreases overall productivity. If 100 machines are available but there are 125 workers, 25 workers have no equipment, reducing productivity. Economies of scale reduce cost per unit as production increases."},
  {q:"Consumer spending tends to decrease when:", opts:["Business activities slow","Interest rates decrease","An economic recession ends","The inflation rate declines"], ans:0, exp:"When business activities slow, production declines, businesses lay off employees, and unemployed people without income spend less. Lower interest rates encourage borrowing and spending. A recession ending typically leads to more spending. Declining inflation stabilizes prices, potentially boosting spending."},
  {q:"What condition exists if a nation imports more goods and services than it exports?", opts:["Trade deficit","Balance of trade","Trade surplus","Comparative advantage"], ans:0, exp:"A trade deficit is an unfavorable balance of trade where imports exceed exports. A trade surplus is favorable—exports exceed imports. Balance of trade is the difference between exports and imports. Comparative advantage is the benefit of specializing in what a nation produces most efficiently."},
  {q:"Which statement is true of a positive attitude?", opts:["It's not very important, but it is nice to have","You can achieve one, but it requires work","It has little impact on your ability to reach your goals","It's something that you are born with"], ans:1, exp:"Being positive takes more effort than being negative, but it's achievable with work. A positive attitude is necessary and important (not unimportant) and actually makes it EASIER to achieve goals (not harder). It's developed over time, not something you're born with."},
  {q:"Todd knew layoffs were coming but told Cynthia 'not to worry.' Her job was eliminated the following week. Ethical issues occurred because:", opts:["Todd was completely honest with Cynthia","Cynthia asked irrelevant questions","Todd misled Cynthia","Cynthia started the rumors"], ans:2, exp:"Todd misled Cynthia by implying her job was safe when he knew layoffs were coming. A better response would have been to say he didn't have all the facts and didn't want to speculate. Cynthia's questions about her job were relevant. She heard the rumors, not started them."},
  {q:"How can you show that you're actively listening in a negotiation?", opts:["Respond emotionally to what the other person says","Think about what you'll say next while the other person is speaking","Repeat or summarize the other person's statements","Keep a positive, open, and objective attitude"], ans:2, exp:"Repeating or summarizing the other person's statements demonstrates active listening and prevents missing important points. Thinking about your response while they're speaking makes it impossible to listen. Responding emotionally could derail the discussion. Maintaining a positive attitude is important but separate from active listening."},
  {q:"Which is an example of a conflict that causes personal motivation or drive?", opts:["High school students compete to sell the most candy in a fundraiser","Kevin has a class and a meeting scheduled for Tuesday afternoon","Two coworkers need to use the copy machine at the same time","Jane and Amy both want to be in charge of their presentation"], ans:0, exp:"Students competing to sell the most candy are motivated to be better salespeople and raise more money. Kevin's scheduling conflict is about competing situations. The copy machine conflict is about limited resources. The Jane/Amy conflict is about authority."},
  {q:"What is the advantage to groups that use consensus building to make decisions?", opts:["Group members rarely disagree","Agreement is reached very quickly","Decision making involves a majority rule","All decision makers have equal power"], ans:3, exp:"Consensus requires substantial agreement from each member, giving everyone equal power and reducing personal agendas. Consensus is not majority-rule. Group members CAN disagree in consensus-building (they just need substantial agreement). The disadvantage of consensus is that it often takes a lot of time."},
  {q:"To have successful collaborative partnerships in the workplace, it is important for employees to:", opts:["Limit communication","Establish trust","Avoid conflict","Support all ideas"], ans:1, exp:"Successful collaboration requires trust—when employees trust coworkers, they're open, honest, and willing to work together. Employees don't need to support all ideas, just be respectful. They can't always avoid conflict but can handle it constructively. Limiting communication hinders collaboration."},
  {q:"Thomas bought a car with a $4,000 down payment and makes monthly payments of $365 until paid off. Thomas is using __________ credit.", opts:["Service","Revolving","Budget","Installment"], ans:3, exp:"Installment credit handles one total amount paid off in regular payments. Thomas pays a set amount at regular intervals. Revolving credit limits total debt and charges interest on balances. Budget credit is a 60- or 90-day arrangement. Service credit is for utilities consumed but not yet paid for."},
  {q:"Justine takes $5,000 from her uncle now (rather than when she buys a car in a year) and deposits it earning 6% compounded annually—growing to $5,300. What financial concept does this illustrate?", opts:["Capital budgeting","Dividend reinvestment plan","Time-value of money","Accrual accounting"], ans:2, exp:"The time-value of money means any certain amount is worth more now than later due to its earning potential. Taking the $5,000 now lets Justine earn $300 interest. A DRIP uses stock dividends to buy more shares. Capital budgeting determines which projects to invest in. Accrual accounting records transactions when they occur."},
  {q:"By putting $2,000/year in an IRA starting at age 21 at 9% annually, you'll have $1,156,517 at age 65. This illustrates the power of:", opts:["Compound interest","Finance charges","Fiscal policy","The prime interest rate"], ans:0, exp:"Compound interest is earning interest on previous interest earnings. Starting early and compounding dramatically increases wealth over time. Finance charges are interest on credit balances. Fiscal policy is government spending/taxation. The prime rate is the rate banks offer their best credit customers."},
  {q:"State Street Bank sends texts when $100 or more are withdrawn. The bank sends these notifications to reduce risks associated with:", opts:["Money laundering","Loan fraud","Identity theft","Firewall intrusion"], ans:2, exp:"Identity theft involves using another person's information without consent. Banks send alerts when their systems detect large ATM withdrawals or unusual charges, allowing customers to freeze accounts quickly. Loan fraud involves lying on applications. Money laundering creates appearance of legal funds. Firewalls prevent computer hacking."},
  {q:"When preparing her tax return, Lynnette listed the interest she paid on her student loan as:", opts:["Taxable earnings","Investment income","A tax-exempt investment","An itemized deduction"], ans:3, exp:"The government allows taxpayers to itemize certain expenses (charitable donations, medical expenses, some loan interest) to reduce taxable income. Investment earnings like dividends are taxable income. Municipal bonds are tax-exempt investments. Student loan interest qualifies as an itemized deduction."},
  {q:"Henry is a professional banker at a deposit-taking financial institution where only 'members' may save or borrow. Henry most likely works for a(n):", opts:["CPA firm","Mortgage company","Insurance company","Credit union"], ans:3, exp:"Credit unions are cooperatives providing financial services to a group sharing a common interest or employer—only members may save or borrow. Mortgage companies process real estate loans. Insurance companies sell policies. CPA firms are not deposit-taking financial institutions."},
  {q:"Which statement regarding financial institutions is true?", opts:["A financial institution with low value is doing a good job managing risk","Financial institutions facilitate the flow of money in the economy","Financial institutions are controlled by their members","The primary role of financial institutions is to regulate saving and investing"], ans:1, exp:"Financial institutions act as intermediaries facilitating money flow from those who have it to those who need it. A HIGH (not low) value institution is managing risk well. Credit unions (not all institutions) are controlled by members. While institutions support saving/investing, their primary role is intermediation."},
  {q:"Which statement regarding debt and equity markets is correct?", opts:["Common stock, an example of a debt instrument, is traded on the equity market","Investors who purchase a company's bonds gain partial ownership","If a company suffers financial difficulties, stockholders are paid before bondholders","Bonds, which are debt instruments, are typically less risky than stocks"], ans:3, exp:"Bonds are debt instruments and are typically less risky than stocks. Common stock is an equity instrument (not debt). Bonds (debt instruments) don't give ownership—stocks do. If a company has difficulties, bondholders are paid BEFORE stockholders."},
  {q:"The New York Stock Exchange is a(n) __________ market.", opts:["Spot","Over-the-counter","Commodities","Auction"], ans:3, exp:"The NYSE is an auction market where multiple traders place bids and sellers submit offers—the trade price is the highest bid and lowest offer. An over-the-counter market trades securities outside formal exchanges. A commodity market trades raw materials. A spot market involves immediate cash purchases."},
  {q:"A retail bank and an insurance company recently merged and are moving from two legacy accounting systems to one enterprise planning system. This is an example of __________ in the finance industry.", opts:["Bancassurance","Increased liquidity","Convergence","Knowledge management"], ans:2, exp:"Convergence in finance involves merging financial providers from different sectors (retail bank + insurance company). Moving to one unified system is typical post-convergence. Bancassurance is insurance sold BY a bank—not a merger. Increased liquidity and knowledge management may result but are not what's described."},
  {q:"What is a common course of action for small banking institutions interested in competing globally and improving efficiencies, viability, and profitability?", opts:["Consolidating with larger banks","Rapidly expanding their operations","Following global regulations more closely","Dissolving their financial holding companies"], ans:0, exp:"Many small banks consolidate/merge with larger ones to compete globally and improve efficiencies, viability, and profitability. Rapidly expanding without consolidating typically isn't feasible for small banks. Following regulations is important but insufficient alone. Small banks typically lack the resources to be financial holding companies."},
  {q:"According to most analysts, the three economic indicators that stock market investors and traders should pay closest attention to are:", opts:["Gross Domestic Product, overhead expenses, and unemployment","Interest rates, overhead expenses, and inflation","Gross Domestic Product, unemployment, and inflation","Inflation, unemployment, and bond rates"], ans:2, exp:"The three most impactful economic indicators for the stock market are GDP (mirrors stock market), unemployment (inversely related to stock market), and inflation (interacts with interest rates to affect markets). Overhead expenses and bond rates are not economic indicators."},
  {q:"Which has contributed to financial globalization?", opts:["An increase in restrictions on foreign investment and international trade","An increase in taxes on international financial transactions","A reduction in foreigners' access to domestic financial markets","A movement from fixed exchange rates to floating exchange rates"], ans:3, exp:"Moving from fixed to floating exchange rates has helped increase global investment. Financial globalization has DECREASED (not increased) restrictions on foreign investment, LOWERED (not increased) taxes on international transactions, and INCREASED (not reduced) foreigners' access to domestic markets."},
  {q:"Kendra's financial goal is to build wealth through diversified investments. Which provider is most likely to help her?", opts:["Financial-auditing firm","Mortgage company","Investment bank","Asset-management firm"], ans:3, exp:"Asset-management firms invest clients' money in diversified securities by pooling assets—managing mutual funds, hedge funds, and pension plans. An investment bank underwrites securities and facilitates mergers. Mortgage companies process real estate loans. Financial-auditing firms perform independent audits."},
  {q:"Which financial statement should an investor use to quickly determine a company's 'bottom line'?", opts:["Statement of retained earnings","Cash flow statement","Balance sheet","Income statement"], ans:3, exp:"The income statement shows the 'bottom line' (net income)—read from top (revenues) to bottom (net income after expenses). A cash flow statement tracks money in/out. A balance sheet shows financial health at a point in time. A statement of retained earnings shows profit retained and dividends paid."},
  {q:"Which are among the most important resources to access prior to purchasing stock in a company?", opts:["EDGAR and the Statement of Ownership","ESOP and the company's website","EDGAR and the company's website","ESOP and the Statement of Ownership"], ans:2, exp:"EDGAR (SEC's data gathering system with all mandatory filings) and the company's website (annual reports, public information) are the most important resources. A Statement of Ownership is part of financial statements but less critical. ESOP (employee stock ownership plan) is for company employees, not potential outside investors."},
  {q:"The most common headings on a stock table include the 52-week high/low, stock symbol, estimated dividend per share, yield %, volume, closing price, net change, and the:", opts:["Price-earnings ratio","Earnings per share","Net income","Stockholder's equity"], ans:0, exp:"The price-earnings ratio (P/E ratio) is a standard stock table heading—the last closing price divided by earnings per share. Earnings per share, net income, and stockholder's equity are not typically found on stock tables; they appear in financial statements."},
  {q:"Geraldo wants to review the difference between Coffee Dreams' closing stock price and the previous day's closing price. He should review the:", opts:["Ticker symbol","Net change","Price-earnings ratio","52-week high and low"], ans:1, exp:"Net change shows the difference between the stock's closing price and the previous day's closing price—positive means up, negative means down. The ticker symbol uniquely identifies the company. The P/E ratio divides share price by earnings per share. The 52-week high/low shows the past year's price range."},
  {q:"Certificates of deposit and municipal bonds are types of:", opts:["Value stocks","Ownership securities","Commodities","Lending investments"], ans:3, exp:"Lending investments let individuals loan their money to borrowers for a specified rate of interest. CDs and municipal bonds are lending investments. Ownership investments (like stocks) involve purchasing a portion of an asset. Value stocks are undervalued stocks. Commodities are raw materials traded on exchanges."},
  {q:"On a balance sheet, a business categorizes its inventory and accounts receivable as:", opts:["Long-term assets","Current assets","Owner's equity","Current liabilities"], ans:1, exp:"Current (short-term) assets include inventory and accounts receivable—their levels fluctuate. Owner's equity is the owner's investment plus/minus profits/losses. Long-term assets are buildings, vehicles, and equipment used for more than a year. Current liabilities are debts due within a year."},
  {q:"Leslie's friend Paul, who oversees Bex Company's central data depository, told Leslie that Bex's profits dropped by a third and suggested she sell her Bex shares before the market finds out. This is an example of:", opts:["Encryption","Disparate data","Stewardship","Insider trading"], ans:3, exp:"Illegal insider trading occurs when a company employee shares non-public information with someone who trades on it. Paul shared confidential financial data with Leslie so she could sell before the price plummets. Encryption is data protection. Disparate data are incompatible databases. Stewardship is responsible data management."},
  {q:"Financial-information management is responsible for collecting, maintaining, and reporting data about financial transactions. Business managers often use these data to:", opts:["Forecast financial inflows and outflows","Determine if liability insurance is needed","Develop secondary equity markets","Calculate the level of corporate groupthink"], ans:0, exp:"Business managers use financial transaction data to forecast financial inflows and outflows—extremely helpful when budgeting. Financial-information management doesn't typically help determine insurance needs, develop equity markets, or calculate groupthink levels."},
  {q:"Pamela shared her username and password with a coworker so he could access a customer database that was off-limits to him. Pamela failed to fulfill her responsibilities as a data:", opts:["Steward","Auditor","Sponsor","Processor"], ans:0, exp:"A data steward ensures the integrity of organizational data, including ethical use only by authorized individuals. Pamela violated this by allowing unauthorized access. An auditor verifies record accuracy. A sponsor financially supports projects. A data processor formats facts for business use."},
  {q:"Which statement regarding the security of most financial institutions' data is true?", opts:["Data in transit are more at risk than data at rest or in process","Firewalls completely eliminate all external threats","More data attacks come from inside organizations than outside them","Investments in financial-information security have decreased in recent years"], ans:2, exp:"More data attacks typically come from inside organizations than outside—yet most institutions concentrate on firewalls for external threats while neglecting internal risks. Firewalls can't eliminate ALL external threats. Data at rest and in process are MORE at risk than data in transit. Security investments have increased in recent years."},
  {q:"Which is a benefit of financial-information management software?", opts:["Improves productivity by replacing automated activities with manual tasks","Provides users with faster, better access to data from multiple sources","Lowers compliance costs by eliminating audit trails and economies of scale","Reduces risk and lowers confidence in the confidentiality and safety of data"], ans:1, exp:"Financial-information management software provides faster, better access to data from multiple sources. It improves productivity by replacing MANUAL tasks with AUTOMATED activities (not the reverse). It lowers compliance costs by INCREASING audit trails and economies of scale. It INCREASES (not lowers) confidence in data confidentiality."},
  {q:"Every morning Lukas logs onto his computer to a data-mining application on his home screen that displays the company's financial performance in charts and tables. Lukas is using a(n):", opts:["Dashboard","Text-mining tool","Artificial neural network","Decision tree"], ans:0, exp:"A dashboard is a data-mining tool that summarizes financial data in real-time charts and tables, often appearing automatically on employees' computer home screens. A text-mining tool mines data from text formats. An artificial neural network identifies errors and questionable entries. A decision tree classifies data and builds models."},
  {q:"A business owner is concerned employees may be using company credit cards for personal purchases. Which data mining technique should be used to identify questionable transactions monthly?", opts:["Nearest-neighbor method","Decision trees","Artificial neural networks","Dashboards"], ans:2, exp:"Artificial neural networks review financial records to identify possible errors and questionable entries—ideal for detecting unusual credit card transactions. Decision trees classify data and build models. The nearest-neighbor method classifies records according to similar historical data. Dashboards display summarized performance data."},
  {q:"Tara needs to assess the potential impact of taking out a loan vs. a line of credit on her business cash flow. Which budgeting software tool should she use?", opts:["Environmental scanning","Decision trees","Debt modeling","Zero-based modeling"], ans:2, exp:"Debt modeling allows users to assess the potential impact of loans and lines of credit by inputting terms (interest rate, term, principal). Decision trees classify data and build models. Environmental scanning gathers info about external business environment. Zero-based budgeting requires justifying every expense from scratch."},
  {q:"Which software application would be best for a small business owner to develop his/her annual budget?", opts:["A project-management application","A database application","A digital dashboard application","A spreadsheet application"], ans:3, exp:"Many small business owners use spreadsheet software (like Excel) to develop budgets. Even budgeting software marketed separately is basically a formatted spreadsheet template. Databases store data but aren't ideal for budget development. Dashboards display data. Project-management apps have budgeting features but for specific projects, not entire businesses."},
  {q:"Franco's manager asked him to compare their company's Q4 performance with others in its industry. Which financial-analysis software feature should Franco use?", opts:["Forecasting","Ratio analysis","DuPont modeling","Benchmarking"], ans:3, exp:"Benchmarking compares a company's financial performance with specific companies in its industry and/or industry standards. Ratio analysis calculates financial ratios automatically. DuPont modeling examines each financial ratio's impact on return on equity. Forecasting makes predictions and develops budgets."},
  {q:"Raul's manager needs lists of invoices generated in specific time periods and will ask for similar data in different time periods regularly. What query type can Raul use without creating a new query each time?", opts:["Crosstab query","Parameter query","Wildcard query","Status query"], ans:1, exp:"Parameter queries allow users to input different criteria (like time periods) each time the same general query is run—without rebuilding the query. Crosstab queries aggregate data transforming rows to columns. Wildcard queries find records with uncertain spelling. Status queries determine system/project status."},
  {q:"One reason why public corporations are required to provide accurate financial reports is because existing and potential shareholders use them to:", opts:["Ensure capital gains","Compile annual reports","Understand currency exchange rates","Make investment decisions"], ans:3, exp:"Shareholders and potential shareholders use accurate financial information to make investment decisions. Inaccurate/misleading information subjects corporations to severe penalties. Exchange rates aren't found in financial reports. Annual reports are compiled by corporations, not shareholders."},
  {q:"Independent auditors review the accuracy of a public corporation's financial statements to:", opts:["Test accounting methods","Verify compliance","Evaluate risk","Summarize collection techniques"], ans:1, exp:"Independent auditors (who don't work for the company) objectively verify that public corporations' financial reports are accurate and comply with government rules and regulations—validating the integrity of financial information. They don't test accounting methods, evaluate risk, or summarize collection techniques."},
  {q:"A primary difference between accounting and finance is that the accounting function focuses on __________, and the finance function focuses on __________.", opts:["Prioritizing needs, problem solving","Allocating funds, decision making","Planning activities, resource management","Reporting transactions, financial planning"], ans:3, exp:"Accounting is responsible for recording and reporting transactions. Finance uses those reports for financial planning—obtaining funds and managing money to achieve business goals. Neither function's primary focus is on prioritizing needs, allocating funds, or planning activities."},
  {q:"Which is an activity conducted by the finance function of business?", opts:["Tracking business expenditures","Preparing cash flow statements","Updating bookkeeping ledgers","Choosing appropriate investments"], ans:3, exp:"The finance function obtains and manages money to boost growth and achieve business goals—choosing appropriate investments increases company income. Tracking expenditures, preparing cash flow statements, and updating bookkeeping ledgers are all accounting activities."},
  {q:"The managerial accounting system emphasizes:", opts:["Previous sales transactions","The current financial situation","A future orientation","Ongoing tax obligations"], ans:2, exp:"Managerial accounting is used for organizational planning and strategic (long-term) decision-making with a future orientation. It looks at current, past, AND future conditions. Tax and financial accounting emphasize past financial performance. Tax accounting handles tax forms/obligations."},
  {q:"A small business records transactions when it receives or spends money. What type of accounting system is it using?", opts:["Positional","Accrual","Cash","Static"], ans:2, exp:"Cash accounting records transactions when money is actually received or spent. This can create problems when a service occurs in one period but payment is received in another. Accrual accounting records transactions at the time they occur regardless of when money changes hands. Positional and static are not types of accounting systems."},
  {q:"Which tool enables financial managers to identify changes or trends in production costs by reviewing the same types of data from different periods?", opts:["Accounts-receivable summary","Frequency ratio","Comparative statement","Sales-transaction log"], ans:2, exp:"Comparative statements compare the same types of data from different time periods (year to year), helping identify changes and trends in production activities, sales, accounts receivable, payroll, etc. Accounts-receivable summaries track money owed. Sales-transaction logs record individual sales."},
  {q:"The Buford Company's ability to pay its short-term debts has improved steadily over three years. What financial ratio helped identify this trend?", opts:["Asset-turnover","Liquidity","Qualitative","Market-value"], ans:1, exp:"The liquidity ratio measures a business's ability to pay its short-term debts—tracking it over time reveals trends in financial well-being. Asset-turnover measures efficiency in using assets to generate sales. Market-value ratios assess stock value. Qualitative data are based on opinion, not financial ratios."},
  {q:"Businesses consider a customer's income when determining whether to:", opts:["Accept cash sales","Offer credit","Restructure policies","Charge interest"], ans:1, exp:"Before offering credit, businesses analyze customers' income, assets, debt ratio, and credit history to determine if they're creditworthy. Cash sales receive money at the point of purchase (no income check needed). One customer's income doesn't prompt policy restructuring. Interest charges are included in credit agreements."},
  {q:"A bank carefully analyzes a customer's current level of debt before it approves a(n):", opts:["Operating proposal","Loan application","Service request","Insurance claim"], ans:1, exp:"Banks consider current debt levels, credit history, credit scores, assets, income, and employment status before granting loans. Banks don't analyze debt levels before service requests or operating proposals. Insurance claims are filed with insurance agencies."},
  {q:"If a small-business owner wants to identify the customers who owe money, what type of report should s/he review?", opts:["Accounts-payable","Aging-accounts","Asset-depreciation","Asset-allocation"], ans:1, exp:"Aging-accounts (accounts receivable) reports identify delinquent customers and monitor overdue payments, helping maintain cash flow. Accounts-payable reports identify vendors the business owes money to. Asset-depreciation reports track decreased asset values. Asset-allocation refers to an investment portfolio's variety."},
  {q:"A manager noticed the store sells more laptops/notebooks in December, January, June, and August. This information can help the store:", opts:["Measure its long-term liabilities","Monitor its general operating costs","Make reliable sales forecasts","Manage its sales staff effectively"], ans:2, exp:"Identifying when laptop sales peak helps develop reliable sales forecasts so the store has enough stock when needed. This trend information doesn't help measure long-term liabilities, monitor general operating costs, or directly manage sales staff."},
  {q:"Lily Marshall met with Barry Endicott who is leaving for another company. She asked what he liked/disliked about his job and what Spartan Industries could do better. What HR activity was Lily performing?", opts:["Onboarding tasks","Exit interview","Application screening","Workplace familiarization"], ans:1, exp:"Exit interviews are discussions with departing employees designed to gain feedback for improving policies and working conditions. Onboarding occurs when new employees join. Application screening filters out unqualified applicants. Workplace familiarization introduces new employees to the facility."},
  {q:"Which is most likely to have a NEGATIVE effect on a business's customer-satisfaction levels?", opts:["Standing orders ship on time","Items are frequently backordered","Product quality is consistent","Staff has sufficient product knowledge"], ans:1, exp:"Frequent backorders mean customers don't get goods when needed, decreasing satisfaction and driving them to competitors. On-time standing orders, consistent product quality, and knowledgeable staff all positively impact customer satisfaction."},
  {q:"Monique used to organize documents in filing cabinets taking up an entire room. Now she stores them on her computer for easy access and organization. Monique now uses:", opts:["Internet telephony","A database","An expert system","Computer automation"], ans:1, exp:"Databases allow records that once took rows of filing cabinets to be stored on computers for quick access, organization, and editing. Internet telephony is web-based communication (Vonage, Skype). Expert systems mimic human expert knowledge. Computer automation is typically used in manufacturing."},
  {q:"True or false: Groupware software applications often stimulate workplace creativity.", opts:["False – groupware only allows users to update numerical data","True – groupware streamlines work so users have more time for social interaction","False – groupware's primary focus is communicating policies and procedures","True – groupware allows users to share and brainstorm ideas that may improve work processes"], ans:3, exp:"Groupware applications allow several people to interact remotely—sharing written and verbal information, solving problems, making decisions, and brainstorming new ideas (a creative-thinking technique). Streamlining work creates efficiency, not just social time. Communicating policies is not groupware's primary focus."},
  {q:"EFG Corporation uses a remote database that employees access anytime through the Internet to house its digital business records. EFG Corporation is using __________ to store its records.", opts:["Cloud computing","A flash drive","Streaming video","Compact disks"], ans:0, exp:"Cloud computing stores business records in a database maintained by a third party at an off-site facility, accessible through the Internet. A flash drive is a local physical storage device. Streaming video downloads/views video in real time. Compact disks are physical storage media."},
  {q:"Statistical data revealed that Zane Industries sold 32% more of a product after making improvements to increase speed and print quality. The statistical findings helped the company determine that:", opts:["R&D expenses exceeded the budget","Its sales forecasts were inaccurate","Product improvements helped boost sales","The company achieved its sales goals"], ans:2, exp:"Statistics showed a specific sales increase after product improvements—helping the company determine that the improvements boosted sales. There's insufficient information to know if R&D exceeded budget, if forecasts were inaccurate, or if sales goals were achieved."},
  {q:"Which action should a business take to help prevent robberies?", opts:["Have one person open and close each day","Avoid making eye contact with customers","Hang up signs on doors and windows","Make sure the facility is well-lit"], ans:3, exp:"Good lighting increases visibility—dark stores with many hiding spots are easier to rob. Making eye contact with customers signals would-be robbers they've been seen. Signs on doors/windows block visibility into the store. Having only one person open/close is dangerous—two people should always be present."},
  {q:"Successful project management depends on the use of appropriate:", opts:["Pressure tactics","Outsourcing","Foreign investments","Technology"], ans:3, exp:"Successful project management depends on appropriate technology (scheduling and budgeting software). Pressure tactics, outsourcing, and foreign investments are not factors that project management success depends on."},
  {q:"When you want to select a new vendor for your business, it's best to:", opts:["Continue using a vendor you've used before","Go with a friend's recommendation","Use a formal selection process","Pick the vendor with the best online reviews"], ans:2, exp:"A formal selection process is the smartest, most effective way to find the best fit for your business. Friends' recommendations may not share your criteria. A previous vendor may be familiar, but better options might exist. Online reviews can be useful but don't guarantee a good fit for your specific needs."},
  {q:"Which factors are most likely to build a quality work culture?", opts:["Coercion and empowerment","Consistency and censorship","Vision and unpredictability","Respect and honesty"], ans:3, exp:"A quality work culture begins with respectful and honest behavior at all levels, building trust, nurturing creativity, and encouraging collaboration. Coercion, unpredictability, and censorship create a negative work environment. Consistency is positive, but censorship is not."},
  {q:"Which is an example of a semi-variable business cost?", opts:["Property taxes","Employees' salaries","Rent","Telephone service"], ans:3, exp:"Semi-variable costs vary to some extent relative to sales. Telephone service has a set monthly fee plus variable charges (like long-distance). Salaried employees get the same pay regardless of hours worked (fixed). Rent and property taxes are also fixed business costs."},
  {q:"All friends are coming for dinner. Instead of asking what they'd like, you decide to order pizza. What style of decision making are you using?", opts:["Managing","Moderate","Minimum","Maximum"], ans:2, exp:"Minimum-input style means the decision maker decides without consulting anyone. Moderate-input would be asking one friend. Maximum-input would be asking all friends and deciding together. Managing is not a style of decision making."},
