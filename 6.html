  {q:"Miguel enjoyed building furniture as a hobby. Word-of-mouth led to requests, so he opened his own woodworking business. He decided to start a business because of his:", opts:["Passion for a hobby","Desire for a flexible schedule","Technological knowledge","Need for adventure"], ans:0, exp:"Entrepreneurial ventures often begin as hobbies. Miguel's woodworking business started because he enjoyed building furniture in his spare time—a passion for his hobby. There's insufficient information to determine if he wanted flexibility, technological knowledge, or adventure."},
  {q:"Tracy contacted her friend David (who works at TPS Industries) about a job she saw on the company's website. David offered to put in a good word with the hiring manager. Tracy acted on an employment opportunity by:", opts:["Volunteering her time","Networking with others","Requesting an internship","Setting up a meeting"], ans:1, exp:"Networking connects with people for professional development—talking with David (a friend with internal company connections) to get an introduction to the hiring manager is networking. Tracy wasn't volunteering, requesting an internship, or setting up a meeting herself."},
  {q:"Lynnette works at Main Street Bank and her primary job is to determine if the bank should lend funds to customers. Lynnette is working as a(n):", opts:["Collections officer","Credit analyst","Chartered financial consultant","Bank agent"], ans:1, exp:"Credit analysts research and confirm loan applicants' employment, income, and credit histories; prepare reports for loan committees; and help in the loan approval process. Collections officers collect past-due payments. A chartered financial consultant specializes in retirement/estate planning. A bank agent is an intermediary."},
  {q:"What is a primary responsibility of a company's controller?", opts:["Evaluating property values","Designing risk policies to minimize business losses","Calculating the risk of loss","Directing the preparation of financial reports"], ans:3, exp:"Controllers direct the preparation of financial reports (balance sheets, income statements) and often oversee accounting/auditing for the entire company. Real estate appraisers evaluate property values. Risk managers design risk policies. Actuaries and underwriters calculate risk of loss."},
  {q:"Many businesspeople are required to take continuing education classes to:", opts:["Supplement their existing income","Improve their standard of living","Demonstrate their emotional intelligence","Maintain their professional certifications"], ans:3, exp:"Many professions (accounting, finance, medicine, education) require continuing education to maintain certifications and licensures, keeping workers current with changes in their fields. Continuing education is not required to supplement income, improve living standards, or demonstrate emotional intelligence."},
  {q:"Annette works for an insurance company establishing premium rates and designing insurance policies to cover risk. She is most likely to have certification as a:", opts:["Certified Financial Planner (CFP)","Certified Financial Analyst (CFA)","Chartered Life Underwriter (CLU)","Chartered Investment Counselor (CIC)"], ans:2, exp:"The Chartered Life Underwriter (CLU) certification is for insurance underwriters who establish premium rates and design policies. CFP is for financial planners. CFA is for financial analysts. CIC is for those managing mutual funds for large firms/clients."},
  {q:"A loan officer with special knowledge in real-estate loans is most likely to have which professional certification?", opts:["Certified Information Systems Auditor (CISA)","Certified Mortgage Banker (CMB)","Certified Internal Auditor (CIA)","Certified Annuities Specialist (CAS)"], ans:1, exp:"The Certified Mortgage Banker (CMB) is a specialized certification for loan officers working with home, commercial, or property mortgages. CIA assesses internal accounting controls. CISA relates to IT/computer systems security. CAS is for those specializing in annuities."},
  {q:"To build a relationship with others working in the same field, a financial planner should consider:", opts:["Participating in an appropriate professional organization","Attending local chamber of commerce meetings","Taking an entrepreneurship class at a community college","Sponsoring events for charitable organizations"], ans:0, exp:"Actively participating in finance-related professional organizations lets financial planners network and build relationships with others in their field (serving on committees, etc.). Chamber of commerce meetings, entrepreneurship classes, and charitable sponsorships present networking opportunities but are not specific to finance professionals."},
  {q:"Maggie uses questionable tactics to get sales, sometimes misleading customers, because her primary goal is to get ahead. Her behavior risks her employer because Maggie places more importance on __________ than on __________.", opts:["Corporate branding, her own productivity","Social responsibility, her career goals","Personal gains, business ethics","Operating procedures, compliance"], ans:2, exp:"Maggie places her personal gains (career advancement) above doing the right thing (business ethics)—which is unethical. Her misleading behavior jeopardizes the employer's reputation and may cause noncompliance issues. She's not prioritizing corporate branding or operating procedures."},
  {q:"To reduce risks associated with unethical business activities, a company should clearly communicate its:", opts:["Code of conduct to all employees","Terms-of-sale policies to executive managers","Product requirements to its primary distributors","Dividend payment schedule to suppliers"], ans:0, exp:"The code of conduct outlines company rules, policies, and ethical expectations for ALL employees—because employees' personal ethics may differ from company ethics. When everyone understands and follows ethical standards, the company faces fewer risks. The other options are specific to certain stakeholders, not company-wide ethics."},
  {q:"What technological application do financial businesses use to evaluate how investment portfolios may react to changing conditions in the markets?", opts:["Automated oversight","Stress testing","Financial compliance","Threat detection"], ans:1, exp:"Stress-testing applications evaluate 'what-if' scenarios to determine stability of specific financial products under different circumstances (like radical economic changes). Automated oversight tracks trader risk limits. Financial compliance and threat detection are not the applications described."},
  {q:"Lower premiums and the ability to control the claims process are advantages of:", opts:["Captive insurance companies","Traditional liability insurance policies","Standard insurance companies","Reinsurance carriers"], ans:0, exp:"Captive insurance companies, formed by organizations for their own protection, allow the founding organizations to control premium rates AND the claims process—unlike traditional/standard insurers where policyholders have no such control. Reinsurance carriers sell insurance to primary insurance carriers to protect them from catastrophic losses."},
  {q:"CopyIt Printing discovered that two new drivers cited for accidents had numerous prior traffic violations with other employers. To avoid hiring unsafe drivers in the future, the company should:", opts:["Conduct background checks on job applicants","Mandate monthly drug testing for all employees","Require delivery drivers to take a driving exam every six months","Ask applicants about former employers during interviews"], ans:0, exp:"Background checks (including driving records and employment history) verify applicants' information and reveal unfavorable past experiences applicants won't volunteer. There's insufficient information to suggest substance abuse, so monthly drug testing may not help. Semi-annual driving exams don't prevent hiring unsafe drivers. Interview questions about former employers can be evaded."},
  {q:"Which is a limitation that businesses face with their internal risk-control activities?", opts:["Economic conditions","Market dynamics","Trade agreements","Human judgment"], ans:3, exp:"Poor employee decisions and mistakes can result in lawsuits, illnesses, and accidents—human judgment is a limitation in internal risk-control activities. Businesses should train employees thoroughly and communicate the importance of accuracy, safety, and security. Economic conditions, market dynamics, and trade agreements are external factors."},
  {q:"To control online transactional risks, a business should consider outsourcing its technology needs when it lacks:", opts:["External training","Financial resources","Secondary data","Internal expertise"], ans:3, exp:"If a business lacks employees with expertise to handle online security technology, it should outsource to consultants/firms with the necessary knowledge and training. Outsourcing itself requires financial resources to pay for it. Secondary data and external training are not the key factor here."}
];

let pileX = [], pileY = [], pileU = [];
let current = null;
let answered = false;
let queue = [], queueSource = '';

function initPiles() {
  pileX = []; pileY = [];
  pileU = ALL_QUESTIONS.map((_, i) => i);
  buildQueue();
}

function buildQueue() {
  if (pileU.length > 0) { queue = shuffle([...pileU]); queueSource = 'unseen'; }
  else if (pileY.length > 0) { queue = shuffle([...pileY]); queueSource = 'review'; }
  else { queue = shuffle([...pileX]); queueSource = 'mastered'; }
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function nextQuestion() {
  if (queue.length === 0) { showRoundComplete(); return; }
  current = queue.shift();
  render();
}

function render() {
  const q = ALL_QUESTIONS[current];
  document.getElementById('count-x').textContent = pileX.length;
  document.getElementById('count-y').textContent = pileY.length;
  document.getElementById('count-u').textContent = pileU.length;
  document.getElementById('progress-bar').style.width = `${(pileX.length / ALL_QUESTIONS.length) * 100}%`;
  document.getElementById('meta').textContent = `${queueSource === 'review' ? 'Review Pile' : queueSource === 'mastered' ? 'Mastered Pile' : 'Unseen Pile'} · ${ALL_QUESTIONS.length} total questions`;
  document.getElementById('question').textContent = q.q;
  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.opts.forEach((o, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.textContent = `${['A','B','C','D'][i]}. ${o}`;
    btn.onclick = () => choose(i);
    opts.appendChild(btn);
  });
  document.getElementById('explanation').style.display = 'none';
  document.getElementById('wrong-choice-note').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';
  answered = false;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const q = ALL_QUESTIONS[current];
  const btns = document.querySelectorAll('.opt');
  btns.forEach(b => b.disabled = true);
  btns[q.ans].classList.add('correct');
  const exp = document.getElementById('explanation');
  if (i === q.ans) {
    pileU = pileU.filter(x => x !== current);
    pileY = pileY.filter(x => x !== current);
    if (!pileX.includes(current)) pileX.push(current);
    exp.className = '';
    exp.style.display = 'block';
    exp.innerHTML = `<strong>✓ Correct → Mastered Pile.</strong> ${q.exp}`;
    document.getElementById('wrong-choice-note').style.display = 'none';
  } else {
    btns[i].classList.add('wrong');
    pileU = pileU.filter(x => x !== current);
    pileX = pileX.filter(x => x !== current);
    if (!pileY.includes(current)) pileY.push(current);
    document.getElementById('wrong-choice-note').style.display = 'block';
    document.getElementById('wrong-choice-note').innerHTML = `<strong>You chose: ${['A','B','C','D'][i]}. ${q.opts[i]}</strong> — This is incorrect.`;
    exp.className = 'wrong-exp';
    exp.style.display = 'block';
    exp.innerHTML = `<strong>✗ Incorrect → Review Pile.</strong> Correct answer: <strong>${['A','B','C','D'][q.ans]}. ${q.opts[q.ans]}</strong><br><br>${q.exp}`;
  }
  document.getElementById('count-x').textContent = pileX.length;
  document.getElementById('count-y').textContent = pileY.length;
  document.getElementById('count-u').textContent = pileU.length;
  document.getElementById('progress-bar').style.width = `${(pileX.length / ALL_QUESTIONS.length) * 100}%`;
  document.getElementById('next-btn').style.display = 'inline-block';
}

function showRoundComplete() {
  document.getElementById('quiz-screen').style.display = 'none';
  const rc = document.getElementById('round-complete');
  rc.style.display = 'block';
  if (pileU.length === 0 && pileY.length === 0) {
    document.getElementById('round-title').textContent = 'All Questions Mastered!';
    document.getElementById('round-sub').textContent = `You've mastered all ${ALL_QUESTIONS.length} questions! Keep reviewing to stay sharp.`;
    document.getElementById('continue-btn').textContent = 'Review All Again →';
  } else if (pileU.length === 0) {
    document.getElementById('round-title').textContent = 'All Unseen Questions Done!';
    document.getElementById('round-sub').textContent = `Mastered: ${pileX.length} | Review pile: ${pileY.length} questions to retry.`;
    document.getElementById('continue-btn').textContent = 'Start Review Pile →';
  } else {
    document.getElementById('round-title').textContent = 'Review Round Complete!';
    document.getElementById('round-sub').textContent = `Mastered: ${pileX.length} | Still in review: ${pileY.length} | Unseen: ${pileU.length}`;
    document.getElementById('continue-btn').textContent = 'Continue →';
  }
}

document.getElementById('next-btn').onclick = () => nextQuestion();
document.getElementById('continue-btn').onclick = () => {
  document.getElementById('round-complete').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  if (pileU.length === 0 && pileY.length === 0) {
    pileX = [];
    pileU = ALL_QUESTIONS.map((_, i) => i);
  }
  buildQueue();
  nextQuestion();
};

initPiles();
nextQuestion();
</script>
