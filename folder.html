{q:"The purpose of using the locking function for a database is to:",opts:["set queries to retrieve data from specific data fields.","allow users to import data from external programs.","develop reports and summarize various data.","ensure that only one person can edit data fields."],ans:3,exp:"The locking function prevents more than one person at a time from making changes to the database, ensuring data integrity when multiple users can view the same information simultaneously."},
{q:"The rate of underemployed workers is often highest when a nation is experiencing an economic:",opts:["Recession","Expansion","Peak","Inhibition"],ans:0,exp:"During a recession, jobs are scarce and workers take jobs for which they are overqualified, increasing underemployment."},
{q:"The reason to write a letter of application to submit with your résumé is to:", opts:["List former employers willing to serve as references","Summarize why you are a good candidate for the job","Include critical information left out of the résumé","Indicate days and times available for an interview"], ans:1, exp:"A letter of application introduces yourself, expresses interest in the job, and briefly describes why you're a good candidate. References go in a separate document. Critical information should be in the résumé, not the letter. Indicating availability for interviews is considered rude and arrogant."},
{q:"The reason why an employee should report an employer's noncompliance with safety regulations is to:",opts:["keep the business from selling substitute goods to consumers.","protect the well-being of the business's employees and customers.","maintain the business's reputation in the competitive environment.","ensure that employees receive fair pay for any overtime they work."],ans:1,exp:"If a business is not following safety regulations, it is not protecting the well-being of its employees and customers. Reporting allows the government to ensure corrective action before an accident occurs."},
{q:"The Sarbanes-Oxley Act of 2002 is legislation that was passed in response to recent:",opts:["collection activities.","investment options.","tax settlements.","accounting scandals."],ans:3,exp:"The Sarbanes-Oxley Act was passed in response to major corporate and accounting scandals (e.g., Enron, WorldCom), which resulted in a loss of public trust in accounting and reporting procedures."},
{q:"The section of the SEC website that houses companies' filings is called:",opts:["EDGAR.","EDWIN.","EDMUND.","EDWARD."],ans:0,exp:"EDGAR stands for Electronic Data Gathering and Retrieval. It is the section of the SEC website that houses companies' filings."},
{q:"The Smiths list problems with their new home. If the builder has a positive attitude, their first action will be to:",opts:["Take responsibility for the problems","Convince the Smiths there are no problems","Discuss the problems with employees","Blame the problems on circumstances"],ans:0,exp:"Positive people are dependable and accept responsibility. They admit mistakes, don't make excuses, and don't blame others. Discussing with employees would come later."},
{q:"The SOSWYM Company is excellent at financial recordkeeping, which allows them to see which items are selling. This is an example of how good recordkeeping can help",opts:["Keep track of deductible expenses","Prepare tax returns","Monitor the progress of a business","Prepare financial statements"],ans:2,exp:"Good recordkeeping can help with monitoring the progress of a business, showing whether a business is improving, which items are selling, or what changes need to be made."},
{q:"The stock table column that tells you how many shares were traded that day is labeled:",opts:["DIV.","NET CHG.","YLD %.","VOL."],ans:3,exp:"VOL (Volume or Sales) records how many shares were traded that day. NET CHG is the net change; DIV is the dividend; YLD% is the yield percentage."},
{q:"The Sun Valley Granola Company spent more on advertising than quality control and received more complaints from dissatisfied customers. What financial information management function did the company neglect?",opts:["Policy setting","Planning","Budgeting","Stewardship"],ans:3,exp:"Financial stewardship ensures financial resources are allocated appropriately and ethically to fulfill the company's mission. Spending on promotion over quality neglects this stewardship."},
{q:"The Taguchi quality-control method focuses on:",opts:["Reducing waste","Conformance to standards","Product design and development","Manufacturing processes"],ans:2,exp:"The Taguchi method focuses on product design and development, not on manufacturing processes or conformance to standards."},
{q:"The tendency to respond to situations based on how those situations are posed or viewed is known as:",opts:["Framing","Obedience to authority","Groupthink","Overoptimism and overconfidence"],ans:0,exp:"Framing is the tendency to respond to situations based on how they are posed or viewed. Groupthink involves group decision-making that discourages individual responsibility."},
{q:"The two basic types of business risk are:",opts:["theft and death.","incompetence and carelessness.","pure and speculative.","fires and floods."],ans:2,exp:"Pure risks carry the possibility of loss or no loss. Speculative risks may result in a loss, no change, or a gain. Fires/floods are natural risks; theft/death and incompetence are human risks."},
{q:"The two main divisions of the trade industry are:",opts:["producers and retailers.","wholesalers and producers.","wholesalers and retailers.","manufacturers and wholesalers."],ans:2,exp:"Trade industries buy and sell goods. Wholesalers sell to retailers, who sell to consumers. Manufacturers and producers are not part of the trade industries."},
{q:"The two major sections on a balance sheet are:",opts:["Assets and liabilities","Assets and income","Expenses and assets","Cash flow and liabilities"],ans:0,exp:"Assets and liabilities are the two major sections that must balance on a balance sheet. Cash flow, income, and expenses appear on other financial statements."},
{q:"The way you follow up with a customer when showing a customer service mindset will vary according to:",opts:["the customer's level of frustration.","the type of service you have provided the customer.","how far away the customer is located.","how much attention your supervisor paid to the customer."],ans:1,exp:"Follow-up should vary by the type of service provided to ensure continued customer satisfaction. All customers are equally important."},
{q:"The yen, peso, and euro are types of:",opts:["bonds.","money.","stock.","dollars."],ans:1,exp:"Money is the most common medium of exchange. Different countries use different currencies — yen (Japan), peso (Mexico), euro (European countries). Bonds and stock are different financial instruments."},
{q:"Theo often recommends high-risk, high-commission investments in an effort to earn a larger commission for himself. This is an example of",opts:["A finance charge","Acting in good faith","A conflict of interest","Complying with laws and regulations"],ans:2,exp:"A conflict of interest is a situation in which it is impossible to be truly impartial. Theo is prioritizing his own personal gain over his client's well-being."},
{q:"There are two basic ways a business can increase profit. Which is most likely to help a business increase its sales?",opts:["Change what it provides","Increase worker efficiency","Eliminate some free services","Avoid extra payroll expenses"],ans:0,exp:"Changing what a business provides (e.g., new flavors, styles) can attract new buyers and increase sales. The other options decrease expenses, not increase sales."},
{q:"There is a growing need for cultural intelligence when conducting business because of:",opts:["Globalization","Technology","Economics","Politics"],ans:0,exp:"Globalization requires businesses to develop cultural intelligence—an understanding of and sensitivity to differences in customs, traditions, and values across cultures."},
{q:"Theresa carefully follows written directions for an assignment. As she finishes the last step, she realizes her work in step two may not be exactly right. What should she do?",opts:["Ask her supervisor to clarify the directions","Turn in her work quickly so her supervisor can identify corrections","Restart the assignment working off her new thought for step two","Email her work to three coworkers to get their opinions"],ans:0,exp:"If there is concern about the assignment directions, Theresa needs to get clarification from her supervisor. It is better to finish correctly than submit work that doesn't meet the supervisor's intent."},
{q:"Thomas bought a car with a $4,000 down payment and makes monthly payments of $365 until paid off. Thomas is using __________ credit.", opts:["Service","Revolving","Budget","Installment"], ans:3, exp:"Installment credit handles one total amount paid off in regular payments. Thomas pays a set amount at regular intervals. Revolving credit limits total debt and charges interest on balances. Budget credit is a 60- or 90-day arrangement. Service credit is for utilities consumed but not yet paid for."},
{q:"Three types of communication usually found in a business with a formal communication network are:",opts:["informational, official, and conversational.","grapevine, informal, and standard.","upward, horizontal, and diagonal.","downward, upward, and lateral."],ans:3,exp:"Formal communication moves in three directions: downward (management to employees), upward (employees to management), and lateral (between staff on the same level)."},
{q:"Tiana is responsible for receiving all shipments for the Castle of Chocolate. She fails to notice that several items ordered and paid for were not shipped. Her error is most likely to:",opts:["create unhappy customers.","decrease inventory cost.","increase inventory cost.","increase shipping costs."],ans:2,exp:"When an employee fails to notice missing received items, the business paid for goods it didn't receive, increasing inventory costs."},
{q:"To allow your ideas to flow freely when trying to be creative, you should avoid being:",opts:["determined.","independent.","self-critical.","curious."],ans:2,exp:"Few things stop creativity like criticism. Censoring your ideas limits the number and quality of ideas that appear. Independence, curiosity, and determination are traits creative people often have."},
{q:"To be most effective, continuous-inspection compliance technology should have access to transactional information:",opts:["at its source.","biweekly.","samples.","liquidity ratios."],ans:0,exp:"To prevent an intermediary from tampering with transactional data, continuous-inspection compliance technology must have access to the information at its source as transactions actually occur."},
{q:"To be reimbursed for expenses, Luke must obtain a form, attach receipts, and submit to his manager. What is Luke doing?", opts:["Developing company policies","Following company procedures","Evaluating company feedback","Assessing company guidelines"], ans:1, exp:"A procedure is the step-by-step process that personnel follow performing a specific task. Policies are general rules. Luke was following the steps for reimbursement, not developing, evaluating, or assessing anything."},
{q:"To build a relationship with others working in the same field, a financial planner should consider:", opts:["Participating in an appropriate professional organization","Attending local chamber of commerce meetings","Taking an entrepreneurship class at a community college","Sponsoring events for charitable organizations"], ans:0, exp:"Actively participating in finance-related professional organizations lets financial planners network and build relationships with others in their field (serving on committees, etc.). Chamber of commerce meetings, entrepreneurship classes, and charitable sponsorships present networking opportunities but are not specific to finance professionals."},
{q:"To build professional relationships, a finance professional talks with friends, family, and business associates about advancing in their career. This activity is called:",opts:["networking.","selling.","socializing.","coordinating."],ans:0,exp:"Networking involves connecting with others to accomplish personal career and professional goals. Finance professionals often learn about opportunities and gain client leads through networking."},
{q:"To build professional relationships, Brynn serves on trade association committees, co-authors articles, and treats contacts to dinner or golf. These are forms of:", opts:["Advertising","Cooperating","Networking","Up-selling"], ans:2, exp:"Networking connects individuals who might help accomplish career goals. Cooperating shows willingness to work together to resolve differences. Advertising is paid nonpersonal presentation. Up-selling suggests higher-priced alternatives to customers."},
{q:"To calculate the future value of money, you need the present value, the length of time, and the:",opts:["Interest rate","Wage","Utility","Bottom line"],ans:0,exp:"The future value formula FV = PV × (1 + i)^n requires present value, interest rate, and time period."},
{q:"To contribute to a discussion in a useful way, you should avoid:",opts:["blurting out statements without thinking.","talking about what's on your mind.","stating opinions and stick to the facts.","paying attention when others are speaking."],ans:0,exp:"Think before speaking in discussions. You should talk about what's on your mind, share both facts and opinions appropriately, and pay attention when others speak."},
{q:"To control online transactional risks, a business should consider outsourcing its technology needs when it lacks:",opts:["internal expertise.","financial resources.","secondary data.","external training."],ans:0,exp:"If a business doesn't have employees with the expertise to handle secure online transaction technology, it should consider hiring a consultant or firm with the appropriate knowledge."},
{q:"To defend your ideas in an objective and respectful way, you should:",opts:["Advise the other person that his/her opinion is illogical","Present facts that support your point of view","Use dramatic gestures to reinforce your message","Provide a rebuttal for everything the other person says"],ans:1,exp:"Having facts to support your idea makes others more likely to accept it. Telling others their opinion is illogical or refuting everything offends them."},
{q:"To determine the percentage gain or loss on an investment, a company needs to evaluate its",opts:["Rate of return","Accounts payable","Credit rating","Dividend payments"],ans:0,exp:"A company's rate of return is its gain or loss received in return for an investment, recorded as a percentage of the investment."},
{q:"To determine which bills are due in the next 10 days and their amounts, a company needs to use a financial analysis application to evaluate its:",opts:["Accounts payable","Dividend payments","Sales revenue","Credit rating"],ans:0,exp:"Accounts payable are monies owed by the business. Accounts-payable applications help organize bills and allocate funds to pay them when due."},
{q:"To develop a professional-looking résumé, the writer should:", opts:["Proofread the document for spelling errors","Organize information in chronological order","Begin by describing work history","Create interest by using colorful text"], ans:0, exp:"Professional résumés are uncluttered, concise, and error-free. Employers view spelling/grammar errors as indicating a lack of attention to detail. The organizational order depends on the individual's preferences and experience. Colorful text can be distracting."},
{q:"To effectively solve problems in business, employees need to:",opts:["Respect the opinions of others","Be aggressive if necessary","Stand firm in their beliefs","Obtain support for their side"],ans:0,exp:"Respecting others' opinions and finding acceptable compromises is key to problem-solving. Aggression, standing firm, and taking sides divide the workforce."},
{q:"To enable capital to flow more freely across national borders, many countries have:", opts:["Encouraged foreign investors to demonstrate a home bias","Moved from floating to fixed exchange rates","Increased tariffs on imports and lowered taxes on international transactions","Removed limits on foreigners' access to domestic financial markets"], ans:3, exp:"Liberalization and deregulation have increased financial globalization. Nations removed limits on foreigners' access to domestic markets. Moving from fixed to floating exchange rates (not the other way) increased global investment. Nations want investors to eliminate home biases, not demonstrate them."},
{q:"To endorse a check, the payee must sign on the:", opts:["Back of the check","Signature block of the check","Check's memo line","Check's 'Pay to the order of' section"], ans:0, exp:"Endorsement involves signing the back of the check, allowing funds to be transferred from payer to payee. The payer completes the front including the signature line and 'Pay to the order of' section. The memo line identifies the purpose."},
{q:"To endorse a check, the payee must sign their name on the:",opts:["check's memo line.","back of the check.","check's 'Pay to the order of' section.","signature block of the check."],ans:1,exp:"Endorsement requires signing the back of the check to transfer funds from payer to payee. The front of the check is completed by the payer."},
{q:"To ensure you make the right decisions, you should follow your ethical principles:",opts:["no matter what.","when it's easy.","when other people tell you to.","when your boss is watching."],ans:0,exp:"Ethical principles must be followed no matter what — not just when convenient, when observed, or when instructed by others."},
{q:"To evaluate the effectiveness of their compliance programs, many businesses conduct:", opts:["Direct trading","Training sessions","Marketing research","Internal audits"], ans:3, exp:"Internal auditors (company employees) review reports, policies, procedures, training, and corrective actions to determine if the compliance function is working properly. Training sessions are for learning, not evaluating. Marketing research and direct trading are unrelated to compliance evaluation."},
{q:"To expand into foreign markets, an American business owner purchases a small manufacturing plant in Thailand. Which entry mode is the business owner using?",opts:["Independent trade intermediary","Joint venture","Wholly owned subsidiary","Franchise"],ans:2,exp:"A wholly owned subsidiary is a manufacturing plant owned and controlled by the American parent company. A joint venture involves two businesses sharing resources; a franchise is a contractual agreement."},
{q:"To find an article called 'The Truth About Commercial Interest Rate Increases,' which search entry gives most accurate results?", opts:['[-the -truth -about -commercial -interest -rate -increases]','{ truth_ commercial interest rate_ increases}','"the truth about commercial interest rate increases"','"{-the_truth_about_commercial_interest_rate_increases-}"'], ans:2, exp:"Placing quotes around a phrase tells the search engine to show results containing that exact phrase. Dashes mean 'exclude this word.' Underscores and parentheses are less likely to retrieve exact results."},
{q:"To guard against intentional ethical violations such as deliberate financial data tampering, an organization should maintain:",opts:["hard copies of all documents.","audit trails of data changes.","daily balance sheets.","an accounts receivable schedule."],ans:1,exp:"Audit trails record details of any financial data changes or tampering, enabling recovery and restoration of data. Hard copies of every document are unnecessary."},
{q:"To have successful collaborative partnerships in the workplace, it is important for employees to:", opts:["Limit communication","Establish trust","Avoid conflict","Support all ideas"], ans:1, exp:"Successful collaboration requires trust—when employees trust coworkers, they're open, honest, and willing to work together. Employees don't need to support all ideas, just be respectful. They can't always avoid conflict but can handle it constructively. Limiting communication hinders collaboration."},
{q:"To house its digital business records, EFG Corporation uses a remote database that employees can access anytime through the internet. EFG Corporation is using __________ to store its business records.",opts:["compact disks","a flash drive","streaming video","cloud computing"],ans:3,exp:"Cloud computing stores data in remote databases maintained by third parties, accessible via the internet. This contrasts with physical storage like CDs or flash drives."},
{q:"To keep up with social, political, economic, and regulatory changes affecting their business, companies should:", opts:["Conduct environmental scans","Implement internal analyses","Plan customer interviews","Prepare organizational inspections"], ans:0, exp:"Environmental scanning monitors external factors so companies can adapt. Internal analyses and organizational inspections focus on what's happening inside the company. Planning customer interviews is just preparation—companies must actually conduct them to get the information."},
{q:"To maintain a quality work culture throughout all levels of an organization, it is important for businesses to:",opts:["Train employees thoroughly","Solve problems with minimal input","Emphasize short-term gains","Focus primarily on financial issues"],ans:0,exp:"Thorough and ongoing training ensures employees can perform jobs correctly and keep up with technological changes."},
{q:"To make sure he develops a realistic personal budget, Marcel should always:",opts:["consult with a bookkeeper.","pay his bills on time.","verify his past credit rating.","track and record his expenses."],ans:3,exp:"Realistic budgets require both income and expense knowledge. Tracking and recording expenses shows bill amounts and due dates, which is essential for developing a realistic budget."},
{q:"To manage her project resource needs, Neveah used a digital system that made accurate estimates based on algorithms. Which tactic did Neveah use to estimate project resources?",opts:["Bottom-up estimating","Group decision-making techniques","Three-point estimating","Project management software"],ans:3,exp:"Project management software can take all of your information and make accurate estimates based on algorithms."},
{q:"To manage potential risks from unethical conduct, many companies build internal infrastructures that typically include appropriate audit procedures, a code of conduct, and a __________ policy.",opts:["whistleblower","credit","monetary","constituent"],ans:0,exp:"A whistleblower policy encourages and enables employees to report unethical behavior without fear of negative repercussions such as demotion or firing."},
{q:"To manage risks from unethical conduct, many companies build internal infrastructures including audit procedures, a code of conduct, and a __________ policy.",opts:["Monetary","Whistleblower","Constituent","Credit"],ans:1,exp:"A whistleblower policy encourages and enables employees to report unethical behavior without fear of negative repercussions like demotion or firing."},
{q:"To manage their work commitments in a timely manner, businesspeople should:",opts:["Work on enjoyable tasks before unpleasant tasks","Ask coworkers to help with routine activities","Estimate the time it takes to perform their tasks","Identify shortcuts to get work done quickly"],ans:2,exp:"Estimating task times helps plan, prioritize, and avoid scheduling activities too close together, which affects quality."},
{q:"To participate effectively in a staff meeting, you should:",opts:["Answer emails during slow points to not waste company time","Bring up any personal concerns so they can be discussed","Read important documents and do research ahead of time","Share your opinion on each topic so your manager knows you're paying attention"],ans:2,exp:"Preparation is the most important way to participate effectively. Personal concerns, emails, and sharing opinions on everything are all inappropriate."},
{q:"To participate effectively in a staff meeting, you should:",opts:["bring up any personal concerns so that they can be discussed with the group.","read important documents and do research ahead of time so you're prepared.","answer emails during slow points so you don't waste any company time.","share your opinion on each topic discussed so your manager knows you're paying attention."],ans:1,exp:"Preparation — reading documents and researching — is the most important way to contribute to a staff meeting. Personal concerns should be handled privately; stay off devices; don't dominate discussion."},
{q:"To perform a proper data analysis, the researcher should be:",opts:["Untrained","Unbiased","Inconsistent","Judgmental"],ans:1,exp:"For proper data analysis, the researcher should be unbiased, nonjudgmental, trained, and consistent."},
{q:"To prevent unauthorized access to a computer system or network, businesses typically install:",opts:["Firewall software","Spyware applications","Debugger applications","Compression software"],ans:0,exp:"Firewalls secure and protect computer networks from unauthorized users. Spyware monitors user activity; debuggers fix programming errors; compression reduces file size."},
{q:"To protect the integrity of archived financial information, businesses might consider using different types of:",opts:["Storage strategies","Service procedures","Monetary exchanges","Production methods"],ans:0,exp:"Businesses must consider how to archive historic financial information, often using magnetic or optical storage, keeping up with evolving technology."},
{q:"To reduce risks associated with unethical business activities, a company should clearly communicate its:", opts:["Code of conduct to all employees","Terms-of-sale policies to executive managers","Product requirements to its primary distributors","Dividend payment schedule to suppliers"], ans:0, exp:"The code of conduct outlines company rules, policies, and ethical expectations for ALL employees—because employees' personal ethics may differ from company ethics. When everyone understands and follows ethical standards, the company faces fewer risks. The other options are specific to certain stakeholders, not company-wide ethics."},
{q:"To reduce the risk of future legal problems, a company might require its business partners to sign a formal:",opts:["Warrant","Premium","Invoice","Contract"],ans:3,exp:"A written contract documenting the terms reduces misunderstanding about what is expected and provided. Without documentation, legal action may be needed if problems arise."},
{q:"To reduce the risk of loss due to fire or power outages, a financial business should protect its computer data by:",opts:["Monitoring data-transmission rates","Using encryption techniques","Implementing an authorization process","Conducting backup procedures"],ans:3,exp:"Backup procedures duplicate computer records and store them in a different location, allowing retrieval if data is lost due to crashes, power outages, or fires."},
{q:"To reduce the risk of unauthorized access to confidential data, businesses use security software to protect their:",opts:["corporate policies.","intranet systems.","intercom systems.","spam email."],ans:1,exp:"An intranet is a business's internal computer network. Businesses use security software like encryption and passwords to protect confidential data stored on their intranet."},
{q:"To remain competitive and reduce the risk of failure, a business should:", opts:["Monitor emerging trends","Access competitors' records","Appeal to all markets","Expand internationally"], ans:0, exp:"Businesses must continuously monitor trends and adjust accordingly to remain competitive. Accessing competitors' confidential records is improper. Successful businesses select target markets carefully—appealing to all markets isn't feasible. International expansion depends on business type and goals."},
{q:"To secure confidential financial data transmitted through the internet, businesses often use:",opts:["Cross-platform technology","Encryption techniques","Bots","Debuggers"],ans:1,exp:"Encryption transforms information into a secret code so only the intended recipient can read it, preventing unauthorized individuals (like hackers) from obtaining financial data."},
{q:"To stay in business, Tom's pencil company must:",opts:["Have a distribution plan","Make a profit","Employ a sales force","Order more machinery"],ans:1,exp:"A business won't survive unless it makes a profit—the monetary reward for taking the risk involved in investing in a business."},
{q:"Todd created a graphic organizer using pictures, graphs, and simple statements to sequentially present information about quality-control processes. What did Todd develop?",opts:["Proposal","Outline","Draft","Storyboard"],ans:3,exp:"A storyboard uses a combination of pictures, graphs, and simple statements to present information in sequential order. Outlines are general plans; drafts are preliminary writings; proposals are suggestions."},
{q:"Todd knew layoffs were coming but told Cynthia 'not to worry.' Her job was eliminated the following week. Ethical issues occurred because:", opts:["Todd was completely honest with Cynthia","Cynthia asked irrelevant questions","Todd misled Cynthia","Cynthia started the rumors"], ans:2, exp:"Todd misled Cynthia by implying her job was safe when he knew layoffs were coming. A better response would have been to say he didn't have all the facts and didn't want to speculate. Cynthia's questions about her job were relevant. She heard the rumors, not started them."},
{q:"Tom admits he doesn't know much about Argentina's culture before meeting a wealthy client from there. What is the most appropriate advice?",opts:["Require the client to hire an interpreter","Take an online course to learn French","Learn about Argentina's culture and adapt his communication style","Tell him not to worry about language barriers"],ans:2,exp:"Learning about a client's culture and adapting communication style helps build positive business relationships and avoids offensive actions."},
{q:"Tosha prepares monthly financial reports for senior executives, helps create budgets, reviews tax returns, and analyzes company finances. She is most likely a:", opts:["Certified Internal Auditor (CIA)","Certified Public Accountant (CPA)","Certified Management Accountant (CMA)","Certified Fraud Examiner (CFE)"], ans:2, exp:"The CMA designation is most appropriate for management accountants who prepare internal financial reports, create budgets, review tax returns, and analyze company finances. CPAs serve multiple clients. CIAs assess internal accounting records/controls. CFEs detect and prevent accounting fraud."},
{q:"Tracy contacted her friend David (who works at TPS Industries) about a job she saw on the company's website. David offered to put in a good word with the hiring manager. Tracy acted on an employment opportunity by:", opts:["Volunteering her time","Networking with others","Requesting an internship","Setting up a meeting"], ans:1, exp:"Networking connects with people for professional development—talking with David (a friend with internal company connections) to get an introduction to the hiring manager is networking. Tracy wasn't volunteering, requesting an internship, or setting up a meeting herself."},
{q:"Trade-offs should be based on:",opts:["capital goods.","scarcity.","opportunity cost.","noneconomic wants."],ans:2,exp:"Trade-offs require weighing the opportunity cost — the lost benefit of the alternative not chosen. Scarcity creates the need for trade-offs, but opportunity cost is the basis for making them."},
{q:"Training and continuing education, rewarding ethical behavior, leading by example, and an open door policy are all ways to:",opts:["Ensure adherence to an ethics code","Reduce employee creativity","Increase competition and mistrust","Heighten conflict among employees"],ans:0,exp:"These activities reinforce an ethics code and ensure employees understand and follow ethical standards."},
{q:"Transcend Industries requires employees to scan their ID badges to access company buildings. This is an example of a __________ policy.",opts:["Discrimination/harassment","Health and safety","Leave","Disciplinary"],ans:1,exp:"Health and safety policies are designed to protect employees and customers from harm. Common health and safety guidelines include requiring employees to scan ID badges."},
{q:"Trevor referred several friends to Catherine, his financial planner of 10 years, because she kept him updated and had his best interests in mind. The benefit to Catherine is that she:",opts:["received referrals from an existing client.","gained a positive reputation through social media applications.","obtained recognition from her colleagues.","earned a sizable commission from Trevor's investments."],ans:0,exp:"When satisfied clients recommend a financial planner to others, the planner receives referrals that expand their client base and earning potential."},
{q:"Trevor usually purchases janitorial supplies from the store across the street from his office. His buying behavior is most likely based on:", opts:["Brand insistence","Convenience","Price","Product dependability"], ans:1, exp:"Trevor's close proximity to the store suggests convenience drives his buying behavior. While brand, price, and dependability might influence him, there's insufficient information to determine those factors are important to Trevor in this situation."},
{q:"Troy met Melissa, owner of a large financial-planning company, at his neighbor's cookout. They exchanged cards and set up an appointment to discuss business opportunities. In what type of situation did they form a professional relationship?",opts:["Formal event","Social networking","Educational setting","Corporate environment"],ans:1,exp:"Professional networking can occur in social situations — like a neighborhood cookout. Troy and Melissa did not meet at a formal event, educational setting, or corporate environment."},
{q:"True or false: Employers are more concerned with employees' job skills than with personal appearance.", opts:["False – appearance can influence customers' perceptions about the company","False – employers are most concerned with ability to work well with others","True – employees must have skills because most employers don't have training resources","True – clothing and hygiene are not as important as efficiency levels"], ans:0, exp:"While employers want job skills and interpersonal skills, personal appearance is also critical. Appearance reflects company image and influences customers' perceptions and buying decisions. Most employers must still provide some training even when hiring skilled employees."},
{q:"True or false: Groupware software applications often stimulate workplace creativity.", opts:["False – groupware only allows users to update numerical data","True – groupware streamlines work so users have more time for social interaction","False – groupware's primary focus is communicating policies and procedures","True – groupware allows users to share and brainstorm ideas that may improve work processes"], ans:3, exp:"Groupware applications allow several people to interact remotely—sharing written and verbal information, solving problems, making decisions, and brainstorming new ideas (a creative-thinking technique). Streamlining work creates efficiency, not just social time. Communicating policies is not groupware's primary focus."},
{q:"Truman Enterprises evaluated economic, environmental, and social factors in a document released to stakeholders. Truman developed a(n):",opts:["Sustainability report","Mission statement","Executive summary","Action plan"],ans:0,exp:"Sustainability reporting summarizes a company's social responsibility—governance practices, stakeholder commitment, and environmental impact."},
{q:"Trying to balance friendships with extracurricular activities is an example of a __________ risk.",opts:["Financial","Relationship","Reputational","Health and safety"],ans:1,exp:"Relationship risks are the risks that come with your choice of friends and their impact on you. Balancing friendships with extracurricular activities has a direct impact on your friends."},
{q:"Two different financial institutions merge to become one company, combining their assets and liabilities. This is an example of",opts:["Bancassurance","Financing","Consolidation","Inflation"],ans:2,exp:"Consolidation refers to combining assets, liabilities, and other financial items of two or more entities into one."},
{q:"Two languages serve as the building blocks of a functional web page: __________, which provides the structure, and __________, which provides the visual appearance.",opts:["CSS; HTML","FTP; HTTPS","HTML; CSS","HTTP; DNS"],ans:2,exp:"HTML provides the structure or skeleton, while CSS provides the visual appearance or skin of the web page."},
{q:"Two of Toby's close friends get into a fight, and both demand he hear their perspective and resolve the matter. This is an example of a __________ problem.",opts:["School","Work","Peer","Personal"],ans:2,exp:"Problems with peers occur among people similar in age and background. Though it may affect personal, school, or work life, it is fundamentally a peer problem."},
{q:"Typical characteristics of a person with a negative attitude are that s/he is:",opts:["Courteous and considerate toward others","Inflexible and resistant to change","Generous and helpful to others","Flexible and open to new ideas"],ans:1,exp:"Negative people tend to be inflexible and resistant to change. Positive attitudes involve being flexible, generous, and open."},
{q:"Tyrese and his team are creating a list of their company's critical enterprise-wide risks. They are compiling:",opts:["A risk inventory","A risk assessment","Enterprise risk management","A risk control"],ans:0,exp:"A risk inventory is a listing of all of an organization's critical enterprise-wide risks. A risk assessment evaluates specific risks; ERM is the overall management approach."},
{q:"Under what circumstances would stock prices increase?",opts:["When consumer spending increases","During times of high unemployment","When interest rates increase","During a bear market period"],ans:0,exp:"Increased consumer spending indicates a growing economy and low unemployment. More people working means more money to invest in financial markets, generally increasing stock prices."},
{q:"Under which circumstance is a co-signer held legally responsible for paying the balance owed on a bank loan?", opts:["The lender's interest rate increases","The lender defaults on the loan","The borrower's interest rate increases","The borrower defaults on the loan"], ans:3, exp:"A co-signer is legally responsible if the borrower defaults (fails to make scheduled payments). The co-signer steps in when the borrower cannot repay. Changes in interest rates don't affect a co-signer's legal responsibility."},
{q:"Under which circumstances should applicants send interview follow-up messages?",opts:["When they are sure they will get the job","Only if they are interested in the job","After every employment interview","If they are convinced they are qualified"],ans:2,exp:"Job applicants should send follow-up messages after every employment interview to thank the interviewer and create a favorable impression."},
{q:"Under which of the following circumstances is it appropriate for applicants to prepare interview follow-up letters?",opts:["Before they agree to pre-employment testing","When they are no longer interested in the job","After they have submitted application forms","In order to send information with résumés"],ans:1,exp:"One reason for sending follow-up letters is to be courteous and thank the interviewer. Applicants should send follow-up letters even if no longer interested, as this builds positive relationships for future opportunities."},
{q:"Unethical actions typically lead to an increase in:",opts:["financial risk.","stock values.","sales revenue.","positive customer relations."],ans:0,exp:"Unethical behavior exposes businesses to financial risk through lost productivity, fines, and employee turnover. It typically leads to decreased sales and negative public image, not increased stock values."},
{q:"Unethical actions:",opts:["Are acceptable if everyone else does them","Always have legal consequences","Are not always illegal","Only affect the person doing them"],ans:2,exp:"Being unethical doesn't always mean breaking the law. Unethical behavior can affect everyone, not just the person doing it."},
{q:"Unlike traditional risk management, enterprise risk management requires corporations to identify all risks they face, allowing them to see the bigger picture. This is described as a __________ approach.",opts:["Reactive","Centralized","Holistic","Risk-specific"],ans:2,exp:"A holistic approach refers to managing risks in a way that considers all risks collectively to understand their interconnections and impact on the organization as a whole."},
{q:"Use of budgeting applications that provide real-time data helps companies:",opts:["Respond quickly to changes in the business environment","Provide information annually to decision makers","Secure departmental data from other departments","Increase the amount of line items in the budget"],ans:0,exp:"Real-time data allows decision makers to make changes in response to current business conditions rather than waiting for annual reports."},
{q:"Using appropriate software to protect confidential data stored on a company's computer systems is an important part of managing:",opts:["Physical safety risks","Security risks","Natural disasters","Environmental hazards"],ans:1,exp:"Businesses use technology like firewalls to minimize security risks and prevent hackers from obtaining confidential financial data."},
{q:"Using computer-data backup procedures on a regular basis reduces risk because the process:",opts:["saves information when computer failures occur.","prevents hackers from accessing the computer system.","detects noncompliance issues.","allows employees to use many applications."],ans:0,exp:"Backups save business information at set intervals so it can be retrieved if the system fails. Backup procedures don't specifically prevent hacking or detect noncompliance."},
{q:"Using CRM technology and an effective CRM strategy can increase a business's revenues by:",opts:["Raising prices of products","Allowing for a larger sales staff","Lowering prices of products","Providing better customer service"],ans:3,exp:"CRM helps companies understand customer needs, enabling better customer service. It doesn't directly relate to price changes or the size of the sales staff."},
{q:"Using the project plan schedule, calculate the number of hours allocated to complete Tasks 2 and 4 during the third week. (Task 2 Week 3: 10 hrs; Task 4 Week 3: 20 hrs)",opts:["25","30","35","40"],ans:1,exp:"Task 2 in Week 3 = 10 hours; Task 4 in Week 3 = 20 hours. Total = 10 + 20 = 30 hours."},
{q:"Valerie can now order her favorite beach candy online and have it whenever she wants. This is an example of how:",opts:["Utility is constant and unchanging","Place utility is not important","Business can create form utility","The Internet has changed utility"],ans:3,exp:"The Internet has changed place utility—customers can get products they want regardless of physical distance from the business."},
{q:"Vanessa developed guidelines for her fitness center (medical history, equipment instructions, CPR certification) hoping to avoid __________ lawsuits.", opts:["Private nuisance","Negligence","Breach-of-contract","Discrimination"], ans:1, exp:"Negligence lawsuits occur when a business fails to protect customers from harm. Risk managers develop policies and procedures to protect customers and avoid negligence claims. Private nuisance involves disrupting peaceful home life. Breach-of-contract involves failing to fulfill promises."},
{q:"Variance analysis documents the difference between actual and planned behavior and:",opts:["Investigates why that discrepancy occurred","Arranges this information for public review","Changes operations to address any issues","Suspends activity until numbers are aligned"],ans:0,exp:"Variance analysis identifies discrepancies and provides an explanation for why and how the difference happened."},
{q:"Variance analysis helps a business:",opts:["Compare itself with competitors","Make choices between two alternatives","Maintain budgetary control","Predict future trends"],ans:2,exp:"Variance analysis determines the difference between planned and actual results, ensuring the company is following the budget and maintaining budgetary control."},
{q:"Variance analysis helps maintain control over a project's expenses by monitoring __________ costs versus __________ costs.",opts:["Planned; actual","Planned; past","Actual; past","Fixed; indirect"],ans:0,exp:"A variance analysis assesses the difference between planned (or budgeted) costs versus actual costs."},
{q:"Virtual audits are different than traditional audits in that virtual audits:",opts:["don't rely on technology.","must offer printed copies of data.","cannot be done remotely.","involve sharing documents online."],ans:3,exp:"Virtual audits occur via online means. Documents are shared digitally with auditors, eliminating the need for printed copies, and can be done remotely using technology."},
{q:"Waldo wants to purchase a new truck. What type of credit should he use?",opts:["Installment","Regular","Budget","Revolving"],ans:0,exp:"Installment credit is designed to handle one total amount of credit, paid in installments within a certain time period. It is commonly used to purchase large, expensive items like cars."},
{q:"Walt purchased stock based on false information from an online message board. Scammers posted the info, bought the stock, hyped it to drive up the price, then sold off, leaving Walt with worthless stock. Walt was the victim of:", opts:["A pyramid scheme","Pump and dump","Affinity fraud","Phishing"], ans:1, exp:"Pump and dump involves buying a stock, hyping it online to drive up the price, then selling at the peak—leaving victims with worthless shares. A pyramid scheme collects fees from recruits. Affinity fraud targets specific groups. Phishing steals personal info online."},
{q:"Warehousing and shipping methods are operations considerations related to:",opts:["expense control.","scheduling.","maintenance needs.","logistics."],ans:3,exp:"Logistics manages the flow of goods from production to consumption, including warehousing and shipping. Scheduling is about timetables; maintenance is about facility upkeep; expense control manages costs."},
{q:"Warehousing and shipping methods are operations considerations related to:",opts:["scheduling.","logistics.","maintenance needs.","expense control."],ans:1,exp:"Logistics refers to the function of operations that manages the flow of goods and services from production to consumption, including all processes involved in storing (warehousing) and transporting goods (shipping)."},
{q:"We know we are being treated fairly when we:",opts:["Get our way and receive the outcomes we want","Are being treated the way we deserve to be treated","Feel happy and satisfied with others' decisions","Are being treated better than others"],ans:1,exp:"Fairness means being treated the way we deserve. It doesn't always mean getting our way or feeling happy with the outcome."},
{q:"We need creativity in communication because:",opts:["Not everyone communicates the same way","People get tired of usual communication methods","Email makes communication very difficult","Most people don't know how to communicate"],ans:0,exp:"Not everyone communicates the same way—cultural differences in nonverbal communication require creative approaches when sending and receiving messages."},
{q:"Well-executed corporate governance ensures that an organization is managed in a way that is:",opts:["Beneficial for all stakeholders","Most helpful for company leaders","Detrimental for competitors","Irrelevant to the public eye"],ans:0,exp:"Good corporate governance benefits employees, management, shareholders, and the general public—not just company leaders."},
{q:"What accounting method involves journalizing income and expenditures at the time they occur even if no money changes hands?", opts:["Cash","Accrual","Tax","Double entry"], ans:1, exp:"Accrual accounting journalizes income and expenditures when they occur, regardless of when money changes hands. Cash accounting records transactions when money is actually received or paid. Tax accounting focuses on tax returns. Double entry records each transaction in two or more accounts."},
{q:"What activity does accounting software help businesses do?",opts:["Track credit transactions","Place orders for raw materials","Create and play AV media","Create virtual situations"],ans:0,exp:"Accounting software efficiently tracks bank and credit transactions, generates invoices, and maintains tax information. Raw materials ordering, AV media, and simulations require different software."},
{q:"What application enables a business to identify when a record was added to a database?",opts:["Date/Time stamp","Validation rules","Data replication","Sort"],ans:0,exp:"A date/time stamp records when a record was added to the database, helping track employee keying activities and customer additions. Validation rules restrict data input; sort and replication serve other functions."},
{q:"What application enables a business to identify when a record was added to a database?",opts:["Validation rules","Date/Time stamp","Data replication","Sort"],ans:1,exp:"The date/time stamp identifies the date and time a particular record was added to the database, helping track employees' keying activities and when customers were added."},
{q:"What are import quotas and tariffs designed to do?",opts:["Eliminate the movement of illegal merchandise","Prevent harmful substances from entering a country","Prevent illegal immigration across national borders","Protect a country's economy from foreign competition"],ans:3,exp:"By imposing tariffs or quotas, a country reduces the economic impact of imported products. They do not prevent illegal merchandise, harmful substances, or immigration."},
{q:"What are the basic components of a business budget?",opts:["Inventory, variable costs, and profits","Fixed costs, variable costs, and semi-variable costs","Fixed assets, inventory, and investments","Total revenues, total costs, and profit"],ans:3,exp:"The basic budgeting equation is: Total Revenues − Total Costs = Profit. Fixed, variable, and semi-variable costs combine into total costs."},
{q:"What are the two major sections of a statement of changes in stockholders' equity?",opts:["Capital stock and retained earnings","Net income and retained earnings","Capital stock and dividends declared","Net income and total stockholder's equity"],ans:0,exp:"Capital stock shows current value of stocks issued; retained earnings shows net income retained minus dividends declared. These are the two major sections."},
{q:"What are two things that a purchasing specialist should consider when making a make-or-buy decision?",opts:["The company's production capabilities and the cost of making the needed parts","The company's production capabilities and the sales of the finished product","The cost of making the needed parts and the sales of the finished product","The purchasing department structure and the marketing mix"],ans:0,exp:"A make-or-buy decision requires evaluating whether the company can produce the parts and whether it's cost-effective to do so in-house versus purchasing from an external supplier."},
{q:"What aspect of a computer system acts as a go-between for software and hardware applications?",opts:["Server","Operating system","Hard drive","Application software"],ans:1,exp:"The operating system runs the computer and serves as an intermediary between hardware and software applications. It also provides computer security. A hard drive stores data; application software performs tasks."},
{q:"What can a business do if it is exposed to risks that commercial insurance companies do not cover?",opts:["Acquire a professional association","Create a trade union","Form a captive insurance company","Establish a risk management committee"],ans:2,exp:"Organizations form captive insurance companies — their own insurance entities — to cover risks that commercial insurers won't. They control underwriting, premium rates, and claims processing."},
{q:"What can businesses do to better protect online accounts and databases?",opts:["Monitor network speeds","Use secure passwords","Send daily risk reports to the authorities","Monitor employee internet use"],ans:1,exp:"To reduce the risk of unauthorized access to confidential information, businesses often maintain secure passwords to allow authorized employees to view secured information."},
{q:"What can businesses do to reduce risks associated with noncompliance?",opts:["Allocate operating funds","Evaluate competitors","Obtain customer feedback","Monitor regulations"],ans:3,exp:"It is important for a business to continuously monitor government regulations to ensure compliance and make changes if necessary to become compliant, reducing risks associated with noncompliance."},
{q:"What can you do to help your company control expenses?",opts:["Focus strictly on how much work you can get done","Follow company policies and procedures","Handle sales transactions as quickly as possible","Carry out research and development activities"],ans:1,exp:"Following company policies—like return policies—prevents losing money. Focusing only on speed or quantity can lead to costly errors."},
{q:"What component is important to include in all types of inquiry letters?",opts:["Contact information","Project specifications","Personal qualifications","Attention-getting title"],ans:0,exp:"All inquiry letters should include contact information so the recipient knows where to send the response."},
{q:"What computer application enables a business to access data from its ERP software for use in budgeting software?",opts:["Cross-reference","Automated data transfer","Group","Data-validation"],ans:1,exp:"Automated data transfer applications quickly move financial information stored in one program (like ERP) to another (like budgeting software)."},
{q:"What computer component is responsible for storing information needed by software applications currently in use?",opts:["Central processing unit","Web-hosting service","Random access memory","Hard disk drive"],ans:2,exp:"RAM is the computer's short-term memory for currently running applications. The CPU performs calculations; the HDD is long-term storage; web hosting keeps websites running."},
{q:"What condition exists if a nation imports more goods and services than it exports?", opts:["Trade deficit","Balance of trade","Trade surplus","Comparative advantage"], ans:0, exp:"A trade deficit is an unfavorable balance of trade where imports exceed exports. A trade surplus is favorable—exports exceed imports. Balance of trade is the difference between exports and imports. Comparative advantage is the benefit of specializing in what a nation produces most efficiently."},
{q:"What could Andreas do to encourage and support Calliope during her presentation?",opts:["Avoid eye contact and act preoccupied","Laugh and smile at everything Calliope says","Nod, smile, and maintain eye contact","Look down at the papers in front of him"],ans:2,exp:"Nodding, smiling, and maintaining eye contact demonstrates that the listener respects and values what the speaker says."},
{q:"What CRM analytic is most suitable for sorting clients based on how likely they are to repurchase a particular product?", opts:["Profitability analysis","Account personalization","Event monitoring","Customer segmentation"], ans:3, exp:"Customer segmentation groups customers based on likelihood to purchase or repurchase a product. Personalization markets to specific customers based on CRM data. Event monitoring identifies when customers reach thresholds. Profitability analysis identifies most profitable customers."},
{q:"What customer-relationship-management analytic would be most suitable for sorting clients based on how likely they are to repurchase a particular product?",opts:["Profitability analysis","Account personalization","Event monitoring","Customer segmentation"],ans:3,exp:"Customer segmentation can segment clients into groupings based on each client's likelihood of purchasing or repurchasing a particular product."},
{q:"What data mining application is used to identify anomalies in a data set?", opts:["Visualization","Regression","Prediction","Outlier detection"], ans:3, exp:"Outlier detection measures distance between data objects and identifies data significantly dissimilar to the rest of the set. Regression identifies relationships between independent and dependent variables. Prediction estimates future values from current patterns. Visualization converts data into clear visual patterns."},
{q:"What data mining technique uses 'if-then' criteria to classify objects in a database?",opts:["Quantitative reasoning","Histogram","Neural networking","Rule induction"],ans:3,exp:"Rule induction uses if-then relationships to classify data. Histograms display data in bar chart ranges; neural networking mimics brain processing. Quantitative reasoning is fictitious."},
{q:"What do bond yields typically do during an economic expansion?",opts:["Remain unchanged","Gradually decrease","Drop to near zero","Increase"],ans:3,exp:"During economic expansion, production, employment, income, and interest rates rapidly increase, pushing bond yields up."},
{q:"What do coworkers involved in a dispute need to do before they can find a possible solution?",opts:["Negotiate a settlement","Ignore the situation","Contact an arbitrator","Identify the problem"],ans:3,exp:"Identifying the exact problem is the first step in resolving conflict. Only after identifying the problem can parties work toward a solution."},
{q:"What do environmental distractions to active listening include?",opts:["Strong opinions about the topic","The speaker's appearance and manner","Personal matters that cause us to worry","Poor lighting and noise"],ans:3,exp:"Environmental distractions such as poor lighting or noise are aspects of the setting that take away from a listener's ability to listen. The speaker's appearance and personal matters are not environmental."},
{q:"What do finance professionals need to do to build long-term relationships with their clients?",opts:["Be honest, open, and trustworthy","Follow up with clients every two years","Invest all clients' money conservatively","Require clients to sign a short-term contract"],ans:0,exp:"Finance professionals earn clients' trust by behaving ethically and being honest and open. They also communicate consistently and help clients set comfortable goals."},
{q:"What do investors often consult to monitor the success of their investment portfolios?",opts:["Financial almanacs","Securities tables","Foreign news reports","Investment guides"],ans:1,exp:"Securities tables (stock tables) contain information about the status of different securities, allowing investors to assess their portfolio's overall health."},
{q:"What do managers need to do to help employees understand their specific responsibilities in achieving the organization's goals?",opts:["Create work subcultures","Collect information","Develop a mission statement","Communicate priorities"],ans:3,exp:"Employees need managers to communicate work priorities so they can perform the most important tasks before less important ones to achieve organizational goals."},
{q:"What do managers often use to evaluate project results?",opts:["Standards","Techniques","Resources","Activities"],ans:0,exp:"Standards are specifications or statements used as a basis for making comparisons. Managers compare project results with the established standards to determine if the project was effective."},
{q:"What do many businesses develop to encourage ethical behavior in finance?",opts:["Penalties","Punishments","Sanctions","Standards"],ans:3,exp:"Many businesses develop ethical standards—unwritten rules that govern behavior—to encourage ethical behavior in finance. These standards help employees make the right decisions when managing money."},
{q:"What do most businesses use to store information for future use?",opts:["Scanners","Display screens","Computer systems","Firewalls"],ans:2,exp:"Computer systems consist of hardware and software components that enable computers to function, including storing information for future use. Firewalls protect against unauthorized access."},
{q:"What do open-end investment funds and closed-end investment funds have in common?",opts:["They can issue an unlimited number of shares over time","They are run by professional portfolio managers","Their pricing is determined by supply and demand","They are also known as mutual funds"],ans:1,exp:"Both types must be professionally managed by an advisor registered with the SEC. Only open-end funds can issue unlimited shares; only open-end funds are mutual funds."},
{q:"What do some investors use to hedge the risk of investing in the foreign exchange market?",opts:["No-load funds","Emerging markets","Venture capital","Derivatives"],ans:3,exp:"Derivatives are financial instruments whose value depends upon other instruments or market indices. Investors use them to hedge or reduce risk in the volatile foreign exchange market."},
{q:"What do you need to identify if there are complicated jobs that members of the group are unable to perform?",opts:["Support services","Alternative tasks","Technical equipment","Replacement items"],ans:0,exp:"Support services are technical or complicated activities that project members cannot do themselves. You must identify the other people, organizations, and businesses that need to be involved in the project."},
{q:"What does 'equity' refer to in a statement of changes in equity?",opts:["Property","Earnings","Debt","Expenses"],ans:1,exp:"A statement of changes in equity shows how owner's retained earnings have changed due to profits, dividends, and other factors. Equity refers to earnings."},
{q:"What does a group's leader do?",opts:["Takes the meeting minutes","Makes sure the group members agree","Puts the group on a certain course","Follows up with everyone"],ans:2,exp:"A leader puts the group on a certain course. Group members do not have to agree, and the leader doesn't necessarily take minutes or follow up with everyone."},
{q:"What does an income statement show about a company over a period of time?",opts:["Liabilities","Reliability","Equity","Profitability"],ans:3,exp:"The income statement shows a company's profitability over a period of time. Reliability and equity are not directly shown on the income statement. Liabilities appear on the balance sheet."},
{q:"What does an income statement show about a company over a period of time?",opts:["Profitability","Liabilities","Reliability","Equity"],ans:0,exp:"The income statement shows a company's profitability over a time period. Liabilities appear on the balance sheet; equity appears on the statement of equity; reliability is not a financial metric."},
{q:"What does determining the target market's buying behavior involve?",opts:["Finding out where the market is located","Finding out what the market will purchase","Finding out how the market is organized","Finding out why the market exists"],ans:1,exp:"Determining buying behavior involves finding out what the market will purchase. Businesses need to know what the market wants in order to provide those products."},
{q:"What does the credit rating of a financial institution indicate to savers and investors?",opts:["The return rate for specific mutual funds","How risky it is to provide the financial institution with funds","The amount of funds the bank lends to other institutions","When the institution expects a return on investment"],ans:1,exp:"Credit ratings let savers and investors know how safe or risky it is to provide funds to a financial institution."},
{q:"What does the credit rating of a financial institution indicate to savers and investors?",opts:["When the financial institution expects to see a return on investment","The return rate for specific mutual funds","The amount of funds that the bank lends to other institutions","How risky it is to provide the financial institution with funds"],ans:3,exp:"Credit ratings from reputable agencies indicate how safe or risky it is to provide funds to a financial institution, based on its creditworthiness."},
{q:"What does the Occupational Safety and Health Administration (OSHA) require all companies to have available for use?",opts:["Emergency generator units","Replacement office equipment","Adequate first-aid supplies","Back-up power sources"],ans:2,exp:"OSHA requires companies of all sizes to have adequate first-aid supplies available for use. It does not require emergency generators, replacement equipment, or back-up power sources."},
{q:"What economic activity is necessary for consumption to occur?",opts:["Financing","Opportunity","Production","Management"],ans:2,exp:"The four economic activities are consumption, production, exchange, and distribution. Production must occur before consumption — goods and services must be made before they can be consumed."},
{q:"What exists when a market is legally controlled by one supplier and there are no substitute goods/services readily available?",opts:["Price discrimination","Regulated monopoly","Price competition","Nonprice competition"],ans:1,exp:"Regulated monopolies are allowed to exist when legislators believe one large company can more efficiently serve consumers than several small ones. Price discrimination is illegal."},
{q:"What field of accounting develops very detailed, specialized internal reports for managers as frequently as necessary?", opts:["Accrual","Financial","Tax","Managerial"], ans:3, exp:"Managerial accountants provide highly detailed, specialized financial information to internal users (officers and managers) as frequently as needed for specific decisions. Financial accountants report to external users quarterly/annually. Tax accountants prepare returns. Accrual is a recording method, not a field."},
{q:"What financial analysis application does a business use to evaluate changes in its cash position from month to month?",opts:["Expense","Cash flow","Fixed costs","Performance"],ans:1,exp:"Cash flow is the movement of funds into and out of the business. Evaluating cash flow helps the business forecast and determine the amount of cash available at any given time."},
{q:"What form of business ownership is best to use when the business owners have difficulty acquiring enough money to pay for startup costs and initial operating expenses?",opts:["Partnership","Sole proprietorship","Franchise","Corporation"],ans:3,exp:"By starting a corporation, owners can sell stock to raise capital. A partnership is limited to the partners' resources. A sole proprietorship is owned by one person."},
{q:"What form of communication is best for a manager to use to obtain immediate feedback from employees and gauge their nonverbal cues?",opts:["Phone call","Instant messaging","Face-to-face meeting","Email"],ans:2,exp:"Face-to-face meetings allow managers to get immediate verbal and nonverbal feedback. Body language cannot be observed through phone, messaging, or email."},
{q:"What is a benefit of corporate governance?",opts:["Ability to bypass sustainability efforts","Increased distance from investors","Improved access to capital","Freedom from stakeholder interference"],ans:2,exp:"Well-governed companies receive higher market valuations and have increased capital flows due to greater accountability and transparency."},
{q:"What is a benefit of having established policies for taking breaks and requesting time off?",opts:["Less confusion among employees","More power for management","More open door policies","Fewer government incentives"],ans:0,exp:"Clear policies set expectations, reducing confusion. Employees who understand break and time-off policies tend to be more productive."},
{q:"What is a benefit of managing budgeting data efficiently through budgeting applications?",opts:["Increases management's confidence in budgets","Decreases the need for having an audit trail","Decreases auditors' ability to trace the numbers used in budgets","Increases amount of time that must be spent on value-added activities"],ans:0,exp:"Efficient budgeting applications reduce errors, increase accuracy, and increase management's confidence in budgets, financial statements, and performance scorecards."},
{q:"What is a benefit of setting organizational goals?",opts:["It is easier to assess organizational progress","Organizations will be unable to make changes","There is no need for channel management","Organizations will have fewer expenses"],ans:0,exp:"Clear organizational goals allow a coherent vision and the ability to monitor progress toward achieving those goals. Organizations can still change direction when needed."},
{q:"What is a benefit to businesses of using a central data repository for financial information?",opts:["Reliance on historical data","Quick response to complex queries","Focus on low volumes of data","Reliance on a single software application"],ans:1,exp:"A central data repository allows quick response to complex queries, along with accessibility to consistent data and economies of scale."},
{q:"What is a challenge of working in securities and investments?",opts:["The job can be very stressful.","The pay is often low.","The profession is not respected.","Workdays are often short."],ans:0,exp:"Securities and investments careers can be very stressful and require long hours. However, they tend to be high-paying and highly respected professions."},
{q:"What is a characteristic of an emerging market?",opts:["High-yield bond markets that operate in a secure economic climate","Strong and highly developed infrastructure","Unstable stock markets in a transitional economy","Low gross domestic product due to high foreign investment"],ans:2,exp:"Emerging markets arise when a country moves from a closed to an open economy—untried and relatively unstable markets that carry high risk but potential for high returns."},
{q:"What is a common activity that takes place during the 'determining possible solutions' stage of the problem-solving process?", opts:["Detecting issues","Collecting relevant data","Brainstorming ideas","Checking assumptions"], ans:2, exp:"Brainstorming generates as many ideas as possible without evaluating them—common during the 'determining possible solutions' stage. Detecting issues and checking assumptions happen earlier. Collecting relevant data occurs after defining the problem. Solutions are selected, implemented, and evaluated after brainstorming."},
{q:"What is a common course of action for small banking institutions interested in competing globally and improving efficiencies, viability, and profitability?", opts:["Consolidating with larger banks","Rapidly expanding their operations","Following global regulations more closely","Dissolving their financial holding companies"], ans:0, exp:"Many small banks consolidate/merge with larger ones to compete globally and improve efficiencies, viability, and profitability. Rapidly expanding without consolidating typically isn't feasible for small banks. Following regulations is important but insufficient alone. Small banks typically lack the resources to be financial holding companies."},
{q:"What is a common course of action for small banking institutions interested in competing globally and improving their efficiencies, viability, and profitability?",opts:["Dissolving their financial holding companies","Rapidly expanding their operations","Following global regulations more closely","Consolidating with larger banks"],ans:3,exp:"Many small banking institutions consolidate or merge with larger banks to compete globally and improve efficiencies, viability, and profitability."},
{q:"What is a disadvantage of using the internet to obtain investment information?",opts:["The large amount of information available on the internet can be overwhelming.","The internet is not accurate or reliable.","There is not enough information available on the internet.","None of the information on the internet is available for free."],ans:0,exp:"The vast amount of online investment information can be overwhelming. However, quality data can be found by evaluating sources carefully. Some info is free; some is fee-based."},
{q:"What is a good source of information for a managerial accountant whose company needs to determine how much money is available for a marketing campaign?",opts:["Sales forecast","Variance analysis","Budget","Cost-benefit analysis"],ans:2,exp:"A budget is a financial plan that shows how money is organized for future operations. It shows what funds are available for specific activities like marketing campaigns."},
{q:"What is a guideline for employees to follow in handling customer inquiries?",opts:["Try to make a sale while you're answering each inquiry","Make sure you clearly understand customers' inquiries","Don't try to handle inquiries when you are busy with a sale","Spend as little time as possible answering customers' inquiries"],ans:1,exp:"Employees should clearly understand what customers are asking to give accurate answers. Inquiries should be handled as courteously as sales, spending whatever time is needed."},
{q:"What is a possible reason for not allocating costs?",opts:["A cost is not controlled by any department.","A cost is fixed rather than variable.","The budget has already been exceeded.","Costs are not high enough to be allocated."],ans:0,exp:"If no department can control a cost, it's acceptable not to allocate it. Whether a cost is fixed or variable doesn't determine allocation; budget status and cost amount don't determine it either."},
{q:"What is a primary responsibility of a company's controller?", opts:["Evaluating property values","Designing risk policies to minimize business losses","Calculating the risk of loss","Directing the preparation of financial reports"], ans:3, exp:"Controllers direct the preparation of financial reports (balance sheets, income statements) and often oversee accounting/auditing for the entire company. Real estate appraisers evaluate property values. Risk managers design risk policies. Actuaries and underwriters calculate risk of loss."},
{q:"What is a primary responsibility of an investment bank?",opts:["Use funds from premiums to offer loans","Pool contributions and invest them for employees","Help firms raise funds by issuing securities","Accept deposits from individual savers"],ans:2,exp:"Investment banks help firms raise funds by issuing securities (stocks and bonds). Insurance companies collect premiums; pension funds pool contributions; deposit institutions accept savings."},
{q:"What is a purpose of standard cost systems?",opts:["To establish quality standards","To evaluate performance","To return unused inventory","To create industry standards"],ans:1,exp:"Standard cost systems determine variances between forecasted and actual costs, thereby evaluating business performance."},
{q:"What is a type of informal communication that coworkers often use to communicate with each other?",opts:["Network","Feedback","Grapevine","Structured"],ans:2,exp:"Grapevine is an oral communication method in which information is passed around the company informally, not formally announced or verified."},
{q:"What is a way in which a business can align its employees with its objectives?",opts:["Avoid holding coaching sessions with employees","Only meet with employees when they request it","Create complicated mission and vision statements","Allow employees to shift their goals"],ans:3,exp:"Managers should regularly meet with employees to evaluate progress and adjust goals as needed. Allowing employees to shift goals helps align them with company objectives."},
{q:"What is a way in which technology has improved the management of financial information?",opts:["Data are transferred instantly from information management to point-of-sale systems","The security of financial information is no longer a concern","Calculations can be completed more quickly and efficiently","The amount of time required to compare financial records has increased"],ans:2,exp:"Technology enables faster, more efficient financial calculations. Security remains a concern; data generally flows from point-of-sale to information management, not the reverse."},
{q:"What is an advantage of setting ideal standards?",opts:["Provide a lofty goal for employees to strive for","Recognize that errors can occur in production","Reduce the frustration associated with easily attainable goals","Allocate time for re-work when errors occur"],ans:0,exp:"Ideal standards set very high (near-unattainable) goals that challenge employees to strive for more than they otherwise would. They represent maximum efficiency with no errors or rest."},
{q:"What is an advantage of setting ideal standards?",opts:["Reduce the frustration associated with easily attainable goals","Allocate time for rework when errors occur","Recognize that errors can occur in production","Provide a lofty goal for employees to strive for"],ans:3,exp:"Ideal standards are set so high they are nearly unattainable, challenging employees to strive for more than they would with lower, attainable standards."},
{q:"What is an advantage of using technology in compliance?",opts:["Ease of transitions","Decreased cost","Increased efficiency","Risk of increased fraud"],ans:2,exp:"Technology makes compliance more efficient by allowing information to be processed much faster. Transitions may be difficult; cost savings are not guaranteed; technology can actually decrease fraud."},
{q:"What is an effective way for a business to reduce risks associated with unethical manipulation of financial data?",opts:["Interview forensic accountants","Organize a network database","Use auditing software applications","Limit financial transactions"],ans:2,exp:"Auditing software tracks and records each step of all financial transactions, reducing risks associated with embezzlement and other unethical activities."},
{q:"What is an example of a topic addressed in an informational message?",opts:["Request for payment on a past-due account","Date and time of appointment with customer","Charitable appeal for a corporate donation","Invitation to speak at a national conference"],ans:1,exp:"Informational messages send routine information such as appointment confirmations. Requests for payment, charity appeals, and speaking invitations are persuasive messages."},
{q:"What is an example of an internal stock information resource?",opts:["The Value Line Investment Survey®","A company's annual report","Brokerage firm research","A financial website portal"],ans:1,exp:"A company's annual report comes directly from the company — an internal source. Value Line, brokerage research, and financial website portals are all external sources."},
