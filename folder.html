{q:"What is an important activity that businesses should include in project planning to improve the chances of the project being successful?",opts:["Orientation","Communication","Negotiation","Compensation"],ans:1,exp:"Communication is an exchange of information and is essential for project success. Everyone involved needs to know the goals, strategies, and expected outcomes to provide input and perform their assigned tasks."},
{q:"What is an important aspect of a customer-centric business?",opts:["Reducing the number of touch points with customers","Limiting the employees' decision making","Being satisfied with the status quo","Aligning business activities with customer needs"],ans:3,exp:"A customer-centric business focuses on customer needs and wants, ensuring its objectives and activities align with those needs and continuously improving to accommodate changing wants."},
{q:"What is another way to describe financial information that is true, complete, and faithfully represented?",opts:["Reliable","Comparable","Timely","Understandable"],ans:0,exp:"Reliable financial information is true, complete, and faithfully represented. Comparable allows comparison between sets; timely means up-to-date; understandable means comprehensible."},
{q:"What is Jason doing when he blames the office assistant for the out-of-stock washers?",opts:["Denying that a problem exists","Helping Susan resolve the problem","Providing Susan with a valid reason for the stock-out","Blaming another person for his mistake"],ans:3,exp:"Taking responsibility means admitting mistakes. Jason blames the office assistant but is the employee responsible for ordering the washers."},
{q:"What is needed to effectively handle situations such as fire, injury, bomb threats, and robbery on business property?",opts:["An evacuation map","An operating strategy","A surveillance system","An emergency plan"],ans:3,exp:"Comprehensive emergency plans contain policies and procedures for many types of incidents, including fires, injuries, and robberies."},
{q:"What is one downside of debt financing that could be cited to prove it's not a good idea for a small restaurant wanting to expand?",opts:["They will need to sell stock in their business.","Shareholders will own part of their business.","They will have to pay interest on the borrowed amount.","They will be required to repay the money immediately."],ans:2,exp:"A downside of debt financing is that the borrower must pay interest on the borrowed amount, meaning they will owe more than what was initially borrowed."},
{q:"What is one factor that determines a manager's credibility with employees?",opts:["Reputation","Creativity","Patience","Aptitude"],ans:0,exp:"A manager with the reputation of being knowledgeable and experienced usually has credibility with employees. Employees are more likely to be persuaded by a manager who has appropriate background and ability."},
{q:"What is one of the benefits to a business of reinforcing service orientation through communication?",opts:["Rewards customers for their support","Promotes the sale of new products","Builds positive relationships with customers","Encourages employees to be aggressive"],ans:2,exp:"Communicating effectively with customers builds trust, which tends to build positive relationships. Loyal customers often remain because they trust the business will treat them well."},
{q:"What is one of the main causes of accidents in the workplace?",opts:["First-aid methods","Physical injuries","Safety hazards","Employee grievances"],ans:2,exp:"Safety hazards—unsafe conditions (poor housekeeping, fire hazards) and unsafe acts (improper lifting)—are one of the main causes of workplace accidents."},
{q:"What is one of the main purposes of a business's sales budget?",opts:["To estimate income","To forecast trends","To predict the economy","To track the competition"],ans:0,exp:"The sales budget estimates income from goods and services, helping determine if the business will be profitable."},
{q:"What is one of the most important components of the production process?",opts:["New technology","Human resources","Goods and services","Inputs and outputs"],ans:1,exp:"Human resources—the people who work to produce goods and services—is one of the most important production components. Even automated facilities need people to oversee operations."},
{q:"What is one thing that all potential employees should do when filling out a job application?",opts:["Leave questions blank","Provide specific salary requirements","Keep applications consistent with their résumés","Fill the application out as fast as possible"],ans:2,exp:"Keeping all information consistent between résumés and applications shows organization and trustworthiness."},
{q:"What is one way in which CRM data cleansing is useful to businesses?",opts:["Data cleansing helps businesses create duplicate data","CRM software has a limited data capacity","Data cleansing helps businesses archive old data","CRM software lengthens sales cycles"],ans:2,exp:"Data cleansing archives old data and removes inaccurate/duplicate information, typically reducing wasted time and shortening sales cycles."},
{q:"What is one way that employers can avoid conflict over use of company property?",opts:["Enact a zero-tolerance policy for property misconduct.","Appoint an employee to handle all conflicts.","Allow minor misuse of company property.","Put clear, specific guidelines and consequences in writing."],ans:3,exp:"Clear written policies with specific guidelines and consequences make disputes easier to handle and prevent misunderstandings about what is acceptable."},
{q:"What is the advantage to groups that use consensus building to make decisions?", opts:["Group members rarely disagree","Agreement is reached very quickly","Decision making involves a majority rule","All decision makers have equal power"], ans:3, exp:"Consensus requires substantial agreement from each member, giving everyone equal power and reducing personal agendas. Consensus is not majority-rule. Group members CAN disagree in consensus-building (they just need substantial agreement). The disadvantage of consensus is that it often takes a lot of time."},
{q:"What is the best way to combat compliance issues associated with employees working remotely and using personal devices?",opts:["Hiring more compliance professionals","Keeping digital communications between employees only","Preventing employees from using their own devices","Implementing monitoring systems and security software"],ans:3,exp:"Monitoring systems and security software can archive employee communications, creating an audit trail that helps meet compliance objectives."},
{q:"What is the difference between skills and traits?",opts:["Skills are not learned with training, and traits are behaviors that are constantly changing.","Skills are repeated behaviors that become a part of the personality, and traits are abilities that are practiced.","Skills are learned through training, and traits are repeated behaviors that become a part of the personality.","Skills are usually easy to learn, and personality traits cannot be changed or altered."],ans:2,exp:"Skills are abilities acquired through education, training, and practice. Traits are repeated behaviors that become part of the person over time. Both can be improved."},
{q:"What is the end result of identifying project resources?",opts:["Gaining a clear understanding of what is needed","Becoming a better, more cooperative team member","Eliminating unforeseen problems","Becoming more independent"],ans:0,exp:"Identifying resources results in a clear understanding of what is needed for the project to succeed. It doesn't eliminate unforeseen problems, just helps you be ready for them."},
{q:"What is the first step Cameron should take to protect himself from identity theft after he loses his wallet?",opts:["Advise law enforcement authorities about the loss","Contact the appropriate government agency to replace credit cards","Cancel all of his credit and debit cards","Change the passwords for his online banking accounts"],ans:2,exp:"The first thing Cameron should do is cancel his credit and debit cards to protect himself in case someone finds his wallet and attempts to use them."},
{q:"What is the first step in designing a multi-table query?",opts:["Set the correct join direction","Determine the criteria","Locate the correct tables","Pinpoint exactly what you want to know"],ans:3,exp:"The first step is determining exactly what question you want the database to answer. Without this, no other steps can be successful."},
{q:"What is the first step in identifying human resources for a project?",opts:["Identify tasks","Estimate resources","Assess skills","Match project members to jobs"],ans:0,exp:"The first step in identifying human resources for a project is identifying tasks. Before you can identify the right people, you need to decide what skills are needed to complete the tasks."},
{q:"What is the first step toward building trusting relationships?",opts:["Increasing sales","Increasing productivity","Developing ideas","Being transparent"],ans:3,exp:"Being transparent is the first step. Increased productivity, better ideas, and increased sales are benefits of transparency."},
{q:"What is the first step you should take when planning a project?",opts:["Develop a draft plan","Identify resources","Determine quality standards","Identify the project's stakeholders"],ans:3,exp:"Identifying stakeholders is the first step—you don't want to start planning without getting their input and including them throughout the process."},
{q:"What is the first thing that an employee should do if a customer trips over a box and falls?",opts:["Determine the severity of the injury.","Call the emergency squad.","Notify the department manager.","Complete an accident report form."],ans:0,exp:"First, determine injury severity to decide if it's life-threatening. Then call emergency services if needed, notify the manager, and complete an accident report after the customer has been cared for."},
{q:"What is the key distinction between a word processor and a text editor?",opts:["A text editor is a simplified type of word processor.","A text editor is more focused on the visual formatting elements of a document.","A text editor offers users more control over layout and colors.","A text editor is a more advanced word processor."],ans:0,exp:"A text editor is designed for quick writing with less formatting focus, making it a simplified version of a word processor."},
{q:"What is the main form of written communication between companies?",opts:["Telephone calls","Memorandums","Meetings","Business letters"],ans:3,exp:"Business letters are the most common form of written communication used by businesses to exchange information with other organizations or customers. Memorandums are the main form within a business."},
{q:"What is the most common reason for a client to leave or fire their financial advisor?",opts:["Lack of communication","Poor investment return","High commission fees","Location of the office"],ans:0,exp:"Lack of communication is the most common reason clients fire financial advisors. Clients expect advisors to return calls promptly, reply to emails, and contact them regularly about their accounts."},
{q:"What is the most effective way for a company's leadership team to promote ethical behavior in risk management?",opts:["Lower performance measures","Hire additional managers","Act ethically themselves","Discourage risk-taking"],ans:2,exp:"If a company's leadership team is not ethical, it is unlikely that other employees will be. Leaders need to set the precedent by acting ethically."},
{q:"What is the most important aspect of a company's brand promise?", opts:["Profit maximization","Consistent follow-through","Ongoing promotion","Long-term planning"], ans:1, exp:"A brand promise is an agreement to meet customers' expectations. The company must follow through consistently to fulfill it. Planning helps develop strategies, but unless carried out consistently, it's useless. Promotion maintains awareness but doesn't fulfill the promise."},
{q:"What is the most negative information possible on a credit report?",opts:["Collection agency report","Late payment","Lien","Bankruptcy"],ans:3,exp:"Bankruptcy has the most negative impact on a credit report. Late payments, liens, and collection reports also appear but have less impact."},
{q:"What is the primary function of the foreign exchange market?",opts:["To trade currency","To sell stocks","To buy bonds","To underwrite policies"],ans:0,exp:"The foreign exchange market trades one currency for another and determines each currency's conversion rate. Stock exchanges sell stocks; bond markets buy/sell bonds."},
{q:"What is the primary function of the Random Access Memory (RAM) component of a computer?",opts:["Serves as a temporary holding area for files and programs","Reads the computer code that provides visual effects","Stores data and programs permanently","Enables the user to apply point-and-click commands"],ans:0,exp:"RAM is a temporary workspace that stores data and programs the user is actively using. A computer with a lot of RAM enables users to open and work on several files simultaneously."},
{q:"What is the primary goal of an investment company?",opts:["To pool and invest funds based on the needs of investors","To locate outside sources of money for firms","To issue various types of mortgages to businesses","To collect financial contributions and invest them for employees"],ans:0,exp:"Investment companies pool funds from investors and invest them in securities (mutual funds) to generate desired financial returns. Investment banks locate funds for firms; pension funds invest employee contributions."},
{q:"What is the primary purpose of customer-relationship management technology?",opts:["To compile a mass email list","To make phone calls to keep customers interested","To archive past sales only","To establish stronger connections with customers"],ans:3,exp:"CRM technology helps businesses build, maintain, and maximize long-term customer relationships through information and targeted communication."},
{q:"What is the primary purpose of data-cleansing processes?",opts:["To control employees' intranet access","To correct non-response errors","To maintain a useful customer database","To monitor the system for security breaches"],ans:2,exp:"Data cleansing removes duplicates, updates expired data, and completes incomplete fields—resulting in a useful, accurate database for sound business decisions."},
{q:"What is the primary reason that creditors analyze their customers' financial information?",opts:["To determine how often their customers' inventory turns over","To know whether they're making a good investment","To determine the likelihood of getting paid","To understand the type of accounting method customers use"],ans:2,exp:"Creditors take risks extending credit and analyze financial information to assess whether customers are likely to repay their debts."},
{q:"What is the primary role of financial planners?",opts:["To ensure businesses are compliant with government regulation","To make the most money for their own firms","To trade with other planners in the stock market","To help clients make wise investments and prepare for the future"],ans:3,exp:"Financial planners help clients make smart financial choices, particularly wise investments and preparation for the financial future."},
{q:"What is the purpose of an occupational interest inventory?",opts:["It predicts your possibilities of success","It tests individual skills and training","It measures your intelligence quotient","It shows the kind of work you might like"],ans:3,exp:"Occupational interest inventories ask about preferences for work activities to identify occupations that would interest you."},
{q:"What is the purpose of developing and using graphics in business reports?",opts:["To communicate information","To entertain the audience","To fill up the page layout","To highlight reference material"],ans:0,exp:"The purpose of using graphics in business reports is to communicate information—to explain complex information or highlight the most important content."},
{q:"What is the relationship between ethics and risk management?",opts:["Risk management prevents ethical behavior.","Ethics and risk management are the same.","Ethics and risk management rely on one another.","Risk management is generally unethical."],ans:2,exp:"Ethics and risk management rely on one another—managing risks is ethical, and unethical behavior is risky. They are not the same, and risk management encourages ethical behavior."},
{q:"What is the relationship between financial information and lean-focused organizations?",opts:["Studying lean organizations provides financial information","Lean organizations have less need for financial information","Financial information provides ways to reduce wasted resources","Financial information helps organizations reduce errors"],ans:2,exp:"Financial information highlights areas where spending is excessive and can be reduced, supporting lean organizations' goal of minimizing waste."},
{q:"What is the relationship between shareholders and the board of directors?",opts:["The board of directors holds the shareholders accountable.","The shareholders pay dividends to the board of directors.","The shareholders make decisions for the board of directors.","The board of directors represents the shareholders."],ans:3,exp:"A company's board of directors represents the interests of shareholders through management of the company. Shareholders often elect board members and hold the board accountable."},
{q:"What is typically the most significant role of a compliance officer in a bank, investment company, or insurance company?",opts:["To ensure that the company is following financial laws","To enforce the business's code of conduct","To educate employees on industry ethics","To ensure employees follow company policies and procedures"],ans:0,exp:"Compliance officers in financial services are primarily responsible for ensuring the company follows financial laws and external regulations."},
{q:"What method of note-taking involves using headings and subheadings to record relationships and content in a multi-level structure?",opts:["Sentence","Outline","Mapping","Shorthand"],ans:1,exp:"The outline format organizes content in levels. Under each heading, the note taker writes key points that relate to that heading."},
{q:"What might a company's higher-than-usual sales volume for a day indicate?",opts:["Investors have recalculated the PE.","Investors believe the yield percentage has changed.","Investors have received their dividends.","Investors have reacted to news about the company."],ans:3,exp:"Higher-than-usual volume typically indicates investors heard something about the company that could affect the stock price."},
{q:"What might happen if a company does not establish a chain of command?",opts:["Employees will not know what their responsibilities are","Employees will have higher morale and be more productive","The workplace will have a relaxed and flexible environment","Executives will have more ownership over work"],ans:0,exp:"A chain of command establishes a hierarchy of roles and responsibilities so everyone knows what to do and to whom to report."},
{q:"What might happen if your customers are not satisfied with your project work?",opts:["You might have to adjust your quality standards.","You might have to redo the project work.","You will need to start the planning process over.","You will need to find different customers."],ans:1,exp:"If customers aren't happy with end results, you might need to redo the project work or complete another project to satisfy their needs."},
{q:"What must a business be organized to do to contribute to society?",opts:["Preserve the environment","Earn a profit","Sell an idea","Hire an advisor"],ans:1,exp:"Businesses contribute to society through jobs and community support, but none of this is possible unless the business is organized to earn a profit."},
{q:"What must a business be organized to do to contribute to society?",opts:["Preserve the environment","Sell an idea","Hire an advisor","Earn a profit"],ans:3,exp:"If businesses don't earn a profit, they won't be able to contribute to society through jobs, charitable donations, or community support."},
{q:"What must a business do before deciding which data-mining technique to use?",opts:["Filter the raw data","Acquire the desired results","Determine the research question","Analyze product usage patterns"],ans:2,exp:"Before data mining, the business must identify what types of data are needed to answer the research question, then set appropriate computer queries to obtain the data."},
{q:"What often happens to businesses when interest rates rise?",opts:["Consumer demand increases.","Output decreases.","Profits increase.","Cost of goods decreases."],ans:1,exp:"Rising interest rates reduce consumer demand and spending, leading businesses to produce less. Output decreases because product demand and consumer spending decline when rates rise."},
{q:"What part of a company's website likely contains its most recent annual report?",opts:["Public Relations","Sustainability","Leadership","Investor Relations"],ans:3,exp:"Most publicly traded companies have an Investor Relations section where annual reports and other public filings are found."},
{q:"What question should finance professionals ask to provide the appropriate types and levels of service to their clients?",opts:["How can I maximize my returns?","Should I follow up with the clients?","What are the client's expectations?","Are my goals realistic and attainable?"],ans:2,exp:"Understanding client expectations is essential to providing appropriate service levels. Finance professionals must know what clients expect in terms of communication and service to build long-term relationships."},
{q:"What question should Tyrone ask when looking for valid sources for his business class research paper?",opts:["Do I agree with the viewpoint of this author?","Is this material interesting and easy to read?","Does this source provide relevant graphic aids?","Is the information in this source up to date?"],ans:3,exp:"In a field like business, recent information is important. Tyrone should not let personal biases affect which sources he includes. Graphic aids are nice but not essential for validity."},
{q:"What reasoning process does a virtual auditor use to identify financial system transactions that are very similar to each other but not exactly alike?",opts:["Cross-source reasoning","Contextual reasoning","Temporal reasoning","Comparative reasoning"],ans:3,exp:"Comparative reasoning identifies financial system transactions that are very similar but not exactly alike, helping determine if one transaction was entered multiple times or if two entries are separate."},
{q:"What risk control technique seeks to contain the effect of a catastrophic event to a particular geographic location?",opts:["Avoidance","Separation","Loss prevention","Loss reduction"],ans:1,exp:"Separation spreads important assets across multiple locations so a catastrophic event at one location won't affect all others."},
{q:"What seems to be almost an automatic response to criticism for many people?",opts:["Anger","Acceptance","Patience","Initiative"],ans:0,exp:"Anger is the most common defensive reaction to criticism. Patience and acceptance are traits that help control this reaction."},
{q:"What should be included early in a written report?",opts:["A description of the research method and findings","A broad sentence detailing numerous arguments","A listing of the printed and online sources cited","A specific sentence that highlights the main idea of the report"],ans:3,exp:"The introduction should include a specific sentence detailing the main idea or purpose of the report."},
{q:"What should Cheri include in the executive summary of her written report?",opts:["The most important information","Facts and figures","Charts and graphs","Suggestions for improvement"],ans:0,exp:"An executive summary highlights the most important information in the document so businesspeople can quickly find what they need."},
{q:"What should help businesspeople adapt their communication styles to appeal to clients from other cultures?",opts:["Being patient, flexible, and empathetic","Being confident, biased, and manipulative","Being sensitive, transparent, and demanding","Being respectful, indifferent, and honest"],ans:0,exp:"Adapting communication styles requires businesspeople to be patient, flexible, empathetic, respectful, honest, confident (but not overly so), and sensitive to clients' cultures and customs."},
{q:"What should job applicants offer to do in the closing paragraph of an interview follow-up letter?",opts:["Send an appropriate gift","Work for a reduced salary","Provide further information","Accept any available job"],ans:2,exp:"Offering to provide further information shows interest and reinforces the desire to be hired without stating it directly."},
{q:"What should you do if a financial client reports a problem with their portfolio?",opts:["Waive the client's fees for their next five transactions","Apologize and resolve the problem immediately","Call the client back later after they've calmed down","Ask the manager to return the client's call"],ans:1,exp:"Finance professionals build loyalty by resolving problems immediately. Waiting makes clients more upset."},
{q:"What should you do when creating a schedule for your project?",opts:["Break down the work into specific activities and tasks","Figure out exactly when you will get each part done","Determine when certain parts of the project are due","Identify risks that could affect your schedule"],ans:2,exp:"When creating a project schedule, determine when certain parts are due. Breaking down tasks happens before, and risk identification happens after."},
{q:"What should you do when you become annoyed with coworkers or customers?",opts:["Avoid talking with them whenever possible.","Tell them to be quiet and stop bothering you.","Treat them the way you want them to treat you.","Complain about them during a staff meeting."],ans:2,exp:"Regardless of where you are, interactions should be respectful and kind. Treat the people around you the way you would want them to treat you—with dignity, care, and respect."},
{q:"What should you turn to if you are unsure of what to do or have a difficult decision to make?",opts:["Persistence","Ethics","Altruism","Credibility"],ans:1,exp:"Ethics are basic principles that govern behavior and guide actions, leading to better decision-making. Persistence, altruism, and credibility cannot always guide difficult decisions."},
{q:"What source of credit offers its members small loans, installment credit, and low interest rates?",opts:["Commercial banks","Sales finance companies","Credit unions","Savings and loan associations"],ans:2,exp:"Credit unions are financial cooperatives offering savings and credit services including small loans, installment credit, and low interest rates to members."},
{q:"What technological application do financial businesses use to evaluate how investment portfolios may react to changing conditions in the markets?", opts:["Automated oversight","Stress testing","Financial compliance","Threat detection"], ans:1, exp:"Stress-testing applications evaluate 'what-if' scenarios to determine stability of specific financial products under different circumstances (like radical economic changes). Automated oversight tracks trader risk limits. Financial compliance and threat detection are not the applications described."},
{q:"What technology can businesses use to reduce the risk of network security breaches?",opts:["Concurrency control applications","Teleprompter devices","Intrusion detection systems","Pirated software programs"],ans:2,exp:"Intrusion detection systems monitor and detect hacking activities that compromise network security. Concurrency control addresses simultaneous data access; teleprompters display scripts; pirated software is illegal."},
{q:"What technology can businesses use to reduce the risk of network security breaches?",opts:["Pirated software programs","Teleprompter devices","Concurrency control applications","Intrusion detection systems"],ans:3,exp:"Intrusion detection systems monitor and detect computer hacking activities that compromise the security of business computer data."},
{q:"What technology is most effective to interview a job applicant 1,500 miles away?", opts:["Intranet","Text messaging","Web-based e-mail","Videoconferencing"], ans:3, exp:"Videoconferencing allows the interviewer to see the applicant and their reactions to questions. Text messaging and e-mail involve typing and don't allow seeing or hearing the applicant. An intranet is a business's internal computer network."},
{q:"What two elements are necessary for effective two-way communication to take place?",opts:["Sharing and understanding","Telling and informing","Words and meaning","Sharing and caring"],ans:0,exp:"Sharing means one sends a message and one reacts to it. Understanding means both sender and receiver grasp the same message."},
{q:"What type of accounting involves preparing and reporting financial data to internal users who use it to plan, direct, and control business operations?", opts:["Tax","Financial","Cash","Cost"], ans:3, exp:"Cost accounting (also called management/managerial accounting) prepares financial data for internal users (managers) to control operations and make decisions. Financial accounting reports to external users quarterly/annually. Cash accounting records transactions when money changes hands. Tax accounting prepares returns."},
{q:"What type of accounting system is used for internal decision making, is not governed by generally accepted accounting principles, and emphasizes the future?",opts:["Managerial","Tax","Financial","Double entry"],ans:0,exp:"Managerial accounting systems aid managers with decision making, planning, and controlling. They are not required by law, do not follow GAAP, and are not designed for external audiences."},
{q:"What type of business record can a gift shop review to determine how many customers purchased items on Tuesday?",opts:["Cash balances","Quarterly credit statements","Inventory status records","Daily sales receipts"],ans:3,exp:"Sales receipts record each transaction and provide data including which products were purchased, dollar volume, payment method, and customer count for a specific day."},
{q:"What type of company is most likely to focus on achieving stability as its primary goal?",opts:["Large","New","Old","Small"],ans:1,exp:"Many startup companies fail within their first few years, so simply achieving stability is a main goal. After stability is achieved, the company can focus on growth."},
{q:"What type of control is typically used to help company executives understand the impact of external risks on the organization and its long-range plans?", opts:["Process","Management","Strategic","Variable"], ans:2, exp:"Strategic controls help executives understand the impact of external forces and risks on business and long-range plans. Management controls focus on internal risk throughout the organization. Process controls are specific to certain business activities. Variable controls are not associated with risk management."},
{q:"What type of currency system is most likely to benefit a small country that relies heavily on exports?",opts:["Pegged","Free floating","Speculative","Decentralized"],ans:0,exp:"A pegged currency system fixes a nation's currency value to another currency, stabilizing trade between two countries—beneficial for export-reliant economies."},
{q:"What type of debtor-creditor relationship involves the acquisition and use of credit cards?",opts:["Customary","Unintentional","Voluntary","Implied"],ans:2,exp:"Obtaining a credit card is entering a voluntary debtor-creditor relationship—both parties enter willingly and understand the risks."},
{q:"What type of divisional structure is most appropriate for a company selling lumber to home builders, home-improvement retailers, display-case manufacturers, and furniture producers?",opts:["Unilateral","Customer type","Geographic region","Process"],ans:1,exp:"A customer-type division is beneficial when a company serves very different types of customers who require different expertise and approaches."},
{q:"What type of economic indicator are nominal interest rates?", opts:["Procyclic and lagging","Countercyclic and lagging","Procyclic and coincident","Countercyclic and coincident"], ans:2, exp:"Nominal interest rates (not adjusted for inflation) are procyclic and coincident—they move in the same direction as and at the same time as the general economy. Countercyclic indicators like unemployment move opposite to the economy. Lagging indicators change months after the economy."},
{q:"What type of economic indicator are stock market returns commonly considered to be?",opts:["Lagging","Exploratory","Coincident","Leading"],ans:3,exp:"Stock market returns are leading indicators — they often decline before an economic decline and improve before positive economic movement."},
{q:"What type of economic indicator are stock market returns commonly considered to be?",opts:["Lagging","Leading","Coincident","Exploratory"],ans:1,exp:"Stock market returns are leading indicators—they often decline in advance of economic decline and improve before the overall economy does."},
{q:"What type of economic system allows buyers and sellers to make decisions without government interference?",opts:["Market economy","Command economy","Socialism","Communism"],ans:0,exp:"A market economy (free enterprise/capitalism) is owned and controlled by individuals and businesses, with buyers and sellers making their own decisions."},
{q:"What type of financial firm offers multiple types of financial products using one pool of capital?", opts:["Financial holding company","Universal bank and trust corporation","Fully integrated financial services provider","Consolidated cross-product parent company"], ans:2, exp:"A fully integrated financial services provider offers multiple products (loans, insurance, trust services) using one pool of capital. A universal bank uses subsidiaries with separate capital pools. A financial holding company owns subsidiaries that each have their own capital. The other options are fictitious terms."},
{q:"What type of financial market structure involves trading unlisted stock via a dealer network?",opts:["Under-the-table","Auction","Debt","Over-the-counter"],ans:3,exp:"Over-the-counter markets involve trading securities outside formal exchanges through a dealer network. These typically involve smaller companies."},
{q:"What type of financial statement includes an accounting of the shareholders' equity for a company?",opts:["Balance sheet","Income statement","Cash flow statement","Annual report"],ans:0,exp:"The balance sheet's liabilities section indicates shareholders' equity—the value of outstanding stock, calculated by subtracting liabilities from assets."},
{q:"What type of graphic is best to use when you want to illustrate a sequence of events in chronological order?",opts:["Pie chart","Timeline","Venn diagram","Bar chart"],ans:1,exp:"A timeline depicts events within a time period arranged in chronological order. Pie charts show parts of a whole; Venn diagrams show overlapping relationships."},
{q:"What type of information is often transmitted through upward communication?",opts:["Instructions","Suggestions","Evaluations","Corrections"],ans:1,exp:"Upward communication allows employees to send suggestions to management. Instructions, evaluations, and corrections typically flow downward."},
{q:"What type of information should a company's marketing department review to make sure that enough products are available to meet customer demand for an upcoming sales promotion?",opts:["Performance","Financial","Operations","Inventory"],ans:3,exp:"By reviewing inventory reports, employees can see how much stock is available and how much needs to be ordered to ensure stock is available during the sales promotion."},
{q:"What type of insurance company serves as a financial intermediary?",opts:["Liability","Health","Property","Life"],ans:3,exp:"Life insurance companies receive funds from customers (savers) and lend funds to borrowers, acting as financial intermediaries. Property, liability, and health insurers do not lend funds."},
{q:"What type of insurance do you need to ensure your beneficiaries receive an inheritance?",opts:["Universal life insurance","Term life insurance","Disability insurance","Long-term care insurance"],ans:0,exp:"Universal life insurance covers you for life and lets you build savings tax-free so beneficiaries receive an inheritance. Term life only covers a set period."},
{q:"What type of insurance provides financial support to loved ones in the event of your death?",opts:["Renter's insurance","Disability insurance","Health insurance","Life insurance"],ans:3,exp:"Life insurance ensures loved ones receive financial support after death. Disability covers inability to work; health covers medical expenses."},
{q:"What type of law is intended to enforce the rules and regulations of governmental agencies?",opts:["Procedural","Statutory","Commercial","Administrative"],ans:3,exp:"Administrative law deals with the rules and regulations established by governmental agencies. It implements the rules, which also involves resolving disputes."},
{q:"What type of letter should a business include when sending copies of a contract to a vendor?",opts:["Request","Acknowledgment","Claim","Transmittal"],ans:3,exp:"A transmittal letter accompanies important business papers such as contracts, indicating how many copies are included and if any action is required."},
{q:"What type of organizational goal involves setting standards in relation to the target market's expectations?",opts:["Consumer","Employee","Technology","Financial"],ans:0,exp:"Consumer-oriented goals set standards to accommodate the target market's needs and wants. Financial goals are measured in terms of money."},
{q:"What type of production would most likely be used to create custom-tailored suits?",opts:["Assembly line","Unit","Mass","Batch"],ans:1,exp:"Unit production means producing one item at a time or items in small quantities. It is used for such items as a custom-tailored suit."},
{q:"What type of risk-management technology can track individual traders' risk limits and notify management immediately if any trader exceeds their limit?", opts:["Data aggregation","Stress testing","Automated oversight","Corporate governance"], ans:2, exp:"Automated oversight assigns risk limits to individuals and immediately notifies management if limits are exceeded. Stress testing determines financial instrument stability in extreme conditions. Data aggregation pulls data from multiple systems into one repository. Corporate governance is how directors handle shareholder responsibilities."},
{q:"What type of system synchronizes sales and marketing efforts?",opts:["Customer relationship management","Transaction processing","Supply chain management","Decision support"],ans:0,exp:"CRM systems accumulate and track customer activities and allow for interactions between customers and businesses to synchronize sales and marketing."},
{q:"What type of tax are businesses required to pay on the profits they earn?",opts:["Excise","Income","Sales","Property"],ans:1,exp:"Income tax is a tax on profit. Excise and sales taxes differ. Property tax applies to material goods, not profit."},
{q:"What type of tax are businesses required to pay on the profits they earn?",opts:["Sales","Excise","Income","Property"],ans:2,exp:"Income tax is a tax on profit. When businesses earn profit from supplying goods and services, they pay a percentage of that profit to the government as income tax."},
{q:"What type of technology do businesses use to inspect financial transactions and ensure compliance with government regulations?",opts:["Domain computing","Cyber mapping","Virtual auditors","Simulation browsers"],ans:2,exp:"Virtual auditors use multiple reasoning processes to identify errors affecting compliance and help businesses fix problems quickly."},
{q:"What type of variance analysis involves determining the difference between the standard costs and actual costs of raw materials used for production?",opts:["Fixed overhead","Material yield","Selling price","Purchase price"],ans:3,exp:"Purchase price variance monitors variances in the price of raw materials. Material yield involves quantity variances. Fixed overhead involves expenses that don't change with sales volume."},
{q:"What usually decreases as the rate of inflation increases?",opts:["Interest rates","Purchasing power","Export quotas","Money supply"],ans:1,exp:"When inflation is high, a dollar buys less. If inflation increases and incomes stay the same, people lose purchasing power and cannot buy the same amount of goods and services."},
{q:"What usually decreases when the economy is experiencing a period of contraction?",opts:["Interest rates","Consumer spending","Cost of living","Unemployment"],ans:1,exp:"During contraction, consumer spending decreases. Unemployment and interest rates increase."},
{q:"What virtual-auditor reasoning technique is most likely to detect segregation of duties violations?", opts:["Incremental","Symbolic","Temporal","Cross-source"], ans:1, exp:"Symbolic reasoning (based on actual auditors' expertise) examines patterns of events and looks for common signs of questionable activities including segregation of duties violations and general ledger errors. Incremental detects building compliance violations. Temporal considers transaction timing. Cross-source compares multiple financial systems."},
{q:"What web-based tool will help Adian save and organize websites containing relevant information for his final report?",opts:["Personal intranet connection","Notebook with color-coded dividers","Word-processing memo template","Browser bookmarking applications"],ans:3,exp:"Browser bookmarking applications allow users to select websites and store their URLs for easy access, and organize sites into folders by categories."},
{q:"What web-based tool will help Aidan save and organize websites containing relevant information for his final report?",opts:["Browser bookmarking applications","Personal intranet connection","Notebook with color-coded dividers","Word-processing memo template"],ans:0,exp:"Browser bookmarking applications allow users to select websites, store their URLs, and organize sites into folders for easy access. Intranets are internal networks."},
{q:"Whatever action must be taken in handling a customer complaint, the salesperson should respond in a(n) __________ manner.",opts:["abrupt","skeptical","formal","concerned"],ans:3,exp:"The salesperson's concerned attitude puts the customer in a good frame of mind. If the salesperson is skeptical or abrupt, this may alienate the customer. Professionalism is important."},
{q:"Whatever action must be taken in handling a customer complaint, the salesperson should respond in a(n) __________ manner.",opts:["Formal","Skeptical","Concerned","Abrupt"],ans:2,exp:"A concerned attitude puts the customer in a good frame of mind. Skeptical or abrupt responses alienate customers; formal isn't required, though professionalism is."},
{q:"When a business actively takes steps to ensure it complies with safety standards, its goal is to reduce:",opts:["Property disputes","Social responsibility","Liability exposure","Fraudulent activity"],ans:2,exp:"Complying with safety standards reduces liability exposure (lawsuits, damaged reputation, financial loss). It doesn't reduce social responsibility or relate to property disputes."},
{q:"When a business has been running successfully for several years, what would be a probable next financial step?",opts:["Acquiring start-up funds","Purchasing a second location","Deciding on financial goals","Determining product prices"],ans:1,exp:"A successful, established business may be in the expansion stage of its lifecycle, which could mean considering purchasing a second location."},
{q:"When a business has too much inventory on hand for an extended period, what type of business cost increases?", opts:["Holding","Maintenance","Production","Stockout"], ans:0, exp:"Holding costs include storage space, taxes, and insurance—these increase when inventory sits. Maintenance costs are for facility/equipment upkeep. Production costs are for creating goods/services. Stockout costs arise from running OUT of inventory—the opposite situation."},
{q:"When a business is looking to employ communication styles appropriate for its target audience, which should it do?",opts:["Research the needs of the target audience beforehand","Avoid changing the message, no matter the reaction","Prioritize business needs over the target audience's needs","Tailor messages to the general public rather than the target audience"],ans:0,exp:"Researching the target audience's needs allows the business to tailor its messages accordingly. Messages should be specific, not general, and should adapt if the audience doesn't respond as intended."},
{q:"When a business reviews a customer's credit application, it is evaluating risks associated with the:",opts:["customer's beneficiaries.","business's reporting strategies.","business's accounting processes.","customer's ability to pay."],ans:3,exp:"Before offering credit, the business evaluates the customer's financial status — income, assets, debt ratio, credit history — to assess their ability to pay."},
{q:"When a business uses its budget to monitor and avoid excessive spending, it is using the budget as a(n):",opts:["Financial control tool","Business plan","Operating plan","Performance evaluation"],ans:0,exp:"Using a budget to monitor spending activities and ensure a department doesn't exceed its planned budget is using it as a financial control tool."},
{q:"When a business uses its budget to monitor and avoid excessive spending, it is using the budget as a(n):",opts:["Financial control tool","Performance evaluation","Business plan","Operating plan"],ans:0,exp:"Using a budget to monitor spending and ensure a department doesn't overspend is using it as a financial control tool."},
{q:"When a country is experiencing a recession, which of the following typically occurs first?",opts:["Stock prices increase","A stock market crash","A stock market recovery","Stock prices decrease"],ans:3,exp:"During recession, investors expect lower profits and sell stock, causing prices to decrease. A market crash is more extreme; a recovery indicates coming out of recession."},
{q:"When a customer complains about a product, the employee should:",opts:["Ask the manager to answer the complaint","Ask another employee to handle the situation","Handle the complaint according to company policy","Defend themselves"],ans:2,exp:"Over 90% of customer complaints can be corrected immediately by the employee, who should handle it per company policy."},
{q:"When a customer-centric business constantly strives to align its objectives with customer needs by stressing innovation and technology, it is engaging in:",opts:["Customer experience management","Continuous improvement","Business process management","Organizational structure"],ans:2,exp:"Business process management is when a customer-centric business constantly aligns its objectives with customer needs through innovation and technology."},
{q:"When a discussion becomes emotionally heated or the other person does not like what you say, you can use __________ to shift the power.",opts:["BATNA","Deadlines","Alternative planning","Silence"],ans:3,exp:"Silence can shift power during a heated discussion. Deadlines can increase tension; BATNA (best alternative to a negotiated agreement) is a negotiation concept."},
{q:"When a financial agent legally acts in the best interests of his/her client, the agent is establishing a(n) __________ relationship.",opts:["Principal","Authoritative","Fiduciary","Legislative"],ans:2,exp:"A fiduciary relationship exists when an agent shows loyalty and trustworthiness by acting in the client's best interest."},
{q:"When a large bank acquires or merges with another bank, it has the opportunity to:",opts:["instantly gain many new customers.","avoid or eliminate federal banking regulations.","transfer financial risk to the newly acquired bank.","decrease the federal interest rate."],ans:0,exp:"Gaining large numbers of new customers is a primary motivation and benefit of bank mergers. Banks cannot eliminate regulations, decrease federal interest rates, or transfer risk away."},
{q:"When a leader keeps trying in spite of setbacks, they are demonstrating which characteristic of emotional intelligence?",opts:["Confidence","Perseverance","Positive working relationships","Proactive behavior"],ans:1,exp:"Perseverance is keeping trying despite setbacks. Proactive behavior is taking action before problems develop—different from overcoming setbacks."},
{q:"When a nation can produce a product for less than other nations, it is said to have a(n):",opts:["comparative advantage.","absolute advantage.","trade quota.","trade surplus."],ans:1,exp:"Absolute advantage is achieved when a country can produce a product for less than other nations. Comparative advantage involves relative efficiency, not absolute cost."},
{q:"When a person is inspired, s/he is:",opts:["Driven to take action","Disengaged from work","Uninterested and bored","Likely to break the rules"],ans:0,exp:"An inspired person is driven to take action and is typically more engaged and enthusiastic about work."},
{q:"When a person uses a decision-making model to make a choice, they can trust that they",opts:["Achieved success","Carefully evaluated alternatives","Made the best possible choice","Followed their intuition"],ans:1,exp:"When a person uses a decision-making model, they can trust that they are making a good effort to make a decision by carefully evaluating all the alternatives available."},
{q:"When a shoe company looks at current industry data to determine what is popular and unpopular, it is analyzing business:",opts:["Trends","Licenses","Productivity","Finances"],ans:0,exp:"Business trends are tendencies and changes in the business world. The company is identifying what is currently popular in the industry."},
{q:"When Alana prepares a report so that all of the financial data is clearly disclosed, she is ensuring that the information is:",opts:["flexible.","relevant.","timely.","transparent."],ans:3,exp:"When financial information is fully disclosed and presented in a clear, understandable way, it is transparent. Transparent information is not buried or deliberately presented in a confusing way."},
{q:"When an employee is dependable, willing to learn new skills, and takes initiative, the employee is more likely to:",opts:["obtain advice.","receive a promotion.","acknowledge others.","be passive."],ans:1,exp:"Dependability, willingness to learn, and initiative are key traits of employees who receive promotions, which come with more responsibility and authority."},
{q:"When an event doesn't go the way it was planned, an adaptable person will:",opts:["Complain about it to others","Adjust to the new situation","Stop participating","Convince others to do it his/her way"],ans:1,exp:"Adaptable people are flexible and adjust to new situations rather than complaining, stopping, or insisting on their original way."},
{q:"When answering the phone at work, you should always state your:",opts:["Company and your name","Years of work experience","Company's full address","Job qualifications and skills"],ans:0,exp:"Identifying both your company's name and your own name lets the caller know they've reached the correct number."},
{q:"When Armand is comparing his checkbook balance with his bank statement, he must make sure that he has subtracted the __________ from his checkbook.",opts:["payroll deposits","accumulated interest","transaction fees","check numbers"],ans:2,exp:"Some financial institutions charge transaction fees for checking accounts. These fees must be subtracted from the checkbook balance. Interest and payroll deposits are added, not subtracted."},
{q:"When Arthur brings back souvenirs from overseas, he discovers he has to pay a tax on them. Arthur must pay the:",opts:["Customs duty","Souvenir tax","Travel tax","Travel duty"],ans:0,exp:"Goods brought across international borders are subject to customs duties, which control the flow of goods. 'Souvenir tax,' 'travel tax,' and 'travel duty' are not real terms."},
{q:"When businesses in an industry carry risks that commercial insurance won't cover, they often form __________ to __________ risk.",opts:["Captive insurance companies; transfer","Insurance rating companies; avoid","Insurance brokerage firms; assume","Independent life insurance agencies; minimize"],ans:0,exp:"Captive insurance companies are owned by the founding organizations. By purchasing insurance through their own company, they transfer unusual risks."},
{q:"When calculating the future value of money, you will need to know the:",opts:["Par value and interest rate","Present value and interest rate","Present value and exchange rate","Par value and exchange rate"],ans:1,exp:"FV = Present Value × (1 + Interest Rate). You need present value and interest rate. Par value applies to bonds; exchange rate applies to currency."},
{q:"When creating a master budget, Jamila determined that the marketing department is responsible for a new email platform purchase. Jamila is:",opts:["Performing marginal analysis","Allocating costs","Eliminating sunk costs","Performing cost-benefit analysis"],ans:1,exp:"Cost allocation is assigning costs to cost objects like departments. Jamila is allocating the email platform cost to the marketing department."},
{q:"When determining if a personal vision is realistic, a person must determine if the vision will have:",opts:["permanent results.","limited resources.","few setbacks.","measurable goals."],ans:0,exp:"A personal vision involves creating positive change through hard work over the long term. A realistic vision must create permanent results. Not all vision results can be measured on an intangible level."},
{q:"When determining whether to approve a customer's loan application, a financial institution evaluates the customer's:",opts:["Employment opportunities","Payment plan","Credit score","Personal goals"],ans:2,exp:"Credit scores reflect payment history and are a key factor in loan decisions."},
{q:"When developing a request for quotation (RFQ) for prospective vendors, a business should always include:",opts:["specifications and deadlines.","prices and a purchase order.","guidelines and discounts.","statistics and a checklist."],ans:0,exp:"The RFQ summarizes the details about the business's needs, bid requirements, and deadlines. Prices, purchase orders, discounts, and checklists are not typically included in RFQs."},
{q:"When developing a web page, it is best to:",opts:["use short blocks of text.","incorporate a variety of fonts.","leave space for banner ads.","avoid the use of graphics."],ans:0,exp:"Web surfers want information quickly and scan rather than read in detail. Short blocks of text are most effective. Too many fonts make text difficult to read."},
{q:"When developing each new budget, Brea's Bagels requires managers to demonstrate the need for every expense instead of relying on figures from a previous period. Brea's Bagels uses __________ budgeting.",opts:["Inflation","Short-term","Master","Zero-based"],ans:3,exp:"Zero-based budgeting requires managers to demonstrate the need for every expense instead of relying on figures from a previous period."},
{q:"When discussing your personal finances with a financial advisor, it's important to:",opts:["Be open and transparent","Exaggerate your income","Keep certain debts secret","Be guarded and skeptical"],ans:0,exp:"Being open and transparent lets the advisor best meet your needs. Lying, exaggerating, or keeping secrets prevents the advisor from helping you effectively."},
{q:"When dividends are paid to stockholders, how are they represented on a statement of stockholders' equity?",opts:["They are subtracted from the net income.","They are listed as a percentage of the net income.","They are simply listed on the statement.","They are added to the net income."],ans:0,exp:"Dividends paid to stockholders are taken from net income and subtracted from net income on the statement of stockholders' equity."},
{q:"When employees can retrieve only the computer data important for performing their job, the business is applying the: (1274 version)",opts:["concept of intrusion prevention.","doctrine of organizational structure.","principle of least authority.","law of diminishing capacity."],ans:2,exp:"The principle of least authority limits data access to what's needed for the job, protecting confidential information and reducing internal fraud risks."},
{q:"When employees can retrieve only the computer data important for their job, the business is applying the:",opts:["principle of least authority.","doctrine of organizational structure.","law of diminishing capacity.","concept of intrusion prevention."],ans:0,exp:"The principle of least authority limits employee data access to what's needed for their work, protecting confidential information and reducing internal fraud risks."},
{q:"When ethics are part of information management:",opts:["Personal files can be corrupted","Personal privacy can be invaded","Piracy is more likely","Information is better protected"],ans:3,exp:"When ethics are followed in information management, information is better protected. Without ethics, privacy invasion, file corruption, and piracy are more likely."},
{q:"When evaluating the status of clothing, you should make sure that:",opts:["undergarments are showing.","the garments are clean and wrinkle-free.","hair is clean and neatly styled.","slacks and shirts are tight and revealing."],ans:1,exp:"Clothing should be clean and wrinkle-free. Hair care is part of personal hygiene. Undergarments showing and tight/revealing clothing are inappropriate in professional settings."},
{q:"When filing a tort against a business, the plaintiff must establish that the defendant:",opts:["damaged property intentionally.","breached the duty of care.","conspired with a competitor.","violated the doctrine of sovereign immunity."],ans:1,exp:"The duty of care is the basic principle expecting all individuals and businesses to exhibit socially responsible behavior. A plaintiff must establish that the defendant breached this duty."},
{q:"When Gabriela's parents passed away, their assets were transferred to her and taxed based on current market value. This is an example of a(n) __________ tax.",opts:["Estate","Tax","Excise","Income"],ans:0,exp:"An estate tax is placed on the transfer of assets from a deceased person to a beneficiary."},
{q:"When giving a presentation, you might use graphic aids to:",opts:["Enhance your presentation","Eliminate the need to speak","Distract your audience","Make the presentation longer"],ans:0,exp:"Graphic aids enhance presentations by adding visual interest, communicating information better, and making it easier to remember."},
{q:"When giving constructive criticism, it's important to do so in a __________ manner.",opts:["Public","Nonthreatening","Forceful","Humorous"],ans:1,exp:"Constructive criticism should be nonthreatening. People don't respond well to criticism when afraid. It should never be given in public, as that could embarrass the receiver."},
{q:"When giving verbal directions to employees about how to complete a task, it is often helpful to:",opts:["speak softly.","use visuals.","use complex words.","limit body language."],ans:1,exp:"Using visuals such as diagrams or charts reinforces verbal directions and helps the audience understand the explanation, overcoming the challenge of giving verbal directions."},
{q:"When giving verbal instructions, you should always:",opts:["avoid eye contact.","give concrete examples.","provide written directions.","use as many steps as possible."],ans:1,exp:"Concrete examples ensure listeners understand exactly what to do. Make eye contact, use as few steps as possible for clarity, and though written backup can help, it's not always practical."},
{q:"When helping a slow/methodical type of customer, salespeople should:", opts:["Follow the customer around the store explaining product benefits","Show the customer as many options as possible","Take care not to overwhelm the customer","Press the customer to select one of two options"], ans:2, exp:"Slow/methodical customers have difficulty making purchasing decisions, so salespeople must be patient and not overwhelm them. Following them around, showing too many options, and pressing them to decide before they're ready are all likely to frustrate and drive them away."},
{q:"When her coworkers share concerns that Katie's idea won't work, Katie should:",opts:["Explain that there is no proof her idea wouldn't work","Remind coworkers they are sharing opinions, not facts","Acknowledge their concerns and respond in a respectful manner","Repeat her proposal because it is based on quality research"],ans:2,exp:"To objectively defend an idea, acknowledge concerns, consider them, and respond respectfully. Coworkers' opinions may be based on years of experience."},
{q:"When identifying equipment and supplies for a project, it is important these resources:",opts:["Are easy to obtain and use","Are available in-house","Belong to local organizations","Meet the requirements of the project"],ans:3,exp:"Resources must meet project specifications. If you obtain the wrong size or type, you may not be able to complete the project—even if they're harder to obtain."},
{q:"When individuals purchase high-performance sports cars, rare collectibles, and jewelry with large gemstones, they must often pay __________ taxes.",opts:["Gift","Property","Luxury","Estate"],ans:2,exp:"Luxury taxes are charged on nonessential, expensive goods such as high-end cars, collectibles, and jewelry."},
{q:"When looking at a personal budget, which of the following is an example of something that may be included as an expense?",opts:["Interest payment in savings account","Cash birthday gift","Bi-weekly paycheck","Rent and utilities"],ans:3,exp:"Rent and utilities are money spent—expenses. Bi-weekly paychecks and interest from savings accounts are income. A cash birthday gift can be income."},
{q:"When looking at a stock on a stock table, what information does the volume section provide?",opts:["The ratio between the stock's price and the company's earnings","The lowest price of the stock in the last 52 weeks","The amount of shares of the stock that were traded in that day","The change in the stock's price from the previous day's closing price"],ans:2,exp:"Volume refers to the number of shares traded in that day. Net change is the price difference from the previous day's close; P/E ratio is price vs. earnings."},
{q:"When making a plan for improvement, the coachee's job is to:",opts:["give constructive criticism.","use questioning skills.","provide motivation.","take personal responsibility for making the changes."],ans:3,exp:"When making a plan for improvement, the coachee's job is to take personal responsibility for making the changes. Nothing a coach does will be effective if the coachee hasn't taken ownership of the need to improve."},
{q:"When making business decisions, which costs are most likely evaluated using qualitative information versus numerical data?",opts:["Opportunity costs","Sunk costs","Direct costs","Indirect costs"],ans:0,exp:"Opportunity costs often require qualitative analysis—like a supplier's reputation—rather than pure numerical data. Sunk, direct, and indirect costs are typically numerical."},
{q:"When Matthew receives a check four times a year for income he has earned on his stock investments, he is receiving:",opts:["deposits.","credit.","dividends.","cash."],ans:2,exp:"A dividend is a sum of money that a corporation pays to a stockholder as earnings on an investment, usually on a quarterly (four times a year) basis."},
{q:"When organizing your workspace, a general rule for cleaning out papers is to:",opts:["file a document if you're sure you won't need it again.","keep a document if you have more than one copy.","put a document in the file if it is outdated.","keep a document if it would be hard to replace."],ans:3,exp:"Keep documents that would be hard to replace. Discard documents you have multiple copies of, those that are outdated, or those you're sure you'll never need again."},
{q:"When preparing a statement of changes in an owner's equity document, which of the following is specifically represented on the statement?",opts:["New investments by the owner","Property taxes paid by the owner","Depreciation of company assets","Lost revenue due to discharged debt"],ans:0,exp:"New investments or withdrawals by the owner are specifically represented on a statement of changes in owner's equity, along with net income or loss."},
{q:"When preparing a statement of changes in owner's equity, which is specifically represented on the statement?",opts:["Property taxes paid by the owner","New investments by the owner","Depreciation of company assets","Lost revenue due to discharged debt"],ans:1,exp:"New investments or withdrawals by the owner are specifically listed on the statement. Property taxes, depreciation, and lost revenue factor into net income/loss."},
{q:"When preparing a statement of equity, what does a business deduct from its total net income to obtain its retained earnings?",opts:["Bad debt","Depreciation of assets","Sales tax payable","Dividends paid"],ans:3,exp:"Retained earnings are the income a corporation keeps after paying dividends to stockholders. Depreciation, sales tax payable, and bad debt are not deducted on the statement of equity."},
{q:"When preparing cover letters for jobs with very little work experience, individuals should stress their:",opts:["Activities","References","Personality","Education"],ans:3,exp:"Education and academic achievements show prospective employers the applicant has the training and ability to perform well, even without work experience."},
{q:"When preparing her tax return, Lynnette listed the interest she paid on her student loan as:", opts:["Taxable earnings","Investment income","A tax-exempt investment","An itemized deduction"], ans:3, exp:"The government allows taxpayers to itemize certain expenses (charitable donations, medical expenses, some loan interest) to reduce taxable income. Investment earnings like dividends are taxable income. Municipal bonds are tax-exempt investments. Student loan interest qualifies as an itemized deduction."},
{q:"When project managers prepare to-do lists and schedule activities, they are using __________ skills.",opts:["information-based","time-management","creative-thinking","problem-solving"],ans:1,exp:"Time-management skills involve controlling events to accomplish priorities. Preparing to-do lists and scheduling activities are classic time-management techniques for project managers."},
{q:"When providing product information to clients, finance professionals should use:",opts:["Financial acronyms","Simple explanations","Standard responses","Technical terms"],ans:1,exp:"Finance professionals should use simple, clear language clients understand. Clients may not be familiar with industry jargon, acronyms, or technical terms."},
{q:"When providing product information to clients, finance professionals should use:",opts:["standard responses.","technical terms.","financial acronyms.","simple explanations."],ans:3,exp:"Clients may not be familiar with finance industry jargon or acronyms. Finance professionals should use simple, clear language clients understand."},
{q:"When providing services to clients, financial professionals have the responsibility to supply:",opts:["payment options.","accurate information.","credit counseling.","bank statements."],ans:1,exp:"Financial professionals often invest money for clients and should provide accurate information about investment performance. Not all financial professionals offer payment options, credit counseling, or bank statements."},
{q:"When reconciling your check register, it is important to __________ your balance.",opts:["subtract your earned interest from","add your debit card transactions to","subtract all applicable fees from","add ATM withdrawals to"],ans:2,exp:"When reconciling, subtract all applicable fees including debit card transactions and ATM withdrawals. Add earned interest (if applicable). Subtracting these fees gives the accurate available balance."},
{q:"When sharing ideas, consensus-building group members should:",opts:["eliminate a few ideas right away.","consider too few rather than too many ideas.","automatically say no to ideas they don't understand.","listen actively to other group members."],ans:3,exp:"Active listening allows group members to understand what's being discussed and build upon their own ideas. Don't reject ideas you don't understand—they may be good once explained."},
{q:"When she opens her new business, what type of risk is Lauren taking?",opts:["Pure","Speculative","Temporary","Safety"],ans:1,exp:"Speculative risk involves the possibility of gain, no change, or loss. A new business may profit, break even, or go bankrupt."},
{q:"When should Jackie read the instructions for the heat press, vinyl cutter, and printer for his T-shirt business?",opts:["When any of the equipment malfunctions","Before using the equipment for the first time","Never; he can figure out the equipment on his own","When he hires his first employee"],ans:1,exp:"Reading instructions prior to use ensures proper and safe operation, saving time, energy, and trouble in the long run."},
{q:"When should you record bank transactions in your check register?",opts:["When checks bounce","When bank statements are received","As bank statements are reconciled","As soon as each check is written"],ans:3,exp:"Recording transactions as they occur prevents inaccuracies and overdrafts. Waiting can result in errors when reconciling statements."},
{q:"When signing sections of an employment application that require a signature, applicants should avoid using a(n):",opts:["nickname.","initial.","surname.","title."],ans:0,exp:"Nicknames are informal and unprofessional for business documents. Applications should use the applicant's correct full name, including surname (last name) and can include titles and initials."},
{q:"When the economy is poor, Andrea limits her purchases. When conditions improve, she buys more. What is this phenomenon an example of?",opts:["Competitive aggression","Organizational learning","Innovative management","Consumer spending trends"],ans:3,exp:"Consumer spending tends to fluctuate up and down along with changes in the economy."},
{q:"When the government requires businesses to pay employees a minimum hourly wage, it is:", opts:["Regulating workplace conditions","Protecting business property","Conserving the environment","Providing public welfare programs"], ans:0, exp:"Minimum-wage laws regulate workplace conditions, protecting workers by guaranteeing a living wage. Protecting business property involves trademarks and patents. Environmental laws protect natural resources. Public welfare programs assist those unable to provide for themselves."},
{q:"When the government requires businesses to pay employees a minimum hourly wage, it is:",opts:["Regulating workplace conditions","Protecting business property","Conserving the environment","Providing public welfare programs"],ans:0,exp:"Minimum wage laws regulate workplace conditions, legally guaranteeing workers a living wage to meet basic survival needs."},
{q:"When the stock market rises, people are more confident and willing to spend, which leads to:",opts:["Economic growth","Recession","Deflation","Fewer loans"],ans:0,exp:"A rising stock market signals economic strength, boosting consumer confidence and spending, which causes the economy to grow."},
{q:"When the U.S. federal government owes money to a contracted employee or business, the government must pay according to the:",opts:["Early Bird Act.","Prompt Payment Act.","Secure Contracting Act.","Government Guidelines Act."],ans:1,exp:"The Prompt Payment Act governs when the U.S. federal government must pay contracted employees or businesses."},
{q:"When the unemployment rate is high,",opts:["Families have more disposable income","Employee morale doesn't change","The economy's output decreases","People have higher purchasing power"],ans:2,exp:"When the unemployment rate is high, the economy's output decreases. Unemployed workers spend far less than employed workers."},
{q:"When the unemployment rate rises, stock values typically:",opts:["decrease.","increase.","stabilize quickly.","remain unchanged."],ans:0,exp:"Rising unemployment signals potential recession. People hold money rather than invest, and businesses hold funds, causing stock values to decrease."},
{q:"When the unemployment rate rises, stock values typically:",opts:["Increase","Decrease","Stabilize quickly","Remain unchanged"],ans:1,exp:"Rising unemployment signals a possible recession. Investors sell stocks and businesses hold funds, causing stock values to decrease."},
{q:"When their regular duties have been completed, employees with initiative look for:",opts:["Pleasant tasks","Enjoyable reading","Additional work","Easy jobs"],ans:2,exp:"Employees with initiative look for work that needs to be done—not just pleasant, easy, or enjoyable tasks. Reading on company time may be met with disapproval."},
{q:"When two people in the same department disagree about how to allocate their budget, they are experiencing a(n):",opts:["Internal conflict","External conflict","Labor dispute","Irreconcilable dispute"],ans:1,exp:"External conflict occurs with another person or group. Internal conflict is within oneself. The budget must be allocated, so it cannot be irreconcilable."},
{q:"When using presentation software to develop a slideshow, it is best to:",opts:["limit the presentation to twelve or fewer slides.","avoid the use of decorative fonts.","include flashy background designs.","use a lot of clipart to add interest."],ans:1,exp:"Decorative fonts are hard to read and should be avoided. Flashy backgrounds and excessive clipart distract from the message. The number of slides should match the content — not be artificially limited to twelve."},
{q:"When using presentation software, it is best to:",opts:["Avoid the use of decorative fonts","Limit the presentation to twelve or fewer slides","Include flashy background designs","Use a lot of clipart to add interest"],ans:0,exp:"Decorative fonts are difficult to see and read. Flashy backgrounds and excess clipart are distracting. The number of slides should depend on the topic, not an arbitrary limit."},
{q:"When validating your credit report, it is important to:",opts:["Destroy financial documents that contradict your report","Ignore any mistakes because they will be removed automatically","Compare your report with your own financial documents","Send your findings to your employer and/or school administrator"],ans:2,exp:"Comparing your credit report with your own financial documents ensures accuracy. Mistakes won't be removed automatically and should be disputed."},
{q:"When Violet makes a mistake, she admits it to her boss and tries to make things right. Violet is demonstrating:",opts:["Loyalty","Empathy","Consistency","Dependability"],ans:3,exp:"Dependability includes being accountable for your actions and mistakes. Admitting mistakes and trying to correct them demonstrates dependability."},
{q:"When writing a persuasive business message, you should remember to:",opts:["Communicate your personal goals","Describe the benefits to the audience","Open the message with a meaningful quote","Place the least important information at the beginning"],ans:1,exp:"Communicating benefits is central to persuasive messages. Readers respond favorably when they know how an action will help them."},
{q:"When writing an email to your coworkers, you should always:",opts:["use all capitals to get important points across.","write 'please' and 'thank you' when necessary.","make sure your message is as long as possible.","put your main point in your last paragraph."],ans:1,exp:"Professional emails use 'please' and 'thank you' as needed. Avoid all capitals (implies anger), keep emails brief, and put the main point at the beginning."},
{q:"When writing an executive summary, be sure that you:",opts:["Include every point from the full report","Use as much business jargon as possible","Make the summary at least 1/10th as long as the full report","Target people who don't have time to read the full report"],ans:3,exp:"Executive summaries are written for people without time to read the full report. They should be concise, jargon-free, and no more than 1/10th the length."},
{q:"When you accept criticism and use it in a constructive manner, it becomes:",opts:["desirable.","more frequent.","anticipated.","very valuable."],ans:3,exp:"Using criticism constructively to improve yourself makes it very valuable. Proper use should result in less frequent criticism, not more. For most, it doesn't become desirable or anticipated."},
{q:"When you keep your workspace organized, you are less likely to:",opts:["Forget important phone numbers","Misuse office equipment","Misplace important documents","Discard unnecessary paperwork"],ans:2,exp:"Maintaining files systematically keeps documents in a specific location, preventing misplacement. Forgetting phone numbers is a cognitive ability unrelated to workspace organization."},
{q:"When you know what your values are and align your behavior with them, you will:",opts:["be able to set priorities and goals easily.","feel conflicted in your decision-making.","never again struggle with an ethical dilemma.","find fulfillment in career but not personal life."],ans:0,exp:"Knowing and living by your values allows you to set priorities and goals that make you feel fulfilled, motivated, and happy."},
{q:"When you monitor projects and make appropriate corrections, this affects team members by:",opts:["Building stronger team relationships","Motivating them by reducing stress and building confidence","Discouraging them from feeling accountable","Helping them learn from their mistakes"],ans:1,exp:"When corrections keep a project running smoothly, team members feel less stressed and more capable, increasing motivation."},
{q:"When you react defensively to criticism, the result is likely to be:",opts:["Pleasant","Sympathetic","Negative","Cooperative"],ans:2,exp:"A defensive response usually irritates the person offering criticism, triggering an unpleasant, unsympathetic, or uncooperative reaction."},
{q:"When you take responsibility for your decisions and actions, you will likely:",opts:["Earn trust and respect","Make new friends","Earn higher grades","Get a promotion"],ans:0,exp:"Taking responsibility lets others know they can depend on you to do the right thing and keep your commitments, earning their trust and respect."},
