{q:"After working on a successful project together, Sam and Rachel gained a sense of accomplishment and pride in their work. Which benefit of collaboration are they experiencing?",opts:["Better relationships","Greater job satisfaction","Stronger economy","More innovative ideas"],ans:1,exp:"When given the freedom to use their strengths to complete successful projects together, employees gain a sense of accomplishment and pride, experiencing greater job satisfaction."},
{q:"Aiden is researching for a school project and finds an article online. Which would indicate the author is most likely a credible source?",opts:["The author has included their personal Twitter handle.","There is no background information provided about the author.","The author lists their professional background and qualifications.","The author is currently a student in college."],ans:2,exp:"Credible authors provide background about themselves such as where they received education or training. Student articles generally should not be used as primary sources."},
{q:"Ajay just won $100. To maximize the value of his money, when should he accept it?",opts:["Now","In six months","In one year","In five years"],ans:0,exp:"The time value of money means money now is worth more than the same amount later because of its earning potential. Accept it now."},
{q:"Akilah wants to be a loan officer. What finance career field does she want to work in?",opts:["Banking services","Accounting","Insurance","Corporate finance"],ans:0,exp:"Loan officers work within banking services. Loan officers don't work in accounting, insurance, or corporate finance."},
{q:"Alex analyzes the costs and benefits of manufacturing additional products to determine if adding a new production line is financially wise. This type of analysis is known as:",opts:["Marginal analysis","SWOT analysis","A product road map","A process flow diagram"],ans:0,exp:"Marginal analysis examines the additional benefits and costs of an activity to help companies determine the best course of action."},
{q:"Alex has a naturally outgoing and talkative personality. How could this relate to his values?",opts:["He might have more confidence in his values.","His values might not align with his behavior.","He might place less emphasis on his values.","He might place a high value on social interaction."],ans:3,exp:"Personality, temperament, and preferences can impact values. Alex's outgoing personality might encourage him to place a high value on social interaction."},
{q:"Alexander's savings account earns 1.50% interest. Using the Rule of 72, how many years to double?", opts:["108 years","15 years","36 years","48 years"], ans:3, exp:"The Rule of 72 divides 72 by the interest rate: 72 ÷ 1.50 = 48 years for Alexander's savings to double."},
{q:"Alexei determines who in his company is permitted to read data within the financial information management system. Alexei has assumed responsibility for the __________ stewardship of the company's financial information.",opts:["Definition","Access","Environmental","Geospatial"],ans:1,exp:"Access stewardship is the ability to decide who is permitted or denied access to data within the financial information management system."},
{q:"Alexei determines who in his company is permitted to read data within the financial-information management system. Alexei has assumed responsibility for the __________ stewardship.", opts:["Access","Definition","Environmental","Geospatial"], ans:0, exp:"Access stewardship is the ability to decide who is permitted or denied access to data. Definition stewardship determines what data within the system mean. Environmental stewardship protects natural resources. Geospatial is not a form of data stewardship."},
{q:"All friends are coming for dinner. Instead of asking what they'd like, you decide to order pizza. What style of decision making are you using?", opts:["Managing","Moderate","Minimum","Maximum"], ans:2, exp:"Minimum-input style means the decision maker decides without consulting anyone. Moderate-input would be asking one friend. Maximum-input would be asking all friends and deciding together. Managing is not a style of decision making."},
{q:"Allowing employees to make more decisions, set their own work pace, and supervise coworkers is considered to be job:",opts:["Rotation","Satisfaction","Enrichment","Enlargement"],ans:2,exp:"Job enrichment adds interest and satisfaction by giving employees more decision-making authority and responsibility."},
{q:"Alma is preparing a presentation about her department's budget that shows parts in relation to the whole. Alma should consider using a:",opts:["table.","pie chart.","line graph.","bar graph."],ans:1,exp:"A pie chart shows parts in relation to the whole—the best way to illustrate how budget components add up to form the whole."},
{q:"Althea wants to know how much money will actually be deposited in her bank account from her paycheck. She should look at the:",opts:["Gross pay","Net pay","Federal income tax","State tax"],ans:1,exp:"Net pay is the actual amount received after withholdings are taken out—the money deposited in her bank account. Gross pay is before withholdings."},
{q:"Amal is responsible, professionally competent, and strives for continuous improvement and excellence as an accountant. In other words, Amal follows the principle of",opts:["Full disclosure","Due care","Objectivity","Confidentiality"],ans:1,exp:"Due care refers to professional competence and responsibility. Accountants must strive for continuous improvement and excellence."},
{q:"Amelia places $250 in a savings account that pays 6.25% interest compounded annually. Calculate the value of her savings account in two years.",opts:["$274.86","$282.23","$290.60","$297.77"],ans:1,exp:"Year 1: $250 × 0.0625 = $15.63; $250 + $15.63 = $265.63. Year 2: $265.63 × 0.0625 = $16.60; $265.63 + $16.60 = $282.23."},
{q:"Amy says, 'I think the primary reason that last year's sales were higher than this year's is because Jansen Electronics has taken a portion of our market share.' This is an example of:",opts:["comparative criticism.","a fact.","historical data.","an opinion."],ans:3,exp:"Amy is stating her point of view or belief about why sales varied—this is an opinion. She isn't presenting any data to support her statement."},
{q:"An accounts payable analyst is using technology to collect and isolate customer records from the disbursing system—retrieving and organizing massive numbers of records quickly. What technology is this?", opts:["Computer-aided design","A CRM database","A neural network","GPS technology"], ans:1, exp:"A CRM database is a virtual storage unit that gathers, organizes, analyzes, and stores customer data efficiently. Computer-aided design is for planning/designing products. A neural network simulates brain activity to recognize patterns. GPS uses satellite technology for location/directions."},
{q:"An accounts-receivable employee places delinquent accounts into folders: 30, 60, and 90 days past due. How is the information organized?", opts:["Name","Invoice number","Location","Time"], ans:3, exp:"Each interval represents a different time frame (30, 60, 90 days), requiring different actions such as mailing notices, calling, or turning over to collections. This is organization by time."},
{q:"An advantage to businesses of using quality control methods is that these methods often:",opts:["involve time.","reduce costs.","increase waste.","require directions."],ans:1,exp:"It is more costly not to provide quality than to implement quality control methods. Quality control helps ensure work is done correctly, reducing the cost of correcting mistakes."},
{q:"An advantage to businesses that use master data management applications is the __________ of the data.",opts:["complexity","variation","replication","consistency"],ans:3,exp:"Master data management ensures that consistent, accurate data is provided to all employees who use it throughout the organization. Effective applications reduce replication of data records."},
{q:"An amount of money borrowed by an individual or a business simply by signing a promissory note is obtaining a(n):",opts:["secured loan.","regular credit account.","unsecured loan.","travel and entertainment card."],ans:2,exp:"An unsecured loan is obtained without pledging anything as security—the borrower simply signs a written promise to repay. Secured loans require collateral; credit accounts are for purchasing goods."},
{q:"An annual audit is an example of a __________ internal control.",opts:["Detective","Reconciliation","Preventative","Corrective"],ans:0,exp:"Detective controls (like annual audits) identify existing financial problems. Preventive controls prevent errors; corrective controls fix errors after identification."},
{q:"An apartment building is an example of a(n) __________ investment.",opts:["Lending","Ownership","Realistic","Domestic"],ans:1,exp:"An ownership investment provides the owner with certain rights in return for money. Real estate (like an apartment building) is an ownership investment."},
{q:"An automotive parts supplier must decide whether to extend a credit line to a new business customer. Before approving or denying credit, what should the supplier do?",opts:["Analyze the customer's credit application, credit report, bank information, and financial statements","Contact company shareholders and ask for permission to extend credit to the customer","Discuss the customer's request for credit with the supplier's financial accountants","Evaluate the qualifications and work histories of the customer's management team"],ans:0,exp:"Businesses commonly analyze a customer's credit application, credit report, bank information, and financial statements to determine whether to extend credit. Financial history is more important than management qualifications."},
{q:"An automotive parts supplier must decide whether to extend a credit line to a new business customer. What should the supplier do first?", opts:["Evaluate qualifications and work histories of the customer's management team","Contact shareholders and ask for permission to extend credit","Discuss the request with the supplier's financial accountants","Analyze the customer's credit application, credit report, bank information, and financial statements"], ans:3, exp:"Before approving or denying credit, analyze the customer's credit application, credit report, bank information, and financial statements. Management qualifications aren't typically needed. Shareholders don't approve credit decisions. Financial accountants aren't the decision-makers for credit extension."},
{q:"An economic trend that typically precedes an upturn in commodity prices is the __________ for at least a year.", opts:["Stock market in decline","Dollar increasing in value","Growth of the money supply declining","Yield curve leveling out"], ans:1, exp:"An upturn in commodity prices is typically preceded by the dollar increasing in value, the stock market improving, the money supply growth increasing (not declining), and the yield curve steepening—all for at least a year."},
{q:"An economic trend that typically precedes an upturn in commodity prices is the __________ for at least a year.",opts:["Stock market declining","Dollar increasing in value","Growth of the money supply declining","Yield curve leveling out"],ans:1,exp:"An upturn in commodity prices is typically preceded by the dollar strengthening (increasing in value) for at least a year, along with the stock market and money supply increasing."},
{q:"An economy with a high unemployment level tends to have:",opts:["rapid GDP growth.","a high supply of money.","fewer monetary policies.","a lower rate of inflation."],ans:3,exp:"When many people are out of work, they lose buying power, less money circulates, and demand for goods/services is low—which tends to slow or lower the rate of inflation."},
{q:"An effective technique to use to clarify information when giving verbal directions involves:",opts:["speaking in a loud voice.","taking notes.","demonstrating a procedure.","limiting questions."],ans:2,exp:"Demonstrating a procedure reinforces the verbal explanation with a visual demonstration, making it easier for employees to understand. Speaking loudly and limiting questions do not help clarify information."},
{q:"An efficient way to organize a work area is to:",opts:["keep reference materials out of your office.","avoid using filing cabinets.","remove all materials from the work surface.","arrange everything within easy reach."],ans:3,exp:"Arranging everything within easy reach prevents wasted time and movement. Reference materials should be kept close for quick access; filing cabinets organize documents; work surfaces should be clear of clutter but ready for use."},
{q:"An electronics company collects and analyzes customer data—such as purchase history and browsing behavior—to target specific customer segments with tailored offers. This best describes the process of data",opts:["Mining","Commingling","Encryption","Migration"],ans:0,exp:"Data mining is the process of searching, collecting, and analyzing large amounts of data to extract actionable information."},
{q:"An employee accidentally learns several coworkers will be fired. What should the employee do?",opts:["Report it to managers","Tell the coworkers","Verify the information","Keep it confidential"],ans:3,exp:"Employees sometimes learn unintended confidential information. Repeating it may harm the business or employees."},
{q:"An employee is questioned by a customer about something they're unfamiliar with. What should they do?",opts:['Politely say "Sorry, I don\'t work in this area"',"Introduce the customer to another employee","Attempt to answer the question","Locate an employee who can assist the customer"],ans:3,exp:"The employee should find someone who can help. Simply introducing the customer doesn't adequately meet their needs, and guessing could give wrong information."},
{q:"An employee with a prominent company position regularly uses offensive language criticizing government leaders in his personal social media posts. He is putting his company at risk of:",opts:["higher corporate taxation rates.","developing a social media footprint.","developing a negative public image.","being prosecuted for defamation."],ans:2,exp:"Personal social media posts can transfer negative impressions to the employer. This builds a negative public image for the company, not a defamation prosecution of the company."},
{q:"An example of a trade organization is the:",opts:["Lions Club.","Civitan Club.","Retail Merchants Association.","American Management Association."],ans:2,exp:"The Retail Merchants Association is a national trade association. The Lions Club and Civitan Club are service organizations. The American Management Association is a professional organization."},
{q:"An example of an internal financial risk is:",opts:["consumer buying power.","foreign exchange rate changes.","improper budgeting practices.","credit downgrades."],ans:2,exp:"Improper budgeting practices are an internal financial risk—they directly impact cash flow and come from within the company. Consumer buying power, foreign exchange rates, and credit downgrades are external."},
{q:"An example of assertive verbal behavior would be:",opts:["Complimenting someone to obtain a favor","Maintaining appropriate eye contact","Initiating conversations with others","Giving a progress report in a staff meeting"],ans:2,exp:"Taking initiative to start conversations is assertive verbal behavior. Eye contact is nonverbal. Complimenting for favors is manipulative."},
{q:"An example of price competition is a hotel's promotion of its:",opts:["Airport shuttle bus","Special weekend room rates","Trained service staff","Sauna and exercise equipment"],ans:1,exp:"Special weekend room rates encourage customers to book by offering reduced pricing—price competition. Shuttle, staff, and amenities are nonprice competition."},
{q:"An executive summary should be:",opts:["Full of technical detail","Lengthy","Persuasive","Written in passive voice"],ans:2,exp:"Executive summaries should be convincing and persuasive. They should be concise, use active voice, and avoid technical jargon."},
{q:"An important aspect of a quality culture in the workplace is the belief that:",opts:["change is unnecessary.","management has the best ideas.","there are ways to improve.","individual performance is most important."],ans:2,exp:"In a quality culture, employees share the belief that all business functions must consistently achieve standards of excellence and that there are always ways to improve those standards."},
{q:"An important aspect of ethical behavior by financial services providers is ensuring that their clients:",opts:["diversify their portfolios by investing more than half in hedge funds.","purchase high-risk investments to generate better financial returns.","understand the potential risks and rewards of different financial products.","preplan future investment strategies for unexpected financial bonuses."],ans:2,exp:"Ethical financial services providers communicate the rewards and risks associated with various financial instruments so clients fully understand their options. Acting in the client's best interest is key."},
{q:"An important aspect of ethical behavior by financial-services providers is ensuring that their clients:", opts:["Purchase high-risk investments to generate better financial returns","Understand the potential risks and rewards of different financial products","Diversify portfolios by investing more than half of their money in hedge funds","Preplan future investment strategies for unexpected financial bonuses"], ans:1, exp:"Ethical financial-services providers act in clients' best interests by communicating rewards AND risks of different financial instruments. It's unethical to suggest high-risk investments clients can't afford. Diversification doesn't mean putting over half in one product. Markets constantly change, making it infeasible to plan investments for money not yet available."},
{q:"An important aspect of upholding ethical accounting standards involves the ability to be:",opts:["Unconventional","Resourceful","Intolerant","Objective"],ans:3,exp:"Accountants must provide accurate, objective (unbiased) financial information. Being objective means not being influenced by bias or outside opinion."},
{q:"An important characteristic of being adaptable is being:",opts:["Content with the way things are","Willing to leave your comfort zone","Able to assume high levels of risk","Pleased about changes when they occur"],ans:1,exp:"Adaptability means willingness to modify attitudes and behavior to new situations. Leaving your comfort zone means accepting new ideas and challenges."},
{q:"An important purpose of full-disclosure laws and regulations is to:",opts:["Allow company employees to use inside information for personal gain","Provide information to investors so they can make informed decisions","Require companies to disclose all information about their operations","Prevent a stock's par value from dropping below its market value"],ans:1,exp:"Full-disclosure laws require companies to publicize any information that could affect stock value, so investors can make informed buy, hold, or sell decisions."},
{q:"An important purpose of regulations in the finance industry is to:",opts:["Prevent the banking system from failing","Limit the amount of money individuals can earn","Challenge the integrity of the financial system","Ensure companies are held accountable for product safety"],ans:0,exp:"Regulations require safeguards that help ensure the banking system does not collapse by preventing and offsetting the negative effects of bank failures."},
{q:"An important reason why employees should follow instructions when using heavy machinery is to:", opts:["Avoid serious injury","Eliminate ongoing problems","Stop malfunctions from occurring","Reduce production conflicts"], ans:0, exp:"Machinery can be dangerous—improper handling can seriously injure employees and damage equipment at great cost. Following instructions will not eliminate all problems or stop all malfunctions from occurring."},
{q:"An increase in free-flowing capital is a benefit of:",opts:["financial globalization.","investor innovation.","global protectionism.","economic conservatism."],ans:0,exp:"Financial globalization leads to the integration of financial markets, offering equal access to market participants regardless of their home countries. Protectionism hinders free capital flow."},
{q:"An increase in free-flowing capital is a benefit of:",opts:["global protectionism.","economic conservatism.","investor innovation.","financial globalization."],ans:3,exp:"Financial globalization involves the free flow of capital across national borders, offering equal market access regardless of home country. Protectionism hinders capital flow."},
{q:"An individual calls asking to speak with Rhonda Hoffman, who is not available. What should you do?", opts:["Tell the caller you'd be glad to take his/her order","Advise the caller to call again in a few minutes","Ask the caller if s/he would like to leave a message","Put the caller on hold while you track down Rhonda"], ans:2, exp:"The most courteous response to an unavailable person is to offer to take a message or suggest voicemail. You can't assume the caller wants to place an order or that you can help them. Placing callers on hold for an extended time or telling them to call back are rude responses."},
{q:"An individual or business can minimize capital losses on investment property by:",opts:["liquidating remaining assets.","claiming the loss as a tax deduction.","obtaining a long-term loan.","renegotiating property insurance premiums."],ans:1,exp:"The government allows owners to claim capital losses on investments as tax deductions. Liquidating assets, obtaining loans, and renegotiating insurance provide cash but don't minimize the actual monetary loss."},
{q:"An individual who takes action when s/he is unsure of the outcome is able to:",opts:["Show empathy","Demonstrate sincerity","Tolerate ambiguity","Resolve conflicts"],ans:2,exp:"Tolerance for ambiguity means willingness to take action despite incomplete information or uncertain outcomes."},
{q:"An insurance company is different from a bank in that an insurance company:",opts:["Accepts short-term deposits and makes long-term loans","Is not considered a financial institution","Is part of a centralized clearing and payment system","Insures its customers against certain risks"],ans:3,exp:"Insurance companies insure customers against certain risks in exchange for premiums. Banks accept short-term deposits and are part of the clearing/payment system."},
{q:"An internal database with relevant financial data in a central location supports a business's ability to:",opts:["Share information","Monitor competitors","Install security measures","Develop contracts"],ans:0,exp:"Central databases allow multiple qualified users to access financial data simultaneously, supporting information sharing and collaboration."},
{q:"An investor using a securities table can learn about a stock's volatility by checking the stock's:",opts:["CLOSE.","52-Week HI/LO.","VOL.","DIV."],ans:1,exp:"The 52-week high and low show how much a stock's price has fluctuated over the past year — a measure of volatility. Volume, closing price, and dividends indicate different things."},
{q:"An organization should include independent members on its board of directors because they:",opts:["Are less likely to act unethically","Represent the interests of management","Understand the company's inner workings","Provide an objective perspective"],ans:3,exp:"Independent members are not involved with the organization. They provide an objective view, keep the board transparent, and help balance out board power."},
{q:"An organization with a quality culture would have executive-level managers who are:",opts:["flexible, indifferent, and not responsible for quality.","good at delegating all commitments for quality assurance.","committed and involved and take responsibility for quality.","able to enlist the expertise of outside contractors for quality."],ans:2,exp:"In a quality culture, executive-level managers are both committed and involved and take responsibility for quality—they do not delegate that responsibility."},
{q:"An organization with a strong culture typically has:",opts:["weak managers.","clear values.","unclear values.","no rules."],ans:1,exp:"Organizations with clear values that are shared and acted upon by all employees have strong cultures. Unclear values lead to weak organizational culture."},
{q:"An organization's board of directors must always act in the best interest of the organization rather than themselves. What word best describes this responsibility?",opts:["Ad hoc","Fair market","Actuary","Fiduciary"],ans:3,exp:"A fiduciary duty is the commitment to act in the best interests of another person or organization, even when those interests conflict with your own."},
{q:"An orientation program typically benefits new employees by:",opts:["Saving supervisors' time","Reducing new employees' anxiety","Reducing employee startup costs","Increasing new employees' compensation"],ans:1,exp:"New employees are often anxious about an unknown situation. An effective orientation helps alleviate that anxiety. Saving time and reducing startup costs benefit the organization."},
{q:"An overall purpose of establishing goals is to increase your chances of:",opts:["achieving immediate success.","satisfying your wants.","enlarging your income.","avoiding making mistakes."],ans:1,exp:"Clear, meaningful goals can serve as guidelines and help you make better decisions. Establishing goals cannot guarantee immediate success or avoidance of mistakes."},
{q:"An upscale department store tracks customer purchases made with store credit cards and tailors promotional messages to specific clients based on their purchases. What software allows the retailer to manage this strategy?",opts:["Spreadsheet","Word processing","Database","Systems tools"],ans:2,exp:"Database software allows companies to collect, store, and organize customer information, then use it to send certain messages to specific customers. Spreadsheet and word-processing software do not perform these functions."},
{q:"Andrew received a fraudulent email requesting bank account and credit card information. What illegal activity does this exemplify?",opts:["Affinity fraud","Ponzi scheme","Phishing","Accounting fraud"],ans:2,exp:"Phishing is an online identity theft scam that fools victims into submitting personal information to fraudulent websites."},
{q:"Angel visits three restaurants in Santa Fe and concludes New Mexicans are dining out more than ever. Can his conclusion be generalized?",opts:["No; he collected a convenience sample and applied city results to the entire state","No; he collected too large of a sample size and didn't anonymize his results","Yes; it is reasonable to assume diners in the capital city are representative of the entire state","Yes; he visited several restaurants and collected a representative sample"],ans:0,exp:"Angel's conclusion is based on limited data—only three restaurants in one city applied to the entire state. This is a convenience sample and is not generalizable."},
{q:"Angelica has determined that many of her colleagues are acting unethically. Whom should she talk to first?",opts:["Her supervisor","The colleagues involved","Top company executives","The authorities"],ans:1,exp:"The first party to talk to is those directly involved, to clarify details and give colleagues a chance to explain before escalating to supervisors or authorities."},
{q:"Ann-Marie is preparing an annual report. While many might look at it, her main audience is:",opts:["The CEO","Customers","Possible employees","Shareholders"],ans:3,exp:"Annual reports contain financial information required for stakeholders who have invested in the company. Shareholders are the primary audience."},
{q:"Ann-Marie is preparing an annual report. While many people might look at the report, this report's main audience is:",opts:["shareholders.","the CEO.","customers.","possible employees."],ans:0,exp:"Annual reports must be shared with stakeholders/shareholders who have invested in the company. While others may see it, shareholders are the primary intended audience."},
{q:"Anna at Bank Plus developed a new customer relationship strategy emphasizing better understanding of customer needs and a recognition program for quality service. Her primary goal is likely:",opts:["Promoting the bank's new products and services","Publicly recognizing outstanding bank employees","Developing stronger long-term customer relationships","Reducing the number of forms new customers must fill out"],ans:2,exp:"By better understanding needs and rewarding quality service, Anna aims to build stronger long-term customer relationships and loyalty — the hallmark of a CRM strategy."},
{q:"Anna, a new employee with Turbo Electronics, must write a letter to a customer but doesn't know which letter format to use. She should:",opts:["develop the letter in several formats and send the letter her supervisor likes best.","select the block format because it is the most widely used.","select the simplified format because it is impersonal.","ask her supervisor which letter format the company uses."],ans:3,exp:"Companies may prefer specific letter formats to ensure consistency. To save time and effort, Anna should ask her supervisor which format the company uses."},
{q:"Anna's boss frequently demanded unpaid overtime, causing Anna to lose respect for her boss and seek a new job. This example demonstrates:",opts:["how fairness has little impact on decision-making.","how the justice approach to fairness is limited.","how fairness is important to professional relationships.","how a lack of empathy undermines equality."],ans:2,exp:"When someone is treated unfairly (unpaid overtime), the relationship loses respect and trust, demonstrating that fairness is essential for positive professional relationships."},
{q:"Annette works for an insurance company establishing premium rates and designing insurance policies to cover risk. She is most likely to have certification as a:", opts:["Certified Financial Planner (CFP)","Certified Financial Analyst (CFA)","Chartered Life Underwriter (CLU)","Chartered Investment Counselor (CIC)"], ans:2, exp:"The Chartered Life Underwriter (CLU) certification is for insurance underwriters who establish premium rates and design policies. CFP is for financial planners. CFA is for financial analysts. CIC is for those managing mutual funds for large firms/clients."},
{q:"Antonia identifies potential dangers for her bakery, creates response plans, and plans to distribute them to investors. Antonia is engaging in:",opts:["Enterprise risk management","Business objective planning","Organizational goal setting","Preliminary quality management"],ans:0,exp:"Enterprise risk management involves identifying, assessing, and preparing for potential dangers and sharing the plan with stakeholders."},
{q:"Appropriate information management can:",opts:["create more difficult decisions.","create more jobs.","save time and money.","result in audits."],ans:2,exp:"Appropriate information management benefits businesses by saving time and money, making operations run more smoothly, and making decisions easier — not more difficult."},
{q:"Are customers who do not complain a more difficult problem for businesses than customers who do complain?",opts:["No, because the salesperson can satisfy customers who do not complain within company guidelines.","Yes, because records of complaints cannot be maintained.","No, because customers who do not complain do not express ill feelings.","Yes, because the salesperson does not have an opportunity to handle the complaint."],ans:3,exp:"Non-complaining customers still express ill feelings to friends and relatives, damaging the business's image. Salespeople cannot fix a problem they don't know about."},
{q:"Aria must obtain data from Mateo before she can enter a customer's insurance claim. To process the claim, Aria and Mateo must:",opts:["coordinate their work activities.","develop departmental goals.","obtain management's approval.","improve their communication."],ans:0,exp:"When employees perform specific parts of a whole task so others can do their work, they are coordinating their work activities."},
{q:"Armand is preparing a presentation discussing several different subjects. To move effectively from one topic to another, he should include __________ in his presentation.",opts:["An introduction","Jokes","A conclusion","Transitions"],ans:3,exp:"An effective transition helps the speaker move from one topic to another in a way that makes sense to the audience."},
{q:"As a mechanic, Twiggy often uses __________ to diagnose trouble in a boat's engine.",opts:["Expert systems","Voice over Internet Protocol","Satellite technology","Electronic transfer of funds"],ans:0,exp:"Expert systems are a special kind of computer software designed to mimic the knowledge of a human expert. Mechanics often use expert systems to diagnose trouble in a vehicle's engine."},
{q:"As a new employee, you receive constructive criticism about your job performance. This criticism is designed to:",opts:["Hurt and discredit you","Show your lack of ability","Improve your ability to do the job","Demonstrate the supervisor's superior job knowledge"],ans:2,exp:"Constructive criticism points out mistakes for the purpose of helping someone improve their performance."},
{q:"As a new employee, you receive constructive criticism about your job performance. This criticism is designed to:",opts:["show your lack of ability.","improve your ability to do the job.","hurt and discredit you.","demonstrate the supervisor's superior job knowledge."],ans:1,exp:"Constructive criticism points out mistakes specifically to help someone improve. Destructive criticism aims to hurt or discredit. Your responsibility is to accept it and improve your performance."},
{q:"As a team member, you find motivational techniques such as saying 'thank you' and giving verbal praise especially effective because they:",opts:["Guarantee you a promotion","Encourage fierce competition","Are at virtually no cost to you","Make your group members laugh"],ans:2,exp:"Saying 'thank you' and giving verbal praise boost morale and productivity at virtually no cost. The goal is to inspire, not encourage competition or guarantee promotions."},
{q:"As Ben assesses his personal strengths and weaknesses, what can he do to keep from focusing too much on his weaknesses?",opts:["Compare himself to others","Identify one strength for every weakness","Develop a list of false generalizations","Ask others for critical feedback"],ans:1,exp:"Identifying one strength for every weakness keeps a realistic, balanced self-assessment. Comparing to others and making false generalizations hinder accurate assessment."},
{q:"As financial intermediaries, what is all financial institutions' primary responsibility?", opts:["Investing clients' money in mid-cap growth companies","Transferring money from those who have it to those who need it","Calculating opportunity costs of clients' potential investments","Conducting analyses to evaluate securities"], ans:1, exp:"All financial institutions act as intermediaries by facilitating the flow of money from those who have it (savers) to those who need it (borrowers). Investment analysis, opportunity cost calculations, and specific investment types are activities of some but not all institutions."},
{q:"As financial intermediaries, what is all financial institutions' primary responsibility?",opts:["Transferring money from those who have it to those who need it","Investing clients' money in mid-cap growth companies","Calculating the opportunity costs of clients' potential investments","Conducting fundamental and technical analyses to evaluate securities"],ans:0,exp:"All financial institutions serve as intermediaries by transferring money from savers (who have it) to borrowers (who need it), facilitating the flow of money through the economy."},
{q:"As operations manager, you know inputs and outputs of your business for the last fiscal year. What can be calculated from this information?",opts:["Disposable income","Business productivity","Quality of work life","Gross domestic product"],ans:1,exp:"Business productivity is the amount of goods/services produced from a set of resources, calculated by dividing outputs by inputs."},
{q:"As opposed to financial accountants, managerial accountants primarily:",opts:["Report externally","Hire internally","Hire externally","Report internally"],ans:3,exp:"Managerial accounting focuses on reporting financial information internally to aid decision-making. Financial accounting reports externally to investors, lenders, and governing organizations."},
{q:"As Tom reviews a customer's credit report to determine if the company should offer a line of credit, he should use the company's __________ to guide his decision.",opts:["accounting method","purchasing policies","credit standards","payment history"],ans:2,exp:"Credit standards are established criteria for determining to whom to extend credit, considering factors like credit history, score, income, and type of purchase."},
{q:"Ashley prepares a budget that serves as a request for the purchase of a property. This best describes what type of budget?",opts:["Operating","Promotional","Capital","Cash"],ans:2,exp:"A capital budget typically is a request for purchases of large assets (such as property, equipment, or IT systems) that create major demands on a company's cash flow."},
{q:"Assertive people believe that they have the right to ask other people to respond to their:",opts:["whims.","needs.","directions.","orders."],ans:1,exp:"Assertive people understand they have the right to ask others to respond to their needs, while also being able to accept legitimate refusals. Aggressive people expect responses to their whims or orders."},
{q:"Assessing your personal strengths and weaknesses objectively involves:", opts:["Working to improve most of your weaknesses at one time","Basing a strength or weakness on one isolated incident","Comparing your attributes with others' skills and talents","Looking for behavior patterns that occur regularly over time"], ans:3, exp:"Successful self-assessment requires awareness of behavior patterns over time. Avoid making false generalizations from isolated incidents. Avoid comparing yourself to others since everyone is different. Try improving one weakness at a time—taking on too many changes at once is frustrating."},
{q:"At the annual staff meeting, the sales manager announces the bonus system is suspended due to poor performance. What communication style is the manager using?",opts:["Indirect","Casual","Formal","Grapevine"],ans:2,exp:"Formal communication takes place through established channels like a staff meeting and involves serious topics like pay changes."},
{q:"At what stage of the entrepreneurial process does an entrepreneur determine the amount of capital needed to launch the business?",opts:["Actualization","Discovery","Development","Harvesting"],ans:2,exp:"Capital needs are determined in the development stage. Discovery explores feasibility. Actualization is launching. Harvesting is exiting."},
{q:"Audrey is working with a management team to develop a budget forecasting revenues and expenses for the coming year. What type of budget is Audrey's company using?",opts:["Cash budget","Operating budget","Promotional budget","Long-term budget"],ans:1,exp:"An operating budget helps companies forecast expected revenues and expenses for a period (usually a year), often developed just before the fiscal period begins."},
{q:"Austin has discovered he has an aptitude for communications and public relations and enjoys talking in front of people. He has decided he wants to go into public speaking. Austin has demonstrated:",opts:["choosing an appropriate career.","helping to understand other people.","obtaining feedback from others.","establishing a value system."],ans:0,exp:"Choosing a career is done by deciding which career matches one's abilities and aptitudes. Austin matched his aptitude for communications with a career in public speaking."},
{q:"Auto mechanics and attorneys are likely to use a __________ cost accounting system.", opts:["Job order","Process","Consumer","Cyclic"], ans:0, exp:"Job order cost accounting tracks costs to specific jobs. Attorneys charge each client for specific expenses; mechanics charge each client individually. Process cost accounting works for businesses producing standard products continuously. Consumer and cyclic are fictitious terms."},
{q:"Avoiding the use of slang falls under which guideline for dealing effectively with people from different cultures?",opts:["Show respect.","Strive to communicate clearly.","Expect differences to arise.","Be patient."],ans:1,exp:"Avoiding slang — which may have hidden meanings unknown to people from other cultures — is a way to communicate more clearly across cultural boundaries."},
{q:"Avoiding the use of slang falls under which guideline for dealing effectively with people from different cultures?",opts:["Strive to communicate clearly","Show respect","Expect differences to arise","Be patient"],ans:0,exp:"Avoiding slang is a way to communicate more clearly with those from other cultures who might not understand hidden meanings."},
{q:"Axis Manufacturing wants to determine how purchasing parts from a specialized dealer (instead of producing them in-house) will influence company costs and revenues. They should conduct a(n) __________ analysis.",opts:["trade-off","incremental","fishbone","SWOT"],ans:1,exp:"Incremental (marginal/differential) analysis studies the revenues and costs of different alternatives, such as making a part in-house vs. buying it from an outside source."},
{q:"Bailey has $50 to spend on jeans or concert tickets but not both. This is an example of:",opts:["Governmental control","Competition in the marketplace","Limits to economic freedom","Private property"],ans:2,exp:"People in a private enterprise system are limited by their own resources and choices. Bailey's limited funds restrict her options."},
{q:"Banks are different from insurance companies in that banks",opts:["Are subject to only state-level regulation","Are not part of a centralized clearing and payment system","Insure their customers against certain risks","Accept short-term deposits and make long-term loans"],ans:3,exp:"Banks take deposits and pay interest and then lend money to borrowers. Banks accept short-term deposits and make long-term loans. Insurance companies insure against risks."},
{q:"Banks limit their employees' and vendors' access to confidential financial information to:",opts:["protect their customers' privacy.","maintain a safe working environment.","safeguard cash drawers.","ensure that collection procedures are followed."],ans:0,exp:"Businesses have an ethical responsibility to maintain customers' financial privacy. Restricting data access protects confidential information like credit data and bank accounts. This is distinct from physical safety."},
{q:"Barry gives the pizza delivery person $15 and gets a pepperoni pizza in return. Barry is using money as a:",opts:["Store of value","Medium of exchange","Loan","Medium of barter"],ans:1,exp:"When money is exchanged for goods or services, it is a medium of exchange. Bartering occurs without money."},
{q:"Barry's family is originally from Ireland. Their customs, habits, and traditions are known as their:",opts:["stereotype.","culture.","diversity.","religion."],ans:1,exp:"The customs, habits, and traditions of a particular group of people are known as their culture."},
{q:"Based on a securities table, Home Depot closed at $35.01 with a net change of +$0.62. Which statement is most accurate?",opts:["The previous day's closing price was $34.39","Home Depot's stock is 2.7 times higher than earnings per share","The lowest price in the last year was $18.92","An investor with 100 shares earned $27 in dividends last quarter"],ans:0,exp:"To find the previous day's close, subtract net change from today's close: $35.01 - $0.62 = $34.39."},
{q:"Because a business didn't maintain air-circulation systems, employees were exposed to dangerous chemicals. The government is likely to fine the business for:", opts:["Failing to secure property","Disregarding storage standards","Violating health regulations","Breaking product-safety laws"], ans:2, exp:"Laws require businesses to maintain building systems to ensure employee/customer safety. Employees exposed to dangerous chemicals indicates a health regulation violation. There's insufficient information to determine if storage or property security is the issue. The situation doesn't involve product safety."},
{q:"Because Caroline does not have enough time to read an entire 400-page business report, what section should she review to obtain an overview of the most important content?",opts:["Table of contents","Executive summary","Appendices","Conclusions"],ans:1,exp:"The executive summary provides an overview of the entire report and contains the most important information. Businesspeople with time constraints often read only the executive summary."},
{q:"Because Caroline does not have enough time to read an entire 400-page business report, what section should she review?",opts:["Appendices","Table of contents","Executive summary","Conclusions"],ans:2,exp:"The executive summary provides an overview of the entire report and contains the most important information for those with time constraints."},
{q:"Because of the internet, most movies and TV shows are streamed online rather than purchased as DVDs. This is an example of the internet changing the __________ utility of a product.",opts:["Place","Possession","Form","Time"],ans:2,exp:"Form utility is usefulness created by altering or changing the form or shape of a product. The shift from physical DVDs to digital streaming changes the form utility."},
{q:"Because they are clear and describable, excellent visions are:",opts:["Very specific","Long term","Uninspiring to team members","Able to be summed up concisely"],ans:3,exp:"Because excellent visions are clear and describable, they can be summed up concisely and shared with anyone inside or outside the team."},
{q:"Becoming more socially minded in marketing can bring a business:",opts:["More products","Lower costs","Higher profits","A competitive advantage"],ans:3,exp:"Since many consumers are interested in socially responsible products, social marketing gives a business a competitive advantage."},
{q:"Before approving a loan application, a bank is likely to analyze the applicant's:",opts:["inflation rate.","debt ratio.","brand preferences.","performance goals."],ans:1,exp:"The debt ratio indicates the applicant's current level of debt relative to assets (e.g., income, home). A high debt ratio with few liquid assets means a higher risk of default."},
{q:"Before beginning negotiations, what should you be prepared to do?", opts:["Exhibit a competitive mindset","Focus only on your interests","Minimize your expectations","Compromise on some points"], ans:3, exp:"Experienced negotiators concede small points before larger ones to maximize agreement. Focusing only on your interests and using aggressive strategies create distrust. Enter negotiations with an open mind and desire for mutually beneficial outcomes."},
{q:"Before DiAnn presents her new idea to her boss, she searches the Internet and jots down two statistics that reinforce the idea. This is an example of:",opts:["obtaining primary information.","supporting ideas with evidence.","giving alternative ideas.","clarifying a new idea."],ans:1,exp:"Ideas that are evidence-based are more easily accepted. DiAnn is collecting secondary information to support/validate her original idea."},
{q:"Before Kirk's loan application is approved, the bank is likely to analyze his",opts:["Medical history","Debt ratio","Inflation rate","Political affiliation"],ans:1,exp:"The debt ratio indicates a company's or individual's level of debt in relation to their assets. If the applicant has high outstanding debt and few liquid assets, they may default on the loan."},
{q:"Before Laney receives her overseas order, government officials will likely:",opts:["Require Laney to obtain a license","Take a portion of her supplies","Examine the package for prohibited materials","Remove the country of origin label"],ans:2,exp:"Customs and border protection officials are allowed by law to examine packages for prohibited materials."},
{q:"Before Pedro includes someone else's journal article about portfolio diversification in his e-newsletter, what must he do?", opts:["Request the trademark registration code from the originator","Acknowledge the author in the republished article","Obtain written permission from the copyright owner","Inform the patent agency that he wants to publish the article"], ans:2, exp:"To avoid copyright infringement, contact the copyright owner for written permission to reprint. Trademarks protect symbols/designs/words. Patents protect inventions. Simply acknowledging the author is not sufficient without permission."},
{q:"Before purchasing Upside Corporation stock, Anna wants to study financials. Where on Upside's website is the annual report most likely found?", opts:["Sustainability","Investor Relations","Public Relations","Leadership"], ans:1, exp:"Investor Relations sections of company websites contain annual reports and public filings. Sustainability emphasizes environmental/social impact. Public Relations has press releases and media kits. Leadership has executive biographies."},
{q:"Before recommending specific products or services to clients, what should a finance professional do?", opts:["Place a stop or buy order","Conduct a needs analysis","Develop a proxy statement","Conduct dollar cost averaging"], ans:1, exp:"Ethical finance professionals first determine what clients truly desire/require through a needs analysis, then select products meeting those needs. Finance professionals don't place orders, develop proxy statements, or conduct dollar cost averaging before making recommendations."},
{q:"Before reviewing stock performance in a securities table, investors must locate the company's abbreviated name followed by the:",opts:["Trademark","Trade number","Yield code","Ticker symbol"],ans:3,exp:"The ticker symbol is a unique set of letters identifying a company in a stock table, helping investors quickly locate stock information."},
{q:"Before you can adapt your communication style to relate to businesspeople from other countries, you must first:", opts:["Learn to speak the country's language fluently","Realize that cultural differences exist","Develop an ethnocentric attitude","Change your personal values and beliefs"], ans:1, exp:"The key to adapting communication style is recognizing that differences exist, then researching how to avoid offense. You don't need to be fluent or change your values—just respect different ones. Ethnocentrism (believing your culture is better) hinders positive cross-cultural relationships."},
{q:"Before you can collect information about a problem, you must first:", opts:["Solicit others' input","Evaluate solutions","Brainstorm ideas","Define the problem"], ans:3, exp:"The first step in problem solving is defining what the problem is. After defining it, you collect and analyze information, solicit input, brainstorm ideas, and then select, implement, and evaluate the solution."},
{q:"Beginning securities sales agents, or brokers, are required to:",opts:["Work with a mentor","Pass a licensing exam","Register with the Securities and Exchange Commission","Settle for below-average salaries in exchange for short work weeks"],ans:1,exp:"Beginning securities sales agents are required by the U.S. Department of Labor to pass a licensing exam to sell securities."},
{q:"Being able to put yourself in another person's place means that you have:",opts:["Perspective","Respect","Empathy","Understanding"],ans:2,exp:"Empathy is the ability to walk in another person's shoes. Respect is esteem. Perspective is how people view life. Understanding is the ability to comprehend."},
{q:"Ben is a VP of State Street Savings and Loan. Which organization would best help him network within his profession?",opts:["Young Professionals Association","Local chamber of commerce","College alumni group","National Bankers Association"],ans:3,exp:"Professional organizations specific to finance (like the National Bankers Association) allow networking with others in the same field, unlike chambers of commerce or alumni groups."},
{q:"Beverly discovers erroneous duplicate entries that caused collection letters to be sent to paid customers. What should she do to save relationships and prevent future issues?",opts:["Use funds from accounts payable to pay the debt","Complete an accounting software update","Contact each customer by phone and apologize","Complete a data cleansing of the erroneous entries"],ans:3,exp:"A data cleansing removes the erroneous entries from the system, preventing future incorrect collection letters. An apology alone doesn't fix the root problem."},
{q:"Bianca's $4,000 investment is held in her savings account with 5% simple interest paid annually for three years. Calculate the future value.",opts:["$4,410.00","$3,792.89","$3,455.35","$4,630.50"],ans:3,exp:"FV = $4,000 x (1 + .05)^3 = $4,630.50"},
{q:"Bill disciplines each of his children exactly the same way when they break the rules. Bill is being:",opts:["Consistent","Biased","Generous","Empathetic"],ans:0,exp:"Consistency means treating everyone the same regardless of the situation or circumstances. Bill treats all his children the same—he is being consistent."},
{q:"Bobbi, who works for an insurance company, calculates the risk of loss, establishes premium rates, and designs insurance policies to cover risk. Bobbi works as a(n):",opts:["underwriter.","agent.","accountant.","financial analyst."],ans:0,exp:"Underwriters calculate the risk of loss, establish premium rates, and design policies to cover risk. Insurance agents sell policies; accountants analyze financial data; analysts evaluate investments."},
{q:"Bonnie is determining whether to extend credit to a potential business customer. The customer's trade reference information should include:", opts:["The current balance the customer owes to each existing supplier","The name of the purchasing agent who buys from suppliers","The articles of incorporation for each supplier","A list of items the business typically purchases from each supplier"], ans:0, exp:"Trade references from 3-4 existing suppliers should provide credit line, high balance, current balance, and payment history. This helps determine creditworthiness. The purchasing agent's name, articles of incorporation, and product lists are not typically needed for credit evaluation."},
{q:"Brandon's financial plan goal is to save enough to buy a new car in two years. Has Brandon set a SMART goal?", opts:["Yes, his goal is attainable and specific","No, his goal is not attainable or results-oriented","Yes, his goal is time-bounded and measurable","No, his goal is not specific or measurable"], ans:3, exp:"SMART goals are Specific, Measurable, Attainable, Results-oriented, and Time-bounded. Brandon's goal is time-bounded (2 years) and results-oriented (a car), but NOT specific or measurable because he hasn't stated how much he wants to save or how he'll save it."},
{q:"Brittanie's coworker asks a question about a software program that Brittanie isn't familiar with. Brittanie has a:",opts:["prejudice.","knowledge gap.","viability problem.","bias."],ans:1,exp:"A knowledge gap is something a person simply doesn't know. It's not a bias or prejudice (preconceived opinions). Brittanie can learn about the program or help find someone who knows."},
{q:"Brody uses Benford's Law when reviewing a financial statement because it helps:",opts:["Predict financial performance","Locate the break-even point","Detect the possibility of fraud","Disseminate information"],ans:2,exp:"Benford's Law explores digit distribution in large data sets. Deviations from expected patterns can indicate fraudulently manufactured numbers."},
{q:"Bryan is detail-oriented; Erin is creative. Should they be on the same team?",opts:["No; their differing skill sets will cause conflict","Yes; teams with a mixture of skills and talents perform to their best abilities","No; all team members need to be detail-oriented","Yes; Erin can help Bryan be more creative"],ans:1,exp:"One benefit of teamwork is exposure to varied skills. Allowing people to do what they're good at increases success and lets everyone perform at their best."},
{q:"Brynn serves on trade association committees, co-authors articles, and treats contacts to dinner or golf. These activities are forms of:",opts:["Advertising","Cooperating","Networking","Up-selling"],ans:2,exp:"Networking connects individuals who can help accomplish professional goals. These activities create opportunities to build beneficial professional relationships."},
{q:"Budgets are important to the management process because they:",opts:["Help determine roles and responsibilities","Shift focus from future events to daily issues","Ensure organizational goals come before personal goals","Remove the possibility of financial constraints"],ans:0,exp:"Budgets help determine employees' responsibilities and measure performance so that resources are used wisely."},
{q:"Building professional, long-term relationships with others in the financial industry requires:",opts:["A formal agreement or contract","Consistent communication","Membership in unrelated trade organizations","A detached attitude"],ans:1,exp:"Consistent, ongoing communication—getting to know the other person—is the key to building long-term professional relationships and earning trust."},
{q:"Building professional, long-term relationships with others in the financial industry requires:",opts:["membership in unrelated trade organizations.","a detached attitude.","consistent communication.","a formal agreement or contract."],ans:2,exp:"The key to building long-term professional relationships is consistent, ongoing communication that builds rapport and earns trust."},
{q:"Business A's failure to keep an agreement to supply Business B with a certain good or service is an example of a situation that is covered by __________ law.",opts:["trade","antitrust","contract","property"],ans:2,exp:"Contract law recognizes voluntary promises that must be fulfilled. If Business A fails to honor its agreement with Business B, Business A is in breach of contract."},
{q:"Business customers differ from final consumers in that:",opts:["there is a greater emphasis on personal selling in business-to-business marketing.","business customers don't care about service as much as consumers do.","consumers tend to buy in bulk more often than businesses do.","consumer products tend to be more technical in nature."],ans:0,exp:"In B2B marketing there is a greater emphasis on personal selling, whereas in consumer marketing the emphasis is on promotion and advertising."},
{q:"Business decision makers can best analyze the financial impact of increased production by evaluating __________ cost.",opts:["Marginal","Sunk","Fixed","Average"],ans:0,exp:"Marginal cost is compared against marginal revenue to determine profitability of increased production. Sunk, fixed, and average costs occur regardless of production level."},
{q:"Business employees often obtain current industry information by reading:",opts:["consumer reports.","trade publications.","news magazines.","local periodicals."],ans:1,exp:"Trade publications are industry-specific journals that provide current information on trends and events in a specific industry. Consumer reports, news magazines, and local papers target broad audiences."},
{q:"Business expenses that do not vary with changes in sales volume are called __________ expenses.",opts:["Direct","Net","Fixed","Variable"],ans:2,exp:"Fixed expenses (like insurance, taxes, and rent) do not go up or down with changes in sales volume. Variable expenses change as sales volume changes."},
{q:"Business managers often use financial information management data to:",opts:["calculate the level of corporate groupthink.","determine if liability insurance is needed.","develop secondary equity markets.","forecast financial inflows and outflows."],ans:3,exp:"Financial information management collects, maintains, and reports data about financial transactions. Business managers often use these data to forecast financial inflows and outflows when developing a budget."},
{q:"Businesses are affected by social factors in the external environment because:",opts:["Every business creates consumer products","Customer needs are affected by these factors as well","A business cannot survive without social networking","Customers no longer value quality"],ans:1,exp:"Meeting customer needs is every organization's prime goal, and customer needs are shaped by social factors in the environment."},
{q:"Businesses benefit when employees handle customer inquiries in an effective manner because:",opts:["customers feel the need to ask more questions.","customers feel free to return products.","customers' confidence in the business increases.","customers' total purchases are reduced."],ans:2,exp:"Customers' confidence grows when businesses provide accurate answers. Knowledgeable staff give customers confidence in the products, and total purchases are more likely to increase."},
{q:"Businesses can obtain __________ insurance to limit their exposure in situations where they are held legally responsible.",opts:["Renter's","Disability","Liability","Life"],ans:2,exp:"Professional liability insurance provides financial protection for certain types of professionals if a client sues them."},
{q:"Businesses consider a customer's income when determining whether to:",opts:["Charge interest","Accept cash sales","Restructure policies","Offer credit"],ans:3,exp:"Before offering credit, a business analyzes financial status including income to determine if a customer is a good credit risk and can make payments."},
{q:"Businesses may review invoices to evaluate their customers':",opts:["Storage needs","Business plans","Purchasing habits","Selling policies"],ans:2,exp:"By analyzing past invoices, a business determines what customers are buying, when, and how much—helping forecast future sales."},
{q:"Businesses must comply with regulations that limit the amount and type of pollution and waste they produce. These regulations are referred to as __________ laws.",opts:["Environmental","Antitrust","Property","Industrial"],ans:0,exp:"Environmental laws protect the natural environment—air, soil, and water—and govern how businesses dispose of waste. Noncompliant businesses may be fined or shut down."},
{q:"Businesses often evaluate and change their policies as a result of __________ customers.",opts:["Satisfying their","Getting feedback from","Acquiring new","Creating good relations with"],ans:1,exp:"Feedback from customers helps businesses decide if policies need revision."},
{q:"Businesses often maintain records about vendors' pricing, delivery terms, and credit policies and use the information to:",opts:["follow safe shipping procedures.","negotiate higher discounts.","monitor inventory levels.","award purchasing contracts."],ans:3,exp:"By comparing vendor information, a business can make an informed decision about the best vendor and award purchasing contracts to the most appropriate one."},
{q:"Businesses often use computer spreadsheet software for 'what if' financial planning by plugging different numerical data into formulas, which provide possible:",opts:["distribution methods.","production strategies.","financial outcomes.","accounting standards."],ans:2,exp:"By inputting different values into spreadsheet formulas, businesses can calculate various outcomes and determine the best course of action under particular circumstances."},
{q:"Businesses should keep promises to customers in both personal interactions with employees and:",opts:["advertising.","newspaper articles.","coworker interactions.","future products."],ans:0,exp:"Keeping promises to customers involves both personal interactions and advertising. Companies must make good on their promises regardless of what method they used to make them."},
{q:"Businesses such as banks that keep large amounts of cash on hand may be common targets for:",opts:["Pilferage","Robbery","Fraud","Shoplifting"],ans:1,exp:"Robbery involves the use of force, violence, or fear—making cash-rich businesses like banks prime targets. Pilferage is small-scale theft; fraud is deception; shoplifting is customer theft."},
{q:"Businesses that use computer software to track billing information and sales transactions create records about their customers':",opts:["Payment history","Financial plans","Income level","Personal preferences"],ans:0,exp:"Billing information and sales transactions provide a record of payment dates, amounts, and methods—the customer's payment history."},
{q:"Businesses use budgeting software to:",opts:["record employee performance.","develop reliable forecasts.","calculate their tax rates.","organize shipping data."],ans:1,exp:"A primary use of budgeting software is developing reliable forecasts, such as estimating future sales. Businesses don't use it for employee performance, tax calculation, or shipping."},
{q:"Businesses use budgets to estimate how they will:",opts:["file their taxes.","spend their money.","calculate their assets.","depreciate their assets."],ans:1,exp:"A budget estimates how a business will earn and spend its money. Businesses use budgets to plan how to allocate income to pay expenses—not to file taxes or calculate/depreciate assets."},
{q:"Businesses use data-cleansing applications to:",opts:["Calculate statistical data","Update their databases","Duplicate internal records","Generate necessary reports"],ans:1,exp:"Data-cleansing removes duplicate records, updates expired data, and completes incomplete fields, keeping databases current for accurate reporting."},
{q:"Businesses use marginal analysis for the purpose of:",opts:["Maximizing profit","Increasing productivity","Eliminating mistakes","Maintaining reputation"],ans:0,exp:"Marginal analysis assesses the potential benefits of a business activity compared to its costs, helping businesses make decisions that maximize profit."},
{q:"Businesses usually invest in:",opts:["bonds.","themselves.","stocks.","real estate."],ans:1,exp:"Businesses most commonly invest back into themselves by developing new products, purchasing the latest technologies, and expanding into new markets."},
{q:"Businesspeople from one country need to be aware of cultural differences to avoid:",opts:["Discussing finances","Being insulting or rude","Asking questions","Meeting face-to-face"],ans:1,exp:"Without knowing cultural norms, businesspeople risk accidentally insulting or being rude—for example, through misunderstood nonverbal communication or meeting etiquette."},
{q:"Businesspeople must understand the importance of nonverbal cues when dealing internationally, which include the use of:",opts:["Proper grammar","Accurate word pronunciation","Hand gestures","Interactive feedback"],ans:2,exp:"Nonverbal communication involves gestures rather than words. A hand gesture may mean friendship in one culture and disrespect in another."},
{q:"BVM Company examined economic and political factors to determine whether to expand. The company conducted a(n) __________ analysis.",opts:["Strengths","Internal","Environmental","Tactical"],ans:2,exp:"An environmental scan studies external forces (economic indicators, political factors) that influence business success to make informed expansion decisions."},
{q:"By analyzing a customer's financial information, a finance professional should be able to:",opts:["declare Chapter 11 bankruptcy for the customer.","develop a financial strategy to help the customer.","protect the security of the customer's financial information.","determine the customer's newest target market."],ans:1,exp:"Financial analysis of customer data enables finance professionals to recommend appropriate financial strategies. Bankruptcy is a legal/management decision; privacy protection doesn't require analysis."},
{q:"By installing firewalls on its computer networks, a business can protect customers' credit card information from:",opts:["Investment scams","Tax evasion","Trade barriers","Identity theft"],ans:3,exp:"Firewalls protect computer networks from unauthorized users (hackers) trying to steal financial information—identity theft."},
{q:"By investing their funds in several different countries, investors:",opts:["easily avoid integrated and emerging financial markets.","demonstrate their liberalization and home biases.","reduce their exposure to business cycle risks.","reduce foreigners' access to domestic financial markets."],ans:2,exp:"Diversifying investments across countries reduces exposure to business cycle risks within any particular country, a key benefit of financial globalization."},
{q:"By protecting financial information from tampering, loss, and unauthorized use, a financial-information management professional acts as a(n) __________ of that financial information.", opts:["Interpreter","Steward","Analyst","Agent"], ans:1, exp:"Stewardship involves protecting financial data from tampering, loss, unauthorized access, and use. Interpreting or analyzing data are different functions. An agent is an intermediary who assists in sale/promotion of goods without taking title to them."},
{q:"By protecting financial information from tampering, loss, and unauthorized use, a financial-information management professional acts as a(n) __________ of that financial information.",opts:["agent","interpreter","analyst","steward"],ans:3,exp:"The stewardship function involves protecting financial data from tampering, loss, unauthorized access, and unauthorized use. An agent assists in the sale/promotion of goods but does not take title."},
{q:"By putting $2,000/year in an IRA starting at age 21 at 9% annually, you'll have $1,156,517 at age 65. This illustrates the power of:", opts:["Compound interest","Finance charges","Fiscal policy","The prime interest rate"], ans:0, exp:"Compound interest is earning interest on previous interest earnings. Starting early and compounding dramatically increases wealth over time. Finance charges are interest on credit balances. Fiscal policy is government spending/taxation. The prime rate is the rate banks offer their best credit customers."},
{q:"By reviewing a prospective customer's borrowing and repayment history, a business can determine if it should:",opts:["provide the prospective customer with a high credit rating.","charge sales tax.","offer credit to the prospective customer.","increase the prime lending rate."],ans:2,exp:"Credit history reveals how reliably a customer pays debts, helping the business decide whether to offer credit. Government sets the prime rate and tax requirements."},
{q:"By reviewing an income statement to see how every line item compares to revenue, Anna conducted a __________ analysis.",opts:["Horizontal","Vertical","Break-even","SWOT"],ans:1,exp:"Vertical analysis reviews line items as a proportion of revenue—looking up and down (vertically) a financial document. Horizontal analysis looks at year-over-year changes."},
{q:"By understanding the time value of money concept, you know that:",opts:["Saving money can buy time on debt payment","It is better to receive $101 a year from now than $100 today","It is better to receive $100 today than $101 a year from now","Time and money are related by due date"],ans:2,exp:"Money available now is worth more because of its earning potential. Receiving money later costs you the opportunity to earn interest."},
{q:"By using a central data repository for financial information, companies receive:",opts:["Up-to-date data","Slower responses to queries","Less predictability","Inconsistent data"],ans:0,exp:"A central data repository houses data in one location, keeping it up-to-date and consistent, with faster response to queries and better predictability."},
{q:"By using a central data repository for financial information, companies receive:",opts:["Up-to-date data","Slower responses to queries","Less predictability","Inconsistent data"],ans:0,exp:"Central data repositories keep data up to date and consistent, and provide faster responses to queries."},
{q:"Caitlin tends to remain positive even when times are tough for her business. What characteristic of entrepreneurship is she exhibiting?",opts:["Innovation","Organization","Optimism","Determination"],ans:2,exp:"Optimistic entrepreneurs have a positive outlook and look for growth opportunities even when facing challenges and setbacks."},
{q:"Calais is working on a budget to project how cash will move in and out of his company. Calais is building a __________ budget.",opts:["Cash flow","Master","Financial","Cash conversion"],ans:0,exp:"Cash flow budgets are a means of projecting how and when cash will flow in and out of a company over a specific period of time."},
{q:"Calculate a business's total cash receipts for one month if it had cash sales of $6,500, credit sales of $2,450, cost of goods sold of $2,725, and total expenses of $1,980.",opts:["$6,500","$8,900","$6,225","$4,245"],ans:0,exp:"Total cash receipts only includes collected money—cash sales of $6,500. Credit sales are not yet collected. Cost of goods sold and expenses are cash outflows, not receipts."},
{q:"Camilla's Cookies now purchases its gluten-free ingredients from suppliers with high quality standards to prevent contamination risks. The company focuses its ERM efforts on risk",opts:["Sharing","Improvement","Acceptance","Avoidance"],ans:3,exp:"By purchasing ingredients from suppliers with high quality standards, Camilla's Cookies is avoiding the risk of gluten contamination altogether."},
{q:"Capital gains taxes may be imposed on:",opts:["stocks, real estate, and financial gifts.","stocks, bonds, and financial gifts.","bonds, real estate, and financial gifts.","stocks, bonds, and real estate."],ans:3,exp:"Capital gains taxes apply to stocks, bonds, and real estate when sold at a profit. A gift tax — not capital gains tax — applies to financial gifts."},
{q:"Cara hasn't met Joan, but believes that because Joan is an attractive blonde, she is probably dumb and won't do her share of the work. What does Cara need to learn about herself?",opts:["Cara is a good judge of people.","Cara stereotypes other people.","Cara is open-minded and fair.","Cara tolerates others' faults."],ans:1,exp:"Cara believes all blondes are the same — a stereotype. She is not a good judge of people; her opinions are based on prejudice. Stereotyping is unfair and creates problems."},
{q:"Career growth opportunities, access to insider information, and increased technical knowledge are all benefits of:",opts:["Maintaining a healthy work-life balance","Working overtime every week","Building professional relationships","Avoiding office-wide social events"],ans:2,exp:"Professional relationships in finance can lead to career growth, access to industry information, and increased technical knowledge through networking."},
{q:"Carrie wants to transition her home business to a paperless office due to space constraints. She should use budgeting software with __________ capabilities.", opts:["Internal-control","Forecasting","Scanning","Variance"], ans:2, exp:"Scanning capabilities allow users to scan and save documents digitally, potentially eliminating paper copies and freeing up space. While forecasting, internal-control, and variance-analysis capabilities are helpful, only scanning directly addresses the space/paperless goal."},
{q:"Carrie works for an investment bank monitoring communications between employees and the public. In which department does Carrie likely work?",opts:["Human resources","Securities and trading","Compliance","Operations"],ans:2,exp:"The compliance department monitors communications between employees and the public and ensures the bank follows applicable rules and regulations."},
{q:"Carson is a staff accountant who can't find last year's tax return anywhere. Which information management guideline is not being followed?",opts:["Set and consistently follow organizational information management practices.","Make sure that information is accurate.","Make sure that information is retrievable.","Prioritize information management needs according to business needs."],ans:2,exp:"When Carson is unable to find the tax return when he needs it, information is not retrievable. This will slow down his productivity. The information management guideline of retrievability is being violated."},
{q:"Carter is usually the last person to leave his office and occasionally forgets to set the security alarm. This situation results in risks related to",opts:["Product liability","Conflicts of interest","Fairness","Security"],ans:3,exp:"Failing to set the alarms exposes a business to security risks such as theft and robbery."},
{q:"Casey's Tree Removal Services adheres strictly to its rules, practices, and processes, enjoying positive relationships with stakeholders. This demonstrates the benefits of:",opts:["Ethics training in the workplace","Good corporate governance","Public relations initiatives","Setting SMART goals"],ans:1,exp:"Good corporate governance—the combined rules, practices, and processes—leads to fewer misconduct incidents and positive stakeholder relationships."},
{q:"Casey's Tree Removal Services adheres strictly to rules, practices, and processes, resulting in no major ethics problems and positive relationships with stakeholders. This demonstrates the benefits of:",opts:["good corporate governance.","setting SMART goals.","ethics training in the workplace.","public relations initiatives."],ans:0,exp:"Corporate governance is the combined set of rules, practices, and processes by which an organization is managed. Benefits include fewer incidents of misconduct and better stakeholder relationships."},
{q:"Certain health and safety regulations require many types of businesses to:",opts:["offer exercise programs.","purchase new machinery.","routinely inspect equipment.","install security cameras."],ans:2,exp:"Certain health and safety regulations require businesses to routinely inspect equipment to ensure safety. Government inspectors may visit businesses and force them to stop using malfunctioning equipment."},
{q:"Certificates of deposit and collectibles are types of:",opts:["Earnings","Accounts","Securities","Investments"],ans:3,exp:"CDs and collectibles are types of investments. CDs pay guaranteed interest; collectibles may gain or lose value over time."},
{q:"Certificates of deposit and municipal bonds are types of:", opts:["Value stocks","Ownership securities","Commodities","Lending investments"], ans:3, exp:"Lending investments let individuals loan their money to borrowers for a specified rate of interest. CDs and municipal bonds are lending investments. Ownership investments (like stocks) involve purchasing a portion of an asset. Value stocks are undervalued stocks. Commodities are raw materials traded on exchanges."},
