{q:"When you use an infographic to represent data, your audience:",opts:["Won't remember your key points","Can become easily confused","Will pay more attention","Will mistrust your expertise"],ans:2,exp:"Infographics capture and hold audience attention much better than raw data, making key points more memorable and easier to understand."},
{q:"When you use money to make money, you are:",opts:["investing.","saving.","rationing.","reimbursing."],ans:0,exp:"Using money to make money is called investing. Saving is setting aside current income for future use. Rationing determines who gets scarce goods; reimbursing means paying someone back."},
{q:"When you use money to make money, you are:",opts:["Investing","Saving","Rationing","Reimbursing"],ans:0,exp:"Using money to make money is called investing. Saving is setting aside income for future use. Rationing determines resource distribution; reimbursing is paying someone back."},
{q:"When you want to select a new vendor for your business, it's best to:", opts:["Continue using a vendor you've used before","Go with a friend's recommendation","Use a formal selection process","Pick the vendor with the best online reviews"], ans:2, exp:"A formal selection process is the smartest, most effective way to find the best fit for your business. Friends' recommendations may not share your criteria. A previous vendor may be familiar, but better options might exist. Online reviews can be useful but don't guarantee a good fit for your specific needs."},
{q:"When you want to select a new vendor for your business, it's best to:",opts:["Continue using a vendor you've used before","Go with a friend's recommendation","Use a formal selection process","Pick the vendor with the best online reviews"],ans:2,exp:"A formal selection process is the most effective way to find the vendor that's the best fit for your business's particular needs."},
{q:"When your parents tell you to vacuum the living room, you are receiving __________ directions.",opts:["social","written","oral","nonverbal"],ans:2,exp:"When a person speaks, they are giving oral directions. This is verbal (spoken) communication, not written or nonverbal."},
{q:"When your project isn't as successful as you hoped, you should:",opts:["scrap the project entirely and start over.","figure out which of your project team members are responsible.","hide your mistakes from project stakeholders.","gather lessons learned so you won't repeat the same mistakes."],ans:3,exp:"Evaluating project shortcomings and gathering lessons learned allows improvement in future projects. Hiding mistakes, blaming others, or scrapping everything are not constructive approaches."},
{q:"When your self-concept is high, you usually believe that you are a(n) __________ person.",opts:["Valuable","Unimportant","Witty","Aggressive"],ans:0,exp:"Individuals with a high self-concept believe they can make significant contributions. Feeling unimportant indicates low self-concept."},
{q:"Whenever Nasra makes a difficult decision, she considers how her actions might affect other people and their feelings. She has developed higher:",opts:["Ethics","Wages","Productivity","Profit margins"],ans:0,exp:"Considering how actions affect others' feelings is showing empathy, which leads to higher ethics."},
{q:"Where else could Eugenia include the name and date of her workshop besides the title slide?",opts:["Headers","Footers","Animations","Transitions"],ans:1,exp:"Footers appear at the bottom of slides and can include the presentation name, date, and slide numbers."},
{q:"Whether prices go up or down, the relationship between relative prices does not change if the __________ remains the same.",opts:["value","resource","ratio","market"],ans:2,exp:"A ratio is a fixed relation in degree between two similar things. If the ratio stays constant, relative prices remain the same even if absolute prices change."},
{q:"Which accurately describes how consolidated financial statements represent a parent company and its subsidiaries?",opts:["Separate allocations for the parent and each subsidiary are listed","Transactions between the parent and subsidiaries are included","All assets, liabilities, revenue, and expenses are combined for the parent and its subsidiaries","All components are combined except individual profits and losses"],ans:2,exp:"Consolidated statements combine all financial information of the parent and subsidiaries as if they are one economic unit. Intercompany transactions are eliminated."},
{q:"Which action should a business take to help prevent robberies?", opts:["Have one person open and close each day","Avoid making eye contact with customers","Hang up signs on doors and windows","Make sure the facility is well-lit"], ans:3, exp:"Good lighting increases visibility—dark stores with many hiding spots are easier to rob. Making eye contact with customers signals would-be robbers they've been seen. Signs on doors/windows block visibility into the store. Having only one person open/close is dangerous—two people should always be present."},
{q:"Which are among the most important resources to access prior to purchasing stock in a company?", opts:["EDGAR and the Statement of Ownership","ESOP and the company's website","EDGAR and the company's website","ESOP and the Statement of Ownership"], ans:2, exp:"EDGAR (SEC's data gathering system with all mandatory filings) and the company's website (annual reports, public information) are the most important resources. A Statement of Ownership is part of financial statements but less critical. ESOP (employee stock ownership plan) is for company employees, not potential outside investors."},
{q:"Which are common categories of commodities?", opts:["Energy, metals, and grains","Energy, metals, and consumer goods","Energy, grains, and consumer goods","Metals, grains, and consumer goods"], ans:0, exp:"Commodities are raw, primary products categorized as energy (natural gas, crude oil), metals (gold, silver, copper), and agricultural products (grains, livestock, softs). Consumer goods are finished products—not raw/primary products—so they're not commodities."},
{q:"Which are types of lending investments?", opts:["Money market accounts, certificates of deposit, and bonds","Bonds, certificates of deposit, and collectibles","Savings accounts, collectibles, and stocks","Certificates of deposit, stocks, and real estate"], ans:0, exp:"Lending investments let borrowers use your money for a specified rate of interest: money market accounts, CDs, bonds, and savings accounts. Ownership investments (stocks, real estate, collectibles) involve purchasing a portion of an asset."},
{q:"Which area would be best able to participate in trade with other countries?",opts:["A country that is landlocked","A country that is mountainous","A country with a long coastline","A country that has no rivers"],ans:2,exp:"A long coastline provides access to ports, making international shipments easier and more convenient for trade."},
{q:"Which aspect of a company's financial statements can provide information about its bottom line?",opts:["Cash flow trends","Earnings and revenue growth","Dividends paid","Liabilities"],ans:1,exp:"Earnings and revenue growth indicate whether a company is profitable and by how much — this is the 'bottom line.'"},
{q:"Which behavior will align most with the value of academic achievement?",opts:["Starting a part-time job","Joining a study group","Copying your friend's answers","Trying out for the tennis team"],ans:1,exp:"The behavior that will align most clearly if you value academic achievement is joining a study group."},
{q:"Which budgeting software tool could Tara use to assess the potential impact of a loan versus a line of credit on her business?",opts:["Zero-based modeling","Decision trees","Environmental scanning","Debt modeling"],ans:3,exp:"Debt modeling tools allow the user to input the terms of a loan or line of credit (interest rate, term, principal) to assess its potential impact on the business."},
{q:"Which budgeting software tool could Tara use to assess the potential impact of a loan vs. a line of credit on her business?",opts:["Decision trees","Debt modeling","Environmental scanning","Zero-based modeling"],ans:1,exp:"Debt modeling tools allow users to input loan or credit terms to assess the potential impact of different funding options."},
{q:"Which can be used to identify unethical manipulation of records in a financial-information management system?", opts:["Long-term liabilities","What-if planning","Audit trails","Direct checks"], ans:2, exp:"Audit trails record all actions including erasures—so even if someone deletes transactions, the audit trail shows it happened. What-if planning applies different assumptions to data. Long-term liabilities are debts. Direct checks verify received goods against purchase orders."},
{q:"Which can be used to trace a financial transaction from beginning to end to ensure data are accurate and unaltered?", opts:["Supply chain","Separation of duties","Accounting standards","Audit trail"], ans:3, exp:"An audit trail traces all documents related to a transaction to verify accuracy and detect alterations. Separation of duties requires multiple people for one task (internal control). Accounting standards govern how financial information is recorded. The supply chain moves products from supplier to user."},
{q:"Which career is likely to involve finding money for a company and then making sure it is managed correctly?",opts:["Insurance agent","Mutual fund manager","Financial analyst","Financial accountant"],ans:2,exp:"Financial analysts in corporate finance focus on finding money for a company and managing it correctly through budgeting, planning, and investment decisions."},
{q:"Which communication strategy can help someone best respond to an inquiry?",opts:["Provide lengthy responses","Respond defensively","Refer the inquirer to someone else","Ask clarifying questions"],ans:3,exp:"Asking for clarity ensures that you fully understand someone's inquiry and can provide the best possible answer."},
{q:"Which compliance reasoning process detects unbalanced journal entries?", opts:["Symbolic reasoning","Contextual reasoning","Temporal reasoning","Cross-source reasoning"], ans:0, exp:"Symbolic reasoning searches for known compliance exceptions including unbalanced journal entries and duplicate journal entries. Contextual reasoning examines transaction circumstances. Temporal reasoning considers timing. Cross-source reasoning compares multiple records."},
{q:"Which component of a securities table indicates the last price paid when trading ended for the day?", opts:["Volume","Net change","Close","Yield"], ans:2, exp:"Close (sometimes listed as Last) represents the final trading price for the day. Net change compares closing price to previous day. Volume shows how many shares were traded. Yield is the rate of return (dividend divided by closing price)."},
{q:"Which computer application helps manufacturers track and manage inventory used to produce goods?",opts:["Critical path","Job sequencing","Reverse Logistics Systems (RLS)","Material requirements planning (MRP)"],ans:3,exp:"MRP software helps manufacturers streamline production, determine quantities of raw materials needed, and manage delivery systems."},
{q:"Which contains the steps to perform data mining in the proper order?", opts:["Choose technique; define objectives; gather data; interpret; create models; use data","Create models; define objectives; gather data; interpret; choose technique; use data","Gather data; choose technique; create models; interpret; define objectives; use data","Define objectives; gather data; choose technique; create models; interpret; use data"], ans:3, exp:"Data mining steps: (1) Define objectives—why are you mining? (2) Gather and organize data. (3) Choose the data-mining technique. (4) Search for patterns and create models. (5) Interpret and validate data. (6) Use the data as specified in objectives."},
{q:"Which corporations can sell unlimited shares of stock to the general public?",opts:["Private corporations","Nonprofit corporations","C corporations","S corporations"],ans:2,exp:"C corporations can sell unlimited shares of stock to the general public. S corporations must have 100 or fewer shareholders. Nonprofits cannot issue shares."},
{q:"Which cost classification can help a decision maker determine how well different department managers performed?",opts:["Classification by function","Classification by controllability","Classification by behavior","Classification by relevance"],ans:1,exp:"Classification by controllability is based on a manager's control over particular costs, helping evaluate how well managers handle costs they personally impact."},
{q:"Which CRM software would be most appropriate for a company looking for a more efficient way to track potential new clients?",opts:["Matching engine technology","Campaign management software","Personalization technology","Sales force automation"],ans:3,exp:"Sales force automation (SFA) technology tracks leads, prospects, and customers, and includes contact management and sales forecasting."},
{q:"Which data mining method, often used in market segmentation, involves placing observable data into naturally occurring groups?",opts:["Forecasting","Prediction","Market basket analysis","Cluster analysis"],ans:3,exp:"Cluster analysis groups data points into naturally occurring clusters. When used with consumers, it creates market segments for targeted marketing."},
{q:"Which element is included in a quality-management plan?",opts:["Standards","Risks","Change","Schedule"],ans:0,exp:"A quality-management plan includes standards for how quality will be measured. Scheduling, changes, and risks are covered in other parts of the project plan."},
{q:"Which employee reports directly to a corporation's board of directors?",opts:["Vice president of operations","Accounting manager","Chief executive officer","Director of sales"],ans:2,exp:"The CEO is elected/selected by the board of directors and reports directly to them. VPs, accounting managers, and directors report up through the executive hierarchy to the CEO."},
{q:"Which ethical issue is most likely to cause hazard risks?",opts:["Unsafe working conditions","Conflicts of interest","Misuse of resources","Lack of transparency"],ans:0,exp:"Hazard risks are situations that can cause injury or harm to people, property, or the environment—most likely from unsafe working conditions."},
{q:"Which example best illustrates the law of diminishing returns?",opts:["Manufacturing costs increased, resulting in lower profits","A declining economy caused a company to reduce production","Falling interest rates led to an increase in construction","A factory added employees but experienced higher costs due to reduced production output per employee"],ans:3,exp:"When one input (employees) increases while others remain constant, output per employee eventually declines—the law of diminishing returns."},
{q:"Which example best illustrates the purpose of variance analysis?",opts:["Tariq made suggestions regarding pricing strategy","Shamaya figured out which product line would be most profitable","Carter determined that storage costs exceeded the budgeted amount","Eileen informed her manager how much money was left for travel"],ans:2,exp:"Variance analysis compares actual costs to budgeted amounts. Carter's discovery that storage costs exceeded budget illustrates this purpose."},
{q:"Which example illustrates how environmental factors are dynamic?",opts:["The government provides subsidies to agricultural businesses","Demographics influence social and cultural attitudes","The economy impacts government policies","High interest rates will eventually get lower"],ans:3,exp:"Interest rates' fluctuation over time illustrates how environmental factors are dynamic, or always changing."},
{q:"Which example illustrates the importance of monitoring a project's scope?",opts:["Mateo asked staff how they were coping with their workloads","Zander is making sure he doesn't spend too much on supplies","Erin spent an hour selecting fonts when she should have been practicing her speech","Bethany wants to know if her team won't meet deadlines"],ans:2,exp:"Erin is spending time on a non-essential task (fonts) instead of her actual work (practicing). Monitoring scope prevents this kind of distraction."},
{q:"Which factor differentiates the governance structure of a small business from a large business?",opts:["The impact of governance policies","The need for a board of directors","The number of owners","The presence of investors"],ans:2,exp:"A large, publicly listed corporation has many owners, while a small company has one or few shareholders. Both need boards and are impacted by governance."},
{q:"Which factor has influenced the geographical development of unions?",opts:["Right to bargain collectively","Availability of natural resources","Right-to-work laws","Availability of capital goods"],ans:2,exp:"Right-to-work laws, legislated by individual states, give employees the right to work without joining a union, limiting union activity in those states."},
{q:"Which factors are most likely to build a quality work culture?", opts:["Coercion and empowerment","Consistency and censorship","Vision and unpredictability","Respect and honesty"], ans:3, exp:"A quality work culture begins with respectful and honest behavior at all levels, building trust, nurturing creativity, and encouraging collaboration. Coercion, unpredictability, and censorship create a negative work environment. Consistency is positive, but censorship is not."},
{q:"Which federal agency supervises banks and credit unions?",opts:["Federal Trade Commission","Federal Bureau of Investigation","Consumer Product Safety Commission","Consumer Financial Protection Bureau"],ans:3,exp:"The Consumer Financial Protection Bureau supervises banks, credit unions, and other financial-services providers and educates consumers about financial products."},
{q:"Which finance professional typically oversees a company's cash management, capital raising, and investment activities?", opts:["Treasurer","Risk manager","Cash manager","Underwriter"], ans:0, exp:"A corporate treasurer oversees cash management, capital raising, investment activities, and financial goals/objectives. Risk managers oversee risk management programs. Cash managers monitor cash flow. Underwriters calculate risk of loss and establish insurance premium rates."},
{q:"Which financial statement should an investor use to quickly determine a company's 'bottom line'?", opts:["Statement of retained earnings","Cash flow statement","Balance sheet","Income statement"], ans:3, exp:"The income statement shows the 'bottom line' (net income)—read from top (revenues) to bottom (net income after expenses). A cash flow statement tracks money in/out. A balance sheet shows financial health at a point in time. A statement of retained earnings shows profit retained and dividends paid."},
{q:"Which financial tool is often used to identify trends?", opts:["Financial ratios","Accrual accounting","Financial goals","Actuaries"], ans:0, exp:"Many use financial ratios to identify trends—comparing each ratio over time (monthly, quarterly, annually) and against industry competitors. Accrual accounting is a recording method. Financial goals are money-measured objectives. Actuaries assess financial impact of risk."},
{q:"Which form of customer management is most likely to look outward and have a customer-centric focus?",opts:["Customer relationship management","Customer experience management","Structured customer management","Inverse customer management"],ans:1,exp:"Customer experience management (CEM) looks outward with a customer-centric focus. CRM tends to look inward, using touchpoints to learn about the customer."},
{q:"Which group is most likely to enforce public corporations' compliance with financial reporting standards?", opts:["World Bank representatives","Local law enforcement officers","A securities regulatory commission","The federal judicial system"], ans:2, exp:"Securities regulatory commissions (like the SEC in the US) create and enforce compliance with financial reporting standards. Local law enforcement handles general crimes, not securities. The World Bank aids developing countries. The federal judicial system interprets laws; the executive branch enforces them."},
{q:"Which group of people is most likely to be interested in the statement of changes in equity?",opts:["Investors","Customers","Competitors","Employees"],ans:0,exp:"The statement of changes in equity provides information about shareholders' ownership. Investors want to know how their accounts have changed over time."},
{q:"Which has contributed to financial globalization?", opts:["An increase in restrictions on foreign investment and international trade","An increase in taxes on international financial transactions","A reduction in foreigners' access to domestic financial markets","A movement from fixed exchange rates to floating exchange rates"], ans:3, exp:"Moving from fixed to floating exchange rates has helped increase global investment. Financial globalization has DECREASED (not increased) restrictions on foreign investment, LOWERED (not increased) taxes on international transactions, and INCREASED (not reduced) foreigners' access to domestic markets."},
{q:"Which insurance ensures your beneficiaries receive an inheritance?", opts:["Disability insurance","Term life insurance","Universal life insurance","Long-term care insurance"], ans:2, exp:"Universal life insurance covers you for life and lets you build savings tax-free so beneficiaries receive an inheritance. Term life covers a set period only. Disability insurance pays while you're disabled and ends when disability ends. Long-term care covers loss of independence."},
{q:"Which international financial institution provides financing and advice to countries to encourage economic development?",opts:["Commonwealth of Nations","Small Business Administration","World Bank Group","Liberty Institute"],ans:2,exp:"The World Bank Group provides financing and advice to impoverished countries to encourage economic development and eliminate poverty."},
{q:"Which is a benefit of financial-information management software?", opts:["Improves productivity by replacing automated activities with manual tasks","Provides users with faster, better access to data from multiple sources","Lowers compliance costs by eliminating audit trails and economies of scale","Reduces risk and lowers confidence in the confidentiality and safety of data"], ans:1, exp:"Financial-information management software provides faster, better access to data from multiple sources. It improves productivity by replacing MANUAL tasks with AUTOMATED activities (not the reverse). It lowers compliance costs by INCREASING audit trails and economies of scale. It INCREASES (not lowers) confidence in data confidentiality."},
{q:"Which is a characteristic of a society that has a low tolerance of uncertainty?", opts:["Engages in high risk taking","Embraces differing opinions","Values individual accomplishments","Prefers rules and structure"], ans:3, exp:"Uncertainty-avoidance cultures prefer structure, rules, safety, and low risk taking. High uncertainty-tolerance cultures are open to differing opinions. Individualist societies value individual accomplishments. Each characteristic belongs to a different cultural dimension."},
{q:"Which is a common cause of disparate data structures within large corporations' financial-information management systems?", opts:["Channels of distribution","Mergers and acquisitions","Capital structure","Accounting method"], ans:1, exp:"Mergers and acquisitions commonly cause disparate data structures—two companies' historical financial data may be incompatible or housed in different structures, making data merging difficult. Distribution channels, capital structure, and accounting method don't typically cause this issue."},
{q:"Which is a computer application that increases efficiency of the accounts-receivable function?", opts:["Sales forecasting","Inventory valuation","Payroll taxation","Batch invoicing"], ans:3, exp:"Batch invoicing groups billable goods/services within a date range to generate invoices quickly—directly benefiting accounts receivable. Sales forecasting, inventory valuation, and payroll taxation are accounting applications not directly related to accounts receivable."},
{q:"Which is a computer-based time-management tool that helps employees track appointments and activities?",opts:["Perpetual calendar","Electronic task organizer","Instant-messaging program","Alarm clock"],ans:1,exp:"Electronic task organizers and calendars help employees track appointments and tasks, making them more efficient and productive."},
{q:"Which is a distinguishing feature of a consolidation in the finance industry?",opts:["All former entities no longer exist, and a single, new legal entity is formed.","All entities continue operating, connected by a parent-subsidiary relationship.","The acquirer does not have to purchase 100% of the target company's equity.","One of the entities continues to exist, absorbing 100% of another entity's stock."],ans:0,exp:"In a consolidation, two businesses create a new entity so one can take over the net assets of the other—neither original entity continues to exist."},
{q:"Which is a drawback of convergence and consolidation in the finance industry?", opts:["Fewer customer loans","Fewer different products","Increased customer risk","Increased liquidity constraints"], ans:2, exp:"Convergence and consolidation create 'one-stop shopping' but increase customer risk—if a customer relies on one firm for all financial needs, they suffer more if that firm has difficulties. Convergence typically provides more products, more liquid capital, and more loan availability."},
{q:"Which is a good way to end a business phone call?",opts:["Offer your email address if the caller needs additional information","List all of the points made in the call","Make small talk about the caller's day","Wait for the caller to speak before deciding the call is over"],ans:0,exp:"Providing your email creates another line of communication and politely signals the call is ending without being abrupt."},
{q:"Which is a likely consequence of reporting inaccurate financial data to lenders and investors?", opts:["Two-for-one stock splits","A large influx of capital","Civil and/or criminal penalties","An economic contraction"], ans:2, exp:"Misleading lenders and investors with inaccurate financial data can result in civil and/or criminal penalties for executives and financial managers. Inaccurate data won't cause a stock split. One company's actions are unlikely to cause economic contraction."},
{q:"Which is a limitation that businesses face with their internal risk-control activities?", opts:["Economic conditions","Market dynamics","Trade agreements","Human judgment"], ans:3, exp:"Poor employee decisions and mistakes can result in lawsuits, illnesses, and accidents—human judgment is a limitation in internal risk-control activities. Businesses should train employees thoroughly and communicate the importance of accuracy, safety, and security. Economic conditions, market dynamics, and trade agreements are external factors."},
{q:"Which is a positive characteristic for members of a corporation's board of directors to possess?",opts:["Independent thinking","Indecisiveness","Single-minded attitude","Conformity"],ans:0,exp:"Independent thinking—questioning current policies and proposed actions—helps the board act in the best interests of the corporation and its shareholders."},
{q:"Which is a potential negative effect that technology has had on risk management?",opts:["There is too much information for any risk management system to process","The newest software processes information more slowly than risk managers could do unassisted","Cloud-based storage systems make confidential information vulnerable to a privacy breach","AI-based systems are less adaptable than traditional risk management technologies"],ans:2,exp:"Cloud-based storage can make confidential information vulnerable to privacy breaches, even with regular security updates."},
{q:"Which is a primary reason for a financial advisor to join a professional organization?",opts:["To have more time for work responsibilities","To reduce the organization's membership dues","To obtain professional development","To increase his/her work responsibilities"],ans:2,exp:"Professional organizations provide support, networking, and professional development events to help members grow their skills and knowledge."},
{q:"Which is a reason to calculate a company's debt-to-equity (D/E) ratio?",opts:["To compare multiple companies in different industries","To assess the level of risk involved in investing in the company","To compare the current year's performance to a previous year's","To assess the ability of a company to hire more employees"],ans:1,exp:"A high D/E ratio suggests higher investment risk because much of the financing has been done through borrowing."},
{q:"Which is a trend that financial information can be used to identify?", opts:["A bakery's artisan breads are growing in popularity","Jeannie ordered a red velvet birthday cake for her father","The delivery truck typically arrives 10 minutes early","Customers say sourdough bread tastes better than rye bread"], ans:0, exp:"Financial information helps identify which products are most/least profitable and which are growing in popularity and sales. A single customer's order is not a trend. Delivery timing trends are found through operational data, not financial information. Customer taste preferences come from marketing research."},
{q:"Which is a way that organizations can encourage transparency and reduce risk?",opts:["Offer rewards based on job performance","Give employees a way to voice concerns","Carefully monitor employees' resource use","Guard against digital security threats"],ans:1,exp:"Giving employees a safe way to report ethical issues without fear of consequences is a key aspect of transparency that reduces risk."},
{q:"Which is a well-regarded source of information about stocks?", opts:["Mediaweek","Security Dealer","Value Line","Financial Executive"], ans:2, exp:"The Value Line Investment Survey provides detailed reports on approximately 1,700 stocks. Security Dealer is for security system professionals. Mediaweek focuses on television. Financial Executive covers news for senior financial executives, not individual stocks."},
{q:"Which is an activity conducted by the finance function of business?", opts:["Tracking business expenditures","Preparing cash flow statements","Updating bookkeeping ledgers","Choosing appropriate investments"], ans:3, exp:"The finance function obtains and manages money to boost growth and achieve business goals—choosing appropriate investments increases company income. Tracking expenditures, preparing cash flow statements, and updating bookkeeping ledgers are all accounting activities."},
{q:"Which is an ethical hazard in risk management?", opts:["Contracting with an insurer with a reputation for adequate claims reserving","Working with a public accounting firm that has a whistleblower mechanism","Understating loss experience and exposure to an insurance underwriter","Questioning a supplier's history of disobeying state and federal regulations"], ans:2, exp:"Understating loss experience or exposure to get lower premiums is highly unethical and exposes the company to legal and financial risks. Working with reputable insurers and accounting firms with whistleblower mechanisms, and questioning supplier ethics, are all responsible risk management actions."},
{q:"Which is an example of a business involved in offshoring activities?", opts:["BVC Corporation and Tyrone Industries combine resources to open a new company in Belgium","DigiTech moves its production facility from Los Angeles to Jaipur, India to cut costs","Canadian-based Randall Enterprises purchases an existing firm in Venezuela","A German company operates offices in Japan, South Africa, and Australia"], ans:1, exp:"Offshoring moves operations from the home country to other countries to lower costs. Combining resources to open a new company is a joint venture. Purchasing a foreign firm creates a wholly owned subsidiary. Operating offices in multiple countries is a multinational firm."},
{q:"Which is an example of a change in the relative price ratio when red apples originally cost $0.60/lb and green apples $0.80/lb?",opts:["Red @ $0.30; green @ $0.40","Red @ $0.90; green @ $0.80","Red @ $0.45; green @ $0.60","Red @ $1.20; green @ $1.60"],ans:1,exp:"Red @ $0.90 and green @ $0.80 is the only combination that changes the ratio (was 3:4, now 9:8). The other options maintain the same 3:4 ratio."},
{q:"Which is an example of a conflict that causes personal motivation or drive?", opts:["High school students compete to sell the most candy in a fundraiser","Kevin has a class and a meeting scheduled for Tuesday afternoon","Two coworkers need to use the copy machine at the same time","Jane and Amy both want to be in charge of their presentation"], ans:0, exp:"Students competing to sell the most candy are motivated to be better salespeople and raise more money. Kevin's scheduling conflict is about competing situations. The copy machine conflict is about limited resources. The Jane/Amy conflict is about authority."},
{q:"Which is an example of a semi-variable business cost?", opts:["Property taxes","Employees' salaries","Rent","Telephone service"], ans:3, exp:"Semi-variable costs vary to some extent relative to sales. Telephone service has a set monthly fee plus variable charges (like long-distance). Salaried employees get the same pay regardless of hours worked (fixed). Rent and property taxes are also fixed business costs."},
{q:"Which is an example of horizontal communication in the workplace?", opts:["An employee provides his manager with a status report about the company's new website","A supervisor provides a line worker with feedback about job performance","A manager provides a new employee with advice on job advancement","An employee sends an email to a coworker about a short-term project"], ans:3, exp:"Horizontal communication occurs between employees with the same level of authority. Employees emailing coworkers are at the same level. Supervisors/managers providing feedback or advice to employees is downward/vertical communication. Employees reporting to managers is upward communication."},
{q:"Which is an example of violating a coworker's privacy in the workplace?", opts:["Ruby walked away from a serious coworker discussion","Joe opened Ali's desk drawer to look for a pen while she was away","Thomas changed wording on Carrie's report with her approval","Paige sent a personal e-mail from her work computer"], ans:1, exp:"Going through coworkers' desks, files, or personal belongings violates privacy. Walking away from a discussion and making changes with approval are fine. Sending personal email from work wastes company resources but isn't an invasion of privacy."},
{q:"Which is an important step to ensure a protest is peaceful and effective?",opts:["Argue against any opponents","Demonstrate importance by using harsh language","Obtain your senator's permission before assembling","Avoid violence and vandalism during the protest"],ans:3,exp:"To effectively communicate your message, avoid insults, violence, and vandalism."},
{q:"Which is commonly used to reduce an investor's capital gains tax burden?", opts:["Value stocks","Short-term investments","Puttable bonds","Capital losses"], ans:3, exp:"Capital losses (from depreciation of investments) can be subtracted from capital gains—you only pay taxes on the difference. Long-term investments help more than short-term (taxed at lower rates in the US). Puttable bonds and value stocks typically don't affect capital gains taxes."},
{q:"Which is most likely an unethical risk management activity?", opts:["Securing fair, favorable premium rates from insurers","Paying a share of loss exposures pooled through insurance","Reporting that an employee is embezzling","Withholding pertinent information from insurance underwriters"], ans:3, exp:"Withholding or misrepresenting information to underwriters to get lower premiums is highly unethical and causes long-term problems. Securing fair rates ethically is acceptable. Paying appropriate loss shares is required. Reporting embezzlement is good ethical risk management."},
{q:"Which is most likely to have a NEGATIVE effect on a business's customer-satisfaction levels?", opts:["Standing orders ship on time","Items are frequently backordered","Product quality is consistent","Staff has sufficient product knowledge"], ans:1, exp:"Frequent backorders mean customers don't get goods when needed, decreasing satisfaction and driving them to competitors. On-time standing orders, consistent product quality, and knowledgeable staff all positively impact customer satisfaction."},
{q:"Which is NOT essential to having a successful career?", opts:["Learning to work well with others in teams","Accepting responsibility at work when you make a mistake","Communicating clearly both verbally and in writing","Knowing the right people that will get you your first job"], ans:3, exp:"While knowing people in your desired industry can be helpful, it is not essential. Accepting responsibility, communicating clearly, and working well with others are all essential skills for career success."},
{q:"Which is often cited as the most significant stumbling block in achieving compliance goals within large financial organizations?", opts:["Poor data quality","Lack of training","Inadequate funding","Improper accounting system"], ans:0, exp:"Due to the size and complexity of large financial organizations, data quality is the biggest challenge. Multiple business units and product lines make it difficult to properly integrate data for compliance while retaining data quality and integrity."},
{q:"Which is often used to identify trends and patterns over time for a company?", opts:["Financial ratios","Bookkeeping","Opportunity cost","Market timing"], ans:0, exp:"Financial ratios compare numbers from financial statements, and comparing them over time (monthly, quarterly, annually) and against competitors identifies trends and patterns. Bookkeeping is an accounting activity. Opportunity cost is what's lost when choosing one option over another. Market timing buys low and sells high."},
{q:"Which is the first step in a business's accounting cycle?", opts:["Collecting the source documents","Journalizing transactions","Balancing the books","Preparing financial statements"], ans:0, exp:"The accounting cycle first requires collecting source documents (checks, receipts, invoices, purchase orders). Without this basic information, the business cannot journalize transactions, balance books, or prepare financial statements—all of which are subsequent steps."},
{q:"Which is the most common flaw in financial-information management?", opts:["Non-financial managers have difficulty accessing needed financial data","Non-financial managers are bombarded with excess financial data","Financial-information management personnel maintain operational instead of financial data","Most large companies don't have a financial-information management system"], ans:0, exp:"Because financial data are often in disparate structures, it's difficult for non-financial managers to access them. Rather than being bombarded, most non-financial managers suffer from lack of financial data. Most large companies do have some financial-information management system."},
{q:"Which is the most effective way to use text in a PowerPoint presentation?",opts:["Include full paragraphs to provide context","Use bullet points organized by topic","Use a rainbow of colors as well as text","Include every word you plan to say"],ans:1,exp:"Bullet points organized by topic indicate key points to the audience. Full paragraphs and every word the presenter plans to say would confuse listeners."},
{q:"Which is typically an effective method to build trusting relationships with financial clients?",opts:["Contacting clients only when problems arise","Using precise technical language when explaining products","Asking others to follow up after sales transactions","Explaining the benefits and drawbacks of different financial products"],ans:3,exp:"Providing complete product information—including drawbacks—shows openness and helps clients make educated decisions, building trust."},
{q:"Which issue is keeping risk managers from getting the right information into the right context for decision-making?",opts:["Having a centralized enterprise risk management system","Having transparency around the effects of volatility on the organization","Having many different sources of data that can be used to assess risk","Having too little information that can be used to assess and understand risk"],ans:2,exp:"Many organizations have decentralized departmental databases that can't interact — too much fragmented data from many sources — preventing a clear organization-wide risk picture."},
{q:"Which may happen if a business cuts costs?",opts:["It may pay fewer taxes","It may improve product quality","It may boost its community involvement","It may hire more employees"],ans:0,exp:"If finding tax loopholes is part of cost-savings, a business may pay fewer taxes. Cutting costs usually sacrifices quality and community involvement."},
{q:"Which methodology focuses most on eliminating waste to maximize value?",opts:["Licensing","Six Sigma","Sustainability","Lean"],ans:3,exp:"Lean production focuses on maximizing customer value while minimizing waste. Six Sigma targets process variations; Lean Six Sigma combines both."},
{q:"Which most accurately describes the overall purpose of accounting?",opts:["To estimate and pay taxes","To keep track of expenses","To maintain financial information","To keep track of income"],ans:2,exp:"The primary purpose of accounting is to accurately record and maintain all financial transactions."},
{q:"Which of the difficult customer types may become your best and most loyal customer, once they learn to trust you?",opts:["Suspicious","Dishonest","Disagreeable","Slow/Methodical"],ans:0,exp:"Suspicious customers only want facts and dislike being pushed. Once you gain their confidence and trust, they often become loyal customers. Disagreeable customers may never become loyal."},
{q:"Which of the following actions is most likely to lead to a serious legal penalty?",opts:["Possession of legal medication without a prescription","Missing a couple of days of school due to a family vacation","Refusing to speak when a police officer questions you","Being noisy with your friends at an amusement park"],ans:0,exp:"Possessing legal medication without a valid prescription is illegal. You have the right to remain silent with police, and brief absences from school are not criminal offenses."},
{q:"Which of the following actions should Julia take to orient the new employee?",opts:["Allow the employee to get straight to work and run through rules later","Focus on job duties and procedures, not getting to know coworkers","Assign a mentor or 'buddy' to help the new employee learn the ropes","Encourage the employee to talk about religious and political views"],ans:2,exp:"An experienced mentor can answer new employee questions and provide a built-in personal connection at the company."},
{q:"Which of the following actions would be considered illegal insider trading?",opts:["Gaining access to competitors' data","Discussing how a new CEO will affect company stock prices with a coworker","Buying the stock of your own company","Selling a company's stock after an employee tells you about its upcoming merger before that knowledge is public"],ans:3,exp:"Insider trading is buying or selling securities while in possession of material, nonpublic information. Selling stock based on a confidential upcoming merger is illegal."},
{q:"Which of the following are among the most important resources to access prior to purchasing stock in a company?",opts:["EDGAR and the Statement of Ownership","ESOP and the company's website","EDGAR and the company's website","ESOP and the Statement of Ownership"],ans:2,exp:"EDGAR (SEC's electronic filings database) and the company's website (with annual reports and filings) are the most important research resources before buying stock."},
{q:"Which of the following are characteristics of a well-written executive summary?",opts:["Error free, simple, and creative","Clear, concise, and error free","Creative, concise, and informal","Concise, informal, and error free"],ans:1,exp:"A well-written executive summary should be clear, concise, and error free. Because it is part of a formal report, it should follow a formal format—it does not need to be creative."},
{q:"Which of the following are common categories of commodities?",opts:["Energy, grains, and consumer goods","Energy, metals, and consumer goods","Energy, metals, and grains","Metals, grains, and consumer goods"],ans:2,exp:"Commodities are commonly categorized as energy, metals, and agricultural products (including grains). Consumer goods are finished products, not commodities."},
{q:"Which of the following are common categories of commodities?",opts:["Metals, grains, and consumer goods","Energy, grains, and consumer goods","Energy, metals, and consumer goods","Energy, metals, and grains"],ans:3,exp:"Commodities are raw primary products commonly categorized as energy, metals, and agricultural products (including grains). Consumer goods are finished products, not raw commodities."},
{q:"Which of the following are considered the owners of a corporation?",opts:["Managers","Stockholders","CEOs","Lower-level employees"],ans:1,exp:"Stockholders are the owners of a corporation. Managers, CEOs, and lower-level employees work for the corporation but do not own it."},
{q:"Which of the following are examples of agricultural products traded on commodity market exchanges?",opts:["Corn, hogs, and bread","Sheep, cereal, and wheat","Wheat, livestock, and corn","Cattle, cereal, and grain"],ans:2,exp:"Agricultural commodities include livestock (sheep, hogs, cattle) and grains (wheat, corn). Bread and cereal are processed products made from grains and are not traded on commodity exchanges."},
{q:"Which of the following are examples of cash outflows?",opts:["Payroll, stocks, and product sales","Supplies, loans, and earned interest","Rent, utilities, and supplies","Utilities, sale of assets, and payroll"],ans:2,exp:"Cash outflows are business expenses: rent, utilities, and supplies. Loans, interest, sales, and asset sales are cash inflows."},
{q:"Which of the following are examples of deposit-taking financial institutions?",opts:["Savings and loan associations, mutual savings banks, and insurance firms","Commercial banks, corporations, and mutual savings banks","Credit unions, savings and loan associations, and commercial banks","Commercial banks, credit unions, and brokerages"],ans:2,exp:"Credit unions, savings and loan associations, and commercial banks are deposit-taking institutions. Brokerages and insurance firms are not."},
{q:"Which of the following are examples of tax shelters?",opts:["Retirement funds and health-savings accounts","Real estate and stock ownership","Pension plans and capital gains","Municipal bonds and earned income"],ans:0,exp:"Retirement funds and health-savings accounts are tax shelters. Stocks, capital gains, and earned income are taxable."},
{q:"Which of the following are factors that affect a business's decision to offer credit to a customer?",opts:["Income, debt ratio, and credit rating","Debt ratio, credit rating, and education","Credit rating, objectives, and income","Debt ratio, education, and objectives"],ans:0,exp:"Income, debt ratio, and credit rating indicate whether a customer is a good credit risk. Education and objectives are not primary factors."},
{q:"Which of the following are indirect costs for a business?",opts:["Rent and payroll","Labor and insurance","Utilities and equipment","Raw materials and manufacturing supplies"],ans:0,exp:"Indirect costs are not directly related to a specific cost object. Rent and payroll are indirect costs. Labor, raw materials, equipment, and manufacturing supplies are direct costs."},
{q:"Which of the following are two guidelines for using power appropriately?",opts:["Maintain perspective and show respect","Avoid commitments and maintain perspective","Show respect and hold onto power","Hold onto power and avoid commitments"],ans:0,exp:"Leaders should maintain perspective, communicate effectively, and show respect. They should share power (not hold onto it) and follow through on commitments."},
{q:"Which of the following are two indicators of a recession?",opts:["Sales rise and income falls","Sales fall and production rises","Production and employment fall","Employment and income rise"],ans:2,exp:"A recession is characterized by production, employment, income, and sales all falling. Employment and income rising indicates expansion."},
{q:"Which of the following attributes best characterizes a master budget?",opts:["Unchanging","Rolling","Simplistic","Dynamic"],ans:0,exp:"A master budget can also be referred to as a fixed budget or a static budget because it does not change. Managers use it as a guideline but don't adjust it as the period goes on."},
{q:"Which of the following best demonstrates a contraction period in a business cycle?",opts:["An expansion reaches its peak","Economic activity increases month to month","A transition to an expansion begins","Economic activity decreases for six months"],ans:3,exp:"A contraction is a period of decline where economic activity decreases for at least six months."},
{q:"Which of the following best describes a project?",opts:["It is ongoing","It has a definite beginning and end","It keeps the business going on a day-to-day basis","It is a long-term endeavor"],ans:1,exp:"A project is a short-term undertaking that creates a unique good or service. It has a definite beginning and a definite end."},
{q:"Which of the following best describes customer relationship management (CRM) software?",opts:["It looks to offer better customer service and avoid cross-selling products","It helps businesses to prioritize repeat customers over new customers","It is used to establish better relationships with top customers","It aims to maximize the short-term value of customer relationships"],ans:2,exp:"CRM software provides businesses with information about their customers and is used to establish better relationships with top customers."},
{q:"Which of the following best describes enterprise risk management?",opts:["Traditional strategy","Bottom-up approach","Divisive approach","Firmwide strategy"],ans:3,exp:"ERM is a firmwide, top-down business strategy considering risk management from the perspective of the entire organization, not by distinct business units."},
{q:"Which of the following best describes the purpose of corporate governance?",opts:["To create a favorable image for the company","To make hiring and firing decisions for entry-level employees","To improve relations with company stockholders","To ensure that companies are held to high ethical standards"],ans:3,exp:"Corporate governance holds companies accountable for their behavior and helps organizations avoid financial, legal, and ethical pitfalls."},
{q:"Which of the following best describes the purpose of corporate governance?",opts:["To ensure that companies are held to high ethical standards","To improve relations with company stockholders","To create a favorable image for the company","To make hiring and firing decisions for entry-level employees"],ans:0,exp:"Corporate governance holds companies accountable and helps avoid financial, legal, and ethical pitfalls. It is not primarily about image, stockholder relations, or hiring decisions."},
{q:"Which of the following best explains the overall purpose of accounting?",opts:["To control finances by keeping accurate financial information","To reduce financial uncertainty and make accidental loss manageable","To help a business make the most money possible","To identify external opportunities and threats"],ans:0,exp:"The overall purpose of accounting is to control finances by keeping accurate financial information. Businesses cannot make good decisions without maintaining control of their money."},
{q:"Which of the following best represents the correct order for organizing a job that must be completed?",opts:["Identify, classify, prioritize, schedule, perform","Classify, identify, prioritize, perform, schedule","Identify, prioritize, classify, schedule, perform","Prioritize, identify, classify, perform, schedule"],ans:0,exp:"The best order is to identify your activities, classify/determine frequency, prioritize by importance, schedule in a time plan, then perform them."},
{q:"Which of the following best represents the recession phase of a business cycle?",opts:["Income and sales fall","Employment falls and income rises","Employment and production rise","Sales fall and production rises"],ans:0,exp:"A recession is a state of economic decline in which income, sales, employment, and production each fall."},
{q:"Which of the following best represents what happens in the spot market?",opts:["Creation and sale of new securities","Trade of financial instruments for immediate delivery","Delivery of an asset and funds at a future date","Purchase and sale of loans"],ans:1,exp:"The spot market is where financial instruments are traded for immediate delivery. Futures markets involve future delivery dates."},
{q:"Which of the following budgeting software applications tracks a business's cash, interest, and dividends?",opts:["Revenue recognition","Capital expenses","Workflow management","Inventory planning"],ans:0,exp:"Revenue recognition applications track various sources of revenue including cash flows, interest, and dividends, helping businesses determine how to allocate funds."},
{q:"Which of the following budgeting software applications tracks a business's cash, interest, and dividends?",opts:["Revenue recognition","Workflow management","Inventory planning","Capital expenses"],ans:0,exp:"Revenue recognition applications help the business track various sources of revenue including cash, interest, and dividends, helping determine how to allocate funds to cover various cash outflows."},
{q:"Which of the following business activities includes planning, maintaining, monitoring, controlling, and reporting the use of financial resources?",opts:["Information management","Financial analysis","Human resources management","Operations of finance"],ans:1,exp:"Financial analysis is the process of planning, maintaining, monitoring, controlling, and reporting the use of financial resources. Information management accesses and disseminates knowledge."},
{q:"Which of the following business activities is most likely to impact an organization's governance structures?",opts:["Developing a marketing strategy","Hiring a new sales representative","Borrowing money from a bank","Raising prices on consumer goods"],ans:2,exp:"Banks often require organizations with loans to follow external control mechanisms that impact governance structures. The other activities are common business operations that don't typically change governance."},
{q:"Which of the following business activities is most likely to impact an organization's governance structures?",opts:["Hiring a new sales representative","Developing a marketing strategy","Raising prices on consumer goods","Borrowing money from a bank"],ans:3,exp:"Banks often require organizations with loans to follow external control mechanisms that impact governance structures. Hiring, marketing, and pricing do not typically affect governance."},
{q:"Which of the following business management job titles falls under administrative services?",opts:["Receptionist","Supply chain manager","Benefits administrator","Project manager"],ans:0,exp:"Receptionist is a job title that falls under administrative services. Project manager falls under business information management, benefits administrator under HR, and supply chain manager under operations."},
{q:"Which of the following businesses best represents an innovative entrepreneurial endeavor?",opts:["Developing a new wood-cutting device to sell","Buying a small boutique coffee shop","Opening a brand new sushi franchise","Running a trendy online clothing store"],ans:0,exp:"An innovative entrepreneurial endeavor creates or invents something new — like a new wood-cutting device. Coffee shops, sushi franchises, and clothing stores sell existing products without innovation."},
{q:"Which of the following businesses best represents an innovative entrepreneurial endeavor?",opts:["Opening a new pizza franchise","Developing and selling a new wood-cutting device","Starting a clothing business online","Buying a small local coffee shop"],ans:1,exp:"An innovative entrepreneurial endeavor involves creating or inventing something new. A coffee shop, franchise, or online clothing store sells commonly known products."},
{q:"Which of the following can be used to identify the unethical manipulation of records in a financial-information management system?",opts:["What-if planning","Audit trails","Long-term liabilities","Direct checks"],ans:1,exp:"Audit trails record each step of financial transactions, so even if records are erased, a record of the erasure remains."},
{q:"Which of the following can be used to trace a financial transaction from beginning to end to ensure data accuracy?",opts:["Accounting standards","Supply chain","Audit trail","Separation of duties"],ans:2,exp:"An audit trail allows review of all documents pertaining to a transaction to determine if recorded data are accurate or altered. Separation of duties requires multiple people to complete a task."},
{q:"Which of the following careers likely falls within the securities and investments industry?",opts:["Appraiser","Regulatory reporting specialist","Mutual fund manager","Capital expenditure manager"],ans:2,exp:"Mutual fund managers work in the securities and investments industry. An appraiser likely works in insurance. A capital expenditure manager likely works in corporate finance."},
{q:"Which of the following characteristics tends to have a close relationship with initiative?",opts:["Truthfulness","Insecurity","Rudeness","Industriousness"],ans:3,exp:"Industrious people are energetic and hardworking, closely related to their willingness to look for jobs to do. Rudeness and insecurity tend to prevent individuals from possessing initiative."},
{q:"Which of the following demonstrates a good security practice?",opts:["Noelle chats with customers while ringing up sales.","Tom checks the amount and date on all personal checks.","Kelsey keeps her purse on a shelf underneath the register.","Jane leaves with the bank deposit at the same time each day."],ans:1,exp:"Checking the amount and date on checks, verifying the signature matches ID, and recording ID information reduces the risk of identity theft and fraud."},
{q:"Which of the following demonstrates the correct method to ensure that all words in a phrase are included in a web search?",opts:['(Discipline is the most important part of success)','[There is no tree that the wind has not shaken]',"'To be or not to be'",'"Confidence in itself is the secret of success"'],ans:3,exp:"Enclosing a phrase in double quotation marks ensures all words are included in a web search. Search engines do not generally recognize single quotation marks, brackets, or parentheses for this purpose."},
{q:"Which of the following describes the matrix organizational structure?",opts:["It is a combination of two other organizational structures.","It includes only traditional departments such as sales and marketing.","It is separated by product lines.","It is the oldest organizational structure being used."],ans:0,exp:"The matrix organizational structure is a combination of the functional structure and the divisional structure—a newer organizational design."},
{q:"Which of the following elements of a business is NOT structured by organizational design?",opts:["Competitors","People","Information","Technology"],ans:0,exp:"Organizational design structures a business's people, information, and technology to enable the business to achieve its goals. A business cannot structure its competitors."},
{q:"Which of the following equations should employees know when verifying the accuracy of a business's balance sheet?",opts:["Assets = Liabilities + Owner's Equity","Owner's Equity = Available Cash - Liabilities","Assets = Owner's Equity - Liabilities","Owner's Equity = Liabilities + Available Cash"],ans:0,exp:"The balance sheet equation is Assets = Liabilities + Owner's Equity. If assets don't equal liabilities plus owner's equity, the balance sheet contains an error."},
{q:"Which of the following establishes the guidelines for the way that a publicly owned company reports its financial position?",opts:["The federal government","The board of directors","The accounting department","The stockholders"],ans:0,exp:"Governments require businesses to provide certain types of financial information to regulatory agencies and shareholders. Public corporations must provide verified financial information to shareholders and investors."},
{q:"Which of the following ethical issues is most likely to cause hazard risks?",opts:["Misuse of resources","Lack of transparency","Unsafe working conditions","Conflicts of interest"],ans:2,exp:"Hazard risks cause injury or harm to people, property, or environment — most likely resulting from unsafe working conditions. Transparency and conflict of interest issues cause other types of risk."},
{q:"Which of the following examples best illustrates the relationship between governance and management?",opts:["Sapphire Axis, Inc. keeps its top executives and governance strictly separate.","Jenna, a manager, provides the board of directors with a framework for determining goals.","A company's governance processes aim to place strict limits on managers.","Wesley bases his management decisions on the strategies outlined by governance processes."],ans:3,exp:"Governance provides a framework for management. Managers like Wesley must work within governance guidelines. The board sets direction; managers don't provide the board's framework."},
{q:"Which of the following factors affecting the business environment is represented by the business's location?",opts:["Cultural","Environmental","Economic","Political"],ans:1,exp:"Access to raw materials, availability of natural resources, amount of pollution, and a business's location are examples of environmental factors affecting the business environment."},
{q:"Which of the following factors affects society's basic values and behaviors that influence buying decisions?",opts:["Environmental","Economic","Cultural","Political"],ans:2,exp:"Cultural factors — values, beliefs, preferences — influence buying decisions. Businesses must understand their customers' culture to avoid offending and to meet needs effectively."},
{q:"Which of the following factors can lead an investor to develop a home bias?",opts:["Fewer barriers to entry in foreign markets","Higher risk associated with international investing","Less availability of domestic investments","Better familiarity with foreign markets"],ans:1,exp:"Home bias is a preference for domestic investments. Higher risk in international investing—and unfamiliarity with foreign markets—leads investors to prefer domestic options."},
{q:"Which of the following factors has increased financial globalization and made it easier to communicate across country borders?",opts:["Deregulation","Technology","Exchange rates","Competition"],ans:1,exp:"The internet and digital communication tools have made it easier to work across borders, directly increasing financial globalization. Competition is an effect of globalization, not a cause."},
{q:"Which of the following factors may influence supply?",opts:["Standard of living","Natural disasters","Product utility","Number of consumers"],ans:1,exp:"Natural disasters like frosts, floods, and hail can impact supply by affecting production. Standard of living, product utility, and number of consumers influence demand."},
{q:"Which of the following finance professionals typically oversees a company's cash management, capital raising, and investment activities?",opts:["Underwriter","Risk manager","Cash manager","Treasurer"],ans:3,exp:"A treasurer oversees cash management, capital raising, investment activities, and financial goals/objectives. Cash managers have more limited duties; underwriters work in insurance."},
{q:"Which of the following forms of technology is most useful in operations?",opts:["Smart phones","E-readers","Assistive technology","Computer-aided design"],ans:3,exp:"Computer-aided design allows companies to design, test, and redesign products in the virtual world before trying them in the real world, saving time and money during production."},
{q:"Which of the following groups of people is most likely to be interested in the statement of changes in equity?",opts:["Competitors","Customers","Investors","Employees"],ans:2,exp:"The statement of changes in equity shows how shareholders' ownership has changed over time. Investors hold equity and care deeply about how their accounts change. Customers and competitors do not hold equity."},
{q:"Which of the following has a direct effect on an organization's corporate governance policies?",opts:["Company bylaws","Physical inventory","Marketing strategies","Point-of-sales quotas"],ans:0,exp:"Corporate governance can be greatly impacted by company bylaws because bylaws represent the specific rules and policies that comprise an organization's corporate governance policy."},
{q:"Which of the following has accelerated the globalization of financial markets?",opts:["An expansion of protectionism practices","The movement toward fixed exchange rates","The reduction of government regulations","A decrease in foreign access to domestic markets"],ans:2,exp:"Liberalization and deregulation (reducing government regulations) enable capital to flow more freely."},
{q:"Which of the following has contributed to financial globalization?",opts:["Increased restrictions on foreign investment","Increased taxes on international transactions","Reduced foreigners' access to domestic markets","A movement from fixed to floating exchange rates"],ans:3,exp:"Countries moving from fixed to floating exchange rates enables capital to flow more freely across national borders, contributing to financial globalization."},
{q:"Which of the following has proven to be an effective way to initiate a professional relationship with a vendor?",opts:["Having salespeople talk to the vendor","Offering jobs to people on the vendor's staff","Giving the vendor an expensive gift","Treating the person to a round of golf"],ans:3,exp:"Golf provides hours of opportunity to get to know a vendor in a casual environment and discuss business. An expensive gift might be construed as a bribe."},
{q:"Which of the following has the fiduciary responsibility to make decisions on behalf of a company's shareholders?",opts:["The municipal court system","The industry's professional organization","The company's line staff","The corporation's board of directors"],ans:3,exp:"The board of directors is appointed/elected to make decisions on behalf of shareholders — the company's owners. Courts, professional organizations, and line staff do not have this responsibility."},
{q:"Which of the following helps businesses predict risk for a given strategy or initiative?",opts:["Risk checklist","Retroactive risk","Risk tolerance","Risk model"],ans:3,exp:"A risk model helps businesses predict risk for a given strategy or initiative by inputting data or goals to get a prediction that informs decision-making."},
{q:"Which of the following increases your personal net worth?",opts:["Owning a home","Renting an apartment","Using a credit card","Leasing a car"],ans:0,exp:"Net worth is everything you own minus everything you owe. Owning a home is an asset. Renting, credit cards, and leasing a car don't increase net worth."},
{q:"Which of the following indirect manufacturing costs is a company most likely to include in the cost allocation of its individual products?",opts:["Heat and lighting costs","Cost of labor","Raw product materials","Administrative salaries"],ans:0,exp:"Heat and lighting are indirect manufacturing costs allocated to products to determine accurate product costs. Labor and raw materials are direct costs; administrative expenses apply regardless of production."},
{q:"Which of the following individuals is an internal user of a business's financial data?", opts:["Tax collector","Investor","Creditor","Manager"], ans:3, exp:"Managers are internal users who use financial data in custom reports to control day-to-day operations and make financial decisions. Investors, creditors, and government tax collectors are external users because they don't work for the company."},
{q:"Which of the following individuals is an internal user of a business's financial data?",opts:["Creditor","Investor","Manager","Tax collector"],ans:2,exp:"Managers are internal users who use financial data to control day-to-day operations and make financial decisions. Investors, creditors, and tax collectors are external users."},
{q:"Which of the following involves issues that require deciding whether something is right or wrong?",opts:["Settling a make-or-break decision","Starting the college decision process","Debating multiple job offers","Solving an ethical dilemma"],ans:3,exp:"Solving an ethical dilemma involves deciding whether something is right or wrong. Ethical dilemmas have the potential to cause harm."},
{q:"Which of the following involves obtaining and evaluating data for the purpose of helping businesses make long-term decisions?",opts:["Applied research","Communications networks","Information management","Organizational development"],ans:2,exp:"Information management is the process of accessing, processing, maintaining, evaluating, and disseminating knowledge and data to assist business planning and decision-making."},
{q:"Which of the following is a benefit of being exposed to conflicting viewpoints?",opts:["Improved communication skills","Decreased responsibility at work","Increased popularity in social circles","Ability to win arguments easily"],ans:0,exp:"Respecting and appreciating different viewpoints enables constructive dialogue with people of all backgrounds, improving communication skills."},
{q:"Which of the following is a benefit of compliance in the finance industry?",opts:["It builds and maintains public trust in the financial system","It eliminates all risks an organization may face","It makes it easier to manipulate the market or market prices","It leads to decreased regulatory scrutiny and regulation"],ans:0,exp:"Financial compliance builds and maintains the public's trust in the financial system while managing risk and reducing financial crime."},
{q:"Which of the following is a benefit of corporate governance?",opts:["It encourages transparency.","It decreases investor confidence.","It creates a less definable brand.","It maximizes corruption."],ans:0,exp:"Corporate governance creates a more transparent business environment, which can increase investor confidence, create a defined brand, and minimize corruption."},
{q:"Which of the following is a benefit of implementing enterprise risk management (ERM)?",opts:["Improved sales in previously sluggish categories","Fewer expenses related to public relations","Increased performance variability","Increased confidence from company stakeholders"],ans:3,exp:"ERM signals to shareholders and stakeholders that risk is being managed seriously, increasing their confidence. ERM ideally reduces (not increases) performance variability."},
{q:"Which of the following is a benefit of putting your goals in writing?",opts:["Clarifies the goals","Develops your perseverance","Makes the goals attainable","Provides a challenge"],ans:0,exp:"Writing out goals helps clarify them, makes them real, and serves as a reminder. Perseverance must be developed on your own."},
{q:"Which of the following is a benefit of using artificial intelligence in compliance?",opts:["Reduces human error","Increases costs","Reduces efficiency","Increases false positives"],ans:0,exp:"AI helps increase efficiency and effectiveness of compliance, lowers chances of human error, and decreases false positives—though initial adoption can be costly."},
{q:"Which of the following is a benefit to you as an individual of setting high personal standards for honesty and fairness?",opts:["You will not need to be bonded by your employer.","The business will have a good image.","The number of mistakes you make will decrease.","You will have increased self-respect."],ans:3,exp:"Knowing that you always try to be honest and fair bolsters your self-respect. When you respect yourself, it is easier to respect others as well. Improved image is a benefit to the business, not the individual."},
{q:"Which of the following is a business alliance organization that operates on a local level?",opts:["Seattle Metropolitan Chamber of Commerce","International Federation of Social Workers","Small Business Administration","National Restaurant Association"],ans:0,exp:"The Seattle Metropolitan Chamber of Commerce operates at a local level, uniting businesses and individuals to influence policy and solve local problems."},
{q:"Which of the following is a business risk that can be covered by purchasing insurance?",opts:["Competition","Spoilage","Robbery","Economic conditions"],ans:2,exp:"Robbery and theft insurance covers specific risks like equipment theft or holdups. Competition, spoilage, and economic conditions are risks that typically cannot be covered by insurance."},
{q:"Which of the following is a business trend that affects all countries?",opts:["Decreased inflation","Socialism","Increased regulation","Globalization"],ans:3,exp:"Globalization is the rapid and unimpeded flow of capital, labor, and ideas across national borders. It is a trend affecting all countries, driven by technological advancements and trade agreements."},
{q:"Which of the following is a challenge of implementing enterprise risk management (ERM)?",opts:["Employees in different departments have different understandings of risk","Enterprise risk management does not proactively address risks","Patents, copyrights, and trademarks are not included in the ERM framework","Enterprise risk management deals primarily with relationships among employees"],ans:0,exp:"People in various departments have different definitions and understandings of risk. Employees need to be on the same page for ERM to be successful."},
{q:"Which of the following is a characteristic of a call market?",opts:["Buyers and sellers determine prices.","Buy orders are made at specific times.","Trades occur continuously.","Prices change from moment to moment."],ans:1,exp:"In call markets, transactions occur at specific designated times. Analysts determine optimal prices, and all transactions occur simultaneously. Continuous trading characterizes auction markets."},
{q:"Which of the following is a characteristic of a call market?",opts:["Buyers and sellers determine prices","Trades occur continuously","Buy orders are made at specific times","Prices change from moment to moment"],ans:2,exp:"On call markets, transactions take place at specific times. All orders are collected, a price is set that satisfies most orders, then all transactions occur simultaneously."},
{q:"Which of the following is a characteristic of a legally binding contract?",opts:["Something of value must be exchanged","One of the parties must be in agreement","The contract must be written and signed","The contract must include an expiration date"],ans:0,exp:"A legally binding contract requires something of value to be exchanged and both parties must agree. It doesn't need to be written, signed, or have an expiration date."},
{q:"Which of the following is a characteristic of a legally binding contract?",opts:["The contract must be written and signed.","One of the parties must be in agreement.","The contract must include an expiration date.","Something of value must be exchanged."],ans:3,exp:"A legally binding contract requires that something of value be exchanged AND both parties be in agreement. It does not need to be written, signed, or include an expiration date."},
{q:"Which of the following is a characteristic of effective verbal communication?",opts:["Precise speech","Good use of slang","Lack of clarity","Lack of tact"],ans:0,exp:"Precise speech—choosing the most accurate words—creates clarity so the listener receives the intended message. Effective communication should also be tactful and avoid slang."},
{q:"Which of the following is a characteristic of the illegal practice of affinity fraud?",opts:["Primarily involves buying and selling commodities","Targets identifiable groups of people","Fails to offer testimonials during sales pitches","Pays a minimal dividend to encourage additional investment"],ans:1,exp:"Affinity fraud targets members of the same group (church, civic organization, etc.), with the scammer claiming an association with the group to gain trust."},
{q:"Which of the following is a common challenge for financial-information management?",opts:["Financial managers typically use Microsoft Office for recordkeeping","Many financial data are stored in custom software and are not easily accessible","Financial-information management focuses on protecting customer financial data","Managerial accountants prepare information for use by external stakeholders"],ans:1,exp:"Many companies house financial data in custom task-specific software, making it difficult for others without that software to access it."},
{q:"Which of the following is a common challenge for financial-information management?",opts:["Managerial accountants prepare info for external stakeholders","Many financial data are stored in custom, task-specific software and are not easily accessible","Financial-information management focuses on protecting customer data","Financial managers typically use Microsoft Office for recordkeeping"],ans:1,exp:"Many companies house financial data in custom, task-specific software, making it difficult for others to access without that specialized software."},
{q:"Which of the following is a common challenge for project managers?",opts:["Laws and regulations","Poorly defined goals","A surplus of resources","A lack of risk"],ans:1,exp:"Poorly defined project goals are one of the many challenges that project managers routinely face. A surplus of resources would be good; laws and regulations typically don't pose a challenge."},
{q:"Which of the following is a common financial-information management problem?",opts:["Insufficient financial information due to compliance regulations","Overreliance on a master source for financial data","Strict organizational data governance policies","Multiple financial data sources and systems within an organization"],ans:3,exp:"Multiple incompatible financial data sources and systems make it difficult for managers to get a single view of company financials."},
