{q:"How can the owner of the Rainy Day Cafe figure out how much money they will make by adding a new salad to the menu?",opts:["Eliminate indirect costs","Determine labor costs","Discover sunk costs","Perform marginal analysis"],ans:3,exp:"Marginal analysis helps businesses understand the additional benefits compared to the costs of an activity. Adding a salad has revenue and cost implications—marginal analysis evaluates both."},
{q:"How can the stock market affect the economy?",opts:["Rising stock markets cause consumer prices to decrease.","The stock market performs better during long-term stagnation.","Interest rates are lower when the economy is in recession.","Declines in stock markets decrease consumer confidence."],ans:3,exp:"When stock prices fall, businesses and consumers lose confidence and are less likely to spend, negatively affecting the economy."},
{q:"How can you easily and automatically track your bank account withdrawals and deposits?",opts:["Organize your financial paperwork","Save your receipts and compare them to your bank statement","Use a mobile banking or budgeting app","Make a list of all of your bills and when they are due"],ans:2,exp:"Mobile banking and budgeting apps automatically track all financial transactions by connecting to your bank accounts."},
{q:"How can you make it easier to start the budgeting process by arranging and making sense of financial data?",opts:["Use budgeting software","Track transactions on paper","Refrain from involving others","Focus on the big picture"],ans:0,exp:"Budgeting software organizes all data in one place and makes it easier to track expenses."},
{q:"How can you show that you're actively listening in a negotiation?", opts:["Respond emotionally to what the other person says","Think about what you'll say next while the other person is speaking","Repeat or summarize the other person's statements","Keep a positive, open, and objective attitude"], ans:2, exp:"Repeating or summarizing the other person's statements demonstrates active listening and prevents missing important points. Thinking about your response while they're speaking makes it impossible to listen. Responding emotionally could derail the discussion. Maintaining a positive attitude is important but separate from active listening."},
{q:"How can you tell if a stock is trending upward?",opts:["Examine the best bid/ask.","Compare the previous close with the opening price.","Look at the share volume.","Compare earnings per share with P/E ratio."],ans:1,exp:"Comparing the previous closing price with the current opening price shows direction of movement — trending up or down. Bid/ask and volume alone don't indicate trend direction."},
{q:"How do employees benefit from being involved in achieving governance objectives?",opts:["Increased job satisfaction","Reduced communication","Limited union support","Greater profits"],ans:0,exp:"Involving employees in achieving governance objectives leads to increased job satisfaction and a positive attitude. Greater profits benefit the company, not individual employees."},
{q:"How do employees benefit from being involved in achieving governance objectives?",opts:["Limited union support","Reduced communication","Greater profits","Increased job satisfaction"],ans:3,exp:"Involving employees in governance objectives leads to increased job satisfaction and a positive attitude. Greater profits benefit the company; greater communication (not less) typically results."},
{q:"How do ethics relate to risk management?",opts:["Risk management is insurance for lapses in business ethics.","Risk management is all about the ethical treatment of customers.","The best form of risk management is adherence to business ethics.","The best form of business ethics is risk management."],ans:2,exp:"Every breach of business ethics represents a potential risk for businesses. The best thing businesses can do to overcome most risks is to practice business ethics—doing the right thing."},
{q:"How do finance companies commonly raise capital?",opts:["Issuing notes, bonds, and other obligations","Investing funds from premium payments","Investing deposits from savers","Establishing mutual funds and investment banks"],ans:0,exp:"Finance companies raise capital by issuing notes, bonds, and other obligations, then use this capital to provide loans to businesses and consumers. Insurance companies invest premium funds; deposit-taking institutions accept savers' deposits."},
{q:"How do many professionals reduce their risks associated with client or patient lawsuits?",opts:["Develop noncompete contracts","Sign vendor contracts","Obtain professional liability insurance","Purchase disability insurance"],ans:2,exp:"Professional liability insurance protects doctors, lawyers, accountants, and others from financial loss if a client sues them. Disability insurance covers inability to work."},
{q:"How does a company's size typically influence its corporate governance structure?",opts:["A company's size has no impact on its corporate governance structure","Smaller companies tend to have more influential boards of directors","Larger companies often have more complex governance structures","Smaller companies usually have more formalized procedures"],ans:2,exp:"Large companies generally require more complex governance structures due to their size, operational capacity, and diverse stakeholders."},
{q:"How does a student with initiative handle a situation that increases their workload?",opts:["Asks their teacher how to handle it","Waits until their teacher notices","Asks other students to assist them","Finds ways to adjust to the situation"],ans:3,exp:"People with initiative are flexible and adjust to changes. Waiting or asking others to handle it does not demonstrate initiative."},
{q:"How does analysis of standard costs differ from analysis of a budget?",opts:["A budget analysis shows forecasted amounts, while standard cost analysis shows actual costs.","A budget analysis provides an overview, while standard cost analysis shows the details of variances.","A budget analysis deals with quality and quantity, while standard cost analysis deals only with quantity.","A budget analysis is conducted by all staff, while standard cost analysis is conducted by a departmental manager."],ans:1,exp:"Budget analysis shows overall variances, but standard cost analysis reveals the causes (details)—whether too much was paid for materials, too much time was spent on labor, etc."},
{q:"How does forming a captive insurance company typically impact a corporation's federal tax liability?", opts:["Eliminates the corporation's state tax liabilities","Increases tax due on the captive's loss reserves","Increases the corporation's sales tax liabilities","Reduces tax due on the captive's premiums"], ans:3, exp:"Forming a captive insurance company can reduce, eliminate, or defer federal taxes on the corporation's insurance premiums. A captive typically DECREASES (not increases) tax due on loss reserves. It doesn't eliminate state tax liabilities or increase sales tax liabilities."},
{q:"How does self-control help you to think clearly?",opts:["By helping you to deal with criticism","By helping you to be defensive","By helping you to be objective","By helping you to deal with coworkers"],ans:2,exp:"Self-control helps you keep your emotions under control, enabling you to be open-minded and objective. This leads to clearer thinking."},
{q:"How is financial information related to an organization's success?",opts:["Financial information is essential for an organization to continue operating.","Financial information gets in the way of an organization's progress.","Successful organizations usually do not need financial information.","The importance of financial information depends on the size of the organization."],ans:0,exp:"Financial information is essential for all organizations to operate — without profit, budget adherence, and accurate financial statements, an organization cannot continue functioning."},
{q:"How long are businesses required to keep their records?",opts:["On a seasonal basis","Varies greatly","Indefinitely","One year"],ans:1,exp:"The length of time that businesses must keep records varies greatly. Some records must be kept indefinitely; others may be kept on a seasonal basis or for only one year. The law often determines how long."},
{q:"How much will $5,000 be worth in five years if invested at an 8% compound interest rate?",opts:["$5,400","$5,045","$7,347","$8,000"],ans:2,exp:"Future Value = $5,000 × (1.08)^5 = $5,000 × 1.46933 ≈ $7,347. Add 1 to the rate, raise to power of years, multiply by principal."},
{q:"How much will $5,000 be worth in five years if invested at an 8% compound interest rate?",opts:["$7,347","$5,400","$5,045","$8,000"],ans:0,exp:"FV = $5,000 × (1.08)⁵ = $5,000 × 1.46933 = $7,346.65 ≈ $7,347"},
{q:"Human resources management has been influenced by modern employees' emphasis on:",opts:["Unionization","Work-life balance","Maximizing wealth at any cost","Friendships"],ans:1,exp:"Modern employees emphasize work-life balance, influencing HR managers to offer flexible work arrangements like remote work."},
{q:"Ian allocates the majority of his investment portfolio to United States-based stocks and bonds. This is an example of",opts:["Gross domestic product","Protectionism","Home bias","Offshoring"],ans:2,exp:"Home bias refers to an investor's preference to invest primarily in domestic equities instead of foreign equities."},
{q:"Identify the type of appeal used in: 'This new book is written by Dr. Juliet Browne, who holds a doctorate from Harvard and is Chair of the World Health Organization.'",opts:["Emotions","Reason","Credibility","Shock value"],ans:2,exp:"Credibility is achieved when the audience has confidence in the persuader. Dr. Browne's title and degree make her a credible source."},
{q:"If a business is looking to allocate costs, what is the first step it should take?",opts:["Lay off underperforming employees","Accumulate costs into a cost pool","Identify cost objects","Assign costs to cost objects"],ans:2,exp:"If a business is looking to allocate costs, the first step it should take is to identify cost objects. Cost objects are important because decisions are made with them in mind."},
{q:"If a company does not take the time to manage risks, it is:",opts:["seeking a larger return on investment.","treating customers fairly.","enhancing possibilities for gain.","not being ethical."],ans:3,exp:"Failing to practice risk management is unethical because the company is not preparing for potential loss or treating its stakeholders fairly by protecting their interests."},
{q:"If a company is looking to consolidate, it will __________ its assets.",opts:["Combine","Destroy","Increase","Sell"],ans:0,exp:"Consolidation refers to combining assets, liabilities, and other financial items of two or more entities into one."},
{q:"If a company is managing its information effectively, the data should be accurate and: [14E]",opts:["encrypted.","relevant.","anonymous.","positive."],ans:1,exp:"To make appropriate decisions, companies need accurate and relevant information. Relevant information is applicable to the decision at hand—not all information needs to be encrypted."},
{q:"If a company is managing its information effectively, the data should be accurate and:",opts:["relevant.","encrypted.","anonymous.","positive."],ans:0,exp:"To make appropriate decisions, companies need accurate and relevant information. Irrelevant information—even if accurate—won't lead to good decisions."},
{q:"If a company pays more in dividends than it receives in net income, the statement of changes in equity will show that retained earnings will be:",opts:["the same as the previous period.","zero.","lower than the previous period.","higher than the previous period."],ans:2,exp:"Formula: Beginning retained earnings + Net income − Dividends = Retained earnings. If dividends exceed net income, retained earnings fall below the prior period."},
{q:"If a company requests that managers monitor and verify the accuracy of their departments' income and expenses as reported by the accountant each month, it is creating a corporate governance structure that uses:",opts:["external control mechanism.","unethical method of monitoring.","internal independent audit.","external independent audit."],ans:2,exp:"When a company uses employees or managers to verify accounting, it is using an internal independent audit. External controls come from governments, unions, or financial institutions."},
{q:"If a company spends all of its financial resources to discover a new way to purify water, it could be classified as a __________ organization.",opts:["Zero-risk","Risk-tolerant","Risk-seeking","Risk-adverse"],ans:2,exp:"A risk-seeking organization hopes to gain from a risky endeavor. Risk-adverse and risk-tolerant organizations don't seek new risks; zero-risk eliminates all possible risks."},
{q:"If a company wants to list securities on the New York Stock Exchange, it must select a __________ ticker symbol.",opts:["4-letter","Double digit","Unique","Color"],ans:2,exp:"Ticker symbols are unique series of characters assigned to a security—no two are the same. The NYSE uses alphabetical symbols up to three letters."},
{q:"If a company's decision makers all require different information about sales transactions, the company relies on __________ accounting.",opts:["Cost","Financial","Quality management","Managerial"],ans:3,exp:"Managerial accounting reports financial and nonfinancial information tailored to different decision makers within the company."},
{q:"If a decision maker chooses a software package with a lower initial purchase price, what type of cost has s/he considered?",opts:["Sunk cost","Indirect cost","Direct cost","Opportunity cost"],ans:2,exp:"The initial purchase price is a direct cost—directly associated with the cost object (the software package)."},
{q:"If a decision maker chooses a software package with a lower initial purchase price, what type of cost have they considered?",opts:["Opportunity cost","Indirect cost","Sunk cost","Direct cost"],ans:3,exp:"The purchase price of a software package is a direct cost — directly associated with the cost object (the software). Indirect costs are not directly traceable to a cost object."},
{q:"If a drama club member adopts other members' negative attitude even though she doesn't approve, she is demonstrating:",opts:["Acceptance","Emotional intelligence","Status quo bias","Groupthink"],ans:3,exp:"Groupthink is adopting a group's attitude without personally agreeing. Acceptance is consciously agreeing. Status quo bias is preferring the current state."},
{q:"If a financial planner fails to stay informed about new laws impacting the financial products they sell, which ethical principle are they failing to observe?",opts:["Objectivity","Confidentiality","Honesty","Competence"],ans:3,exp:"Competence means maintaining the knowledge necessary to provide accurate information. Failing to stay current makes the planner incompetent. Honesty and objectivity relate to truthfulness and bias."},
{q:"If a leader takes ownership of a problem, ensures it is fixed, and prevents it from happening again, they are demonstrating:",opts:["Flexibility","Responsibility","Social awareness","Adaptability"],ans:1,exp:"Responsibility means fulfilling obligations in a dependable, reliable manner—taking ownership of problems, fixing them, and preventing recurrence."},
{q:"If a question on a job application does not apply to you, how should you respond?",opts:["Leave it blank","Make up a response","Write 'does not apply'","Write 'cannot answer'"],ans:2,exp:"Writing 'does not apply' shows you read and completed the application. Leaving it blank may suggest you forgot; 'cannot answer' implies hiding something."},
{q:"If a small-business owner wants to identify the customers who owe money, what type of report should s/he review?", opts:["Accounts-payable","Aging-accounts","Asset-depreciation","Asset-allocation"], ans:1, exp:"Aging-accounts (accounts receivable) reports identify delinquent customers and monitor overdue payments, helping maintain cash flow. Accounts-payable reports identify vendors the business owes money to. Asset-depreciation reports track decreased asset values. Asset-allocation refers to an investment portfolio's variety."},
{q:"If a stock is trading higher than the previous day's close, what color will it likely be on a stock ticker shown on TV?",opts:["White","Red","Green","Blue"],ans:2,exp:"On many stock tickers shown on TV networks, green indicates that the stock is trading higher than the previous day's close. Red means trading lower. White or blue means unchanged."},
{q:"If a trend indicates that a business is making more money, the business is most likely to have identified the trend by comparing its __________ from previous time periods.",opts:["advertising budgets","profitability ratios","interest rates","payroll records"],ans:1,exp:"Profitability ratios measure the business's ability to generate profit. Comparing profitability ratios from consecutive periods (e.g., quarterly) can show whether the business is generating more money."},
{q:"If all individuals who own a business share unlimited liability for the business's losses, these individuals are part of a(n):",opts:["private corporation.","'C' corporation.","'S' corporation.","general partnership."],ans:3,exp:"In a general partnership, all partners are personally liable for the business's debts. Corporate structures (C, S, private) provide limited liability."},
{q:"If an accounting firm deliberately conceals information about a client's financial status, the government may charge the business with:",opts:["expropriation.","obstruction of justice.","breach of contract.","substantiation."],ans:1,exp:"Obstruction of justice applies to individuals or businesses that hide important information from law enforcement agencies. Concealing questionable financial data could result in fines or imprisonment."},
{q:"If an accounting firm deliberately conceals information about a client's financial status, the government may charge the business with:",opts:["Substantiation","Expropriation","Breach of contract","Obstruction of justice"],ans:3,exp:"Obstruction of justice applies to individuals or businesses that hide important information from law enforcement. Concealing financial data from investigators fits this charge."},
{q:"If Country A places tariffs on products imported from Country B, this policy will most benefit",opts:["Domestic companies in Country A","International companies that operate in both countries","International companies that do not operate in either country","Domestic companies in Country B"],ans:0,exp:"Tariffs are government taxes on imported goods that help protect domestic companies from the competition of foreign products."},
{q:"If Dakota wants to find the cheapest price at which a stock was traded over the last year, what part of the stock table should he review?",opts:["Price-earnings ratio","52-week low","52-week high","Dividend yield"],ans:1,exp:"The 52-week low is the lowest price at which a stock has traded over the previous 52 weeks."},
{q:"If Danita invests $6,000 at a simple annual interest rate of 5%, the future value of her investment at the end of a 5-year period will be:",opts:["$1,200.","$1,650.","$1,500.","$4,500."],ans:2,exp:"Simple interest: $6,000 × 0.05 = $300/year × 5 years = $1,500 in interest earned over 5 years."},
{q:"If data are considered nonconforming, it most likely means that their values",opts:["Are missing","Are complete","Remain consistent with other values","Do not require further analysis"],ans:0,exp:"Nonconforming data refers to data with values that are either missing, incomplete, or not consistent with other values in the same or comparable reports."},
{q:"If each citizen in the United States increased the amount spent on U.S. consumer goods, the gross domestic product (GDP) would probably:",opts:["increase.","decrease.","stay the same.","not be affected."],ans:0,exp:"Personal consumption expenditures are a GDP component representing all consumer goods sold. An increase in consumer goods sales will increase GDP unless there is a drop in other components."},
{q:"If Fernando wants to compare the current closing price of a stock to yesterday's closing price, what column in a stock table should he review?",opts:["Dividend yield","52-week high/low","Price-earnings ratio","Net change"],ans:3,exp:"Net change shows the difference between today's closing price and the previous day's price."},
{q:"If Fiona has a fatal accident or terminal disease, she wants to make sure her children's financial needs are met until they finish college. What type of insurance should Fiona purchase?",opts:["Worker's compensation","Life","Liability","Property"],ans:1,exp:"Life insurance protects others from financial losses related to the insured's death. Death benefits cover beneficiaries' living expenses, education, etc."},
{q:"If Hannah wants to invest in the capital markets, what types of securities should she purchase?",opts:["Corporate bonds and treasury bills","Common stock and certificates of deposit","Treasury bills and certificates of deposit","Corporate bonds and preferred stock"],ans:3,exp:"Capital markets buy and sell long-term securities: corporate bonds, common/preferred stock, and treasury bonds. Treasury bills and CDs are money market securities (short-term)."},
{q:"If Kayla wants to obtain the most current pricing for various stocks, she should:",opts:["review a business's annual report.","pick up a business-oriented newspaper.","visit the 'About Us' section of a business's website.","access a financial website."],ans:3,exp:"Stock prices fluctuate constantly. Financial websites like Bloomberg provide the most current pricing. Newspapers may be outdated; annual reports and 'About Us' sections do not show current prices."},
{q:"If Leandro wants to see how his company's net worth changed over the last two months, what document should he reference?",opts:["Cash flow statement","Income statement","Equity statement","Balance sheet"],ans:2,exp:"An equity statement reports the changes in a company's equity (net worth) over a specific period of time."},
{q:"If Saeed is concerned that a data breach altered the completeness of his information, he is concerned about the __________ of the data.",opts:["Availability","Confidentiality","Integrity","Privacy"],ans:2,exp:"Data integrity involves the wholeness or completeness of data. A breach of integrity is often called data corruption."},
{q:"If the dividend per share on a securities table is blank, it indicates that the company's stock:",opts:["Had zero trades in the last 24 hours","Has a negative dividend yield","Has a net change value of zero","Does not currently pay dividends"],ans:3,exp:"A blank dividend per share column indicates the company does not currently pay out dividends to shareholders."},
{q:"If the economy is sluggish, what might a central bank do to encourage spending and investing?",opts:["Lower interest rates","Double interest rates","Eliminate interest rates","Disregard interest rates"],ans:0,exp:"A central bank may lower interest rates during a sluggish economy to encourage spending and investing. Doubling, eliminating, or disregarding interest rates are not appropriate responses."},
{q:"If there is an accident in the workplace, in what time frame should a manager complete an initial incident report?",opts:["3 weeks","24 hours","10 days","1 week"],ans:1,exp:"An initial incident report should be completed and sent within 24 hours. A follow-up report should start within 48 hours and be completed within 30 days."},
{q:"If three employees have the same level of ability and competence, what factor might a business use to decide which one to promote?",opts:["Gender","Age","Seniority","Tenure"],ans:2,exp:"When ability and competence are equal, businesses often promote based on seniority—length of employment. Promoting based on gender or age is illegal. Tenure is a teacher-specific status."},
{q:"If you are considering the possible consequences of each decision you could make, you are:",opts:["focusing on creativity.","assessing risk.","practicing mindfulness.","staying calm."],ans:1,exp:"Assessing risk means focusing on possible consequences and outcomes of decisions and actions. This is distinct from creativity, mindfulness, or staying calm."},
{q:"If you are taking out a mortgage loan on a new home, which of the following is most likely to be used as collateral?",opts:["Cash in your savings account","Your car","The new home","Future paychecks"],ans:2,exp:"A mortgage is a secured loan where the collateral is almost always the home itself. If the loan isn't repaid, the lender has the right to foreclose the home."},
{q:"If you are trying to create a personal budget, which financial information is relevant?",opts:["A sample budget found online","A record of your monthly income","Your employer's assets and liabilities","Your best friend's cell phone bill"],ans:1,exp:"A record of your monthly income is necessary to know how much you can afford to spend. Employer assets and others' bills are irrelevant."},
{q:"If you want to exhibit self-confidence in a job interview, you should:",opts:["Dress well in clothing that makes you feel good","Use defensive body language","Not plan for things that could go wrong","See perfection as your only option"],ans:0,exp:"Dressing well in clothing that makes you feel good helps exhibit self-confidence. Confident people use open body language and are prepared for imperfection."},
{q:"If you want to explore a topic in depth through a group discussion, which procedure for obtaining information would you use?",opts:["Survey group","Focus group","Observation","Interview"],ans:1,exp:"A focus group is formed specifically to discuss a topic in depth, providing a range of information in a short time. Surveys, observations, and interviews are individual methods."},
{q:"If you want to find out the greatest price at which a stock was traded over the last year, what part of the stock table would provide this information?",opts:["52-week high","Ask price","Dividend yield","52-week low"],ans:0,exp:"The 52-week high is the highest price at which a stock has traded over the last 52 weeks. The 52-week low is the lowest."},
{q:"If you wanted to pursue a career that specializes in helping corporations and governments issue securities, you would work in:",opts:["a brokerage house.","a stock exchange.","investment banking.","financial planning."],ans:2,exp:"Investment banks trade securities, help businesses and governments issue securities, and handle mergers and acquisitions. Brokerage houses trade securities for clients; stock exchanges are where trading is conducted."},
{q:"If you were using a computer spreadsheet to track your small-business's budget, which of the following should you categorize as investment income?",opts:["Dividends","Credit sales","Cash sales","Interest on debt"],ans:0,exp:"Dividends are income earned on stock investments—investment income. Cash and credit sales are revenue from product sales. Interest on debt is an expense paid by the business."},
{q:"IHF Company doesn't have enough cash for payroll but expects a large customer payment in four weeks. They'll obtain a short-term loan. By analyzing financial data, management was able to identify:", opts:["Ways to reduce the cost of credit","Methods to reduce expenses","Possible investment opportunities","Financial risks and deficiencies"], ans:3, exp:"By analyzing financial data, management determined the company faces a risky situation—insufficient cash to pay employees. This identifies a financial risk/deficiency, prompting them to temporarily borrow capital to cover expenses."},
{q:"Iliana, an accountant, provides information to executives about the costs of implementing recyclable packaging. This is an example of how:",opts:["Financial information can assist in sustainability reporting","Financial information should only be shared with top-level executives","Accountants can help organizations use activity-based costing","Sustainability efforts are usually too expensive to implement"],ans:0,exp:"Providing cost information about sustainable practices like recyclable packaging is an example of financial information supporting sustainability reporting."},
{q:"Ilona agreed to take on four new projects on top of her busy schedule. What time-management principle should she follow?",opts:["Learn to be on time","Avoid interruptions and distractions","Don't bite off more than you can chew","Make the most of your downtime"],ans:2,exp:"Ilona should try not to overschedule herself or agree to activities that are too challenging."},
{q:"Improving supply chain efficiency by streamlining delivery routes is an example of a(n) __________ goal.",opts:["Employee development","Operational","Sustainability","Innovation and growth"],ans:1,exp:"Improving supply chain efficiency by streamlining delivery routes is an example of an operational goal, which aims to enhance productivity and improve daily productivity."},
{q:"In 1970, $7,000/year was comfortable. Today it's below the poverty line. What accounts for this change?",opts:["Interest rates","Deflation","Compound interest","Inflation"],ans:3,exp:"Inflation is the steady increase in the price of goods and services over time, reducing purchasing power."},
{q:"In a company of 100 people, Tess's department has 10 employees and is responsible for 10% of insurance costs. This is an example of:",opts:["Cost estimate","Cost allocation","Cost per contact","Cost-effective pricing"],ans:1,exp:"Cost allocation divides costs between entities—here by headcount. 10% of employees means 10% of insurance costs."},
{q:"In a formal business letter, the salutation is written:",opts:["After the body of the letter","On the front of the envelope","On the back of the envelope","Before the body of the letter"],ans:3,exp:"The salutation is a greeting written immediately before the body of the letter. It is not written on envelopes or after the body."},
{q:"In a market economy, what consumers want and need helps to answer the basic economic question of:",opts:["how products will be produced.","who will do the production.","what products will be produced.","how products will be allocated."],ans:2,exp:"In a market economy, factors that affect the decision about what will be produced include which items are profitable, what consumers want and need, and what resources are available."},
{q:"In a well-governed organization, what typically helps employees understand their roles and encourages positive public impressions?",opts:["Transparency","Efficiency","Anonymity","Flexibility"],ans:0,exp:"Transparency — open and truthful communication about goals, values, and strategies — helps employees understand their roles and builds positive public trust."},
{q:"In a well-governed organization, what typically helps employees understand their roles and encourages positive public impressions?",opts:["Transparency","Efficiency","Flexibility","Anonymity"],ans:0,exp:"Transparency—open and truthful communication about company goals, values, and strategies—helps employees understand their roles and builds public trust."},
{q:"In addition to collecting/maintaining/reporting transaction data, financial-information management is also responsible for analyzing and reporting:", opts:["Recent third-party agreements","Participative decision-making","Dominant buying motives","Market and competitive indicators"], ans:3, exp:"Financial-information management also maintains internal operational data and analyzes/reports external market and competitive indicators. It's not typically responsible for third-party agreements, participative decision-making processes, or buying motives."},
{q:"In addition to ensuring regulatory compliance, what else is a chief compliance officer often responsible for?", opts:["Evaluating the company's channels of distribution","Investigating possible conflicts of interest within the company","Determining the company's point of diminishing returns","Preparing and submitting the company's financial statements"], ans:1, exp:"The CCO develops compliance policies and investigates conflicts of interest that might interfere with regulatory compliance. Distribution channels are a marketing concern. Point of diminishing returns is an operations concern. Financial statements are prepared by the accounting department."},
{q:"In addition to name, address, and phone number, what should Dwight include in his corporate email signature?",opts:["His position, work history, and email address","His work history, company, and email address","His position, company, and email address","His position, company, and references"],ans:2,exp:"A professional email signature should include name, address, phone, position, company, and email address. Work history and references are not appropriate for email signatures."},
{q:"In an association rule: 'If a customer purchases peanut butter, they are 70% likely to also purchase jelly.' The antecedent is __________ and the consequent is __________.",opts:["being a customer at the store; buying jelly","buying jelly; being a customer at the store","buying jelly; buying peanut butter","buying peanut butter; buying jelly"],ans:3,exp:"In an if/then association rule, the 'if' part is the antecedent (buying peanut butter) and the 'then' part is the consequent (buying jelly). The relationship cannot be reversed."},
{q:"In business, economic downturns and technological changes are likely to cause businesses to:",opts:["make changes of their own.","hire unskilled workers.","expand their operations.","resist beneficial changes."],ans:0,exp:"External changes like economic downturns or technological shifts force businesses to make changes of their own — in structure, workloads, or functions. Successful businesses embrace necessary change."},
{q:"In corporate governance, oversight of management, segregation of control, and policy development are all examples of: (1274 version)",opts:["tasks of the board of directors.","internal control mechanisms.","transparency in management.","external control mechanisms."],ans:1,exp:"Internal control mechanisms monitor organizational activities and make corrections. External mechanisms are controlled by outside entities like governments and trade unions."},
{q:"In corporate governance, oversight of management, segregation of control, and policy development are all examples of:",opts:["External control mechanisms","Internal control mechanisms","Tasks of the board of directors","Transparency in management"],ans:1,exp:"Internal control mechanisms monitor organizational progress and make corrections. External controls are set by outside parties like governments."},
{q:"In corporate governance, oversight of management, segregation of control, and policy development are all examples of:",opts:["transparency in management.","external control mechanisms.","internal control mechanisms.","tasks of the board of directors."],ans:2,exp:"Internal control mechanisms monitor and correct organizational activities. External control mechanisms are controlled by outside entities like governments or trade unions."},
{q:"In developed societies, intrinsic motivation is generally more powerful than extrinsic motivation because it:",opts:["Comes from outside of the individual's personal desires","Is independent of factors that are already satisfied","Is tied to external rewards such as money or prizes","Can be easily changed based on the person's environment"],ans:1,exp:"When basic needs are met, intrinsic motivation—rooted in individual ambitions and self-actualization—becomes more powerful than external rewards."},
{q:"In general, a governance, risk, and compliance (GRC) software system identifies and measures risk; monitors the risk-management system; routinely checks adherence to company-wide policies; and ensures compliance with:",opts:["reporting requirements.","union demands.","product standards.","contingency plans."],ans:0,exp:"GRC software ensures compliance with reporting requirements enforced by federal and state government agencies and other regulatory commissions."},
{q:"In general, what is the relationship between finance managers and accountants?",opts:["Finance managers determine what monetary records accountants keep","Accountants approve the decisions that finance managers make about money","Accountants record the information that finance managers need to make decisions","Finance managers rely on accountants to decide on the acquisition of funds"],ans:2,exp:"The accounting function records and generates the information needed to plan and make decisions in the finance function."},
{q:"In most cases, the person who initially listens to customer complaints is the:",opts:["store owner.","sales manager.","buyer.","salesperson."],ans:3,exp:"The salesperson is the point of contact for customers in most situations. If the problem originated on the sales floor, the salesperson would be approached first."},
{q:"In order to benefit from criticism, you must take an objective look at it and decide how much of it is:",opts:["too difficult to worry about.","short term versus long term.","from someone you dislike.","valid and based on fact."],ans:3,exp:"To benefit from criticism, look past who gave it to the validity of the criticism itself. If it is relevant and points out areas needing improvement, work on them. It's possible to receive valid criticism from someone you don't like."},
{q:"In order to manage your time effectively, all of the things that you want to accomplish should first be:",opts:["identified.","classified.","scheduled.","prioritized."],ans:0,exp:"An essential step in effective time management is to identify all of your required activities. These can then be classified, prioritized, scheduled, and finally performed."},
{q:"In planning a staff meeting for her department, Mara should:",opts:["change the meeting date and time.","provide a meeting agenda to review.","forward a copy of the department budget to all participants.","limit the number of times that each participant can speak."],ans:1,exp:"Providing an agenda before the meeting lets employees prepare. Unless financials are the meeting topic, sharing the budget is unnecessary. It's rarely appropriate to limit speaking opportunities."},
{q:"In relation to recording business transactions, a primary difference between the cost and accrual accounting systems is:",opts:["timing.","scope.","frequency.","complexity."],ans:0,exp:"The cash accounting system records transactions when money is received or spent. The accrual accounting system records transactions when they occur, regardless of when money is exchanged. The difference is timing."},
{q:"In relation to the business cycle, the stock prices of non-cyclical industries tend to:",opts:["Remain steady throughout all phases","Steadily decrease during the expansion phase","Increase dramatically during the contraction phase","Increase slightly during the trough phase"],ans:0,exp:"Non-cyclical industries (food, healthcare) have consistent demand throughout the business cycle, so their stock prices tend to remain steady."},
{q:"In the 1970s, OPEC increased oil prices as political protest, pushing up costs of many U.S. goods. This is an example of:",opts:["Cost-push inflation","Demand-pull deflation","Cost-push deflation","Demand-pull inflation"],ans:0,exp:"Cost-push inflation occurs when commodity prices increase, driving up the costs of related goods and services throughout the economy."},
{q:"In the equity market, investors and traders buy and sell",opts:["Loans","Stocks","Bonds","Credit"],ans:1,exp:"The equity market, also known as the stock market, is where investors and traders sell shares of stock."},
{q:"In the lean approach to accounting, inventory is treated as a(n):",opts:["Asset","Liability","Revenue","Equity"],ans:1,exp:"Unlike traditional accounting where inventory is an asset, lean accounting treats inventory as a liability because holding it requires labor, storage, and other expenses."},
{q:"In the private enterprise system, individuals have the freedom to choose",opts:["Their own economic goals","How much they will be paid","Which laws to obey","Which taxes they will pay"],ans:0,exp:"In a private enterprise economy, individuals are free to choose their own personal economic goals. They are not free to choose which taxes to pay or which laws to obey."},
{q:"In their raw state, financial data aren't very helpful. To be useful to businesses, financial data need to be:",opts:["listed in order of size from smallest to largest.","gathered and organized in some way.","inserted into a spreadsheet.","formatted in HTML."],ans:1,exp:"Raw data needs to be gathered and organized meaningfully to be useful. The specific format (spreadsheet, HTML, etc.) matters less than the meaningful organization of the data."},
{q:"In which of the following situations would a business use a spreadsheet software program to estimate the effect of change on its financial situation?",opts:["A salesperson kept all appointments.","Mailing labels are needed for a catalog.","Customers purchased more products.","Sales are expected to increase by 5%."],ans:3,exp:"Spreadsheet programs allow businesses to make various assumptions about sales (e.g., a 5% increase) and quickly calculate the effect on net income using automatic formulas."},
{q:"In which of the following situations would a conversational, informal tone and slang be most appropriate?",opts:["Company-wide email","Report for a CEO","Industry publication","Social media post"],ans:3,exp:"A conversational, informal tone and slang would be most appropriate in a company's social media post."},
{q:"In which of the following types of business ownership does the owner bear the entire risk of loss?",opts:["Sole proprietorship","General partnership","Open corporation","Private enterprise"],ans:0,exp:"In a sole proprietorship, the owner is personally responsible for all debts of the business. Partnerships share risk; corporations spread risk among many investors."},
{q:"In which of the following ways can employees contribute to the achievement of governance objectives?",opts:["Create policies to enforce objectives","Draft bylaws that all must follow","Provide feedback to improve objectives","Report progress to shareholders"],ans:2,exp:"The board of directors should obtain feedback from employees about the company's direction. This helps improve governance objectives and aligns them with the company's vision."},
{q:"In which of the following ways can employees contribute to the achievement of governance objectives?",opts:["Report progress to shareholders","Create policies to enforce objectives","Draft bylaws that all must follow","Provide feedback to improve objectives"],ans:3,exp:"Employees provide feedback to improve governance objectives, aligning them with the company's vision and making employees more likely to work toward them."},
{q:"In which of the following ways can employees contribute to the achievement of governance objectives?",opts:["Report progress to shareholders","Create policies to enforce objectives","Draft bylaws that all must follow","Provide feedback to improve objectives"],ans:3,exp:"Obtaining feedback from employees helps improve governance objectives and align them with the company's vision. Drafting bylaws and creating policies are roles for directors."},
{q:"In which situation is a business most likely to experience a security breach?",opts:["An employee uses a paper shredder to destroy unneeded records","An owner installs electronic locks and security windows","The tech coordinator regularly updates antivirus software","The last employee to leave fails to set the security alarm"],ans:3,exp:"Not setting the security alarm increases theft risk by making it easier for someone to break in. The other options reduce security breach risk."},
{q:"In which stage of project management does risk analysis take place?",opts:["Closing","Execution","Planning","Initiation"],ans:2,exp:"Risk analysis occurs in the planning stage so project managers can prepare to minimize risks. Initiation assesses the idea; execution does the work; closing delivers the final product."},
{q:"In which stage of project management does risk analysis take place?",opts:["Closing","Initiation","Execution","Planning"],ans:3,exp:"Risk analysis takes place in the planning stage so project managers can prepare to minimize its effects. Execution is when the work is done."},
{q:"Incorporating technology into compliance is a way for organizations to:",opts:["Increase staff","Avoid the effects of regulation","Improve customer experience","Reduce costs"],ans:3,exp:"Compliance technology is more efficient, saves time, and can replace expensive labor costs, reducing overall compliance costs."},
{q:"Incorporating technology into compliance is a way for organizations to:",opts:["Reduce costs","Improve customer experience","Increase staff","Avoid the effects of regulation"],ans:0,exp:"Compliance technology allows organizations to reduce costs by being more efficient, saving time, and replacing expensive labor costs."},
{q:"Incorrect information on an individual's credit report may hinder his/her ability to:", opts:["Withdraw money from a savings account","Obtain a bank loan","Pay monthly credit-card balances","Earn interest on stock holdings"], ans:1, exp:"Banks use credit reports to decide whether to provide loans. Inaccurate reports can prevent loan approval. Credit reports don't affect withdrawals from savings accounts, the ability to pay credit-card balances, or interest earned on stocks."},
{q:"Incorrect information on an individual's credit report may hinder his/her ability to:",opts:["withdraw money from a savings account.","obtain a bank loan.","pay monthly credit-card balances.","earn interest on stock holdings."],ans:1,exp:"Banks obtain credit reports to make decisions about providing loans. Inaccurate information can result in an individual being denied a bank loan, making periodic credit report review important."},
{q:"Increased profitability:",opts:["Always comes at a cost to employees","Can only occur when a business minimizes expenses","May only benefit a few of the business's stakeholders","Usually means decreased product quality"],ans:2,exp:"Profits aren't always distributed to everyone in the business. Often only a few people benefit. Increased profitability doesn't require cutting costs or reducing quality."},
{q:"Independent auditors review the accuracy of a public corporation's financial statements to:", opts:["Test accounting methods","Verify compliance","Evaluate risk","Summarize collection techniques"], ans:1, exp:"Independent auditors (who don't work for the company) objectively verify that public corporations' financial reports are accurate and comply with government rules and regulations—validating the integrity of financial information. They don't test accounting methods, evaluate risk, or summarize collection techniques."},
{q:"Inflation is a factor involved in which category of an environmental scan?",opts:["Demographics","Technology","Economy","Competition"],ans:2,exp:"Inflation is an economic factor. The economy greatly affects businesses and their decisions. Inflation is not part of technology, demographics (population characteristics), or competition categories."},
{q:"Information management can be a challenge because the business world is:",opts:["constantly changing.","suffering from a lack of information.","not open to new technology.","completely dependent on paper files."],ans:0,exp:"The constantly changing business world means companies can't assume current information management programs will continue to suffice — they must stay alert and adapt. Businesses often suffer from too much, not too little, information."},
{q:"Information management should ensure that information is:",opts:["Retrievable","Pleasant","Inaccessible","Abundant"],ans:0,exp:"Information management ensures information is retrievable—accessible to those who need it when necessary. Information should only be inaccessible to unauthorized individuals."},
{q:"Ingrid must analyze a completed project by comparing results with objectives. What process will she use?", opts:["Internal audit","Administrative appraisal","Team review","Productivity evaluation"], ans:0, exp:"An internal audit evaluates all aspects of a project—resource utilization, team productivity, process efficiency, and stakeholder satisfaction by comparing objectives with actual results. The findings help develop 'lessons learned' for future similar projects."},
{q:"Insecure people are often afraid to become assertive because they think they will:",opts:["damage their relationships.","have to please others.","be considered childish.","lose their independence."],ans:0,exp:"Insecure people are anxious about interpersonal relationships and fear that being assertive may ruin a friendship or end a relationship."},
{q:"Insufficient corporate governance may lead to",opts:["Increased accountability","Decreased transparency","Decreased corruption","Increased investor confidence"],ans:1,exp:"Corporate governance creates a more transparent business environment. When corporate governance is insufficient, corruption can increase and investor confidence can decrease."},
{q:"Insurance companies are different than banks in that insurance companies",opts:["Are part of a centralized clearing and payment system","Ensure customers pay regular premiums against certain risks","Are subject to federal and state oversight","Accept short-term deposits and make long-term loans"],ans:1,exp:"Insurance companies ensure their customers against certain risks. Customers pay regular premiums. Banks accept deposits, make loans, and are subject to federal and state oversight."},
{q:"Internal audits are used by __________, while external audits are used by __________.",opts:["Management; stakeholders","Stakeholders; employees","Creditors; management","Employees; competitors"],ans:0,exp:"Internal audits are for management to analyze risks. External audits by outside firms are used by stakeholders like investors and creditors."},
{q:"Investment banking, portfolio management, and accounting are all part of which sector of business?",opts:["Finance","Marketing","Entrepreneurship","Management"],ans:0,exp:"Finance includes career pathways in accounting, banking services, corporate finance, insurance, and securities and investments — including investment banking and portfolio management."},
{q:"Investment firms must accurately report their financial position because:",opts:["they are trusted to maintain an accurate accounting of people's revenue and expenses.","others rely on the information when making credit and/or investment decisions.","they maintain both brick-and-mortar and virtual businesses for trading.","people know that investment firms would not take advantage of them."],ans:1,exp:"Others rely on investment firms' financial information when making credit and investment decisions. It's essential that investment firms share their actual financial situation rather than manipulate numbers."},
{q:"Investors and financial analysts are most likely to study a publicly-traded company's financial statements to:", opts:["Measure the firm's competitiveness and performance","Identify new products the firm plans to introduce","Determine the size and makeup of the firm's workforce","Assess the effectiveness of the firm's risk-management system"], ans:0, exp:"Investors and analysts study financial statements to measure competitiveness and performance. If statements underestimate performance, investors may avoid the company; if overstated, they may distrust it. New products, workforce size, and risk-management effectiveness aren't typically found in financial statements."},
{q:"Irene keeps and files every piece of paperwork she receives, and wastes hours searching for specific documents. What should Irene do to make her filing more efficient?",opts:["Hire a new employee to handle her files.","Store all of her documents virtually online.","Create a system and keep only what she needs.","Purge her old documents, throwing everything away."],ans:2,exp:"Creating a system and keeping only necessary documents makes filing efficient and easy to search. Keeping everything makes finding items harder. Discarding everything risks losing important records."},
{q:"Is the following statement true or false: Once a law has been enacted, trade organizations/associations are unable to affect the way that law will be enforced.",opts:["True, members have no way of influencing enforcement of laws.","False, there are exceptions that apply to every law.","False, organizations/associations often can change unfavorable regulations to more favorable ones.","True, laws cannot be changed and must be obeyed."],ans:2,exp:"Organizations/associations frequently can change unfavorable regulations to more favorable ones by serving as liaisons between the industry/profession and the regulatory agency."},
{q:"Isaac has $10,000 to invest and wants to calculate its future value over 1 year. What pieces of information does he need?",opts:["Past value and principal","Income and interest rate","Present value and discount rate","Past value and present value"],ans:2,exp:"Future Value = Present Value × (1 + Discount Rate). Isaac's $10,000 is the present value; the discount rate is the expected interest rate earned."},
{q:"Isaac works for a produce company considering switching pesticides. The current costs $2,000/year and the new one costs $3,200/year. What is the differential cost?",opts:["$2,000","$3,200","$1,200","$5,200"],ans:2,exp:"Differential cost is the difference in cost between two similar options. The difference between the two pesticides is $1,200."},
{q:"Isaac's boss says the first step in handling workplace change is understanding that change is:",opts:["Negative","Unavoidable","Unnecessary","Intimidating"],ans:1,exp:"Understanding that change is unavoidable is the first step to accepting it. Looking at change as negative or intimidating won't help adjustment."},
{q:"It is appropriate for a participant to ask questions during a staff meeting when:",opts:["S/he needs a point clarified","Another participant is speaking","The agenda is being distributed","S/he does not agree with the speaker"],ans:0,exp:"Asking for clarification is appropriate; however, interrupting another speaker or asking when the agenda is distributed is not."},
{q:"It is important for a business to evaluate the financial condition of a potential vendor during the vendor-selection process to assess the:",opts:["risk levels of doing business with the vendor.","reliability of the products that the vendor carries.","vendor's levels of customer service.","vendor's required lead times."],ans:0,exp:"If a vendor is not financially stable, there is a risk it may not have resources to meet the business's needs. Poor financial health may affect the vendor's products, service, and lead times."},
{q:"It is important for companies to practice enterprise risk management (ERM) because:",opts:["most risks are predictable and manageable.","it leads to loss of shareholder value.","most risks are unexpected.","it increases business costs in the long run."],ans:0,exp:"ERM is important because most business risks are predictable and manageable. If a company can plan for risks, it can minimize losses. ERM should reduce costs in the long run."},
{q:"It is important for employees to apply written directions in the order they are presented to:", opts:["Prioritize daily tasks","Correct mistakes","Perform tasks properly","Formulate plans"], ans:2, exp:"If employees don't follow directions in the proper sequence, they may perform tasks incorrectly, requiring costly corrections. Applying directions in order doesn't directly help prioritize daily tasks or formulate plans."},
{q:"It is important that businesses stay on top of their governance reports to ensure compliance because __________ can change frequently.",opts:["Regulations","Personnel","The economy","Technology"],ans:0,exp:"Governance reports document compliance with regulations. When regulations change, businesses must document their response."},
{q:"It is important to be honest about the time commitment when interviewing potential employees for a new business because:",opts:["Being honest should weed out people who aren't dedicated","Entrepreneurs shouldn't hire employees with busy personal lives","Employees who are overburdened are unlikely to stay with the company","Employees are not legally allowed to work more than 40 hours/week"],ans:2,exp:"Employees hired under false impressions about work hours will not stay long and will likely resent management. Honesty provides transparency for all prospective workers."},
{q:"It is important to be honest about the time commitment when interviewing potential employees for a new business because:",opts:["Entrepreneurs shouldn't hire employees with busy personal lives","Being honest should weed out people who aren't dedicated","Employees are not legally allowed to work more than 40 hours per week","Employees who are overburdened are unlikely to stay with the company"],ans:3,exp:"Employees hired under false impressions about hours will not stay and will resent management. Honesty provides transparency for all prospective workers."},
{q:"It is most appropriate for businesspeople to use complex, technical jargon when they are:",opts:["introducing a friend to a business associate.","greeting new customers.","speaking with coworkers.","informally conversing with an acquaintance."],ans:2,exp:"Jargon is specialized language known only to certain groups. Coworkers familiar with industry terms are the appropriate audience for technical jargon. New customers and acquaintances may not understand it."},
{q:"It would be inappropriate to factor a customer's __________ into a financial institution's decision to offer credit.",opts:["Credit rating","Debt ratio","Medical history","Income"],ans:2,exp:"A customer's medical history is not relevant to their creditworthiness and financial institutions risk violating anti-discrimination laws if they factor medical history into their decisions."},
{q:"Items most likely to be subject to an excise tax include:",opts:["Inherited items and luxury cars","Gasoline and cigarettes","Apartment buildings and single-family homes","Milk and cheese"],ans:1,exp:"Excise tax is often called a 'sin tax' and is levied on nonessential products like gasoline, cigarettes, alcohol, and luxury cars."},
{q:"Items that are used to produce goods and services are:",opts:["economic resources.","natural resources.","capital goods.","human resources."],ans:0,exp:"An item becomes an economic resource when it is used to produce a good or service. Economic resources include natural resources, human resources, and capital goods."},
{q:"Jack broke his leg snowboarding and won't work for three months. What type of insurance will help cover his living expenses while recovering?",opts:["Liability","Disability","Term life","Health"],ans:1,exp:"Disability insurance provides a percentage of wages when an employee cannot work due to illness or injury. Health insurance covers medical expenses; liability covers lawsuits; term life pays upon death."},
{q:"Jack is studying the difference between budgeted labor cost and actual labor spending last quarter. What type of analysis is Jack conducting?", opts:["Variance","Break-even","Fundamental","Cash-flow"], ans:0, exp:"Variance analysis determines if businesses spent or received more or less than budgeted—investigating causes and handling discrepancies. Break-even analysis identifies sales needed to cover costs. Fundamental analysis studies a company to understand intrinsic value. Cash-flow analysis predicts whether cash covers expenses."},
{q:"Jack said to his staff: 'I've decided we should proceed. If successful, it benefits the company. If it fails, I'll accept the consequences.' What is Jack doing?",opts:["Indicating he doesn't think he's made a good decision","Accepting responsibility for his decision","Asking his staff to share the blame","Requesting that his staff support his decision"],ans:1,exp:"By accepting the risks associated with his decision, Jack is taking responsibility for the future outcome."},
{q:"Jack says to Wendi, 'If I understand you correctly, you are saying that you want to change the format of the inventory report so it will be easier for the managers to analyze.' What communication technique is Jack using?",opts:["Passive listening","Expressing an opinion","Paraphrasing","Quoting"],ans:2,exp:"Paraphrasing involves restating a message in other words to confirm the recipient's understanding. Quoting uses the speaker's exact words."},
{q:"Jack told his sister that Farkle Corporation is about to declare bankruptcy before the public announcement. If she sells her shares first, Jack and his sister could be prosecuted for:", opts:["Affinity fraud","Accounting fraud","Insider trading","Market capitalization"], ans:2, exp:"Illegal insider trading occurs when a corporate insider shares non-public information with someone who trades on it. Accounting fraud involves incorrect financial statements. Affinity fraud targets specific groups with scams. Market capitalization is the total dollar value of a company's stock."},
{q:"Jackson is sure that no one will notice if he steals merchandise from his employer. He is facing an ethical dilemma because of:",opts:["A bad role model","A lack of consequences","Pressure from others","A desire to prove himself"],ans:1,exp:"The threat of punishment keeps most people honest. If Jackson believes he won't get caught, he may be tempted to steal."},
{q:"Jacob will not sell his oak desk for anything less than $235. This is an example of the ___________ price.",opts:["Equilibrium","Demand","Supply","Market"],ans:2,exp:"The supply price is the minimum price that producers are willing to receive for a product. Jacob won't sell below $235—his supply price."},
{q:"Jacob will not sell the oak desk he made for less than $235. This is an example of the __________ price.", opts:["Demand","Supply","Equilibrium","Market"], ans:1, exp:"The supply price is the minimum price producers are willing to receive. The demand price is the maximum buyers are willing to pay. The equilibrium price occurs when quantity demanded equals quantity supplied. The market price is the actual prevailing price at any given time."},
{q:"Jake is researching career trends in accounting. Which source is most likely to contain the most current, credible information?", opts:["An early edition of the Managerial Accounting in Practice textbook","The federal government's labor and workforce website","An online newspaper article written by a well-known compliance expert","The latest edition of the Insurance News Monthly trade publication"], ans:1, exp:"Federal government labor and workforce websites (like the US Occupational Outlook Handbook) are regularly updated with current career trend information. Early textbook editions are outdated. There's insufficient info to verify the newspaper article's relevance. An insurance trade publication focuses on insurance, not accounting."},
{q:"Jamel ensures that his company's business initiatives and computer/IT processes work smoothly together. What area is Jamel working in?",opts:["Accounting","Business information management","Operations management","Securities and investments"],ans:1,exp:"Business information management professionals provide a bridge between business processes and IT to align business and technology goals."},
{q:"James demonstrates home bias in his investments, which means he:",opts:["Is limited by the markets of foreign countries","Maintains a diversified investment portfolio","Takes advantage of increased financial globalization","Could be heavily affected by a domestic market event"],ans:3,exp:"Home bias means investing primarily in domestic equities. This concentration means a single domestic market event can heavily affect the portfolio."},
{q:"James wants to borrow $2,500 to buy a car. Which financial institution is most likely to lend James the money?",opts:["Financial holding company","Investment bank","Mortgage company","Retail bank"],ans:3,exp:"Retail banks offer services like checking accounts, credit cards, and automobile loans for consumers. Investment banks underwrite securities; mortgage companies only handle real estate."},
{q:"Jamila determined that the marketing department is responsible for the purchase of a new email platform. Jamila is:",opts:["Eliminating sunk costs","Performing marginal analysis","Allocating costs","Performing cost-benefit analysis"],ans:2,exp:"Cost allocation is assigning costs to cost objects such as projects, departments, or regions. Jamila is allocating the email platform cost to marketing."},
{q:"Jan has been helping Sarah with professional advice, feedback, and encouragement. Jan is Sarah's:",opts:["Mentor","Supervisor","Editor","Companion"],ans:0,exp:"A mentor is an experienced worker who acts as a guide to less experienced workers, providing advice, feedback, and encouragement."},
{q:"Jan is sending her résumé to QRS Industries because her friend told her the company plans to hire several new salespeople. This is an example of:",opts:["managing.","networking.","directing.","linking."],ans:1,exp:"Networking involves communicating with people you know who might help with career opportunities. Jan acted on a tip from a friend, connecting with another person to further her career goals."},
{q:"Jane can determine her credit rating by:", opts:["Asking her employer for the information","Adding together her credit-card balances","Obtaining a report from a credit bureau","Applying for an account with a credit union"], ans:2, exp:"Credit reports from authorized credit bureaus contain credit ratings. Individuals validate their credit history before applying for additional credit. An employer might obtain a report but may not have the most current info. Adding balances and applying for credit union accounts don't reveal credit ratings."},
{q:"Jane examined the equity statement for a company in which she invested to see her:",opts:["Par value","Retained earnings","Treasury stock","Dividends"],ans:3,exp:"Dividends are payments made to investors. Retained earnings and treasury stock appear on equity statements but belong to the company, not investors."},
{q:"JavaScript, BETA, AppleScript, and Ubercode are examples of computer:",opts:["service providers.","search engines.","programming languages.","disk drives."],ans:2,exp:"Programming languages are the code that instructs a computer to carry out specific actions. Search engines crawl the Web; service providers provide internet access; disk drives store data."},
{q:"Jean, Keisha, and Kyle want to start a business and are concerned about double taxation on corporate profits. What type of business ownership should they consider?",opts:["Open corporation","Partnership",'"S" corporation',"Close corporation"],ans:2,exp:"An S corporation limits personal liability and avoids double taxation—profits pass directly to stockholders who pay taxes as individuals."},
{q:"Jeff asked: 'Did you say the crime rate decreased by 10% or 15% last year?' What type of question did Jeff ask?", opts:["An open-ended question to obtain the speaker's personal opinion","A relevant question to clarify information the speaker had provided","A follow-up question that had little to do with the topic at hand","A reflective question requiring careful wording"], ans:1, exp:"Jeff asked the speaker to clarify a stated fact about area crime rate—a topic directly relevant to the presentation. It was a close-ended inquiry (10% or 15%), not open-ended or reflective. A follow-up question clarifies a previous question, and there's no indication Jeff had asked one before."},
{q:"Jeremy is basically healthy, but he works with another employee who suffers from various chronic illnesses. Jeremy and his coworker differ in what way?",opts:["Age","Physical condition","Ethnic heritage","Education"],ans:1,exp:"Jeremy and his coworker differ in physical condition (their basic health). They may or may not differ in age, ethnic heritage, or education."},
{q:"Jeremy is basically healthy, but his coworker suffers from various chronic illnesses. They differ in what way?",opts:["Education","Age and gender","Ethnicity","Physical abilities and health"],ans:3,exp:"Jeremy and his coworker differ in physical abilities and health. They may or may not differ in age, gender, ethnicity, or education."},
{q:"Jerry's coworker Greg dented a truck and blamed Jerry. When the supervisor yells at Jerry, what is the most appropriate thing for Jerry to do?",opts:["Accept responsibility.","Maintain self-control.","Blame someone else.","Get even with Greg."],ans:1,exp:"Maintaining self-control allows Jerry to defend himself without losing his temper. He should not accept blame for something he didn't do, and getting even is rarely a good idea."},
{q:"Jill needs to find several records with similar but not identical information in her company database. She should use a(n) __________ query.", opts:["Action","Crosstab","Sum function","Wildcard"], ans:3, exp:"Wildcard queries use symbols (like *) to represent unknown characters—finding all records beginning with 'Jac' for example. Crosstab queries group data into rows/columns. Action queries insert, update, or delete entries."},
{q:"Jillian wants to email her boss about coworker conflicts but is afraid of misinterpretation. Using proper email etiquette, she should:",opts:["be informal and make jokes so she won't appear too negative.","use emoticons in her email so she won't seem like she's complaining.","write a lengthy email to make sure her boss won't misunderstand her.","talk to her boss in person instead of sending an email."],ans:3,exp:"To avoid misinterpretation and prevent coworkers from seeing the email, Jillian should speak in person. Avoid emoticons, informality, and lengthy emails when communicating with supervisors."},
{q:"Joan achieved her goal of becoming a junior partner in five years. This achievement made her feel good, so she set a new goal to be a senior partner in 10 years. Joan has received which benefit of goal setting?",opts:["Helps you to understand yourself","Gives you a way to measure your progress","Helps you to stay on task","Raises your level of self-esteem"],ans:3,exp:"Raising your self-esteem increases self-confidence and encourages you to go on to achieve other goals. Achieving one goal raised Joan's self-esteem so she feels capable of reaching a higher goal."},
{q:"Joan borrowed $10,000 from a relative to start her own business. Assuming she takes all responsibility for the company's financial risks, the company is most likely a:",opts:["sole proprietorship.","limited partnership.","corporation.","partnership."],ans:0,exp:"A sole proprietorship is owned and operated by one individual who takes all financial responsibility. A partnership has two or more owners; a corporation has stockholders."},
{q:"Joanna is a purchaser for 193 Inc. and forgets to purchase a large order of shipping materials. What will most likely happen as a result?",opts:["Orders will increase","The client's order will be delayed","Productivity will increase","Inventory will go down"],ans:1,exp:"Without materials to ship, the client's order cannot be shipped in time and will be delayed. Productivity will decrease, not increase."},
{q:"Joanna is drafting a budget to determine if her construction company has enough money to start building a new high-rise, examining accounts payable and receivable. Joanna is drafting a(n) __________ budget.",opts:["static","operating","cash flow","master"],ans:2,exp:"Cash flow budgets project when cash will flow in and out. Joanna examines accounts payable/receivable — cash inflows and outflows — making this a cash flow budget."},
{q:"Job interviewers often say 'Tell me about yourself.' What is the purpose of this request?",opts:["To test the applicant's communication skills","To test the applicant's honesty and integrity","To find out about the applicant's personal life","To uncover job-related problems the applicant has"],ans:0,exp:"This question evaluates communication skills and allows interviewers to learn more about the applicant than the résumé provides."},
{q:"Job seekers can often find out about local employment opportunities by accessing a business's:",opts:["employee newsletter.","website.","online catalog.","annual report."],ans:1,exp:"Many companies post their job openings on their websites. Some businesses allow job seekers to set up accounts to track applications and receive email updates about new job openings."},
{q:"Jocelyn wants to make an effort to be more mindful in her life. What can she do to practice mindfulness?",opts:["Worry about things that are out of her control","Be present in the moment instead of thinking about the past","Think more about the future than the present or past","Try new things and change her daily routine"],ans:1,exp:"Mindfulness is the state of being aware of the moment you are in. Being mindful means being present where you are, rather than thinking about the past or worrying about the future."},
{q:"John is generally a good worker, except he lacks the ability to see what needs to be done without being told. What personal trait is John lacking?",opts:["Initiative","Honesty","Creativity","Empathy"],ans:0,exp:"Initiative is willingness to act without being told and sometimes accepting additional duties. Creativity is generating unique ideas; empathy is understanding others' feelings."},
{q:"John is generally a good worker, except that he lacks the ability to see what needs to be done without being told. What personal trait is John lacking?",opts:["Empathy","Honesty","Initiative","Creativity"],ans:2,exp:"Initiative is willingness to act without having to be told to do so. A person with initiative is ready, willing, and able to think and act on their own."},
{q:"Johnny buys a share of Apple on the New York Stock Exchange. This is an example of the __________ market.",opts:["Foreign exchange","Futures","Primary","Secondary"],ans:3,exp:"The secondary market is the stock market where investors buy and sell securities that have been issued. The primary market is where securities are created."},
{q:"Johnny notices a smell traced to remodeling that poses no health risk. Which risk must he consider when deciding whether to fix the issue?",opts:["Employee dissatisfaction","Company bankruptcy","Employee conflicts of interest","Company insurance"],ans:0,exp:"Even if the odor isn't harmful, managers have an ethical obligation to maintain a comfortable workplace. Dissatisfied employees may leave or harm company reputation."},
{q:"Johnny's checks are automatically deposited into his account at a financial institution owned and operated by its members. Johnny's financial institution is most likely to be a(n)",opts:["Investment bank","Brokerage firm","Commercial bank","Credit union"],ans:3,exp:"A credit union is a financial cooperative set up to provide savings and credit services to its members, created, owned, and operated by its members."},
{q:"Jon decided to promote Bill instead of Maggie to regional manager because he thinks women aren't assertive enough in business situations. Jon is stereotyping on the basis of:",opts:["age.","ethnicity.","religion.","gender."],ans:3,exp:"Assuming men are more assertive than women in business is a gender stereotype—a distorted belief. Many women are very assertive in business situations."},
{q:"Jonas eliminates redundant data from his firm's databases. Jonas is performing:",opts:["Data filtering","Information scanning","Data normalization","Digital analysis"],ans:2,exp:"Normalization efficiently organizes database data, with two goals: eliminating redundant data and ensuring data is stored logically."},
{q:"Jonathan explains both the pros and cons of his insurance products to customers. Hank only explains why customers should purchase his products. Which agent is more likely to retain and grow his client base?",opts:["Jonathan, because he gives his customers too much information.","Jonathan, because his customers feel that they can trust him.","Hank, because he doesn't scare his customers away.","Hank, because he is a very optimistic, upbeat person."],ans:1,exp:"Jonathan presents himself as truthful and trustworthy. Customers are more likely to return to Jonathan and refer others because they trust him. Hank's customers may get angry if something goes wrong they weren't warned about."},
{q:"Jonathan explains pros AND cons of his products. Hank only explains why customers should buy. Who is more likely to retain and grow his client base?", opts:["Jonathan, because he gives customers too much information","Jonathan, because his customers feel they can trust him","Hank, because he doesn't scare customers away","Hank, because he is a very optimistic, upbeat person"], ans:1, exp:"Jonathan presents himself as truthful and trustworthy. Customers return to and refer others to advisors they trust. Hank may lose clients who get angry when something goes wrong that he could have warned them about."},
{q:"Jordan calculates the marginal cost and marginal benefit of a small price increase for a hot dog. Which outcome indicates the best price has been found?",opts:["The marginal cost is equal to the marginal benefit","The marginal cost is negative","The marginal cost is less than the marginal benefit","The marginal benefit is zero"],ans:0,exp:"When marginal cost and marginal benefit are equal, a one-unit increase will no longer benefit the company, so the price should be set at this level."},
{q:"Jordan gives an unhappy employee more responsibility and decision-making authority. Jordan is increasing the employee's job:",opts:["Rotation","Depth","Automation","Scope"],ans:1,exp:"Job depth is the amount of control and decision-making authority an employee has. Job scope is the number of tasks and their frequency."},
{q:"Jordan plans to expand despite his advisor Anna warning that a recession is likely, resulting in financial loss. What is most likely causing Jordan's poor decision?",opts:["Overconfidence","Self-interest","Incrementalism","Framing"],ans:0,exp:"Overconfident executives are so sure of themselves that they can't see the risks, even when warned by colleagues. Framing involves how situations are posed; incrementalism is gradual ethical decline."},
{q:"Juan noticed a positive variance of $2,000 in the email marketing section of his budget and concluded it demonstrated efficient use of funds. What is another possible explanation?",opts:["Email marketing is not an important activity","The planned email marketing campaigns were not completed","Email marketing was not effective","The budget did not allocate enough resources for email marketing"],ans:1,exp:"If money wasn't spent on email marketing, the campaigns may never have been carried out—which wouldn't demonstrate efficient use of funds."},
