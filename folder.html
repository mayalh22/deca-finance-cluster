{q:"Changing attitudes about family roles is an example of a shift in:",opts:["Demographics","Society and culture","The economy","Competition and environmental shifts"],ans:1,exp:"Changing cultural attitudes about family roles represent a shift in society and culture. Demographics involve physical/social characteristics like age and gender."},
{q:"Charlotte provides investing advice to clients, discusses their goals, and helps select investments best for them. Charlotte acts as her clients':",opts:["Credit analyst","Accountant","Fiduciary","Institutional investor"],ans:2,exp:"A fiduciary acts on behalf of another person and manages financial assets in the client's best interest."},
{q:"Charlotte, an investment advisor, provides ongoing investing advice and helps clients select investments best for them. Charlotte acts as her clients':",opts:["Credit analyst","Fiduciary","Institutional investor","Accountant"],ans:1,exp:"A fiduciary acts on behalf of another, putting that client's interests ahead of their own. Charlotte does more than sell—she manages clients' interests."},
{q:"Chartered Financial Analysts (CFAs) possess extensive knowledge of:", opts:["Banking services","Securities and investments","Insurance","Entrepreneurship"], ans:1, exp:"The CFA designation (offered by the CFA Institute) requires 4 years of investment work experience, ethics commitment, and passing exams on portfolio management, types of investments, financial reporting, and economics."},
{q:"Chase saw that his commodities investment dropped .002 points from Monday's close to Tuesday's close. This drop is called the:",opts:["net change.","true value.","net worth.","true yield."],ans:0,exp:"The net change is the difference between a stock's closing price and the previous day's price. Net worth, true value, and true yield do not describe this difference."},
{q:"Checking the validity, reliability, and significance of data and using graphs, charts, and tables to display this data describes what step of interpreting data mining results?",opts:["Choose and apply data mining techniques","Define goals and metrics","Analyze and visualize results","Explore and preprocess data"],ans:2,exp:"After applying data mining techniques, you analyze and visualize results by checking validity and reliability and using graphs, charts, tables, or maps to display findings."},
{q:"ChemTech International plans to build a new research facility and needs a detailed document for potential vendors outlining how they should submit bids. What type of document is being prepared?",opts:["Business plan","Summary of qualifications","Executive summary","Request for proposal"],ans:3,exp:"A request for proposal (RFP) is an invitation for potential vendors to present bids to obtain a contract. It includes specific information and detailed instructions about how the proposal should be written."},
{q:"Cheryl invested $6,000. Year 1: grew to $6,600. Year 2: grew to $7,260. Her monetary gains are the result of:", opts:["Compounding","Phishing","Diversifying","Market timing"], ans:0, exp:"Compounding is earning interest upon previous interest earnings. Cheryl earned 10% on $6,000 then 10% on $6,600 (including the first year's interest). Phishing is identity theft. Diversifying spreads investments. Market timing buys low and sells high."},
{q:"Choosing to buy an item at the check-out counter is often an example of:",opts:["smart shopping.","poor use of credit.","financial self-control.","impulsive spending."],ans:3,exp:"Buying items at the check-out counter is a classic example of impulsive spending—an unplanned purchase. Choosing not to buy the item would illustrate financial control."},
{q:"Chris asks his coworker Ali for help on his project. She agrees verbally, but she is frowning, crossing her arms, and avoiding eye contact. Ali most likely:",opts:["is not transmitting any message through her body language.","means exactly what she communicated verbally.","is happy and comfortable with the idea of helping Chris.","feels uncomfortable or unhappy with the idea of helping Chris."],ans:3,exp:"Ali's body language (frown, crossed arms, no eye contact) likely means she doesn't want to help Chris, even though she agreed verbally. Body language is just as important as words."},
{q:"Claire has an email requesting information unavailable until next week. What can she do to remind herself to respond?",opts:["Place the client's name in her address book","Forward the message to her supervisor","Flag the message for follow-up","Move the message to her spam folder"],ans:2,exp:"Flagging a message for follow-up reminds the recipient to respond at a later time, often with color-coded visual reminders."},
{q:"Claire maintains an inventory of routine office supplies. To determine optimal inventory levels, she should consider:", opts:["Employees' individual preferences","Average product usage amount per month","Business's budgeting method","Vendors' daily sales promotions"], ans:1, exp:"Determining average monthly usage (e.g., 2 cases in June, 3 in July, 4 in August = 3 case average) sets the optimal inventory level—avoiding overstocking or stockouts. Employee preferences, budgeting methods, and vendor promotions aren't primary factors for inventory optimization."},
{q:"Claire receives many emails daily. A client sent a request for info not available until next week. What should Claire do to remind herself?", opts:["Place the client's name in her address book","Flag the message for follow-up","Forward the message to her supervisor","Move the message to her spam folder"], ans:1, exp:"The follow-up flag/function reminds the recipient to follow up later, often color-coded so flagged messages stand out. Forwarding to a supervisor shifts responsibility inappropriately. Spam folders are for junk mail. Adding to the address book doesn't create a reminder."},
{q:"Clara works for a bank that now sells insurance products to its clients. This is known as a __________ arrangement.",opts:["Bait-and-switch","BATNA","Brick-and-click","Bancassurance"],ans:3,exp:"Bancassurance is the sale of insurance products by a bank, allowing banks to profit from additional revenue and increase customer satisfaction."},
{q:"Coaching is mostly about:",opts:["talking.","organizing.","instructing.","listening."],ans:3,exp:"Coaching is mostly about listening. Coaches must truly understand what the other person is saying and where s/he's coming from."},
{q:"Cocoa beans and corn are examples of investments people make in which of the following financial markets?",opts:["Soft commodities","Insurance","Selective property","Money"],ans:0,exp:"Cocoa beans and corn are agricultural goods — types of soft commodities. Money markets deal in short-term securities like Treasury bills. Selective property is not a financial market type."},
{q:"Cocoa beans and corn are examples of investments that people make in which of the following financial markets?",opts:["Soft commodities","Selective property","Money","Insurance"],ans:0,exp:"Agricultural goods like cocoa beans and corn are types of soft commodities. The commodities market facilitates buying and selling of resources like agricultural goods."},
{q:"Colin bought 35 shares at $23.50 and sold all for $53.00 per share. What type of tax will Colin pay?",opts:["Sales","Excise","Capital gains","Gift"],ans:2,exp:"When investments like stocks are sold at a profit, the stockholder may pay a capital gains tax on the difference between the purchase price and sales price."},
{q:"Colin is an experienced programmer who contacted an organization to help him find a job in another city. After placing him, his new employer will pay a fee. What type of organization is helping Colin?",opts:["Private employment agency","Academic counseling center","Government job placement office","Internet referral service"],ans:0,exp:"Private employment agencies match professionals with companies needing specific expertise. Employers often pay a percentage of the new hire's salary as a fee."},
{q:"Colleen will vote next week on the new contract her union negotiated with management. Union and management are in the __________ stage of the collective-bargaining process.",opts:["contract settlement","ratification of contract","preparation and research","tentative agreement"],ans:3,exp:"Tentative agreement is the stage where union and management have agreed on terms but still need union members to approve or reject the contract."},
{q:"Colleen, a mid-level manager, has the personality and communication skills to motivate others toward the company's goals. Colleen can make the best use of these skills in which management function?",opts:["Organizing","Controlling","Staffing","Directing"],ans:3,exp:"Directing is the management function of providing guidance to workers and work projects. Organizing sets up how work will be done; controlling monitors work effort; staffing finds workers."},
{q:"Commercial banks and brokerage firms are examples of:",opts:["Legislative groups","Financial intermediaries","Nonprofit organizations","Insurance institutions"],ans:1,exp:"Financial intermediaries help move financial products between producers and end users. Banks and brokerage firms are classic examples."},
{q:"Communication among coworkers and supervisors should be:",opts:["an opportunity for feedback.","an optional formality.","contained in one meeting.","saved for individual performance reviews."],ans:0,exp:"Staff communication should be a two-way opportunity for feedback. It's crucial to business success, not an optional formality, and should be ongoing — not just at reviews or single meetings."},
{q:"Companies are required to manage financial information in specific ways to:",opts:["Enable employees to work remotely","Comply with government regulations","Prioritize information in order of importance","Lessen the effects of information overload"],ans:1,exp:"Governments regulate how companies record, maintain, and store business information. Noncompliance can result in fines and legal action."},
{q:"Companies that effectively allocate costs:",opts:["Improve short-term and hurt long-term decision-making","Increase profits and expenses","Spread costs among departments","Determine one department to cover all costs"],ans:2,exp:"Cost allocation spreads costs among departments (cost objects), helping identify which are profitable and improving both short-term and long-term decision-making."},
{q:"Companies that effectively allocate costs:",opts:["increase profits and expenses.","improve short-term and hurt long-term decision-making.","spread costs among departments.","determine one department to cover all costs."],ans:2,exp:"Cost allocation spreads costs among departments (cost objects) to determine which parts of a business are responsible for which costs, helping make better-informed decisions."},
{q:"Comparing the prices offered by different vendors for the same goods and services is what part of the purchasing process?",opts:["Price fixing","Bid analysis","Invoice payment","Receipt of goods"],ans:1,exp:"Bid analysis compares vendor prices to find the best option. Price fixing involves businesses agreeing on prices. Invoice payment is paying for received goods."},
{q:"Comparing the prices offered by different vendors for the same goods and services is what part of the purchasing process?",opts:["Receipt of goods","Bid analysis","Invoice payment","Price fixing"],ans:1,exp:"Bid analysis involves comparing vendor prices for the same goods/services to find the best deal. Price fixing is an illegal agreement between businesses to set prices."},
{q:"Compliance in the finance industry involves financial institutions operating within:",opts:["specific territories.","regulatory guidelines.","organizational plans.","different relationships."],ans:1,exp:"Compliance means following governmental rules and regulations. Its purpose is to make the industry safe for consumers and maintain the stability of the financial system."},
{q:"Computer database programs make it easier for businesses to manage:",opts:["Large amounts of related information","Customers' buying habits","Internet search engines","Problem-solving skills"],ans:0,exp:"Database programs collect and sort many types of information—customer lists, financial data, product tracking, and personnel records."},
{q:"Conforming data are different from nonconforming data in that conforming data are",opts:["Inaccurate","Complicated","Complete","Inconsistent"],ans:2,exp:"Conforming data are complete, consistent, accurate, and reliable. Nonconforming data refers to data with values that are either missing, incomplete, or not consistent."},
{q:"Connor thinks he may be interested in pursuing a career as an insurance underwriter. He accessed a government website that provided information about educational requirements, typical job responsibilities, salary ranges, and:",opts:["programming needs.","career goals.","employment outlook.","testing tips."],ans:2,exp:"Government websites like the Occupational Outlook Handbook provide information about educational requirements, typical job responsibilities, salary ranges, and employment outlook."},
{q:"Consensus building is a process that often enables a group to:",opts:["reach an agreement.","express an attitude.","create a stalemate.","define a philosophy."],ans:0,exp:"Consensus requires substantial agreement from each group member. Consensus building helps groups reach agreements and avoid stalemates."},
{q:"Considered together, salaries and sales commissions are a:",opts:["Direct production cost","Capital expenditure","Semi-fixed expense","Type of payroll tax"],ans:2,exp:"Salaries and commissions together are a semi-variable (semi-fixed) expense—part fixed (salary) and part variable (commission)."},
{q:"Consumer spending is most likely to increase when:", opts:["The government tightens the money supply","Manufacturers scale back production","Businesses expand and hire additional staff","Unemployment rates begin to increase"], ans:2, exp:"When businesses expand and hire, workers have income to spend. Tight money supply reduces spending. Scaled-back production leads to layoffs and unemployment. Increased unemployment means less consumer income and reduced spending."},
{q:"Consumer spending tends to decrease when:", opts:["Business activities slow","Interest rates decrease","An economic recession ends","The inflation rate declines"], ans:0, exp:"When business activities slow, production declines, businesses lay off employees, and unemployed people without income spend less. Lower interest rates encourage borrowing and spending. A recession ending typically leads to more spending. Declining inflation stabilizes prices, potentially boosting spending."},
{q:"Convergence and consolidation in the finance industry have resulted in a(n):",opts:["more accurate picture of financial firms' financial condition.","highly compartmentalized finance industry.","one-stop shopping environment for consumers.","single supervisory agency to regulate the finance industry."],ans:2,exp:"Convergence (cross-sector mergers) and consolidation (same-sector mergers) created a one-stop shopping environment where consumers can access banking, insurance, and brokerage services from one firm."},
{q:"CopyIt Printing Company discovered that two new drivers it hired had numerous prior traffic violations while employed elsewhere. To avoid hiring unsafe drivers in the future, the company should:",opts:["mandate drug testing for all employees on a monthly basis.","conduct background checks on job applicants.","require delivery drivers to take a driving exam every six months.","ask job applicants about their former employers during the interview process."],ans:1,exp:"Background checks verify previous employment and driving records. Applicants are unlikely to discuss unfavorable past work experiences during an interview, so background checks are essential."},
{q:"CopyIt Printing discovered that two new drivers cited for accidents had numerous prior traffic violations with other employers. To avoid hiring unsafe drivers in the future, the company should:", opts:["Conduct background checks on job applicants","Mandate monthly drug testing for all employees","Require delivery drivers to take a driving exam every six months","Ask applicants about former employers during interviews"], ans:0, exp:"Background checks (including driving records and employment history) verify applicants' information and reveal unfavorable past experiences applicants won't volunteer. There's insufficient information to suggest substance abuse, so monthly drug testing may not help. Semi-annual driving exams don't prevent hiring unsafe drivers. Interview questions about former employers can be evaded."},
{q:"Corinne has decided to put her money into a lending investment. Which might she choose?",opts:["Collectibles","Stocks","Bonds","Real estate"],ans:2,exp:"Bonds are lending investments where you lend money to a government or corporation at a set interest rate. Stocks, collectibles, and real estate are ownership investments."},
{q:"Cornell wants to start a business but isn't sure what product to pursue. What is the first step of the entrepreneurial process he should focus on?",opts:["Verification","Idea generation","Illumination","A feasibility study"],ans:1,exp:"Idea generation is the first step—without an idea, none of the other steps can be completed. A feasibility study, illumination, and verification come after."},
{q:"Corporate governance can greatly impact company decision-making because governance processes act as __________ reaching company goals.",opts:["A framework for","Stakeholders","Brainstorming before","A bulwark against"],ans:0,exp:"Governance processes act as a framework for reaching company goals, being part of nearly all areas of management and strategy."},
{q:"Corporate governance is important because it:",opts:["Often results in scandals and bankruptcy","Produces noncompliant financial documents","Balances the interests of different stakeholders","Makes it difficult to oust ineffective leaders"],ans:2,exp:"Corporate governance helps balance the interests of all stakeholders—employees, management, shareholders, and the public—in the efficient running of a company."},
{q:"Corporate governance is intended to:",opts:["Promote the company to customers","Decrease the accountability of a company","Defend the company in court","Mitigate risk and avoid problems"],ans:3,exp:"Corporate governance helps a company mitigate risk and avoid problems while increasing accountability. Marketing promotes; lawyers defend; governance mitigates."},
{q:"Corporate governance is primarily concerned with __________ desires.",opts:["CEO","Competitor","Vendor","Stakeholder"],ans:3,exp:"Corporate governance revolves around balancing the desires of all stakeholders—customers, financiers, the community, the government, and managers."},
{q:"Corporate stocks, long-term government securities, state and local government bonds, and bank commercial loans are traded on the __________ market.",opts:["Spot","Capital","Debt","Money"],ans:1,exp:"Longer-term securities (more than 1 year) are traded on the capital market."},
{q:"Cost accounting budgets allow __________ to __________.",opts:["Management; anticipate future advertising costs","Management; consider a business's total cost of production","Stakeholders; anticipate future advertising costs","Stakeholders; consider a business's total cost of production"],ans:1,exp:"Cost accounting is a form of managerial accounting providing leadership with information about total production costs (labor, materials, overhead, etc.)."},
{q:"Cost accounting budgets allow __________ to __________.",opts:["Stakeholders; anticipate future advertising costs","Management; anticipate future advertising costs","Management; consider a business's total cost of production","Stakeholders; consider a business's total cost of production"],ans:2,exp:"Cost accounting is a form of managerial accounting providing information to leadership. It considers total cost of production—labor, materials, overhead—not advertising costs."},
{q:"Cost accounting is an activity used mainly in __________ accounting.",opts:["Managerial","Forensic","Financial","Electric"],ans:0,exp:"Cost accounting assesses variable and fixed costs for internal use—making it a form of managerial accounting. Financial accounting reports to external parties."},
{q:"Costco and Sam's Club likely monitor each other's brands, products, and sales strategies. What category of environmental scanning information are they most focused on?",opts:["The economy","Demographics","Competition","Technology"],ans:2,exp:"By watching its competition, a business can better decide on strategies to be successful."},
{q:"Costs that are tied to a company's level of production are most likely to be categorized as __________ costs.",opts:["Operating","Indirect","Variable","Fixed"],ans:2,exp:"Variable costs are costs tied directly to a company's level of production."},
{q:"Country X has reformed its trade policies and currency exchange rate system, with foreign investment increasing and GDP rapidly growing. This is an example of a(n):",opts:["integrated financial market.","emerging market economy.","recession-proof economy.","industrial-based market."],ans:1,exp:"An emerging market economy is a growing market that results when a country reforms from a closed to an open market economy. Integrated markets have barrier-free financial flow."},
{q:"CRM software applications help businesses identify customers' needs and preferences, which enables them to:",opts:["Develop personalized messages","Update the business's income statement","Scan the environment for inconsistencies","Verify accounting procedures"],ans:0,exp:"CRM software identifies customer interests so businesses can develop targeted promotional messages or product updates tailored to each customer."},
{q:"Customer Relationship Management (CRM) data are sometimes called 'perishable' data because the data:",opts:["may be non-standardized or unformatted.","are often duplicated.","can become inaccurate over time.","often contain junk or garbage."],ans:2,exp:"CRM data are 'perishable' because while true when recorded, they are likely to become inaccurate over time. For example, someone's address or phone number may change."},
{q:"Customer Relationship Management (CRM) processes should support the basic steps of the __________ cycle.",opts:["accounting","customer life","customer complaint","business"],ans:1,exp:"CRM supports the customer life cycle: attracting current customers, acquiring new ones, serving customers, and retaining them. Business cycles involve economic fluctuations."},
{q:"Customer relationship management increases sales and profits by increasing:",opts:["Prices","Customer loyalty","Product quality","Competition"],ans:1,exp:"CRM increases sales and profits by increasing customer loyalty. Over the long term, customer relationships drive sales and profit."},
{q:"Customers are complaining about your impatience. Which of the following will help you be more patient toward customers?",opts:["Self-denial","Self-control","Initiative","Maladjustment"],ans:1,exp:"Self-control is the ability to manage your own thoughts, feelings, and actions—helping you control irritation and be more patient."},
{q:"Cutting costs to boost profitability may result in",opts:["Higher product quality","Fewer employee layoffs","A drop in employee morale","An increase in productivity"],ans:2,exp:"While cutting costs may boost profitability, it can have negative effects such as employee layoffs, a drop in employee morale and productivity, and reduced product quality."},
{q:"Cynthia and Gerald are proposing a new project to their boss. When the boss questions Gerald about something he says, what should Gerald do?",opts:["Explain to the boss that Cynthia wrote their project proposal","Ask for clarity on the question and make sure he answers it fully","Answer a different question that Gerald definitely knows the answer to","Act defensive because the boss doesn't understand the project"],ans:1,exp:"Asking for clarity ensures Gerald fully understands the question and gives the best possible answer. Deflecting or acting defensively reflects poorly on Gerald."},
{q:"Dante received a $500 check from his parents. If he invests it at 5% annual interest, how much will it be worth in a year?",opts:["$505","$575","$525","$550"],ans:2,exp:"FV = $500 × (1 + 0.05) = $500 × 1.05 = $525."},
{q:"Data normalization involves creating a(n) __________ for all data within an organization.",opts:["Anomaly set","Search query","Group command","Standard format"],ans:3,exp:"Data normalization creates a standard format for all organizational data, enabling more accurate analysis, more storage space, and better segmentation."},
{q:"Debt markets buy and sell ___________, and equity markets buy and sell _________.",opts:["grain, gold","corporate stock, certificates of deposit","government bonds, corporate stock","gold, government bonds"],ans:2,exp:"Debt markets trade debt securities like government bonds and certificates of deposit. Equity markets trade financial instruments like corporate stock. Grain and gold are sold through commodities markets."},
{q:"Deciding whether or not to cheat on a test is an example of a(n):",opts:["Unfair decision","Ethical principle","Negative consequence","Ethical situation"],ans:3,exp:"An ethical situation involves deciding whether something is right or wrong, where the wrong choice could cause someone harm."},
{q:"DeMarcus behaves ethically at his job even when no coworkers or supervisors are watching. DeMarcus is displaying:",opts:["Greed","Transparency","Integrity","Viability"],ans:2,exp:"Integrity means acting ethically even when no one is watching. Transparency involves open communication; viability relates to sustainability. Greed is the opposite of integrity."},
{q:"Deposit-taking institutions are commonly responsible for:",opts:["Making payments on behalf of savers to creditors","Raising funds for clients by issuing securities","Carrying out regulatory and supervisory functions","Using funds from insurance premiums to offer loans"],ans:0,exp:"Deposit-taking institutions (banks, credit unions) accept deposits from savers and use them to make payments to creditors or offer loans. Investment banks issue securities."},
{q:"Determine if the following statement is true or false: It is acceptable for a business to distribute its customers' personal information without their consent to third parties.",opts:["True; most international trade agreements include provisions allowing this.","True; after collecting it, the business owns it and can do whatever it wants.","False; it is unethical to distribute customers' personal information without permission.","False; a business that does this is breaking antitrust laws."],ans:2,exp:"Distributing customer information without consent is unethical and illegal in many jurisdictions. Trade agreements don't permit this; antitrust laws address competition, not privacy."},
{q:"Determine the meaning of the following want ad: F/T Mgr. Needed Immed. Two Yrs. Exp. Req. EOE",opts:["Fast-track manager needed immediately. Two years' experience requested. Enlist only extras.","For trade. Manager needed immediately. Two years' experience requested. Experience on equipment.","Full-time manager needed immediately. Two years' experience required. Equal opportunity employer.","Fully talented manager needed immediately. Two years' experience required. Educated only eligible."],ans:2,exp:"F/T = full-time, Mgr. = manager, Immed. = immediately, Yrs. Exp. Req. = years' experience required, EOE = equal opportunity employer — standard classified ad abbreviations."},
{q:"Determine the mode for a customer-survey question using: 7, 5, 3, 7, 7, 9, 5, 7, 9, 9",opts:["5","3","7","9"],ans:2,exp:"The mode is the number that appears most frequently. 3 appears 1 time; 5 appears 2 times; 9 appears 3 times; 7 appears 4 times. The mode is 7."},
{q:"Determine the mode for: 7, 5, 3, 7, 7, 9, 5, 7, 9, 9",opts:["3","7","5","9"],ans:1,exp:"Mode is the most frequently occurring number. 7 appears 4 times, 9 appears 3 times, 5 appears 2 times, 3 appears once. Mode = 7."},
{q:"Determining project costs involves taking the information gained from assessing needed resources and:",opts:["Asking the client for at least twice as much funding","Using it for scheduling purposes","Adjusting the project purpose as necessary","Translating it into a realistic budget"],ans:3,exp:"Project costs are determined by translating resource assessment into a realistic budget with client input."},
{q:"Determining the needs of others sometimes includes:",opts:["Making a written list of potential outcomes","Creating knowledge gaps","Treating two people differently in the same situation","Putting yourself first"],ans:2,exp:"Determining others' needs sometimes means treating people differently in the same situation—like talking to a 5-year-old differently than a 15-year-old."},
{q:"Determining what consumers want in order to promote and sell those goods and services is a function of the business activity of:",opts:["risk management.","quality management.","production.","marketing."],ans:3,exp:"Marketing identifies what consumers want and plans how to promote and sell those goods and services to consumers."},
{q:"Developing an effective system to gather, organize, and store financial information helps a business evaluate:",opts:["The productivity rates of its human resources","Its financial well-being at any given time","The need for depreciation tables","Its ability to collaborate with vendors"],ans:1,exp:"A business needs current, relevant financial information to effectively monitor its financial status and make appropriate decisions."},
{q:"Dexter said, 'Our companies need to reach agreement by next Tuesday, or we will need to find another supplier. Our project is already three weeks behind.' What negotiation tactic is Dexter using?", opts:["Deadline driven","Limited authority","Bargaining","Good cop/Bad cop"], ans:0, exp:"The deadline-driven strategy gives the other party a time limit to act. Limited authority claims someone must consult an absent decision-maker. Bargaining is a 'give-and-take' strategy. Good cop/Bad cop sets up one person as reasonable and another as unreasonable."},
{q:"Diana prepares bills and invoices for her company. Her career is in the area of:",opts:["marketing communications.","corporate finance.","securities and investments.","professional selling."],ans:1,exp:"Preparing bills and invoices is part of corporate finance, which manages capital structure, budgeting, acquisition, financial modeling, funding, dividends, and taxation."},
{q:"Dmitri is building a new website. What does he need to register to obtain a web address?",opts:["Site builder","Domain name","Street address","Web host"],ans:1,exp:"The domain name is the unique address of a website."},
{q:"Dmitri needs to register a __________ to obtain a web address for his new site.",opts:["Site builder","Web host","Domain name","Street address"],ans:2,exp:"The domain name is the unique address of a website. A web host keeps the site running; a site builder creates the layout; a street address is physical, not digital."},
{q:"Drew, a high-ranking employee, tells his friend about an upcoming product recall before it's public so his friend can sell their stock. Drew's actions demonstrate:",opts:["Internet fraud","Pump-and-dump schemes","Insider trading","Boiler room tactics"],ans:2,exp:"Insider trading includes tipping others off using nonpublic, confidential information. Drew shared confidential recall information, allowing his friend to profit."},
{q:"Duncan works for a marketing firm but has taken a second job doing marketing for a local business. What is a potential ethical issue?",opts:["Conflict of interest","Lack of accountability","Misuse of resources","Product liability"],ans:0,exp:"A conflict of interest arises when a second job could compete with or take focus from the primary job, creating an ethical risk for employers."},
{q:"During a job interview, Christian looked down at his papers a few times. The interviewer most likely assumed he:",opts:["Was not really interested in the position","Was lying about his job qualifications","Lacked confidence in his own abilities","Was nervous or trying to recall information"],ans:3,exp:"It's very common for individuals to look away when trying to recall information or when feeling nervous, especially in interviews."},
{q:"During a job interview, job applicants can indicate their interest in the job by asking questions about the:",opts:["fringe benefits.","company.","interviewer.","vacation policy."],ans:1,exp:"Asking about the company signals genuine interest in the position. Questions about benefits or vacation indicate interest in what the job provides, not the job itself."},
{q:"During a one-on-one meeting, Joe learned important information about a high-profile client. His boss asked him not to share the information so it would remain:",opts:["On the record","Public","Confidential","Personal"],ans:2,exp:"Confidential information is meant to be held in confidence and shared only when authorized. Public information is widely available; personal information can be traced to an individual."},
{q:"During a recession, prices rise while the value of money decreases, yet workers are willing to pay the rising prices because their wages rise by the same amount. This is a good example of the effects of _________ prices.",opts:["unfair","competitive","relative","objective"],ans:2,exp:"Relative prices come into play when both wages and prices rise or fall at the same rate, so consumers are willing to pay the new price."},
{q:"During a staff meeting, Lindsay started asking Tom a question while he was presenting his report. What did Lindsay do wrong?", opts:["She strayed from the topic at hand","She expressed an opinion","She used distracting gestures","She interrupted the speaker"], ans:3, exp:"It's rude to interrupt someone while they're speaking. Lindsay should have waited until Tom finished before asking a question. There's insufficient information to determine if she strayed from the topic, expressed opinions, or used gestures."},
{q:"During an interview, a job applicant can indicate interest in the position by:",opts:["looking at their feet.","maintaining eye contact.","slouching in their chair.","staring out the window."],ans:1,exp:"Maintaining eye contact conveys interest and engagement. Looking at feet, slouching, and staring out the window are forms of negative body language indicating disinterest."},
{q:"During its 20 years of operation, the Normandy Company has made very few changes to its accounting methods. As a result, the company's financial information is likely to be very:",opts:["reliable.","comparable.","consistent.","conservative."],ans:2,exp:"Using similar accounting methods over time makes financial information consistent. It is not necessarily comparable to other companies, reliable (could have consistent errors), or conservative."},
{q:"During the discovery process, an entrepreneur must determine whether the proposed business venture will:",opts:["Require financial risk","Generate large profits","Create loyal customers","Meet a need or a want"],ans:3,exp:"During discovery, entrepreneurs ensure the business idea meets an actual consumer need or want. All ventures carry financial risk, so discovery of that is not needed."},
{q:"Each month, Maggie checks her bank statement against her own record of deposits and withdrawals. Maggie is __________ her bank statement.",opts:["Disputing","Challenging","Reconciling","Creating"],ans:2,exp:"Reconciling means checking your own records against the bank statement to ensure no mistakes have been made."},
{q:"Each time Ethan needs medical attention, he must pay $25 to the doctor's office. This out-of-pocket expense is Ethan's:", opts:["Total premium","Copayment","Surrender charge","Waiver"], ans:1, exp:"A copayment is a predetermined out-of-pocket expense paid at time of service. The balance is applied to the annual deductible or covered by insurance. A surrender charge is a life insurance fee for surrendering a policy. A waiver releases one from an obligation."},
{q:"Each year, the Magnolia Corporation compiles information to send to shareholders and interested parties about the company's status. What is this information typically called?",opts:["Financial statement","SWOT analysis","Executive summary","Annual report"],ans:3,exp:"An annual report outlines the company's financial situation, plans, and other information. A financial statement is one component of an annual report."},
{q:"Earlier this year, a finance corporation consolidated its regional offices into a single headquarters. Customer feedback indicated slower response times to local market needs. What issue is most likely responsible?",opts:["Miscommunication among team members","Lack of technology investment","Higher operational costs","Loss of local expertise and engagement"],ans:3,exp:"Consolidation typically results in layoffs or the restructuring of responsibilities, leading to local identity and presence being lost."},
{q:"Economic activities can be impacted by __________ changes like droughts, floods, and blizzards.",opts:["Psychological","Political","Climatic","Demographic"],ans:2,exp:"Climatic changes can impact economic activities, especially agriculture and construction. Droughts, floods, and blizzards are climatic events."},
{q:"Eduardo is in charge of finding money for his company and then making sure that money is managed correctly. What category of finance does Eduardo work in?",opts:["Insurance","Banking services","Securities and investments","Corporate finance"],ans:3,exp:"Corporate finance manages policy and strategy for liquidity and solvency — finding and managing money for a company. This is distinct from banking services, insurance, and securities."},
{q:"Effective CRM technology includes analytics features that automatically draw useful conclusions out of stored data. These features assist in:",opts:["training.","collaboration.","data mining.","data entry."],ans:2,exp:"CRM analytics features simplify data to draw useful conclusions — this is data mining. These built-in analytics are not performing training, collaboration, or data entry."},
{q:"Effective financial-information management involves implementing processes that help companies:",opts:["revise economic indicators.","track their ongoing projects.","interpret government regulations.","make appropriate business decisions."],ans:3,exp:"Financial data must be accurate, current, and relevant so businesspeople can make sound business decisions. Making decisions on incorrect data could be very costly."},
{q:"Effectively managing information regarding trademarks and patents helps a company preserve its",opts:["Stocks","Identity","Customers","Inventory"],ans:1,exp:"Managing information appropriately is essential for business success because it preserves organizational identity and history."},
{q:"EFG Corporation uses a remote database that employees access anytime through the Internet to house its digital business records. EFG Corporation is using __________ to store its records.", opts:["Cloud computing","A flash drive","Streaming video","Compact disks"], ans:0, exp:"Cloud computing stores business records in a database maintained by a third party at an off-site facility, accessible through the Internet. A flash drive is a local physical storage device. Streaming video downloads/views video in real time. Compact disks are physical storage media."},
{q:"Elena is a recent college graduate who seeks advice from Dana, a veteran employee who also introduces her to industry colleagues. Dana is serving as Elena's:",opts:["supervisor.","mentor.","manager.","assistant."],ans:1,exp:"A mentor is an experienced worker who guides, advises, and helps new employees build professional relationships. There's no indication Dana is Elena's supervisor, manager, or assistant."},
{q:"Elise is charged with evaluating industry-wide financial data from the previous fiscal year. Elise is conducting a __________ analysis.",opts:["Liquidity","Vertical","Horizontal","Leverage"],ans:1,exp:"Vertical analyses are used in comparing companies within the same industry. Horizontal analyses compare a single company's information over multiple years."},
{q:"Emi wants to compare her company's financial performance over several years. To compare historical data over multiple accounting periods, Emi should use __________ analysis.",opts:["Break-even","Horizontal","SWOT","Vertical"],ans:1,exp:"Horizontal analysis looks at year-over-year changes across multiple periods—looking left and right across financial statements. Vertical analysis looks at one period's proportions."},
{q:"Emi wants to compare her company's financial performance over several years. To compare historical data over multiple accounting periods, she should use __________ analysis.",opts:["horizontal","SWOT","vertical","break-even"],ans:0,exp:"Horizontal analysis looks at data over multiple periods (e.g., year-over-year). Vertical analysis examines line items as a proportion of revenue within a single period."},
{q:"Emily is married, lives on a farm, and likes sewing and puzzles. Becca is single, lives in the city, and enjoys skiing and running marathons. Their differences are based on:", opts:["Personality","Age","Education","Lifestyles"], ans:3, exp:"Lifestyles are defined by how people lead their daily lives—their activities, interests, and situations (married/single, city/farm, hobbies). There's insufficient information to determine if they differ in personality, age, or education."},
{q:"Emily used all her savings to buy a new car instead of a used one. What are the opportunity costs of that decision?",opts:["The benefits she could have received by using the additional cost of a new car another way","The reliability and luxury of a new car compared to a used one","The money she saves by not having to constantly repair a used car","The benefits she could have received by using public transportation instead"],ans:0,exp:"Opportunity cost is the lost benefit of the alternative not chosen. Emily's opportunity cost is what she could have done with the extra money spent on a new vs. used car."},
{q:"Employee involvement in company decisions often leads to greater employee:",opts:["Sales","Burnout","Satisfaction","Relocation"],ans:2,exp:"When employees see their ideas are heard and valued, it leads to increased job satisfaction and investment in the company."},
{q:"Employee payroll is an example of a(n) __________ cost.",opts:["Direct","Indirect","Manufacturing","Utility"],ans:1,exp:"Payroll cannot be directly allocated to a specific product or project—it is used across various departments, making it an indirect cost."},
{q:"Employees from different departments join a group to solve production process problems. This is an example of a:",opts:["Standing committee","Product team","Quality circle","Short-term committee"],ans:2,exp:"A quality circle is a problem-solving group of coworkers who study situations and recommend solutions to management."},
{q:"Employees from different departments participate in a group to solve problems related to the company's production processes. This is an example of a:",opts:["short-term committee.","quality circle.","standing committee.","product team."],ans:1,exp:"A quality circle is a problem-solving group of coworkers who study and discuss work situations or problems in order to recommend solutions to management."},
{q:"Employees in leadership positions should make management decisions based on their company's",opts:["Insurance policy","Foreign investments","Governance processes","Target demographic"],ans:2,exp:"Governance provides a framework for decision-making and management. Managers must work within the guidelines and processes established by the governing body."},
{q:"Employees in the finance industry can become members of a local __________ to build long-lasting relationships in their career field.",opts:["Recreational sports team","Credit union","Professional association","Political party"],ans:2,exp:"Active participation in a professional organization specific to the finance industry affords finance professionals the opportunity to serve on committees and attend seminars with other professionals."},
{q:"Employees involved in production scheduling are responsible for:",opts:["establishing the path inputs take through production.","issuing orders for production activities to begin.","estimating how long each step in production will take.","obtaining the resources needed in production."],ans:2,exp:"Scheduling establishes the timetable to be followed in production. Employees look at the number of steps in the production process and estimate how long each step will take."},
{q:"Employees who always keep their commitments to customers are building positive relationships with those customers by being:",opts:["dependable.","assertive.","creative.","sociable."],ans:0,exp:"Dependable employees do what they say they will do and keep their commitments. Customers appreciate dependable employees and often return to a specific business because of them."},
{q:"Employees who are responsible for paying a business's bills can help the business control expenses by:",opts:["paying bills within the discount period.","paying all bills as soon as they are received.","asking vendors to negotiate dating terms.","controlling the business's trade credit."],ans:0,exp:"Most suppliers grant discounts for early payment. Employees should pay within the discount period to save the discount amount. Paying immediately ignores extended payment periods that free up capital."},
{q:"Employees who have innovation skills are able to:",opts:["think in new ways.","behave aggressively.","react to problems.","socialize effectively."],ans:0,exp:"Innovation skills enable employees to think in new ways, generating new ideas and solutions to work-related issues. This is about proactive creative thinking, not reacting, aggression, or socializing."},
{q:"Employees who never discuss confidential or personal business information with other employees are demonstrating their:",opts:["ability to communicate.","honesty and integrity.","intelligence and initiative.","orderly and systematic behavior."],ans:1,exp:"Employees demonstrate honesty and integrity when they refuse to violate the trust a company places in them. Many employees have access to confidential information and should only discuss it as company policy dictates."},
{q:"Employees who record all purchases made with money from the petty cash fund are helping the business to:",opts:["improve cash flow.","comply with the law.","control its expenses.","reduce major spending."],ans:2,exp:"Recording petty cash purchases allows the business to monitor and control the amount spent on small purchases and protects the fund from theft. There is no law requiring petty cash records."},
{q:"Employees who serve customers efficiently help control expenses by:",opts:["Decreasing volume","Reducing complaints","Improving morale","Increasing returns"],ans:1,exp:"Professional customer service reduces complaints, and handling complaints is an expense to the business. Efficient service saves money by preventing complaint costs."},
{q:"Employees who understand who they are, accept their weaknesses, and realize they possess unique talents usually have high:",opts:["self-fulfillment.","self-understanding.","self-preservation.","self-esteem."],ans:3,exp:"Self-esteem is the regard or respect you have for yourself. Recognizing strengths and weaknesses and accepting yourself is the foundation of self-esteem."},
{q:"Employees working on a project from distant locations can transfer information more efficiently by:",opts:["Sharing documents with file sharing software","Composing and sending detailed email messages","Mailing physical documents to one another","Scheduling meetings to work together"],ans:0,exp:"File sharing enables employees to easily and quickly collaborate and share information from different locations."},
{q:"Enterprise risk management goes beyond traditional risk management by addressing",opts:["Accounting discrepancies","Each risk one-by-one","Issues within specific departments","Non-insurable risks"],ans:3,exp:"Within traditional risk management, an organization only looks at things that are insurable. ERM goes beyond insurable risks and addresses hazards that cannot be mitigated through insurance."},
{q:"Environmental degradation occurs because of:",opts:["Nationalism","Offshoring","Increased production","Decreased competition"],ans:2,exp:"The more goods being produced, the greater the chances for pollution and loss of natural resources. Increased production drives environmental degradation."},
{q:"Environmental law attempts to protect:",opts:["Corporations from the environment","People from the environment","The environment from damaging actions","Corporations from the government"],ans:2,exp:"Environmental law protects the air, water, wilderness, and other aspects of the environment from damaging actions by companies and the public."},
{q:"Equipment inspections, fire drills, and employee safety training are examples of a business's __________ management efforts.",opts:["Financial","Time","Resource","Risk"],ans:3,exp:"Risk management involves procedures to reduce possible hazards. Safety inspections, drills, and training are all attempts to reduce risks and hazards."},
{q:"Eric e-mails staff that their Q3 performance exceeded goals and each will receive a $200 bonus. What technique is Eric using to motivate staff?", opts:["Public recognition","Verbal encouragement","Acknowledgment plaque","Financial incentive"], ans:3, exp:"A financial incentive such as a bonus rewards staff and encourages continued hard work. Since Eric communicated by e-mail, there's insufficient info to determine if it was public recognition or verbal encouragement. No plaque was mentioned."},
{q:"Erica is looking at a stock with a current price of $50.75 and a dividend of 2.50. What is the yield percentage?",opts:["20.3%","4.9%","5.9%","21.4%"],ans:1,exp:"Yield percentage = Dividend / Current Price = $2.50 / $50.75 = 0.049 = 4.9%."},
{q:"Erin convinced Sebastian to invest in her business promising 10% monthly returns. Instead, she used his investment to financially reward earlier investors. What type of scheme is this?",opts:["Ponzi scheme","Prime bank scheme","Annuities scam","Predatory lending"],ans:0,exp:"A Ponzi scheme pays returns to early investors using later investors' funds rather than legitimate profits. Erin's actions fit this definition exactly."},
{q:"Ethan is developing common-size financial statements to compare financial performance across several different companies. Ethan is conducting __________ analysis.",opts:["horizontal","vertical","ratio","trend"],ans:1,exp:"Vertical analysis calculates each item on a financial statement as a percentage of the total, producing common-size statements that allow comparison across companies."},
{q:"Ethan knows that if he wants his speech to be effective, he needs a single, complete statement of his main idea, also known as a:",opts:["Transition","Conclusion","Visual aid","Thesis"],ans:3,exp:"A thesis is a single, complete statement of the main idea that relates the topic to the audience and helps them see its impact."},
{q:"Ethical accounting professionals avoid conflicts of interest by:",opts:["Authorizing changes","Exhibiting biased attitudes","Encouraging collaboration","Behaving independently"],ans:3,exp:"Accountants must be objective and honest, not influenced by bias or outside opinion. Acting independently avoids conflicts of interest."},
{q:"Ethical behavior increases productivity and morale because it:",opts:["Makes employees want to support the organization's mission","Makes sure people are following the rules","Leads to increased profits and more product sales","Makes sure laws are never broken"],ans:0,exp:"When people behave ethically, everyone feels respected and wants to contribute. Productivity and morale rise because employees support the mission."},
{q:"Ethical financial-information management practices make a business:",opts:["Susceptible to regulatory investigation","Safe from the possibility of security breaches","More volatile in the financial marketplace","More attractive to investors and customers"],ans:3,exp:"Companies with ethical, transparent financial practices appear more trustworthy, attracting investors and customers. Ethics reduce, not eliminate, security breach risks."},
{q:"Even if an unethical action isn't illegal, it can still cause negative consequences such as:",opts:["Imprisonment","An increased customer base","A poor reputation","Decreased managerial authority"],ans:2,exp:"Unethical behavior reflects poorly on individuals and organizations, damaging their reputations—even when no laws have been broken."},
{q:"Even though things don't always go her way, Kara is able to keep things in perspective and see the lighter side of any situation. Kara is adaptable and",opts:["Demonstrates confidence","Has a sense of humor","Practices self-corrective behavior","Takes risks"],ans:1,exp:"A sense of humor can help you adapt to life's hurdles without breaking a sweat. Adaptable people like Kara are able to keep things in perspective and see the lighter side of any situation."},
{q:"Even when things are not going well, Mark still believes everything will work out. Mark has a(n) __________ attitude.",opts:["Positive","Indifferent","Superior","Negative"],ans:0,exp:"A positive attitude focuses on the good side of things. Positive people believe things will work out in the end. Indifferent means lacking interest; superior means feeling above others."},
{q:"Every morning Lukas logs onto his computer to a data-mining application on his home screen that displays the company's financial performance in charts and tables. Lukas is using a(n):", opts:["Dashboard","Text-mining tool","Artificial neural network","Decision tree"], ans:0, exp:"A dashboard is a data-mining tool that summarizes financial data in real-time charts and tables, often appearing automatically on employees' computer home screens. A text-mining tool mines data from text formats. An artificial neural network identifies errors and questionable entries. A decision tree classifies data and builds models."},
{q:"Every pay period, Amanda places $100 from her paycheck into a savings account earning 4.5% interest. In this situation, money functions as a:", opts:["Medium of exchange","Store of value","Form of barter","Measure of income"], ans:1, exp:"Money functions as a store of value when saved rather than spent, retaining value for future purchasing power. Medium of exchange is when money buys goods/services. Bartering trades goods for goods. Measure of value assesses what one is willing to pay."},
{q:"Fair salaries, competitive benefits, and safe working conditions are all important in creating a good:",opts:["Competitive advantage","Standard of living","Quality of work life","Division of labor"],ans:2,exp:"Quality of work life refers to the general conditions in which employees work. Standard of living refers to general living conditions."},
{q:"FGH Company received several warnings from a government agency to fix unsafe electrical wiring. According to common law, the company has breached its duty of:", opts:["Reasonable care","Personal reform","General authority","Charitable trust"], ans:0, exp:"Reasonable care is the common-law principle that individuals and businesses should use caution and act socially responsibly. FGH failed to fix known dangers, breaching this duty and placing employees and customers at risk. The other options are not related legal duties."},
{q:"Financial accounting is different than managerial accounting in that financial accounting",opts:["Looks at the future","Prepares data for external users","Determines and measures cost","Deals with financial statements"],ans:1,exp:"Financial accounting involves preparing and reporting financial data to external users. Managerial accounting prepares data for internal users."},
{q:"Financial globalization helps investors reduce their exposure to:", opts:["Capital appreciation","Speculative bubbles","Regulatory liberalization","Business cycle risks"], ans:3, exp:"By investing in many countries, investors diversify risk and reduce exposure to business cycle risks in any particular country. Financial globalization seems to increase risks of speculative bubbles. Capital appreciation is a positive aspect of investing—not something to avoid."},
{q:"Financial globalization tends to cause an increase in:",opts:["taxes on international transactions.","investors' exposure to business cycle risks.","herd behavior among investors.","limits on foreigners' access to domestic markets."],ans:2,exp:"Financial globalization seems to increase herd behavior—where individuals act together as a group without planned direction. In good times, investors buy together; in bad times, they sell together."},
{q:"Financial information management is responsible for collecting, maintaining, and reporting data about financial transactions. Business managers often use these data to:",opts:["develop secondary equity markets.","determine if liability insurance is needed.","forecast financial inflows and outflows.","calculate the level of corporate groupthink."],ans:2,exp:"Financial data from information management systems is used to forecast financial inflows and outflows, which is extremely helpful when developing a budget."},
{q:"Financial information that a credit card issuer analyzes when reviewing applications includes the customers':",opts:["Income and preferred standard of living","Loan balances and consumption rates","Payment history and current level of debt","Employment status and financial goals"],ans:2,exp:"Payment history reveals how reliably a customer pays; current debt level shows if they can take on more. Financial goals and standard of living are not primary factors."},
{q:"Financial information that a credit card issuer analyzes when reviewing customers' applications includes:",opts:["Payment history and current level of debt","Income and preferred standard of living","Employment status and financial goals","Loan balances and consumption rates"],ans:0,exp:"Credit card issuers review payment history and current debt level to assess credit risk. Financial goals and preferred lifestyle are not primary factors."},
{q:"Financial managers who are legally responsible for their clients' investments must demonstrate fiduciary responsibility, which involves:",opts:["acting in the best interests of their clients.","selling financial products that generate the highest commissions.","making risky investments without their clients' knowledge.","speaking with their clients once a year to review their portfolios."],ans:0,exp:"A fiduciary has been given legal authority to act on behalf of a client and must act in the best interest of that client, making wise financial decisions to achieve the client's goals."},
{q:"Financial planning can be described as a way to:",opts:["retire with a substantial amount of money in the bank.","stop all impulsive purchases.","achieve your professional goals.","realize what it takes to get the things you really want."],ans:3,exp:"Financial planning is a good way to realize what it takes to get the things you really want—not a guarantee for retirement savings or stopping impulsive purchases."},
{q:"Financial-information management is responsible for collecting, maintaining, and reporting data about financial transactions. Business managers often use these data to:", opts:["Forecast financial inflows and outflows","Determine if liability insurance is needed","Develop secondary equity markets","Calculate the level of corporate groupthink"], ans:0, exp:"Business managers use financial transaction data to forecast financial inflows and outflows—extremely helpful when budgeting. Financial-information management doesn't typically help determine insurance needs, develop equity markets, or calculate groupthink levels."},
{q:"Firewalls, intrusion detection systems, and encryption are all methods used by companies to: (1255 version)",opts:["ensure the security of their office buildings.","screen qualified job applicants.","protect and secure financial information.","sort and organize customer data."],ans:2,exp:"These technological tools protect sensitive financial information. They are not used for physical security, hiring, or data organization."},
{q:"Firewalls, intrusion detection systems, and encryption are all methods used by companies to:",opts:["protect and secure financial information.","screen qualified job applicants.","sort and organize customer data.","ensure the security of their office buildings."],ans:0,exp:"These are technological methods that protect sensitive financial information. They are not used for hiring, data organization, or physical building security."},
{q:"Following ethical financial accounting practices often leads to:",opts:["Receiving fines or sanctions","Maintaining public faith","Losing revenue","Pushing away investors"],ans:1,exp:"Ethical accounting practices establish trustworthiness and maintain public faith, attracting investors. Unethical practices lead to fines, loss of revenue, and pushing away investors."},
{q:"For privacy and security purposes, businesses should use encryption techniques and firewalls to protect customers when they:",opts:["report changes in interest rates.","suspect pilferage is occurring.","post general product information on their message boards.","conduct online financial transactions."],ans:3,exp:"Encryption and firewalls reduce risks associated with computer hacking and identity theft during online financial transactions. Posting general product info is not a security issue."},
{q:"For several months, June has felt very tired at work, has difficulty focusing, is often irritated at coworkers, and has turned in late assignments — but feels considerably better at home. June is experiencing:",opts:["employee stress.","employee burnout.","organizational change.","employee turnover."],ans:1,exp:"Burnout results from prolonged negative stress and manifests as lethargic behavior and irritability. It's distinct from general stress (shorter-term) and is specific to the work environment."},
{q:"Ford Motor Company purchased tires from one tire company for all automobiles in its manufacturing plants. This is an example of __________ purchasing.",opts:["Resale","Retail","Dispersed","Industrial"],ans:3,exp:"Industrial purchasing is buying goods and services for internal consumption or conversion into a final product. Ford uses the tires to manufacture cars."},
{q:"Francesca has steady income but no large loan history. The dealership is more likely to approve her loan if she gets a(n):",opts:["Qualified loan cosigner","Incremental pay increase","Reputable credit report","Letter of intent"],ans:0,exp:"A cosigner agrees to cover the debt if Francesca defaults. Since she lacks large credit history, a qualified cosigner gives lenders more assurance."},
{q:"Francesca returned to her previous car dealer because she could trust them to be honest and fair. In this case, integrity helped build:",opts:["A stable work environment","Relationships between coworkers","Francesca's personal ethics","Strong customer loyalty"],ans:3,exp:"Honesty and integrity build loyal customers who count on your company, encouraging repeat purchases."},
{q:"Franco's manager asked him to compare their company's Q4 performance with others in its industry. Which financial-analysis software feature should Franco use?", opts:["Forecasting","Ratio analysis","DuPont modeling","Benchmarking"], ans:3, exp:"Benchmarking compares a company's financial performance with specific companies in its industry and/or industry standards. Ratio analysis calculates financial ratios automatically. DuPont modeling examines each financial ratio's impact on return on equity. Forecasting makes predictions and develops budgets."},
{q:"Frank is an officer of MUD corporation who recently sold his shares of MUD stock based on confidential company information. Frank is guilty of illegal:", opts:["Affinity fraud","Insider trading","Accounting fraud","Phishing"], ans:1, exp:"Illegal insider trading occurs when corporate insiders trade their company's stock based on non-public information. Affinity fraud targets specific groups. Accounting fraud involves publishing incorrect financial statements. Phishing steals personal info."},
{q:"From the securities table: Home Depot (HD), P/E 18.92, Close 35.01, Change +.62, Earnings 1.85, Div 0.95, Yield 2.7. Which statement is most likely accurate?", opts:["Home Depot's stock is 2.7 times higher than its earnings per share","The previous day's closing price was $34.39","The lowest price in the last year was $18.92","An investor with 100 shares earned $27 in dividends last quarter"], ans:1, exp:"Subtract the net change from the close: $35.01 - $0.62 = $34.39 for the previous day's closing price. The P/E (18.92) shows how much higher the price is vs. earnings. The 52-week low was $26.62. 100 shares × $0.95 dividend = $95, not $27."},
{q:"Gary believes that the upper class should pay a higher income tax rate than the middle and lower classes. What tax structure does Gary favor?",opts:["Progressive","Regressive","Proportional","Exclusive"],ans:0,exp:"A progressive tax requires higher earners to pay a higher percentage. A regressive tax results in lower earners paying a higher percentage. Proportional means everyone pays the same rate."},
{q:"Gathering and communicating financial information for planning a business's operations is the focus of __________ accounting.",opts:["Accrual","Managerial","Financial","Equity"],ans:1,exp:"Managerial accounting obtains and analyzes financial data to help businesses make operational decisions such as budgeting and cost analysis."},
{q:"Gathering and communicating financial information that businesses can use to plan their operations is the focus of __________ accounting.",opts:["accrual","managerial","financial","equity"],ans:1,exp:"Managerial accounting involves obtaining and analyzing financial data to help businesses make decisions about how to operate. Financial accounting focuses on external users."},
{q:"Generally, a company's board of directors makes decisions on behalf of the company as a(n):",opts:["President","Actuary","Fiduciary","Consumer"],ans:2,exp:"A fiduciary acts on behalf of another, putting that client's interests ahead of their own. The board makes decisions for the company's benefit, not their own."},
{q:"George is checking newspaper ads for the best place to buy a dishwasher at a reasonable price. What type of product is the dishwasher?",opts:["Convenience","Shopping","Capital","Specialty"],ans:1,exp:"Shopping goods are consumer products purchased after comparing products and stores to get the best quality, price, and/or service. George is comparing before purchasing."},
{q:"Geraldo wants to review the difference between Coffee Dreams' closing stock price and the previous day's closing price. He should review the:", opts:["Ticker symbol","Net change","Price-earnings ratio","52-week high and low"], ans:1, exp:"Net change shows the difference between the stock's closing price and the previous day's closing price—positive means up, negative means down. The ticker symbol uniquely identifies the company. The P/E ratio divides share price by earnings per share. The 52-week high/low shows the past year's price range."},
{q:"Gianna's personal circle of friends is her",opts:["Family","Reference group","Membership group","Subculture"],ans:2,exp:"Gianna's personal circle of friends is a membership group—a social group she belongs to. A reference group is a group you're not a part of."},
{q:"Ginny set up two related database tables so that when an entry in the primary table is modified, all matching entries in the related table automatically update. What type of relationship did Ginny create?", opts:["Logical design","Hyperlinked","Object-oriented","Cascading upward"], ans:3, exp:"A cascading upward relationship automatically updates all matching entries in related tables when the primary table is modified. Hyperlinks jump to other documents. Object-oriented is a database model type. Logical design is typically the first stage of database lifecycle."},
{q:"Good governance is most likely to make a company's investment decisions:",opts:["more ethical.","subject to individuals' influence.","less regulated.","more vulnerable to outside risk."],ans:0,exp:"Governance objectives are based on integrity and ethics, so strong governance leads to more ethical investment decisions. Good governance reduces (not increases) individual influence and vulnerability to risk."},
{q:"Good governance is most likely to make a company's investment decisions:",opts:["more ethical.","subject to individuals' influence.","less regulated.","more vulnerable to outside risk."],ans:0,exp:"Governance objectives are often based on integrity and ethical principles. Strong governance makes investment decisions more ethical and less vulnerable to individual influence or risk."},
{q:"Google Calendar and Microsoft Outlook are both examples of:",opts:["personal information management systems.","smartphone operating systems.","mobile geolocation tracking systems.","virtual reality applications for smart TVs."],ans:0,exp:"Personal information management systems help track important dates, meetings, and deadlines. Google Calendar and Outlook are PIM systems, not operating systems or geolocation apps."},
{q:"Government regulation is financed by taxes and:",opts:["Donations","Borrowing","Price supports","Subsidies"],ans:1,exp:"The government sells bonds to other countries and the private sector to raise money not provided by taxation."},
{q:"Greenery House uses extra cash to pay off a commercial lawnmower loan ahead of schedule. This is an example of using financial information to",opts:["Create budgets","Manage debt","Increase sales","Acquire new businesses"],ans:1,exp:"Paying off a loan early is one way a business can manage its debt."},
{q:"Group orientation sessions for new employees are very important because they:",opts:["explain the duties of each job.","help to motivate employees.","encourage organizational input.","provide in-depth training."],ans:1,exp:"A good orientation program makes new employees feel welcome, gives an overview of the business, and helps motivate them to do their best. It is not used to discuss specific job duties or provide in-depth training."},
{q:"Halifax Retail uses computer applications to track inventory and order goods from vendors. What technology is the company using?",opts:["Customer relationship management (CRM)","Global positioning system (GPS)","Electronic data interchange (EDI)","Territorial routing application (TRA)"],ans:2,exp:"EDI systems allow businesses to transmit inventory and ordering information to and from suppliers, streamlining the purchasing process."},
{q:"Handling customer complaints may allow a business to:",opts:["gather more accurate product and marketing information.","expand its facilities.","learn inside information about its competitors.","afford raises for all of its employees."],ans:0,exp:"Customer complaints provide valuable product and marketing information, such as frequent product issues or updated contact information for repeat customers."},
{q:"Hank wants to meet regularly in person with other financial planners in his geographic area. Which organization would best meet his needs?",opts:["Federal Organization of Financial Planners","National Association of Professional Financial Advisors","International Financial Planning Association","Local Society of Financial Planning Professionals"],ans:3,exp:"A local organization's members work in close proximity and are more likely to hold face-to-face meetings regularly. National and international groups may not have a local chapter."},
{q:"Harborstone Equipment requires that its management consult the board of directors before making financial decisions. What is the potential downside of this requirement?",opts:["It forces management to be more independent","It slows down the decision-making process","It decreases the role of the board of directors","It decreases the accountability of management"],ans:1,exp:"Having to go through the board of directors before making a financial decision slows the process down."},
{q:"Hardware, software, and databases are all components of ___________ systems.",opts:["Information","Ethics","Email","Word-of-mouth"],ans:0,exp:"An information system is a set of components (hardware, software, databases, human resources) that collects, processes, and interprets information."},
{q:"Having a personal vision makes handling difficult decisions easier because you will:",opts:["be successful no matter what decision you make.","be faced with tough decisions less frequently.","have a clear picture of what your goals in life are.","not need to reflect as much before making decisions."],ans:2,exp:"A personal vision provides a clear picture of life goals, making tough decisions easier by giving you a framework to evaluate choices against your ultimate ambitions."},
{q:"Helena's manager asked for a report with financial ratios including current ratio and rate of return on equity. To create it, Helena should use __________ software.", opts:["Budgeting","Financial analysis","Data mining","Field service"], ans:1, exp:"Financial analysis software calculates and reports financial ratios, compares performance to competitors/industry standards, and increases productivity. Budgeting software manages budgets. Data mining finds patterns in large datasets. Field service software is for service teams working outside the office."},
{q:"Helena's manager asked her to compile a report with financial ratios including the current ratio and rate of return on equity. She should use __________ software.",opts:["Data-mining","Budgeting","Financial analysis","Field service"],ans:2,exp:"Financial analysis applications calculate and report financial ratios and compare a business's performance to competitors and industry standards."},
{q:"Henry is a professional banker at a deposit-taking financial institution where only 'members' may save or borrow. Henry most likely works for a(n):", opts:["CPA firm","Mortgage company","Insurance company","Credit union"], ans:3, exp:"Credit unions are cooperatives providing financial services to a group sharing a common interest or employer—only members may save or borrow. Mortgage companies process real estate loans. Insurance companies sell policies. CPA firms are not deposit-taking financial institutions."},
{q:"How are very small companies and companies with poor credit ratings most likely to trade their stock?",opts:["On the New York Stock Exchange (NYSE)","On the Over the Counter Bulletin Board (OTCBB)","On the Toronto Stock Exchange (TSX)","On the American Stock Exchange (AMEX)"],ans:1,exp:"The OTCBB is a regulated electronic exchange with no listing requirements, making it accessible to small or low-credit-rated companies. NYSE and TSX have listing requirements."},
{q:"How are vote taking and consensus building different?",opts:["In consensus building, every group member must agree on a decision","In vote taking, every group member must agree on a decision","In vote taking, a minority of group members make a decision","In consensus building, a minority of group members make a decision"],ans:0,exp:"In consensus building, every group member must agree before a decision is made. In vote taking, the majority rules even if some disagree."},
{q:"How can a business build customers' trust and communicate its commitment to ethical practices?", opts:["Publish its confidentiality statement","Develop liberal business policies","Hire employees with a positive attitude","Post its earnings on its website"], ans:0, exp:"Publishing a confidentiality statement communicates that the business won't share customer info with third parties and takes measures to secure transactions. Other options may help trust but don't specifically communicate commitment to ethics."},
{q:"How can a company develop a culture in which employees work toward corporate governance objectives?",opts:["Put the shareholders' interests as the top priority","Punish employees who do not support corporate governance objectives","Set objectives without letting the budget affect them","Incorporate governance objectives into the hiring process"],ans:3,exp:"Incorporating governance into hiring means new employees are aligned with governance objectives from the start, building a culture that supports those objectives organically."},
{q:"How can a company protect its company name from being imitated by others?",opts:["Obtain trademark protection","Place it in the public domain","Apply for a patent","Obtain a copyright"],ans:0,exp:"Trademarks protect unique organization names by preventing others from using them. Patents protect inventions; copyrights protect artistic works."},
{q:"How can a financial-information management system contribute to the development of future budget requirements?",opts:["Organizing and analyzing past resource usage data","Managing company assets","Restricting access to confidential information","Collecting and analyzing competitive data"],ans:0,exp:"A financial-information management system can use past resource usage data to determine future budget requirements."},
{q:"How can accountants demonstrate due care?",opts:["Request competitive compensation","Serve local communities for free","Refrain from making any mistakes","Engage in professional development"],ans:3,exp:"Due care means performing the role of accountant as well as possible by continuously deepening knowledge and skills through professional development."},
{q:"How can an accountant best contribute to an organization's governance objectives?",opts:["Determining whether profit margins are shrinking","Minimizing risks associated with the objectives","Ensuring strong community relations","Allocating funds for the objectives in the budget"],ans:3,exp:"An accountant can contribute by understanding governance objectives and accounting for them in the budget, ensuring resources are allocated toward those goals."},
{q:"How can businesses benefit from using a central data repository for their financial information?",opts:["They no longer have to generate consistent data","They can overcome economies of scale","They can obtain faster responses to queries","They can rely on old data"],ans:2,exp:"Since data is housed in one location, querying is faster, improving organizational efficiency and enabling more consistent, up-to-date information."},
{q:"How can management reduce the business's level of risk associated with ethics?",opts:["Advise employees that following ethics depends on the situation","Allow employees to follow their own set of ethics","Assume employees know what constitutes ethical behavior","Train employees about expectations in relation to workplace ethics"],ans:3,exp:"Ethics training helps employees understand the business's ethical standards and expectations, reducing the risk of unknowing violations."},
