{q:"While filing an insurance claim, Mrs. Ramirez was disconnected and couldn't remember the representative's name. What type of CRM data would help identify the representative?",opts:["Self-provided data","Demographic data","Interaction data","Historical data"],ans:2,exp:"Interaction data contains details about phone calls and instances when a customer contacted the call center, which would identify the specific representative."},
{q:"While making a sale, an employee decides to keep the customer's money rather than ringing up the sale. This is an example of business risk caused by __________ human behavior.",opts:["careless","dishonest","incompetent","ethical"],ans:1,exp:"Dishonest behavior includes all forms of stealing, cheating, or lying. Failing to ring a sale and keeping the money is dishonesty — a form of human risk."},
{q:"While researching information for a business report, Tara reads: 'Although unemployment has dropped slightly, many politicians have indicated that they believe the government has done enough to get our country out of this recession.' This is an example of information that contains:",opts:["statistics.","historical facts.","criticism.","poll data."],ans:2,exp:"Politicians expressing disapproval (that the government has done enough) is criticism—a statement of disapproval based on opinion or beliefs rather than facts."},
{q:"While there are general parts of any project to evaluate, you should focus on:",opts:["Measures that are most important for your specific project","Whatever your stakeholders ask you to do","The aspects of the project that bring in money","Project scope because it is the only part that truly matters"],ans:0,exp:"The most important evaluation criteria relate directly to your project's specific objectives. Project scope is not the only thing that matters."},
{q:"Who is responsible for approving corporate governance goals and policies?",opts:["Shareholders","Chief executive officer","Board of directors","Management team"],ans:2,exp:"The board of directors approves high-level corporate governance goals and policies. The CEO and management recommend goals for board approval."},
{q:"Who is responsible for making sure employees maintain a good work-life balance?",opts:["Coworkers","Employers","Employees","Customers"],ans:2,exp:"Employees are ultimately responsible for maintaining their own work-life balance through setting boundaries and taking necessary breaks."},
{q:"Who should be responsible for stress management?",opts:["The employee and the employer","The employee","The employer","The government"],ans:0,exp:"Both employees and employers share responsibility for stress management. Stress causes negative consequences that affect the business, so employers must help while employees take personal steps to reduce stress."},
{q:"Who should take continuing education classes to keep up with changes in tax regulations?", opts:["Gwen Colbert, Accounts Receivable Supervisor","Paul Stanton, Corporate Security Advisor","Martha Winters, Certified Public Accountant","Carlos Ramirez, Product Acquisition Manager"], ans:2, exp:"CPAs work with financial data and need to keep up with changing regulations including taxes. Security advisors, AR supervisors, and product-acquisition managers don't typically require extensive knowledge of tax regulation changes."},
{q:"Who typically has the greatest influence on a company's corporate governance?",opts:["Chief financial officer","Shareholders","Board of directors","HR director"],ans:2,exp:"The board of directors is the primary influence on corporate governance, making important decisions selected by shareholders."},
{q:"Who typically reviews and approves the guidelines for running a corporation, also known as corporate governance policies?",opts:["The management team","The shareholders","The board of directors","The investors"],ans:2,exp:"A corporation's board of directors is responsible for approving and reviewing corporate governance policies. Shareholders, management, and investors are affected by these rules but don't approve them."},
{q:"Why are financial institutions using tokenization?",opts:["To protect online transactions","To overcome government-regulated quotas","To provide incentives for increased investing","To create credit cards"],ans:0,exp:"Tokenization substitutes a random number for an account number to process transactions online, protecting customer data from fraud."},
{q:"Why are there no specific rules for workers to follow in treating others fairly?",opts:["Businesses object to having rules.","Every workplace is different.","Workers know how to be fair.","Rules are difficult to remember."],ans:1,exp:"There are no hard-and-fast fairness rules because every workplace is different, and each group of workers is different. Workers need training or policies since most people don't automatically know how to be fair."},
{q:"Why do active listeners paraphrase what a speaker has said?",opts:["To help the listeners recognize the speaker's nonverbal cues","To help the speaker learn how to speak more clearly","To show that they agree with the speaker's message","To confirm the speaker's message and show understanding"],ans:3,exp:"Paraphrasing confirms the speaker's message and demonstrates understanding. It does not necessarily indicate agreement."},
{q:"Why do finance professionals continue to act unethically despite the consequences?",opts:["They are greedy and only care about money","The finance field is full of temptations and pressures to be unethical","They are always rewarded for unethical behavior","There are no legal consequences for unethical actions"],ans:1,exp:"The finance field is full of temptations and pressures to engage in unethical behavior. Financial professionals face a wide range of ethical dilemmas."},
{q:"Why do many people pursue finance careers?",opts:["Careers in finance are typically easier than other careers.","There is a positive outlook for finance careers.","Finance careers generally have small salaries.","Finance careers do not require much education or training."],ans:1,exp:"A positive career outlook is a primary attraction of finance careers. Finance careers generally have large salaries and do require significant education and training."},
{q:"Why do some companies decide against using variance analysis?",opts:["Real causes cannot be correctly identified.","Horizontal analysis requires much less time.","Variance analysis is not based on real, tangible data.","Variance analysis involves too much of a time delay."],ans:3,exp:"Variance analysis is based on monthly reports, creating a time delay that some businesses find too slow to correct problems quickly. Real causes can be uncovered with careful analysis."},
{q:"Why do stock prices tend to fall during a recession?",opts:["Sponsorships become more common","Unemployment decreases","Profits are expected to drop","Bonds are a less stable investment"],ans:2,exp:"During a recession, profits are generally anticipated to drop, making stocks less valuable."},
{q:"Why does Dan order extra copy paper, post-it notes, and printer ink when placing supply orders?", opts:["To ensure product quality","To prevent stockouts","To meet minimal expectations","To reduce the need to forecast"], ans:1, exp:"Safety/buffer stock is extra inventory ordered to prevent stockouts. When supplies run out, employees can't perform their jobs. Dan would order exactly what's needed if only meeting minimal expectations. Extra stock doesn't ensure quality or reduce the need to forecast."},
{q:"Why has online technology's use increased in financial-information management?",opts:["Removal of electronic information exchange procedures","Passage of laws that recognize electronic documents as legally binding","Recognition that security of transactions is no longer an issue","Protection of customers' right to privacy"],ans:1,exp:"As businesses became more comfortable with electronic information, passage of laws recognizing electronic documents and signatures as legally binding encouraged adoption."},
{q:"Why is it a bad idea to solicit fake reviews for a product or service?",opts:["If customers realize the reviews are fake, they will lose trust in the company","People can never tell which reviews are fake","Fake reviews lead to an influx of purchases and profit","Customers rarely believe peer reviews anyway"],ans:0,exp:"Trust is integral to the customer-company relationship. If customers discover fake reviews, they're unlikely to ever use the company's products or services."},
{q:"Why is it important for a business to keep its selling area neat and clean?",opts:["To please vendors","To satisfy inspectors","To attract customers","To interest employees"],ans:2,exp:"Customers prefer to shop at businesses that are clean and neat. Keeping the selling area in good condition promotes an image that appeals to customers and encourages them to buy."},
{q:"Why is it important for a businessperson to adapt their behavior to the customs and mannerisms of the country they are visiting?",opts:["It shows the businessperson does not care too much about their own native culture","It is a sign of respect that can improve relations among businesspeople of different cultures","It is a display of authority that can lead to increased cooperation","It is proof that the businessperson is intelligent and should be trusted"],ans:1,exp:"Adapting to cultural norms shows respect for that culture, leading to positive relations and increasing the likelihood of a business partnership."},
{q:"Why is it important for a person pursuing any business career to develop self-confidence?",opts:["The business field is very competitive","Managing others requires leadership skills","It helps a person become trustworthy","Complex financial concepts are challenging"],ans:0,exp:"Self-confidence helps people handle setbacks and persist toward career goals in a competitive field."},
{q:"Why is it important for businesses to keep accurate accounts-receivable information?",opts:["To evaluate interest rates","To forecast sales","To classify stocks","To monitor aging accounts"],ans:3,exp:"Accounts receivable affect the business's cash flow and ability to pay employees and creditors. Businesses should implement follow-up procedures to contact customers with delinquent or aging accounts."},
{q:"Why is it important for businesses to manage employee information in a way that keeps it secure?",opts:["To beat the competition","To be secretive","To be ethical","To avoid publicity"],ans:2,exp:"Businesses have an ethical obligation to protect confidential employee and customer information from becoming public and causing harm."},
{q:"Why is it important for individuals to periodically validate their credit histories?",opts:["To avoid being denied credit","To understand credit laws","To find out about different types of credit","To protect themselves from slander"],ans:0,exp:"Inaccurate or false information may appear in a credit history and result in being denied credit. Individuals should review their credit reports and contact credit bureaus to fix inaccurate information."},
{q:"Why is it important for speakers to rehearse an oral presentation?",opts:["Rehearsing provides the speaker with verbal feedback from the intended audience.","Rehearsing encourages the speaker to develop notes for the presentation.","Rehearsing allows the speaker to analyze the accuracy of the message content.","Rehearsing helps the speaker improve the delivery of the message."],ans:3,exp:"Rehearsing provides an opportunity to ensure appropriate pitch, monitor nonverbal behavior, time the presentation, and decide what revisions are needed before the final event."},
{q:"Why is it important to determine the root cause of variances?",opts:["To increase sales","To figure out where to allocate costs","To make the appropriate adjustments","To weigh costs vs. benefits"],ans:2,exp:"Identifying the root cause of a variance is necessary to make the right adjustments. Without knowing the true cause, corrections will be ineffective."},
{q:"Why is the choice of a risk measure for internal and external risk of great practical importance?",opts:["It determines the maximum number of clients that can be served","It determines the minimum reserve requirements in financial trading","It identifies the types of risks the institution will encounter","It designates the audience for resulting financial reports"],ans:1,exp:"Different risk measures can result in lower or higher minimum reserve requirements, directly affecting the financial institution's profit."},
{q:"Why is the choice of a risk measure for internal and external risk of great practical importance?",opts:["It determines the minimum reserve requirements in financial trading.","It determines the maximum number of clients that can be served effectively by a financial institution.","It identifies the types of risks that the financial institution will encounter.","It designates the audience that will receive the resulting financial reports."],ans:0,exp:"Different measures can result in a lower or higher minimum reserve requirement, which results in a lower or higher profit for the financial institution—making the choice of risk measure very important."},
{q:"Why is the performance of the stock market used as a leading indicator of the business cycle?",opts:["Investors tend to sell stocks during an economic contraction and buy during recovery","Investors tend to buy during an economic contraction and sell during recovery","Stock market performance accurately represents the financial health of the economy","Investors use the stock market as a safe way to avoid inflation for the short term"],ans:0,exp:"Stock market is a leading indicator because investors exit stocks during contraction and buy during recovery, affecting overall market movements."},
{q:"Why might a company decide to use computer-aided design (CAD)?",opts:["It increases time spent designing products.","It is a fast way of manufacturing the product.","It controls and orders stock.","It is cheaper than producing a physical prototype."],ans:3,exp:"CAD saves time and money compared to creating physical prototypes. It's a design tool — not a manufacturing method. Stock control and ordering require different software (inventory management)."},
{q:"Why might group members prefer to use an informal method of consensus building?",opts:["Group members wish to avoid arguing.","The subject matter is controversial.","It allows for face-to-face interaction.","There is more paperwork involved."],ans:2,exp:"Group members prefer informal consensus building because it allows for face-to-face interaction. When the subject matter is controversial, a formal method is more appropriate."},
{q:"Why should an independent consultant avoid using email to share a negative IT company evaluation with a client?",opts:["Using email creates reputational risk if it is shared with others","It is illegal to share negative information via email","The email would legally be considered intentional slander","The email would make them appear negative and judgmental"],ans:0,exp:"Email can easily be intercepted and shared."},
{q:"Why should managers know how to do the work of the workers they supervise?",opts:["To create a team spirit among employees","To establish a chain of command","To have realistic expectations for workers","To coordinate employees' efforts"],ans:2,exp:"Knowing the jobs of workers they supervise helps managers know how work should be done and be realistic about the amount of work they expect workers to complete."},
{q:"Why will it benefit you to learn as much as possible about a prospective employer before a job interview?",opts:["It prepares you to ask good questions","It shows that you do a lot of reading","It ensures that you'll be considered for the job","It gives you something to discuss during the interview"],ans:0,exp:"Research prepares you to ask intelligent questions, demonstrating your interest. It doesn't guarantee consideration or dictate what the interviewer discusses."},
{q:"Why would a bank examine a business's balance sheet?",opts:["To determine whether the company qualifies for additional credit","To determine whether to declare the company bankrupt","To meet its oversight responsibilities of the business community","To recognize its most profitable customers"],ans:0,exp:"By examining the balance sheet, banks determine what a business owns and what it owes. If insufficient assets exist, the bank will likely avoid loaning money to the business."},
{q:"Why would a financial advisor use standard deviation to evaluate an investment?",opts:["To find the range","To understand potential risk","To determine the average price","To solve for mode"],ans:1,exp:"Standard deviation measures differences from the mean. A high standard deviation indicates more volatility—greater potential risk—in an investment."},
{q:"William notices most numbers in his database start with 1 while very few begin with 9. This is an example of:",opts:["The law of supply and demand","Benford's law","Numerical law","The law of diminishing returns"],ans:1,exp:"Benford's law states that in large sets of numerical data, numbers beginning with lower digits occur more frequently than those beginning with higher digits."},
{q:"With an effective customer strategy, a business can increase revenues by:",opts:["Providing products and services customers want","Prioritizing new customers over existing customers","Helping sales staff close deals at a slower pace","Prioritizing existing customers over new customers"],ans:0,exp:"An effective CRM strategy helps businesses identify customer needs, making it easier to provide exactly what customers want, increasing revenues."},
{q:"Without accurate financial records, it is difficult to demonstrate __________ to __________.",opts:["Incentives; tax collectors","Product specifications; vendors","Product benefits; customers","Profitability; investors"],ans:3,exp:"Accurate financial records demonstrate a business's profitability to potential investors who want assurance before financing the company."},
{q:"Wonka Industries runs routine internal audits and divides responsibilities among managers. This is an example of the impact of __________ on decision-making and management functions.",opts:["Community involvement","External regulations","Corporate governance processes","Public relations efforts"],ans:2,exp:"Internal corporate governance processes—like audits and segregation of duties—ensure smooth operations, clarify chains of command, and measure performance."},
{q:"Writing a letter to your grandparent is an example of:",opts:["verbal communication.","nonverbal communication.","body language.","speech."],ans:0,exp:"Verbal communication is the exchange of information using words, including both writing and speech. Writing uses words, so it is verbal (not nonverbal) communication."},
{q:"Written communication tends to be more formal than other methods because it:",opts:["Is the preferred method of communication for all jobs","Is always composed of facts, not opinions","Is always used by knowledgeable people","Allows individuals to organize their thoughts meaningfully"],ans:3,exp:"Written communication allows individuals to collect and organize their thoughts in a meaningful and purposeful way, making it more formal than verbal communication."},

let pileX = []; // mastered (indices)
let pileY = []; // review (indices)
let pileU = []; // unseen (indices)
let current = null; // current question index
let answered = false;
let queue = []; // current working queue
let queueSource = ''; // 'unseen' or 'review'

const STORAGE_KEY = 'deca-quiz-state-v1';

function saveState() {
  const state = {
    pileX,
    pileY,
    pileU,
    current,
    queue,
    queueSource
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function loadState() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return false;
  try {
    const state = JSON.parse(raw);
    if (!state || !Array.isArray(state.pileX) || !Array.isArray(state.pileY) || !Array.isArray(state.pileU)) return false;
    pileX = state.pileX;
    pileY = state.pileY;
    pileU = state.pileU;
    current = state.current;
    queue = state.queue || [];
    queueSource = state.queueSource || 'unseen';
    return true;
  } catch {
    return false;
  }
}

function initPiles() {
  if (!loadState()) {
    pileX = [];
    pileY = [];
    pileU = ALL_QUESTIONS.map((_, i) => i);
    buildQueue();
    saveState();
  }
}

function buildQueue() {
  // Prefer unseen, but if empty use pileY
  if (pileU.length > 0) {
    queue = shuffle([...pileU]);
    queueSource = 'unseen';
  } else if (pileY.length > 0) {
    queue = shuffle([...pileY]);
    queueSource = 'review';
  } else {
    // All mastered—shouldn't happen but just in case
    queue = shuffle([...pileX]);
    queueSource = 'mastered';
  }
  saveState();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function nextQuestion() {
  if (queue.length === 0) {
    // Round complete—show message then rebuild
    showRoundComplete();
    return;
  }
  current = queue.shift();
  render();
}

function render() {
  const q = ALL_QUESTIONS[current];
  const total = ALL_QUESTIONS.length;
  const done = pileX.length + pileY.length + (ALL_QUESTIONS.length - pileU.length - pileX.length - pileY.length);

  document.getElementById('count-x').textContent = pileX.length;
  document.getElementById('count-y').textContent = pileY.length;
  document.getElementById('count-u').textContent = pileU.length;

  const progress = pileX.length / total;
  document.getElementById('progress-bar').style.width = `${progress * 100}%`;

  const src = queueSource === 'review' ? ' · Reviewing Incorrect' : queueSource === 'mastered' ? ' · All Mastered!' : '';
  document.getElementById('meta').textContent = `Question from ${queueSource === 'review' ? 'Review Pile' : queueSource === 'mastered' ? 'Mastered Pile' : 'Unseen Pile'}${src}`;

  document.getElementById('question').textContent = q.q;
  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.opts.forEach((o, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.textContent = `${['A','B','C','D'][i]}. ${o}`;
    btn.onclick = () => choose(i);
    opts.appendChild(btn);
  });
  document.getElementById('explanation').style.display = 'none';
  document.getElementById('wrong-choice-note').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';
  answered = false;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const q = ALL_QUESTIONS[current];
  const btns = document.querySelectorAll('.opt');
  btns.forEach(b => b.disabled = true);
  const correct = q.ans;
  btns[correct].classList.add('correct');

  const exp = document.getElementById('explanation');

  if (i === correct) {
    // Move to pile X
    pileU = pileU.filter(x => x !== current);
    pileY = pileY.filter(x => x !== current);
    if (!pileX.includes(current)) pileX.push(current);

    exp.className = '';
    exp.style.display = 'block';
    exp.innerHTML = `<strong>✓ Correct → Mastered Pile.</strong> ${q.exp}`;
    document.getElementById('wrong-choice-note').style.display = 'none';
  } else {
    btns[i].classList.add('wrong');

    // Move to pile Y
    pileU = pileU.filter(x => x !== current);
    pileX = pileX.filter(x => x !== current);
    if (!pileY.includes(current)) pileY.push(current);

    // Show why chosen answer is wrong
    const wrongNote = document.getElementById('wrong-choice-note');
    wrongNote.style.display = 'block';
    wrongNote.innerHTML = `<strong>You chose: ${['A','B','C','D'][i]}. ${q.opts[i]}</strong> — This is incorrect.`;

    exp.className = 'wrong-exp';
    exp.style.display = 'block';
    exp.innerHTML = `<strong>✗ Incorrect → Review Pile.</strong> Correct answer: <strong>${['A','B','C','D'][correct]}. ${q.opts[correct]}</strong><br><br>${q.exp}`;
  }

  document.getElementById('count-x').textContent = pileX.length;
  document.getElementById('count-y').textContent = pileY.length;
  document.getElementById('count-u').textContent = pileU.length;
  document.getElementById('progress-bar').style.width = `${(pileX.length / ALL_QUESTIONS.length) * 100}%`;

  document.getElementById('next-btn').style.display = 'inline-block';
  saveState();
}

function showRoundComplete() {
  document.getElementById('quiz-screen').style.display = 'none';
  const rc = document.getElementById('round-complete');
  rc.style.display = 'block';

  if (pileU.length === 0 && pileY.length === 0) {
    document.getElementById('round-title').textContent = 'All Questions Mastered!';
    document.getElementById('round-sub').textContent = `You've mastered all ${ALL_QUESTIONS.length} questions! Keep reviewing to stay sharp.`;
    document.getElementById('continue-btn').textContent = 'Review All Again →';
  } else if (pileU.length === 0) {
    document.getElementById('round-title').textContent = 'All Unseen Questions Done!';
    document.getElementById('round-sub').textContent = `Mastered: ${pileX.length} | Review pile: ${pileY.length} questions to retry.`;
    document.getElementById('continue-btn').textContent = 'Start Review Pile →';
  } else {
    document.getElementById('round-title').textContent = 'Review Round Complete!';
    document.getElementById('round-sub').textContent = `Mastered: ${pileX.length} | Still in review: ${pileY.length} | Unseen: ${pileU.length}`;
    document.getElementById('continue-btn').textContent = 'Continue →';
  }
  saveState();
}

document.getElementById('next-btn').onclick = () => {
  nextQuestion();
  saveState();
};

document.getElementById('continue-btn').onclick = () => {
  document.getElementById('round-complete').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';

  if (pileU.length === 0 && pileY.length === 0) {
    pileX = [];
    pileU = ALL_QUESTIONS.map((_, i) => i);
  }
  buildQueue();
  nextQuestion();
  saveState();
};

initPiles();
nextQuestion();
</script>
