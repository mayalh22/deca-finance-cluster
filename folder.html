<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DECA Finance Quiz</title>
<style>
  :root {
    --color-green: #009b47;
    --color-green-dark: #007a38;
    --color-red: #c0392b;
    --color-red-dark: #a93226;
    --color-blue: #152238;
    --color-grey: #888;
    --color-grey-light: #e0e0e0;
    --color-grey-lighter: #f0f0f0;
    --color-grey-dark: #555;
    --color-white: #fff;
    --color-green-bg: #e6f9ef;
    --color-red-bg: #fff0f0;
    --color-green-bg-light: #f0fff6;
    --color-red-bg-light: #fff5f5;
    --color-grey-border: #ccc;
    --color-explanation-bg: #f7f7f7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Roboto', sans-serif; background: var(--color-white); color: var(--color-blue); min-height: 100vh; }
  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
  #app { max-width: 720px; margin: 0 auto; padding: 40px 24px; }
  #progress-bar-wrap { background: var(--color-grey-light); height: 4px; border-radius: 2px; margin-bottom: 32px; }
  #progress-bar { background: var(--color-green); height: 4px; border-radius: 2px; transition: width 0.3s; }
  #meta { font-size: 13px; color: var(--color-grey); margin-bottom: 20px; font-weight: 500; letter-spacing: 0.5px; }
  #pile-info { font-size: 13px; color: var(--color-grey-dark); margin-bottom: 12px; display: flex; gap: 16px; }
  .pile-badge { padding: 3px 10px; border-radius: 12px; font-weight: 700; font-size: 12px; }
  .pile-x { background: var(--color-green-bg); color: var(--color-green); border: 1px solid var(--color-green); }
  .pile-y { background: var(--color-red-bg); color: var(--color-red); border: 1px solid var(--color-red); }
  .pile-u { background: var(--color-grey-lighter); color: var(--color-grey); border: 1px solid var(--color-grey-border); }
  #question { font-size: 18px; font-weight: 500; line-height: 1.5; margin-bottom: 28px; color: var(--color-blue); }
  .opt { display: block; width: 100%; text-align: left; background: var(--color-white); border: 2px solid var(--color-grey-light); color: var(--color-blue); padding: 14px 18px; margin-bottom: 10px; font-size: 15px; font-family: 'Roboto', sans-serif; cursor: pointer; border-radius: 4px; transition: border-color 0.15s; }
  .opt:hover:not(:disabled) { border-color: var(--color-green); }
  .opt.correct { border-color: var(--color-green); background: var(--color-green-bg-light); color: var(--color-blue); }
  .opt.wrong { border-color: var(--color-red); background: var(--color-red-bg-light); color: var(--color-blue); }
  .opt:disabled { cursor: default; }
  #explanation { display: none; background: var(--color-explanation-bg); border-left: 4px solid var(--color-green); padding: 16px 18px; margin-top: 20px; font-size: 14px; line-height: 1.6; color: #333; border-radius: 0 4px 4px 0; }
  #explanation.wrong-exp { border-left-color: var(--color-red); }
  #wrong-choice-note { display: none; background: var(--color-red-bg-light); border-left: 4px solid var(--color-red); padding: 12px 18px; margin-top: 12px; font-size: 14px; line-height: 1.6; color: #333; border-radius: 0 4px 4px 0; }
  #next-btn { display: none; margin-top: 24px; background: var(--color-green); color: var(--color-white); border: none; padding: 14px 32px; font-size: 15px; font-family: 'Roboto', sans-serif; font-weight: 700; cursor: pointer; border-radius: 4px; letter-spacing: 0.5px; }
  #next-btn:hover { background: var(--color-green-dark); }
  #round-complete { display: none; text-align: center; padding: 60px 0; }
  #round-complete h2 { font-size: 28px; font-weight: 700; color: var(--color-blue); margin-bottom: 8px; }
  #round-complete p { font-size: 16px; color: var(--color-grey-dark); margin-bottom: 32px; }
  #continue-btn { background: var(--color-red); color: var(--color-white); border: none; padding: 14px 36px; font-size: 15px; font-family: 'Roboto', sans-serif; font-weight: 700; cursor: pointer; border-radius: 4px; }
  #continue-btn:hover { background: var(--color-red-dark); }
</style>
</head>
<body>
<div id="app">
  <div id="quiz-screen">
    <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
    <div id="pile-info">
      <span class="pile-badge pile-x">✓ Mastered: <span id="count-x">0</span></span>
      <span class="pile-badge pile-y">✗ Review: <span id="count-y">0</span></span>
      <span class="pile-badge pile-u">? Unseen: <span id="count-u">0</span></span>
    </div>
    <div id="meta"></div>
    <div id="question"></div>
    <div id="options"></div>
    <div id="wrong-choice-note"></div>
    <div id="explanation"></div>
    <button id="next-btn">Next →</button>
  </div>
  <div id="round-complete">
    <h2 id="round-title"></h2>
    <p id="round-sub"></p>
    <button id="continue-btn">Keep Going →</button>
  </div>
</div>
<script>
const ALL_QUESTIONS = [
{q:"'Big Q' focuses on:",opts:["improving factory conditions.","exceeding customer expectations.","conforming to specifications.","designing and developing products."],ans:1,exp:"'Big Q' focuses on ingraining quality into every aspect of the organization to meet and exceed customer expectations. 'Little Q' focuses on conforming to specifications."},
{q:"A bank carefully analyzes a customer's current level of debt before it approves a(n):", opts:["Operating proposal","Loan application","Service request","Insurance claim"], ans:1, exp:"Banks consider current debt levels, credit history, credit scores, assets, income, and employment status before granting loans. Banks don't analyze debt levels before service requests or operating proposals. Insurance claims are filed with insurance agencies."},
{q:"A basic principle of procedural due process involves __________ before taking action.", opts:["Awarding damages","Obtaining witnesses","Providing notice","Creating evidence"], ans:2, exp:"Due process requires that individuals be notified of accusations or lawsuits (providing notice). Obtaining witnesses is a pretrial activity, awarding damages is a possible remedy, and creating evidence is not part of due process."},
{q:"A basic reason for the formation of a trade association is to:",opts:["Promote goodwill for an industry","Provide information for consumers","Find solutions for common problems","Establish a long-term group"],ans:2,exp:"Trade associations collectively find solutions to common problems members might have difficulty handling individually. They share knowledge to increase profitability for all members."},
{q:"A benefit of enterprise risk management is that it gives companies the opportunity to:",opts:["Consider risks in a positive way","Focus on risks by department","Respond to events as they happen","Take a reactive approach to problem-solving"],ans:0,exp:"ERM focuses on both the downside and upside of risks, allowing businesses to take advantage of calculated risks for growth. Focusing by department and reacting are traditional risk management approaches."},
{q:"A benefit of informed decisions is that they:",opts:["Reduce a business's risk","Are usually bad decisions","Cost less money","Hurt a business's chances at competing"],ans:0,exp:"Informed decisions are better decisions that reduce a business's risk and help businesses compete more effectively."},
{q:"A benefit of using technology in compliance is:",opts:["Less need for procedures and policies","Better risk management","Lower cost of implementing compliance","Decreased transparency"],ans:1,exp:"Compliance technology facilitates better risk communication and transparency, helping companies prepare for likely risks. It does not reduce need for policies or necessarily lower costs."},
{q:"A brokerage firm must implement new financial reporting activities due to regulation changes. What positive action helps employees adapt?", opts:["Hire employees knowledgeable about the regulations","Survey employees about their opinions on the changes","Revise the firm's vision statement to include regulatory importance","Educate and train employees about the regulatory changes"], ans:3, exp:"Training and education help employees understand changes so they can effectively transition to new ways of doing things. Surveys, vision statement revisions, and hiring won't directly help existing employees adapt."},
{q:"A budgeting software feature that connects directly to bank accounts to automatically download expense information is commonly known as automatic:",opts:["Tracking","Affirmation","Alerts","Backup"],ans:0,exp:"Automatic tracking transmits expense information from the bank to the budgeting application without human intervention. Alerts remind users of upcoming payments; backup saves files."},
{q:"A business aims to build a culture of trust and accountability. What is the most effective way to involve employees in achieving this goal?",opts:["Limit employee access to information to prevent potential leaks","Reward employees for sharing coworkers' unethical actions in meetings","Encourage open communication and feedback among team members and management","Implement a strict surveillance system to monitor employee behavior"],ans:2,exp:"Direct and open communication is the foundation for a system of trust and accountability."},
{q:"A business buying specific products from a vendor that delivers at predetermined times and guarantees a set price for one year is an example of the __________ purchasing method.",opts:["Competitive-bid","Lowest-bidder","Standing-order","Blank-check"],ans:2,exp:"The standing-order method involves a vendor automatically delivering a predetermined amount at a predetermined time for a guaranteed price, with no need to call each time."},
{q:"A business can protect its computerized financial data from losses associated with fire, flood, and electrical outages by:",opts:["Performing backup procedures on a regular basis","Installing intrusion detection systems","Changing passwords and encryption techniques periodically","Implementing a manual filing system"],ans:0,exp:"Regular backups stored off-site protect against loss from uncontrollable circumstances like fire, floods, or electrical outages."},
{q:"A business can protect its confidential computer information from unauthorized users by:", opts:["Developing Internet message boards","Encrypting computer files","Conducting annual virus scans","Classifying business data"], ans:1, exp:"Encryption transforms information into a secret code that only authorized individuals can read—protecting confidential files from unauthorized internal and external access. Annual virus scans are insufficient (should be continuous). Message boards and classifying data don't protect against unauthorized access."},
{q:"A business determines how much it costs to make a product and then adds a predetermined markup to set its selling price. This is an example of:",opts:["price-based costing.","economies of scale.","cost-based pricing.","gross profit."],ans:2,exp:"Cost-based pricing involves determining production costs and adding a predetermined markup. Price-based costing works in reverse — starting with what customers will pay."},
{q:"A business has added automation to its assembly line process. This is most likely an example of:",opts:["Invention","Innovation","Creativity","Problem-solving"],ans:1,exp:"Innovation involves developing something new or improving something existing. Adding automation improves the efficiency of an existing assembly line."},
{q:"A business letter that presents its message in as few words as possible would be described as having:",opts:["Clarity","Conciseness","Courtesy","Completeness"],ans:1,exp:"Conciseness means being specific and brief, eliminating unnecessary words. Clarity means easily understood; completeness means containing all pertinent information."},
{q:"A business might conduct a compliance audit to:",opts:["Develop efficient production processes","Manipulate financial data to indicate profitability","Ensure that it is following government regulations","Evaluate its vendors' performance"],ans:2,exp:"Compliance audits ensure a business follows all government regulations and can detect discrepancies needing correction."},
{q:"A business owner is concerned employees may be using company credit cards for personal purchases. Which data mining technique should be used to identify questionable transactions monthly?", opts:["Nearest-neighbor method","Decision trees","Artificial neural networks","Dashboards"], ans:2, exp:"Artificial neural networks review financial records to identify possible errors and questionable entries—ideal for detecting unusual credit card transactions. Decision trees classify data and build models. The nearest-neighbor method classifies records according to similar historical data. Dashboards display summarized performance data."},
{q:"A business periodically moves its employees from one department to another to boost morale and combat boredom. This is an example of:",opts:["task specialization.","task interdependency.","job rotation.","job security."],ans:2,exp:"Job rotation involves periodically moving employees between jobs to broaden perspective, boost morale, reduce boredom, and cross-train as backup resources."},
{q:"A business purchases $4,250 worth of supplies with invoice terms of 2/15, n/30. What amount will an employee save by paying within 15 days?",opts:["$90","$80","$85","$95"],ans:2,exp:"2/15 means a 2% discount for payment within 15 days: $4,250 × 0.02 = $85 in savings."},
{q:"A business risks losing its good reputation if it:",opts:["Provides accurate information to stockholders","Encourages employees to report questionable behavior","Uses questionable tactics to achieve profitability","Requires new suppliers to provide credit information"],ans:2,exp:"Continuously using questionable tactics may get a business a poor reputation, causing customers to shop elsewhere. The other options are ethical actions."},
{q:"A business selects specific characteristics about its customers and uses software to group their buying behaviors. What data mining technique is the business using?",opts:["Statistical","Organic","Clustering","Primary"],ans:2,exp:"Clustering involves selecting characteristics and having data mining software group/cluster data into appropriate categories for analysis. Organic and primary are not data mining techniques."},
{q:"A business that gives customers detailed privacy policies explaining how it protects their information is addressing a legal issue associated with:",opts:["The company's public relations","Federal government security","Customers' constitutional rights","Information management"],ans:3,exp:"Governments regulate businesses to protect customer privacy. Providing privacy policies addresses legal issues associated with information management."},
{q:"A business uses benchmarking applications when it wants to:",opts:["Determine taxes owed to the federal government","Measure the amount of time it needs to convert assets into cash","Calculate dividends to be paid to stockholders","Compare its performance with other companies in the industry"],ans:3,exp:"Benchmarking provides comparison points against other specific companies or industry standards, helping businesses see how they measure up."},
{q:"A business uses its computer system to search for customers who meet a set of criteria related to sales to identify who is most likely to buy $100,000 in products next year. What process is the business using?",opts:["Accounting","Data mining","Surveying","Industry forecasting"],ans:1,exp:"Data mining is the process of searching computer databases to look for patterns and correlations. Businesses use it to find answers to questions and identify customers with the highest buying potential."},
{q:"A business's balance sheet lists $3,800 in cash, $15,125 in accounts payable, $2,775 in taxes, $10,350 in machinery and equipment, and $6,280 in salaries. Calculate the business's total liabilities.",opts:["$27,030","$18,470","$15,225","$24,180"],ans:3,exp:"Total liabilities = accounts payable + taxes + salaries = $15,125 + $2,775 + $6,280 = $24,180. Cash and machinery are assets, not liabilities."},
{q:"A business's philanthropic responsibility involves its contributions to:",opts:["political campaigns.","charity.","scientific research.","the economy."],ans:1,exp:"Philanthropic responsibility involves a business's contributions to charity. It is part of a business's overall social responsibility."},
{q:"A car manufacturer discovers its cars have a defect that could harm consumers. Which action would be most ethical?",opts:["Issue a recall immediately, even if it is costly","Increase marketing efforts to distract from negative publicity","Do nothing and hope the defect goes unnoticed","Downplay the defect when asked about it publicly"],ans:0,exp:"Ethics in risk management prioritizes the safety and well-being of stakeholders over financial considerations. The most ethical action would be to issue a recall immediately."},
{q:"A cell phone company is focusing on communicating with customers and putting its products in an accessible location. What two marketing elements is it prioritizing?",opts:["Promotion and product","Promotion and place","Place and price","Price and product"],ans:1,exp:"Promotion involves communicating with customers; place involves making products accessible. Product and price are not indicated in this scenario."},
{q:"A CEO was involved in a scandal and forced to resign. The board issued a public statement condemning the CEO's actions. What is the primary purpose of the board's statement?",opts:["To reassure stakeholders about the company's commitment to ethical practices","To maintain the secrecy of the ongoing internal investigation","To profit from the increased publicity caused by the scandal","To comply with law enforcement officers while they investigate the scandal"],ans:0,exp:"By calling the CEO's actions unethical, the board is sending a message to the public that the CEO does not represent the company's values, reassuring stakeholders."},
{q:"A certificate of deposit is a short-term debt security that is sold through __________ markets.",opts:["Commodities","Money","Modified","Capital"],ans:1,exp:"Money markets facilitate buying and selling of short-term, low-risk financial products such as treasury bills and certificates of deposit."},
{q:"A characteristic of a simple written report is that it usually is:",opts:["abstract.","formal.","short.","detailed."],ans:2,exp:"Simple written reports present basic information in an abbreviated form so recipients can read it quickly. They are informal, address issues simply, and provide basic rather than detailed information."},
{q:"A characteristic of managerial accounting is that it focuses on:",opts:["reporting the business's long-term investment goals.","capturing the business's day-to-day financial activities.","developing the business's annual report.","preparing and submitting the business's tax forms."],ans:1,exp:"Managerial accounting focuses on capturing, maintaining, and interpreting accounting information for internal use and decision making—including day-to-day financial activities."},
{q:"A Chilean businessperson said 'Hello, Mr. Winchester. I'm happy to see your feet' instead of a proper English greeting. This is an example of a cultural issue related to:", opts:["Spatial differences","Offensive gestures","Inappropriate gift-giving","Language translation"], ans:3, exp:"Incorrect translations are embarrassing and may offend foreigners. Gestures are nonverbal actions. Gift-giving may be viewed as bribery in some cultures. Spatial issues involve personal space during interpersonal interaction."},
{q:"A claims adjuster is most likely to work within which area of the finance industry?",opts:["Securities and investments","Corporate finance","Insurance","Banking services"],ans:2,exp:"Claims adjusters work in the insurance industry, which protects individuals and businesses from financial losses through risk transfer."},
{q:"A clothing manufacturer builds quality into its operating system, placing responsibility on each employee. This process is known as quality:",opts:["Inspection","Guarantee","Delivery","Assurance"],ans:3,exp:"Quality assurance prevents defective products from being created. Quality inspection checks for defects after production—it doesn't build quality into the process."},
{q:"A clothing manufacturer is comparing the benefits and costs of expanding its operations by adding another product line. This is an example of a __________ analysis.",opts:["SWOT","Feasibility","Marginal","Cash flow"],ans:2,exp:"A marginal analysis is the process of comparing the marginal benefit to the marginal cost to determine if adding one extra unit is worth it for a business."},
{q:"A commodities market is a marketplace for buying and selling:",opts:["Government bonds","Financial securities","Shares of companies","Raw or primary products"],ans:3,exp:"A commodity market is where individuals and companies buy and sell raw goods (commodities) such as oil, gold, and rubber."},
{q:"A company analyzing data from past holiday sales to make decisions about product release dates is using __________ analytics.",opts:["Big data","Predictive","Prescriptive","Descriptive"],ans:1,exp:"Predictive analytics uses historical data to predict future behavior. Analyzing past holiday sales to forecast release dates is predictive."},
{q:"A company budgeted $20,000 for monthly sales but only earned $16,000. When conducting a variance analysis, what is the variance?",opts:["$4,000","$36,000","$16,000","$20,000"],ans:0,exp:"Variance is the difference between the budgeted and actual amounts: $20,000 − $16,000 = $4,000."},
{q:"A company buys a water cooler and divides the cost between departments that use it. This is known as cost:",opts:["Combination","Divination","Allocation","Activation"],ans:2,exp:"Cost allocation divides a cost between several cost objects (departments). The water cooler cost is allocated to the departments that use it."},
{q:"A company cancels its annual conference because of expected snowstorms that could endanger attendees' flights. The company __________ the risk of a plane crash.",opts:["Avoided","Retained","Controlled","Transferred"],ans:0,exp:"Sometimes the best way to handle a risk is to simply avoid it. Cancelling the conference and ensuring attendees don't fly at all avoids the plane-crash risk altogether."},
{q:"A company discovers its data storage practices do not comply with privacy laws. How should the company best respond?",opts:["Delay making any changes until customers report a breach","Lobby for the consumer privacy laws to be changed","Immediately change its practices to comply with the law","Deny any wrongdoing and keep its practices consistent"],ans:2,exp:"Legal considerations in risk management require adherence to the law. By immediately changing its practices, the company demonstrates accountability."},
{q:"A company does not emphasize fairness and respect. Which risk is most likely to occur?",opts:["Employees will be at risk of injury","Unhappy employees might leave the company","The company might go bankrupt","Important details might slip through the cracks"],ans:1,exp:"When employees feel treated unfairly, they may not want to continue contributing. Employee turnover presents many problems."},
{q:"A company implementing ERM has placed a keypad at the entry of a sensitive area as an internal control measure. This is an example of __________ control.",opts:["Quality","Preventative","Self","Detective"],ans:1,exp:"Preventative internal controls stop something before it happens (a keypad prevents unauthorized entry). Detective controls recognize when something has happened (an alarm after a breach)."},
{q:"A company in which each department performs separate functions with its own budget and staff has an organizational structure based on __________ interdependence.",opts:["Reciprocal","Sequential","Pooled","Mutual"],ans:2,exp:"Pooled interdependence is the lowest form where departments operate with little to no interaction and are largely independent."},
{q:"A company installs automatic sprinklers in all its facilities. Which technique is used to combat the internal threat of fire?", opts:["Loss reduction","Loss avoidance","Loss prevention","Risk transfer"], ans:0, exp:"Loss reduction lessens the impact of a loss after it occurs—sprinklers won't prevent fires but minimize damage when they occur. Loss avoidance means not engaging in risky activity. Loss prevention stops losses from occurring. Risk transfer involves purchasing insurance."},
{q:"A company is choosing between two CRM software options with different cost structures. Which technique would help determine which is more cost-effective?",opts:["Marginal analysis","Return on investment","Vertical analysis","Sales forecasting"],ans:0,exp:"Marginal analysis compares relevant costs of each alternative to determine the difference in cost, helping make the most cost-effective decision."},
{q:"A company is implementing a virtual audit for the first time. Which would most likely be an advantage of using a virtual audit over a traditional in-person audit?",opts:["Better flexibility in scheduling","Longer implementation time due to the learning curve","Increased rapport with in-person clients","Higher costs due to technology requirements"],ans:0,exp:"Virtual audits have the same goal as a traditional audit but allow for more flexible scheduling because auditors and clients don't need to coordinate around travel logistics."},
{q:"A company is searching for troublesome patterns of events in their financial data, such as abnormalities and duplicate data entries. What compliance technology reasoning process is the company utilizing?",opts:["Comparative","Temporal","Cross-source","Symbolic"],ans:3,exp:"Symbolic reasoning searches for problematic patterns of events in financial data, such as abnormalities, duplicate data entries, incomplete information, etc."},
{q:"A company mailed to 20,000 customers; 3,241 pieces were returned costing $1,100 in postage due to wrong addresses. The company could have avoided this by:", opts:["Paying for express mail instead of bulk-mail","Calling customers a few days before mailing","Requesting alternate addresses from the post office","Continuously updating their customers' contact information"], ans:3, exp:"Continuously updating customer contact information prevents outdated addresses. Calling 20,000 customers is impractical. The post office may not have all forwarding addresses. Express mail would cost even more. The mailing method doesn't fix incorrect addresses."},
{q:"A company manager is making a decision concerning promotional strategy. What managerial accounting technique can assist in the implementation phase of her decision-making process?",opts:["Budgeting expected revenue","Recording and classifying transactions","Comparing results to the budget","Representing plans financially"],ans:1,exp:"Recording and classifying transactions aids implementation. Budgeting assists planning; comparing to budget aids evaluation; representing plans financially is also a planning tool."},
{q:"A company moves manufacturing to another country to pay employees much less. What reason might they use to defend themselves?",opts:["The action is acceptable in a foreign culture","The action is committed by unethical employees","The action is beneficial for employees","The action results in a negative public image"],ans:0,exp:"What is considered unethical in America may be acceptable in another culture, particularly regarding wages and working conditions in developing countries."},
{q:"A company purchases software and divides the cost between two departments that will use it. This is an example of cost:",opts:["Precision","Accumulation","Dividing","Allocation"],ans:3,exp:"Cost allocation assigns costs to cost objects such as departments. Dividing the software cost between departments is cost allocation."},
{q:"A company requires all employees to undergo yearly human resources training focused on respect. How does this demonstrate a well-governed company?",opts:["It promotes a safe workplace","It spreads mental health awareness","It highlights eco-friendly practices","It facilitates a competitive environment"],ans:0,exp:"A company that requires all employees to undergo yearly human resources training on how to be respectful is promoting a safe workplace."},
{q:"A company that wishes to lower its risk management costs might start its own __________ insurance company.",opts:["Medical malpractice","Professional liability","Captive","Compulsory"],ans:2,exp:"A captive insurance company is wholly owned by a parent company and is a form of corporate self-insurance to lower risk management costs."},
{q:"A company uses a new system to share customer data across departments and external stakeholders. This best describes what type of CRM analytics system?",opts:["Collaborative","Analytical","Individualized","Operational"],ans:0,exp:"Collaborative CRM allows organizations to share customer data across internal departments and external stakeholders to enhance the customer experience."},
{q:"A company uses cloud-based software to stay notified of any issues in its supply chain. How does this technology support the company's risk management efforts?",opts:["It mitigates risk by improving the company's ability to respond quickly","It diversifies risk by dividing the supply chain across multiple locations","It eliminates risk by resolving issues the moment they arise","It avoids risk by deconstructing the supply chain entirely"],ans:0,exp:"The cloud-based software mitigates risk by improving the company's ability to respond quickly. There is no way to eliminate risk entirely."},
{q:"A company uses financial software to examine a product's total costs in relation to its selling price. The company is analyzing:",opts:["Stockturn","Liquidity","Profitability","Market value"],ans:2,exp:"Profitability is the money remaining after total costs are deducted from total revenue. Analyzing cost vs. selling price determines if the product generates desired profit."},
{q:"A company uses social media to improve its response time to customer complaints. Doing so helps the company directly:",opts:["Achieve stability","Develop new goods and services","Improve customer satisfaction","Improve profitability"],ans:2,exp:"Faster response to customer complaints directly improves customer satisfaction."},
{q:"A company utilizes customer relationship management data to:",opts:["Increase profits and expenses","Weed out unreliable customers","Be more like its competition","Better understand its customers"],ans:3,exp:"CRM strategies use information about customers and market trends to better understand customers, helping market and sell products while meeting their needs."},
{q:"A company's board of directors frequently provides timely, accurate, and clear information about anticipated risks and financial performance. What ethical principle is demonstrated?",opts:["Fairness","Respect","Accountability","Transparency"],ans:3,exp:"Transparency involves maintaining open and honest communications. Providing timely, accurate, and clear information is a key component of transparency."},
{q:"A company's board of directors is often responsible for __________ and __________ the top executives.",opts:["Encouraging; shadowing","Supporting; assessing","Replacing; auditing","Promoting; networking"],ans:1,exp:"The board of directors hires, supports, and assesses the performance of top executives to ensure organizational goals are met."},
{q:"A company's board of directors is responsible for acting in the best interest of the company's",opts:["Shareholders","Chief executive officer","Chief financial officer","Mid-level managers"],ans:0,exp:"A company's board of directors represents the interests of the shareholders through the board's management of the company."},
{q:"A company's compliance department is designing and implementing controls to protect the company from identified risks. What key function is the compliance department performing?",opts:["Advisory","Identification","Resolution","Prevention"],ans:3,exp:"The prevention function designs and implements controls to protect a company from risks. The resolution function resolves compliance difficulties as they occur."},
{q:"A company's compliance department settles compliance difficulties as they occur. What key function is the department performing?",opts:["Prevention","Advisory","Resolution","Identification"],ans:2,exp:"The resolution function resolves compliance difficulties as they occur. The prevention function designs and implements controls. The advisory function advises on rules."},
{q:"A company's corporate governance is most often impacted by __________ expectations.",opts:["Employee","Digital","Stakeholder","Legal"],ans:2,exp:"Corporate governance structures are influenced by stakeholder expectations (investors, customers, government, etc.)."},
{q:"A company's financial manager explains why the budget needs to be more carefully managed for the good of the business. This is an example of:",opts:["the need for decreased transparency of financial documents.","the importance of adhering to governmental regulations.","the role of confidentiality in financial-information management.","the stewardship function of financial-information management."],ans:3,exp:"Stewardship involves financial managers looking out for the business's best interests through responsible resource management — exactly what this financial manager is doing."},
{q:"A company's full-time employees work overtime until a project is complete. As a result, overall wages go from a __________ cost to a __________ cost.",opts:["Semi-variable; variable","Variable; fixed","Fixed; semi-variable","Semi-fixed; semi-variable"],ans:2,exp:"A set salary is a fixed cost. When overtime is added (a variable amount), the total wages become a semi-variable (fixed + variable) cost."},
{q:"A company's information system server fails, so it resorts to a backup server to avoid stopping operations. Which core concept of risk control does this exemplify?",opts:["Avoidance","Diversification","Duplication","Separation"],ans:2,exp:"Duplication involves creating a backup plan, often by using technology. A company that has a readily available backup server has utilized duplication."},
{q:"A company's manager did not protect confidential information about a conflict between two employees. What is a likely consequence?",opts:["Costly lawsuits","Loss of clients","Damaged workplace environment","Claims of workplace discrimination"],ans:2,exp:"Disclosing employee conflict information damages workplace culture. Employees lose trust in management and may not feel unified or cooperative."},
{q:"A compliance department typically has five areas of responsibility. Which are two of those areas?",opts:["Identification and prevention","Resolution and investigation","Monitoring/detection and discipline","Advisory and complexity"],ans:0,exp:"A compliance department's five areas are identification, prevention, monitoring and detection, resolution, and advisory. Investigation and discipline are not in this list."},
{q:"A contract is unenforceable if it:", opts:["Violates a statute","Is unilateral","Requires collateral","Contains stipulations"], ans:0, exp:"If a contract involves illegal activities, it's unenforceable because it requires breaking laws. Unilateral contracts (promises by one party), contracts requiring collateral, and contracts with stipulations can all be legal if they meet the features of legal contracts."},
{q:"A control that financial institutions have implemented to protect bank accounts when debit cards are used for online transactions is:",opts:["E-invoicing","Malware","PIN debits","Pan-European Public Procurement On-line (PEPPOL)"],ans:2,exp:"PIN debits require customers to provide their PIN in addition to their account number, adding an extra layer of protection for online transactions."},
{q:"A corporation manipulated financial statements to present a more favorable view. Which action should leadership prioritize to address ethical concerns?",opts:["Developing more complex financial reports to obscure the discrepancies","Promoting higher profit margins through aggressive reporting techniques","Focusing solely on complying with laws and regulations","Establishing clear guidelines for accurate reporting"],ans:3,exp:"Establishing clear guidelines for accurate reporting promotes transparency, accountability, and integrity. Focusing solely on legal compliance doesn't fully address ethical concerns."},
{q:"A cost accounting budget is often used as a means of financial control. In other words, it:",opts:["Restricts who has access to financial data","Is used to monitor activities in a business","Predicts what will happen in the future","Complicates the decision-making process"],ans:1,exp:"A financial control is a tool to monitor business activities, such as reviewing spending and comparing it to the budget, keeping companies from exceeding spending limits."},
{q:"A country is experiencing civil unrest. What is likely to happen to the value of its currency?",opts:["It will not be affected.","It will increase.","It will stabilize.","It will decrease."],ans:3,exp:"Political instability causes foreign business partners and investors to decrease their activities, causing the country's currency value to decrease."},
{q:"A country that has a socialistic command economic system is:",opts:["Great Britain.","the United States.","Switzerland.","Japan."],ans:0,exp:"Great Britain has a socialistic economic system with government ownership of basic means of production but private ownership of businesses as well. Japan, Switzerland, and the US have capitalistic systems."},
{q:"A country's unemployment rate impacts the economy because when people are unemployed, they lose their:",opts:["Individual identity","Purchasing power","Absolute advantage","Corporate connection"],ans:1,exp:"When unemployed, people lose wages and thus purchasing power—their ability to buy goods and services, reducing their contribution to the economy."},
{q:"A credit account where the purchaser makes a down payment and signs a contract for scheduled payments and finance charges describes:",opts:["Open account","Revolving credit","Layaway plan","Installment credit"],ans:3,exp:"Installment credit involves a down payment and a contract for scheduled payments, commonly used for big-ticket items. Open accounts use 30-day cycles; revolving credit has a credit limit with interest."},
{q:"A credit plan that allows customers to make purchases within their credit limit and pay all or part of the balance due each month is referred to as a(n) __________ credit plan.",opts:["budget","open","revolving","coupon"],ans:2,exp:"A revolving credit account limits the total amount owed. Customers who don't pay the full amount each month are charged interest. An open plan requires full payment each period."},
{q:"A creditor carefully examines a business's financial information to determine whether the business has sufficient money to meet its short-term obligations when they come due. In this situation, the creditor is concerned about the business's:",opts:["profitability.","liquidity.","efficiency.","investment return."],ans:1,exp:"Liquidity refers to having sufficient cash on hand to meet short-term obligations. If the business is unable to meet current short-term obligations, the creditor would likely deny the credit request."},
{q:"A current employee asked to help orient a new employee will be serving as the new employee's:",opts:["Sponsor","Manager","Apprentice","Trainee"],ans:0,exp:"A sponsor is a current employee who volunteers or is asked to assist a new employee with job information, advice, and other job-related help."},
{q:"A customer asked a salesperson whether a hair dryer purchased last month could be returned or exchanged. To answer, the salesperson should be familiar with the business's:",opts:["Finances","Promotions","Policies","Products"],ans:2,exp:"Policies ensure employees make consistent decisions. Return and exchange policies guide salespeople in handling these transactions."},
{q:"A debtor-creditor relationship exists when:",opts:["interest is charged.","a sale is paid in full.","a contract is invalidated.","stocks are liquidated."],ans:0,exp:"When an individual or business charges interest on money that another borrows, a debtor-creditor relationship exists. A paid-in-full sale does not establish such a relationship."},
{q:"A direct benefit of supply chain collaboration is:",opts:["lower cost due to reduced inventory.","an increase in business profits.","lower cost due to higher inventory.","less flexibility in purchasing decisions."],ans:0,exp:"Supply chain collaboration reduces required inventory levels, lowering inventory, storage, and transportation costs. Increased profits are an indirect benefit; collaboration increases flexibility."},
{q:"A disadvantage of financial globalization is that:",opts:["Transaction costs have increased","Investors have limited options","Reporting requirements vary greatly by country","Financial markets have become less liquid"],ans:2,exp:"Each country has different financial reporting requirements, making it difficult to obtain and disseminate needed information across borders."},
{q:"A finance employee is reviewing a report on the amount of money the company has disbursed to employees who worked overtime in the past year. What type of financial information is the employee analyzing?",opts:["Payroll","Production rates","Accounts payable","Sales"],ans:0,exp:"Payroll is a major business expense involving tracking employee compensation including overtime pay. Companies continuously monitor payroll to assess its impact on available funds."},
{q:"A finance professional receives a client's request for information about an investment. Why should they respond promptly?",opts:["It avoids liability in the event of an error","It fosters trust and encourages long-term client loyalty","It fulfills the legal obligation to respond to customer inquiries","It ensures clients do not consult competitors for similar services"],ans:1,exp:"Companies that respond in a timely fashion foster trust from their clients, which encourages long-term client loyalty."},
{q:"A financial information management system is often responsible for:",opts:["assisting in the preparation of financial statements.","supervising the accounting and finance departments.","purchasing raw materials for production.","developing a corporate investment portfolio."],ans:0,exp:"Financial information management systems collect, maintain, and report financial transaction data, and assist in preparing financial statements. They don't supervise departments or purchase materials."},
{q:"A financial institution fails to comply with an important government regulation. The financial institution will most likely:",opts:["Get a better reputation","Pay a fine","Gain new business","Avoid an audit"],ans:1,exp:"Financial institutions often pay fines for noncompliance. Noncompliance can also damage reputation and they can still be audited."},
{q:"A financial institution that acts as an intermediary to facilitate securities transactions for the general public is a(n):",opts:["Investment bank","Commercial bank","Brokerage company","Credit union"],ans:2,exp:"A brokerage company acts as an intermediary to facilitate securities transactions (buying and selling stocks) for the general public."},
{q:"A financial institution uses AI to manage risks, but after a recent market crash, predictions became increasingly inaccurate. What risk does this scenario best illustrate?",opts:["Technology can be slow and inefficient","Technology can be costly if maintenance is required","Technology can result in human negligence","Technology can fail when the data are flawed"],ans:3,exp:"The recent market crash created flawed data, which AI then used to create inaccurate predictions. Technology can fail when the data are flawed."},
{q:"A financial organization is most likely to have which of the following standards in its code of ethics?",opts:["Share confidential information and data","Provide people with subjective information","Disclose positive and negative information","Welcome conflicts of interest"],ans:2,exp:"Disclosing both positive and negative information is an ethical standard in finance. Financial professionals should avoid sharing confidential information and conflicts of interest."},
{q:"A financial planner who fails to stay informed about new laws impacting products they sell is failing to observe which ethical principle?",opts:["Honesty","Confidentiality","Competence","Objectivity"],ans:2,exp:"Competence means maintaining the knowledge necessary to provide accurate information. Failing to stay current makes the planner incompetent, not dishonest."},
{q:"A financial-information management system can help a financial manager make which of the following types of decisions?",opts:["Adding/Dropping products","Employee scheduling","Vendor selections","Capital budgeting"],ans:3,exp:"Capital budgeting — planning to acquire and finance long-term business assets — is a decision financial managers make using financial-information management systems."},
{q:"A firm's environmental scan reveals that a country is on the brink of civil war, which would affect the firm's ability to do business in the country. This is an example of a(n) __________ consideration.",opts:["political","economic","cultural","regulatory"],ans:0,exp:"Political considerations are important because government changes such as civil war could indicate other changes affecting the country's business environment, including economic, cultural, and regulatory changes."},
{q:"A governance, risk, and compliance (GRC) software system identifies and measures risk; monitors the risk-management system; routinely checks adherence to policies; and ensures compliance with:", opts:["Union demands","Reporting requirements","Product standards","Contingency plans"], ans:1, exp:"GRC software serves four functions: identifies/measures risk, monitors risk management, checks policy adherence, and ensures compliance with reporting requirements from federal/state government agencies and regulatory commissions. It's not designed to ensure compliance with union demands, product standards, or contingency plans."},
{q:"A guideline for writing effective business letters is that each letter should:",opts:["entertain the reader.","display the writer's vocabulary.","have a clear purpose.","contain indirect questions."],ans:2,exp:"Every business letter should have a clear, stated purpose. It should not be written to entertain, show off vocabulary, or contain indirect questions."},
{q:"A human resources manager sets up a computerized system for maintaining employee records. What type of resource is the manager using?",opts:["Human","Financial","Material","Natural"],ans:2,exp:"Material resources are equipment and supplies used in business operations. The computer system is a material resource."},
{q:"A human-resources manager is working to have a new employee's paycheck directly deposited. What HR activity is the manager carrying out?", opts:["Interviewing","Recruiting","Organizing","Onboarding"], ans:3, exp:"Onboarding activities occur when new employees join (tax/insurance forms, direct deposit setup, orientation). Recruiting seeks and attracts qualified employees. Interviewing discusses qualifications with job candidates. Organizing is the management function of structuring how work gets done."},
{q:"A key factor in successful human relations involves treating others with:",opts:["Reverence","Admiration","Respect","Indifference"],ans:2,exp:"Respect—showing regard for other people and their ideas—is key to successful human relations. You don't need to admire everyone, but you should not treat anyone with indifference."},
{q:"A large corporation closes one of its branches. The previous costs of running that branch—rent, utilities, and equipment—would all be considered __________ costs.",opts:["Appraisal","Employment","Avoidable","Mixed"],ans:2,exp:"Avoidable costs can be eliminated by no longer engaging in a business activity. Closing the branch eliminates all associated costs."},
{q:"A legal issue associated with the use of information might involve the violation of __________ laws.",opts:["copyright","patent","trademark","contract"],ans:0,exp:"Copyright protects books and other artistic works. Using copyrighted information without permission is a legal issue that can result in substantial penalties. Patent and trademark laws protect different things."},
{q:"A legal issue associated with the use of information might involve the violation of __________ laws.",opts:["Patent","Copyright","Trademark","Contract"],ans:1,exp:"Copyright protects books and artistic works. Using copyrighted material without permission violates copyright laws and can result in substantial penalties."},
{q:"A loan officer with special knowledge in real-estate loans is most likely to have which professional certification?", opts:["Certified Information Systems Auditor (CISA)","Certified Mortgage Banker (CMB)","Certified Internal Auditor (CIA)","Certified Annuities Specialist (CAS)"], ans:1, exp:"The Certified Mortgage Banker (CMB) is a specialized certification for loan officers working with home, commercial, or property mortgages. CIA assesses internal accounting controls. CISA relates to IT/computer systems security. CAS is for those specializing in annuities."},
{q:"A loan officer would be an example of a career in",opts:["Insurance","Accounting","Corporate finance","Banking services"],ans:3,exp:"A loan officer is a person who specializes in helping clients apply for loans. Loan officers work within banking services."},
{q:"A local bank has partnered with a life insurance company, allowing the insurer to sell its products to the bank's clients. This partnership is an example of:",opts:["consolidation.","amalgamation.","bancassurance.","market extension."],ans:2,exp:"Bancassurance is an arrangement where an insurance company sells its products through a bank's client base. Consolidation/amalgamation involve merging into one entity."},
{q:"A magazine advertisement is an example of:",opts:["Word-of-mouth marketing","Publicity","A touchpoint","A brand promise"],ans:2,exp:"A touchpoint is any interaction between a business and a customer or potential customer. Ads, publicity, and word-of-mouth are all touchpoints."},
{q:"A main goal of customer experience management is creating:",opts:["Higher employee salaries","Word-of-mouth promotion","New products","Innovative technology"],ans:1,exp:"CEM aims to create word-of-mouth promotion and referrals (customer advocacy)."},
{q:"A major purpose of establishing personal goals is to:",opts:["Identify your wants","Get help from others","Achieve success in life","Decrease personal needs"],ans:2,exp:"Success is reaching the goals you have set for yourself. By establishing well-defined goals, you greatly increase the chances of achieving success in life."},
{q:"A man comes to pick up his order and Courtney tells him it hasn't arrived yet. She asks for his order number again so she can double-check it and find out where it is. Which step of the seven-step problem-solving method does this situation illustrate?",opts:["State and check assumptions","Collect information","Define the problem","Evaluate the solution"],ans:1,exp:"Courtney is collecting information about the man's order so she can find out why it hasn't arrived on time. The problem has already been defined—the man's order is missing."},
{q:"A man from Alice's health club and church tries to get her to invest, mentioning the minister and gym manager already invested with him. He is attempting to commit __________ fraud.",opts:["Group affinity","Natural resource investing","Private placement offering","Life settlement"],ans:0,exp:"Group affinity fraud uses the scammer's membership in the same group as the victim to falsely establish trust."},
{q:"A manager must decide whether to make products in-house or outsource manufacturing. In this scenario, the company's committed costs are likely to be:",opts:["cash inflows.","irrelevant costs.","relevant costs.","cash receipts."],ans:1,exp:"Committed costs are already set aside for future expenses and cannot be altered, making them irrelevant to this make-or-buy decision."},
{q:"A manager must decide whether to make products in-house or outsource. The company's committed costs are likely to be:",opts:["Relevant costs","Irrelevant costs","Cash inflows","Cash receipts"],ans:1,exp:"Committed costs are already set aside for a future expense and cannot be altered. Since they can't be changed, they are irrelevant to the decision."},
{q:"A manager noticed the store sells more laptops/notebooks in December, January, June, and August. This information can help the store:", opts:["Measure its long-term liabilities","Monitor its general operating costs","Make reliable sales forecasts","Manage its sales staff effectively"], ans:2, exp:"Identifying when laptop sales peak helps develop reliable sales forecasts so the store has enough stock when needed. This trend information doesn't help measure long-term liabilities, monitor general operating costs, or directly manage sales staff."},
{q:"A managerial accountant can help a company market its products by:",opts:["Developing a target market analysis","Creating a budget for hiring increases","Examining the relevant costs of advertising options","Determining whether to make or buy a component"],ans:2,exp:"Managerial accountants can use relevant cost analysis to assist marketers in comparing advertising options and their costs."},
{q:"A managerial accountant used variance analysis to determine that a furniture wholesaler underperformed this year. How might they have reached this conclusion?",opts:["By finding that the company has increased revenue and costs","By finding that the company's actual sales are lower than the planned sales","By finding that the company has sold to fewer customers than last year","By finding that the company laid off fewer employees than expected"],ans:1,exp:"Variance analysis involves comparing planned or expected numbers to actual performance. Finding that actual sales are lower than planned indicates underperformance."},
{q:"A manufacturer has more workers than production equipment. What economic principle does this exemplify?", opts:["Law of minimal utility","Law of diminishing returns","Economies of scale","Economies of scoring"], ans:1, exp:"The law of diminishing returns states that after a certain point, adding more employees with fixed equipment decreases overall productivity. If 100 machines are available but there are 125 workers, 25 workers have no equipment, reducing productivity. Economies of scale reduce cost per unit as production increases."},
{q:"A multinational company is restructuring its corporate governance model to better accommodate its diverse shareholders. What should the company strive to achieve?",opts:["A reduced structure that operates in select countries","A consistent structure that disregards regional differences","A flexible structure that accounts for cultural differences","A punitive structure that strictly holds shareholders accountable"],ans:2,exp:"The company should strive to achieve a flexible structure that accounts for cultural differences to accommodate its diverse shareholders."},
{q:"A mutual fund's total liabilities are $5,600,000 and its assets total $7,950,000. There are 31,000,000 shares outstanding. What is the net asset value of the fund?",opts:["7.58%","6.45%","7.29%","8.06%"],ans:0,exp:"Net Asset Value = (Assets - Liabilities) / Shares outstanding = ($7,950,000 - $5,600,000) / 31,000,000 = $2,350,000 / 31,000,000 = $0.0758 = 7.58%."},
{q:"A new employee left JRB Manufacturing two weeks after completing training. The training expense is a(n) __________ for the company.",opts:["Sunk cost","External cost","Current asset","Capital liability"],ans:0,exp:"Sunk costs are incurred and cannot be recovered. The training money cannot be recouped since the employee left."},
{q:"A person reacting to conflict by trying to persuade others to take a certain course of action is an example of:",opts:["Problem-solving","Yielding","Negotiating","Forcing"],ans:2,exp:"Negotiating involves persuading others to take a certain course of action and finding compromise. Yielding means giving in; forcing uses physical or emotional pressure."},
{q:"A person who is a high achiever is often positively viewed by others as a:",opts:["Leader","Risk-taker","Follower","Show-off"],ans:0,exp:"High achievers are often viewed as leaders because of their strong work ethic and achievements. They take moderate risks to ensure success."},
{q:"A possible consequence of poorly-executed corporate governance is:",opts:["Limited profitability","Increased ethics","Decreased risk","Greater payroll"],ans:0,exp:"Poor corporate governance can limit profitability by preventing effective decision-making and goal achievement. It leads to decreased, not increased, ethics."},
{q:"A potential investor can assess a stock's volatility by comparing the highest paid price in the past 52 weeks with the:",opts:["price-earnings ratio.","rate of return.","lowest paid price in 52 weeks.","estimated dividends."],ans:2,exp:"To analyze volatility, an investor can compare the highest price paid with the lowest price paid within a 52-week period. A sharp price swing indicates high volatility."},
{q:"A primary advantage to consumers of convergence and consolidation in the finance industry is:",opts:["guaranteed earnings.","easier decision making.","one-stop shopping.","liquid capital."],ans:2,exp:"Convergence and consolidation create 'one-stop' shopping, reducing the need to go to different financial providers for different financial products."},
{q:"A primary aspect of Bridget's job is to evaluate her company's internal financial information and external factors affecting the company's financial well-being, then make financial recommendations. Which certification is Bridget most likely to have?",opts:["Chartered Life Underwriter (CLU)","Chartered Financial Analyst (CFA)","Certified Loan Officer (CLO)","Certified Annuity Specialist (CAS)"],ans:1,exp:"The CFA certification is comprehensive and beneficial to finance professionals who focus on the long-range financial well-being of businesses and organizations. It requires passing three levels of exams."},
{q:"A primary difference between accounting and finance is that the accounting function focuses on __________, and the finance function focuses on __________.", opts:["Prioritizing needs, problem solving","Allocating funds, decision making","Planning activities, resource management","Reporting transactions, financial planning"], ans:3, exp:"Accounting is responsible for recording and reporting transactions. Finance uses those reports for financial planning—obtaining funds and managing money to achieve business goals. Neither function's primary focus is on prioritizing needs, allocating funds, or planning activities."},
{q:"A primary difference between groups and teams is that team members _________, while group members _________.", opts:["Are personally accountable, share accountability","Function independently, function interdependently","Follow authority, assume leadership roles","Work collaboratively, work separately"], ans:3, exp:"In teams, all members collaborate, share accountability, set goals together, and assume leadership roles. In groups, there is one leader, members work separately (independently), follow the leader's rules, and are held personally accountable."},
{q:"A primary factor that has led to the consolidation of financial firms is the desire:",opts:["To lower costs","For fewer products","For fewer assets","To lower risks"],ans:0,exp:"Consolidation achieves economies of scale, resulting in reduced redundancy and lower costs. It can actually increase assets and expand products."},
{q:"A primary goal of data normalization is to:",opts:["reduce data redundancy.","discard any unusual data.","improve data collection.","increase data quality."],ans:0,exp:"Data normalization efficiently organizes database data, primarily to reduce data redundancies — ensuring the same data isn't stored in more than one place."},
{q:"A primary reason that businesses expand their operations in foreign countries is to:",opts:["condense their market shares.","eliminate tax obligations.","increase revenues.","promote environmental issues."],ans:2,exp:"International expansion provides opportunities to sell to new markets, increasing both market share and revenues. Businesses cannot eliminate tax obligations by expanding internationally."},
{q:"A primary reason why businesses implement financial audit trails is to:",opts:["reduce risks associated with intentional data tampering.","monitor the daily activities of the securities exchanges.","ensure that financial reports are prepared quickly.","evaluate their profitability ratios."],ans:0,exp:"Audit trails record the step-by-step process of financial transactions, enabling businesses to trace unethical behavior and deter intentional data tampering."},
{q:"A primary responsibility of administrative law is to:",opts:["establish congressional/parliamentary committees.","interpret constitutional laws.","overturn lower courts' decisions.","enforce agency regulations."],ans:3,exp:"Administrative law deals with rules and regulations established by governmental agencies, which have authority to enact and enforce regulations for aviation, taxation, commerce, etc."},
{q:"A primary responsibility of financial-information management is to:",opts:["Implement sales policies","Negotiate contracts with vendors","Develop new products","Report financial transactions"],ans:3,exp:"Financial-information management maintains data about financial transactions (accounts receivable, accounts payable) and develops reports to aid decision-making and compliance."},
{q:"A private company requires that its financial reports be accessible to all stakeholders. How does this action demonstrate a well-governed company?",opts:["It complicates company budgeting","It encourages a safe workplace","It improves employee morale","It promotes transparency"],ans:3,exp:"A private company that requires its financial reports to be accessible to all stakeholders demonstrates a well-governed company by promoting transparency."},
{q:"A project manager may schedule a meeting with their project team when closing the project to:",opts:["Establish the project's long-term goals","Evaluate the project's successes and obstacles","Determine project priorities and processes","Delegate the project's tasks to team members"],ans:1,exp:"During project closing, the team evaluates successes and obstacles, summarized in a 'lessons learned' document for future similar projects."},
{q:"A public corporation's board of directors has the fiduciary responsibility to ensure the company makes decisions that protect the financial interests of:",opts:["board members.","all shareholders.","the community at large.","government entities."],ans:1,exp:"Fiduciary responsibility means acting in the best interest of benefactors. A board consists of individuals appointed to make decisions on behalf of shareholders — the company's owners."},
{q:"A real rate of return on an investment is different from a nominal rate of return in that a real rate of return:",opts:["Less accurately measures investment performance","Does not subtract taxes and inflation","Adjusts profit for the effects of inflation","Is often higher than a nominal rate of return"],ans:2,exp:"The real rate of return adjusts profit for inflation and taxes—making it a more accurate measure than the nominal rate, which is usually higher."},
{q:"A researcher should consider an author's expertise when assessing the validity of written articles to:",opts:["Analyze the author's emotional intelligence","Verify the timeliness of the information","Evaluate the author's level of credibility","Confirm personal understanding of the information"],ans:2,exp:"A person with extensive expertise in a topic is more credible and more likely to present reliable information."},
{q:"A retail bank and an insurance company recently merged and are moving from two legacy accounting systems to one enterprise planning system. This is an example of __________ in the finance industry.", opts:["Bancassurance","Increased liquidity","Convergence","Knowledge management"], ans:2, exp:"Convergence in finance involves merging financial providers from different sectors (retail bank + insurance company). Moving to one unified system is typical post-convergence. Bancassurance is insurance sold BY a bank—not a merger. Increased liquidity and knowledge management may result but are not what's described."},
{q:"A severe storm blows down trees that collapse the roof and break windows of a business. This type of damage results from __________ risks.",opts:["financial","human","economic","natural"],ans:3,exp:"Natural risks are chances of loss from natural phenomena such as a severe storm. Human risks are caused by human weakness; economic risks result from market changes; financial risks involve capital."},
{q:"A small business records transactions when it receives or spends money. What type of accounting system is it using?", opts:["Positional","Accrual","Cash","Static"], ans:2, exp:"Cash accounting records transactions when money is actually received or spent. This can create problems when a service occurs in one period but payment is received in another. Accrual accounting records transactions at the time they occur regardless of when money changes hands. Positional and static are not types of accounting systems."},
{q:"A small food market calls several vendors to obtain prices and places an order with the lowest bidder. This is the __________ buying method.",opts:["informal","competitive-bid","negotiated","standing-order"],ans:0,exp:"The informal buying method involves calling vendors for verbal prices and ordering from the lowest bidder. It reduces paperwork. Competitive-bid, negotiated, and standing-order are formal methods."},
{q:"A small-business owner's budgeting software connects directly to his bank accounts so it downloads expenses automatically. This feature is commonly known as automatic:", opts:["Tracking","Back up","Alerts","Affirmation"], ans:0, exp:"Automatic tracking transmits expense information from the bank to the budgeting application without human intervention. Automatic back-up saves files regularly. Alerts remind users of upcoming payments. Affirmation refers to a present or desired strength."},
{q:"A statement of changes in equity is most useful for:",opts:["Investors","Managers","Customers","Employees"],ans:0,exp:"The statement of changes in equity shows how invested wealth has grown or changed, making it most useful to investors who care about the effect on their investments."},
{q:"A statement of equity helps companies make decisions about how to:",opts:["Organize income statements","Analyze financial trends","Control their production costs","Reinvest their retained earnings"],ans:3,exp:"The statement of equity shows how much money the business has at the end of an accounting period, enabling decisions about reinvesting—like remodeling or hiring."},
{q:"A statement of owner's equity",opts:["Reports changes in a company's equity","Is prepared before an income statement","Increases a company's equity by using them","Shows only the beginning owner's equity"],ans:0,exp:"A statement of owner's equity reports the changes in a company's equity (net worth) over a specific period of time. It is prepared after the income statement."},
{q:"A stock with a high dividend yield is typically __________ than one with a low yield.",opts:["less established","more established","less volatile","more volatile"],ans:2,exp:"A higher yield percentage indicates less volatility. A company paying dividends is seen as more established, and its stock price tends to be more stable."},
{q:"A stockbroker uses CRM technology to learn about his typical customer's purchasing pattern. He is using CRM technology to analyze the typical customer:",opts:["Duration","Trajectory","Vintage","Touchpoint"],ans:1,exp:"CRM technology is often used to measure and analyze a customer's trajectory—a pattern of purchases over time."},
{q:"A strong professional relationship is usually a(n) __________ relationship.",opts:["Easily maintained","Reciprocal","Majority-rule","One-sided"],ans:1,exp:"Strong professional relationships must be reciprocal—each member helps the other. Finance professionals often refer clients to each other for different services."},
{q:"A student group suggests a university hold a concert with a controversial banned band. What risk management should the university undertake?",opts:["Transfer liability through a contract holding the band liable","Cover the risk in the event budget","Purchase insurance transferring risk to the insurance company","Avoid the risk by contracting with another band"],ans:3,exp:"The best management is to avoid the risk by choosing another band, avoiding negative publicity."},
{q:"A successful budget should be:",opts:["Rigid","Well planned","Secret","Aggressive"],ans:1,exp:"Budgets should be well planned based on knowledge, past budgets, and external factors. They should be flexible, communicated, and realistic."},
{q:"A true statement about difficult customers is that they are:",opts:["Usually female","Easy to spot","Of all ages","Frequently older"],ans:2,exp:"Difficult customers come in all shapes and sizes—all ages, economic levels, and either gender. They're difficult to distinguish until their problems arise."},
{q:"A video conference call is a __________ channel of communication.",opts:["Lean","Rich","Slight","Detailed"],ans:1,exp:"A rich communication channel involves multiple senses (sight and hearing). A video call lets you see faces and hear voices."},
{q:"A well-prepared new employee orientation program should:",opts:["Outline the employer's specific financial goals","Set aside time to negotiate employees' salary requirements","Communicate the employer's philosophy and expectations","Verify the new employees' job qualifications"],ans:2,exp:"A good orientation communicates the employer's philosophy and behavioral expectations. Job qualifications are verified during interviews; salaries are negotiated before acceptance."},
{q:"A worker who records, classifies, summarizes, analyzes, and communicates a business's financial information is a(n):",opts:["Compliance analyst","Accountant","Bank manager","Insurance agent"],ans:1,exp:"An accountant records, classifies, summarizes, analyzes, and communicates a business's financial information for decision-making."},
{q:"A worker who records, classifies, summarizes, analyzes, and communicates a business's financial information is a(n):",opts:["Compliance analyst","Bank manager","Accountant","Insurance agent"],ans:2,exp:"Accountants record, classify, summarize, analyze, and communicate a business's financial information for decision-making."},
{q:"ABC Education Company wants to compare its business practices and performance to that of other organizations within its industry. Which financial analysis tool would be most helpful?",opts:["Benchmarking","Trending","Forecasting","Ratio analysis"],ans:0,exp:"Benchmarking uses a reference point to compare a company's performance against competitors or industry standards. Trending identifies patterns over time; forecasting predicts future events."},
{q:"Abeytu sent requests for price quotes to seven different chemical companies and is waiting to review the suppliers' proposed prices. Abeytu is conducting",opts:["Negotiations","Blanket ordering","Competitive bidding","Forecasts"],ans:2,exp:"Competitive bidding involves sending out a request for bids, reviewing proposed prices, and selecting the best supplier for the job."},
{q:"Accepting blame for failure and credit for success is an indication of a person's:",opts:["Interpersonal skills","Consideration","Responsibility","Initiative"],ans:2,exp:"Responsible individuals are accountable for things within their control."},
{q:"According to most analysts, the three economic indicators that stock market investors should pay closest attention to are:",opts:["gross domestic product, overhead expenses, and unemployment.","gross domestic product, unemployment, and inflation.","inflation, unemployment, and bond rates.","interest rates, overhead expenses, and inflation."],ans:1,exp:"GDP, unemployment, and inflation are the three most important economic indicators for stock market investors. Overhead expenses and bond rates are not standard economic indicators."},
{q:"According to the classical theory of unemployment, the best solution for unemployment is to:",opts:["decrease inflation.","increase prices.","encourage spending.","cut wages."],ans:3,exp:"According to classical theory, cutting wages stops the cycle of unemployment. If wages aren't allowed to rise too high, unemployment will be controlled."},
{q:"According to today's stock quotation table, the current price of Macy's stock is $18.99 per share. Last year, the company paid investors a dividend of $0.20 per share. What is the current yield on Macy's stock?",opts:["3.80%","2.00%","1.05%","4.95%"],ans:2,exp:"Current yield = Last year's dividend / Current price = $0.20 / $18.99 = 0.01053 = approximately 1.05%."},
{q:"Accountants are legally required to follow established guidelines when preparing financial documents to ensure that the information presented is:",opts:["transparent and subjective.","clear and consistent.","subjective and consistent.","irrational and clear."],ans:1,exp:"Governments require businesses to follow the same standards so financial reports are prepared in a consistent way, making information clear, objective, and transparent to all users."},
{q:"Accounting software applications facilitate a business's ability to efficiently track income and expenses, manage inventory, and:",opts:["Plan work projects","Process payroll","Organize media transcripts","Establish insurance policies"],ans:1,exp:"Comprehensive accounting software can process payroll and taxes, forecast sales, and manage inventory. Project management software handles projects."},
{q:"Accurate financial-information management improves a business's payment cycles by:",opts:["optimizing accounts payable and accounts receivable.","improving the business's trustworthiness.","allowing for better sales forecasting.","giving companies a way to evaluate their tax liability."],ans:0,exp:"Financial-information management directly optimizes the payment cycle by keeping accounts payable (money owed) and accounts receivable (money owed to you) accurate."},
{q:"After 10 years, Marco was laid off and has struggled to find a new job. Which is a result of Marco being unemployed?",opts:["Less disposable income for his family","Greater contribution to the economy","Less work for his former colleagues","Greater purchasing power"],ans:0,exp:"When unemployed, workers and their families lose wages and have less disposable income. This also reduces their purchasing power and their contribution to the economy."},
{q:"After a business designates categories of expense in its budget, it:",opts:["attaches a time limit.","appoints an accountant.","applies a formula.","allocates a dollar amount."],ans:3,exp:"After creating expense categories, a business allocates a dollar amount to each one. Time limits, accountants, and formulas are not the next step after designating expense categories."},
{q:"After a job interview, an applicant should prepare a follow-up letter that:",opts:["is long and detailed.","is short and typed.","includes a résumé.","contains a photo."],ans:1,exp:"A follow-up letter should be short and to the point. Typed letters are preferred. The purpose is to briefly thank the interviewer—it should not be long, include another résumé, or contain a photo."},
{q:"After being fired, Jack wrote blog posts with many untrue negative comments about his former company and employees. What tort is Jack committing?",opts:["Defamation","Invasion of privacy","Battery","Negligence"],ans:0,exp:"Defamation is publishing an untrue statement that subjects an entity to ridicule or contempt. Jack is publishing false information out of spite."},
{q:"After completing a team project, Makai asks the other group members about their experiences when completing the project. What aspect of the project is Makai measuring?",opts:["Quality of work","Scope","Team satisfaction","Schedule"],ans:2,exp:"Evaluating team satisfaction involves surveying team members about their experiences and perspectives regarding the project."},
{q:"After finding inconsistencies with its financial data, the MSV Company hired a compliance officer to monitor financial processes and ensure regulatory compliance. What type of internal control has the business implemented?",opts:["Product","Preventative","Corrective","Conditional"],ans:2,exp:"Corrective controls fix a problem that has already been detected. Hiring a compliance officer after detecting data inconsistencies is a corrective action. Preventative controls keep something from happening before it occurs."},
{q:"After identifying a potential compliance issue, a virtual auditor should:",opts:["manually load questionable transactions into a spreadsheet for analysis.","delete all exceptions and questionable transactions from the system.","enter all questionable transactions into the operational financial system.","link all related questionable transactions for further investigation."],ans:3,exp:"After detecting a potential compliance issue, the virtual auditor should identify and link all related questionable transactions for further analysis and investigation. They should not be deleted or entered into the operational system."},
{q:"After Mr. Schwarz's order was delayed, Karl investigated immediately and called back with specific delivery information. Mr. Schwarz thanked Karl for responding quickly. Karl reinforced the company's image by:", opts:["Giving vague answers","Providing efficient follow-up","Delegating work tasks","Complimenting the customer"], ans:1, exp:"Efficient follow-up means working quickly to find answers and immediately contacting the customer with specific information—building favorable customer relationships. There's insufficient information to determine if Karl delegated tasks or complimented Mr. Schwarz."},
{q:"After passing the General Securities Registered Representative Examination, a businessperson obtains licensure that allows him/her to work as a(n):",opts:["estate planner.","accountant.","underwriter.","stockbroker."],ans:3,exp:"Stockbrokers must take and pass the General Securities Registered Representative Examination (or Canadian Securities Course in Canada) to obtain their license to trade securities."},
{q:"After Taylor puts in her two weeks' notice, her HR manager schedules a talk about why she's leaving. This is considered a(n) __________ interview.",opts:["Recruiting","Exit","Orientation","Onboarding"],ans:1,exp:"Exit interviews gauge employee attitudes about a company, gain constructive suggestions, and help understand employee turnover."},
