{q:"Which of the following is a common outcome of poor financial-information management in a finance department?",opts:["Employees are able to increase their efficiency.","Employees receive information before it's needed in the department.","Employees cannot understand financial statements.","Employees cannot correctly assess trends."],ans:3,exp:"Poor financial-information management prevents employees from correctly assessing performance and trends. It also delays information access and decreases efficiency — not increases it."},
{q:"Which of the following is a common problem that financial institutions experience when dealing with compliance?",opts:["Long-term thinking","Too much emphasis on risk management","Lack of coordination","Growing importance of technology"],ans:2,exp:"Lack of coordination between departments that separately manage risk and compliance is a common problem. A unified, integrated approach throughout the organization is needed."},
{q:"Which of the following is a common reason why businesses consolidate?",opts:["To decrease their staff","To eliminate the competition","To increase market share","To pay employees more"],ans:2,exp:"A common reason businesses consolidate is to increase market share. Doing so reduces competition and can help expand a customer base."},
{q:"Which of the following is a common result of supply chain collaboration?",opts:["Customer dissatisfaction","Slower decision-making","Reduced overall costs","Frequent miscommunication"],ans:2,exp:"Supply chain collaboration leads to increased knowledge sharing, which can reduce overall costs and improve communication and decision-making."},
{q:"Which of the following is a common standard found in financial codes of ethics?",opts:["Allow self-interest to sway your decisions and recommendations","Conflicts of interest in professional relationships are permitted","Disclose positive information and hide negative information","Maintain an internal controls system to guard against unethical behavior"],ans:3,exp:"A typical code of ethics in finance will emphasize the importance of internal controls to guard against unethical behavior."},
{q:"Which of the following is a common way for a divisional organizational structure to be broken down?",opts:["By function","By manager","By territory","By job type"],ans:2,exp:"Divisional structures are often divided by product, process, territory, or customer type. Functional structures are broken down by function (sales, marketing, etc.)."},
{q:"Which of the following is a component of verbal communication between individuals?",opts:["Body posture","Listening","Facial expression","Eye contact"],ans:1,exp:"Listening involves not only hearing what the speaker is saying but making appropriate verbal responses. It is an essential component of verbal communication. Facial expressions, eye contact, and posture are nonverbal."},
{q:"Which of the following is a consequence of noncompliance in the financial industry?",opts:["Improved communication","Audits and damaged reputation","Rule violation prevention","Protection from lawsuits"],ans:1,exp:"Noncompliance can result in audits, damaged reputation, financial penalties, suspension, and imprisonment. Rule violation prevention and protection from lawsuits are benefits of compliance."},
{q:"Which of the following is a consequence of poor financial information management?",opts:["Inaccurate reporting","Simplified processes","Ineffective leadership","Less duplication"],ans:0,exp:"When companies fail to maintain and update their financial information, they are typically left with inaccurate data."},
{q:"Which of the following is a cost driver that could affect the cost of internet service in a coffee shop?",opts:["Number of direct labor hours","Number of products sold","Number of customers","Number of ingredients per product"],ans:2,exp:"Internet service becomes more expensive as more people use it—so the number of customers in the coffee shop drives its cost."},
{q:"Which of the following is a cost driver that could affect the cost of internet service in a coffee shop?",opts:["Number of ingredients per product","Number of products sold","Number of direct labor hours","Number of customers"],ans:3,exp:"Internet service costs more as more people use it. The number of customers drives internet service cost. Other factors listed drive other types of costs but not internet specifically."},
{q:"Which of the following is a cost of credit?",opts:["Lower prices","Annual fees","Credit unions","Budget credit"],ans:1,exp:"Annual fees are charged by some credit card providers for the privilege of using their cards. Credit unions are sources of credit; budget credit is a type; lower prices are a benefit."},
{q:"Which of the following is a deposit-taking financial institution?",opts:["Insurance company","Mortgage company","Investment firm","Credit union"],ans:3,exp:"Credit unions, commercial banks, and savings and loan associations are types of deposit-taking financial institutions. Mortgage companies, insurance companies, and investment firms are non-deposit taking."},
{q:"Which of the following is a factor that often enables certain countries to trade successfully with each other?",opts:["Equal governmental systems","Same religious institutions","Similar business subcultures","Identical language traits"],ans:2,exp:"Countries with similar business subcultures understand each other and conduct business in similar ways, enabling successful trade. Different languages, religions, and governmental systems can be barriers."},
{q:"Which of the following is a factor that often leads to workplace stress and burnout?",opts:["Interpersonal conflict","Adequate compensation","Sufficient time to meet deadlines","High control of work assignments"],ans:0,exp:"Interpersonal conflict, inadequate compensation, unrealistic deadlines, and little control over assignments can all cause workplace stress and burnout."},
{q:"Which of the following is a financial want rather than a financial need?",opts:["Food","Education","Clothing","Shelter"],ans:1,exp:"Financial needs are the basics necessary for survival—food, clothing, and shelter. Education is a financial want; it is not necessary for basic survival."},
{q:"Which of the following is a fixed budget used by managers to measure profit or performance?",opts:["Operating budget","Rolling budget","Dynamic budget","Master budget"],ans:3,exp:"The master budget (also called a static or fixed budget) does not change—managers use it as a guideline and compare it to actual results. A rolling budget is constantly updated."},
{q:"Which of the following is a formatting characteristic of a full-block business letter?",opts:["Indented first paragraph","Double-spacing within the paragraph","No paragraph indents","All paragraphs use right justification."],ans:2,exp:"In full-block format, all components use left justification and writers do not indent the first sentence of each paragraph. Single-spacing is used within paragraphs."},
{q:"Which of the following is a function of cost accounting budgets?",opts:["Determining cash flow","Controlling finances","Understanding profitability","Analyzing sources of income"],ans:1,exp:"Cost accounting budgets are financial plans used to project revenue and expenses with the aim of controlling finances."},
{q:"Which of the following is a function of cost accounting budgets?",opts:["Understanding profitability","Controlling finances","Analyzing sources of income","Determining cash flow"],ans:1,exp:"Budgets are financial plans used to project revenue and expenses, and their primary aim is to control finances. Profitability, cash flow, and income analysis are separate functions."},
{q:"Which of the following is a function of financial markets?",opts:["Customer service","Borrowing and lending","Auctions","Productivity"],ans:1,exp:"A core function of financial markets is borrowing and lending of funds, which allows financial markets to exist and operate. Auctions are a type of market, not a function."},
{q:"Which of the following is a function of financial markets?",opts:["Customer service","Borrowing and lending","Auctions","Productivity"],ans:1,exp:"Borrowing and lending allows financial markets to exist. Auctions are an example of a financial market, not a function. Customer service and productivity are unrelated."},
{q:"Which of the following is a good source of detailed information about specific career opportunities in business?",opts:["Community-college student centers","Professional organization websites","Classified ads in urban newspapers","Corporate human-resource departments"],ans:1,exp:"Most business specialties have professional organizations with websites that include job information, required training, and member listings. Corporate HR only covers their own openings."},
{q:"Which of the following is a graphic aid that uses text to depict a sequence of events or the order of a process?",opts:["Geographic map","Bar chart","Pie chart","Flowchart"],ans:3,exp:"A flowchart presents visual depictions of activities or processes in sequential order using text. Bar charts compare variables; pie charts show distribution; geographic maps show locations."},
{q:"Which of the following is a legal consideration that pertains to accounting?",opts:["Computer hacking","Gift giving","Entertaining","Tax reporting"],ans:3,exp:"Tax reporting is a legal accounting consideration. It is illegal to misrepresent financial information or fail to report and pay required taxes. Gift giving and entertaining are ethical considerations."},
{q:"Which of the following is a legal result of implementing risk management procedures?",opts:["Increased liability exposure","Decreased employee satisfaction","Less workplace safety regulation","Avoidance of negligence lawsuits"],ans:3,exp:"Risk management practices reduce the chance of negligence lawsuits. It reduces (not increases) liability exposure and ensures workplace safety regulations are followed."},
{q:"Which of the following is a legitimate response for an employee to provide to a customer regarding an inquiry about product pricing?",opts:["If you can wait a moment, I'll check for the price in the computer.","I'm not sure what the pricing is.","You'll need to contact the appropriate person to get the price.","I'm pretty sure that the item costs $39.65."],ans:0,exp:"If an employee doesn't know the price, they should take appropriate steps to obtain it, such as checking the computer. Guessing, saying you don't know, or referring to another person are not good customer service."},
{q:"Which of the following is a long-term goal?",opts:["Finishing your English paper","Passing your history test tomorrow","Washing the dishes","Getting a job at a publishing company"],ans:3,exp:"Getting a job at a publishing company is a long-term goal. Finishing an English paper, passing a history test, and washing dishes are short-term goals achievable in the very near future."},
{q:"Which of the following is a loss prevention technique a hotel might use to protect itself against theft?",opts:["Crisis management plans","Fire sprinklers","Security cameras","Carbon monoxide detectors"],ans:2,exp:"Video surveillance (security cameras) is used to prevent theft. Fire sprinklers and carbon monoxide detectors address other risks."},
{q:"Which of the following is a main cause of prejudice and discrimination?",opts:["A lack of knowledge about a group of people","Exposing yourself to new situations","Openly discussing bias with others","Naturally occurring differences of opinion"],ans:0,exp:"Not knowing people who are different can lead to discomfort and prejudicial thinking. Exposure and discussion decrease prejudice."},
{q:"Which of the following is a method that businesses use to reduce the risk of unauthorized access to confidential computer data?",opts:["Groupware applications","Decryption software","Passwords","Spooling"],ans:2,exp:"Businesses often assign computer passwords to allow only authorized employees to view secured information, reducing the risk of confidential information getting into the wrong hands."},
{q:"Which of the following is a positive characteristic for the members of a corporation's board of directors to possess?",opts:["Independent thinking","Conformity","Indecisiveness","Single-minded attitude"],ans:0,exp:"Independent thinking involves questioning current policies and proposed actions so the board acts in the best interests of the corporation and shareholders. Conformity leads to poor decision-making."},
{q:"Which of the following is a positive characteristic for the members of a corporation's board of directors to possess?",opts:["Single-minded attitude","Conformity","Indecisiveness","Independent thinking"],ans:3,exp:"Independent thinking — questioning current policies and proposed actions — helps the board act in the best interests of the corporation and shareholders. Conformity leads to groupthink that may harm the organization."},
{q:"Which of the following is a possible effect of bypassing the chain of command?",opts:["Your manager will appear to be a strong communicator","You may be considered for a promotion","Other employees may not trust you","You will appear to be a strong leader"],ans:2,exp:"Going against the chain of command can damage your reputation for reliability, causing other employees to distrust your intentions."},
{q:"Which of the following is a possible legal result of effective risk management?",opts:["Decreased compliance with laws","Increased workplace safety","Reduced liability exposure","Improved operational efficiency"],ans:2,exp:"Effective risk management helps reduce a company's liability exposure—a legal result. Improved operational efficiency and increased workplace safety are operational results."},
{q:"Which of the following is a potential consequence of a company being accused of unethical accounting practices?",opts:["Increased employee loyalty","Stock price instability","Increased public faith","Shareholder incentives"],ans:1,exp:"When investors sell stock due to unethical accounting accusations, rapid price drops can create further instability as more investors sell."},
{q:"Which of the following is a primary function of information management?",opts:["Storing data","Placing ads","Monitoring employees","Obtaining credit"],ans:0,exp:"Information management involves gathering, sorting, evaluating, and disseminating information. Businesses need to store data to retrieve it when needed."},
{q:"Which of the following is a production activity?",opts:["Receiving","Advertising","Scheduling","Marketing"],ans:2,exp:"Scheduling is the production activity that establishes the timetable to be followed in production. Marketing, advertising, and receiving are not production activities."},
{q:"Which of the following is a project that might need to be monitored?",opts:["Fixing up your car","Developing your professional skills","Becoming a better person","Improving customer service"],ans:0,exp:"A project has a distinct beginning and end. Fixing up a car meets this criterion; developing skills, becoming a better person, and improving customer service are ongoing."},
{q:"Which of the following is a question you should ask yourself when determining whether you're facing an ethical dilemma?",opts:["Which choice sounds more enjoyable?","Are ethical principles being violated?","Is one decision more difficult?","Could someone be punished?"],ans:1,exp:"Asking 'Are ethical principles being violated?' is the key question for identifying an ethical dilemma. The other questions do not determine whether an ethical issue exists."},
{q:"Which of the following is a reason a company would decide to offer its products in other countries?",opts:["To subsidize developing countries","To expand to new, untapped markets","To provide jobs to people in other countries","To sell obsolete, outdated products"],ans:1,exp:"International expansion allows businesses to reach new markets and sell products to customers they couldn't previously reach, increasing market share and revenues."},
{q:"Which of the following is a reason that businesses monitor inflation?",opts:["To set inflation-targeting goals","To avoid deflation","To negotiate labor contracts","To report to investors"],ans:2,exp:"Monitoring inflation helps managers calculate the cost of living for future periods, which is useful when negotiating labor contracts."},
{q:"Which of the following is a reason why a business may conduct a compliance audit?",opts:["To guarantee product quality","To ensure it is following regulations","To improve employee performance","To maximize its profitability"],ans:1,exp:"Compliance refers to fulfilling the requirements of the law. Businesses should conduct compliance audits to ensure they are following regulations."},
{q:"Which of the following is a reason why businesses offer credit?",opts:["To diminish convenience","To encourage customers to save","To increase interest rates","To be competitive"],ans:3,exp:"Being competitive is a major reason businesses offer credit. If a similar competitor offers credit, a business may offer it to attract customers. Interest rates are costs, not reasons."},
{q:"Which of the following is a responsibility of a managerial accountant?",opts:["Compiling the company's financial information for release to the public","Training employees and management on personal financial literacy","Making managerial decisions regarding planning, pricing, and sales","Conducting a cost analysis and explaining the findings to management"],ans:3,exp:"Managerial accountants conduct cost analyses and explain findings to management. They don't release information publicly, make management decisions, or train on personal financial literacy."},
{q:"Which of the following is a responsibility of a managerial accountant?",opts:["Conducting a cost analysis and explaining the findings to management","Compiling the company's financial information for release to the public","Making managerial decisions regarding planning, pricing, and sales","Training employees and management on personal financial literacy"],ans:0,exp:"Managerial accountants conduct cost analyses and explain findings to management for informed financial decisions. They are strictly internal—their work is not released to the public."},
{q:"Which of the following is a result of building and maintaining relationships with customers?",opts:["Increased loyalty","Fewer brand advocates","Decreased satisfaction","Customer turnover"],ans:0,exp:"Customers who have relationships with companies are more likely to remain loyal, become brand advocates, and have higher satisfaction—reducing customer turnover."},
{q:"Which of the following is a result of globalization?",opts:["Shrinking product life cycles","Decreased competition","Increased consumer spending","Higher productivity"],ans:3,exp:"When countries concentrate on goods where they have a production advantage, productivity goes up worldwide. Globalization also increases competition."},
{q:"Which of the following is a result that is likely to occur when companies take negative actions?",opts:["Increased efficiency","Excellent business reputation","High employee turnover","Bankruptcy"],ans:2,exp:"Negative actions lead to unhappy employees who look for other jobs, creating high turnover. This costs time and money in hiring and training — not increased efficiency or a good reputation."},
{q:"Which of the following is a risk associated with management's failure to follow business regulations?",opts:["Effective reporting methods","Lower insurance premiums","Expected customer-satisfaction levels","Financial losses in relation to lawsuits"],ans:3,exp:"If a business doesn't comply with laws and a lawsuit results, the business may be required to pay money to the plaintiff. This is a financial loss associated with noncompliance."},
{q:"Which of the following is a sign of high achievement orientation?",opts:["A lack of competitiveness","An entrepreneurial spirit","Impatience","Poor-quality work"],ans:1,exp:"An entrepreneurial spirit signals high achievement orientation because achievement-oriented people enjoy challenges, are competitive, patient, persistent, and produce high-quality work."},
{q:"Which of the following is a sign of solid leadership that will help you enlist others in a shared vision?",opts:["Being strict","Blaming others","Setting an example","Keeping your distance"],ans:2,exp:"Setting an example — putting the vision into practice yourself — is the clearest way to enlist others. Blaming, strictness, and distance do not help build a shared vision."},
{q:"Which of the following is a situational influence on buying behavior?",opts:["Choosing a car because it's what your dad has","Spending more than usual on a necklace because it's a gift","Buying kosher food due to religious beliefs","Preferring different jeans than when you were younger"],ans:1,exp:"Spending more because it's a gift is situational—certain situations override other influences like culture or psychology."},
{q:"Which of the following is a source of cash that flows into a business?",opts:["Loans","Taxes","Payroll","Rent"],ans:0,exp:"Loans bring money into a business. Taxes, payroll, and rent are examples of cash that flow out of a business."},
{q:"Which of the following is a specific goal?",opts:["Increasing sales","Reducing costs by 5%","Improving customer satisfaction","Finding more customers"],ans:1,exp:"Reducing costs by 5% is specific and measurable."},
{q:"Which of the following is a strategic advantage of using a central data repository for financial information within an organization?",opts:["It ensures financial data remain static and unchanged","It enables real-time data access and analysis, which facilitates more accurate forecasting","It reduces the need for cybersecurity measures","It automatically generates financial reports without requiring manual input"],ans:1,exp:"Central data repositories allow quicker and more consistent access to financial data, making it easier to analyze trends and make accurate forecasts."},
{q:"Which of the following is a tax-deductible expense?",opts:["A computer for a home-based business","Personal phone charges","Athletic-club membership fees","International leisure travel"],ans:0,exp:"Business-related items like a computer for a home-based business can be claimed as tax deductions. Personal expenses like leisure travel and gym memberships are not deductible."},
{q:"Which of the following is a tax-deductible gift?",opts:["Charitable donation","Vacation home","Stocks","Inherited items"],ans:0,exp:"Charitable donations are tax deductible. Vacation homes, stocks, and inherited items are taxable gifts."},
{q:"Which of the following is a tax-deductible gift?",opts:["Inherited items","Stocks","Charitable donation","Vacation home"],ans:2,exp:"Charitable donations are tax-deductible gifts, reducing the donor's tax liability. Vacation homes, stocks, and inherited items are taxable gifts."},
{q:"Which of the following is a tax-deductible gift?",opts:["Stocks","Vacation home","Charitable donation","Inherited items"],ans:2,exp:"Charitable donations are tax deductible—the donor pays reduced or no tax depending on type and value. Vacation homes, stocks, and inherited items are taxable gifts."},
{q:"Which of the following is a technique a business could use to analyze its customer financial information?",opts:["Comparing profit ratios by region","Tracking average product shipping delays","Determining who exceeded sales quotas","Discovering which products sold the most"],ans:0,exp:"Comparing profit ratios by region reveals which market segments are most profitable, informing future business decisions about customer financial data."},
{q:"Which of the following is a technique for effectively beginning an employment interview?",opts:["Give name clearly","Tell a joke","Speak loudly","Take the initiative"],ans:0,exp:"An effective technique for getting off to a good start is to smile and give your name clearly when you greet the interviewer. This sends a positive signal and creates a good first impression."},
{q:"Which of the following is a technological tool businesses use to archive financial records?",opts:["Electronic data interchange","Direct-response software","Web-development programs","Digital microfilm scanner"],ans:3,exp:"A digital microfilm scanner converts existing microfilm records into digital formats, allowing businesses to view data on computers and share information quickly."},
{q:"Which of the following is a technological tool that businesses use to archive their financial records?",opts:["Web-development programs","Direct-response software","Electronic data interchange","Digital microfilm scanner"],ans:3,exp:"Digital microfilm scanners convert existing microfilm (older storage format) into digital format, enabling easy computer viewing and internet sharing of archived records."},
{q:"Which of the following is a tool that businesses should use to set their overall organizational goals?",opts:["Marketing plan","Mission statement","Financial budget","Productivity benchmarks"],ans:1,exp:"A mission statement defines why the business exists and should guide organizational goal setting. Goals then inform financial budgets, marketing plans, and benchmarks."},
{q:"Which of the following is a tool that can be used to carry out scanning activities?",opts:["Manufacturing equipment","Market research studies","Personnel records","Budgeting software"],ans:1,exp:"Market research studies provide useful information about customer attitudes and demographic changes, making them a tool for environmental scanning."},
{q:"Which of the following is a tool that enables financial managers to identify changes or trends in production costs by reviewing the same types of data from different periods of time?",opts:["Comparative statement","Frequency ratio","Accounts-receivable summary","Sales-transaction log"],ans:0,exp:"A comparative statement compares the same types of data from different time periods, helping businesses identify changes and trends in production activities including production rates and raw-material costs."},
{q:"Which of the following is a true statement about a management information system (MIS)?",opts:["It may be one part of a business's overall information management program.","It does not assist with a business's information management program.","It is the same thing as an information management program.","It includes people, processes, and practices."],ans:0,exp:"An MIS is just hardware and software—it may be one part of an overall information management program. The overall program involves people, processes, and practices."},
{q:"Which of the following is a true statement about a project plan?",opts:["It emphasizes flexibility over strategy","It is not necessary for every project","It is a road map","It is 'set in stone'—unchanging"],ans:2,exp:"A project plan is a set of living documents serving as a road map from beginning to end. It should be amended as necessary throughout the project."},
{q:"Which of the following is a true statement about breaking the law?",opts:["It is acceptable in most industries.","It will make a company more popular.","It is necessary for business success.","It may have different consequences than breaching ethics."],ans:3,exp:"Breaking the law and breaching ethics may have different consequences. Breaking the law could result in fines or jail time, while breaching business ethics could result in loss of customers."},
{q:"Which of the following is a true statement about carrying out scanning activities?",opts:["Information obtained from TV is unreliable","You must focus only on relevant information","You should avoid using surveys and focus groups","All information should be obtained formally"],ans:1,exp:"When conducting an environmental scan, focus only on relevant information to avoid overload."},
{q:"Which of the following is a true statement about creativity?",opts:["Creativity is primarily demonstrated through entertainment and the arts","Only people born with a natural gift can display creativity","Creativity is a skill we only use on special occasions","People show creativity in a variety of ways"],ans:3,exp:"People show creativity in many ways, not just through arts. Creativity is a skill used regularly, and anyone can develop it."},
{q:"Which of the following is a true statement about effective communication?",opts:["Effective communication is a two-way process","It is up to the sender to facilitate effective communication","There are very few barriers to effective communication","People rarely make mistakes when communicating"],ans:0,exp:"Communication requires both a sender and receiver. Both are responsible for facilitating effective communication. Many barriers exist."},
{q:"Which of the following is a true statement about financial advisors?",opts:["They only help clients with investing and budgeting","They help clients execute trades in the market","They meet with their clients once","They can only help wealthy people"],ans:1,exp:"Financial advisors help execute trades in the market, construct personalized financial plans, and offer advice for saving, budgeting, investing, and tax strategies for anyone."},
{q:"Which of the following is a true statement about stock information resources?",opts:["It has never been easier to find stock information","There are very few stock information sources","Only wealthy investors have access to stock information","It is very difficult to find stock information"],ans:0,exp:"A few years ago only professionals had access to in-depth stock information. Now there is a great deal of easy-to-find information available to all investors."},
{q:"Which of the following is a true statement regarding a project champion?",opts:["S/He is the same person as the project manager","S/He can mobilize the necessary resources to get the project done","S/He is usually a low-ranking employee","S/He is closely involved in the work of the project"],ans:1,exp:"The project champion is a high-ranking person who sponsors the project and can mobilize resources, but isn't directly involved in the work."},
{q:"Which of the following is a true statement regarding budgets?",opts:["They are set for specific time periods","Some businesses don't need them","To be successful, they must stay the same from year to year","They are required by law"],ans:0,exp:"Budgets are estimates of income and expenses for specific time periods. They should be flexible, are not required by law, and every business needs one."},
{q:"Which of the following is a true statement regarding enterprise risk management (ERM)?",opts:["All risks considered in ERM are negative","ERM focuses on the combined impact of all risks","ERM can make achieving goals more difficult","Risks usually relate to relationships between employees"],ans:1,exp:"ERM takes into account all risks (positive and negative) an organization may face and looks at their combined impact to help achieve goals."},
{q:"Which of the following is a true statement regarding managerial accounting?",opts:["A managerial accountant seeks to help internal managers make the best financial decisions","Managerial accounting involves communicating with investors about financial decisions","A managerial accountant seeks to provide external stakeholders with accurate company records","Managerial accounting involves auditing internal managers and reporting to the government"],ans:0,exp:"Managerial accounting is mainly concerned with internal decision-making. Helping internal managers with financial decisions is a key goal."},
{q:"Which of the following is a type of credit card that can be used at a variety of participating businesses?",opts:["Retail store","Bank","Hotel","Petroleum"],ans:1,exp:"Bank credit cards can be used at any affiliated business. Retail store, hotel, and petroleum cards are issued by individual companies and can only be used at their facilities."},
{q:"Which of the following is a type of intangible business property that is protected by law?",opts:["Equipment","Inventory","Acreage","Trademark"],ans:3,exp:"A trademark is a symbol, design, or word used by a business to identify a good or service and is registered with the government to prevent its use by others. Equipment, inventory, and acreage are tangible property."},
{q:"Which of the following is a type of simple written report usually distributed to employees within a business?",opts:["Memorandum","Handbook","Proposal","Newsletter"],ans:0,exp:"Memorandums are brief, informal written communications exchanged within a business to update employees on projects or policy changes."},
{q:"Which of the following is a variable cost for a company?",opts:["$3,000 bimonthly financing payment for equipment","$7 per unit of raw materials","$1,000 monthly insurance premium","$5,000 monthly for rent"],ans:1,exp:"Variable costs change according to changes in sales or production volume. $7 per unit of raw materials is a variable cost. Rent, insurance, and equipment financing are fixed costs."},
{q:"Which of the following is a violation of your rights that might occur when you encounter law enforcement?",opts:["Your car is searched by a police officer, even though you did not give permission.","A police officer pulls you over and asks for your license and registration.","You are stopped by a police officer for being out a few minutes past curfew.","A police officer arrives at your party to check for underage drinking."],ans:0,exp:"You have the right to refuse a search without a warrant or probable cause. Officers may ask for license and registration, stop you for curfew violations, and investigate possible underage drinking."},
{q:"Which of the following is a way in which a central data repository for financial information can benefit a company?",opts:["It is only useful for tech-savvy employees","It houses data across several locations","It complicates the onboarding process","It helps ensure data accuracy"],ans:3,exp:"Data repositories help ensure data accuracy by helping businesses avoid data duplication and eliminate inconsistencies in data."},
{q:"Which of the following is a way in which activity-based costing enhances the costing process?",opts:["It accumulates all costs in one company-wide pool","It transfers overhead costs from low-volume products to high-volume products","It assigns overhead and direct costs to related products and services","It expands the number of cost pools used to assemble overhead costs"],ans:3,exp:"Activity-based costing enhances the costing process by expanding the number of cost pools used to assemble overhead costs, rather than accumulating all costs in one company-wide pool."},
{q:"Which of the following is a way in which businesses can effectively safeguard important financial information?",opts:["Maintaining security software","Using public Wi-Fi networks","Avoiding regular updates to devices","Using simple passwords"],ans:0,exp:"One of the best ways to safeguard financial information is to maintain security software, equipped with firewalls, antivirus protection, and more."},
{q:"Which of the following is a way in which master data management technology could benefit a company?",opts:["It improves data quality","It decreases employee turnover","It complicates processes","It guarantees customer satisfaction"],ans:0,exp:"MDM helps eliminate duplicates and correct errors, ensuring data are accurate, reliable, and consistent—improving data quality."},
{q:"Which of the following is a way to demonstrate empathy?",opts:["Give advice to people in need.","Develop a good imagination.","Use tact when speaking.","Ignore a coworker who is different."],ans:2,exp:"Tact is the ability to do or say the right thing in any circumstance. Using tact is one way to demonstrate empathy. Empathetic individuals refrain from criticizing or giving advice."},
{q:"Which of the following is an acceptable file name for a word-processing document?",opts:["Office Calendar 3/30/2021*","Office Calendar 3 30 2021","Office Calendar: 3/30/2021","Office Calendar <3 30 2021>"],ans:1,exp:"File names cannot contain \\ / : * ? < > | characters. 'Office Calendar 3 30 2021' is the only option without prohibited symbols."},
{q:"Which of the following is an accurate description of persuasion?",opts:["Forcing your ideas and opinions on others","Influencing people to change their attitudes","Losing your temper","Intimidating people into agreeing with you"],ans:1,exp:"Persuasion is the ability to influence people to change their attitudes or behavior and get them to act or agree on a plan. It does not involve force, temper, or intimidation."},
{q:"Which of the following is an action of a person who is fair?",opts:["Gets her/his own way all the time","Balances her/his needs with those of others","Pursues vengeance","Makes sure no one takes away her/his rights"],ans:1,exp:"A fair person balances personal needs with others' needs — not always getting their way. Fairness means pursuing justice rather than vengeance and protecting rights without exploiting others."},
{q:"Which of the following is an advantage for a company that implements a financial management information system?",opts:["Decreased efficiency","Less capacity to plan","More inaccuracies","Better decision-making"],ans:3,exp:"A financial management information system provides timely, reliable, accurate data that leads to better, faster decision-making. Other advantages include improved planning and increased accuracy."},
{q:"Which of the following is an advantage of a financial management information system?",opts:["It does not allow for integration","It speeds up the decision-making process","It guarantees product quality","It decreases the capacity to forecast"],ans:1,exp:"An FMIS speeds up the decision-making process as it accumulates financial data and analyzes them to help make better decisions."},
{q:"Which of the following is an advantage of a financial management information system?",opts:["It makes decisions for businesses","It does not allow for integration","It helps with planning and decreases efficiency","It gives businesses a competitive advantage"],ans:3,exp:"Businesses with an FMIS have a competitive advantage over businesses that do not, as it leverages the power of information technology to bring more productivity."},
{q:"Which of the following is an advantage of spot markets?",opts:["They do not quote for immediate payment","They are not suited for hedging","They often require physical delivery","They tend to be incredibly liquid"],ans:3,exp:"Spot markets are known for their high liquidity due to transactions occurring immediately at the current market price."},
{q:"Which of the following is an advantage of the future value of money?",opts:["It does not rely on estimates","It makes assumptions that always happen","It does not assume constant rate growth","It allows for planning"],ans:3,exp:"Future value has several advantages, including that it allows for planning and makes comparisons easier. A disadvantage is that its assumptions may not actually happen."},
{q:"Which of the following is an advantage of transparent communication in the workplace?",opts:["Increased information security","Increased worker productivity","Increased employee turnover","Increased manager turnover"],ans:1,exp:"Transparent communication allows employees to ask questions and reduces misunderstandings, leading to a more productive work environment."},
{q:"Which of the following is an advantage of unions for businesses?",opts:["They increase costs and decrease control","They help with the recruitment of new employees","They lead to higher wages and better benefits","They improve working conditions for employees"],ans:1,exp:"Unions help with recruitment of new employees and provide a security of labor contract. Higher wages, better benefits, and improved conditions are advantages for workers, not businesses."},
{q:"Which of the following is an advantage of using a virtual audit?",opts:["Increased efficiency","Longer implementation time","Decreased flexibility","Lack of rapport"],ans:0,exp:"Virtual audits offer increased efficiency and flexibility, and better alignment with remote work. Lack of rapport and longer implementation are potential disadvantages."},
{q:"Which of the following is an effective approach to negotiation?",opts:["Be willing to adjust your strategy based on the other side's approach","Do not have a specific goal or target in mind","Display strong emotional reactions","Try to trick the other side with carefully chosen language"],ans:0,exp:"Effective negotiators are aware of the other side's tactics and willing to adjust their strategy while maintaining their objectives."},
{q:"Which of the following is an ethical hazard in risk management?",opts:["Understating loss experience and exposure to an insurance underwriter","Working with a public accounting firm that has a whistleblower mechanism","Contracting with an insurer with a reputation of adequate claims reserving","Questioning a supplier's history of disobeying state and federal regulations"],ans:0,exp:"Understating loss experience or exposure to an underwriter to reduce insurance premiums exposes the company to legal and financial risks — an ethical hazard. The other options represent good ethical practices."},
{q:"Which of the following is an ethical issue related to public safety that may increase a business's risk levels?",opts:["Implementing changes to increase production-line security levels","Monitoring smokestack emissions on an occasional basis","Taking shortcuts to complete a bridge construction project on time","Exaggerating the capabilities of a commercial vacuum cleaner"],ans:2,exp:"Taking shortcuts in construction (using weaker materials, skipping processes) creates public safety risks. If the bridge collapses, the company faces substantial liability."},
{q:"Which of the following is an ethical issue resulting from internal risks?",opts:["Selecting an insurance company that considers fines a cost of doing business","Boycotting an insurance company with a reputation for not correcting mistakes","Providing incomplete data for audits","Revealing discounted expenses"],ans:2,exp:"Providing incomplete data for audits is unethical and risks the company's credibility with stakeholders."},
{q:"Which of the following is an ethical principle applicable to finance?",opts:["Incrementalism","Competence","Self-interest","Framing"],ans:1,exp:"Competence — the ability to do what needs to be done with skill — is an ethical responsibility for finance professionals. Incrementalism, self-interest, and framing are ethical challenges, not principles."},
{q:"Which of the following is an example of a business applying information to accomplish a task?",opts:["Reviewing data on trends to develop new products","Conducting research on consumer preferences","Developing questionnaires for local surveys","Examining promotional activities of competitors"],ans:0,exp:"Applying information means using it to accomplish a task. Reviewing trend data to develop products applies that information—the others are methods of obtaining it."},
{q:"Which of the following is an example of a business's legal records?",opts:["Customer phone calls","Intellectual property","Raw materials inventory","Fixed asset depreciation"],ans:1,exp:"Legal records include contracts/agreements, intellectual property (patents, copyrights, trademarks), leases, and permits."},
{q:"Which of the following is an example of a businessperson exhibiting unethical behavior in relation to a business's financial information?",opts:["A banker requests financial information from a business to process a loan.","An auditor verifies the accuracy of a corporation's financial statements.","An unauthorized employee reviews a client's financial information.","A manager examines the business's financial records to develop a budget."],ans:2,exp:"Businesses have an ethical duty to protect clients' financial information. An unauthorized employee reviewing client financial information violates that duty."},
{q:"Which of the following is an example of a capital good?",opts:["Coal","A pine forest","A highway","A cashier"],ans:2,exp:"Capital goods are manufactured/constructed items used in production of goods and services. Highways enable producers to distribute goods. Coal and forests are natural resources; cashiers are human resources."},
{q:"Which of the following is an example of a corporate governance process intended to promote transparency?",opts:["Promoting a top executive","Conducting internal audits","Hosting brainstorming sessions","Complying with external regulations"],ans:1,exp:"Internal audits are an example of effective corporate governance because they promote transparency and accountability."},
{q:"Which of the following is an example of a cost-of-goods expense a business may pay?",opts:["Wages for its employees","Electricity for its building","Rent for its land/property","Raw materials for its products"],ans:3,exp:"Cost of goods refers to money paid for raw materials used to produce products. Wages, electricity, and rent are operating expenses — the costs of running the business."},
{q:"Which of the following is an example of a deposit-taking institution?",opts:["Premier Insurance Company","Insight Credit Services","First Street Credit Union","Delaware Mortgage Company"],ans:2,exp:"Credit unions offer savings and checking accounts for members. Insurance, credit services, and mortgage companies do not take deposits."},
{q:"Which of the following is an example of a direct cost a business pays?",opts:["Office supplies","Marketing costs","Production equipment","Utilities"],ans:2,exp:"Direct costs are expenses that can be directly linked to a specific item, service, project, or expense category. Production equipment is a direct cost. Office supplies and utilities are indirect costs."},
{q:"Which of the following is an example of a finance professional exhibiting responsible behavior?",opts:["A financial planner asks Colin specific questions about his financial goals","Katherine tries to sell a high-risk product to earn a large commission","A financial advisor delays contacting Olivia about declining stock value","Ryan shares a client's portfolio details at a dinner party"],ans:0,exp:"Responsible planners ask questions to understand clients' goals and risk tolerance before recommending products."},
{q:"Which of the following is an example of a long-term business goal?",opts:["Develop departmental budgets","Expand into new markets","Hire an accountant","Create a sales presentation"],ans:1,exp:"Expanding into new markets typically takes over a year and is a long-term goal. The others can be accomplished in a year or less."},
{q:"Which of the following is an example of a material resource?",opts:["A long-term employee","A marketing-research study","A bank loan","A piece of manufacturing equipment"],ans:3,exp:"Material resources are the equipment and supplies businesses need to produce goods and services. Employees are human resources; a study is informational; a loan is financial."},
{q:"Which of the following is an example of a period cost for a business?",opts:["Direct labor","Manufacturing supplies","Marketing expenses","Raw materials"],ans:2,exp:"Period costs are all costs not included in product costs—not directly tied to the production process. Marketing expenses are period costs. Direct labor, raw materials, and manufacturing supplies are product costs."},
{q:"Which of the following is an example of a persuasive message that businesses write?",opts:["Collection letter","Electronic mail","Handwritten note","Interoffice memo"],ans:0,exp:"A collection letter is a persuasive message written to customers who are delinquent on payments, persuading them to send payment or make arrangements."},
{q:"Which of the following is an example of a policy that's influenced by environmental law?",opts:["Medicine must be approved to be marketed to the public.","In many places, seatbelts are required by the government.","Drinking water must meet state, provincial, and federal quality standards.","Drivers must obey posted speed limits."],ans:2,exp:"Environmental law includes regulations that protect water quality, requiring drinking water to meet standards. Seatbelts, medicine approval, and speed limits are governed by other types of law."},
{q:"Which of the following is an example of a post-sale touchpoint?",opts:["Customer satisfaction survey","Publicity","Word-of-mouth marketing","Product packaging"],ans:0,exp:"Post-sale touchpoints include follow-up, shipping/delivery, warranties/rebates, and customer loyalty programs. A customer satisfaction survey is a post-sale touchpoint."},
{q:"Which of the following is an example of a preventive internal control?",opts:["Physical inventories","Data reconciliations","Variance analyses","Segregation of duties"],ans:3,exp:"Preventive controls like segregation of duties attempt to prevent noncompliance from occurring. Data reconciliations, variance analyses, and physical inventories are detective controls."},
{q:"Which of the following is an example of a probable conflict of interest in business operations?",opts:["An employee meets a new client for lunch at an upscale restaurant.","A purchasing agent provides a customer with a discount.","A purchasing agent awards a large order to a relative's employer.","An employee uses the company discount to purchase goods."],ans:2,exp:"A conflict of interest occurs when personal interests affect decision-making. Awarding a large order to a relative's employer creates a personal financial interest in the transaction."},
{q:"Which of the following is an example of a real estate investment?",opts:["Land to be developed in the future","A certificate of deposit","A corporate bond","Partial ownership of a corporation"],ans:0,exp:"Real estate is property such as land. CDs and bonds are lending investments; partial ownership of a corporation is stock (equity investment)."},
{q:"Which of the following is an example of a regional multilateral trade alliance impacting global trade?",opts:["The International Monetary Fund","The World Trade Organization","The United States-Mexico-Canada Agreement","The United Nations"],ans:2,exp:"The USMCA is a regional multilateral trade alliance facilitating exchange among Canada, Mexico, and the United States. The IMF, WTO, and UN are international, not regional, organizations."},
{q:"Which of the following is an example of a routine decision?",opts:["Choosing a career to pursue","Picking a new roommate","Selecting which car to buy","Ordering pizza for dinner"],ans:3,exp:"Routine decisions are minor and made almost unconsciously. Ordering pizza is routine; choosing a career, roommate, or car are major decisions requiring much more deliberation."},
{q:"Which of the following is an example of a subsidy?", opts:["Financial grant","Tax increase","Processing fee","Legal sanction"], ans:0, exp:"A subsidy is financial aid provided by the government. Grants are financial aid that recipients don't need to repay. Taxes, processing fees, and legal sanctions (fines) are methods governments use to acquire funds, not provide them."},
{q:"Which of the following is an example of a tax liability?",opts:["Value of an exemption","Deduction for a charitable contribution","Amount due on an inheritance","Interest paid on a mortgage"],ans:2,exp:"A tax liability is the total tax owed. An inheritance tax is a debt individuals must pay when receiving an inheritance. Deductions, exemptions, and mortgage interest reduce tax liability."},
{q:"Which of the following is an example of a verbal acknowledgment response a listener can use to show a speaker they are listening?",opts:["Making eye contact","Leaning forward","Nodding their head","Saying, 'I understand.'"],ans:3,exp:"Verbal acknowledgment responses are words or utterances showing you are paying attention. Eye contact, leaning, and nodding are nonverbal, not verbal, responses."},
{q:"Which of the following is an example of a voluntary debtor-creditor relationship?",opts:["Requiring specific information","Receiving a monetary gift","Obtaining a loan from a bank","Owing punitive damages"],ans:2,exp:"Obtaining a loan from a bank is voluntary because the business (debtor) seeks funds from the bank (creditor) through a loan-application process. Punitive damages are an involuntary debtor-creditor relationship."},
{q:"Which of the following is an example of acting ethically in regards to insurance?",opts:["Keeping insurance information concealed from staff","Maintaining the same policies for as long as possible","Obtaining the insurance required by law","Telling the whole truth to insurance agents"],ans:3,exp:"Risk managers must tell the truth to insurance companies. Misleading them is unethical."},
{q:"Which of the following is an example of an employee behaving ethically at work?",opts:["Performing work-related tasks in efficient ways","Making social plans with friends on company time","Using office supplies for personal business","Accepting credit for a project that a coworker completed"],ans:0,exp:"Ethical employees complete tasks efficiently, follow company rules, and are honest. Using office supplies for personal use, making personal plans on company time, and taking undue credit are unethical."},
{q:"Which of the following is an example of an employee observing safety standards?",opts:["Damian doesn't wear eye goggles when operating a machine","Heather stays positive at work, no matter what","Mariah wears a helmet when she works in the factory","Lucas always arrives to work early"],ans:2,exp:"Mariah wearing a helmet when she works in the factory is an example of an employee observing safety standards."},
{q:"Which of the following is an example of an employee respecting the privacy of a coworker?",opts:["Speaking up for a coworker who is being unfairly criticized","Leaving the room when a salesperson takes a telephone call","Giving feedback about a project to a coworker or manager","Answering a coworker's telephone when s/he is at lunch"],ans:1,exp:"An employee who respects others' privacy would leave the room when a coworker takes a telephone call, gaining the trust and respect of coworkers."},
{q:"Which of the following is an example of an employee who is meeting his/her employer's expectations?",opts:["Tom spends the first half hour of the workday chatting with Kate.","Allison focuses on her work tasks so she can meet her deadlines.","Rachel sends a text message to her roommate during a meeting.","Calvin tells a customer about his issues with a difficult coworker."],ans:1,exp:"Employers expect employees to perform their work accurately and efficiently. Allison is focused on her work and strives to meet deadlines, meeting employer expectations."},
{q:"Which of the following is an example of an ethical financial compliance practice?",opts:["Implementing internal control systems to prevent fraud","Hiding the level of risk of a stock from a client","Entering an arrangement to attempt to manipulate the market","Aggressively pressuring clients into selling a security"],ans:0,exp:"Implementing internal controls to prevent financial crimes such as fraud and money laundering is an example of an ethical financial compliance practice."},
{q:"Which of the following is an example of an ethical principle?",opts:["Accountability","Humor","Intelligence","Charisma"],ans:0,exp:"Ethical principles are standards governing behavior. Accountability—accepting responsibility for your decisions—is an ethical principle. Humor, intelligence, and charisma are characteristics, not ethical principles."},
{q:"Which of the following is an example of an external factor that has increased interest in enterprise risk management (ERM)?",opts:["Increased efficiency","Decreased transparency","Increased regulatory scrutiny","Decreased volume of information"],ans:2,exp:"Increased regulatory scrutiny — greater attention placed on compliance and risk management — has been an external factor driving organizations to adopt ERM."},
{q:"Which of the following is an example of an external financial risk that a company might experience?",opts:["Poorly produced products","Significant accounting errors","Poor budgeting and planning","Change in currency exchange rates"],ans:3,exp:"A change in currency exchange rates is outside a company's control and is therefore an external risk. Accounting errors, poor budgeting, and poor products are internal risks."},
{q:"Which of the following is an example of an indirect cost in an automobile factory?",opts:["Shipping","Glass","Electricity","Assembly line workers' salaries"],ans:2,exp:"Electricity is used for many purposes throughout the factory and cannot be assigned to a specific product—it's an indirect cost."},
{q:"Which of the following is an example of an indirect cost?",opts:["Insurance","Wages","Materials","Commission"],ans:0,exp:"Insurance cannot be directly allocated to a specific person, project, or department—it's used across various departments. Wages, materials, and commissions can be directly assigned."},
{q:"Which of the following is an example of an informational message geared toward an external audience?",opts:["An inventory report","An office calendar","An employee handbook","A print advertisement"],ans:3,exp:"Print advertisements communicate product information to customers/potential customers — an external audience. Inventory reports, office calendars, and employee handbooks target internal audiences."},
{q:"Which of the following is an example of an internal control mechanism impacting an organization's governance?",opts:["Compliance laws","Regulatory guidelines","Union contracts","Segregation of duties"],ans:3,exp:"Segregation of duties is an internal control mechanism dividing responsibilities so no one person has excessive power. Compliance laws and regulatory guidelines are external."},
{q:"Which of the following is an example of an internal risk for a business?",opts:["Political change","Outdated software","Economic depression","Natural disaster"],ans:1,exp:"Internal risks are faced by a company from within its organization. Outdated software is an example of an internal technological risk."},
{q:"Which of the following is an example of an unethical activity that relates to risk management?",opts:["Issuing bonds to raise funds for a corporation","Requesting various documents to process a loan request","Withholding information from insurance underwriters","Using third-party debt collectors to obtain overdue payments"],ans:2,exp:"Withholding information that may affect the approval of an insurance application or the compensation for a claim is unethical behavior in the risk management/insurance field."},
{q:"Which of the following is an example of an uninsurable risk?",opts:["Fire","Business interruption","Customer buying habits","Personal injury"],ans:2,exp:"Buying habits can change quickly and unpredictably, so insurance companies won't assume coverage. Fire, business interruption, and personal injury are insurable."},
{q:"Which of the following is an example of arbitrage?",opts:["An individual earns interest on money left in a financial institution for a set time frame.","An individual buys 10 shares of stock for $150 per share on one market and immediately sells each share for $200 on another market.","A business places a percentage of its income into a retirement account for employees.","A business sells corporate bonds to finance major expansion efforts."],ans:1,exp:"Arbitrage is profiting from buying and immediately selling a financial instrument on a different market at a higher price. The $50/share profit in this example is arbitrage."},
{q:"Which of the following is an example of bancassurance?",opts:["Cover Yourself Insurance manages a pension for XYZ Corp","A Good Cents Bank employee sells CDs to a customer","A Dollars R Us Bank employee sells an auto-insurance policy","BBB Insurance processes a small-business loan"],ans:2,exp:"Bancassurance is the sale of insurance products by a bank. A bank employee selling auto insurance to a customer is bancassurance."},
{q:"Which of the following is an example of convergence in the finance industry?",opts:["Chase Schwartz acquires Dollar-Wise Financial Services","Constitution Savings merges with Adams Community Bank","Independence Insurance acquires NetAutoInsurance.com","United Federal Bank merges with Provincial Insurance Company"],ans:3,exp:"Convergence is the merging of financial providers from different financial sectors (e.g., a bank merging with an insurance company). Merging within the same sector is consolidation."},
{q:"Which of the following is an example of demonstrating integrity in your personal life?",opts:["Being honest with a friend and telling them that you dislike their outfit","Keeping the money that someone left in the ATM","Admitting to your parents when you forget to empty the dishwasher","Using a white lie as an excuse to get out of an obligation"],ans:2,exp:"Integrity includes being honest and admitting mistakes. Keeping found money, white lies, and tactless honesty do not demonstrate integrity."},
{q:"Which of the following is an example of ethical risk management?",opts:["Reviewing invoices","Having a strong legal team","Asking for a raise","Ensuring product safety"],ans:3,exp:"Companies must practice ethical risk management by protecting the customer as much as possible. Ensuring product safety is an ethical risk management practice."},
{q:"Which of the following is an example of ethics in business?",opts:["Using company resources wisely","Praising your friends","Striving for a promotion","Asking for a raise"],ans:0,exp:"Ethical behavior at work means doing the right thing and following ethical principles, including using company resources wisely."},
{q:"Which of the following is an example of external risk?",opts:["Ineffective leadership","Union strikes","Changes in import laws","Outdated technology"],ans:2,exp:"Changes in import laws are a political risk factor (external). Ineffective leadership and union strikes are human-factor risks (internal); outdated technology is technological risk (internal)."},
{q:"Which of the following is an example of how a business or industry has a unique relationship with its environment?",opts:["Social and cultural attitudes change over time.","An economy in prosperity will eventually experience recession.","Demand for skilled nursing care rises as the population ages.","New technology causes new laws to be enacted."],ans:2,exp:"The impact of demographics (aging population) on the health care industry demonstrates the unique relationship between businesses and their environments."},
{q:"Which of the following is an example of information a manufacturing company keeps about its customers?",opts:["Expense reports","Invoices","Tax returns","Payroll reports"],ans:1,exp:"Invoices are formal records of sales that track customer purchasing habits."},
{q:"Which of the following is an example of internal risk?",opts:["Changes in export laws","An economic downturn","Injured employees","An earthquake"],ans:2,exp:"Injured employees are a human-factor risk (internal). Changes in export laws are political risk (external); economic downturns are economic risk (external); earthquakes are natural risk (external)."},
{q:"Which of the following is an example of job loss due to cyclical unemployment?",opts:["Ryan recently lost his job in the construction industry during a time of economic contraction.","Tristan lost his management job when the coal supply had been depleted at the mine.","Lizzy's temporary job at a gourmet food company ended in January after the holiday rush.","Hannah left her position as a human resources manager to attend graduate school."],ans:0,exp:"Cyclical unemployment occurs during periods of low demand due to economic conditions. Ryan's layoff during economic contraction is a classic example."},
{q:"Which of the following is an example of legal tender issued by the federal government?",opts:["Bank notes","Corporate bonds","Mutual funds","Municipal bonds"],ans:0,exp:"Bank notes are currency (paper money) issued by a country's government. Corporate bonds and municipal bonds are debt instruments; mutual funds are collections of investments."},
{q:"Which of the following is an example of persuasive messages that businesses write?",opts:["Electronic mail","Collection letter","Handwritten note","Interoffice memo"],ans:1,exp:"A collection letter is a persuasive message that businesses write to delinquent customers to convince them to send payment or contact the business to make an arrangement."},
{q:"Which of the following is an example of point-of-sale fraud?",opts:["Vendors taking funds from the register","Competitors accessing computer files","Customers replacing price tags","Employees undercharging their friends"],ans:3,exp:"Employees undercharging friends is point-of-sale fraud—selling items for less than actual value, causing the business to lose money on the sale."},
{q:"Which of the following is an example of the impact of technology on the financial-services industry?",opts:["Blurring the lines between banking, insurance, and investments","More walk-in bank customers","Greater demand for investment professionals","Rising concern about fraud and identity theft"],ans:3,exp:"One impact of technology on financial services is rising concern about fraud and identity theft since so many financial products and services are now bought and sold online."},
{q:"Which of the following is an example of unethical behavior involving confidential information?",opts:["An employee tells a coworker how much the sales manager earned in bonuses last year.","An accounts-receivable employee provides his/her manager with an aging-accounts report.","A manager advises a subordinate that s/he is being laid off due to financial problems.","A manager tells her staff she will be on maternity leave from April through June."],ans:0,exp:"It is unethical for employees to discuss anyone else's salary with coworkers. This can result in bad feelings, resentment, low morale, and reduced productivity."},
{q:"Which of the following is an example of using customer information wisely?",opts:["Keeping it safe and not using it","Sending frequent emails","Sharing customer information with partnering businesses","Customizing communications"],ans:3,exp:"Using customer information wisely means using it to customize communications with individual customers — communicating when and how they prefer, not just sending frequent emails."},
{q:"Which of the following is an external control used to govern companies?",opts:["Segregation of duties","Whistleblower policy","Safety laws","Managerial oversight"],ans:2,exp:"External controls are set by governments. Safety laws are external. Whistleblower policies, segregation of duties, and managerial oversight are internal."},
{q:"Which of the following is an external control used to govern companies?",opts:["Whistleblower policy","Safety laws","Segregation of duties","Managerial oversight"],ans:1,exp:"External controls come from outside the organization — governments set safety laws. Whistleblower policies, segregation of duties, and managerial oversight are internal controls."},
{q:"Which of the following is an external factor that impacts corporate governance structures?",opts:["Company code of conduct","Independent audits","Segregation of duties","Change in leadership"],ans:1,exp:"An independent audit is an examination by an outside organization. Segregation of duties, a company's code of conduct, and a change in leadership are internal factors."},
{q:"Which of the following is an external source of corporate information that can aid an organization in understanding securities?",opts:["Sales reports","Customer records","Accounts receivable","Investment research firms"],ans:3,exp:"Investment research firms are external sources. Sales reports, customer records, and accounts receivable are all internal data sources."},
{q:"Which of the following is an impact of unemployment?",opts:["Slower delivery times","Higher employee morale","Reduced economic output","More purchasing power"],ans:2,exp:"Unemployment reduces the number of people contributing to the production of goods and services, which leads to a decrease in overall economic output."},
{q:"Which of the following is an internal factor that has an effect on business cycles?",opts:["Inventory levels","Political changes","New discoveries","Foreign conflicts"],ans:0,exp:"Inventory levels are internal because they take place within the economic system. When producers increase inventory optimistically, economic activity expands; when they cut production, it contracts."},
{q:"Which of the following is an uninsurable external risk to businesses?",opts:["Inventory","Tax increases","Personal injury","Natural disasters"],ans:1,exp:"Businesses cannot control when or by how much a government may increase taxes—these are uninsurable external risks. Inventory, personal injury, and natural disasters are insurable risks."},
{q:"Which of the following is available to all people around the world who have access to a computer with connectivity?",opts:["Extranet","Intranet","Internet","Broadband"],ans:2,exp:"The Internet is a worldwide network of computers enabling users to access information and communicate. Intranets and Extranets are limited to authorized users. Broadband is a type of technology."},
{q:"Which of the following is categorized as a fixed expense in a personal budget?",opts:["Clothing","Groceries","Home repairs","Car payment"],ans:3,exp:"Fixed expenses don't fluctuate month to month. Car payments, insurance, and rent are fixed. Groceries, clothing, and home repairs vary."},
{q:"Which of the following is categorized as owner's equity on a company's balance sheet?",opts:["Capital equipment","Accounts receivable","Inventory","Retained earnings"],ans:3,exp:"Retained earnings are a component of owner's equity. Inventory and accounts receivable are current assets; capital equipment is a long-term asset."},
{q:"Which of the following is considered a direct cost?",opts:["Raw materials","Rent","Office supplies","Utilities"],ans:0,exp:"Raw materials can be directly connected to a specific cost objective like a product. Rent, utilities, and office supplies are indirect costs spread across departments."},
{q:"Which of the following is considered a presale touchpoint?",opts:["Shipping/Delivery","Installation","Interaction with a salesperson","Advertising"],ans:3,exp:"Advertising is a presale touchpoint—interaction before the buying process. Interaction with a salesperson is during the sale; shipping and installation are post-sale."},
{q:"Which of the following is most likely to affect the selling price of roses?",opts:["A large number of rose bushes are killed by disease","Plants and small shrubs are also sold at the flower shop","The flower shop also carries silk flowers","A reorder shipment of roses arrives"],ans:0,exp:"Disease killing rose bushes reduces supply, which increases price. Assortment changes do not affect other products' prices."},
{q:"Which of the following is most likely to happen to employees who are discourteous to the business's customers?",opts:["They may be promoted.","They may be fired.","They may win an award.","They may lose their benefits."],ans:1,exp:"More people lose their jobs because they can't get along with other people than for any other reason. Establishing positive customer relations is essential; employees who damage these relations risk being fired."},
{q:"Which of the following is most likely to have a negative effect on financial markets?",opts:["Interest rates fluctuate daily.","Business expansion slows quickly.","Unemployment rates stabilize steadily.","Consumer spending increases consistently."],ans:1,exp:"Rapid slowdown in business expansion signals possible recession, leading to layoffs, reduced spending, and negative market effects. Stabilizing unemployment and increasing spending are positive signs."},
{q:"Which of the following is most likely to have a negative effect on financial markets?",opts:["Interest rates fluctuate daily.","Business expansion slows quickly.","Unemployment rates stabilize steadily.","Consumer spending increases consistently."],ans:1,exp:"Slower business expansion indicates an economic recession. Less work leads to more layoffs, rising unemployment, less consumer spending, and less investment in financial products."},
{q:"Which of the following is most likely to impact a company's corporate governance?",opts:["Suppliers","Board of directors","Global citizens","Auditors"],ans:1,exp:"The board of directors governs the activities of a corporation and is responsible for handling responsibility toward shareholders—directly impacting corporate governance."},
{q:"Which of the following is most likely to incur a luxury tax? (1255 version)",opts:["Used minivan with leather interior","Five-carat diamond ring","Wool coat with faux fur collar","Laptop computer"],ans:1,exp:"Luxury taxes are levied on expensive, nonessential items such as luxury cars, valuable artwork, and expensive jewelry. A minivan, wool coat, and laptop are not considered luxury items."},
{q:"Which of the following is most likely to incur a luxury tax?",opts:["Wool coat with faux fur collar","Five-carat diamond ring","Laptop computer","Used minivan with leather interior"],ans:1,exp:"Luxury taxes are levied on expensive, nonessential items such as luxury cars, valuable artwork, and expensive jewelry like a five-carat diamond ring."},
{q:"Which of the following is most likely to limit your ability to assess the long-term impact of a decision?",opts:["Negative outcomes","Personal experience","Positive outcomes","Personal bias"],ans:3,exp:"Personal bias can prevent considering the full impact of decisions. Personal experience can actually be helpful in assessing long-term impact."},
{q:"Which of the following is most likely to reduce risk?",opts:["Dividends","Bonds","Insurance","Stocks"],ans:2,exp:"Insurance transfers the risk factor to another person or business. An insurance policy is a contract in which the insurance company agrees to provide protection against insurable losses."},
{q:"Which of the following is NOT a benefit of a post-implementation review?",opts:["Identifying ways to improve project planning","Identifying cost-savings opportunities for future projects","Identifying cost-savings opportunities for the current project","Identifying ways to improve the company's processes"],ans:2,exp:"A post-implementation review is conducted after a project is finished, so there is no opportunity to save money on the current project—only on future ones."},
{q:"Which of the following is NOT a factor contributing to financial convergence and consolidation?",opts:["Desire for illiquid assets","Technological advances","Financial deregulation","Desire for lower costs"],ans:0,exp:"Financial firms don't merge because they want illiquid assets (worth very little). Financial convergence and consolidation is driven by technological advances, deregulation, and desire for lower costs."},
{q:"Which of the following is NOT a key factor involved with compounding growth?",opts:["The amount of money you invest","The risk of the stock market","How long your money is invested","How much your investment grows each year"],ans:1,exp:"The risk of the stock market is not a key factor in compounding growth. The three key factors are: amount invested, how long it's invested, and how much it grows each year."},
{q:"Which of the following is one guideline to which Benford's law typically applies?",opts:["Data must be measured rather than assigned","Smaller datasets are better than larger datasets","All data must be qualitative","Data should be restricted by minimums or maximums"],ans:0,exp:"Benford's law typically applies to data that must be measured rather than assigned, as it often does not apply to assigned numbers such as ID numbers or zip codes."},
{q:"Which of the following is one of a business's biggest expenses?",opts:["Payroll","Insurance","Rent","Utilities"],ans:0,exp:"Payroll—the money a business pays in salaries and wages—is one of its biggest expenses, making it important to get full value from payroll dollars."},
{q:"Which of the following is one of Noah's (financial planner) ethical responsibilities to his clients?",opts:["Being friends with his clients","Keeping client information confidential","Giving clients subjective information","Responding to clients on his own timeline"],ans:1,exp:"Keeping client information confidential is a core ethical responsibility. Clients cannot trust advisors who don't protect their privacy."},
{q:"Which of the following is one of the main components of an income statement?",opts:["Assets","Revenue","Taxes","Liabilities"],ans:1,exp:"Revenue — money earned from all sources like sales, interest, and dividends — is a main component of an income statement. Assets and liabilities appear on the balance sheet; taxes are calculated from net income."},
{q:"Which of the following is responsible for creating and reviewing corporate governance policies for a business?",opts:["Board of managers","Board of directors","Board of accountancy","Board of elections"],ans:1,exp:"A corporation's board of directors is responsible for approving and reviewing the corporate governance policies of the business."},
{q:"Which of the following is something that may be subject to a luxury tax?",opts:["Flat-screen TV","Commercial plane ticket","Smart phone","Mansion"],ans:3,exp:"Luxury taxes are imposed on nonessential goods affordable only to wealthy consumers. A mansion qualifies; flat-screen TVs, smartphones, and plane tickets are accessible to most."},
{q:"Which of the following is something that may be subject to a luxury tax?",opts:["Tablet","Courtside seats","Flat-screen TV","Precious gemstones"],ans:3,exp:"Luxury tax is only imposed on specific goods considered non-essential or affordable only to the wealthiest consumers, such as precious gemstones."},
{q:"Which of the following is the accounting equation?",opts:["Assets = Liabilities - Owner's Equity","Liabilities = Owner's Equity + Assets","Owner's Equity = Assets X Liabilities","Assets = Liabilities + Owner's Equity"],ans:3,exp:"The accounting equation is: Assets = Liabilities + Owner's Equity. A business obtains all its assets through two sources—borrowing and investment."},
{q:"Which of the following is the best example of misusing company resources?",opts:["Juan takes notepads from the supply closet.","Nate flies first class when he travels for work.","Yazmin often leaves her shift early without clocking out.","Ashley pays for a business lunch with a company credit card."],ans:2,exp:"Leaving early without clocking out means being paid for time not worked — a misuse of company resources (company time). The others may be acceptable under company policy."},
{q:"Which of the following is the best way to handle dishonest customers?",opts:["Don't jump to quick conclusions.","Explain and demonstrate good service as many times as you need to.","Never press for sales or decisions.","Mirror their behavior."],ans:0,exp:"Don't jump to conclusions with potentially dishonest customers — what appears suspicious may not be. Mirroring behavior and avoiding sales pressure are strategies for different customer types."},
{q:"Which of the following is the first step a business should take when developing a budget?",opts:["Understanding its goals","Estimating income","Determining budget surplus or deficit","Identifying expenses"],ans:0,exp:"The first step a business should take when developing a budget is to gain a firm understanding of its goals."},
