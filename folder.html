{q:"Parker, Lily, Paula, and David are from different departments working together from March to December to develop an intranet application. This is a(n):", opts:["Quality circle","Project team","Standing committee","Short-term committee"], ans:1, exp:"A project team works together for a set period to complete a specific task (March to December = defined timeframe). A quality circle studies work problems and recommends solutions. A standing committee works over a long period. A short-term committee has an immediate goal like planning an event."},
{q:"Patents, trademarks, and copyrights are all used to protect an individual or company's:",opts:["Intellectual property","Business equipment","Tangible assets","Financial assets"],ans:0,exp:"Intellectual property refers to intangible assets resulting from thinking processes. Patents, trademarks, and copyrights protect exclusive use of intellectual property."},
{q:"Patricia hears that her new coworker is quite a bit older and worries she'll be out of touch with technology. What action should Patricia take?",opts:["Avoid the new coworker and take over her duties","Talk to her boss about hiring someone else","Try to teach the new coworker how to use technology","Acknowledge that her beliefs are based on stereotypes"],ans:3,exp:"Patricia is believing a stereotype. She must acknowledge this before she can change her assumptions about the new coworker."},
{q:"Paul told Leslie to sell her Bex stock because confidential financial data shows profits dropped by a third. This is an example of:",opts:["Encryption","Disparate data","Stewardship","Insider trading"],ans:3,exp:"Illegal insider trading occurs when an employee shares non-public company information with others so they can trade stock before the public learns of it."},
{q:"Paul's brother uses computer terms that confuse him. Which communication barrier is blocking effective communication?",opts:["Environment","Information overload","Language","Bad timing"],ans:2,exp:"Jargon is specialized language known only to a certain group. Computer lingo is jargon—a language barrier."},
{q:"Paula asks 'What do I want to get out of this article?' and 'What are the main points?' whenever she reads research articles. Paula is using __________ techniques.",opts:["Professional editing","Prospecting","Active reading","Summary close"],ans:2,exp:"Active reading techniques include determining what information you need beforehand and summarizing main points to better comprehend the material."},
{q:"Penny finds her daily work tasks less mundane now that she understands how they contribute to the team's shared vision. Which benefit of shared vision helped Penny?",opts:["It stimulates creativity","It improves communication","It acts as a guide for decision-making","It provides focus for team members' energy"],ans:3,exp:"Shared vision helps team members focus their energy from day to day while performing their work tasks."},
{q:"Penny started her job believing lying was completely wrong. After two years, she exaggerates financial projections and now believes lies are only wrong when they cause direct harm. This is an example of:",opts:["incrementalism.","self-interest.","obedience to authority.","conformity."],ans:0,exp:"Incrementalism is the gradual diminishing of ethical values over time. Penny's standards have slowly eroded — she now justifies lying that she once found unacceptable."},
{q:"Peyton asks Ann to write a letter of recommendation to a potential employer. Which networking technique is Peyton using?",opts:["Opportunistic","Organizational","Grapevine","Referral"],ans:3,exp:"Asking an influential person to write a formal recommendation to a potential employer is referral networking."},
{q:"Phil spends at least 1 hour of every workday playing games on his phone but consistently logs 8 hours. Phil is guilty of:",opts:["Time theft","Impartiality","Misusing company equipment","Unethical inventory management"],ans:0,exp:"Time theft occurs when an employee spends company time on personal matters when they should be working, causing a loss in productivity and profitability."},
{q:"Philippe wants to find the average length of time visitors spend on his website. Which data would be most useful?",opts:["Receiving data","External data","Clickstream data","Qualitative data"],ans:2,exp:"Clickstream data includes how long people visit a website and what they do while there. External and qualitative data would not provide this."},
{q:"Phoebe needs to discuss her employee's frequent lateness and absences. What channel of communication should Phoebe use?",opts:["Face-to-face conversation","A video conference","An email message","A company-wide memo"],ans:0,exp:"Face-to-face communication is best for sensitive issues—it is the richest form with the least risk of misinterpretation. Memos would be inappropriate for an individual issue."},
{q:"Planning ahead and estimating the time it will take to complete your tasks will help you to:",opts:["manage your work commitments effectively.","learn how to procrastinate.","improve your technical skills.","reduce your workload."],ans:0,exp:"Planning and time estimation help you manage commitments by avoiding scheduling too many overlapping activities. It reduces procrastination but doesn't reduce workload or directly improve technical skills."},
{q:"Positive customer relations can boost productivity by:",opts:["Attracting new customers","Creating new manufacturing processes","Avoiding wasted time and resources","Cutting down on equipment costs"],ans:2,exp:"When a business provides a positive experience the first time, it avoids correcting mistakes and solving problems, reducing wasted time and resources."},
{q:"Production processes that rely heavily on expensive equipment and materials are __________ processes.",opts:["Standardized","Intermittent","Capital-intensive","Labor-intensive"],ans:2,exp:"Capital-intensive processes rely on expensive equipment rather than workers (e.g., power generation plants)."},
{q:"Project management can benefit greatly from user-generated, user-updated websites called:",opts:["wikis.","forums.","encyclopedias.","flash drives."],ans:0,exp:"Wikis are user-generated, user-updated websites that allow collaborative, real-time content editing — a valuable tool for project management coordination."},
{q:"Properly training employees on safety procedures is an effective way for companies to limit their __________ -liability exposure.",opts:["Product","Customer","Employee","Fiduciary"],ans:2,exp:"Employee-liability exposure is the total risk businesses face from employees who have suffered a job-related injury, illness, or other adversity. Training employees limits this risk."},
{q:"Protecting the investments of shareholders is a primary responsibility of:",opts:["Company employees","The board of directors","Upper level managers","Company lawyers"],ans:1,exp:"The board of directors is responsible for protecting shareholders' investments, developing the company's mission and structure, and governing all organizational activities."},
{q:"Publicly traded companies are required by law to provide:",opts:["Stock research","Yearly newsletters","Company report cards","Financial statements"],ans:3,exp:"Publicly traded companies are required by law to provide financial statements to shareholders every 90 days."},
{q:"Publicly-traded companies are required by law to provide:",opts:["Company report cards","Stock research","Financial statements","Yearly newsletters"],ans:2,exp:"Publicly-traded companies must provide financial statements to shareholders every 90 days by law."},
{q:"Purchasing is important to international businesses because:",opts:["supplies should be delivered in a timely fashion.","good relations with vendors reduce prices.","quality standards should be maintained.","controlling costs increases competitiveness."],ans:3,exp:"Effective purchasing controls costs, enabling businesses to lower selling prices and remain competitive in world markets."},
{q:"Qualified employees who behave unethically on the job may harm themselves by being:",opts:["sent to a training program.","passed over for promotions.","held legally responsible.","rotated to similar positions."],ans:1,exp:"Coworkers and supervisors notice unethical behavior and may lose respect for those employees, causing them to be passed over for promotions because supervisors don't trust them."},
{q:"Raheem sold an investment he owned for five years for considerably more than he paid. He is likely to owe __________ tax on the profit.",opts:["Income","Long-term capital gains","Short-term capital gains","Excise"],ans:1,exp:"Investors pay long-term capital gains tax on assets owned more than a year. Short-term applies to assets held one year or less."},
{q:"Randall is working extra hours and now isn't sure he'll have enough time to study for his finals. He's feeling a lot of pressure and tension, also known as:",opts:["job satisfaction.","productivity.","stress.","employee turnover."],ans:2,exp:"Stress is the mental, physical, or emotional feeling of pressure or tension—what you feel when overwhelmed, overworked, or worried."},
{q:"Raul's manager needs lists of invoices generated in specific time periods and will ask for similar data in different time periods regularly. What query type can Raul use without creating a new query each time?", opts:["Crosstab query","Parameter query","Wildcard query","Status query"], ans:1, exp:"Parameter queries allow users to input different criteria (like time periods) each time the same general query is run—without rebuilding the query. Crosstab queries aggregate data transforming rows to columns. Wildcard queries find records with uncertain spelling. Status queries determine system/project status."},
{q:"Real-time reporting has helped risk management teams __________ the time between when a risk is documented and when it reaches people who can act on it.",opts:["Monetize","Decrease","Increase","Escalate"],ans:1,exp:"Real-time reporting and automated processes decrease the communication lag time in risk management, alerting key personnel immediately."},
{q:"Recently, the Second-Fourth Bank merged with the Wide World Insurance Company. This is an example of:",opts:["liquidation.","convergence.","divergence.","endowment."],ans:1,exp:"Convergence is the merging of financial providers from different sectors (bank + insurance). Consolidation is merging within the same sector (bank + bank). Liquidation involves selling assets."},
{q:"Recognizing your strengths and weaknesses helps you accept yourself, which is one of the foundations of:",opts:["self-fulfillment.","social acceptance.","safety.","self-esteem."],ans:3,exp:"Self-esteem is the regard you have for yourself. Understanding and accepting your strengths and weaknesses — liking who you are — is the foundation of self-esteem."},
{q:"Recognizing your strengths and weaknesses helps you to accept yourself, which is one of the foundations of:",opts:["safety.","social acceptance.","self-esteem.","self-fulfillment."],ans:2,exp:"Self-esteem is the regard or respect you have for yourself. People who have self-esteem understand themselves and like who they are."},
{q:"Reflecting on what you have learned allows you to",opts:["Be true to your core values, beliefs, and attitudes","Prevent offending or belittling someone else","Prove to others that you are right and they are wrong","Avoid asking difficult questions about your beliefs"],ans:0,exp:"Reflecting on and processing what you have learned will help you make an informed decision that feels true to your core values, beliefs, and attitudes."},
{q:"Reggie learned that four consumers injured themselves using a blender his company sells. He's urging management to discontinue sales. Reggie is attempting to limit the company's __________ liability exposure.", opts:["Employment","Employee","Product","Fiduciary"], ans:2, exp:"Product liability lawsuits occur when products injure consumers. Continuing to sell the potentially dangerous blender exposes the company to expensive product-liability suits. Employment liability relates to hiring/firing practices. Employee liability relates to worker issues. Fiduciary liability involves breach of trust."},
{q:"Regulations are a factor relating to which category of an environmental scan?",opts:["Demographics","Competition","Technology","Government"],ans:3,exp:"Government regulations affect organizations from the outside. Regulations are a government factor in an environmental scan."},
{q:"Reinhardt Manufacturing believes waste results from unnecessary production steps; Burke Manufacturing believes waste comes from variations within the production process. They practice __________ and __________ methodology respectively.",opts:["Lean; Six Sigma","Six Sigma; Lean","Sustainability; Lean","Lean; Sustainability"],ans:0,exp:"Lean targets unnecessary steps in the production process. Six Sigma targets variations within the process."},
{q:"Reports from a financial-information management system are being used to reallocate funds to improve profitability. In this situation, the reports are:",opts:["Guiding decision-making","Ensuring compliance","Improving customer service","Tracking purchasing behavior"],ans:0,exp:"Financial reports help managers make sound decisions about how to use or reallocate money to operate more efficiently."},
{q:"Requests, directions, and information are often communicated in writing because messages sent in writing are less likely to be:",opts:["businesslike.","misunderstood.","clear.","friendly."],ans:1,exp:"Clearly written communications prevent problems caused by poor listening or speaking. Writing can be checked for clarity and accuracy before delivery, reducing misunderstanding."},
{q:"Retailers' and wholesalers' primary purpose for purchasing is for:",opts:["Resale","Conversion into a final product","Consumption","Use in the business"],ans:0,exp:"Retailers and wholesalers engage in purchasing primarily for resale. Industrial purchasing is for internal consumption, conversion into a final product, or business use."},
{q:"Retirement accounts and real estate are examples of:", opts:["Intangible assets","Garnishments","Tax shelters","Derivatives"], ans:2, exp:"Tax shelters are methods of minimizing taxable income. Retirement programs defer taxes until withdrawal. Homeowners minimize taxes by writing off mortgage interest. Garnishment is a court-ordered salary transfer to a third party. Real estate is a tangible asset. Derivatives are securities based on other assets."},
{q:"Rewards and recognition fulfill a very basic human need for:",opts:["self-esteem.","understanding.","friendship.","safety."],ans:0,exp:"Humans have a basic need to feel important and respected. Rewards and recognition help shape self-esteem and self-respect by acknowledging efforts and contributions."},
{q:"Risk managers use computerized catastrophe modeling to estimate losses from:", opts:["Hurricanes, earthquakes, and terrorist attacks","Hurricanes, embezzlement, and terrorist attacks","Robberies, embezzlement, and terrorist attacks","Robberies, embezzlement, and sexual harassment claims"], ans:0, exp:"Catastrophe modeling estimates losses from natural disasters and significant calamities like terrorist attacks. While risk managers analyze robberies, embezzlement, and harassment claims, they don't use specialized catastrophe modeling software for these risks."},
{q:"Risk retention groups are typically only allowed to offer __________ insurance coverage.", opts:["Liability","Life","Homeowners","Health"], ans:0, exp:"Risk retention groups are liability insurance companies owned by their members (businesses, professionals, municipalities unable to get traditional liability insurance). They offer errors and omissions, malpractice, directors/officers, product liability, etc. They're not permitted to offer life, homeowners, or health insurance."},
{q:"Risk should be managed:",opts:["as a part of business strategy.","on a case-by-case basis.","through the purchase of insurance.","after an incident has occurred."],ans:0,exp:"Enterprise risk management is a plan-based business strategy. Risk managed case-by-case isn't unified; after an incident it's too late; insurance alone doesn't cover all risks."},
{q:"Rita thinks she won't be able to learn the new computer program quickly and will make many mistakes. Rita's resistance to the change is based on:", opts:["Indifference","Anger","Jealousy","Fear"], ans:3, exp:"Rita is afraid of not being able to learn quickly and making mistakes—her resistance is based on fear. This can be addressed by explaining the training program and normalizing that mistakes happen when learning new skills. There's no indication of anger, jealousy, or indifference."},
{q:"Robert learned about upcoming layoffs and sold his stock options before the news went public, telling friends to do the same. This is an example of:",opts:["Extortion","Corporate espionage","Corporate fraud","Insider trading"],ans:3,exp:"Insider trading occurs when someone trades stock based on non-public information. Robert's actions and tipping off friends are both illegal insider trading."},
{q:"Robyn is a United States citizen traveling to Ireland for business. Which document does she need to bring?",opts:["Her Social Security card","A bank statement","Her passport","A recent utility bill"],ans:2,exp:"A passport is required when traveling to another country as proof of identity and U.S. citizenship."},
{q:"Rosemary is making a sales presentation to potential customers. What communication style is most appropriate?", opts:["Cooperative","Casual","Persuasive","Traditional"], ans:2, exp:"In a sales presentation, Rosemary must professionally encourage the audience to buy. This requires persuasive communication. Casual is for family/friends. Cooperative is for working together. Traditional is not a communication style."},
{q:"Rule-induction data mining techniques are commonly used to:", opts:["Create a set of if-then permutations to predict future behavior","Modify existing solutions to create new, more useful solutions","Present complex data in readily understandable graphs and charts","Conduct statistical exploratory research and identify variable distribution"], ans:0, exp:"Rule-induction techniques determine if-then relationships in data, then use those rules to predict future behavior (decision trees are a common type). Genetic algorithms modify existing solutions. Data visualization presents complex data visually. Statistical-inference techniques conduct exploratory research."},
{q:"Russell sets smaller project goals for his team that contribute to long-term goals. As a result, his team is very organized. This is an example of how planning is:",opts:["Influenced by the potential risks","Impacted by the project's leadership","Emphasized by the political environment","Affected by the project's budget"],ans:1,exp:"Whoever is in charge of a project impacts how it is planned. Russell's organizational habits and approach to setting smaller goals directly shape his team's planning."},
{q:"Ryan is a college student who spends free time tutoring second-grade students at a local elementary school. What technique is Ryan using to obtain work experience?",opts:["Volunteering","Informational interview","Job shadowing","Internship"],ans:0,exp:"Volunteer work involves donating time without pay. By volunteering to tutor, Ryan can determine if he enjoys teaching young children and whether to pursue a teaching career."},
{q:"Salaries, commissions, and bonuses obtained from a job are examples of __________ rewards.",opts:["Intrinsic","Extrinsic","Concomitant","Vocational"],ans:1,exp:"Extrinsic rewards are the actual, tangible rewards obtained for performing the job. Intrinsic rewards come from within yourself."},
{q:"Sam asked a classmate to create a few slides for their group presentation. Sam recognized he could not do everything himself and decided to:",opts:["Prioritize","Delegate","Overcommit","Divulge"],ans:1,exp:"Delegating is assigning tasks to others. It's important when one cannot do everything alone or has overcommitted. Prioritizing means ordering tasks by importance."},
{q:"Sam participates in the London Stock Exchange, where investors trade stock among themselves without involvement from issuing companies. This best describes a:",opts:["Virtual market","Primary market","Secondary market","Tertiary market"],ans:2,exp:"The secondary market is where investors trade securities after companies sold them on the primary market. It includes major stock exchanges."},
{q:"Samantha agrees to buy a bicycle from Tony for $225. This is an example of a(n):", opts:["Unilateral contract","Bilateral contract","Renegotiated agreement","Nonverbal agreement"], ans:1, exp:"In bilateral contracts, both parties make promises—Samantha promises to pay $225, Tony promises to give her the bike. Unilateral contracts involve promises made by only one party. There's insufficient info to determine if it was nonverbal or renegotiated."},
{q:"Samantha has been chosen for a group discussion on a topic she knows little about. What should she do to become a valuable participant?",opts:["Ask to be excused from the group","Take the leadership role to give an open mind","Resist commenting until she becomes an expert","Ask questions to clarify other participants' comments"],ans:3,exp:"Asking clarifying questions helps the entire group learn. No one knows everything, and diverse viewpoints are the purpose of group discussion."},
{q:"Samantha has been chosen to participate in a group discussion on a topic she knows very little about. Which of the following should she do to become a valuable participant?",opts:["Ask to be excused from the group","Resist the urge to comment until she becomes an expert","Ask questions to clarify other participants' comments","Take the leadership role to give the group an open mind"],ans:2,exp:"Asking clarifying questions assists the entire group in learning about the topic. No one knows everything, and diverse viewpoints through give-and-take are the purpose of group work."},
{q:"Samantha wants to make a more conscious effort of setting goals. Which tip could help her set smart goals?",opts:["Not tying goals to a timetable","Writing down her goals","Keeping them vague and qualifiable","Making them easily attainable"],ans:1,exp:"Writing down goals makes them feel more solid and real, increasing motivation. Goals should be tied to a timetable, specific, and challenging but achievable."},
{q:"Sara doesn't take responsibility for her decisions, and she feels bitter because she thinks others have treated her unfairly. She is experiencing:",opts:["resentment.","denial.","remorse.","guilt."],ans:0,exp:"Resentment is a feeling of bitterness that other people have treated you unfairly. People become resentful when they fail to take responsibility and relinquish control to outside circumstances."},
{q:"Sarta Company's RMIS contains a master list of all claims, claim status data, and exposure bases like payroll and number of employees. These data are likely in the __________ section.", opts:["Risk map","Property exposure","Liability","Catastrophe modeling"], ans:2, exp:"The liability section of an RMIS houses claims data, exposure base information (payroll, number of employees, vehicles), and liability insurance coverage terms. Property exposure lists company properties. A risk map determines likelihood of risks. Catastrophe modeling estimates disaster losses."},
{q:"Sasha oversees a staff reviewing aging accounts, contacting customers about late payments, and working with outside payment agencies. Sasha works as a(n):",opts:["Accounts-payable supervisor","Collections manager","Pension manager","Budgeting analyst"],ans:1,exp:"Collections involves collecting payment from customers. Accounts-payable pays the company's bills; pension managers handle retirement funds; budgeting analysts prepare budgets."},
{q:"Scarlet is setting personal financial goals. What is the first step she should take to reach them?",opts:["Evaluate her budget","Prioritize her goals","Make a list of her goals","Automate payments"],ans:2,exp:"The first step to achieving financial goals is identifying and listing them. Prioritizing comes after listing; evaluating budget and automating payments come later."},
{q:"Scott wants to determine whether a company has substantial short-term assets to cover its immediate liabilities without selling inventory. What liquidity ratio should he use?",opts:["Current","Cash","Days sales outstanding","Acid-test"],ans:3,exp:"An acid-test ratio determines whether a company has substantial short-term assets to cover its immediate liabilities without selling inventory."},
{q:"Seamus is calculating the value of all outstanding Google stock owned by Google's shareholders. Seamus is determining:",opts:["cash flow.","shareholder's equity.","liability.","revenue."],ans:1,exp:"Shareholder's equity = Assets − Liabilities. It represents the value of all outstanding stock owned by shareholders."},
{q:"Sebastian sees his coworker Kinsley incorrectly operating a piece of machinery she rarely uses. What was the likely cause of Kinsley's noncompliance?",opts:["Evolving regulations","Insufficient resources","Lack of awareness","Market pressures"],ans:2,exp:"Kinsley was simply not aware of the correct procedure, likely because she rarely uses the machinery. There is no indication of other factors impacting her decisions."},
{q:"Seeing the big picture instead of smaller, individual parts is an organizational learning concept known as:",opts:["systems thinking.","team learning.","shared organizational vision.","personal mastery."],ans:0,exp:"Systems thinking focuses on the big picture rather than seeing smaller, individual parts of the organization."},
{q:"Self-control can help you develop a positive attitude by helping you:",opts:["Dwell on the fact that life is full of difficulties","Substitute positive thoughts with negative ones","Think before you make a response","Eliminate negative ways of thinking"],ans:3,exp:"Using self-control to eliminate negative ways of thinking and replace them with positive ones directly develops a positive attitude."},
{q:"Seth's manager asked him to develop a report comparing their company's fourth-quarter performance with others in its industry. Which financial-analysis software feature should Seth use?",opts:["Forecasting","Ratio analysis","DuPont modeling","Benchmarking"],ans:3,exp:"Benchmarking features compare a company's performance with specific competitors or industry standards. Ratio analysis examines financial ratios; DuPont modeling examines return on equity; forecasting predicts future performance."},
{q:"Setting overall goals for a business, guiding activities, and keeping the business moving toward its goals are part of the role of:",opts:["Employees","Managers","Consultants","Supervisors"],ans:1,exp:"Managers set overall goals and motivate employees to accomplish them. Employees work toward goals. Supervisors guide employees in carrying out activities."},
{q:"Sharon is in charge of examining and preparing financial records at her company. What category of finance careers does she likely work in?",opts:["Securities and investments","Banking services","Insurance","Accounting"],ans:3,exp:"Examining and preparing financial records is the core description of accounting careers, which include bookkeeping, systems design, analysis, and interpretation."},
{q:"Shawn wants to know if his company is staying on budget, so he looks at the difference between the budgeted amount and the amount actually spent. Shawn is analyzing a(n):",opts:["sales forecast.","asset.","expense.","variance."],ans:3,exp:"A variance is the difference between a budgeted amount and an actual amount, telling businesses where they're on track and where they're not."},
{q:"Shelley's business uses financial analysis software to align operational and long-term plans and develop key performance indicators. This supports which business activity?", opts:["Cost and profitability management","Payment behavior analysis","Financial and management reporting","Strategic management and scorecards"], ans:3, exp:"Strategic management and scorecards involves aligning plans and developing key performance indicators to monitor overall performance. Payment behavior analysis evaluates payment histories. Financial and management reporting creates reports for managers. Cost and profitability management allocates overhead costs."},
{q:"Shemar is doing a quantitative study into the difference between planned and actual behavior. He is conducting a(n) __________ analysis.",opts:["Environmental","Break-even","Cash flow","Variance"],ans:3,exp:"Variance analysis quantitatively investigates the difference between planned and actual behavior or outcomes."},
{q:"Sheree asked her attorney to prepare a document to protect her famous chicken noodle soup recipe. This document is designed to protect Sheree's:",opts:["Copyright","Trade secret","Trademark","Patent"],ans:1,exp:"A trade secret is undisclosed information that gives a business a competitive advantage. Recipes can be protected as trade secrets."},
{q:"Shireen is determining if data in an article is accurate and current. Shireen is evaluating the:",opts:["Research procedure","Hardware application","Quality of information","Type of statistics"],ans:2,exp:"For information to be useful it must be accurate and current. Evaluating whether it is relevant, accurate, and current is evaluating its quality."},
{q:"Shortly after Dana sets her company's budget, one of the company's suppliers raised its prices. This is an example of how __________ can cause budget variance.",opts:["Inaccurate budgeting","Changes in costs","Employee fraud","Improved operations"],ans:1,exp:"Changes in costs is a cause of budget variance. The supplier increased its prices after Dana set the budget, meaning the company will spend more than initially planned."},
{q:"Shoshanna writes down her goal to become manager by next year, breaks it into steps, visualizes success, and reviews her progress. She is engaging in:",opts:["Objective predicting","Goal setting","Success forecasting","Progress planning"],ans:1,exp:"Goal setting involves choosing a goal, writing it down, breaking it into steps, visualizing it, and reviewing/updating regularly."},
{q:"Should Joe meet with the vendor for lunch at 1:00 p.m. at a restaurant 30 minutes away, given he must return by 2:00 p.m.?",opts:["Yes, if the vendor changes the reservation to 12:45","No, it is rude for the vendor to assume Joe has time","Yes, if Joe reschedules his training session","No, Joe would have only 30 minutes to meet before returning"],ans:3,exp:"Joe needs 30 minutes to travel, leaving only 30 minutes to meet—not enough for a one-hour luncheon before his 2:00 training."},
{q:"Siobhan is using risk-management technology to quantify potential losses if a tornado destroyed her company's largest manufacturing plant. What technique is she using?", opts:["Risk transference","Cost-benefit analysis","Risk modeling","Fundamental analysis"], ans:2, exp:"Risk modeling quantifies potential losses from specific events. Cost-benefit analysis quantifies costs and benefits of projects. Risk transference moves risk impact to someone else (e.g., insurance). Fundamental analysis studies a company to understand its intrinsic value."},
{q:"Six months ago, Xander bought 500 shares at $25 per share, then sold them for $48 per share. What type of tax is Xander obligated to pay?",opts:["Stock sales tax","Luxury tax","Capital gains tax","Excise tax"],ans:2,exp:"A capital gain is the increase in an asset's value from purchase to sale. The federal government charges capital gains taxes on most capital gains."},
{q:"Six months ago, Xander bought 500 shares at $25/share. Today he sold all 500 for $48/share. What type of tax is he obligated to pay?", opts:["Luxury tax","Capital gains tax","Excise tax","Stock sales tax"], ans:1, exp:"A capital gain is the increase in an asset's value from purchase to sale. The federal government charges capital gains taxes on most capital gains. Luxury and excise taxes are placed on specific goods. Stock sales tax is a fictitious term."},
{q:"Smooth operations, clearly defined chains of command, and measurement of performance are all goals of __________ in corporate governance.",opts:["Independent audits","Debt management","External control mechanisms","Internal control mechanisms"],ans:3,exp:"Internal control mechanisms (oversight of management, internal audits, segregation of duties) ensure smooth operations, clarify chains of command, and measure performance."},
{q:"So that employees are prepared to act if an accident occurs in the workplace, many businesses provide them with __________ training.",opts:["Security","Fitness","First-aid","Fire-response"],ans:2,exp:"First-aid training helps employees stabilize accident victims until professional medical assistance arrives."},
{q:"Social responsibility should be part of the objectives of __________ businesses.",opts:["All","Specialized","Nonprofit","Government"],ans:0,exp:"Social responsibility is the duty of businesses to contribute to the well-being of society—this applies to all businesses."},
{q:"Software downloads and printable worksheets that help manage income and expenses are types of:",opts:["Organizational charts","Statistical information","Legal data","Budgeting tools"],ans:3,exp:"Budgeting tools help businesses plan and manage income and expenses. Software and worksheets are common budgeting tools available online."},
{q:"Spreadsheets, database applications, and other software are often used by businesses for:",opts:["staff communication.","financial analysis.","employee recognition.","public relations."],ans:1,exp:"Spreadsheets, databases, and other software make it easier to perform financial analysis, create budgets, predict future performance, and review financial health."},
{q:"Stacy chose her dog's groomer based on the friendliness and attentiveness of the staff. Even though prices are higher, she would never go elsewhere. This demonstrates the importance of:",opts:["building and maintaining customer relationships.","setting prices higher to create an image of luxury.","outpricing the competition through sales and giveaways.","earning new customers rather than focusing on current ones."],ans:0,exp:"Excellent customer service builds loyal relationships. It is more expensive to acquire new customers than to retain current ones."},
{q:"Stan listens to staff suggestions and implements many of their ideas for improvement to 'do the job right the first time.' What is Stan doing?", opts:["Supporting external resources","Creating a quality culture","Developing new products","Reorganizing priorities"], ans:1, exp:"A quality culture believes every employee has valuable ideas. It nurtures an environment where all employees are committed to quality standards and look for improvement. This involves nurturing creativity, streamlining processes, and improving goods and services."},
{q:"State Street Bank sends texts when $100 or more are withdrawn. The bank sends these notifications to reduce risks associated with:", opts:["Money laundering","Loan fraud","Identity theft","Firewall intrusion"], ans:2, exp:"Identity theft involves using another person's information without consent. Banks send alerts when their systems detect large ATM withdrawals or unusual charges, allowing customers to freeze accounts quickly. Loan fraud involves lying on applications. Money laundering creates appearance of legal funds. Firewalls prevent computer hacking."},
{q:"Statistical data revealed that Zane Industries sold 32% more of a product after making improvements to increase speed and print quality. The statistical findings helped the company determine that:", opts:["R&D expenses exceeded the budget","Its sales forecasts were inaccurate","Product improvements helped boost sales","The company achieved its sales goals"], ans:2, exp:"Statistics showed a specific sales increase after product improvements—helping the company determine that the improvements boosted sales. There's insufficient information to know if R&D exceeded budget, if forecasts were inaccurate, or if sales goals were achieved."},
{q:"Stefan invests $1,200 in a stock earning 9% this year. What will be the total value of his investment?",opts:["$1,200","$1,308","$1,420","$1,080"],ans:1,exp:"Interest earned: $1,200 × 0.09 = $108. Total value: $1,200 + $108 = $1,308."},
{q:"Stefan invests $1,200 into a stock that earns 9% this year. What will be the total value of his investment?",opts:["$1,200","$1,080","$1,308","$1,420"],ans:2,exp:"$1,200 × 0.09 = $108 interest. $1,200 + $108 = $1,308 total value."},
{q:"Stefania hopes to identify trends by reviewing and comparing data on her small business's financial statements for the last five years. Stefania is planning to conduct __________ analysis.", opts:["Break-even","Vertical","Horizontal","Competitive"], ans:2, exp:"Horizontal analysis (also called trend analysis) reviews and compares data across several quarters or years to identify trends. Vertical analysis reports each amount as a percentage of another item on the same statement. Break-even analysis identifies sales needed to break even. Competitive analysis compares to competitors."},
{q:"Stella finished designing her web page. Next, she needs to select a __________ and register the website's __________.", opts:["File link, ethernet","Hyperlink, modem","Media permit, server","Web host, domain name"], ans:3, exp:"After creating a web page, a developer needs a web host (server) to post/store it and must register a domain name (web address) through ICANN or via the web host. File links, hyperlinks, modems, media permits, and ethernet are unrelated to publishing a website."},
{q:"Stock market returns are a(n) __________ economic indicator.", opts:["Coincident","Lagging","Leading","Acyclic"], ans:2, exp:"Stock market returns are leading indicators because the stock market typically changes before the economy does. Lagging indicators change after the economy. Coincident indicators move with the economy. Acyclic indicators have no relation to the economy."},
{q:"Stockholders monitor a business's income statement because they are the business's:",opts:["employees.","customers.","owners.","managers."],ans:2,exp:"Stockholders have part ownership of a business and use the income statement to monitor profit levels and determine if they are getting a good return on their investment."},
{q:"Stocks in which of the following industry sectors are least likely to be affected by changes in the business cycle?",opts:["Healthcare","Energy","Technology","Capital goods"],ans:0,exp:"Healthcare (along with food, drink, and tobacco) is non-cyclical — demand remains steady regardless of business cycle stage. Energy, technology, and capital goods sectors are more cyclical."},
{q:"Strategic management is demonstrated in which of the following phrases?",opts:["Obtaining funds for business projects","Recruiting appropriate employees","Planning and organizing for the future","Regularly updating business processes"],ans:2,exp:"Strategic management involves planning and organizing for the future. Obtaining funds is financial analysis; recruiting is HR management; updating business processes is operations."},
{q:"Studies have shown that organizations with a strong code of conduct:",opts:["Are not honest or ethical","Have trouble attracting employees","Experience less misconduct","Experience decreased efficiency"],ans:2,exp:"Organizations with a strong code of conduct experience less misconduct, positively impacting overall performance."},
{q:"Successful communication depends upon the:",opts:["listener's knowledge of and comfort with the topic.","speaker's ability to speak loudly and the listener's interest in the topic.","speaker and the listener.","speaker's professional qualifications."],ans:2,exp:"Successful communication depends on the active participation of both the speaker and the listener. Communication is not dependent on volume, the listener's knowledge, or the speaker's qualifications."},
{q:"Successful project management depends on the use of appropriate:", opts:["Pressure tactics","Outsourcing","Foreign investments","Technology"], ans:3, exp:"Successful project management depends on appropriate technology (scheduling and budgeting software). Pressure tactics, outsourcing, and foreign investments are not factors that project management success depends on."},
{q:"SuperCard International moved its customer-service function from Vancouver to Delhi, India to lower costs. What business practice is this?", opts:["Licensing","Diversification","Offshoring","Free agency"], ans:2, exp:"Offshoring is the practice of producing goods or services in foreign countries, typically moving domestic jobs overseas. Diversification spreads investments. Licensing authorizes use of IP. Free agency is an athlete's ability to renegotiate contracts."},
{q:"Supervised by the Federal Reserve Board, The DAB Company provides investment advisory services, insurance underwriting, securities underwriting, and merchant banking services. What does the DAB Company exemplify?",opts:["An accounting firm","A financial holding company","A central bank","A commodities investor"],ans:1,exp:"Financial holding companies provide a wide variety of financial services and are supervised by the Federal Reserve Board."},
{q:"Supervising business and manufacturing processes to ensure quality and efficiency is a quality-control method known as:",opts:["Concurrent engineering","Process performance management","Statistical process control","The Taguchi method"],ans:1,exp:"Process performance management supervises business and manufacturing processes to ensure quality and efficiency. Statistical process control uses statistics; Taguchi focuses on product design."},
{q:"Susan calls different banks to compare interest rates and types of loans to determine which bank is best for purchasing business equipment. Susan is analyzing the financial information to:",opts:["correct inaccurate financial data.","guide her decision making.","determine business profitability.","solve a business problem."],ans:1,exp:"Many businesspeople analyze financial data to make business decisions, such as obtaining a loan with the best interest rates and payment plans. Susan is using the data to guide her decision."},
{q:"Tamika wants to implement a work methodology to streamline her team's processes and eliminate waste. Which methodology should she adopt?",opts:["Six Sigma","Lean","Endless chain","Sustainability"],ans:1,exp:"Lean production focuses on maximizing customer value while minimizing waste."},
{q:"Tank's Trucking Company is focusing on eliminating waste and creating more value with fewer resources. Which methodology is it using?",opts:["Sustainability","Six sigma","Activity-based costing","Lean"],ans:3,exp:"Lean is a production practice focused on eliminating wasteful processes that don't add value, increasing implementation speed and productivity."},
{q:"Tank's Trucking Company is focusing on eliminating waste and creating more value with fewer resources. Which methodology is Tank's using?",opts:["Sustainability","Six sigma","Lean","Activity-based costing"],ans:2,exp:"Lean focuses on eliminating wasteful processes that don't add value, increasing implementation speeds and productivity. Six sigma focuses on limiting defects and variability."},
{q:"Tara needs to assess the potential impact of taking out a loan vs. a line of credit on her business cash flow. Which budgeting software tool should she use?", opts:["Environmental scanning","Decision trees","Debt modeling","Zero-based modeling"], ans:2, exp:"Debt modeling allows users to assess the potential impact of loans and lines of credit by inputting terms (interest rate, term, principal). Decision trees classify data and build models. Environmental scanning gathers info about external business environment. Zero-based budgeting requires justifying every expense from scratch."},
{q:"Taylor bought a concert ticket but didn't purchase ticket insurance and became sick and can't attend. What type of cost does this best describe?",opts:["Sunk","Opportunity","Incremental","Differential"],ans:0,exp:"Sunk costs are costs that have already been incurred and thus cannot be recovered. Taylor's ticket cost cannot be recovered."},
{q:"Taylor notices a sharp cutting tool left on the floor after boxes were opened. He should immediately:",opts:["Ignore it","Try to find out who left it there","Pick it up and put it away","Notify his supervisor"],ans:2,exp:"This is a safety hazard Taylor can easily correct himself before someone gets hurt. Looking for who left it or ignoring it doesn't correct the problem."},
{q:"Ten customers reviewed a product: five gave five stars, two gave four, two gave three, one gave one. What is the mode?",opts:["5","4.5","4","3"],ans:0,exp:"Mode is the most frequently occurring value. Five stars was given by 5 customers—more than any other rating. Mode = 5."},
{q:"Terri, Adele, and Jeff work in different departments but have been discussing ways to convince management to upgrade a shared outdated computer system. They have formed a:", opts:["Political coalition","Public-relations board","Departmental project team","Workplace grievance committee"], ans:0, exp:"A political coalition forms when employees come together for a single issue for a limited time to accomplish a specific goal. It's not a departmental team (they're in different departments), not grievance-related, and not public-relations focused."},
{q:"Terry owns stock in Good Eatz and wants to know how much profit the company made in the last six months. What financial statement should he reference?",opts:["Balance sheet","Income statement","Cash flow statement","Shareholders' equity"],ans:1,exp:"An income statement (profit-and-loss statement) summarizes income and expenses over a period of time. A balance sheet shows condition at a specific point in time."},
{q:"Terry, a corporate executive, learns his company is about to acquire a smaller company and informs friends so they can buy shares before the stock price rises. This is an example of",opts:["Ethical trading","Predatory lending","Insider trading","Affinity fraud"],ans:2,exp:"Insider trading refers to the buying or selling of a security by someone who has access to nonpublic information. Providing 'tips' to others is also an insider trading violation."},
{q:"Thad is investing in a money market, which buys and sells products such as:",opts:["agricultural goods.","shares of stock.","treasury bills.","technology."],ans:2,exp:"Money markets involve the buying and selling of short-term, low-risk financial products such as treasury bills, which are issued by the government."},
{q:"Thara looks through databases to ensure data are properly stored and eliminates redundant data. Thara is performing data",opts:["Migration","Commingling","Filtering","Normalization"],ans:3,exp:"Normalization is the process of efficiently organizing data in a database, aiming to eliminate redundant data and ensure data are logically stored."},
{q:"The 52-week high and low can tell investors:",opts:["If the company has a lot of debt","How many times a stock has been sold","Whether to invest in a stock or mutual fund","If it is a good time to buy or sell"],ans:3,exp:"The 52-week high and low shows the price range over a year, helping investors judge whether the current price is a good one to buy or sell at."},
{q:"The 52-week high and low numbers are a good indicator of the stock's:",opts:["net change.","volatility.","yield.","volume."],ans:1,exp:"The 52-week high and low show how sharply a stock's price has risen or fallen — a measure of volatility. Yield, volume, and net change are different metrics."},
{q:"The ABC Company published an incorrect statement about the quality of the Marston Company's product, dramatically decreasing Marston's sales. This is an example of a legal tort related to:",opts:["defamation.","privacy.","infringement.","trespassing."],ans:0,exp:"Defamation involves making false statements about another party with intent to discredit them. ABC's incorrect statement harmed Marston's reputation and sales — a defamation tort."},
{q:"The ABC Corporation identifies all risks, decides which to focus on, and shares information with stakeholders. The company is practicing:",opts:["Environmental risk planning","Corporate risk organization","Competitive risk assessment","Enterprise risk management"],ans:3,exp:"Enterprise risk management involves identifying all risks, deciding which to focus on, and sharing that information with stakeholders."},
{q:"The ABC Corporation identifies all the risks that threaten the company, decides which to focus on, and shares this information with its stakeholders. The company is practicing:",opts:["environmental risk planning.","corporate risk organization.","competitive risk assessment.","enterprise risk management."],ans:3,exp:"Enterprise risk management (ERM) involves identifying all organizational risks, prioritizing focus areas, and communicating with stakeholders — a comprehensive, strategic approach to risk."},
{q:"The accounting treatment of capital expenditures should be __________ over multiple reporting periods.", opts:["Consistent","Flexible","Hedged","Callable"], ans:0, exp:"Treating the same accounts and transactions consistently over time keeps data comparable and meaningful. If treatment varies without valid explanation, investors may avoid the company. Flexible, hedged, or callable accounting treatment would make data incomparable across periods."},
{q:"The accounting treatment of capital expenditures should be __________ over multiple reporting periods.",opts:["hedged","flexible","consistent","callable"],ans:2,exp:"The accounting treatment of like items should be consistent from one reporting period to the next. Inconsistent treatment makes data incomparable and less meaningful to users of financial information."},
{q:"The addition of too many workers on a job may cause the marginal product to turn:",opts:["Positive","Upward","Variable","Negative"],ans:3,exp:"The law of diminishing returns states that too many workers causes productivity to decrease and can turn negative—spending more to produce than the products generate in income."},
{q:"The advantage to businesses that use mobile-application technology is that their salespeople can obtain and send customer information from their:",opts:["Data banks","Smartphones","Fax machines","Autoresponders"],ans:1,exp:"Smartphones include cellular telephone capabilities plus computer applications, enabling salespeople to call, check email, verify inventory, and place orders remotely."},
{q:"The advantage to businesses that use mobile-application technology is that their salespeople can obtain and send customer information from their:",opts:["Fax machines","Autoresponders","Data banks","Smartphones"],ans:3,exp:"Smartphones include internet access and applications for calling, checking email, verifying inventory, and placing orders from remote locations."},
{q:"The advantage to businesses using mobile-application technology is that salespeople can obtain and send customer information from their:", opts:["Fax machines","Autoresponders","Data banks","Smartphones"], ans:3, exp:"Smartphones include cellular capabilities plus computer applications, enabling salespeople to call customers remotely, check email, verify inventory, and place orders. Autoresponders send automatic email responses. Data banks and fax machines are not mobile-application technology."},
{q:"The balance sheet has a close relationship with the company's:",opts:["fair market value.","statement of financial position.","income statement.","mortgage."],ans:2,exp:"The balance sheet and income statement are closely related — changes to the income statement directly affect balance sheet numbers. Statement of financial position is just another name for the balance sheet itself."},
{q:"The best way for businesses to communicate with customers is to:",opts:["listen respectfully.","rent billboards on major highways.","send direct mail.","give as much information as possible."],ans:0,exp:"Listening respectfully is the most valuable form of customer communication. Customers provide useful information if businesses listen. Billboards, direct mail, and information overload are less valuable."},
{q:"The biggest difference between a mission statement and a personal vision has to do with",opts:["Personnel","Detail","Time","Scope"],ans:2,exp:"A mission statement deals with the now and how. A personal vision deals with the future. The biggest difference is time."},
{q:"The biggest traders of currency on the foreign exchange market are:",opts:["Individual traders","Commercial and investment banks","Investment funds","Businesses and corporations"],ans:1,exp:"Banks make up about half of forex trading volume, trading on interbank markets for clients and for speculative profit."},
{q:"The Buford Company's ability to pay its short-term debts has improved steadily over three years. What financial ratio helped identify this trend?", opts:["Asset-turnover","Liquidity","Qualitative","Market-value"], ans:1, exp:"The liquidity ratio measures a business's ability to pay its short-term debts—tracking it over time reveals trends in financial well-being. Asset-turnover measures efficiency in using assets to generate sales. Market-value ratios assess stock value. Qualitative data are based on opinion, not financial ratios."},
{q:"The business manager tried to write a promotional letter that was simple, clear, and interesting so that customers would:",opts:["easily understand it.","need to read it many times.","find it entertaining.","ask what it really meant."],ans:0,exp:"Effective written communications are clear, simple, and interesting so readers easily understand the message. Customers should not need to re-read or wonder what a message means."},
{q:"The cash payments section of a cash flow statement is best described as the",opts:["Money a business has left at the end of the month","Money a business has at the beginning of the month","Sources of cash flowing out of a business","Sources of money flowing into the business"],ans:2,exp:"The cash payments section refers to the sources of cash flowing out of the business."},
{q:"The CEO wants to make costly purchases but the board of directors votes not to approve them. This best describes how corporate governance operates on a system of",opts:["Checks and balances","Preferential treatment","Hierarchy","Executive dominance"],ans:0,exp:"A system of checks and balances refers to the separation of power to avoid one entity wielding too much power. Having a board of directors who can check the CEO prevents the CEO from becoming too powerful."},
{q:"The commercials Sierra sees always portray men as the only demographic that enjoys sports. The idea that only men watch football is an example of a(n):",opts:["unconscious bias.","prejudice.","discriminatory statement.","stereotype."],ans:3,exp:"Stereotypes are set images or assumptions about a group. Believing only men enjoy sports is a stereotype — a widely recognized but often inaccurate assumption."},
{q:"The connection between the social responsibility of a business and the community is that the business's social responsibility __________ the community.",opts:["targets the area outside","targets only","has an effect on","depends upon"],ans:2,exp:"A business's social responsibility affects the community by influencing employment levels, supporting cultural activities, and contributing to worthy causes — not just targeting or depending on it."},
{q:"The Davis Company requires customers to provide banking information each time they pay by phone, causing late payments and brand damage. Which action should the company take to best manage its legal, financial, IT, and brand risks?",opts:["Eliminate the pay-by-phone option and require customers to mail payments to a P.O. Box.","Send letters explaining how the current payment policy protects customers' personal information.","Develop a way to encrypt and store customers' bank information in the company database for future use.","Encourage customers to set up automatic electronic payments, eliminating the need to store the information."],ans:2,exp:"Encrypting and storing bank information eliminates some risk while making the payment process easier, reducing lost revenue and increasing customer satisfaction."},
{q:"The economy is part of a business's __________ environment.",opts:["Tangible","Physical","External","Internal"],ans:2,exp:"The external environment consists of uncontrollable surroundings like the economy, demographics, and society. Internal elements include inventory and capital. The economy is intangible."},
{q:"The emphases in accounting are on documenting and reporting financial data, while the emphasis in finance is on:", opts:["Liquidity ratios","Bookkeeping","Closing the books","Decision making"], ans:3, exp:"Finance's emphasis is on decision making—determining what assets to own, the proper mix, and financing methods. Bookkeeping and closing the books are accounting activities. Liquidity ratios may be calculated by finance managers but are just one of many analytical tools."},
{q:"The entire market has just collapsed. This is an __________ risk known as a(n) __________ factor.",opts:["Internal; economic","External; economic","External; political","Internal; technological"],ans:1,exp:"A market collapse is an external risk (occurs outside the company) and an economic risk factor (a change in market conditions)."},
{q:"The entire market has just collapsed. This is an __________ risk known as a(n) __________ factor.",opts:["Internal; economic","External; economic","External; political","Internal; technological"],ans:1,exp:"A market crash is external (outside the company) and economic (a change in market conditions)."},
{q:"The essence of time management is to:",opts:["eliminate the need to prioritize activities.","control events in order to accomplish priorities.","focus on spreading work over a period of time.","set a fixed schedule and follow it."],ans:1,exp:"Time management involves maintaining control over events in your life to balance them—planning and organizing activities. Schedules should have flexibility for unexpected events."},
{q:"The Farside Corporation wants to encourage its workforce to better achieve governance objectives and improve the distribution of wealth throughout the corporation. Which tactic should it use?",opts:["Team building","Cash incentives","Profit-sharing","Flexible scheduling"],ans:2,exp:"Profit-sharing improves both employee motivation and the distribution of wealth throughout the corporation. Cash incentives and team building improve motivation but don't distribute wealth."},
{q:"The first step in assessing the long-term value and impact of your actions on others is to:",opts:["Determine the needs of others","List potential outcomes for your choices","Acknowledge your own knowledge gaps and biases","Think before you act"],ans:3,exp:"Thinking before you act is the first step. Once you act, it's difficult to change consequences. Listing outcomes, acknowledging biases, etc. come after."},
{q:"The first step in maintaining an inventory of supplies for the business is to:",opts:["develop a list of supplies that the business needs.","conduct research to find vendors that sell the supplies.","compare prices among vendors.","organize a space to store the supplies."],ans:0,exp:"To maintain an inventory of supplies, a business should first determine which supplies employees need to perform their jobs. After that, vendors can be located, prices compared, and storage organized."},
{q:"The first step in the project-planning process is to:",opts:["Determine the project's purpose and scope","Determine project costs","Identify needed resources","Identify project deliverables"],ans:0,exp:"Determining the project's purpose and scope is the foundation for the entire project. Costs, resources, and deliverables are identified in later steps."},
{q:"The first task in the HR management activity of staffing is:",opts:["determining job descriptions.","screening and selecting applicants.","determining need.","recruiting."],ans:2,exp:"The first task in staffing is determining need. A company cannot fill positions with appropriate employees until it knows exactly where human resources are lacking."},
{q:"The foundation of the principle of least authority is that computer data are more secure when access to specific types of data is only available to:",opts:["the customers who request it.","mid-level managers.","personnel during set time periods.","the people who need it."],ans:3,exp:"By limiting access to those who need it, confidential data are more secure and less likely to be seen or modified by unauthorized people."},
{q:"The Frank and Fitzer Corporation pays federal and state income tax on its earnings, and stockholders also pay taxes on dividends received. Frank and Fitzer's earnings are subject to __________ taxation.",opts:["proportional","regressive","double","progressive"],ans:2,exp:"Double (dual) taxation occurs when the same income is taxed twice — once at the corporate level and again when distributed as dividends to shareholders."},
{q:"The French-Canadian culture relies heavily on nonverbal communication. This means it is a(n):",opts:["Religious culture","High-context culture","Low-context culture","Ethnocentric culture"],ans:1,exp:"High-context cultures rely heavily on nonverbal communication. Low-context cultures communicate more directly."},
{q:"The general economic growth of a country is supported by its:",opts:["level of productivity.","standard of living.","gross domestic product.","wealth of goods and services."],ans:0,exp:"The general economic growth of a country depends upon its level of productivity. GDP measures economic growth; standard of living and wealth of goods are results of productivity."},
{q:"The goal of marginal analysis should be to ensure that:",opts:["Marginal revenue exceeds marginal cost","Opportunity cost equals marginal revenue","Marginal cost equals opportunity cost","Marginal cost exceeds marginal revenue"],ans:0,exp:"Businesses profit when marginal revenue (from an additional unit) is greater than marginal cost (to produce that unit). If marginal cost exceeds revenue, the company takes a loss."},
{q:"The government takes appropriate steps to guide the inflation rate toward a certain percent each year. This is called",opts:["Inflation targeting","Deflation","Supply shock","Price stability"],ans:0,exp:"When a government decides to pursue a specific inflation rate, it's known as inflation targeting. The U.S. government targets 2% inflation."},
{q:"The HR manager sends an email to all employees about parking lot repairs on Tuesday. This is an example of a(n):", opts:["Business proposal","Projection report","Informational message","Formal inquiry"], ans:2, exp:"Communicating information involves providing others with facts. The manager is informing employees about a parking lot issue—factual information sharing. It's not a proposal (requesting something), projection report (forecasting), or formal inquiry (seeking information through formal channels)."},
{q:"The key factors involved in compounding growth are the amount of money you invest, how much your investment grows each year, and:",opts:["your educational background and career.","how you earn the money that you invest.","how long your money is invested.","your mutual fund manager's education."],ans:2,exp:"The three key factors in compounding growth are: how much you invest, how much it grows each year, and how long your money is invested. Time is the most impactful factor."},
{q:"The Kodiak Company does not pay dividends. In which equity statement component would this money appear instead?",opts:["Treasury stock","Outstanding shares","Retained earnings","Cash flow"],ans:2,exp:"Retained earnings reflect income the company keeps. If dividends aren't paid, that money is retained earnings."},
{q:"The Kramer Pharmaceutical Company lists possible side effects of its cold medicine on the packaging. By disclosing this information, the company is reducing risks associated with:",opts:["product returns.","mechanical product defects.","product recalls.","inadequate product warnings."],ans:3,exp:"Pharmaceutical companies must disclose dosage, side effects, and interactions. Failure to do so risks lawsuits related to inadequate product warnings. Product recalls occur for quality issues after release."},
{q:"The largest, most liquid financial market in the world is the __________ market.", opts:["Debt","Foreign exchange","Equity","Commodity"], ans:1, exp:"The foreign exchange market has more active traders and higher trading volume than any other market. Very liquid markets experience gradual, small price changes. Debt = bond market, equity = stock market, commodity = raw materials market."},
{q:"The letter of the law refers to the __________ of the law, while the spirit of the law refers to the __________ of the law.",opts:["Intent; literal meaning","Enforcement; intent","Literal meaning; intent","Literal meaning; enforcement"],ans:2,exp:"The letter of the law is its literal, word-for-word meaning. The spirit of the law is its intent—the social and moral consensus of how to interpret it."},
{q:"The line on a check that reads 'Pay to the order of' is where you write:",opts:["Your signature","The payment amount in numeric form","The payment amount in word form","The recipient's name"],ans:3,exp:"'Pay to the order of' is where you write the name of the person or organization receiving payment."},
{q:"The main difference between managerial accounting and financial accounting is the __________ of the information.",opts:["Arrangement","Scope","Audience","Quality"],ans:2,exp:"Financial accounting provides information to external audiences. Managerial accounting provides information to internal company leadership."},
{q:"The main objective of using marginal analysis in decision-making is to determine whether a business activity will result in:",opts:["A marginal expense greater than marginal cost","A marginal revenue smaller than marginal cost","A marginal revenue equal to or greater than marginal cost","A net revenue larger than marginal revenue"],ans:2,exp:"Marginal analysis determines if marginal revenue equals or exceeds marginal cost. If cost is greater, the activity is not profitable."},
{q:"The main objective of using marginal analysis in decision-making is to determine whether a business activity will result in:",opts:["A net revenue smaller than marginal revenue","A marginal revenue equal to or greater than marginal cost","A marginal expense that is greater than marginal cost","A net revenue larger than marginal revenue"],ans:1,exp:"Marginal analysis identifies profitable options by determining if marginal revenue is equal to or greater than marginal cost. If costs exceed revenue, the activity is not profitable."},
{q:"The main objective of using marginal analysis in decision-making is to determine whether a business activity will result in:",opts:["Net revenue smaller than marginal revenue","Net revenue larger than marginal revenue","Marginal revenue equal to or greater than marginal cost","Marginal expense greater than marginal cost"],ans:2,exp:"Marginal analysis determines if marginal revenue will equal or exceed marginal cost—identifying profitable options."},
{q:"The managerial accounting system emphasizes:", opts:["Previous sales transactions","The current financial situation","A future orientation","Ongoing tax obligations"], ans:2, exp:"Managerial accounting is used for organizational planning and strategic (long-term) decision-making with a future orientation. It looks at current, past, AND future conditions. Tax and financial accounting emphasize past financial performance. Tax accounting handles tax forms/obligations."},
{q:"The MIB Company uses protective computer software programs to minimize losses associated with customers' financial transactions. It is managing risks associated with:",opts:["Purchasing","Security","Overhead","Performance"],ans:1,exp:"Using technology like firewalls and security software minimizes security risks and protects confidential financial data from hackers."},
{q:"The Middleton Company uses CRM software to categorize customers by their sales-dollar volume over a specific period. It is using __________ analytics to segment customers.",opts:["differed","profitability","product","demographic"],ans:1,exp:"Segmenting customers by sales-dollar volume analyzes their profitability to the business. Demographic segmentation considers age, gender, etc. Differed analytics is fictitious."},
{q:"The Money for You Bank recently merged with the Keeping You Safe Insurance Company. This is an example of __________ in the finance industry.",opts:["tactical planning","consolidation","convergence","licensing"],ans:2,exp:"Convergence occurs when financial providers from different sectors (banking + insurance) merge. Consolidation is when providers within the same sector merge (bank + bank)."},
{q:"The most common headings on a stock table include the 52-week high/low, stock symbol, estimated dividend per share, yield %, volume, closing price, net change, and the:", opts:["Price-earnings ratio","Earnings per share","Net income","Stockholder's equity"], ans:0, exp:"The price-earnings ratio (P/E ratio) is a standard stock table heading—the last closing price divided by earnings per share. Earnings per share, net income, and stockholder's equity are not typically found on stock tables; they appear in financial statements."},
{q:"The most efficient way to obtain current interest rates on certificates of deposit through Main Street Community Bank is to:",opts:["make an appointment with a bank teller.","call the bank's financial officer.","visit the bank's website.","go to the bank to get a product brochure."],ans:2,exp:"Bank websites post and update product information 24/7, providing quick, accurate, and convenient access to current interest rates without needing appointments or driving to the bank."},
{q:"The most environmentally friendly way for producers to respond to limited natural resources is by:",opts:["tapping the resources.","conserving the resources.","decreasing prices.","increasing production."],ans:1,exp:"Conserving (decreasing usage of) limited resources is the most environmentally friendly response. Tapping resources and increasing production would deplete them faster."},
{q:"The most important reason why workplace accidents that don't result in injuries should be reported to supervisors is because:",opts:["The next accident could result in an injury","This is required by state law","The report prevents future liability","This is an OSHA requirement"],ans:0,exp:"A non-injurious accident should be reported so circumstances can be corrected, potentially preventing a future injurious accident."},
{q:"The nature of an agent's work and the level of an agent's control are factors that determine if a __________ relationship exists.",opts:["Controller-associate","Tutor-student","Principal-collaborator","Employer-employee"],ans:3,exp:"The employer-employee relationship in law refers to the amount of control a principal (employer) has over an agent (employee), used to address liability questions."},
{q:"The nature of an agent's work and the level of an agent's control are factors that determine if a __________ relationship exists.",opts:["principal-collaborator","tutor-student","master-servant","controller-associate"],ans:2,exp:"The master-servant relationship in legal terms refers to the amount of control a principal has over an agent. It is important in addressing business legal issues, especially liability questions."},
{q:"The net change in a stock table represents the difference between the last share price today and the price paid for the:",opts:["Last share from last year","Last share on the previous day","First share on the previous day","First share from last year"],ans:1,exp:"Net change is the difference between today's closing price and the previous day's closing price."},
{q:"The New York Stock Exchange is a(n) __________ market.", opts:["Spot","Over-the-counter","Commodities","Auction"], ans:3, exp:"The NYSE is an auction market where multiple traders place bids and sellers submit offers—the trade price is the highest bid and lowest offer. An over-the-counter market trades securities outside formal exchanges. A commodity market trades raw materials. A spot market involves immediate cash purchases."},
{q:"The overall objective of workers who form labor unions is to:",opts:["strengthen their bargaining power.","obtain reasonable working hours.","promote better working conditions.","obtain fair wages."],ans:0,exp:"Individual workers have little bargaining power. Forming unions gives them collective strength to negotiate better wages, working conditions, and hours — strengthening their overall bargaining power."},
{q:"The president of the Acme Company identifies the jobs to be accomplished and assigns responsibility for completing those jobs to specific departments. What management function is the president performing?",opts:["Planning","Organizing","Staffing","Controlling"],ans:1,exp:"Organizing involves setting up how work will be done — identifying jobs, assigning responsibility, establishing departments, and determining management spans. Planning decides what will be done; staffing finds workers; controlling monitors work."},
{q:"The primary benefit of establishing a value system for yourself is:",opts:["Helps you choose a career","Gives you guidelines to follow","Improves your social skills","Raises your level of self-esteem"],ans:1,exp:"Your values are the principles by which you live. A value system provides guidelines for decision-making."},
{q:"The primary focus of the Six Sigma methodology is:",opts:["eliminating quality management staff.","reducing errors in business processes.","improving cash management processes.","increasing overall public relations spending."],ans:1,exp:"Six Sigma organizations concentrate on reducing errors in business processes to improve the quality of products and services. It does not focus on staff elimination, cash, or PR spending."},
{q:"The primary force influencing corporate governance is a company's:",opts:["independent directors.","chief executive officer.","board of directors.","shareholders."],ans:2,exp:"The board of directors is the primary force in corporate governance, responsible for important decisions, representing shareholders, and ensuring ethical business practices."},
{q:"The primary purpose for record keeping is to provide information about what is happening with the:",opts:["industry.","country.","economy.","business."],ans:3,exp:"The primary function of record keeping is to provide information about the status of the business—such as whether it is making a profit or spending too much on expenses."},
{q:"The primary purpose of managerial accounting is to provide accurate data about a business's activities that help internal users:",opts:["control external factors.","make informed decisions.","obtain necessary loans.","understand corporate policies."],ans:1,exp:"Managerial accounting provides internal users with financial data to make informed decisions. Businesses can monitor but not control external factors; loans and corporate policies are separate matters."},
{q:"The primary purpose of placing headings and subheadings in a long business report is to:",opts:["Organize content in a cohesive, manageable way","Attract attention to the writer's hidden agenda","Solicit an opinion or response from the audience","Provide supporting evidence for key points"],ans:0,exp:"Headings and subheadings organize content into related chunks so the audience can understand different sections. The primary purpose is not to convey hidden agendas or solicit opinions."},
{q:"The primary purpose of the accounting function is to prepare and present relevant financial information, while the primary purpose of the finance function is to:",opts:["adjust journal entries based on the information provided.","modify accounts receivable based on the information provided.","apply the information to calculate the business's equity.","use the information to make financial decisions."],ans:3,exp:"The finance function is responsible for obtaining funds and managing money to achieve the business's goals. It uses accounting information to make financial decisions."},
{q:"The primary reason that firms must take steps to control their levels of business risk is to:",opts:["increase their financial liability levels.","increase their visibility in the market.","contribute to the well-being of society.","reduce the chance of financial losses."],ans:3,exp:"Because risk involves the possibility of loss, businesses must control their risk levels to limit financial losses. Businesses can do this through appropriate policies, employee training, and adequate insurance."},
{q:"The primary responsibility of all financial-services providers is:",opts:["improving the community's standard of living.","lobbying the government on behalf of the industry.","purchasing and selling securities.","growing and protecting their clients' wealth."],ans:3,exp:"Financial-services providers (planners, bankers, insurance agents) are primarily responsible for growing and protecting their clients' wealth through sound advice and appropriate financial products."},
{q:"The process or activity of using goods is called:",opts:["production.","consumption.","exchange.","distribution."],ans:1,exp:"Consumption is when everyone uses goods and services to satisfy unlimited wants. Production makes goods; exchange involves money payments; distribution divides payments."},
{q:"The purpose of data normalization is to:",opts:["Delete conforming data","Increase data redundancy","Improve data integrity","Remove new types of data"],ans:2,exp:"Data normalization improves data integrity by reducing redundancy, removing anomalies, and making it easier to accommodate new types of data."},
{q:"The purpose of descriptive analysis is to summarize the past, whereas the purpose of predictive analysis is to:",opts:["Hypothesize why the past happened the way it did","Predict what could have happened if the past were different","Use existing data to forecast what could happen in the future","Verify that the descriptive analysis was accurate"],ans:2,exp:"Predictive analysis uses historical data to forecast what is most likely to occur in the future."},
{q:"The purpose of descriptive analysis is to summarize the past, whereas the purpose of predictive analysis is to:",opts:["Predict what could have happened if the past were different","Use existing data to forecast what could happen in the future","Hypothesize why the past happened the way it did","Verify that the descriptive analysis was accurate"],ans:1,exp:"Predictive analysis looks at historical data and analyzes it to predict the most likely future occurrences."},
