{q:"Juan noticed a positive variance of $2,000 in the email marketing section of his budget. What is another possible explanation for the positive variance?",opts:["Email marketing is not an important activity.","Email marketing was not effective.","The budget did not allocate enough resources for email marketing.","The planned email marketing campaigns were not completed."],ans:3,exp:"A positive variance could mean campaigns were never run (money not spent), rather than efficient spending. It doesn't necessarily indicate ineffectiveness or insufficient budget allocation."},
{q:"Juan Rodriguez signed a promissory note for a loan. In this credit arrangement, Juan is the:",opts:["Depositor","Creditor","Lender","Borrower"],ans:3,exp:"A promissory note is signed by a borrower promising to repay a loan. The person who signs is the borrower."},
{q:"Julie's grandparents offered a $1,000 gift at either the beginning or end of college. Why should she take it at the beginning?",opts:["She will pay fewer taxes before she begins college","Inflation will increase the value over time","She can start earning interest sooner","She shouldn't; she should wait until after college"],ans:2,exp:"Taking money earlier allows it to earn interest sooner. Inflation decreases value over time, not increases. Taxes depend on other factors."},
{q:"Justin is deciding between a video game or concert tickets with his $50. If he chooses the video game, what is the opportunity cost?",opts:["Birthday check","Video game","Concert tickets","$50"],ans:2,exp:"Opportunity cost is the benefit lost when choosing one option over another. Justin gives up the concert tickets, so that is the opportunity cost."},
{q:"Justine takes $5,000 from her uncle now (rather than when she buys a car in a year) and deposits it earning 6% compounded annually—growing to $5,300. What financial concept does this illustrate?", opts:["Capital budgeting","Dividend reinvestment plan","Time-value of money","Accrual accounting"], ans:2, exp:"The time-value of money means any certain amount is worth more now than later due to its earning potential. Taking the $5,000 now lets Justine earn $300 interest. A DRIP uses stock dividends to buy more shares. Capital budgeting determines which projects to invest in. Accrual accounting records transactions when they occur."},
{q:"Kaleb is removing duplicate records from his company's CRM system. Kaleb is conducting:", opts:["Exploratory research","Environmental scanning","Technical analysis","Data cleansing"], ans:3, exp:"Data cleansing corrects, removes, and/or formats questionable customer records. Environmental scanning collects info about the business environment. Technical analysis uses historical market data to evaluate securities. Exploratory research helps define business issues."},
{q:"Kaleb is removing duplicate records from his company's customer-relationship-management system. Kaleb is conducting:",opts:["Data cleansing","Environmental scanning","Technical analysis","Exploratory research"],ans:0,exp:"Data cleansing corrects, removes, and formats questionable customer records. Environmental scanning gathers external business information."},
{q:"Kali promised to get good grades and studies every day, completes assignments, and attends review sessions. Kali is __________ getting good grades.",opts:["Being pressured into","Committed to","Not focused on","Uninterested in"],ans:1,exp:"Kali is committed to getting good grades—she follows through on her promise by taking necessary steps consistently."},
{q:"Karl apologized for a delayed order, checked with the transportation company, and immediately called Mr. Schwarz with the delivery update. In this situation, Karl reinforced the company's image by:",opts:["delegating work tasks.","giving vague answers.","providing efficient follow-up.","complimenting the customer."],ans:2,exp:"Karl worked quickly and called back with specific information—an example of efficient follow-up that builds favorable relationships with customers."},
{q:"Keeping the end goal in mind refers to which standard of excellence that achievement-oriented people set?",opts:["Results","Improvement","Trying something new","Competition"],ans:0,exp:"Keeping the end goal in mind refers to being results-oriented—a characteristic of achievement-oriented people who like to objectively evaluate their successes."},
{q:"Kelly's stock has a dividend per share of $1.80 and a closing price of $28.20. What is the yield percentage?",opts:["4.8","6.4","6.1","4.6"],ans:1,exp:"Yield = Dividend per share / Closing price = $1.80 / $28.20 = 0.0638 = 6.4%"},
{q:"Kendra's financial goal is to build wealth through diversified investments. Which provider is most likely to help her?", opts:["Financial-auditing firm","Mortgage company","Investment bank","Asset-management firm"], ans:3, exp:"Asset-management firms invest clients' money in diversified securities by pooling assets—managing mutual funds, hedge funds, and pension plans. An investment bank underwrites securities and facilitates mergers. Mortgage companies process real estate loans. Financial-auditing firms perform independent audits."},
{q:"Kenneth is easily able to guide his employees' actions by referring to his budget. This is an example of which function of budgets?",opts:["Controlling","Planning","Directing","Monitoring"],ans:2,exp:"Directing is executing goals by guiding employees' actions with the budget. Planning sets goals. Controlling compares results. Monitoring tracks progress."},
{q:"Kenneth is easily able to guide the actions of his employees by referring to his budget. This is an example of which function of budgets?",opts:["Controlling","Planning","Directing","Monitoring"],ans:2,exp:"Directing involves executing goals and guiding employees' actions — Kenneth uses the budget to direct his employees. Planning sets goals; controlling compares to expectations; monitoring tracks progress."},
{q:"Keoni's phone keeps vibrating, which prevents him from listening closely. This is an example of",opts:["An environmental distraction","Active listening","An internal distraction","Paraphrasing"],ans:0,exp:"Environmental distractions are aspects of the setting that divert the listener's attention away from the speaker's message, such as noises from physical objects like phones."},
{q:"Kevin is attending an industry conference and hopes to build professional relationships. Which strategy would best help Kevin achieve this goal?",opts:["Only interact with people in similar positions","Prioritize networking over meaningful conversations","Avoid unnecessary interactions outside the workshops","Participate in discussions and actively listen"],ans:3,exp:"Building professional relationships requires meaningful engagement and active listening, establishing trust and demonstrating a genuine interest."},
{q:"Kim's dad gave her a $10 bill a year ago. Now it has less buying power than it did. What caused this?", opts:["Unemployment","Taxes","Globalization","Inflation"], ans:3, exp:"Inflation is an increase in the cost of goods and services—what your dollar buys today won't be the same next year. Taxes, globalization, and unemployment levels can impact the economy but aren't the direct cause of declining buying power of a saved bill."},
{q:"Knowing a bad storm is coming, a company shuts down a construction site to prevent injuries. This is an example of what risk control technique?",opts:["Loss prevention","Separation","Avoidance","Duplication"],ans:2,exp:"Avoidance is choosing not to do something considered risky. The company avoids risk by not operating the site during the storm."},
{q:"Kofi is currently working on a report that provides an overview of his company's fiscal year. What type of report is Kofi most likely to be preparing?",opts:["10-K","8-K","20-G","10-Q"],ans:0,exp:"A 10-K report, also known as an annual report, gives an overview of a company's fiscal year. A 10-Q covers a fiscal quarter. An 8-K is a current events report."},
{q:"Kramer Bank's software identifies additional business opportunities with commercial customers. The bank should share these opportunities with personnel who specialize in:", opts:["Risk management and sales","Relationship management and sales","Relationship management and pricing","Risk management and pricing"], ans:1, exp:"Cross-selling opportunity information goes to relationship management and sales professionals who can then pursue additional business with existing customers. Risk management and pricing personnel are not typically involved in pursuing cross-selling opportunities."},
{q:"Kramer Bank's software identifies additional business opportunities with commercial customers. The bank should share this with personnel who specialize in:",opts:["Relationship management and pricing","Relationship management and sales","Risk management and pricing","Risk management and sales"],ans:1,exp:"Cross-selling opportunity information should be shared with relationship management and sales professionals who pursue additional business with existing customers."},
{q:"KRM Corporation safeguards against physical and business hazards and annually reevaluates risks and response plans. KRM Corporation is practicing:",opts:["Security assessment training","Cost-benefit analysis","Enterprise risk management","Hazardous circumstance planning"],ans:2,exp:"Enterprise risk management is a comprehensive strategy that involves planning for both physical and business risks with regular reassessment."},
{q:"Kyrie is licensed to buy and sell securities and offer financial advice. She is most likely to find employment with a(n):", opts:["Insurance carrier","Investment bank","Brokerage house","Actuarial service"], ans:2, exp:"Brokerage houses specialize in trading securities, employing brokers/stockbrokers who must pass exams for licensing to trade on stock exchanges. Investment banks help corporations issue securities and facilitate mergers. Insurance carriers sell insurance policies. Actuarial services assess risk statistically."},
{q:"Lana wants to include a two-dimensional graphic showing groupings and patterns of multiple variables. Which would best illustrate the data?", opts:["Table","Pie chart","Timeline","Scatter chart"], ans:3, exp:"A scatter chart places points on a graph to indicate relationships or patterns among two or more variables. A pie chart shows parts of a whole. A timeline shows sequential events. Tables present exact individual values of data."},
{q:"Lara arrived at work on Tuesday to cover Martin's shift, just as she had promised. In terms of ethical work habits, Lara demonstrated that she is:", opts:["Productive","Empathic","Reliable","Resourceful"], ans:2, exp:"Reliable people follow through on their promises—they do what they say they will do. Empathy is putting yourself in another's place. Productive people complete required tasks correctly and efficiently. Resourceful people act imaginatively when new solutions are required."},
{q:"Late fees, interest charges, and difficulty qualifying for loans are all possible results of:",opts:["Paying credit card bills","Dropping out of school","Using credit poorly","Going to college"],ans:2,exp:"Using credit poorly can result in late fees, interest charges, and credit score decreases that make qualifying for loans difficult."},
{q:"Latisha is writing a list of skills, knowledge, and characteristics for a nurse position. She is working on a(n):",opts:["Onboarding activity","Job description","Strategic plan","Job specification"],ans:3,exp:"A job specification describes what a person in a position should be—their education, traits, and characteristics. A job description describes what they do."},
{q:"Lauren must determine which of two furniture suppliers is more cost-effective. What type of cost should she analyze?",opts:["Sunk cost","Differential cost","Indirect cost","Imputed cost"],ans:1,exp:"Differential cost is the difference between the costs of two alternatives—directly helping determine which supplier is the better choice."},
{q:"Lawrence's manager asked him to prepare a visual representation of key performance indicators including cash flow, liquidity, profitability, and liability. Lawrence should use his company's analytic software to create a(n):",opts:["operating agreement.","profit-and-loss statement.","cost standard.","financial scorecard."],ans:3,exp:"Financial scorecards contain key financial indicators and up-to-date financial information, often presented in charts and graphs. A P&L statement shows profitability over a specific period."},
{q:"Leadership is important when things are going well for a business because:",opts:["leaders determine the next step for the organization.","employees become discouraged in times of crisis.","team members usually embrace change.","people don't need role models."],ans:0,exp:"Leaders determine next steps for the organization even when things go well, because people often resist change without direction. Leadership is needed in both good and difficult times."},
{q:"Leah's primary duties at TRN Bank involve soliciting borrowers and assisting them through home or office building purchases. Her job title is most likely:",opts:["Senior bank teller","Controller","Insurance underwriter","Mortgage loan officer"],ans:3,exp:"Mortgage loan officers solicit borrowers for real estate purchases, oversee the application process, and assist in loan closings."},
{q:"Lean operations focus on increasing efficiency by reducing __________, while Six Sigma focuses on continuously improving __________ throughout the business.",opts:["Automation, standards","Wages, automation","Waste, quality","Standards, waste"],ans:2,exp:"Lean eliminates waste. Six Sigma is a quality-management framework that continuously sets higher goals of perfection."},
{q:"Lean Six Sigma is different than Six Sigma in that Lean Six Sigma",opts:["Doesn't focus on waste reduction","Prioritizes defect detection over prevention","Is not fact-based or data-driven","Aims to reduce variation and waste"],ans:3,exp:"Lean Six Sigma is a fact-based, data-driven philosophy of improvement that aims to reduce waste and variation. It prioritizes defect prevention over detection."},
{q:"Lei has just been informed her plant is getting new equipment that can do some employees' jobs. Which disadvantage of specialization is she most worried about?",opts:["Interdependency","Increased boredom on the job","Decreased pride in work","Job obsolescence"],ans:3,exp:"Job obsolescence occurs when a job becomes outdated due to advances in technology."},
{q:"Lena is deciding whether to purchase flood insurance for her company. This is an example of a(n) __________ issue in risk management.",opts:["Political","Financial","Technological","Ethical"],ans:3,exp:"Insurance decisions involving risk to employees and cost to the company present ethical dilemmas—risk managers must look out for the best interests of employees and companies."},
{q:"Leona, a professional accountant, attends a local accounting conference to meet business associates and discuss career opportunities. What career advancement activity is this known as?",opts:["Networking","Coordinating","Selling","Socializing"],ans:0,exp:"When people connect with others who might help them accomplish their professional goals, they are networking."},
{q:"Leslie's friend Paul, who oversees Bex Company's central data depository, told Leslie that Bex's profits dropped by a third and suggested she sell her Bex shares before the market finds out. This is an example of:", opts:["Encryption","Disparate data","Stewardship","Insider trading"], ans:3, exp:"Illegal insider trading occurs when a company employee shares non-public information with someone who trades on it. Paul shared confidential financial data with Leslie so she could sell before the price plummets. Encryption is data protection. Disparate data are incompatible databases. Stewardship is responsible data management."},
{q:"Lianne only invests in domestic stocks and has never invested in international stocks. This is an example of",opts:["Globalization","Liberalization","Overvalued stock","Home bias"],ans:3,exp:"Home bias refers to an investor's preference to invest primarily in domestic equities instead of diversifying into foreign or international equities."},
{q:"Like food service is just one segment of the hospitality industry, __________ is one component of __________.",opts:["risk control; risk management","risk management; risk control","internal risk; external risk","external risk; internal risk"],ans:0,exp:"Risk control (specific actions to mitigate risk) is one component of the broader risk management function, just as food service is one part of hospitality."},
{q:"Lily Marshall met with Barry Endicott who is leaving for another company. She asked what he liked/disliked about his job and what Spartan Industries could do better. What HR activity was Lily performing?", opts:["Onboarding tasks","Exit interview","Application screening","Workplace familiarization"], ans:1, exp:"Exit interviews are discussions with departing employees designed to gain feedback for improving policies and working conditions. Onboarding occurs when new employees join. Application screening filters out unqualified applicants. Workplace familiarization introduces new employees to the facility."},
{q:"Lina joined a professional finance organization to boost job prospects but has gotten no benefit. What should she try to do differently?",opts:["Join a different organization","Introduce herself to more members","Apply for more jobs","Invite her friends to join"],ans:1,exp:"Simply being a member won't build relationships. Introducing herself to more members enables her to build professional relationships and find career opportunities."},
{q:"Liquidity ratios are most often used to determine whether a company:",opts:["Has controlled its expenses and is in a position to generate a profit","Has the resources to pay its short-term debts","Is likely to be successful in the long term","Is going to be a good investment"],ans:1,exp:"Liquidity ratios measure a company's ability to turn short-term assets into enough cash to cover short-term liabilities."},
{q:"Liz has two employees that report to her. She is one of several managers with staffs of similar size. Liz's organization has a:",opts:["Flat structure","Wide span of control","Narrow span of control","Hands-off approach"],ans:2,exp:"A narrow span of control means managers have a small number of direct reports. Liz only has two employees, indicating narrow span of control."},
{q:"Los Angeles's location relative to Japan, Korea, and China makes it a prime shipping location. This is an example of the impact of __________ on world trade.",opts:["Geography","Natural resources","Political factors","Economic development"],ans:0,exp:"The geographical location of cities and ports is an important component of global trade. LA's Pacific Ocean access makes it ideal for transpacific trade."},
{q:"Loss prevention, loss avoidance, and loss reduction are risk __________ techniques.",opts:["retention","financing","transfer","control"],ans:3,exp:"Risk control methods reduce or minimize loss. Loss prevention stops losses from occurring; loss avoidance means not taking risky actions; loss reduction lessens impact after a loss occurs."},
{q:"Lower premiums and the ability to control the claims process are advantages of:",opts:["Traditional liability insurance policies","Standard insurance companies","Reinsurance carriers","Captive insurance companies"],ans:3,exp:"Organizations that form their own captive insurance companies control premium rates and the claims process."},
{q:"Lucille created a six-page synopsis to include at the beginning of her 224-page report. What should she call this section?", opts:["Executive summary","Bibliography","Footnotes","Results and recommendations"], ans:0, exp:"An executive summary is placed at the beginning of a long report to provide an overview. A bibliography lists sources. Footnotes appear at the bottom of pages. Results and recommendations is a specific section where the writer provides outcomes and suggestions."},
{q:"Lucy authorized her accountant, attorney, and life-insurance agent to care for her assets and make decisions about her money and property. They are her:", opts:["Relationship experts","Bookkeepers","Fiduciaries","Economists"], ans:2, exp:"A fiduciary is responsible for caring for another person's assets and making decisions regarding them. Trusted financial advisors (accountants, attorneys, insurance agents) serve as fiduciaries. An economist studies economic decisions. A bookkeeper analyzes and journalizes financial transactions."},
{q:"Luke is writing a complex report for the board of directors and has supplemental information not necessary for the body. In what section should he include this?", opts:["Executive summary","Bibliography","Appendix","Table of contents"], ans:2, exp:"Supplemental information for long/complex reports goes in an appendix at the end. An executive summary provides an overview at the beginning. A bibliography lists sources. The table of contents lists sections with page numbers."},
{q:"Lyla recently earned her doctorate and wants to meet with a financial advisor. Which step should she do first?",opts:["Determine what type of financial advisor she needs","Understand how financial advisors are compensated","Check for complaints about the financial advisor","Make sure the financial advisor has reputable credentials"],ans:0,exp:"Determining what type of financial advisor is needed comes first. There are many types with different focuses. Once the type is determined, credentials and compensation can be evaluated."},
{q:"Lynnette works at Main Street Bank and her primary job is to determine if the bank should lend funds to customers. Lynnette is working as a(n):", opts:["Collections officer","Credit analyst","Chartered financial consultant","Bank agent"], ans:1, exp:"Credit analysts research and confirm loan applicants' employment, income, and credit histories; prepare reports for loan committees; and help in the loan approval process. Collections officers collect past-due payments. A chartered financial consultant specializes in retirement/estate planning. A bank agent is an intermediary."},
{q:"Lyra will receive a lump sum payment of $5,000 in two years with a discount rate of 6%. Calculate the present value.",opts:["$5,138.67","$4,716.99","$4,449.98","$3,981.76"],ans:2,exp:"PV = 5,000 / (1 + .06)^2 = $4,449.98"},
{q:"Maggie finds that a ridesharing company pays mechanics for the maintenance and repair of a fleet of cars as needed. She should categorize this expense as a(n) __________ cost.",opts:["Indirect","Direct","Opportunity","Sunk"],ans:0,exp:"The cost of fleet-wide maintenance and repair is not traceable to any one ride, driver, or vehicle but is necessary for operations—making it an indirect cost."},
{q:"Maggie uses questionable tactics to get sales, sometimes misleading customers, because her primary goal is to get ahead. Her behavior risks her employer because Maggie places more importance on __________ than on __________.", opts:["Corporate branding, her own productivity","Social responsibility, her career goals","Personal gains, business ethics","Operating procedures, compliance"], ans:2, exp:"Maggie places her personal gains (career advancement) above doing the right thing (business ethics)—which is unethical. Her misleading behavior jeopardizes the employer's reputation and may cause noncompliance issues. She's not prioritizing corporate branding or operating procedures."},
{q:"Makayla wants to know whether or not her customer can pay short-term debts. What type of financial ratio analysis should Makayla use?",opts:["Asset turnover","Profit margin","Working capital","Debit/Equity"],ans:2,exp:"Working capital (current assets minus current liabilities) measures short-term financial health and indicates whether a company can cover its current debts."},
{q:"Making employment information available to job seekers in many locations at the same time is one way that computer technology impacts:",opts:["organizational decision-making.","business development.","corporate communications.","human resources management."],ans:3,exp:"Posting job openings online makes employment information available to job seekers worldwide simultaneously, directly impacting the human resources management function of staffing."},
{q:"Making sure a company follows laws and regulations describes the HR management activity of:",opts:["staffing.","compliance.","compensation and benefits.","employee relations."],ans:1,exp:"Compliance is the HR management activity that ensures a company follows all applicable laws and regulations. Staffing ensures appropriate employees are available; compensation and benefits manages pay."},
{q:"Managerial accountants help managers by:",opts:["Ensuring employees are paid fairly","Preparing financial statements for investors","Providing important information for decision-making","Providing tax advice and filing taxes"],ans:2,exp:"Managerial accountants provide financial information managers need to make decisions that improve efficiency and success—including budgeting and analysis."},
{q:"Managerial accountants provide assistance to management by:",opts:["Calculating probability of risky events","Preparing financial statements for public review","Gathering information on social media trends","Accumulating data on costs and profits"],ans:3,exp:"Managerial accountants accumulate data on business costs and profits to help managers make informed decisions."},
{q:"Managerial accounting is different from financial accounting because managerial accounting:",opts:["Is a requirement for all companies","Prepares reports for external users","Takes a future approach","Provides more general results"],ans:2,exp:"Managerial accounting takes a future approach; financial accounting reviews historical data."},
{q:"Managers are more likely to be able to persuade employees to follow new procedures if the managers have:",opts:["self-motivation.","organizational skills.","enthusiasm.","credibility."],ans:3,exp:"Credibility is believability. If employees believe what managers say, they are more likely to follow their instructions. Managers develop credibility by always being truthful with employees."},
{q:"Managers often use financial data and reports to determine a business's profitability, competitiveness, and:", opts:["Personal net worth","Human resources needs","Internal accounting controls","Operational inefficiencies"], ans:3, exp:"Inefficiencies arise when businesses spend too much to produce goods/services, making financial reports useful for identifying them. Financial reports are less helpful for HR needs and internal accounting controls. Personal net worth applies to individuals, not companies."},
{q:"Many businesses use infographics to help persuade readers because:",opts:["Readers spend more time viewing infographics","Original artwork usually takes longer to create","Most people are lazy and don't like to read","Infographics raise the perception of quality"],ans:3,exp:"A well-designed infographic raises the reader's perception of quality, making it more likely to persuade. The quality, not viewing time, is what persuades."},
{q:"Many businesspeople are required to take continuing education classes to:", opts:["Supplement their existing income","Improve their standard of living","Demonstrate their emotional intelligence","Maintain their professional certifications"], ans:3, exp:"Many professions (accounting, finance, medicine, education) require continuing education to maintain certifications and licensures, keeping workers current with changes in their fields. Continuing education is not required to supplement income, improve living standards, or demonstrate emotional intelligence."},
{q:"Many computer software programs help businesses determine their levels of business risk, which is helpful when they develop:",opts:["monetary regulations.","content theories.","endorsement records.","contingency plans."],ans:3,exp:"Businesses use risk-management software to obtain numerical data about risk levels and help develop contingency plans—alternative courses of action for when circumstances increase or decrease risk."},
{q:"Many nations have developed environmental regulations in order to encourage:",opts:["moral conduct.","ethical behavior.","conservation.","industrialization."],ans:2,exp:"Environmental regulations conserve natural resources by controlling pollution, requiring proper waste disposal, encouraging recycling, and monitoring illegal dumping."},
{q:"Many stakeholders feel it's not enough for a company to simply be profitable. The company must also:",opts:["Appoint government officers","Facilitate the lowering of capital","Demonstrate social responsibility","Increase the chance of corruption"],ans:2,exp:"Corporate social responsibility is the duty of businesses to contribute to the well-being of society. Many stakeholders expect companies to be both profitable and socially responsible."},
{q:"Mapping, analyzing, redesigning, acquiring resources, and implementing are steps companies follow when attempting to:",opts:["Start an advertising campaign","Educate the public on their work","Attract more talented workers","Streamline work processes"],ans:3,exp:"Streamlining a work process involves mapping the current process, analyzing it, redesigning it, acquiring necessary resources, and implementing the change."},
{q:"Marcus is one of the earliest investors in a new teeth-whitening kit. He has convinced others to invest, allowing early backers to profit from later investments. What type of investment scam is this?",opts:["Ponzi scheme","Viatical investment scam","Boiler room","Predatory lending"],ans:0,exp:"A Ponzi scheme pays returns to early investors using funds from later investors rather than legitimate investment returns."},
{q:"Marcus wants to invest a portion of his money in long-term securities to finance his son's college education and his own retirement. To make the best investment decisions, Marcus should obtain the services of a:",opts:["credit-union representative.","loan officer.","licensed tax accountant.","certified financial planner."],ans:3,exp:"Financial planners help clients develop investment plans and recommend financial products. Tax accountants, loan officers, and credit-union representatives don't usually provide comprehensive financial planning and investment advice."},
{q:"Marcus, one of the earliest investors for a new teeth-whitening kit, has convinced several others to invest, allowing early backers to profit. What type of investment scam is this scenario describing?",opts:["Viatical investment scam","Boiler room","Ponzi scheme","Predatory lending"],ans:2,exp:"A Ponzi scheme lures new investors by promising high rates of return, paying early investors out of funds from later investors."},
{q:"Margaret died with a large estate. Who is legally responsible for managing and distributing her wealth according to her wishes?",opts:["Her attorney","An executor","A beneficiary","Her daughter"],ans:1,exp:"An executor has a fiduciary duty to manage the deceased's assets and distribute them according to their last wishes."},
{q:"Margaret financially supports others' business ventures. Now she wants to support Marcus Williams in starting his new business. Margaret is a(n) __________, and Marcus is a(n) __________.", opts:["Licensor, sponsor","Franchisee, franchisor","Angel investor, entrepreneur","Manager, loan officer"], ans:2, exp:"An angel investor provides start-up money to new businesses. An entrepreneur identifies opportunities, creates new value, assumes business-starting risks, and receives financial and personal rewards. A licensor owns IP. A franchisor sells rights to use their business model. A manager coordinates resources."},
{q:"Margaret is performing marginal analysis to help her boss decide whether upgrading manufacturing equipment is worthwhile. Which of the following should be included in the marginal cost analysis?",opts:["The profit from selling the old machines","The rent of the manufacturing facility","The annual maintenance and repair of one new machine","The additional value of the output produced by one new machine"],ans:2,exp:"Annual maintenance and repair is a cost directly associated with the purchase of one new machine. Rent is a fixed cost that doesn't depend on new machines. Output produced is a benefit, not a cost."},
{q:"Margot wants her money, house, and cars to go to her sister when she dies. Margot should create a:",opts:["Will","Retirement fund","College savings fund","Bank account"],ans:0,exp:"A will is a legal document outlining how assets are distributed after death. Retirement funds and bank accounts don't guarantee asset distribution."},
{q:"Maria and Laura, both accountants, exchanged contact information at a conference and promised to keep in touch about professional opportunities. What skill did they demonstrate?",opts:["Problem solving","Networking","Advertising","Co-branding"],ans:1,exp:"Networking involves exchanging information with others for professional development or advancement."},
{q:"Marilee needs to view all customers located in Florida. What query filter should she use?",opts:["Last name","State","Area code","City"],ans:1,exp:"Filtering by state will quickly return all customers in Florida. Filtering by city or area code would require multiple queries and wouldn't be as efficient."},
{q:"Mario expresses himself well in class because he knows how to use words effectively. Mario would be described as having:",opts:["Physical coordination","Emotional traits","Nonverbal skills","Verbal aptitude"],ans:3,exp:"Verbal aptitude is the ability to use words effectively—an important skill for most careers. Nonverbal skills involve body language."},
{q:"Marketing encourages people from different countries to __________ frequently.",opts:["Train","Trade","Think","Travel"],ans:1,exp:"Marketing creates exchanges between people and nations, encouraging frequent trade. Traveling, training, and thinking are not specifically encouraged by marketing."},
{q:"Martin selects a standardized group of slides and enters appropriate text and graphics in each. What is he using to design his presentation?",opts:["Premade slides","Wizard","Blank slides","Templates"],ans:3,exp:"Templates allow the user to enter information into a set of standardized slides that all have a similar look. Wizard uses already-prepared slide shows to suggest content."},
{q:"Martin was speeding a couple miles over the limit to keep up with traffic. Martin was most likely breaking __________ law but not __________ law.",opts:["the letter of the; the spirit of the","criminal; civil","civil; criminal","the spirit of the; the letter of the"],ans:0,exp:"The letter of the law is its literal wording (the speed limit). The spirit of the law is its intent (drive safely). Keeping up with traffic violates the letter but arguably not the spirit."},
{q:"Mary is accused of understating tax on her returns for 5 years unrelated to tax shelters. She's concerned about fines or jail. Which statement is true?", opts:["If a CPA prepared her return, she can probably avoid government penalties","Mary is likely to be jailed for understating tax because she didn't use an approved tax shelter","The agency should recognize the understatement as a tax shelter because Mary is 45","Mary should store her assets in an offshore bank account"], ans:0, exp:"Since clients trust tax professionals to prepare returns appropriately, the government is more likely to penalize negligent tax preparers than their clients. A tax shelter is a legal method to minimize taxable income—Mary's understatement is not a tax shelter. Offshore accounts wouldn't benefit her situation."},
{q:"Mateo is dealing with an angry customer who is being disrespectful. How can Mateo model ethical behavior?",opts:["Tell the customer they are being rude","Make the customer leave the store","Be disrespectful and yell back to the customer","Treat the customer with fairness"],ans:3,exp:"Even though the customer is being rude, Mateo can model ethical behavior by treating the customer with fairness."},
{q:"Material, labor, and overhead are all components that might be the focus of:",opts:["Performance evaluation","Marketing management","Variance analysis","Sales reporting"],ans:2,exp:"Variance analysis focuses on discrepancies between actual and planned behavior, including material, labor, and overhead costs."},
{q:"Matthew received a $20,000 loan from a financial institution to help pay for college. When he graduates, he will repay the institution. This is an example of which form of financial exchange?",opts:["Bitcoin","Debit","Cash","Credit"],ans:3,exp:"Credit is borrowed money used to purchase goods or services now, to be repaid later with applicable interest. This is distinct from cash, debit, or bitcoin."},
{q:"Maureen becomes angry and defensive whenever her supervisor asks her to correct mistakes. Maureen's attitude is not a good response to criticism because:",opts:["it indicates that Maureen wants to call attention to herself.","there is no reason to be angry about criticism.","Maureen has no right to be angry on the job.","it prevents Maureen from hearing the criticism clearly."],ans:3,exp:"Defensiveness raises a barrier between you and the speaker. If Maureen listened with an open mind, she might learn how to correct and avoid future mistakes."},
{q:"Max wants his magazine team to start sending daily emails to subscribers. What type of professional writing should they use?",opts:["Newsletter","Report","Business letter","Agenda"],ans:0,exp:"Newsletters provide information of interest to particular groups, often sent via email to keep subscribers engaged. Reports are documents; business letters communicate between companies."},
{q:"Megan has a new idea during a staff meeting while a coworker is presenting. How should she communicate it?",opts:["Write it down and ask her manager after the meeting to add it to a future agenda","Wait until her coworker finishes and propose her idea","Send her manager a signal to share immediately","Pass a note to her coworker"],ans:0,exp:"Participants should stick to the agenda. New ideas should be saved for another discussion—interrupting or passing notes is distracting."},
{q:"Megan is listening to her group member and says things like 'I see,' 'uh-huh,' and 'I understand.' Which active listening skill is Megan demonstrating?",opts:["Paraphrasing the message to test her understanding","Collecting all the information possible","Repeating critical information","Using a verbal acknowledgment response"],ans:3,exp:"Short verbal responses like 'I see' and 'uh-huh' let the speaker know you're actively listening. This is a verbal acknowledgment response, distinct from paraphrasing or repeating critical info."},
{q:"Melanie dressed for her job interview at a bank in old, comfortable jeans, a sweatshirt, and worn Nikes. Which message is Melanie sending to the interviewer?",opts:["I care a lot about the outcome of this interview.","I would really like to be hired for this job.","I consider my own comfort my first priority.","I'm someone who will support the image of the bank."],ans:2,exp:"Clothing is a form of nonverbal communication. Melanie dressed for her own comfort rather than professionally, signaling to the interviewer that she prioritizes her own comfort over the interview."},
{q:"Melanie is determining her personal net worth. Which of the following should she consider a liability?",opts:["Personal valuables","Stocks she owns","Her life insurance policy","Student loan debt"],ans:3,exp:"A liability is a debt or payment owed to someone else. Student loan debt is a liability. Stocks, life insurance policies, and personal valuables are assets."},
{q:"Melissa works with hazardous materials but is never provided protective clothing or equipment. What employee right is her employer failing to address?",opts:["Right to expect recognition and criticism","Right to form unions and collective bargain","Right to a safe working environment","Right to fair and unprejudiced treatment"],ans:2,exp:"All employees are entitled to a safe working environment. Employers who expose workers to hazardous materials must provide appropriate protective equipment."},
{q:"Melissa writes checks to pay for her rent, utilities, and groceries and keeps a record in her check register. Keeping an accurate check register helps Melissa:",opts:["determine when she needs to add funds to her savings account.","track the amount of money she has spent.","understand the checking account's restrictions and fees.","decide when to order new checks."],ans:1,exp:"The check register is a central location to record and track all checks written and the amount of money spent. It does not help determine when to add savings or order new checks."},
{q:"Members of the air-traffic controllers' union stopped working to support the pilots' union that recently went on strike. This is an example of a:", opts:["Boycott","Lockout","Sympathetic strike","Wildcat strike"], ans:2, exp:"A sympathetic strike occurs when one union stops working to support another union on strike. A wildcat strike happens without national union consent. A lockout closes the business temporarily, preventing employees from working. A boycott is when union members refuse to buy a company's products."},
{q:"Mia wants to control her portfolio and avoid high commissions. She should consider obtaining securities information from a(n):",opts:["Licensed stockbroker","Online brokerage firm","Certified insurance agent","Risk management officer"],ans:1,exp:"Online brokerage firms provide securities information via the internet with lower fees. Clients take on more responsibility for managing their own investments."},
{q:"Michelle is a small business owner who has outdated customer information in her computer files. What type of application should she use to update her database?",opts:["Environmental scanning","Customer relationship management","Tabulation analysis","Application programming interface"],ans:1,exp:"CRM (Customer Relationship Management) applications allow businesses to easily manage, update, and organize customer information."},
{q:"Michelle wants to be a financial analyst. Which action would best help her build professional relationships?",opts:["Secure an internship at a financial institution","Continuously send emails to potential contacts until they respond","Focus solely on improving her technical skills","Consume as much financial analysis information as possible"],ans:0,exp:"Securing an internship at a financial institution would give Michelle the opportunity to build professional relationships with her colleagues."},
{q:"Microsoft Windows, Linux, and macOS are examples of:",opts:["Operating systems","Computers","Internet providers","Antivirus software"],ans:0,exp:"Operating systems organize and control hardware and software. All computers have operating systems."},
{q:"Miguel enjoyed building furniture as a hobby. Word-of-mouth led to requests, so he opened his own woodworking business. He decided to start a business because of his:", opts:["Passion for a hobby","Desire for a flexible schedule","Technological knowledge","Need for adventure"], ans:0, exp:"Entrepreneurial ventures often begin as hobbies. Miguel's woodworking business started because he enjoyed building furniture in his spare time—a passion for his hobby. There's insufficient information to determine if he wanted flexibility, technological knowledge, or adventure."},
{q:"Miguel opened his own woodworking business after requests for his work became so great. He decided to start his own business because of his:",opts:["desire for a flexible schedule.","need for adventure.","passion for a hobby.","technological knowledge."],ans:2,exp:"Entrepreneurial ventures often begin as hobbies. Miguel's woodworking started as something he enjoyed in his spare time before growing into a business."},
{q:"Mikel is responsible for interpreting financial information and systems design for his company. What type of career does he likely work in?",opts:["Banking services","Securities and investments","Insurance","Accounting"],ans:3,exp:"Accountants examine and prepare financial records, involving activities like bookkeeping, systems design, analysis, and interpretation of accounting information."},
{q:"Milk Mobile planned for deliveries to drop 2% but they only dropped 1%. What could be said about their performance?",opts:["Milk Mobile both overperformed and underperformed","Milk Mobile overperformed in milk deliveries this year","Milk Mobile underperformed in milk deliveries this year","Milk Mobile neither overperformed nor underperformed"],ans:1,exp:"Overperformance is indicated by a metric surpassing expectations. The company planned to lose 2% of deliveries but only lost 1%, meaning they performed better than planned."},
{q:"Min frowns, smiles, scratches his head, and rubs his belly during his presentation. What speaking technique is he using?",opts:["Nonverbal communication","Eye contact","Comedy","Hand gestures"],ans:0,exp:"Facial expressions and gestures represent nonverbal communication. He uses more than just hand gestures—he uses facial expressions too."},
{q:"Mina has a $3,000 investment for four years at 10% interest paid annually. What is the future value?",opts:["$5,100","$3,500","$4,200","$3,400"],ans:2,exp:"Using simple interest: FV = PV × (1 + [i × n]) = $3,000 × (1 + (0.10 × 4)) = $3,000 × 1.4 = $4,200."},
{q:"Mira is analyzing a financial statement and uses Benford's Law. What can this help her do?",opts:["Estimate business viability","Find opportunities for profit","Identify personnel issues","Detect the possibility of fraud"],ans:3,exp:"Benford's Law helps identify deviations from expected digit distribution patterns in data, which can indicate fraudulently manufactured numbers."},
{q:"Mira is reviewing a financial statement using Benford's Law. What can this help her do?",opts:["Estimate business viability","Find opportunities for profit","Identify personnel issues","Detect the possibility of fraud"],ans:3,exp:"Benford's Law explores digit distribution in large data sets. Deviations from expected patterns can indicate fraudulently manufactured numbers."},
{q:"Miranda is offered a lump sum payment of $2,000 in one year with a discount rate of 5%. Calculate the present value.",opts:["$1,333.33","$1,904.76","$2,105.26","$2,000.00"],ans:1,exp:"PV = 2,000 / (1 + .05)^1 = $1,904.76"},
{q:"Molly wants to avoid losing her money in a scam. Which opportunity should she avoid?",opts:["The stock market","Ponzi scheme","Roth IRA","401k"],ans:1,exp:"A Ponzi scheme is an investment scam promising high returns with little risk."},
{q:"Money placed in an IRA that is not taxed until withdrawal is an example of:",opts:["Capital gains revenue","Tax-deferred income","Dual taxation on earnings","Tax-exempt funds"],ans:1,exp:"Tax-deferred income is not taxed until the money is used, such as money in an IRA that retirees use for living expenses."},
{q:"Money Plus Bank needs to improve processes for calculating and reporting risk-weighted assets to meet Basel II compliance. The best course of action is to:", opts:["Encourage customers to utilize the bank's online account system","Improve the bank's new-employee training program","Increase cross-functional cooperation among employees","Switch from manual to automated calculation and reporting methods"], ans:3, exp:"Basel II requires banks to calculate and report risk-weighted assets. Automating these processes with technology that gathers data and calculates risk-weighted assets best meets compliance requirements. Training, cooperation, and customer systems don't directly address the calculation/reporting compliance need."},
{q:"Monica wants to be a good employee. Which of the following actions should she take?",opts:["Come to work even when she's sick or has a family emergency","Plan her vacation time wisely to make sure she isn't absent at crucial times","Make sure not to be more than half an hour late each day","Make up for missing many days by working harder when at work"],ans:1,exp:"Planning vacation wisely ensures she isn't absent at critical times. Coming in sick, being late, or missing many days are all problematic regardless of compensation."},
{q:"Monique used to organize documents in filing cabinets taking up an entire room. Now she stores them on her computer for easy access and organization. Monique now uses:", opts:["Internet telephony","A database","An expert system","Computer automation"], ans:1, exp:"Databases allow records that once took rows of filing cabinets to be stored on computers for quick access, organization, and editing. Internet telephony is web-based communication (Vonage, Skype). Expert systems mimic human expert knowledge. Computer automation is typically used in manufacturing."},
{q:"Monique's classmates frequently complain about their teacher. If Monique adopts their same attitudes even though she doesn't really agree with them, she is demonstrating",opts:["Status quo bias","Groupthink","Critical thinking","Acceptance"],ans:1,exp:"When a person makes a poor decision out of fear of disagreeing with a group, they are demonstrating groupthink behavior."},
{q:"Montez's $6,000 investment is held in his savings account with a 4% simple interest paid annually for four years. Calculate the future value.",opts:["$6,387.45","$6,749.18","$7,299.92","$7,019.15"],ans:3,exp:"FV = $6,000 x (1 + .04)^4 = $7,019.15"},
{q:"Mooreshead Bank has placed a claim on Marc's property to protect itself from financial loss if Marc can't pay back his loan. Mooreshead has secured a __________ against Marc's property.",opts:["License","Lien","Label","Ledger"],ans:1,exp:"A lien is a legal claim to a property that protects the creditor from financial loss if the borrower doesn't complete payments."},
{q:"More consistent/up-to-date data, faster query response, and economies of scale are all benefits of using a(n):", opts:["Intrusion detection system","Encryption technology","Central data repository","Principle of least authority"], ans:2, exp:"A central data repository is a centralized comprehensive database with benefits including consistent data, faster queries, and economies of scale. Encryption and intrusion detection ensure security. The principle of least authority limits user access to only necessary data."},
{q:"More than anything else, being an ethical person means:",opts:["agreeing with popular beliefs.","following the example of authority figures.","listening to your friends' opinions.","doing what's right, even when it doesn't benefit you."],ans:3,exp:"Being ethical means doing what's right no matter what, even when it doesn't benefit you personally. Authority figures, friends, and popular beliefs are not always ethical."},
{q:"Mortgages and government bonds are examples of:",opts:["interest-free services.","debt instruments.","equity products.","unrated investments."],ans:1,exp:"Debt instruments generate income through interest. Mortgages earn interest for the lender; bondholders earn interest from the issuer. Equity instruments involve ownership (e.g., stock)."},
{q:"Most automobile salespeople try to get an idea of the price range a customer can afford. This is part of which marketing function?",opts:["Pricing","Marketing-information management","Selling","Distribution"],ans:2,exp:"Selling involves determining client needs and wants and responding through personalized communication. Understanding what a customer can afford is part of the selling function."},
{q:"Most businesses maintain records about what customers are buying and how much they are spending in order to:",opts:["analyze the information.","plan an inventory count.","offer quality service.","develop a quality environment."],ans:0,exp:"By analyzing customer purchase records, businesses are able to plan future sales and obtain products that will appeal to customers and encourage them to buy."},
{q:"Most people are better able to handle change if they __________ it.",opts:["Oppose","Anticipate","Avoid","Resist"],ans:1,exp:"By anticipating change, we can plan for it and make a better adjustment. Resisting or opposing change prevents moving forward."},
{q:"Motives, perception, attitude, lifestyle, personality, and abilities are __________ factors influencing consumer behavior.",opts:["psychological","social","political","economic"],ans:0,exp:"Psychological factors — motives, perception, attitude, lifestyle, personality, and abilities — directly influence individual consumer decisions. Social factors include opinion leaders and social class."},
{q:"Mr. Edwards dropped a flash drive containing confidential customer information from his employer's computer network. This situation is an example of a risk related to:",opts:["information security.","patent protection.","employee privacy.","data entry."],ans:0,exp:"Businesses must take reasonable care to protect and secure customers' personal information to reduce the risk of fraudulent behavior. Removing digital information from facilities creates security risk."},
{q:"Mr. Field makes all important decisions and gives employees very specific instructions. Which management style describes Mr. Field?",opts:["Open","Laissez-faire","Authoritarian","Democratic"],ans:2,exp:"Authoritarian managers rely on their own judgment and tell employees exactly how to do their jobs. Democratic managers seek employee input. Laissez-faire provides only general guidance."},
{q:"Mr. McKinney gave a portion of his wages to a local charity and was not required to pay taxes on that amount. This is an example of a(n):",opts:["estate allocation.","tax deduction.","tax-deferred investment.","investment disbursement."],ans:1,exp:"The government does not require individuals and businesses to pay tax on income given to charity. This is a tax deduction. Tax-deferred investments are taxed at disbursement."},
{q:"Mrs. Ramirez was disconnected from a call center rep during an insurance claim. She doesn't remember the rep's name. What CRM data would most help identify the rep?", opts:["Self-provided data","Demographic data","Interaction data","Historical data"], ans:2, exp:"Interaction data contains details about phone contacts, visits, and call center interactions—including which rep assisted a customer. Demographic data is basic info like age/gender. Self-provided data is voluntarily shared info. Historical data is old data used for new purposes."},
{q:"Mya uses money from new investors to pay her initial investors high returns, while pocketing some for herself. This is an example of",opts:["A Ponzi scheme","Phishing","A boiler room","Insider trading"],ans:0,exp:"A Ponzi scheme is an investment scam that lures in new investors by promising high rates of return. Returns to initial investors are paid from new investors' money."},
{q:"Myles wants to put his money in an ownership investment, and he's comfortable with a moderate level of risk. What should he invest in?",opts:["Savings accounts","Certificates of deposit","Stock mutual funds","Money market accounts"],ans:2,exp:"Stock mutual funds are a combination of stocks from different corporations. As an owner, you still have a good chance of receiving a return. Savings accounts, money market accounts, and CDs are low-risk lending investments."},
{q:"Nadia's employee Roger rarely does what he's supposed to do, forgets appointments, and misses work frequently. An employee like Roger is an example of a(n) __________ risk.",opts:["Hazard","Operational","Strategic","Financial"],ans:1,exp:"Operational risks result from employee actions, core processes, and daily business activities. Human errors like Roger's are operational risks."},
{q:"Nancy said to Stanley: 'That was a good try. Next time you might want to take the opposite approach.' This is an example of a coach providing:",opts:["Ineffective criticism","Feedback for improvement","A standard response","Continuous reinforcement"],ans:1,exp:"By suggesting an alternative approach, Nancy is providing feedback for improvement—encouraging Stanley and offering a course of action."},
{q:"Nani has $500 in an emergency fund, $2,000 in savings, and $500 on a high-interest credit card. What financial goal should she tackle first?",opts:["Save $500 for a down payment on a home","Pay off her credit card by the end of the year","Add more money to her emergency fund","Sign up for a lower interest credit card in six months"],ans:1,exp:"Nani should prioritize paying off the high-interest credit card first, as it will help her eliminate debt. Adding to savings and emergency fund are secondary."},
{q:"Nasim is under a lot of stress and is finding it difficult to be enthusiastic about her job. She isn't doing her best at work because she's dealing with:",opts:["endorphins.","productivity.","low morale.","burnout."],ans:2,exp:"Low morale occurs when stress makes it difficult to be enthusiastic about work. Burnout is a type of exhaustion from prolonged stress; morale describes the current level of enthusiasm."},
{q:"Natalie can save time and easily return to websites she frequently visits by using the __________ tool on her Internet browser.",opts:["Sorting","Highlighting","Bookmarking","Classifying"],ans:2,exp:"Bookmarking saves URL addresses so users can quickly return to frequently visited websites without reentering the address."},
{q:"Nathan learns of a groundbreaking new drug approval and tells his brother so he can buy shares before the news is public. This is an example of",opts:["Predatory lending","Point-of-sale fraud","Insider trading","Ethical trading"],ans:2,exp:"Insider trading refers to the buying or selling of a security by someone who has access to nonpublic information. Providing 'tips' to others is also an insider trading violation."},
{q:"Nathan runs a budget past management to ensure they understand and agree before implementation, helping the company coordinate efforts. This demonstrates the importance of __________ in developing an effective budget.",opts:["Rewards","Accuracy","Company-wide support","Long-term motivation"],ans:2,exp:"Company-wide support ensures the budget is implemented effectively across departments as they work toward shared company goals."},
{q:"Natural disasters like tornadoes, earthquakes, and floods are considered __________ risks.",opts:["Operational","Hazard","Financial","Strategic"],ans:1,exp:"Hazard risks are potential events or situations that can cause injury or harm to people, property, or the environment. Natural disasters are types of hazard risks."},
{q:"Negative feedback makes many individuals uncomfortable because it:",opts:["is so rare.","involves so many people.","points out their shortcomings.","occurs so regularly."],ans:2,exp:"Negative feedback makes individuals uncomfortable because it points out their weaknesses, faults, and shortcomings. Constructive criticism is best shared in private and should not involve many people."},
{q:"Neil and others in his program are experiencing difficulty finding work because many businesses want additional qualifications. Which type of unemployment does this represent?",opts:["Structural","Technological","Societal","Frictional"],ans:0,exp:"Structural unemployment exists when there is a mismatch between available workers and available jobs—not enough workers qualified for the types of jobs available."},
{q:"Nimbus Solutions wants its managers to demonstrate the need for every expense instead of relying on figures from a previous period. What type of budget should Nimbus Solutions implement?",opts:["Rolling","Master","Negative sum","Zero-based"],ans:3,exp:"Zero-based budgeting requires managers to demonstrate the need for every expense instead of relying on figures from a previous period. Each new budget begins at zero."},
{q:"Noreen, a human resources manager, attends job fairs, places ads online, and partners with an outside employment agency to find applicants. This aspect of staffing is known as:",opts:["onboarding activities.","interviewing.","orientation.","recruitment."],ans:3,exp:"Recruiting is the aspect of staffing that involves seeking out and attracting qualified potential employees. Interviewing, orientation, and onboarding happen after candidates are identified."},
{q:"Objective setting, risk assessment, and risk response are all components of:",opts:["Conflict resolution policies","Asset allocation strategies","Channel-management plans","Enterprise risk management"],ans:3,exp:"Enterprise risk management (ERM) is a comprehensive strategy involving planning for physical and business risks, including setting objectives, assessing risks, and determining responses."},
{q:"Obtaining a credit score, contacting references, and calculating financial ratios are all ways to:",opts:["Determine whether a customer is worthy of purchasing on trade credit","Determine whether an investor is capable of financing a startup","Help a financial manager decide whether to open a new location","Help a financial manager decide whether to take a company public"],ans:0,exp:"These methods assess the creditworthiness of a business customer before offering trade credit."},
{q:"Occupations like auditor, bookkeeper, and controller typically fall under which of the following career fields?",opts:["Corporate finance","Insurance","Banking services","Accounting"],ans:3,exp:"Careers in accounting involve recording, classifying, summarizing, analyzing, and communicating a business's financial information. Auditor, bookkeeper, and controller fall under accounting."},
{q:"On a balance sheet, a business categorizes its inventory and accounts receivable as:", opts:["Long-term assets","Current assets","Owner's equity","Current liabilities"], ans:1, exp:"Current (short-term) assets include inventory and accounts receivable—their levels fluctuate. Owner's equity is the owner's investment plus/minus profits/losses. Long-term assets are buildings, vehicles, and equipment used for more than a year. Current liabilities are debts due within a year."},
{q:"One action an ethical business can take to build long-term trust and loyalty of customers is to:",opts:["Implement a comprehensive customer privacy policy","Send daily opt-in email messages to customers","Sell its customer list to third parties without permission","Maintain detailed information about customers' transactions"],ans:0,exp:"Developing and adhering to a customer privacy policy—such as limiting employee access and not selling customer lists—earns customers' trust."},
{q:"One activity of professional organizations and trade associations is to:",opts:["Develop wage regulations","Test products","Influence legislation","Establish customer trends"],ans:2,exp:"Professional organizations and trade associations frequently employ lobbyists to influence legislative decisions affecting their members."},
{q:"One advantage of consolidation to financial firms is:",opts:["less liquid capital.","one-stop shopping.","fewer technology problems.","lower costs."],ans:3,exp:"Consolidation (merging within the same sector) achieves economies of scale, reducing redundancy and lowering costs. One-stop shopping is an advantage to consumers, not firms."},
{q:"One advantage to businesses of using electronic funds transfer technology to collect accounts receivable is that it eliminates:",opts:["check processing.","liquidity reporting.","sales discounting.","payee outsourcing."],ans:0,exp:"Electronic funds transfer lets customers pay invoices electronically, eliminating the need to handle checks, fill out deposit slips, and wait for check processing."},
{q:"One benefit of using technology in compliance is that technology is typically more __________ than maintaining manual compliance processes.",opts:["Costly","Efficient","Time-consuming","Error prone"],ans:1,exp:"Technology makes compliance processes more efficient and effective. Manual compliance processes can be more costly, more time-consuming, and more error prone."},
{q:"One disadvantage of marginal analysis is that it does not account for:",opts:["outsourcing.","sunk costs.","qualitative factors.","labor costs."],ans:2,exp:"Marginal analysis only focuses on quantitative differences and does not consider qualitative factors like customer service or trusted recommendations. It does account for labor costs and outsourcing options."},
{q:"One factor that contributed to financial globalization was the shift of many developed countries from __________ exchange rates to __________ exchange rates.",opts:["Fixed; floating","Floating; fixed","Pegged; declining","Declining; pegged"],ans:0,exp:"Moving from fixed (government-set) to floating (market-determined) exchange rates enabled capital to flow more freely internationally."},
{q:"One factor that has stimulated financial globalization is an increase in:",opts:["foreign regulation.","domestic investment preferences.","protectionism.","domestic competition."],ans:3,exp:"Due to increased domestic competition, financial companies have sought new markets in foreign countries, stimulating financial globalization."},
{q:"One factor that may cause demand-pull inflation is:", opts:["A decrease in demand","A shortage of supply","A fluctuation of interest rates","A change in credit ratings"], ans:1, exp:"Demand-pull inflation results when demand exceeds supply. When there isn't enough of something, producers raise prices. Normal interest-rate fluctuations are unlikely to dramatically affect inflation. Credit ratings indicate creditworthiness."},
{q:"One key difference between out-of-pocket costs and sunk costs is:",opts:["Value","Timing","Accessibility","Ownership"],ans:1,exp:"Out-of-pocket costs must be paid now or in the future. Sunk costs have already been incurred. The difference is timing."},
{q:"One manager argues material costs should halt production; another says these costs should not be considered in the decision because:",opts:["It is a differential cost","It is coming from a biased source","It is a sunk cost","It was the cheapest option"],ans:2,exp:"Sunk costs have already been incurred and cannot be recovered by any decision—they should not factor into future decisions."},
{q:"One method a business can use to prevent theft by employees and customers is to:",opts:["Establish a floor limit","Hire security guards","Purchase liability insurance","Take frequent inventories"],ans:1,exp:"Security guards deter theft by walking through the business or positioning at exits."},
{q:"One of the advantages of a market economy is:",opts:["Absence of taxes","Government control","Freedom of competition","Assigned occupations"],ans:2,exp:"In a market economy, businesses are free to compete for labor and customers. Workers choose their own occupations, and government's role is limited."},
{q:"One of the benefits of marginal analysis is:",opts:["Improved long-term strategy","Optimal decision-making","Understanding the impact of sunk costs","Improved workplace communication"],ans:1,exp:"Marginal analysis helps companies make decisions that optimize resource use and maximize profits. It's best suited for short-term decisions and does not consider sunk costs."},
{q:"One of the benefits of marginal analysis is:",opts:["understanding the impact of sunk costs.","optimal decision-making.","improved workplace communication.","improved long-term strategy."],ans:1,exp:"Marginal analysis helps companies optimize resource use and maximize profits by selecting the best financial option. It is better for short-term than long-term decisions and doesn't focus on sunk costs."},
{q:"One of the benefits of negative feedback is that it:",opts:["Lets you know what is expected of you","Tells you what you are doing right","Keeps you from making mistakes","Makes you feel good about yourself"],ans:0,exp:"Negative feedback lets you know what you are doing wrong and what is expected, helping you improve despite being uncomfortable."},
{q:"One of the direct benefits to individuals of being part of a team is that it can improve:",opts:["product quality.","overall productivity.","expense control.","job satisfaction."],ans:3,exp:"Knowing you contribute to the business through teamwork improves self-confidence and job satisfaction — a direct benefit to the individual. Productivity, quality, and expense control benefit the business."},
{q:"One of the goals of risk management is to:",opts:["limit losses.","determine right from wrong.","increase revenue.","increase risk-taking."],ans:0,exp:"Risk management involves planning, controlling, preventing, and limiting business losses. Limiting losses is a primary goal. Increasing revenue might be a benefit but is not a goal."},
{q:"One of the main reasons businesses participate in trade shows is to:",opts:["Research their market","Promote their products","Train their salespeople","Meet their competitors"],ans:1,exp:"Trade shows allow businesses to promote their products to many potential customers in one place at one time."},
{q:"One of the major functions of business maintenance is to:",opts:["prevent fraudulent behavior.","motivate employees.","create a favorable impression.","guarantee the business's success."],ans:2,exp:"The overall impression customers receive as a result of a business's appearance influences their buying behavior. Routine maintenance creates a good impression and attracts customers."},
{q:"One of the most important benefits of setting goals is:",opts:["achieving success in life.","learning how to lead others.","becoming a good example.","avoiding everyday problems."],ans:0,exp:"Success is defined as reaching the goals you set for yourself. Without goals, you are less likely to succeed. Setting goals enables achievement of success in life."},
{q:"One of the primary purposes of information management is to provide businesses with the strategic information they need to:",opts:["create sales presentations.","develop a short-term advertising campaign.","make long-term decisions.","write an annual report."],ans:2,exp:"Information management provides strategic information for long-term planning and decision-making about growing the business over years. Creating presentations or reports is not its primary purpose."},
{q:"One of the ways that empathy benefits a business's employees directly is by helping them to:",opts:["get along with their coworkers.","focus on people's differences.","plan effectively for the future.","move quickly up the career ladder."],ans:0,exp:"Today's workplace is more diversified than ever. Empathy motivates us to look for similarities instead of focusing on differences, helping employees get along with their coworkers."},
{q:"One reason businesses usually are unable to enter into legally binding contracts with minors is because those under the legal age:",opts:["do not have sufficient funds to make payments.","may not understand the consequences of their actions.","are unable to make basic decisions.","cannot make promises to do something for others."],ans:1,exp:"Minors cannot usually enter into legally binding contracts because they may not be old enough to understand the consequences of their actions. They can make basic decisions and promises."},
{q:"One reason companies implement protocols, policies, and procedures is to:",opts:["Result in decreased employee morale","Allow companies to break the law","Foster a competitive environment","Reinforce company values"],ans:3,exp:"A company's policies lay out what is most important to the organization, helping employees and customers understand its mission, vision, and values."},
{q:"One reason the United States provides assistance to underdeveloped nations is because it:",opts:["Wants to learn about their technology","Wants to become an important world power","Hopes they will become trading partners","Is expected to do so"],ans:2,exp:"The U.S. assists developing nations hoping they will eventually become trading partners, helping both economies grow."},
{q:"One reason to be careful with oral communication in business is that it:",opts:["May not be remembered accurately","Should only be used for urgent messages","Is generally not misunderstood","Is an informal communication method"],ans:0,exp:"Listeners retain only about 25% of what they hear and frequently don't remember it accurately, making precise word choice important."},
{q:"One reason why event planners take steps to control and limit the possibility of risk is to:",opts:["Avoid liability","Preserve an image","Obtain insurance","Decrease piracy"],ans:0,exp:"Risk management enables event planners to avoid liability—responsibility for injury or loss. When customers accept liability terms on tickets, planners may be protected."},
{q:"One reason why public corporations are required to provide accurate financial reports is because existing and potential shareholders use them to:", opts:["Ensure capital gains","Compile annual reports","Understand currency exchange rates","Make investment decisions"], ans:3, exp:"Shareholders and potential shareholders use accurate financial information to make investment decisions. Inaccurate/misleading information subjects corporations to severe penalties. Exchange rates aren't found in financial reports. Annual reports are compiled by corporations, not shareholders."},
{q:"One risk of business consolidation is:",opts:["Growth of market share","Elimination of redundancy","Diversification of products","Clashes in corporate culture"],ans:3,exp:"When two businesses merge, different corporate cultures can clash. Without addressing these differences, the consolidation might fail."},
{q:"One step that financial-services companies can take to protect clients' online transactions from hackers is to:",opts:["use intranet capabilities.","install firewalls.","limit the number of client transactions.","avoid encryption methods."],ans:1,exp:"Firewalls interface between the computer system and the internet, protecting sensitive information from hacking. Encryption is another tool; limiting transactions doesn't secure data."},
{q:"One way a company can reinforce its image is by:",opts:["developing a financial plan.","training its employees.","conducting a competitive analysis.","identifying economic resources."],ans:1,exp:"The manner in which employees perform their tasks affects how people view the company. Training employees to respond and service customers in a specific way reinforces the company's image."},
{q:"One way a leader can encourage others to work toward a shared vision is by:",opts:["guaranteeing a profit for the business.","describing the objective.","reviewing the new assignment.","explaining how they will benefit."],ans:3,exp:"People tend to work harder to achieve a vision if they understand how they will benefit. A leader should explain those benefits to encourage employees."},
{q:"One way that individuals exhibit self-confidence is by being:",opts:["creative.","enthusiastic.","emotional.","reserved."],ans:1,exp:"Self-confident people believe in themselves and usually display enthusiasm—great interest or excitement in what they do."},
{q:"One way that organizations can achieve their corporate governance objectives is by:",opts:["Allowing senior managers to serve on the board of directors","Preventing stakeholders from viewing financial information","Encouraging employee participation at board meetings","Releasing an annual report detailing their failures and losses"],ans:2,exp:"Encouraging employees to participate at board meetings gives them a voice to raise questions or concerns, supporting governance objectives."},
{q:"One way that organizations can achieve their corporate governance objectives is by:",opts:["Allowing senior managers to serve on the board","Preventing stakeholders from viewing financial information","Encouraging employee participation at board meetings","Releasing an annual report detailing failures and losses"],ans:2,exp:"Employees should be encouraged to participate in board meetings to raise questions or concerns about company actions."},
{q:"One way that organizations can achieve their corporate governance objectives is by:",opts:["Encouraging employee participation at board meetings","Preventing stakeholders from viewing financial information","Allowing senior managers to serve on the board","Releasing an annual report detailing failures and losses"],ans:0,exp:"Employees should be encouraged to participate in board meetings to raise questions or concerns about company actions."},
{q:"One way to build professional relationships in the finance industry is to:",opts:["encourage others to discuss their finances.","read about industry trends.","implement a referral system.","print new business cards for distribution."],ans:2,exp:"A referral system encourages clients or associates to provide referrals. Satisfied clients may refer friends or colleagues to their financial planners, building professional relationships."},
{q:"One way to show respect for foreign clients' cultural and social differences is to:",opts:["always speak in your native language.","pronounce their names correctly.","use slang and idioms frequently.","embrace cultural stereotypes."],ans:1,exp:"Learning to say clients' names properly shows respect. Mispronouncing a client's name might insult them. Avoid slang and stereotypes when communicating with clients of different cultures."},
{q:"One way to show respect for foreign clients' cultural and social differences is to:",opts:["Always speak in your native language","Embrace cultural stereotypes","Use slang and idioms frequently","Pronounce their names correctly"],ans:3,exp:"Learning to say clients' names properly shows respect for their culture. Mispronouncing a name can insult or hurt feelings."},
{q:"Operations activities are most closely related to a business's:",opts:["location.","product.","name.","taxes."],ans:1,exp:"Operations activities are most directly related to the business's product. The product affects every aspect of operations, from production to delivery."},
{q:"Oscar placed company money into an offshore account only he could access. He was arrested for:",opts:["Securities fraud","Espionage","Embezzlement","Insider trading"],ans:2,exp:"Embezzlement is theft of valuables entrusted to someone's care. Oscar stole company money he was supposed to deposit elsewhere."},
{q:"Pamela shared her username and password so a coworker could access a restricted customer database. Pamela failed to fulfill her responsibilities as a data:",opts:["Auditor","Steward","Sponsor","Processor"],ans:1,exp:"A data steward ensures the integrity of an organization's data and that data is used ethically and only by authorized individuals. Pamela violated this responsibility."},
{q:"Pamela shared her username and password with a coworker so he could access a customer database that was off-limits to him. Pamela failed to fulfill her responsibilities as a data:", opts:["Steward","Auditor","Sponsor","Processor"], ans:0, exp:"A data steward ensures the integrity of organizational data, including ethical use only by authorized individuals. Pamela violated this by allowing unauthorized access. An auditor verifies record accuracy. A sponsor financially supports projects. A data processor formats facts for business use."},
{q:"Pamela was dismissed for sharing her login with a coworker to access an off-limits database. Pamela failed in her responsibilities as a data:",opts:["Processor","Auditor","Sponsor","Steward"],ans:3,exp:"A data steward ensures data integrity and ethical use—only by authorized individuals. Pamela allowed unauthorized access."},
