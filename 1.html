  {q:"A company cancels its annual conference because of expected snowstorms that could endanger attendees' flights. The company __________ the risk of a plane crash.",opts:["Avoided","Retained","Controlled","Transferred"],ans:0,exp:"Sometimes the best way to handle a risk is to simply avoid it. Cancelling the conference and ensuring attendees don't fly at all avoids the plane-crash risk altogether."},
  {q:"If Fernando wants to compare the current closing price of a stock to yesterday's closing price, what column in a stock table should he review?",opts:["Dividend yield","52-week high/low","Price-earnings ratio","Net change"],ans:3,exp:"Net change shows the difference between today's closing price and the previous day's price."},
  {q:"Which of the following would likely be included in a managerial accountant's day-to-day work tasks?",opts:["Preparing quarterly reports for stakeholders and complying with GAAP","Complying with GAAP, creating internal reports, and predicting future costs","Finding and reporting unprofitable purchases, complying with GAAP, and analyzing cash flow","Creating internal accounting reports, predicting future costs and benefits, and categorizing company costs"],ans:3,exp:"A managerial accountant works mainly to assist internal managers. Creating internal reports, predicting costs and benefits, and categorizing costs are all managerial accountant activities. They do not typically prepare external stakeholder reports or comply with GAAP."},
  {q:"Which of the following involves issues that require deciding whether something is right or wrong?",opts:["Settling a make-or-break decision","Starting the college decision process","Debating multiple job offers","Solving an ethical dilemma"],ans:3,exp:"Solving an ethical dilemma involves deciding whether something is right or wrong. Ethical dilemmas have the potential to cause harm."},
  {q:"Which of the following phrases best describes initiative?",opts:["Planning for all contingencies","Ready and willing to act","The ultimate team player","Focused on details"],ans:1,exp:"Initiative is the willingness to act without having to be told to do so. People who demonstrate initiative are willing to accept and seek out additional duties."},
  {q:"Which of the following is a strategic advantage of using a central data repository for financial information within an organization?",opts:["It ensures financial data remain static and unchanged","It enables real-time data access and analysis, which facilitates more accurate forecasting","It reduces the need for cybersecurity measures","It automatically generates financial reports without requiring manual input"],ans:1,exp:"Central data repositories allow quicker and more consistent access to financial data, making it easier to analyze trends and make accurate forecasts."},
  {q:"Which of the following tones would be most appropriate for a social media post promoting a soda aimed at teens and young adults?",opts:["Professional","Pessimistic","Conversational","Aggressive"],ans:2,exp:"A conversational tone would be most appropriate on a social media platform where communications are more informal."},
  {q:"Milk Mobile planned for deliveries to drop 2% but they only dropped 1%. What could be said about their performance?",opts:["Milk Mobile both overperformed and underperformed","Milk Mobile overperformed in milk deliveries this year","Milk Mobile underperformed in milk deliveries this year","Milk Mobile neither overperformed nor underperformed"],ans:1,exp:"Overperformance is indicated by a metric surpassing expectations. The company planned to lose 2% of deliveries but only lost 1%, meaning they performed better than planned."},
  {q:"A company's information system server fails, so it resorts to a backup server to avoid stopping operations. Which core concept of risk control does this exemplify?",opts:["Avoidance","Diversification","Duplication","Separation"],ans:2,exp:"Duplication involves creating a backup plan, often by using technology. A company that has a readily available backup server has utilized duplication."},
  {q:"A multinational company is restructuring its corporate governance model to better accommodate its diverse shareholders. What should the company strive to achieve?",opts:["A reduced structure that operates in select countries","A consistent structure that disregards regional differences","A flexible structure that accounts for cultural differences","A punitive structure that strictly holds shareholders accountable"],ans:2,exp:"The company should strive to achieve a flexible structure that accounts for cultural differences to accommodate its diverse shareholders."},
  {q:"Which of the following is an example of an employee observing safety standards?",opts:["Damian doesn't wear eye goggles when operating a machine","Heather stays positive at work, no matter what","Mariah wears a helmet when she works in the factory","Lucas always arrives to work early"],ans:2,exp:"Mariah wearing a helmet when she works in the factory is an example of an employee observing safety standards."},
  {q:"A company uses cloud-based software to stay notified of any issues in its supply chain. How does this technology support the company's risk management efforts?",opts:["It mitigates risk by improving the company's ability to respond quickly","It diversifies risk by dividing the supply chain across multiple locations","It eliminates risk by resolving issues the moment they arise","It avoids risk by deconstructing the supply chain entirely"],ans:0,exp:"The cloud-based software mitigates risk by improving the company's ability to respond quickly. There is no way to eliminate risk entirely."},
  {q:"Myles wants to put his money in an ownership investment, and he's comfortable with a moderate level of risk. What should he invest in?",opts:["Savings accounts","Certificates of deposit","Stock mutual funds","Money market accounts"],ans:2,exp:"Stock mutual funds are a combination of stocks from different corporations. As an owner, you still have a good chance of receiving a return. Savings accounts, money market accounts, and CDs are low-risk lending investments."},
  {q:"Which of the following is a variable cost for a company?",opts:["$3,000 bimonthly financing payment for equipment","$7 per unit of raw materials","$1,000 monthly insurance premium","$5,000 monthly for rent"],ans:1,exp:"Variable costs change according to changes in sales or production volume. $7 per unit of raw materials is a variable cost. Rent, insurance, and equipment financing are fixed costs."},
  {q:"Which of the following is a benefit of using artificial intelligence in compliance?",opts:["More false positives","Better consistency","Higher costs","More human error"],ans:1,exp:"AI technology can increase consistency, increase efficiency, lower the chance of human error, and decrease false positives. AI ensures consistent application of regulations."},
  {q:"Margaret is performing marginal analysis to help her boss decide whether upgrading manufacturing equipment is worthwhile. Which of the following should be included in the marginal cost analysis?",opts:["The profit from selling the old machines","The rent of the manufacturing facility","The annual maintenance and repair of one new machine","The additional value of the output produced by one new machine"],ans:2,exp:"Annual maintenance and repair is a cost directly associated with the purchase of one new machine. Rent is a fixed cost that doesn't depend on new machines. Output produced is a benefit, not a cost."},
  {q:"Camilla's Cookies now purchases its gluten-free ingredients from suppliers with high quality standards to prevent contamination risks. The company focuses its ERM efforts on risk",opts:["Sharing","Improvement","Acceptance","Avoidance"],ans:3,exp:"By purchasing ingredients from suppliers with high quality standards, Camilla's Cookies is avoiding the risk of gluten contamination altogether."},
  {q:"Which of the following is a common standard found in financial codes of ethics?",opts:["Allow self-interest to sway your decisions and recommendations","Conflicts of interest in professional relationships are permitted","Disclose positive information and hide negative information","Maintain an internal controls system to guard against unethical behavior"],ans:3,exp:"A typical code of ethics in finance will emphasize the importance of internal controls to guard against unethical behavior."},
  {q:"A car manufacturer discovers its cars have a defect that could harm consumers. Which action would be most ethical?",opts:["Issue a recall immediately, even if it is costly","Increase marketing efforts to distract from negative publicity","Do nothing and hope the defect goes unnoticed","Downplay the defect when asked about it publicly"],ans:0,exp:"Ethics in risk management prioritizes the safety and well-being of stakeholders over financial considerations. The most ethical action would be to issue a recall immediately."},
  {q:"Unlike traditional risk management, enterprise risk management requires corporations to identify all risks they face, allowing them to see the bigger picture. This is described as a __________ approach.",opts:["Reactive","Centralized","Holistic","Risk-specific"],ans:2,exp:"A holistic approach refers to managing risks in a way that considers all risks collectively to understand their interconnections and impact on the organization as a whole."},
  {q:"Two languages serve as the building blocks of a functional web page: __________, which provides the structure, and __________, which provides the visual appearance.",opts:["CSS; HTML","FTP; HTTPS","HTML; CSS","HTTP; DNS"],ans:2,exp:"HTML provides the structure or skeleton, while CSS provides the visual appearance or skin of the web page."},
  {q:"Earlier this year, a finance corporation consolidated its regional offices into a single headquarters. Customer feedback indicated slower response times to local market needs. What issue is most likely responsible?",opts:["Miscommunication among team members","Lack of technology investment","Higher operational costs","Loss of local expertise and engagement"],ans:3,exp:"Consolidation typically results in layoffs or the restructuring of responsibilities, leading to local identity and presence being lost."},
  {q:"A company discovers its data storage practices do not comply with privacy laws. How should the company best respond?",opts:["Delay making any changes until customers report a breach","Lobby for the consumer privacy laws to be changed","Immediately change its practices to comply with the law","Deny any wrongdoing and keep its practices consistent"],ans:2,exp:"Legal considerations in risk management require adherence to the law. By immediately changing its practices, the company demonstrates accountability."},
  {q:"Nathan learns of a groundbreaking new drug approval and tells his brother so he can buy shares before the news is public. This is an example of",opts:["Predatory lending","Point-of-sale fraud","Insider trading","Ethical trading"],ans:2,exp:"Insider trading refers to the buying or selling of a security by someone who has access to nonpublic information. Providing 'tips' to others is also an insider trading violation."},
  {q:"How does a company's size typically influence its corporate governance structure?",opts:["A company's size has no impact on its corporate governance structure","Smaller companies tend to have more influential boards of directors","Larger companies often have more complex governance structures","Smaller companies usually have more formalized procedures"],ans:2,exp:"Large companies generally require more complex governance structures due to their size, operational capacity, and diverse stakeholders."},
  {q:"A corporation manipulated financial statements to present a more favorable view. Which action should leadership prioritize to address ethical concerns?",opts:["Developing more complex financial reports to obscure the discrepancies","Promoting higher profit margins through aggressive reporting techniques","Focusing solely on complying with laws and regulations","Establishing clear guidelines for accurate reporting"],ans:3,exp:"Establishing clear guidelines for accurate reporting promotes transparency, accountability, and integrity. Focusing solely on legal compliance doesn't fully address ethical concerns."},
  {q:"Which of the following business management job titles falls under administrative services?",opts:["Receptionist","Supply chain manager","Benefits administrator","Project manager"],ans:0,exp:"Receptionist is a job title that falls under administrative services. Project manager falls under business information management, benefits administrator under HR, and supply chain manager under operations."},
  {q:"A statement of owner's equity",opts:["Reports changes in a company's equity","Is prepared before an income statement","Increases a company's equity by using them","Shows only the beginning owner's equity"],ans:0,exp:"A statement of owner's equity reports the changes in a company's equity (net worth) over a specific period of time. It is prepared after the income statement."},
  {q:"Which of the following best describes a project?",opts:["It is ongoing","It has a definite beginning and end","It keeps the business going on a day-to-day basis","It is a long-term endeavor"],ans:1,exp:"A project is a short-term undertaking that creates a unique good or service. It has a definite beginning and a definite end."},
  {q:"It would be inappropriate to factor a customer's __________ into a financial institution's decision to offer credit.",opts:["Credit rating","Debt ratio","Medical history","Income"],ans:2,exp:"A customer's medical history is not relevant to their creditworthiness and financial institutions risk violating anti-discrimination laws if they factor medical history into their decisions."},
  {q:"A finance professional receives a client's request for information about an investment. Why should they respond promptly?",opts:["It avoids liability in the event of an error","It fosters trust and encourages long-term client loyalty","It fulfills the legal obligation to respond to customer inquiries","It ensures clients do not consult competitors for similar services"],ans:1,exp:"Companies that respond in a timely fashion foster trust from their clients, which encourages long-term client loyalty."},
  {q:"Which of the following statements best describes the customer service mindset of viewing customers as employers?",opts:["Customers are who ultimately sign your checks","Customers are heavily involved in the hiring and firing process","It is common for customers to approach you to work for them","Without customers, the business would close, and your job would be lost"],ans:3,exp:"Viewing customers as your employers means understanding that without them, you would not have a job."},
  {q:"What is the first step in identifying human resources for a project?",opts:["Identify tasks","Estimate resources","Assess skills","Match project members to jobs"],ans:0,exp:"The first step in identifying human resources for a project is identifying tasks. Before you can identify the right people, you need to decide what skills are needed to complete the tasks."},
  {q:"Which of the following careers likely falls within the securities and investments industry?",opts:["Appraiser","Regulatory reporting specialist","Mutual fund manager","Capital expenditure manager"],ans:2,exp:"Mutual fund managers work in the securities and investments industry. An appraiser likely works in insurance. A capital expenditure manager likely works in corporate finance."},
  {q:"A company uses a new system to share customer data across departments and external stakeholders. This best describes what type of CRM analytics system?",opts:["Collaborative","Analytical","Individualized","Operational"],ans:0,exp:"Collaborative CRM allows organizations to share customer data across internal departments and external stakeholders to enhance the customer experience."},
  {q:"Maggie finds that a ridesharing company pays mechanics for the maintenance and repair of a fleet of cars as needed. She should categorize this expense as a(n) __________ cost.",opts:["Indirect","Direct","Opportunity","Sunk"],ans:0,exp:"The cost of fleet-wide maintenance and repair is not traceable to any one ride, driver, or vehicle but is necessary for operations—making it an indirect cost."},
  {q:"Which report would an investor most likely analyze to understand a publicly traded company's recent financial performance?",opts:["10-K","10-Q","15-P","8-K"],ans:1,exp:"A 10-Q report provides content about a company's fiscal quarter and would give investors a better picture of recent financial performance. A 10-K is an annual report."},
  {q:"Which of the following is a common reason why businesses consolidate?",opts:["To decrease their staff","To eliminate the competition","To increase market share","To pay employees more"],ans:2,exp:"A common reason businesses consolidate is to increase market share. Doing so reduces competition and can help expand a customer base."},
  {q:"What type of production would most likely be used to create custom-tailored suits?",opts:["Assembly line","Unit","Mass","Batch"],ans:1,exp:"Unit production means producing one item at a time or items in small quantities. It is used for such items as a custom-tailored suit."},
  {q:"A company requires all employees to undergo yearly human resources training focused on respect. How does this demonstrate a well-governed company?",opts:["It promotes a safe workplace","It spreads mental health awareness","It highlights eco-friendly practices","It facilitates a competitive environment"],ans:0,exp:"A company that requires all employees to undergo yearly human resources training on how to be respectful is promoting a safe workplace."},
  {q:"An electronics company collects and analyzes customer data—such as purchase history and browsing behavior—to target specific customer segments with tailored offers. This best describes the process of data",opts:["Mining","Commingling","Encryption","Migration"],ans:0,exp:"Data mining is the process of searching, collecting, and analyzing large amounts of data to extract actionable information."},
  {q:"The biggest difference between a mission statement and a personal vision has to do with",opts:["Personnel","Detail","Time","Scope"],ans:2,exp:"A mission statement deals with the now and how. A personal vision deals with the future. The biggest difference is time."},
  {q:"Neil and others in his program are experiencing difficulty finding work because many businesses want additional qualifications. Which type of unemployment does this represent?",opts:["Structural","Technological","Societal","Frictional"],ans:0,exp:"Structural unemployment exists when there is a mismatch between available workers and available jobs—not enough workers qualified for the types of jobs available."},
  {q:"Michelle wants to be a financial analyst. Which action would best help her build professional relationships?",opts:["Secure an internship at a financial institution","Continuously send emails to potential contacts until they respond","Focus solely on improving her technical skills","Consume as much financial analysis information as possible"],ans:0,exp:"Securing an internship at a financial institution would give Michelle the opportunity to build professional relationships with her colleagues."},
  {q:"Elise is charged with evaluating industry-wide financial data from the previous fiscal year. Elise is conducting a __________ analysis.",opts:["Liquidity","Vertical","Horizontal","Leverage"],ans:1,exp:"Vertical analyses are used in comparing companies within the same industry. Horizontal analyses compare a single company's information over multiple years."},
  {q:"A company is implementing a virtual audit for the first time. Which would most likely be an advantage of using a virtual audit over a traditional in-person audit?",opts:["Better flexibility in scheduling","Longer implementation time due to the learning curve","Increased rapport with in-person clients","Higher costs due to technology requirements"],ans:0,exp:"Virtual audits have the same goal as a traditional audit but allow for more flexible scheduling because auditors and clients don't need to coordinate around travel logistics."},
  {q:"Sebastian sees his coworker Kinsley incorrectly operating a piece of machinery she rarely uses. What was the likely cause of Kinsley's noncompliance?",opts:["Evolving regulations","Insufficient resources","Lack of awareness","Market pressures"],ans:2,exp:"Kinsley was simply not aware of the correct procedure, likely because she rarely uses the machinery. There is no indication of other factors impacting her decisions."},
  {q:"Which of the following is a true statement regarding managerial accounting?",opts:["A managerial accountant seeks to help internal managers make the best financial decisions","Managerial accounting involves communicating with investors about financial decisions","A managerial accountant seeks to provide external stakeholders with accurate company records","Managerial accounting involves auditing internal managers and reporting to the government"],ans:0,exp:"Managerial accounting is mainly concerned with internal decision-making. Helping internal managers with financial decisions is a key goal."},
  {q:"Harborstone Equipment requires that its management consult the board of directors before making financial decisions. What is the potential downside of this requirement?",opts:["It forces management to be more independent","It slows down the decision-making process","It decreases the role of the board of directors","It decreases the accountability of management"],ans:1,exp:"Having to go through the board of directors before making a financial decision slows the process down."},
  {q:"Conforming data are different from nonconforming data in that conforming data are",opts:["Inaccurate","Complicated","Complete","Inconsistent"],ans:2,exp:"Conforming data are complete, consistent, accurate, and reliable. Nonconforming data refers to data with values that are either missing, incomplete, or not consistent."},
  {q:"Thara looks through databases to ensure data are properly stored and eliminates redundant data. Thara is performing data",opts:["Migration","Commingling","Filtering","Normalization"],ans:3,exp:"Normalization is the process of efficiently organizing data in a database, aiming to eliminate redundant data and ensure data are logically stored."},
  {q:"What is the most effective way for a company's leadership team to promote ethical behavior in risk management?",opts:["Lower performance measures","Hire additional managers","Act ethically themselves","Discourage risk-taking"],ans:2,exp:"If a company's leadership team is not ethical, it is unlikely that other employees will be. Leaders need to set the precedent by acting ethically."},
  {q:"Calais is working on a budget to project how cash will move in and out of his company. Calais is building a __________ budget.",opts:["Cash flow","Master","Financial","Cash conversion"],ans:0,exp:"Cash flow budgets are a means of projecting how and when cash will flow in and out of a company over a specific period of time."},
  {q:"The CEO wants to make costly purchases but the board of directors votes not to approve them. This best describes how corporate governance operates on a system of",opts:["Checks and balances","Preferential treatment","Hierarchy","Executive dominance"],ans:0,exp:"A system of checks and balances refers to the separation of power to avoid one entity wielding too much power. Having a board of directors who can check the CEO prevents the CEO from becoming too powerful."},
  {q:"To determine the percentage gain or loss on an investment, a company needs to evaluate its",opts:["Rate of return","Accounts payable","Credit rating","Dividend payments"],ans:0,exp:"A company's rate of return is its gain or loss received in return for an investment, recorded as a percentage of the investment."},
  {q:"Nimbus Solutions wants its managers to demonstrate the need for every expense instead of relying on figures from a previous period. What type of budget should Nimbus Solutions implement?",opts:["Rolling","Master","Negative sum","Zero-based"],ans:3,exp:"Zero-based budgeting requires managers to demonstrate the need for every expense instead of relying on figures from a previous period. Each new budget begins at zero."},
  {q:"Which of the following best demonstrates a contraction period in a business cycle?",opts:["An expansion reaches its peak","Economic activity increases month to month","A transition to an expansion begins","Economic activity decreases for six months"],ans:3,exp:"A contraction is a period of decline where economic activity decreases for at least six months."},
  {q:"If Country A places tariffs on products imported from Country B, this policy will most benefit",opts:["Domestic companies in Country A","International companies that operate in both countries","International companies that do not operate in either country","Domestic companies in Country B"],ans:0,exp:"Tariffs are government taxes on imported goods that help protect domestic companies from the competition of foreign products."},
  {q:"Which of the following is an impact of unemployment?",opts:["Slower delivery times","Higher employee morale","Reduced economic output","More purchasing power"],ans:2,exp:"Unemployment reduces the number of people contributing to the production of goods and services, which leads to a decrease in overall economic output."},
  {q:"Which of the following is true regarding the relationships you form with your teammates?",opts:["Forming relationships makes it difficult to engage others in a shared vision","Showing interest in your teammates' personal lives is unprofessional","Establishing good working relationships helps enlist everyone in a shared vision","You must become friends with your teammates to enlist them in a shared vision"],ans:2,exp:"If you haven't shown interest in your team members as individuals, why should they buy into the team vision? Establishing good working relationships helps enlist everyone."},
  {q:"A CEO was involved in a scandal and forced to resign. The board issued a public statement condemning the CEO's actions. What is the primary purpose of the board's statement?",opts:["To reassure stakeholders about the company's commitment to ethical practices","To maintain the secrecy of the ongoing internal investigation","To profit from the increased publicity caused by the scandal","To comply with law enforcement officers while they investigate the scandal"],ans:0,exp:"By calling the CEO's actions unethical, the board is sending a message to the public that the CEO does not represent the company's values, reassuring stakeholders."},
  {q:"Which of the following attributes best characterizes a master budget?",opts:["Unchanging","Rolling","Simplistic","Dynamic"],ans:0,exp:"A master budget can also be referred to as a fixed budget or a static budget because it does not change. Managers use it as a guideline but don't adjust it as the period goes on."},
  {q:"Amal is responsible, professionally competent, and strives for continuous improvement and excellence as an accountant. In other words, Amal follows the principle of",opts:["Full disclosure","Due care","Objectivity","Confidentiality"],ans:1,exp:"Due care refers to professional competence and responsibility. Accountants must strive for continuous improvement and excellence."},
  {q:"If Leandro wants to see how his company's net worth changed over the last two months, what document should he reference?",opts:["Cash flow statement","Income statement","Equity statement","Balance sheet"],ans:2,exp:"An equity statement reports the changes in a company's equity (net worth) over a specific period of time."},
  {q:"The government takes appropriate steps to guide the inflation rate toward a certain percent each year. This is called",opts:["Inflation targeting","Deflation","Supply shock","Price stability"],ans:0,exp:"When a government decides to pursue a specific inflation rate, it's known as inflation targeting. The U.S. government targets 2% inflation."},
  {q:"Isaac works for a produce company considering switching pesticides. The current costs $2,000/year and the new one costs $3,200/year. What is the differential cost?",opts:["$2,000","$3,200","$1,200","$5,200"],ans:2,exp:"Differential cost is the difference in cost between two similar options. The difference between the two pesticides is $1,200."},
  {q:"Improving supply chain efficiency by streamlining delivery routes is an example of a(n) __________ goal.",opts:["Employee development","Operational","Sustainability","Innovation and growth"],ans:1,exp:"Improving supply chain efficiency by streamlining delivery routes is an example of an operational goal, which aims to enhance productivity and improve daily productivity."},
  {q:"Ilona agreed to take on four new projects on top of her busy schedule. What time-management principle should she follow?",opts:["Learn to be on time","Avoid interruptions and distractions","Don't bite off more than you can chew","Make the most of your downtime"],ans:2,exp:"Ilona should try not to overschedule herself or agree to activities that are too challenging."},
  {q:"Armand is preparing a presentation discussing several different subjects. To move effectively from one topic to another, he should include __________ in his presentation.",opts:["An introduction","Jokes","A conclusion","Transitions"],ans:3,exp:"An effective transition helps the speaker move from one topic to another in a way that makes sense to the audience."},
  {q:"Costco and Sam's Club likely monitor each other's brands, products, and sales strategies. What category of environmental scanning information are they most focused on?",opts:["The economy","Demographics","Competition","Technology"],ans:2,exp:"By watching its competition, a business can better decide on strategies to be successful."},
  {q:"Which of the following is something that may be subject to a luxury tax?",opts:["Tablet","Courtside seats","Flat-screen TV","Precious gemstones"],ans:3,exp:"Luxury tax is only imposed on specific goods considered non-essential or affordable only to the wealthiest consumers, such as precious gemstones."},
  {q:"A private company requires that its financial reports be accessible to all stakeholders. How does this action demonstrate a well-governed company?",opts:["It complicates company budgeting","It encourages a safe workplace","It improves employee morale","It promotes transparency"],ans:3,exp:"A private company that requires its financial reports to be accessible to all stakeholders demonstrates a well-governed company by promoting transparency."},
  {q:"Which of the following is an advantage of spot markets?",opts:["They do not quote for immediate payment","They are not suited for hedging","They often require physical delivery","They tend to be incredibly liquid"],ans:3,exp:"Spot markets are known for their high liquidity due to transactions occurring immediately at the current market price."},
  {q:"Kevin is attending an industry conference and hopes to build professional relationships. Which strategy would best help Kevin achieve this goal?",opts:["Only interact with people in similar positions","Prioritize networking over meaningful conversations","Avoid unnecessary interactions outside the workshops","Participate in discussions and actively listen"],ans:3,exp:"Building professional relationships requires meaningful engagement and active listening, establishing trust and demonstrating a genuine interest."},
  {q:"Which of the following is an advantage of a financial management information system?",opts:["It does not allow for integration","It speeds up the decision-making process","It guarantees product quality","It decreases the capacity to forecast"],ans:1,exp:"An FMIS speeds up the decision-making process as it accumulates financial data and analyzes them to help make better decisions."},
  {q:"Which communication strategy can help someone best respond to an inquiry?",opts:["Provide lengthy responses","Respond defensively","Refer the inquirer to someone else","Ask clarifying questions"],ans:3,exp:"Asking for clarity ensures that you fully understand someone's inquiry and can provide the best possible answer."},
  {q:"Which behavior will align most with the value of academic achievement?",opts:["Starting a part-time job","Joining a study group","Copying your friend's answers","Trying out for the tennis team"],ans:1,exp:"The behavior that will align most clearly if you value academic achievement is joining a study group."},
  {q:"Lyra will receive a lump sum payment of $5,000 in two years with a discount rate of 6%. Calculate the present value.",opts:["$5,138.67","$4,716.99","$4,449.98","$3,981.76"],ans:2,exp:"PV = 5,000 / (1 + .06)^2 = $4,449.98"},
  {q:"Tamika wants to implement a work methodology to streamline her team's processes and eliminate waste. Which methodology should she adopt?",opts:["Six Sigma","Lean","Endless chain","Sustainability"],ans:1,exp:"Lean production focuses on maximizing customer value while minimizing waste."},
  {q:"A managerial accountant used variance analysis to determine that a furniture wholesaler underperformed this year. How might they have reached this conclusion?",opts:["By finding that the company has increased revenue and costs","By finding that the company's actual sales are lower than the planned sales","By finding that the company has sold to fewer customers than last year","By finding that the company laid off fewer employees than expected"],ans:1,exp:"Variance analysis involves comparing planned or expected numbers to actual performance. Finding that actual sales are lower than planned indicates underperformance."},
  {q:"Jordan calculates the marginal cost and marginal benefit of a small price increase for a hot dog. Which outcome indicates the best price has been found?",opts:["The marginal cost is equal to the marginal benefit","The marginal cost is negative","The marginal cost is less than the marginal benefit","The marginal benefit is zero"],ans:0,exp:"When marginal cost and marginal benefit are equal, a one-unit increase will no longer benefit the company, so the price should be set at this level."},
  {q:"Which of the following are indirect costs for a business?",opts:["Rent and payroll","Labor and insurance","Utilities and equipment","Raw materials and manufacturing supplies"],ans:0,exp:"Indirect costs are not directly related to a specific cost object. Rent and payroll are indirect costs. Labor, raw materials, equipment, and manufacturing supplies are direct costs."},
  {q:"Which of the following is a way in which master data management technology could benefit a company?",opts:["It improves data quality","It decreases employee turnover","It complicates processes","It guarantees customer satisfaction"],ans:0,exp:"MDM helps eliminate duplicates and correct errors, ensuring data are accurate, reliable, and consistent—improving data quality."},
  {q:"A business aims to build a culture of trust and accountability. What is the most effective way to involve employees in achieving this goal?",opts:["Limit employee access to information to prevent potential leaks","Reward employees for sharing coworkers' unethical actions in meetings","Encourage open communication and feedback among team members and management","Implement a strict surveillance system to monitor employee behavior"],ans:2,exp:"Direct and open communication is the foundation for a system of trust and accountability."},
  {q:"Banks are different from insurance companies in that banks",opts:["Are subject to only state-level regulation","Are not part of a centralized clearing and payment system","Insure their customers against certain risks","Accept short-term deposits and make long-term loans"],ans:3,exp:"Banks take deposits and pay interest and then lend money to borrowers. Banks accept short-term deposits and make long-term loans. Insurance companies insure against risks."},
  {q:"Which of the following is a reason why a business may conduct a compliance audit?",opts:["To guarantee product quality","To ensure it is following regulations","To improve employee performance","To maximize its profitability"],ans:1,exp:"Compliance refers to fulfilling the requirements of the law. Businesses should conduct compliance audits to ensure they are following regulations."},
  {q:"Montez's $6,000 investment is held in his savings account with a 4% simple interest paid annually for four years. Calculate the future value.",opts:["$6,387.45","$6,749.18","$7,299.92","$7,019.15"],ans:3,exp:"FV = $6,000 x (1 + .04)^4 = $7,019.15"},
  {q:"Ian allocates the majority of his investment portfolio to United States-based stocks and bonds. This is an example of",opts:["Gross domestic product","Protectionism","Home bias","Offshoring"],ans:2,exp:"Home bias refers to an investor's preference to invest primarily in domestic equities instead of foreign equities."},
  {q:"Which of the following is an example of an internal risk for a business?",opts:["Political change","Outdated software","Economic depression","Natural disaster"],ans:1,exp:"Internal risks are faced by a company from within its organization. Outdated software is an example of an internal technological risk."},
  {q:"Which of the following is a consequence of poor financial information management?",opts:["Inaccurate reporting","Simplified processes","Ineffective leadership","Less duplication"],ans:0,exp:"When companies fail to maintain and update their financial information, they are typically left with inaccurate data."},
  {q:"A financial institution uses AI to manage risks, but after a recent market crash, predictions became increasingly inaccurate. What risk does this scenario best illustrate?",opts:["Technology can be slow and inefficient","Technology can be costly if maintenance is required","Technology can result in human negligence","Technology can fail when the data are flawed"],ans:3,exp:"The recent market crash created flawed data, which AI then used to create inaccurate predictions. Technology can fail when the data are flawed."},
  {q:"When the economy is poor, Andrea limits her purchases. When conditions improve, she buys more. What is this phenomenon an example of?",opts:["Competitive aggression","Organizational learning","Innovative management","Consumer spending trends"],ans:3,exp:"Consumer spending tends to fluctuate up and down along with changes in the economy."},
  {q:"Angel visits three restaurants in Santa Fe and concludes New Mexicans are dining out more than ever. Can his conclusion be generalized?",opts:["No; he collected a convenience sample and applied city results to the entire state","No; he collected too large of a sample size and didn't anonymize his results","Yes; it is reasonable to assume diners in the capital city are representative of the entire state","Yes; he visited several restaurants and collected a representative sample"],ans:0,exp:"Angel's conclusion is based on limited data—only three restaurants in one city applied to the entire state. This is a convenience sample and is not generalizable."},
  {q:"A company's compliance department settles compliance difficulties as they occur. What key function is the department performing?",opts:["Prevention","Advisory","Resolution","Identification"],ans:2,exp:"The resolution function resolves compliance difficulties as they occur. The prevention function designs and implements controls. The advisory function advises on rules."},
  {q:"If Dakota wants to find the cheapest price at which a stock was traded over the last year, what part of the stock table should he review?",opts:["Price-earnings ratio","52-week low","52-week high","Dividend yield"],ans:1,exp:"The 52-week low is the lowest price at which a stock has traded over the previous 52 weeks."},
  // 2024 ICDC Exam questions
  {q:"If a stock is trading higher than the previous day's close, what color will it likely be on a stock ticker shown on TV?",opts:["White","Red","Green","Blue"],ans:2,exp:"On many stock tickers shown on TV networks, green indicates that the stock is trading higher than the previous day's close. Red means trading lower. White or blue means unchanged."},
  {q:"Carter is usually the last person to leave his office and occasionally forgets to set the security alarm. This situation results in risks related to",opts:["Product liability","Conflicts of interest","Fairness","Security"],ans:3,exp:"Failing to set the alarms exposes a business to security risks such as theft and robbery."},
  {q:"Monique's classmates frequently complain about their teacher. If Monique adopts their same attitudes even though she doesn't really agree with them, she is demonstrating",opts:["Status quo bias","Groupthink","Critical thinking","Acceptance"],ans:1,exp:"When a person makes a poor decision out of fear of disagreeing with a group, they are demonstrating groupthink behavior."},
  {q:"When the unemployment rate is high,",opts:["Families have more disposable income","Employee morale doesn't change","The economy's output decreases","People have higher purchasing power"],ans:2,exp:"When the unemployment rate is high, the economy's output decreases. Unemployed workers spend far less than employed workers."},
  {q:"The cash payments section of a cash flow statement is best described as the",opts:["Money a business has left at the end of the month","Money a business has at the beginning of the month","Sources of cash flowing out of a business","Sources of money flowing into the business"],ans:2,exp:"The cash payments section refers to the sources of cash flowing out of the business."},
  {q:"Mya uses money from new investors to pay her initial investors high returns, while pocketing some for herself. This is an example of",opts:["A Ponzi scheme","Phishing","A boiler room","Insider trading"],ans:0,exp:"A Ponzi scheme is an investment scam that lures in new investors by promising high rates of return. Returns to initial investors are paid from new investors' money."},
  {q:"Reflecting on what you have learned allows you to",opts:["Be true to your core values, beliefs, and attitudes","Prevent offending or belittling someone else","Prove to others that you are right and they are wrong","Avoid asking difficult questions about your beliefs"],ans:0,exp:"Reflecting on and processing what you have learned will help you make an informed decision that feels true to your core values, beliefs, and attitudes."},
  {q:"In the private enterprise system, individuals have the freedom to choose",opts:["Their own economic goals","How much they will be paid","Which laws to obey","Which taxes they will pay"],ans:0,exp:"In a private enterprise economy, individuals are free to choose their own personal economic goals. They are not free to choose which taxes to pay or which laws to obey."},
  {q:"If data are considered nonconforming, it most likely means that their values",opts:["Are missing","Are complete","Remain consistent with other values","Do not require further analysis"],ans:0,exp:"Nonconforming data refers to data with values that are either missing, incomplete, or not consistent with other values in the same or comparable reports."},
  {q:"Which of the following is an example of a business's legal records?",opts:["Customer phone calls","Intellectual property","Raw materials inventory","Fixed asset depreciation"],ans:1,exp:"Legal records include contracts/agreements, intellectual property (patents, copyrights, trademarks), leases, and permits."},
  {q:"Which of the following statements about capital gains tax is true?",opts:["It is due only before an investment is sold","Short-term gains are taxed at one's regular income tax rate","It applies to more than just capital assets","Long-term gains are levied on profits held for less than a year"],ans:1,exp:"Short-term capital gains tax applies if the investor owns the investment for one year or less, taxed at an individual's regular income tax rate."},
  {q:"Which of the following is the first step a business should take when developing a budget?",opts:["Understanding its goals","Estimating income","Determining budget surplus or deficit","Identifying expenses"],ans:0,exp:"The first step a business should take when developing a budget is to gain a firm understanding of its goals."},
  {q:"Which of the following is an external factor that impacts corporate governance structures?",opts:["Company code of conduct","Independent audits","Segregation of duties","Change in leadership"],ans:1,exp:"An independent audit is an examination by an outside organization. Segregation of duties, a company's code of conduct, and a change in leadership are internal factors."},
  {q:"Variance analysis helps maintain control over a project's expenses by monitoring __________ costs versus __________ costs.",opts:["Planned; actual","Planned; past","Actual; past","Fixed; indirect"],ans:0,exp:"A variance analysis assesses the difference between planned (or budgeted) costs versus actual costs."},
  {q:"Which of the following scenarios best represents a tariff?",opts:["A country limits the number of products foreign nations can sell in its country","A country's government determines the prices at which products can be sold","A country makes illegal payments in an effort to secure products in return","A country places taxes on imported products to increase their selling prices"],ans:3,exp:"A tariff is a tax on imported goods. Limiting quantities is a quota. Government price determination is a price control. Illegal payments are bribery."},
  {q:"Insurance companies are different than banks in that insurance companies",opts:["Are part of a centralized clearing and payment system","Ensure customers pay regular premiums against certain risks","Are subject to federal and state oversight","Accept short-term deposits and make long-term loans"],ans:1,exp:"Insurance companies ensure their customers against certain risks. Customers pay regular premiums. Banks accept deposits, make loans, and are subject to federal and state oversight."},
  {q:"Kofi is currently working on a report that provides an overview of his company's fiscal year. What type of report is Kofi most likely to be preparing?",opts:["10-K","8-K","20-G","10-Q"],ans:0,exp:"A 10-K report, also known as an annual report, gives an overview of a company's fiscal year. A 10-Q covers a fiscal quarter. An 8-K is a current events report."},
  {q:"Which of the following statements best represents a technical analysis?",opts:["It uses statistical trends gathered from trading activity","It uses ratios gathered from data in financial statements","It helps analysts to arrive at an intrinsic value for the security","It analyzes a security's fundamental attributes rather than looking for patterns"],ans:0,exp:"A technical analysis uses statistical trends gathered from trading activity and looks for patterns to understand the market, rather than analyzing fundamental attributes."},
  {q:"A loan officer would be an example of a career in",opts:["Insurance","Accounting","Corporate finance","Banking services"],ans:3,exp:"A loan officer is a person who specializes in helping clients apply for loans. Loan officers work within banking services."},
  {q:"In the equity market, investors and traders buy and sell",opts:["Loans","Stocks","Bonds","Credit"],ans:1,exp:"The equity market, also known as the stock market, is where investors and traders sell shares of stock."},
  {q:"A company's compliance department is designing and implementing controls to protect the company from identified risks. What key function is the compliance department performing?",opts:["Advisory","Identification","Resolution","Prevention"],ans:3,exp:"The prevention function designs and implements controls to protect a company from risks. The resolution function resolves compliance difficulties as they occur."},
  {q:"Financial accounting is different than managerial accounting in that financial accounting",opts:["Looks at the future","Prepares data for external users","Determines and measures cost","Deals with financial statements"],ans:1,exp:"Financial accounting involves preparing and reporting financial data to external users. Managerial accounting prepares data for internal users."},
  {q:"Which of the following is typically the most important part of following the chain of command?",opts:["Bypassing your boss when they are too busy to help","Always doing what your manager asks of you","Waiting to learn about the entire chain of command","Reporting to the person directly above you"],ans:3,exp:"One of the most important parts of following the chain of command is to report to the person directly above you."},
  {q:"Insufficient corporate governance may lead to",opts:["Increased accountability","Decreased transparency","Decreased corruption","Increased investor confidence"],ans:1,exp:"Corporate governance creates a more transparent business environment. When corporate governance is insufficient, corruption can increase and investor confidence can decrease."},
  {q:"Lean Six Sigma is different than Six Sigma in that Lean Six Sigma",opts:["Doesn't focus on waste reduction","Prioritizes defect detection over prevention","Is not fact-based or data-driven","Aims to reduce variation and waste"],ans:3,exp:"Lean Six Sigma is a fact-based, data-driven philosophy of improvement that aims to reduce waste and variation. It prioritizes defect prevention over detection."},
  {q:"Transcend Industries requires employees to scan their ID badges to access company buildings. This is an example of a __________ policy.",opts:["Discrimination/harassment","Health and safety","Leave","Disciplinary"],ans:1,exp:"Health and safety policies are designed to protect employees and customers from harm. Common health and safety guidelines include requiring employees to scan ID badges."},
  {q:"Two different financial institutions merge to become one company, combining their assets and liabilities. This is an example of",opts:["Bancassurance","Financing","Consolidation","Inflation"],ans:2,exp:"Consolidation refers to combining assets, liabilities, and other financial items of two or more entities into one."},
  {q:"Keoni's phone keeps vibrating, which prevents him from listening closely. This is an example of",opts:["An environmental distraction","Active listening","An internal distraction","Paraphrasing"],ans:0,exp:"Environmental distractions are aspects of the setting that divert the listener's attention away from the speaker's message, such as noises from physical objects like phones."},
  {q:"Greenery House uses extra cash to pay off a commercial lawnmower loan ahead of schedule. This is an example of using financial information to",opts:["Create budgets","Manage debt","Increase sales","Acquire new businesses"],ans:1,exp:"Paying off a loan early is one way a business can manage its debt."},
  {q:"When developing each new budget, Brea's Bagels requires managers to demonstrate the need for every expense instead of relying on figures from a previous period. Brea's Bagels uses __________ budgeting.",opts:["Inflation","Short-term","Master","Zero-based"],ans:3,exp:"Zero-based budgeting requires managers to demonstrate the need for every expense instead of relying on figures from a previous period."},
  {q:"Which of the following is an example of ethical risk management?",opts:["Reviewing invoices","Having a strong legal team","Asking for a raise","Ensuring product safety"],ans:3,exp:"Companies must practice ethical risk management by protecting the customer as much as possible. Ensuring product safety is an ethical risk management practice."},
  {q:"The SOSWYM Company is excellent at financial recordkeeping, which allows them to see which items are selling. This is an example of how good recordkeeping can help",opts:["Keep track of deductible expenses","Prepare tax returns","Monitor the progress of a business","Prepare financial statements"],ans:2,exp:"Good recordkeeping can help with monitoring the progress of a business, showing whether a business is improving, which items are selling, or what changes need to be made."},
  {q:"Trying to balance friendships with extracurricular activities is an example of a __________ risk.",opts:["Financial","Relationship","Reputational","Health and safety"],ans:1,exp:"Relationship risks are the risks that come with your choice of friends and their impact on you. Balancing friendships with extracurricular activities has a direct impact on your friends."},
  {q:"Waldo wants to purchase a new truck. What type of credit should he use?",opts:["Installment","Regular","Budget","Revolving"],ans:0,exp:"Installment credit is designed to handle one total amount of credit, paid in installments within a certain time period. It is commonly used to purchase large, expensive items like cars."},
  {q:"Employees in leadership positions should make management decisions based on their company's",opts:["Insurance policy","Foreign investments","Governance processes","Target demographic"],ans:2,exp:"Governance provides a framework for decision-making and management. Managers must work within the guidelines and processes established by the governing body."},
  {q:"Businesses can obtain __________ insurance to limit their exposure in situations where they are held legally responsible.",opts:["Renter's","Disability","Liability","Life"],ans:2,exp:"Professional liability insurance provides financial protection for certain types of professionals if a client sues them."},
  {q:"Which of the following best represents the recession phase of a business cycle?",opts:["Income and sales fall","Employment falls and income rises","Employment and production rise","Sales fall and production rises"],ans:0,exp:"A recession is a state of economic decline in which income, sales, employment, and production each fall."},
  {q:"Before Kirk's loan application is approved, the bank is likely to analyze his",opts:["Medical history","Debt ratio","Inflation rate","Political affiliation"],ans:1,exp:"The debt ratio indicates a company's or individual's level of debt in relation to their assets. If the applicant has high outstanding debt and few liquid assets, they may default on the loan."},
  {q:"Bianca's $4,000 investment is held in her savings account with 5% simple interest paid annually for three years. Calculate the future value.",opts:["$4,410.00","$3,792.89","$3,455.35","$4,630.50"],ans:3,exp:"FV = $4,000 x (1 + .05)^3 = $4,630.50"},
  {q:"Which of the following is a way in which activity-based costing enhances the costing process?",opts:["It accumulates all costs in one company-wide pool","It transfers overhead costs from low-volume products to high-volume products","It assigns overhead and direct costs to related products and services","It expands the number of cost pools used to assemble overhead costs"],ans:3,exp:"Activity-based costing enhances the costing process by expanding the number of cost pools used to assemble overhead costs, rather than accumulating all costs in one company-wide pool."},
  {q:"Which corporations can sell unlimited shares of stock to the general public?",opts:["Private corporations","Nonprofit corporations","C corporations","S corporations"],ans:2,exp:"C corporations can sell unlimited shares of stock to the general public. S corporations must have 100 or fewer shareholders. Nonprofits cannot issue shares."},
  {q:"Scott wants to determine whether a company has substantial short-term assets to cover its immediate liabilities without selling inventory. What liquidity ratio should he use?",opts:["Current","Cash","Days sales outstanding","Acid-test"],ans:3,exp:"An acid-test ratio determines whether a company has substantial short-term assets to cover its immediate liabilities without selling inventory."},
  {q:"Cutting costs to boost profitability may result in",opts:["Higher product quality","Fewer employee layoffs","A drop in employee morale","An increase in productivity"],ans:2,exp:"While cutting costs may boost profitability, it can have negative effects such as employee layoffs, a drop in employee morale and productivity, and reduced product quality."},
  {q:"Abeytu sent requests for price quotes to seven different chemical companies and is waiting to review the suppliers' proposed prices. Abeytu is conducting",opts:["Negotiations","Blanket ordering","Competitive bidding","Forecasts"],ans:2,exp:"Competitive bidding involves sending out a request for bids, reviewing proposed prices, and selecting the best supplier for the job."},
  {q:"Which of the following statements about incremental analysis is true?",opts:["It is not applicable to short-run decisions","It is particularly suited to long-run decisions","It assesses the impact of large changes","It is used to assist decision-making"],ans:3,exp:"Incremental analysis is a technique used to assist decision-making by assessing the impact of small changes. It is applicable to both short- and long-run decisions but particularly suited to short-run decisions."},
  {q:"Which of the following is an example of a direct cost a business pays?",opts:["Office supplies","Marketing costs","Production equipment","Utilities"],ans:2,exp:"Direct costs are expenses that can be directly linked to a specific item, service, project, or expense category. Production equipment is a direct cost. Office supplies and utilities are indirect costs."},
  {q:"Ashley prepares a budget that serves as a request for the purchase of a property. This best describes what type of budget?",opts:["Operating","Promotional","Capital","Cash"],ans:2,exp:"A capital budget typically is a request for purchases of large assets (such as property, equipment, or IT systems) that create major demands on a company's cash flow."},
  {q:"Which of the following is a way in which a central data repository for financial information can benefit a company?",opts:["It is only useful for tech-savvy employees","It houses data across several locations","It complicates the onboarding process","It helps ensure data accuracy"],ans:3,exp:"Data repositories help ensure data accuracy by helping businesses avoid data duplication and eliminate inconsistencies in data."},
  {q:"Which of the following statements about retained earnings is true?",opts:["They are profits a business decides to keep","They are profits a business distributes among shareholders","They are profits a business has before paying its costs","They are profits not typically used for business reinvestment"],ans:0,exp:"Retained earnings are any profits that a business decides to keep after paying all its direct and indirect costs, income taxes, and dividends to shareholders."},
  {q:"Which of the following best describes customer relationship management (CRM) software?",opts:["It looks to offer better customer service and avoid cross-selling products","It helps businesses to prioritize repeat customers over new customers","It is used to establish better relationships with top customers","It aims to maximize the short-term value of customer relationships"],ans:2,exp:"CRM software provides businesses with information about their customers and is used to establish better relationships with top customers."},
  {q:"Which of the following has a direct effect on an organization's corporate governance policies?",opts:["Company bylaws","Physical inventory","Marketing strategies","Point-of-sales quotas"],ans:0,exp:"Corporate governance can be greatly impacted by company bylaws because bylaws represent the specific rules and policies that comprise an organization's corporate governance policy."},
  {q:"Lianne only invests in domestic stocks and has never invested in international stocks. This is an example of",opts:["Globalization","Liberalization","Overvalued stock","Home bias"],ans:3,exp:"Home bias refers to an investor's preference to invest primarily in domestic equities instead of diversifying into foreign or international equities."},
  {q:"A company is searching for troublesome patterns of events in their financial data, such as abnormalities and duplicate data entries. What compliance technology reasoning process is the company utilizing?",opts:["Comparative","Temporal","Cross-source","Symbolic"],ans:3,exp:"Symbolic reasoning searches for problematic patterns of events in financial data, such as abnormalities, duplicate data entries, incomplete information, etc."},
  {q:"Which of the following is one guideline to which Benford's law typically applies?",opts:["Data must be measured rather than assigned","Smaller datasets are better than larger datasets","All data must be qualitative","Data should be restricted by minimums or maximums"],ans:0,exp:"Benford's law typically applies to data that must be measured rather than assigned, as it often does not apply to assigned numbers such as ID numbers or zip codes."},
  {q:"Employees in the finance industry can become members of a local __________ to build long-lasting relationships in their career field.",opts:["Recreational sports team","Credit union","Professional association","Political party"],ans:2,exp:"Active participation in a professional organization specific to the finance industry affords finance professionals the opportunity to serve on committees and attend seminars with other professionals."},
  {q:"Enterprise risk management goes beyond traditional risk management by addressing",opts:["Accounting discrepancies","Each risk one-by-one","Issues within specific departments","Non-insurable risks"],ans:3,exp:"Within traditional risk management, an organization only looks at things that are insurable. ERM goes beyond insurable risks and addresses hazards that cannot be mitigated through insurance."},
  {q:"Which of the following is an example of a post-sale touchpoint?",opts:["Customer satisfaction survey","Publicity","Word-of-mouth marketing","Product packaging"],ans:0,exp:"Post-sale touchpoints include follow-up, shipping/delivery, warranties/rebates, and customer loyalty programs. A customer satisfaction survey is a post-sale touchpoint."},
  {q:"Checking the validity, reliability, and significance of data and using graphs, charts, and tables to display this data describes what step of interpreting data mining results?",opts:["Choose and apply data mining techniques","Define goals and metrics","Analyze and visualize results","Explore and preprocess data"],ans:2,exp:"After applying data mining techniques, you analyze and visualize results by checking validity and reliability and using graphs, charts, tables, or maps to display findings."},
  {q:"Mikel is responsible for interpreting financial information and systems design for his company. What type of career does he likely work in?",opts:["Banking services","Securities and investments","Insurance","Accounting"],ans:3,exp:"Accountants examine and prepare financial records, involving activities like bookkeeping, systems design, analysis, and interpretation of accounting information."},
  {q:"Which of the following is a way in which businesses can effectively safeguard important financial information?",opts:["Maintaining security software","Using public Wi-Fi networks","Avoiding regular updates to devices","Using simple passwords"],ans:0,exp:"One of the best ways to safeguard financial information is to maintain security software, equipped with firewalls, antivirus protection, and more."},
  {q:"Gianna's personal circle of friends is her",opts:["Family","Reference group","Membership group","Subculture"],ans:2,exp:"Gianna's personal circle of friends is a membership group—a social group she belongs to. A reference group is a group you're not a part of."},
  {q:"Which of the following statements about a statement of owner's equity is true?",opts:["It is another name for a cash flow statement","It shows only the beginning owner's equity","It is prepared before an income statement","It shows items affecting owner's equity during a period"],ans:3,exp:"A statement of owner's equity shows the beginning and the ending owner's equity balances, as well as items affecting owner's equity during a period of time."},
  {q:"To manage her project resource needs, Neveah used a digital system that made accurate estimates based on algorithms. Which tactic did Neveah use to estimate project resources?",opts:["Bottom-up estimating","Group decision-making techniques","Three-point estimating","Project management software"],ans:3,exp:"Project management software can take all of your information and make accurate estimates based on algorithms."},
  {q:"Which of the following statements about responding to customer inquiries is true?",opts:["Customers don't expect businesses to respond promptly","Delaying and ignoring customer inquiries is standard practice","Companies should respond within 24 hours of an inquiry","Waiting to respond won't impact a company's bottom line"],ans:2,exp:"Companies should aim to respond within 24 hours of an inquiry, or sooner if possible. Delaying and ignoring customer inquiries can damage a business's reputation."},
  {q:"After completing a team project, Makai asks the other group members about their experiences when completing the project. What aspect of the project is Makai measuring?",opts:["Quality of work","Scope","Team satisfaction","Schedule"],ans:2,exp:"Evaluating team satisfaction involves surveying team members about their experiences and perspectives regarding the project."},

  {q:"What can businesses do to better protect online accounts and databases?",opts:["Monitor network speeds","Use secure passwords","Send daily risk reports to the authorities","Monitor employee internet use"],ans:1,exp:"To reduce the risk of unauthorized access to confidential information, businesses often maintain secure passwords to allow authorized employees to view secured information."},
