  {q:"Taylor bought a concert ticket but didn't purchase ticket insurance and became sick and can't attend. What type of cost does this best describe?",opts:["Sunk","Opportunity","Incremental","Differential"],ans:0,exp:"Sunk costs are costs that have already been incurred and thus cannot be recovered. Taylor's ticket cost cannot be recovered."},
  {q:"Which of the following is the primary reason a speaker makes eye contact during a presentation?",opts:["To distract the audience from the presentation","To establish a connection with the audience","To conclude the presentation","To give themselves time to set up visual aids"],ans:1,exp:"Making eye contact with individuals in the audience helps to establish a connection and make them feel as if you're talking directly to them."},
  {q:"Which of the following situations is a potential internal risk to a business?",opts:["Climate change","Supply chain disruptions","Use of outdated technology","Cybercrime"],ans:2,exp:"Outdated technology poses several risks to businesses. Supply chain disruptions, climate change, and cybercrime are all external risks."},
  {q:"Which of the following is responsible for creating and reviewing corporate governance policies for a business?",opts:["Board of managers","Board of directors","Board of accountancy","Board of elections"],ans:1,exp:"A corporation's board of directors is responsible for approving and reviewing the corporate governance policies of the business."},
  {q:"Miranda is offered a lump sum payment of $2,000 in one year with a discount rate of 5%. Calculate the present value.",opts:["$1,333.33","$1,904.76","$2,105.26","$2,000.00"],ans:1,exp:"PV = 2,000 / (1 + .05)^1 = $1,904.76"},
  {q:"After working on a successful project together, Sam and Rachel gained a sense of accomplishment and pride in their work. Which benefit of collaboration are they experiencing?",opts:["Better relationships","Greater job satisfaction","Stronger economy","More innovative ideas"],ans:1,exp:"When given the freedom to use their strengths to complete successful projects together, employees gain a sense of accomplishment and pride, experiencing greater job satisfaction."},
  {q:"Johnny's checks are automatically deposited into his account at a financial institution owned and operated by its members. Johnny's financial institution is most likely to be a(n)",opts:["Investment bank","Brokerage firm","Commercial bank","Credit union"],ans:3,exp:"A credit union is a financial cooperative set up to provide savings and credit services to its members, created, owned, and operated by its members."},
  {q:"Which of the following is a challenge of implementing enterprise risk management (ERM)?",opts:["Employees in different departments have different understandings of risk","Enterprise risk management does not proactively address risks","Patents, copyrights, and trademarks are not included in the ERM framework","Enterprise risk management deals primarily with relationships among employees"],ans:0,exp:"People in various departments have different definitions and understandings of risk. Employees need to be on the same page for ERM to be successful."},
  {q:"Leona, a professional accountant, attends a local accounting conference to meet business associates and discuss career opportunities. What career advancement activity is this known as?",opts:["Networking","Coordinating","Selling","Socializing"],ans:0,exp:"When people connect with others who might help them accomplish their professional goals, they are networking."},
  {q:"Which of the following is an advantage of the future value of money?",opts:["It does not rely on estimates","It makes assumptions that always happen","It does not assume constant rate growth","It allows for planning"],ans:3,exp:"Future value has several advantages, including that it allows for planning and makes comparisons easier. A disadvantage is that its assumptions may not actually happen."},
  {q:"Jocelyn wants to make an effort to be more mindful in her life. What can she do to practice mindfulness?",opts:["Worry about things that are out of her control","Be present in the moment instead of thinking about the past","Think more about the future than the present or past","Try new things and change her daily routine"],ans:1,exp:"Mindfulness is the state of being aware of the moment you are in. Being mindful means being present where you are, rather than thinking about the past or worrying about the future."},
  {q:"Because of the internet, most movies and TV shows are streamed online rather than purchased as DVDs. This is an example of the internet changing the __________ utility of a product.",opts:["Place","Possession","Form","Time"],ans:2,exp:"Form utility is usefulness created by altering or changing the form or shape of a product. The shift from physical DVDs to digital streaming changes the form utility."},
  {q:"Which of the following statements best describes the primary market?",opts:["It includes the New York Stock Exchange","It is where investors trade securities","It includes auction and dealer markets","It is where securities are created"],ans:3,exp:"The primary market is where securities are created. The secondary market is where investors trade securities."},
  {q:"Which of the following is an example of a period cost for a business?",opts:["Direct labor","Manufacturing supplies","Marketing expenses","Raw materials"],ans:2,exp:"Period costs are all costs not included in product costs—not directly tied to the production process. Marketing expenses are period costs. Direct labor, raw materials, and manufacturing supplies are product costs."},
  {q:"A company's board of directors is responsible for acting in the best interest of the company's",opts:["Shareholders","Chief executive officer","Chief financial officer","Mid-level managers"],ans:0,exp:"A company's board of directors represents the interests of the shareholders through the board's management of the company."},
  {q:"Which of the following is the purpose of an income statement?",opts:["To inform about the ability of a business to generate profit","To show the nature of cash receipts and cash disbursements","To estimate the liquidity, funding, and debt position of an entity","To inform about the status of the business at a moment in time"],ans:0,exp:"An income statement is a financial summary that shows how much money the business has made or has lost over a period of time."},
  {q:"Properly training employees on safety procedures is an effective way for companies to limit their __________ -liability exposure.",opts:["Product","Customer","Employee","Fiduciary"],ans:2,exp:"Employee-liability exposure is the total risk businesses face from employees who have suffered a job-related injury, illness, or other adversity. Training employees limits this risk."},
  {q:"Shortly after Dana sets her company's budget, one of the company's suppliers raised its prices. This is an example of how __________ can cause budget variance.",opts:["Inaccurate budgeting","Changes in costs","Employee fraud","Improved operations"],ans:1,exp:"Changes in costs is a cause of budget variance. The supplier increased its prices after Dana set the budget, meaning the company will spend more than initially planned."},
  {q:"As a mechanic, Twiggy often uses __________ to diagnose trouble in a boat's engine.",opts:["Expert systems","Voice over Internet Protocol","Satellite technology","Electronic transfer of funds"],ans:0,exp:"Expert systems are a special kind of computer software designed to mimic the knowledge of a human expert. Mechanics often use expert systems to diagnose trouble in a vehicle's engine."},
  {q:"When a person uses a decision-making model to make a choice, they can trust that they",opts:["Achieved success","Carefully evaluated alternatives","Made the best possible choice","Followed their intuition"],ans:1,exp:"When a person uses a decision-making model, they can trust that they are making a good effort to make a decision by carefully evaluating all the alternatives available."},
  {q:"Natural disasters like tornadoes, earthquakes, and floods are considered __________ risks.",opts:["Operational","Hazard","Financial","Strategic"],ans:1,exp:"Hazard risks are potential events or situations that can cause injury or harm to people, property, or the environment. Natural disasters are types of hazard risks."},
  {q:"Terry, a corporate executive, learns his company is about to acquire a smaller company and informs friends so they can buy shares before the stock price rises. This is an example of",opts:["Ethical trading","Predatory lending","Insider trading","Affinity fraud"],ans:2,exp:"Insider trading refers to the buying or selling of a security by someone who has access to nonpublic information. Providing 'tips' to others is also an insider trading violation."},
  {q:"Which of the following situations is a potential external risk to a business?",opts:["An employee is injured on the job","The inflation rate changes over time","Management delays approval for the yearly budget","An inaccurate inventory count leads to missing products"],ans:1,exp:"Inflation is an external, macroeconomic phenomenon. An injured employee, inaccurate inventory count, and budget delays are all examples of internal risks."},
  {q:"Theo often recommends high-risk, high-commission investments in an effort to earn a larger commission for himself. This is an example of",opts:["A finance charge","Acting in good faith","A conflict of interest","Complying with laws and regulations"],ans:2,exp:"A conflict of interest is a situation in which it is impossible to be truly impartial. Theo is prioritizing his own personal gain over his client's well-being."},
  {q:"In which of the following situations would a conversational, informal tone and slang be most appropriate?",opts:["Company-wide email","Report for a CEO","Industry publication","Social media post"],ans:3,exp:"A conversational, informal tone and slang would be most appropriate in a company's social media post."},
  {q:"Which of the following is an example of a corporate governance process intended to promote transparency?",opts:["Promoting a top executive","Conducting internal audits","Hosting brainstorming sessions","Complying with external regulations"],ans:1,exp:"Internal audits are an example of effective corporate governance because they promote transparency and accountability."},
  {q:"Costs that are tied to a company's level of production are most likely to be categorized as __________ costs.",opts:["Operating","Indirect","Variable","Fixed"],ans:2,exp:"Variable costs are costs tied directly to a company's level of production."},
  {q:"Which of the following is an advantage of a financial management information system?",opts:["It makes decisions for businesses","It does not allow for integration","It helps with planning and decreases efficiency","It gives businesses a competitive advantage"],ans:3,exp:"Businesses with an FMIS have a competitive advantage over businesses that do not, as it leverages the power of information technology to bring more productivity."},
  {q:"Effectively managing information regarding trademarks and patents helps a company preserve its",opts:["Stocks","Identity","Customers","Inventory"],ans:1,exp:"Managing information appropriately is essential for business success because it preserves organizational identity and history."},
  {q:"Mateo is dealing with an angry customer who is being disrespectful. How can Mateo model ethical behavior?",opts:["Tell the customer they are being rude","Make the customer leave the store","Be disrespectful and yell back to the customer","Treat the customer with fairness"],ans:3,exp:"Even though the customer is being rude, Mateo can model ethical behavior by treating the customer with fairness."},
  {q:"A clothing manufacturer is comparing the benefits and costs of expanding its operations by adding another product line. This is an example of a __________ analysis.",opts:["SWOT","Feasibility","Marginal","Cash flow"],ans:2,exp:"A marginal analysis is the process of comparing the marginal benefit to the marginal cost to determine if adding one extra unit is worth it for a business."}
];

// State
let pileX = []; // mastered (indices)
let pileY = []; // review (indices)
let pileU = []; // unseen (indices)
let current = null; // current question index
let answered = false;
let queue = []; // current working queue
let queueSource = ''; // 'unseen' or 'review'

function initPiles() {
  pileX = [];
  pileY = [];
  pileU = ALL_QUESTIONS.map((_, i) => i);
  buildQueue();
}

function buildQueue() {
  // Prefer unseen, but if empty use pileY
  if (pileU.length > 0) {
    queue = shuffle([...pileU]);
    queueSource = 'unseen';
  } else if (pileY.length > 0) {
    queue = shuffle([...pileY]);
    queueSource = 'review';
  } else {
    // All mastered—shouldn't happen but just in case
    queue = shuffle([...pileX]);
    queueSource = 'mastered';
  }
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function nextQuestion() {
  if (queue.length === 0) {
    // Round complete—show message then rebuild
    showRoundComplete();
    return;
  }
  current = queue.shift();
  render();
}

function render() {
  const q = ALL_QUESTIONS[current];
  const total = ALL_QUESTIONS.length;
  const done = pileX.length + pileY.length + (ALL_QUESTIONS.length - pileU.length - pileX.length - pileY.length);

  document.getElementById('count-x').textContent = pileX.length;
  document.getElementById('count-y').textContent = pileY.length;
  document.getElementById('count-u').textContent = pileU.length;

  const progress = pileX.length / total;
  document.getElementById('progress-bar').style.width = `${progress * 100}%`;

  const src = queueSource === 'review' ? ' · Reviewing Incorrect' : queueSource === 'mastered' ? ' · All Mastered!' : '';
  document.getElementById('meta').textContent = `Question from ${queueSource === 'review' ? 'Review Pile' : queueSource === 'mastered' ? 'Mastered Pile' : 'Unseen Pile'}${src}`;

  document.getElementById('question').textContent = q.q;
  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.opts.forEach((o, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.textContent = `${['A','B','C','D'][i]}. ${o}`;
    btn.onclick = () => choose(i);
    opts.appendChild(btn);
  });
  document.getElementById('explanation').style.display = 'none';
  document.getElementById('wrong-choice-note').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';
  answered = false;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const q = ALL_QUESTIONS[current];
  const btns = document.querySelectorAll('.opt');
  btns.forEach(b => b.disabled = true);
  const correct = q.ans;
  btns[correct].classList.add('correct');

  const exp = document.getElementById('explanation');

  if (i === correct) {
    // Move to pile X
    pileU = pileU.filter(x => x !== current);
    pileY = pileY.filter(x => x !== current);
    if (!pileX.includes(current)) pileX.push(current);

    exp.className = '';
    exp.style.display = 'block';
    exp.innerHTML = `<strong>✓ Correct → Mastered Pile.</strong> ${q.exp}`;
    document.getElementById('wrong-choice-note').style.display = 'none';
  } else {
    btns[i].classList.add('wrong');

    // Move to pile Y
    pileU = pileU.filter(x => x !== current);
    pileX = pileX.filter(x => x !== current);
    if (!pileY.includes(current)) pileY.push(current);

    // Show why chosen answer is wrong
    const wrongNote = document.getElementById('wrong-choice-note');
    wrongNote.style.display = 'block';
    wrongNote.innerHTML = `<strong>You chose: ${['A','B','C','D'][i]}. ${q.opts[i]}</strong> — This is incorrect.`;

    exp.className = 'wrong-exp';
    exp.style.display = 'block';
    exp.innerHTML = `<strong>✗ Incorrect → Review Pile.</strong> Correct answer: <strong>${['A','B','C','D'][correct]}. ${q.opts[correct]}</strong><br><br>${q.exp}`;
  }

  document.getElementById('count-x').textContent = pileX.length;
  document.getElementById('count-y').textContent = pileY.length;
  document.getElementById('count-u').textContent = pileU.length;
  document.getElementById('progress-bar').style.width = `${(pileX.length / ALL_QUESTIONS.length) * 100}%`;

  document.getElementById('next-btn').style.display = 'inline-block';
}

function showRoundComplete() {
  document.getElementById('quiz-screen').style.display = 'none';
  const rc = document.getElementById('round-complete');
  rc.style.display = 'block';

  if (pileU.length === 0 && pileY.length === 0) {
    document.getElementById('round-title').textContent = '🎉 All Questions Mastered!';
    document.getElementById('round-sub').textContent = `You've mastered all ${ALL_QUESTIONS.length} questions! Keep reviewing to stay sharp.`;
    document.getElementById('continue-btn').textContent = 'Review All Again →';
  } else if (pileU.length === 0) {
    document.getElementById('round-title').textContent = 'All Unseen Questions Done!';
    document.getElementById('round-sub').textContent = `Mastered: ${pileX.length} | Review pile: ${pileY.length} questions to retry.`;
    document.getElementById('continue-btn').textContent = 'Start Review Pile →';
  } else {
    document.getElementById('round-title').textContent = 'Review Round Complete!';
    document.getElementById('round-sub').textContent = `Mastered: ${pileX.length} | Still in review: ${pileY.length} | Unseen: ${pileU.length}`;
    document.getElementById('continue-btn').textContent = 'Continue →';
  }
}

document.getElementById('next-btn').onclick = () => {
  nextQuestion();
};

document.getElementById('continue-btn').onclick = () => {
  document.getElementById('round-complete').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';

  if (pileU.length === 0 && pileY.length === 0) {
    // Reset all to unseen for full replay
    pileX = [];
    pileU = ALL_QUESTIONS.map((_, i) => i);
  }
  buildQueue();
  nextQuestion();
};

initPiles();
nextQuestion();
</script>
