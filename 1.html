<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DECA Finance Quiz</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Roboto', sans-serif; background: #fff; color: #152238; min-height: 100vh; }
  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
  #app { max-width: 720px; margin: 0 auto; padding: 40px 24px; }
  #progress-bar-wrap { background: #e0e0e0; height: 4px; border-radius: 2px; margin-bottom: 32px; }
  #progress-bar { background: #009b47; height: 4px; border-radius: 2px; transition: width 0.3s; }
  #meta { font-size: 13px; color: #888; margin-bottom: 20px; font-weight: 500; letter-spacing: 0.5px; }
  #pile-info { font-size: 13px; color: #555; margin-bottom: 12px; display: flex; gap: 16px; }
  .pile-badge { padding: 3px 10px; border-radius: 12px; font-weight: 700; font-size: 12px; }
  .pile-x { background: #e6f9ef; color: #009b47; border: 1px solid #009b47; }
  .pile-y { background: #fff0f0; color: #c0392b; border: 1px solid #c0392b; }
  .pile-u { background: #f0f0f0; color: #888; border: 1px solid #ccc; }
  #question { font-size: 18px; font-weight: 500; line-height: 1.5; margin-bottom: 28px; color: #152238; }
  .opt { display: block; width: 100%; text-align: left; background: #fff; border: 2px solid #e0e0e0; color: #152238; padding: 14px 18px; margin-bottom: 10px; font-size: 15px; font-family: 'Roboto', sans-serif; cursor: pointer; border-radius: 4px; transition: border-color 0.15s; }
  .opt:hover:not(:disabled) { border-color: #009b47; }
  .opt.correct { border-color: #009b47; background: #f0fff6; color: #152238; }
  .opt.wrong { border-color: #c0392b; background: #fff5f5; color: #152238; }
  .opt:disabled { cursor: default; }
  #explanation { display: none; background: #f7f7f7; border-left: 4px solid #009b47; padding: 16px 18px; margin-top: 20px; font-size: 14px; line-height: 1.6; color: #333; border-radius: 0 4px 4px 0; }
  #explanation.wrong-exp { border-left-color: #c0392b; }
  #wrong-choice-note { display: none; background: #fff5f5; border-left: 4px solid #c0392b; padding: 12px 18px; margin-top: 12px; font-size: 14px; line-height: 1.6; color: #333; border-radius: 0 4px 4px 0; }
  #next-btn { display: none; margin-top: 24px; background: #009b47; color: #fff; border: none; padding: 14px 32px; font-size: 15px; font-family: 'Roboto', sans-serif; font-weight: 700; cursor: pointer; border-radius: 4px; letter-spacing: 0.5px; }
  #next-btn:hover { background: #007a38; }
  #round-complete { display: none; text-align: center; padding: 60px 0; }
  #round-complete h2 { font-size: 28px; font-weight: 700; color: #152238; margin-bottom: 8px; }
  #round-complete p { font-size: 16px; color: #555; margin-bottom: 32px; }
  #continue-btn { background: #c0392b; color: #fff; border: none; padding: 14px 36px; font-size: 15px; font-family: 'Roboto', sans-serif; font-weight: 700; cursor: pointer; border-radius: 4px; }
  #continue-btn:hover { background: #a93226; }
</style>
</head>
<body>
<div id="app">
  <div id="quiz-screen">
    <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
    <div id="pile-info">
      <span class="pile-badge pile-x">✓ Mastered: <span id="count-x">0</span></span>
      <span class="pile-badge pile-y">✗ Review: <span id="count-y">0</span></span>
      <span class="pile-badge pile-u">? Unseen: <span id="count-u">0</span></span>
    </div>
    <div id="meta"></div>
    <div id="question"></div>
    <div id="options"></div>
    <div id="wrong-choice-note"></div>
    <div id="explanation"></div>
    <button id="next-btn">Next →</button>
  </div>
  <div id="round-complete">
    <h2 id="round-title"></h2>
    <p id="round-sub"></p>
    <button id="continue-btn">Keep Going →</button>
  </div>
</div>
<script>
const ALL_QUESTIONS = [
  // Original set
  {q:"Carrie works for an investment bank monitoring communications between employees and the public. In which department does Carrie likely work?",opts:["Human resources","Securities and trading","Compliance","Operations"],ans:2,exp:"The compliance department monitors communications between employees and the public and ensures the bank follows applicable rules and regulations."},
  {q:"Which of the following should businesspeople be sure to include in simple written reports?",opts:["Complete bibliography","Extensive charts and graphs","Necessary information only","Names of all references"],ans:2,exp:"Simple written reports are concise and usually contain only necessary information. Extensive charts and bibliographies belong in complex reports."},
  {q:"Jean, Keisha, and Kyle want to start a business and are concerned about double taxation on corporate profits. What type of business ownership should they consider?",opts:["Open corporation","Partnership",'"S" corporation',"Close corporation"],ans:2,exp:"An S corporation limits personal liability and avoids double taxation—profits pass directly to stockholders who pay taxes as individuals."},
  {q:"Before Laney receives her overseas order, government officials will likely:",opts:["Require Laney to obtain a license","Take a portion of her supplies","Examine the package for prohibited materials","Remove the country of origin label"],ans:2,exp:"Customs and border protection officials are allowed by law to examine packages for prohibited materials."},
  {q:"An important purpose of full-disclosure laws and regulations is to:",opts:["Provide information to investors so they can make informed decisions","Allow employees to use inside information for personal gain","Require companies to disclose all information about their operations","Prevent a stock's par value from dropping below its market value"],ans:0,exp:"Full-disclosure laws require companies to publicize any information that could affect stock value so investors can make informed buy, hold, or sell decisions."},
  {q:"Which federal agency supervises banks and credit unions?",opts:["Federal Trade Commission","Federal Bureau of Investigation","Consumer Product Safety Commission","Consumer Financial Protection Bureau"],ans:3,exp:"The Consumer Financial Protection Bureau supervises banks, credit unions, and other financial-services providers and educates consumers about financial products."},
  {q:"Money placed in an IRA that is not taxed until withdrawal is an example of:",opts:["Capital gains revenue","Tax-deferred income","Dual taxation on earnings","Tax-exempt funds"],ans:1,exp:"Tax-deferred income is not taxed until the money is used, such as money in an IRA that retirees use for living expenses."},
  {q:"When answering the phone at work, you should always state your:",opts:["Company and your name","Years of work experience","Company's full address","Job qualifications and skills"],ans:0,exp:"Identifying both your company's name and your own name lets the caller know they've reached the correct number."},
  {q:"Which of the following is an example of a persuasive message that businesses write?",opts:["Collection letter","Electronic mail","Handwritten note","Interoffice memo"],ans:0,exp:"A collection letter is a persuasive message written to customers who are delinquent on payments, persuading them to send payment or make arrangements."},
  {q:"What should Cheri include in the executive summary of her written report?",opts:["The most important information","Facts and figures","Charts and graphs","Suggestions for improvement"],ans:0,exp:"An executive summary highlights the most important information in the document so businesspeople can quickly find what they need."},
  {q:"What is the best way to combat compliance issues associated with employees working remotely and using personal devices?",opts:["Hiring more compliance professionals","Keeping digital communications between employees only","Preventing employees from using their own devices","Implementing monitoring systems and security software"],ans:3,exp:"Monitoring systems and security software can archive employee communications, creating an audit trail that helps meet compliance objectives."},
  {q:"Megan has a new idea during a staff meeting while a coworker is presenting. How should she communicate it?",opts:["Write it down and ask her manager after the meeting to add it to a future agenda","Wait until her coworker finishes and propose her idea","Send her manager a signal to share immediately","Pass a note to her coworker"],ans:0,exp:"Participants should stick to the agenda. New ideas should be saved for another discussion—interrupting or passing notes is distracting."},
  {q:"An employee is questioned by a customer about something they're unfamiliar with. What should they do?",opts:['Politely say "Sorry, I don\'t work in this area"',"Introduce the customer to another employee","Attempt to answer the question","Locate an employee who can assist the customer"],ans:3,exp:"The employee should find someone who can help. Simply introducing the customer doesn't adequately meet their needs, and guessing could give wrong information."},
  {q:"Wonka Industries runs internal audits and divides responsibilities among managers, resulting in smooth operations. This is an example of the impact of __________ on decision-making.",opts:["Community involvement","External regulations","Corporate governance processes","Public relations efforts"],ans:2,exp:"Internal corporate governance processes—like audits and segregation of duties—ensure smooth operations, clarify chains of command, and measure performance."},
  {q:"A financial planner who fails to stay informed about new laws impacting products they sell is failing to observe which ethical principle?",opts:["Honesty","Confidentiality","Competence","Objectivity"],ans:2,exp:"Competence means maintaining the knowledge necessary to provide accurate information. Failing to stay current makes the planner incompetent, not dishonest."},
  {q:"Beverly discovers erroneous duplicate entries that caused collection letters to be sent to paid customers. What should she do to save relationships and prevent future issues?",opts:["Use funds from accounts payable to pay the debt","Complete an accounting software update","Contact each customer by phone and apologize","Complete a data cleansing of the erroneous entries"],ans:3,exp:"A data cleansing removes the erroneous entries from the system, preventing future incorrect collection letters. An apology alone doesn't fix the root problem."},
  {q:"Which of the following is a common way for a divisional organizational structure to be broken down?",opts:["By function","By manager","By territory","By job type"],ans:2,exp:"Divisional structures are often divided by product, process, territory, or customer type. Functional structures are broken down by function (sales, marketing, etc.)."},
  {q:"There is a growing need for cultural intelligence when conducting business because of:",opts:["Globalization","Technology","Economics","Politics"],ans:0,exp:"Globalization requires businesses to develop cultural intelligence—an understanding of and sensitivity to differences in customs, traditions, and values across cultures."},
  {q:"Government regulation is financed by taxes and:",opts:["Donations","Borrowing","Price supports","Subsidies"],ans:1,exp:"The government sells bonds to other countries and the private sector to raise money not provided by taxation."},
  {q:"Which factor has influenced the geographical development of unions?",opts:["Right to bargain collectively","Availability of natural resources","Right-to-work laws","Availability of capital goods"],ans:2,exp:"Right-to-work laws, legislated by individual states, give employees the right to work without joining a union, limiting union activity in those states."},
  {q:"The French-Canadian culture relies heavily on nonverbal communication. This means it is a(n):",opts:["Religious culture","High-context culture","Low-context culture","Ethnocentric culture"],ans:1,exp:"High-context cultures rely heavily on nonverbal communication. Low-context cultures communicate more directly."},
  {q:"Los Angeles's location relative to Japan, Korea, and China makes it a prime shipping location. This is an example of the impact of __________ on world trade.",opts:["Geography","Natural resources","Political factors","Economic development"],ans:0,exp:"The geographical location of cities and ports is an important component of global trade. LA's Pacific Ocean access makes it ideal for transpacific trade."},
  {q:"When you take responsibility for your decisions and actions, you will likely:",opts:["Earn trust and respect","Make new friends","Earn higher grades","Get a promotion"],ans:0,exp:"Taking responsibility lets others know they can depend on you to do the right thing and keep your commitments, earning their trust and respect."},
  {q:"Who typically reviews and approves the guidelines for running a corporation (corporate governance policies)?",opts:["The investors","The shareholders","The management team","The board of directors"],ans:3,exp:"A corporation's board of directors is responsible for approving and reviewing corporate governance policies that specify how the corporation is directed and run."},
  {q:"Most people are better able to handle change if they __________ it.",opts:["Oppose","Anticipate","Avoid","Resist"],ans:1,exp:"By anticipating change, we can plan for it and make a better adjustment. Resisting or opposing change prevents moving forward."},
  {q:"Paul's brother uses computer terms that confuse him. Which communication barrier is blocking effective communication?",opts:["Environment","Information overload","Language","Bad timing"],ans:2,exp:"Jargon is specialized language known only to a certain group. Computer lingo is jargon—a language barrier."},
  {q:"Which question should you ask to ensure your communication is constructive?",opts:["Am I being defensive?","Who will benefit?","Is this the whole truth?","Am I communicating consistently?"],ans:1,exp:"Asking 'Who will benefit?' ensures your communication gives people the information they need. Transparent communication is about sharing what's helpful."},
  {q:"Bryan is detail-oriented; Erin is creative. Should they be on the same team?",opts:["No; their differing skill sets will cause conflict","Yes; teams with a mixture of skills and talents perform to their best abilities","No; all team members need to be detail-oriented","Yes; Erin can help Bryan be more creative"],ans:1,exp:"One benefit of teamwork is exposure to varied skills. Allowing people to do what they're good at increases success and lets everyone perform at their best."},
  {q:"Even if an unethical action isn't illegal, it can still cause negative consequences such as:",opts:["Imprisonment","An increased customer base","A poor reputation","Decreased managerial authority"],ans:2,exp:"Unethical behavior reflects poorly on individuals and organizations, damaging their reputations—even when no laws have been broken."},
  {q:"The first step in assessing the long-term value and impact of your actions on others is to:",opts:["Determine the needs of others","List potential outcomes for your choices","Acknowledge your own knowledge gaps and biases","Think before you act"],ans:3,exp:"Thinking before you act is the first step. Once you act, it's difficult to change consequences. Listing outcomes, acknowledging biases, etc. come after."},
  {q:"Deciding whether or not to cheat on a test is an example of a(n):",opts:["Unfair decision","Ethical principle","Negative consequence","Ethical situation"],ans:3,exp:"An ethical situation involves deciding whether something is right or wrong, where the wrong choice could cause someone harm."},
  {q:"Why is it a bad idea to solicit fake reviews for a product or service?",opts:["If customers realize the reviews are fake, they will lose trust in the company","People can never tell which reviews are fake","Fake reviews lead to an influx of purchases and profit","Customers rarely believe peer reviews anyway"],ans:0,exp:"Trust is integral to the customer-company relationship. If customers discover fake reviews, they're unlikely to ever use the company's products or services."},
  {q:"Which situation includes money being used as a medium of exchange?",opts:["An individual places $2,000 into a savings account","An individual trades a $20 bill for four $5 bills","An individual pays $500 to purchase a laptop","An individual takes out a $10,000 car loan"],ans:2,exp:"When money is accepted in exchange for a good (like a laptop), it's being used as a medium of exchange. Savings is a store of value; a loan is deferred payment."},
  {q:"Juan Rodriguez signed a promissory note for a loan. In this credit arrangement, Juan is the:",opts:["Depositor","Creditor","Lender","Borrower"],ans:3,exp:"A promissory note is signed by a borrower promising to repay a loan. The person who signs is the borrower."},
  {q:"A financial institution that acts as an intermediary to facilitate securities transactions for the general public is a(n):",opts:["Investment bank","Commercial bank","Brokerage company","Credit union"],ans:2,exp:"A brokerage company acts as an intermediary to facilitate securities transactions (buying and selling stocks) for the general public."},
  {q:"Which of the following is a characteristic of a call market?",opts:["Buyers and sellers determine prices","Trades occur continuously","Buy orders are made at specific times","Prices change from moment to moment"],ans:2,exp:"On call markets, transactions take place at specific times. All orders are collected, a price is set that satisfies most orders, then all transactions occur simultaneously."},
  {q:"A commodities market is a marketplace for buying and selling:",opts:["Government bonds","Financial securities","Shares of companies","Raw or primary products"],ans:3,exp:"A commodity market is where individuals and companies buy and sell raw goods (commodities) such as oil, gold, and rubber."},
  {q:"Which of the following is an example of convergence in the finance industry?",opts:["Chase Schwartz acquires Dollar-Wise Financial Services","Constitution Savings merges with Adams Community Bank","Independence Insurance acquires NetAutoInsurance.com","United Federal Bank merges with Provincial Insurance Company"],ans:3,exp:"Convergence is the merging of financial providers from different financial sectors (e.g., a bank merging with an insurance company). Merging within the same sector is consolidation."},
  {q:"An economic trend that typically precedes an upturn in commodity prices is the __________ for at least a year.",opts:["Stock market declining","Dollar increasing in value","Growth of the money supply declining","Yield curve leveling out"],ans:1,exp:"An upturn in commodity prices is typically preceded by the dollar strengthening (increasing in value) for at least a year, along with the stock market and money supply increasing."},
  {q:"Which of the following has contributed to financial globalization?",opts:["Increased restrictions on foreign investment","Increased taxes on international transactions","Reduced foreigners' access to domestic markets","A movement from fixed to floating exchange rates"],ans:3,exp:"Countries moving from fixed to floating exchange rates enables capital to flow more freely across national borders, contributing to financial globalization."},
  {q:"Which question is most relevant when interviewing a potential financial advisor?",opts:["Do you have a partner?","What are your qualifications?","Did you go to a public or private university?","Why did you decide to become a financial advisor?"],ans:1,exp:"Asking about qualifications determines if the advisor has the right skills and abilities for your needs. Personal life and motivations are less relevant."},
  {q:"Mia wants to control her portfolio and avoid high commissions. She should consider obtaining securities information from a(n):",opts:["Licensed stockbroker","Online brokerage firm","Certified insurance agent","Risk management officer"],ans:1,exp:"Online brokerage firms provide securities information via the internet with lower fees. Clients take on more responsibility for managing their own investments."},
  {q:"The net change in a stock table represents the difference between the last share price today and the price paid for the:",opts:["Last share from last year","Last share on the previous day","First share on the previous day","First share from last year"],ans:1,exp:"Net change is the difference between today's closing price and the previous day's closing price."},
  {q:"An apartment building is an example of a(n) __________ investment.",opts:["Lending","Ownership","Realistic","Domestic"],ans:1,exp:"An ownership investment provides the owner with certain rights in return for money. Real estate (like an apartment building) is an ownership investment."},
  {q:"What type of insurance do you need to ensure your beneficiaries receive an inheritance?",opts:["Universal life insurance","Term life insurance","Disability insurance","Long-term care insurance"],ans:0,exp:"Universal life insurance covers you for life and lets you build savings tax-free so beneficiaries receive an inheritance. Term life only covers a set period."},
  {q:"What are the two major sections of a statement of changes in stockholder's equity?",opts:["Capital stock and retained earnings","Capital stock and dividends declared","Net income and retained earnings","Net income and total stockholder's equity"],ans:0,exp:"The capital stock section shows the current value of stocks issued; the retained earnings section shows net income retained minus dividends declared."},
  {q:"Why do finance professionals continue to act unethically despite the consequences?",opts:["They are greedy and only care about money","The finance field is full of temptations and pressures to be unethical","They are always rewarded for unethical behavior","There are no legal consequences for unethical actions"],ans:1,exp:"The finance field is full of temptations and pressures to engage in unethical behavior. Financial professionals face a wide range of ethical dilemmas."},
  {q:"Lauren must determine which of two furniture suppliers is more cost-effective. What type of cost should she analyze?",opts:["Sunk cost","Differential cost","Indirect cost","Imputed cost"],ans:1,exp:"Differential cost is the difference between the costs of two alternatives—directly helping determine which supplier is the better choice."},
  {q:"Which of the following is an example of an indirect cost?",opts:["Insurance","Wages","Materials","Commission"],ans:0,exp:"Insurance cannot be directly allocated to a specific person, project, or department—it's used across various departments. Wages, materials, and commissions can be directly assigned."},
  {q:"Stefan invests $1,200 into a stock that earns 9% this year. What will be the total value of his investment?",opts:["$1,200","$1,080","$1,308","$1,420"],ans:2,exp:"$1,200 × 0.09 = $108 interest. $1,200 + $108 = $1,308 total value."},
  {q:"Managerial accountants help managers by:",opts:["Ensuring employees are paid fairly","Preparing financial statements for investors","Providing important information for decision-making","Providing tax advice and filing taxes"],ans:2,exp:"Managerial accountants provide financial information managers need to make decisions that improve efficiency and success—including budgeting and analysis."},
  {q:"What type of variance analysis involves the difference between standard and actual costs of raw materials used for production?",opts:["Fixed overhead","Selling price","Material yield","Purchase price"],ans:3,exp:"Purchase price variance monitors variances in the price of raw materials. Fixed overhead involves expenses that don't change with sales volume. Material yield involves quantity variances."},
  {q:"A cost accounting budget is often used as a means of financial control. In other words, it:",opts:["Restricts who has access to financial data","Is used to monitor activities in a business","Predicts what will happen in the future","Complicates the decision-making process"],ans:1,exp:"A financial control is a tool to monitor business activities, such as reviewing spending and comparing it to the budget, keeping companies from exceeding spending limits."},
  {q:"Which of the following is a cost driver that could affect the cost of internet service in a coffee shop?",opts:["Number of direct labor hours","Number of products sold","Number of customers","Number of ingredients per product"],ans:2,exp:"Internet service becomes more expensive as more people use it—so the number of customers in the coffee shop drives its cost."},
  {q:"Jamila determined that the marketing department is responsible for the purchase of a new email platform. Jamila is:",opts:["Eliminating sunk costs","Performing marginal analysis","Allocating costs","Performing cost-benefit analysis"],ans:2,exp:"Cost allocation is assigning costs to cost objects such as projects, departments, or regions. Jamila is allocating the email platform cost to marketing."},
  {q:"You want $8,000 in three years, earning 4% compound interest. How much should you invest today?",opts:["$7,821.47","$7,364.10","$7,692.31","$7,111.75"],ans:3,exp:"PV = $8,000 / (1.04)³ = $8,000 / 1.1249 = $7,111.75"},
  {q:"One of the benefits of marginal analysis is:",opts:["Improved long-term strategy","Optimal decision-making","Understanding the impact of sunk costs","Improved workplace communication"],ans:1,exp:"Marginal analysis helps companies make decisions that optimize resource use and maximize profits. It's best suited for short-term decisions and does not consider sunk costs."},
  {q:"Which of the following is a common financial-information management problem?",opts:["Insufficient financial information due to compliance regulations","Overreliance on a master source for financial data","Strict organizational data governance policies","Multiple financial data sources and systems within an organization"],ans:3,exp:"Multiple incompatible financial data sources and systems make it difficult for managers to get a single view of company financials."},
  {q:"Paul told Leslie to sell her Bex stock because confidential financial data shows profits dropped by a third. This is an example of:",opts:["Encryption","Disparate data","Stewardship","Insider trading"],ans:3,exp:"Illegal insider trading occurs when an employee shares non-public company information with others so they can trade stock before the public learns of it."},
  {q:"What is an effective way for a business to reduce risks associated with unethical manipulation of financial data?",opts:["Interview forensic accountants","Organize a network database","Use auditing software applications","Limit financial transactions"],ans:2,exp:"Auditing software tracks and records each step of all financial transactions, reducing risks associated with embezzlement and other unethical activities."},
  {q:"How can businesses benefit from using a central data repository for their financial information?",opts:["They no longer have to generate consistent data","They can overcome economies of scale","They can obtain faster responses to queries","They can rely on old data"],ans:2,exp:"Since data is housed in one location, querying is faster, improving organizational efficiency and enabling more consistent, up-to-date information."},
  {q:"Which of the following would a small business's budgeting applications most likely be able to do?",opts:["Show the business's cash flow status","Predict new services to offer customers","Determine the business's EDI needs","Identify equipment needing repairs"],ans:0,exp:"Budgeting applications maintain, monitor, and forecast financial status and generate reports tracking expenses, revenue, cash flow, and profit/loss."},
  {q:"Which type of budget is completed in advance of the accounting period and involves predicting future income and expenses?",opts:["Master budget","Cash flow budget","Financial budget","Operating budget"],ans:3,exp:"Operating budgets are predictive—companies analyze past performance and predict future income and expenses, created in advance of the accounting period."},
  {q:"A company uses financial software to examine a product's total costs in relation to its selling price. The company is analyzing:",opts:["Stockturn","Liquidity","Profitability","Market value"],ans:2,exp:"Profitability is the money remaining after total costs are deducted from total revenue. Analyzing cost vs. selling price determines if the product generates desired profit."},
  {q:"Truman Enterprises evaluated economic, environmental, and social factors in a document released to stakeholders. Truman developed a(n):",opts:["Sustainability report","Mission statement","Executive summary","Action plan"],ans:0,exp:"Sustainability reporting summarizes a company's social responsibility—governance practices, stakeholder commitment, and environmental impact."},
  {q:"Francesca has steady income but no large loan history. The dealership is more likely to approve her loan if she gets a(n):",opts:["Qualified loan cosigner","Incremental pay increase","Reputable credit report","Letter of intent"],ans:0,exp:"A cosigner agrees to cover the debt if Francesca defaults. Since she lacks large credit history, a qualified cosigner gives lenders more assurance."},
  {q:"An orientation program typically benefits new employees by:",opts:["Saving supervisors' time","Reducing new employees' anxiety","Reducing employee startup costs","Increasing new employees' compensation"],ans:1,exp:"New employees are often anxious about an unknown situation. An effective orientation helps alleviate that anxiety. Saving time and reducing startup costs benefit the organization."},
  {q:"A financial-services company allocates earnings to a college scholarship fund. This demonstrates:",opts:["Profit orientation","Personal competence","Due diligence","Corporate responsibility"],ans:3,exp:"Corporate responsibility involves activities that contribute to the well-being of society, such as setting up scholarship funds."},
  {q:"Which of the following is an example of a business applying information to accomplish a task?",opts:["Reviewing data on trends to develop new products","Conducting research on consumer preferences","Developing questionnaires for local surveys","Examining promotional activities of competitors"],ans:0,exp:"Applying information means using it to accomplish a task. Reviewing trend data to develop products applies that information—the others are methods of obtaining it."},
  {q:"Which of the following is a primary function of information management?",opts:["Storing data","Placing ads","Monitoring employees","Obtaining credit"],ans:0,exp:"Information management involves gathering, sorting, evaluating, and disseminating information. Businesses need to store data to retrieve it when needed."},
  {q:"When using presentation software, it is best to:",opts:["Avoid the use of decorative fonts","Limit the presentation to twelve or fewer slides","Include flashy background designs","Use a lot of clipart to add interest"],ans:0,exp:"Decorative fonts are difficult to see and read. Flashy backgrounds and excess clipart are distracting. The number of slides should depend on the topic, not an arbitrary limit."},
  {q:"William notices most numbers in his database start with 1 while very few begin with 9. This is an example of:",opts:["The law of supply and demand","Benford's law","Numerical law","The law of diminishing returns"],ans:1,exp:"Benford's law states that in large sets of numerical data, numbers beginning with lower digits occur more frequently than those beginning with higher digits."},
  {q:"Marilee needs to view all customers located in Florida. What query filter should she use?",opts:["Last name","State","Area code","City"],ans:1,exp:"Filtering by state will quickly return all customers in Florida. Filtering by city or area code would require multiple queries and wouldn't be as efficient."},
  {q:"BVM Company examined economic and political factors to determine whether to expand. The company conducted a(n) __________ analysis.",opts:["Strengths","Internal","Environmental","Tactical"],ans:2,exp:"An environmental scan studies external forces (economic indicators, political factors) that influence business success to make informed expansion decisions."},
  {q:"Increased profitability:",opts:["Always comes at a cost to employees","Can only occur when a business minimizes expenses","May only benefit a few of the business's stakeholders","Usually means decreased product quality"],ans:2,exp:"Profits aren't always distributed to everyone in the business. Often only a few people benefit. Increased profitability doesn't require cutting costs or reducing quality."},
  {q:"What is one of the main causes of accidents in the workplace?",opts:["First-aid methods","Physical injuries","Safety hazards","Employee grievances"],ans:2,exp:"Safety hazards—unsafe conditions (poor housekeeping, fire hazards) and unsafe acts (improper lifting)—are one of the main causes of workplace accidents."},
  {q:"Which of the following is an example of point-of-sale fraud?",opts:["Vendors taking funds from the register","Competitors accessing computer files","Customers replacing price tags","Employees undercharging their friends"],ans:3,exp:"Employees undercharging friends is point-of-sale fraud—selling items for less than actual value, causing the business to lose money on the sale."},
  {q:"In which situation is a business most likely to experience a security breach?",opts:["An employee uses a paper shredder to destroy unneeded records","An owner installs electronic locks and security windows","The tech coordinator regularly updates antivirus software","The last employee to leave fails to set the security alarm"],ans:3,exp:"Not setting the security alarm increases theft risk by making it easier for someone to break in. The other options reduce security breach risk."},
  {q:"When identifying equipment and supplies for a project, it is important these resources:",opts:["Are easy to obtain and use","Are available in-house","Belong to local organizations","Meet the requirements of the project"],ans:3,exp:"Resources must meet project specifications. If you obtain the wrong size or type, you may not be able to complete the project—even if they're harder to obtain."},
  {q:"Supervising business and manufacturing processes to ensure quality and efficiency is a quality-control method known as:",opts:["Concurrent engineering","Process performance management","Statistical process control","The Taguchi method"],ans:1,exp:"Process performance management supervises business and manufacturing processes to ensure quality and efficiency. Statistical process control uses statistics; Taguchi focuses on product design."},
  {q:"The primary benefit of establishing a value system for yourself is:",opts:["Helps you choose a career","Gives you guidelines to follow","Improves your social skills","Raises your level of self-esteem"],ans:1,exp:"Your values are the principles by which you live. A value system provides guidelines for decision-making."},
  {q:"Akilah wants to be a loan officer. What finance career field does she want to work in?",opts:["Banking services","Accounting","Insurance","Corporate finance"],ans:0,exp:"Loan officers work within banking services. Loan officers don't work in accounting, insurance, or corporate finance."},
  {q:"Sasha oversees a staff reviewing aging accounts, contacting customers about late payments, and working with outside payment agencies. Sasha works as a(n):",opts:["Accounts-payable supervisor","Collections manager","Pension manager","Budgeting analyst"],ans:1,exp:"Collections involves collecting payment from customers. Accounts-payable pays the company's bills; pension managers handle retirement funds; budgeting analysts prepare budgets."},
  {q:"The Smiths list problems with their new home. If the builder has a positive attitude, their first action will be to:",opts:["Take responsibility for the problems","Convince the Smiths there are no problems","Discuss the problems with employees","Blame the problems on circumstances"],ans:0,exp:"Positive people are dependable and accept responsibility. They admit mistakes, don't make excuses, and don't blame others. Discussing with employees would come later."},
  {q:"In which of the following ways can employees contribute to the achievement of governance objectives?",opts:["Report progress to shareholders","Create policies to enforce objectives","Draft bylaws that all must follow","Provide feedback to improve objectives"],ans:3,exp:"Obtaining feedback from employees helps improve governance objectives and align them with the company's vision. Drafting bylaws and creating policies are roles for directors."},
  {q:"Protecting the investments of shareholders is a primary responsibility of:",opts:["Company employees","The board of directors","Upper level managers","Company lawyers"],ans:1,exp:"The board of directors is responsible for protecting shareholders' investments, developing the company's mission and structure, and governing all organizational activities."},
  {q:"Objective setting, risk assessment, and risk response are all components of:",opts:["Conflict resolution policies","Asset allocation strategies","Channel-management plans","Enterprise risk management"],ans:3,exp:"Enterprise risk management (ERM) is a comprehensive strategy involving planning for physical and business risks, including setting objectives, assessing risks, and determining responses."},
  {q:"Whatever action must be taken in handling a customer complaint, the salesperson should respond in a(n) __________ manner.",opts:["Formal","Skeptical","Concerned","Abrupt"],ans:2,exp:"A concerned attitude puts the customer in a good frame of mind. Skeptical or abrupt responses alienate customers; formal isn't required, though professionalism is."},
  {q:"Who should take continuing education classes to keep up with changes in tax regulations?",opts:["Martha Winters, Certified Public Accountant","Paul Stanton, Corporate Security Advisor","Gwen Colbert, Accounts Receivable Supervisor","Carlos Ramirez, Product Acquisition Manager"],ans:0,exp:"CPAs work with financial data and must keep up with changes in regulations including taxes. The other positions don't require extensive knowledge of tax regulation changes."},
  {q:"A basic reason for the formation of a trade association is to:",opts:["Promote goodwill for an industry","Provide information for consumers","Find solutions for common problems","Establish a long-term group"],ans:2,exp:"Trade associations collectively find solutions to common problems members might have difficulty handling individually. They share knowledge to increase profitability for all members."},
  {q:"Lina joined a professional finance organization to boost job prospects but has gotten no benefit. What should she try to do differently?",opts:["Join a different organization","Introduce herself to more members","Apply for more jobs","Invite her friends to join"],ans:1,exp:"Simply being a member won't build relationships. Introducing herself to more members enables her to build professional relationships and find career opportunities."},
  {q:"What might happen if a company does not establish a chain of command?",opts:["Employees will not know what their responsibilities are","Employees will have higher morale and be more productive","The workplace will have a relaxed and flexible environment","Executives will have more ownership over work"],ans:0,exp:"A chain of command establishes a hierarchy of roles and responsibilities so everyone knows what to do and to whom to report."},
  {q:"Which of the following is a tool that businesses should use to set their overall organizational goals?",opts:["Marketing plan","Mission statement","Financial budget","Productivity benchmarks"],ans:1,exp:"A mission statement defines why the business exists and should guide organizational goal setting. Goals then inform financial budgets, marketing plans, and benchmarks."},
  {q:"Which of the following situations presents a potentially unethical situation in relation to risk management?",opts:["A manager reviews a report and notices a mistake","A business uses software that detects inconsistent data","An employee researches compliance issues affecting the industry","A company executive provides a tax auditor with incomplete information"],ans:3,exp:"Deliberately withholding or providing incomplete information from an auditor is unethical. The other options are all ethical risk management actions."},
  {q:"To secure confidential financial data transmitted through the internet, businesses often use:",opts:["Cross-platform technology","Encryption techniques","Bots","Debuggers"],ans:1,exp:"Encryption transforms information into a secret code so only the intended recipient can read it, preventing unauthorized individuals (like hackers) from obtaining financial data."},
  {q:"How does forming a captive insurance company typically impact a corporation's federal tax liability?",opts:["Increases tax due on the captive's loss reserves","Reduces tax due on the captive's premiums","Increases the corporation's sales tax liabilities","Eliminates the corporation's state tax liabilities"],ans:1,exp:"Forming a captive insurance company can reduce, eliminate, or defer federal taxes due on the corporation's insurance premiums."},
  {q:"Which type of risk is easier to reduce because it can be forecasted?",opts:["Economic","External","Internal","Natural"],ans:2,exp:"Internal risks come from within the organization. Because the organization knows itself, internal risks can be more easily forecasted and controlled than external risks."},
  {q:"Which of the following is a true statement regarding enterprise risk management (ERM)?",opts:["Risks usually relate to relationships between employees","All risks considered in ERM are negative","ERM can make achieving goals more difficult","ERM focuses on the combined impact of all risks"],ans:3,exp:"ERM takes into account all risks an organization faces and looks at their combined impact. Not all risks are negative—positive risks must also be considered."},
  {q:"An organization should include independent members on its board of directors because they:",opts:["Are less likely to act unethically","Represent the interests of management","Understand the company's inner workings","Provide an objective perspective"],ans:3,exp:"Independent members are not involved with the organization. They provide an objective view, keep the board transparent, and help balance out board power."},
  {q:"A human resources manager sets up a computerized system for maintaining employee records. What type of resource is the manager using?",opts:["Human","Financial","Material","Natural"],ans:2,exp:"Material resources are equipment and supplies used in business operations. The computer system is a material resource."},
  // 25E
  {q:"Business expenses that do not vary with changes in sales volume are called __________ expenses.",opts:["Direct","Net","Fixed","Variable"],ans:2,exp:"Fixed expenses (like insurance, taxes, and rent) do not go up or down with changes in sales volume. Variable expenses change as sales volume changes."},
  {q:"What two elements are necessary for effective two-way communication to take place?",opts:["Sharing and understanding","Telling and informing","Words and meaning","Sharing and caring"],ans:0,exp:"Sharing means one sends a message and one reacts to it. Understanding means both sender and receiver grasp the same message."},
  {q:"The most common headings on a stock table include the 52-week high/low, stock symbol, dividend, yield, volume, closing price, net change, and the:",opts:["Price-earnings ratio","Earnings per share","Stockholder's equity","Net income"],ans:0,exp:"The PE ratio (price-earnings ratio) is commonly found on stock tables. Investors study it to determine if a stock is overvalued or undervalued."},
  {q:"As opposed to financial accountants, managerial accountants primarily:",opts:["Report externally","Hire internally","Hire externally","Report internally"],ans:3,exp:"Managerial accounting focuses on reporting financial information internally to aid decision-making. Financial accounting reports externally to investors, lenders, and governing organizations."},
  {q:"Which of the following businesses best represents an innovative entrepreneurial endeavor?",opts:["Opening a new pizza franchise","Developing and selling a new wood-cutting device","Starting a clothing business online","Buying a small local coffee shop"],ans:1,exp:"An innovative entrepreneurial endeavor involves creating or inventing something new. A coffee shop, franchise, or online clothing store sells commonly known products."},
  {q:"A well-prepared new employee orientation program should:",opts:["Outline the employer's specific financial goals","Set aside time to negotiate employees' salary requirements","Communicate the employer's philosophy and expectations","Verify the new employees' job qualifications"],ans:2,exp:"A good orientation communicates the employer's philosophy and behavioral expectations. Job qualifications are verified during interviews; salaries are negotiated before acceptance."},
  {q:"Tank's Trucking Company is focusing on eliminating waste and creating more value with fewer resources. Which methodology is Tank's using?",opts:["Sustainability","Six sigma","Lean","Activity-based costing"],ans:2,exp:"Lean focuses on eliminating wasteful processes that don't add value, increasing implementation speeds and productivity. Six sigma focuses on limiting defects and variability."},
  {q:"Which of the following best describes the purpose of corporate governance?",opts:["To create a favorable image for the company","To make hiring and firing decisions for entry-level employees","To improve relations with company stockholders","To ensure that companies are held to high ethical standards"],ans:3,exp:"Corporate governance holds companies accountable for their behavior and helps organizations avoid financial, legal, and ethical pitfalls."},
  {q:"To stay in business, Tom's pencil company must:",opts:["Have a distribution plan","Make a profit","Employ a sales force","Order more machinery"],ans:1,exp:"A business won't survive unless it makes a profit—the monetary reward for taking the risk involved in investing in a business."},
  {q:"Which of the following would help Erica effectively communicate self-confidence during a job interview?",opts:["Speaking in a very low tone of voice","Making appropriate eye contact with the interviewer","Listening without interrupting","Wearing casual clothes"],ans:1,exp:"Appropriate eye contact demonstrates self-confidence. People who are self-confident aren't afraid to look others in the eye. Low tone suggests timidity; casual clothes shows poor judgment."},
  {q:"Which of the following job tasks is most likely to fall within the finance industry?",opts:["Advertising products","Growing a business","Investigating fraud","Planning a vacation"],ans:2,exp:"Finance involves the management of money—investigating fraud is a finance job. Advertising is marketing; growing a business is entrepreneurship; vacation planning is hospitality."},
  {q:"Using CRM technology and an effective CRM strategy can increase a business's revenues by:",opts:["Raising prices of products","Allowing for a larger sales staff","Lowering prices of products","Providing better customer service"],ans:3,exp:"CRM helps companies understand customer needs, enabling better customer service. It doesn't directly relate to price changes or the size of the sales staff."},
  {q:"Even when things are not going well, Mark still believes everything will work out. Mark has a(n) __________ attitude.",opts:["Positive","Indifferent","Superior","Negative"],ans:0,exp:"A positive attitude focuses on the good side of things. Positive people believe things will work out in the end. Indifferent means lacking interest; superior means feeling above others."},
  {q:"The Farside Corporation wants to motivate employees and improve distribution of wealth. Which tactic should it use?",opts:["Cash incentives","Profit-sharing","Flexible scheduling","Team building"],ans:1,exp:"Profit-sharing improves employee motivation and the distribution of wealth throughout the corporation. Cash incentives, team building, and flexible scheduling don't improve wealth distribution."},
  {q:"A real rate of return on an investment is different from a nominal rate of return in that a real rate of return:",opts:["Less accurately measures investment performance","Does not subtract taxes and inflation","Adjusts profit for the effects of inflation","Is often higher than a nominal rate of return"],ans:2,exp:"The real rate of return adjusts profit for inflation and taxes—making it a more accurate measure than the nominal rate, which is usually higher."},
  {q:"Which of the following is a project that might need to be monitored?",opts:["Fixing up your car","Developing your professional skills","Becoming a better person","Improving customer service"],ans:0,exp:"A project has a distinct beginning and end. Fixing up a car meets this criterion; developing skills, becoming a better person, and improving customer service are ongoing."},
  {q:"A person who is a high achiever is often positively viewed by others as a:",opts:["Leader","Risk-taker","Follower","Show-off"],ans:0,exp:"High achievers are often viewed as leaders because of their strong work ethic and achievements. They take moderate risks to ensure success."},
  {q:"When Gabriela's parents passed away, their assets were transferred to her and taxed based on current market value. This is an example of a(n) __________ tax.",opts:["Estate","Tax","Excise","Income"],ans:0,exp:"An estate tax is placed on the transfer of assets from a deceased person to a beneficiary."},
  {q:"We need creativity in communication because:",opts:["Not everyone communicates the same way","People get tired of usual communication methods","Email makes communication very difficult","Most people don't know how to communicate"],ans:0,exp:"Not everyone communicates the same way—cultural differences in nonverbal communication require creative approaches when sending and receiving messages."},
  {q:"Employees who serve customers efficiently help control expenses by:",opts:["Decreasing volume","Reducing complaints","Improving morale","Increasing returns"],ans:1,exp:"Professional customer service reduces complaints, and handling complaints is an expense to the business. Efficient service saves money by preventing complaint costs."},
  {q:"Why is it important for a person pursuing any business career to develop self-confidence?",opts:["The business field is very competitive","Managing others requires leadership skills","It helps a person become trustworthy","Complex financial concepts are challenging"],ans:0,exp:"Self-confidence helps people handle setbacks and persist toward career goals in a competitive field."},
  {q:"Social responsibility should be part of the objectives of __________ businesses.",opts:["All","Specialized","Nonprofit","Government"],ans:0,exp:"Social responsibility is the duty of businesses to contribute to the well-being of society—this applies to all businesses."},
  {q:"Which of the following is a type of credit card that can be used at a variety of participating businesses?",opts:["Retail store","Bank","Hotel","Petroleum"],ans:1,exp:"Bank credit cards can be used at any affiliated business. Retail store, hotel, and petroleum cards are issued by individual companies and can only be used at their facilities."},
  {q:"What should you do if a financial client reports a problem with their portfolio?",opts:["Waive the client's fees for their next five transactions","Apologize and resolve the problem immediately","Call the client back later after they've calmed down","Ask the manager to return the client's call"],ans:1,exp:"Finance professionals build loyalty by resolving problems immediately. Waiting makes clients more upset."},
  {q:"Which of the following is a loss prevention technique a hotel might use to protect itself against theft?",opts:["Crisis management plans","Fire sprinklers","Security cameras","Carbon monoxide detectors"],ans:2,exp:"Video surveillance (security cameras) is used to prevent theft. Fire sprinklers and carbon monoxide detectors address other risks."},
  {q:"Which of the following is a common challenge for financial-information management?",opts:["Managerial accountants prepare info for external stakeholders","Many financial data are stored in custom, task-specific software and are not easily accessible","Financial-information management focuses on protecting customer data","Financial managers typically use Microsoft Office for recordkeeping"],ans:1,exp:"Many companies house financial data in custom, task-specific software, making it difficult for others to access without that specialized software."},
  {q:"Lower premiums and the ability to control the claims process are advantages of:",opts:["Traditional liability insurance policies","Standard insurance companies","Reinsurance carriers","Captive insurance companies"],ans:3,exp:"Organizations that form their own captive insurance companies control premium rates and the claims process."},
  {q:"Which of the following is an example of an internal control mechanism impacting an organization's governance?",opts:["Compliance laws","Regulatory guidelines","Union contracts","Segregation of duties"],ans:3,exp:"Segregation of duties is an internal control mechanism dividing responsibilities so no one person has excessive power. Compliance laws and regulatory guidelines are external."},
  {q:"A company does not emphasize fairness and respect. Which risk is most likely to occur?",opts:["Employees will be at risk of injury","Unhappy employees might leave the company","The company might go bankrupt","Important details might slip through the cracks"],ans:1,exp:"When employees feel treated unfairly, they may not want to continue contributing. Employee turnover presents many problems."},
  {q:"Why do stock prices tend to fall during a recession?",opts:["Sponsorships become more common","Unemployment decreases","Profits are expected to drop","Bonds are a less stable investment"],ans:2,exp:"During a recession, profits are generally anticipated to drop, making stocks less valuable."},
  {q:"When a customer complains about a product, the employee should:",opts:["Ask the manager to answer the complaint","Ask another employee to handle the situation","Handle the complaint according to company policy","Defend themselves"],ans:2,exp:"Over 90% of customer complaints can be corrected immediately by the employee, who should handle it per company policy."},
  {q:"An annual audit is an example of a __________ internal control.",opts:["Detective","Reconciliation","Preventative","Corrective"],ans:0,exp:"Detective controls (like annual audits) identify existing financial problems. Preventive controls prevent errors; corrective controls fix errors after identification."},
  {q:"Which of the following is categorized as owner's equity on a company's balance sheet?",opts:["Capital equipment","Accounts receivable","Inventory","Retained earnings"],ans:3,exp:"Retained earnings are a component of owner's equity. Inventory and accounts receivable are current assets; capital equipment is a long-term asset."},
  {q:"Production processes that rely heavily on expensive equipment and materials are __________ processes.",opts:["Standardized","Intermittent","Capital-intensive","Labor-intensive"],ans:2,exp:"Capital-intensive processes rely on expensive equipment rather than workers (e.g., power generation plants)."},
  {q:"When a business uses its budget to monitor and avoid excessive spending, it is using the budget as a(n):",opts:["Financial control tool","Business plan","Operating plan","Performance evaluation"],ans:0,exp:"Using a budget to monitor spending activities and ensure a department doesn't exceed its planned budget is using it as a financial control tool."},
  {q:"An insurance company is different from a bank in that an insurance company:",opts:["Accepts short-term deposits and makes long-term loans","Is not considered a financial institution","Is part of a centralized clearing and payment system","Insures its customers against certain risks"],ans:3,exp:"Insurance companies insure customers against certain risks in exchange for premiums. Banks accept short-term deposits and are part of the clearing/payment system."},
  {q:"By installing firewalls on its computer networks, a business can protect customers' credit card information from:",opts:["Investment scams","Tax evasion","Trade barriers","Identity theft"],ans:3,exp:"Firewalls protect computer networks from unauthorized users (hackers) trying to steal financial information—identity theft."},
  {q:"Which of the following is an example of an uninsurable risk?",opts:["Fire","Business interruption","Customer buying habits","Personal injury"],ans:2,exp:"Buying habits can change quickly and unpredictably, so insurance companies won't assume coverage. Fire, business interruption, and personal injury are insurable."},
  {q:"By using a central data repository for financial information, companies receive:",opts:["Up-to-date data","Slower responses to queries","Less predictability","Inconsistent data"],ans:0,exp:"Central data repositories keep data up to date and consistent, and provide faster responses to queries."},
  {q:"Zoe wants $600 in 2 years. Her account earns 3% quarterly interest. How much should she invest?",opts:["$565","$637","$574","$715"],ans:0,exp:"PV = 600 / [1 + (0.03/4)]^(4×2) = 600 / (1.0075)^8 = 600 / 1.062 ≈ $565"},
  {q:"Peyton asks Ann to write a letter of recommendation to a potential employer. Which networking technique is Peyton using?",opts:["Opportunistic","Organizational","Grapevine","Referral"],ans:3,exp:"Asking an influential person to write a formal recommendation to a potential employer is referral networking."},
  {q:"Which of the following tasks falls under the scope of compliance?",opts:["Meeting clients' financial needs","Creating financial legislation","Advertising new financial products","Designing organizational controls"],ans:3,exp:"Compliance includes designing controls—mechanisms and rules for guiding financial professionals."},
  {q:"A student group suggests a university hold a concert with a controversial banned band. What risk management should the university undertake?",opts:["Transfer liability through a contract holding the band liable","Cover the risk in the event budget","Purchase insurance transferring risk to the insurance company","Avoid the risk by contracting with another band"],ans:3,exp:"The best management is to avoid the risk by choosing another band, avoiding negative publicity."},
  {q:"Corporate governance is primarily concerned with __________ desires.",opts:["CEO","Competitor","Vendor","Stakeholder"],ans:3,exp:"Corporate governance revolves around balancing the desires of all stakeholders—customers, financiers, the community, the government, and managers."},
  {q:"An employee accidentally learns several coworkers will be fired. What should the employee do?",opts:["Report it to managers","Tell the coworkers","Verify the information","Keep it confidential"],ans:3,exp:"Employees sometimes learn unintended confidential information. Repeating it may harm the business or employees."},
  {q:"The main objective of using marginal analysis in decision-making is to determine whether a business activity will result in:",opts:["Net revenue smaller than marginal revenue","Net revenue larger than marginal revenue","Marginal revenue equal to or greater than marginal cost","Marginal expense greater than marginal cost"],ans:2,exp:"Marginal analysis determines if marginal revenue will equal or exceed marginal cost—identifying profitable options."},
  {q:"Which of the following is an ethical issue resulting from internal risks?",opts:["Selecting an insurance company that considers fines a cost of doing business","Boycotting an insurance company with a reputation for not correcting mistakes","Providing incomplete data for audits","Revealing discounted expenses"],ans:2,exp:"Providing incomplete data for audits is unethical and risks the company's credibility with stakeholders."},
  {q:"Which of the following statements about a board of directors is true?",opts:["Internal board members are not usually paid extra for their work with the board","A board of directors is nominated by shareholders","A board member won't be removed for breaking foundational rules","Every private company must have a board of directors"],ans:0,exp:"Internal board members are often already high-ranking executives or key stakeholders and aren't usually compensated additionally. Only public companies must have a board."},
  {q:"Which of the following is a true statement about stock information resources?",opts:["It is very difficult to find stock information","There are very few stock information sources","Only wealthy investors have access to stock information","It has never been easier to find stock information"],ans:3,exp:"A few years ago only professionals had access to in-depth stock info. Now there's a wealth of easy-to-find information available to individual investors."},
  {q:"Which would be most relevant as a short-term financial goal for a high school student like Timothy?",opts:["Put $10,000 into a college savings account","Save $50 for Christmas presents for his family","Plan to become a senior-level executive by age 30","Set $5,000 aside per year for retirement"],ans:1,exp:"Short-term goals are completed in days, weeks, or months. Saving $50 for an upcoming holiday is a short-term goal."},
  {q:"Dmitri is building a new website. What does he need to register to obtain a web address?",opts:["Site builder","Domain name","Street address","Web host"],ans:1,exp:"The domain name is the unique address of a website."},
  {q:"Accepting blame for failure and credit for success is an indication of a person's:",opts:["Interpersonal skills","Consideration","Responsibility","Initiative"],ans:2,exp:"Responsible individuals are accountable for things within their control."},
  {q:"Employees from different departments join a group to solve production process problems. This is an example of a:",opts:["Standing committee","Product team","Quality circle","Short-term committee"],ans:2,exp:"A quality circle is a problem-solving group of coworkers who study situations and recommend solutions to management."},
  {q:"What must a business be organized to do to contribute to society?",opts:["Preserve the environment","Sell an idea","Hire an advisor","Earn a profit"],ans:3,exp:"If businesses don't earn a profit, they won't be able to contribute to society through jobs, charitable donations, or community support."},
  {q:"Which technique could a business use to analyze customer financial information?",opts:["Determining who exceeded sales quotas","Discovering which products sold the most","Comparing profit ratios by region","Tracking average product shipping delays"],ans:2,exp:"Comparing profit ratios by region tells the business which market segments are most profitable."},
  {q:"Which most accurately describes the overall purpose of accounting?",opts:["To estimate and pay taxes","To keep track of expenses","To maintain financial information","To keep track of income"],ans:2,exp:"The primary purpose of accounting is to accurately record and maintain all financial transactions."},
  {q:"Which of the following is a true statement about carrying out scanning activities?",opts:["Information obtained from TV is unreliable","You must focus only on relevant information","You should avoid using surveys and focus groups","All information should be obtained formally"],ans:1,exp:"When conducting an environmental scan, focus only on relevant information to avoid overload."},
  {q:"Troy met Melissa at a neighbor's cookout and exchanged cards to discuss business. In what type of situation did they form a professional relationship?",opts:["Formal event","Social gathering","Corporate environment","Educational setting"],ans:1,exp:"Professional networking can occur under various circumstances, including social gatherings like a cookout."},
  {q:"XRT Corporation measures how efficiently management uses accounts receivable, inventory, and capital goods to generate sales. What type of financial ratio is being calculated?",opts:["Profitability","Asset utilization","Market value","Liquidity"],ans:1,exp:"Asset-utilization ratios help businesses determine if they're using their assets, inventory, and cash most effectively."},
  {q:"Which is an important step to ensure a protest is peaceful and effective?",opts:["Argue against any opponents","Demonstrate importance by using harsh language","Obtain your senator's permission before assembling","Avoid violence and vandalism during the protest"],ans:3,exp:"To effectively communicate your message, avoid insults, violence, and vandalism."},
  {q:"Patents, trademarks, and copyrights are all used to protect an individual or company's:",opts:["Intellectual property","Business equipment","Tangible assets","Financial assets"],ans:0,exp:"Intellectual property refers to intangible assets resulting from thinking processes. Patents, trademarks, and copyrights protect exclusive use of intellectual property."},
  {q:"When determining whether to approve a customer's loan application, a financial institution evaluates the customer's:",opts:["Employment opportunities","Payment plan","Credit score","Personal goals"],ans:2,exp:"Credit scores reflect payment history and are a key factor in loan decisions."},
  {q:"Businesses often evaluate and change their policies as a result of __________ customers.",opts:["Satisfying their","Getting feedback from","Acquiring new","Creating good relations with"],ans:1,exp:"Feedback from customers helps businesses decide if policies need revision."},
  {q:"Managerial accounting is different from financial accounting because managerial accounting:",opts:["Is a requirement for all companies","Prepares reports for external users","Takes a future approach","Provides more general results"],ans:2,exp:"Managerial accounting takes a future approach; financial accounting reviews historical data."},
  {q:"Which of the following is a specific goal?",opts:["Increasing sales","Reducing costs by 5%","Improving customer satisfaction","Finding more customers"],ans:1,exp:"Reducing costs by 5% is specific and measurable."},
  {q:"Molly wants to avoid losing her money in a scam. Which opportunity should she avoid?",opts:["The stock market","Ponzi scheme","Roth IRA","401k"],ans:1,exp:"A Ponzi scheme is an investment scam promising high returns with little risk."},
  {q:"Jonas eliminates redundant data from his firm's databases. Jonas is performing:",opts:["Data filtering","Information scanning","Data normalization","Digital analysis"],ans:2,exp:"Normalization efficiently organizes database data, with two goals: eliminating redundant data and ensuring data is stored logically."},
  {q:"Why should an independent consultant avoid using email to share a negative IT company evaluation with a client?",opts:["Using email creates reputational risk if it is shared with others","It is illegal to share negative information via email","The email would legally be considered intentional slander","The email would make them appear negative and judgmental"],ans:0,exp:"Email can easily be intercepted and shared."},
  {q:"One benefit of using technology in compliance is that technology is typically more __________ than manual compliance processes.",opts:["Costly","Time-consuming","Efficient","Error prone"],ans:2,exp:"Technology makes compliance more efficient. Manual compliance processes are more costly, more time-consuming, and more error prone."},
  {q:"Self-control can help you develop a positive attitude by helping you:",opts:["Dwell on the fact that life is full of difficulties","Substitute positive thoughts with negative ones","Think before you make a response","Eliminate negative ways of thinking"],ans:3,exp:"Using self-control to eliminate negative ways of thinking and replace them with positive ones directly develops a positive attitude."},
  {q:"Publicly traded companies are required by law to provide:",opts:["Stock research","Yearly newsletters","Company report cards","Financial statements"],ans:3,exp:"Publicly traded companies are required by law to provide financial statements to shareholders every 90 days."},
  {q:"Which of the following represents a primary business activity?",opts:["Supervising","Marketing","Scheduling","Designing"],ans:1,exp:"Marketing is a primary business activity (along with financial analysis, HR management, information management, operations, and strategic management)."},
  {q:"If a leader takes ownership of a problem, ensures it is fixed, and prevents it from happening again, they are demonstrating:",opts:["Flexibility","Responsibility","Social awareness","Adaptability"],ans:1,exp:"Responsibility means fulfilling obligations in a dependable, reliable manner—taking ownership of problems, fixing them, and preventing recurrence."},
  {q:"What does 'equity' refer to in a statement of changes in equity?",opts:["Property","Earnings","Debt","Expenses"],ans:1,exp:"A statement of changes in equity shows how owner's retained earnings have changed due to profits, dividends, and other factors. Equity refers to earnings."},
  {q:"What usually decreases when the economy is experiencing a period of contraction?",opts:["Interest rates","Consumer spending","Cost of living","Unemployment"],ans:1,exp:"During contraction, consumer spending decreases. Unemployment and interest rates increase."},
  {q:"Shireen is determining if data in an article is accurate and current. Shireen is evaluating the:",opts:["Research procedure","Hardware application","Quality of information","Type of statistics"],ans:2,exp:"For information to be useful it must be accurate and current. Evaluating whether it is relevant, accurate, and current is evaluating its quality."},
  {q:"Which statement about convergence and consolidation in the finance industry is true?",opts:["Financial companies often enjoy higher earnings as a result","When multiple firms merge, they end up with less capital to invest","A desire for lower costs has slowed convergence and consolidation","Technological advancements have increased costs of new products"],ans:0,exp:"Financial companies often enjoy higher earnings from convergence/consolidation. Merging typically increases capital."},
  {q:"Which technology is frequently used as a source for master data management in the finance industry?",opts:["ERP (Enterprise Resource Planning)","SutiExpense Application","Accounting systems","Databases"],ans:0,exp:"ERP integrates all data and processes into a unified system using a unified database."},
  {q:"Corporate stocks, long-term government securities, state and local government bonds, and bank commercial loans are traded on the __________ market.",opts:["Spot","Capital","Debt","Money"],ans:1,exp:"Longer-term securities (more than 1 year) are traded on the capital market."},
  {q:"Which of the following has accelerated the globalization of financial markets?",opts:["An expansion of protectionism practices","The movement toward fixed exchange rates","The reduction of government regulations","A decrease in foreign access to domestic markets"],ans:2,exp:"Liberalization and deregulation (reducing government regulations) enable capital to flow more freely."},
  {q:"What do bond yields typically do during an economic expansion?",opts:["Remain unchanged","Gradually decrease","Drop to near zero","Increase"],ans:3,exp:"During economic expansion, production, employment, income, and interest rates rapidly increase, pushing bond yields up."},
  {q:"Lynnette's primary job at Main Street Bank is determining if the bank should lend funds to customers. Lynnette is working as a:",opts:["Bank agent","Collections officer","Chartered financial consultant","Credit analyst"],ans:3,exp:"Credit analysts research and confirm loan applicants' employment, income, and credit history to determine if the bank should lend funds."},
  {q:"What could Andreas do to encourage and support Calliope during her presentation?",opts:["Avoid eye contact and act preoccupied","Laugh and smile at everything Calliope says","Nod, smile, and maintain eye contact","Look down at the papers in front of him"],ans:2,exp:"Nodding, smiling, and maintaining eye contact demonstrates that the listener respects and values what the speaker says."},
  {q:"In 1970, $7,000/year was comfortable. Today it's below the poverty line. What accounts for this change?",opts:["Interest rates","Deflation","Compound interest","Inflation"],ans:3,exp:"Inflation is the steady increase in the price of goods and services over time, reducing purchasing power."},
  {q:"Which technology has proven very successful in creating 'what-if' scenarios in the finance industry?",opts:["Account reconciliation","Digital dashboards","Financial reporting and consolidation","Time value of money calculators"],ans:1,exp:"Digital dashboards deliver 'what-if' scenarios based on handpicked combinations of monthly data."},
  {q:"Mapping, analyzing, redesigning, acquiring resources, and implementing are steps companies follow when attempting to:",opts:["Start an advertising campaign","Educate the public on their work","Attract more talented workers","Streamline work processes"],ans:3,exp:"Streamlining a work process involves mapping the current process, analyzing it, redesigning it, acquiring necessary resources, and implementing the change."},
  {q:"One activity of professional organizations and trade associations is to:",opts:["Develop wage regulations","Test products","Influence legislation","Establish customer trends"],ans:2,exp:"Professional organizations and trade associations frequently employ lobbyists to influence legislative decisions affecting their members."},
  {q:"At the annual staff meeting, the sales manager announces the bonus system is suspended due to poor performance. What communication style is the manager using?",opts:["Indirect","Casual","Formal","Grapevine"],ans:2,exp:"Formal communication takes place through established channels like a staff meeting and involves serious topics like pay changes."},
  {q:"Your boss asks you to prepare a report on current market trends. What is the most efficient way to obtain information?",opts:["Customer interviews","Online research","A customer survey","Library research"],ans:1,exp:"Online research is the most convenient and efficient method. Search engines provide access to current information in many formats."},
  {q:"A main goal of customer experience management is creating:",opts:["Higher employee salaries","Word-of-mouth promotion","New products","Innovative technology"],ans:1,exp:"CEM aims to create word-of-mouth promotion and referrals (customer advocacy)."},
  {q:"Which statement contains the most relevant information for a report on market share of computer manufacturers in a specific time frame?",opts:["Pear Computers held the fifth highest market share in 2024","The CPU Company, Best Desktop, Pear, and Bell sold more in 2024 than others","In 2024, The CPU Company held 27.6% of market share, followed by Best Desktop at 24.3%","In 2024, The CPU Company shipped more computers than Best Desktop or Pear"],ans:2,exp:"Specific percentage amounts for a specific year provide the most detailed information about market share during a particular time frame."},
  {q:"Whenever Nasra makes a difficult decision, she considers how her actions might affect other people and their feelings. She has developed higher:",opts:["Ethics","Wages","Productivity","Profit margins"],ans:0,exp:"Considering how actions affect others' feelings is showing empathy, which leads to higher ethics."},
  {q:"Which of the following is an example of information a manufacturing company keeps about its customers?",opts:["Expense reports","Invoices","Tax returns","Payroll reports"],ans:1,exp:"Invoices are formal records of sales that track customer purchasing habits."},
  {q:"How can you make it easier to start the budgeting process by arranging and making sense of financial data?",opts:["Use budgeting software","Track transactions on paper","Refrain from involving others","Focus on the big picture"],ans:0,exp:"Budgeting software organizes all data in one place and makes it easier to track expenses."},
  {q:"One method a business can use to prevent theft by employees and customers is to:",opts:["Establish a floor limit","Hire security guards","Purchase liability insurance","Take frequent inventories"],ans:1,exp:"Security guards deter theft by walking through the business or positioning at exits."},
  {q:"A company's corporate governance is most often impacted by __________ expectations.",opts:["Employee","Digital","Stakeholder","Legal"],ans:2,exp:"Corporate governance structures are influenced by stakeholder expectations (investors, customers, government, etc.)."},
  // 2025 ICDC Exam questions
  {q:"Even though things don't always go her way, Kara is able to keep things in perspective and see the lighter side of any situation. Kara is adaptable and",opts:["Demonstrates confidence","Has a sense of humor","Practices self-corrective behavior","Takes risks"],ans:1,exp:"A sense of humor can help you adapt to life's hurdles without breaking a sweat. Adaptable people like Kara are able to keep things in perspective and see the lighter side of any situation."},
  {q:"Nani has $500 in an emergency fund, $2,000 in savings, and $500 on a high-interest credit card. What financial goal should she tackle first?",opts:["Save $500 for a down payment on a home","Pay off her credit card by the end of the year","Add more money to her emergency fund","Sign up for a lower interest credit card in six months"],ans:1,exp:"Nani should prioritize paying off the high-interest credit card first, as it will help her eliminate debt. Adding to savings and emergency fund are secondary."},
  {q:"Which of the following is a deposit-taking financial institution?",opts:["Insurance company","Mortgage company","Investment firm","Credit union"],ans:3,exp:"Credit unions, commercial banks, and savings and loan associations are types of deposit-taking financial institutions. Mortgage companies, insurance companies, and investment firms are non-deposit taking."},
  {q:"Occupations like auditor, bookkeeper, and controller typically fall under which of the following career fields?",opts:["Corporate finance","Insurance","Banking services","Accounting"],ans:3,exp:"Careers in accounting involve recording, classifying, summarizing, analyzing, and communicating a business's financial information. Auditor, bookkeeper, and controller fall under accounting."},
  {q:"Johnny buys a share of Apple on the New York Stock Exchange. This is an example of the __________ market.",opts:["Foreign exchange","Futures","Primary","Secondary"],ans:3,exp:"The secondary market is the stock market where investors buy and sell securities that have been issued. The primary market is where securities are created."},
