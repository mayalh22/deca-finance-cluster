  {q:"Which of the following statements is true of quality control?",opts:["It doesn't require much planning to implement.","It's necessary only for large businesses.","It consists mostly of common sense procedures.","It must be measured in some way to be effective."],ans:3,exp:"To truly monitor quality control progress, it's important to have a measurement system in place. Quality control is important for businesses of all sizes and is not simply common sense."},
  {q:"In order to manage your time effectively, all of the things that you want to accomplish should first be:",opts:["identified.","classified.","scheduled.","prioritized."],ans:0,exp:"An essential step in effective time management is to identify all of your required activities. These can then be classified, prioritized, scheduled, and finally performed."},
  {q:"Austin has discovered he has an aptitude for communications and public relations and enjoys talking in front of people. He has decided he wants to go into public speaking. Austin has demonstrated:",opts:["choosing an appropriate career.","helping to understand other people.","obtaining feedback from others.","establishing a value system."],ans:0,exp:"Choosing a career is done by deciding which career matches one's abilities and aptitudes. Austin matched his aptitude for communications with a career in public speaking."},
  {q:"Connor thinks he may be interested in pursuing a career as an insurance underwriter. He accessed a government website that provided information about educational requirements, typical job responsibilities, salary ranges, and:",opts:["programming needs.","career goals.","employment outlook.","testing tips."],ans:2,exp:"Government websites like the Occupational Outlook Handbook provide information about educational requirements, typical job responsibilities, salary ranges, and employment outlook."},
  {q:"Which of the following would be out of place in a follow-up letter after a job interview?",opts:["A desire to be hired for the job","A comment about the work of the business","A question about salary or benefits","A reference to the applicant's qualifications"],ans:2,exp:"Questions about salary and benefits should be discussed during the job interview. The follow-up letter's main purpose is to thank the interviewer. Salary questions are inappropriate in a follow-up."},
  {q:"Jan is sending her résumé to QRS Industries because her friend told her the company plans to hire several new salespeople. This is an example of:",opts:["managing.","networking.","directing.","linking."],ans:1,exp:"Networking involves communicating with people you know who might help with career opportunities. Jan acted on a tip from a friend, connecting with another person to further her career goals."},
  {q:"Which of the following job duties belong to a person who works in corporate finance?",opts:["Budgeting, financial planning, and implementing capital structure","Delivering products that transfer risk from customers to the company","Accepting deposits, lending funds, and extending credit","Dealing with cash management, short-term investments, and mortgages"],ans:0,exp:"Corporate finance manages capital structure, budgeting, financial planning, acquisition and investment, funding, dividends, and taxation. Insurance delivers risk-transfer products; banking accepts deposits."},
  {q:"Who typically reviews and approves the guidelines for running a corporation, also known as corporate governance policies?",opts:["The management team","The shareholders","The board of directors","The investors"],ans:2,exp:"A corporation's board of directors is responsible for approving and reviewing corporate governance policies. Shareholders, management, and investors are affected by these rules but don't approve them."},
  {q:"In which of the following ways can employees contribute to the achievement of governance objectives?",opts:["Create policies to enforce objectives","Draft bylaws that all must follow","Provide feedback to improve objectives","Report progress to shareholders"],ans:2,exp:"The board of directors should obtain feedback from employees about the company's direction. This helps improve governance objectives and aligns them with the company's vision."},
  {q:"What is the relationship between shareholders and the board of directors?",opts:["The board of directors holds the shareholders accountable.","The shareholders pay dividends to the board of directors.","The shareholders make decisions for the board of directors.","The board of directors represents the shareholders."],ans:3,exp:"A company's board of directors represents the interests of shareholders through management of the company. Shareholders often elect board members and hold the board accountable."},
  {q:"Good governance is most likely to make a company's investment decisions:",opts:["more ethical.","subject to individuals' influence.","less regulated.","more vulnerable to outside risk."],ans:0,exp:"Governance objectives are often based on integrity and ethical principles. Strong governance makes investment decisions more ethical and less vulnerable to individual influence or risk."},
  {q:"An example of a trade organization is the:",opts:["Lions Club.","Civitan Club.","Retail Merchants Association.","American Management Association."],ans:2,exp:"The Retail Merchants Association is a national trade association. The Lions Club and Civitan Club are service organizations. The American Management Association is a professional organization."},
  {q:"Which of the following professional relationships is most likely to be successful?",opts:["A real estate agent and an insurance broker refer clients to each other.","An investment planner takes donuts to a tax accountant every Monday.","A trust officer sends birthday and holiday cards to her clients.","Competing financial planners socialize at professional association meetings."],ans:0,exp:"Relationships are most successful when everyone benefits substantially. Referring clients to each other is mutually beneficial, making it more likely to result in enduring relationships."},
  {q:"Which of the following is an example of an unethical activity that relates to risk management?",opts:["Issuing bonds to raise funds for a corporation","Requesting various documents to process a loan request","Withholding information from insurance underwriters","Using third-party debt collectors to obtain overdue payments"],ans:2,exp:"Withholding information that may affect the approval of an insurance application or the compensation for a claim is unethical behavior in the risk management/insurance field."},
  {q:"Using appropriate software to protect confidential data stored on a company's computer systems is an important part of managing:",opts:["natural disasters.","security risks.","physical safety risks.","environmental hazards."],ans:1,exp:"Businesses control security risks by installing firewalls and security software to prevent computer hackers from obtaining confidential financial data. Natural disasters and physical safety risks are separate categories."},
  {q:"CopyIt Printing Company discovered that two new drivers it hired had numerous prior traffic violations while employed elsewhere. To avoid hiring unsafe drivers in the future, the company should:",opts:["mandate drug testing for all employees on a monthly basis.","conduct background checks on job applicants.","require delivery drivers to take a driving exam every six months.","ask job applicants about their former employers during the interview process."],ans:1,exp:"Background checks verify previous employment and driving records. Applicants are unlikely to discuss unfavorable past work experiences during an interview, so background checks are essential."},
  {q:"Which of the following statements regarding internal control systems is true?",opts:["Internal controls are a component of enterprise risk management.","The purpose of an internal control system is to eliminate risk.","Many companies use internal control systems instead of risk management.","If a company has an internal control system, monitoring and reporting are unnecessary."],ans:0,exp:"An internal control system is one key component of enterprise risk management (ERM). Internal controls reduce but cannot eliminate all risk. Risk management and internal controls work together."},
  {q:"The Davis Company requires customers to provide banking information each time they pay by phone, causing late payments and brand damage. Which action should the company take to best manage its legal, financial, IT, and brand risks?",opts:["Eliminate the pay-by-phone option and require customers to mail payments to a P.O. Box.","Send letters explaining how the current payment policy protects customers' personal information.","Develop a way to encrypt and store customers' bank information in the company database for future use.","Encourage customers to set up automatic electronic payments, eliminating the need to store the information."],ans:2,exp:"Encrypting and storing bank information eliminates some risk while making the payment process easier, reducing lost revenue and increasing customer satisfaction."},
  {q:"Colleen, a mid-level manager, has the personality and communication skills to motivate others toward the company's goals. Colleen can make the best use of these skills in which management function?",opts:["Organizing","Controlling","Staffing","Directing"],ans:3,exp:"Directing is the management function of providing guidance to workers and work projects. Organizing sets up how work will be done; controlling monitors work effort; staffing finds workers."},

  // ── SAMPLE EXAM 15E ──
  {q:"Business A's failure to keep an agreement to supply Business B with a certain good or service is an example of a situation that is covered by __________ law.",opts:["trade","antitrust","contract","property"],ans:2,exp:"Contract law recognizes voluntary promises that must be fulfilled. If Business A fails to honor its agreement with Business B, Business A is in breach of contract."},
  {q:"A debtor-creditor relationship exists when:",opts:["interest is charged.","a sale is paid in full.","a contract is invalidated.","stocks are liquidated."],ans:0,exp:"When an individual or business charges interest on money that another borrows, a debtor-creditor relationship exists. A paid-in-full sale does not establish such a relationship."},
  {q:"Walt purchased stock based on false information from an online message board. Scammers bought the stock, hyped it online, then sold at the peak, leaving Walt with worthless stock. Walt was the victim of:",opts:["pump and dump.","a pyramid scheme.","affinity fraud.","phishing."],ans:0,exp:"Pump and dump involves buying a small stock, hyping it to other investors to drive the price up, then selling at the peak, leaving victims with a worthless stock."},
  {q:"Mr. McKinney gave a portion of his wages to a local charity and was not required to pay taxes on that amount. This is an example of a(n):",opts:["estate allocation.","tax deduction.","tax-deferred investment.","investment disbursement."],ans:1,exp:"The government does not require individuals and businesses to pay tax on income given to charity. This is a tax deduction. Tax-deferred investments are taxed at disbursement."},
  {q:"After finding inconsistencies with its financial data, the MSV Company hired a compliance officer to monitor financial processes and ensure regulatory compliance. What type of internal control has the business implemented?",opts:["Product","Preventative","Corrective","Conditional"],ans:2,exp:"Corrective controls fix a problem that has already been detected. Hiring a compliance officer after detecting data inconsistencies is a corrective action. Preventative controls keep something from happening before it occurs."},
  {q:"To be most effective, continuous-inspection compliance technology should have access to transactional information:",opts:["at its source.","biweekly.","samples.","liquidity ratios."],ans:0,exp:"To prevent an intermediary from tampering with transactional data, continuous-inspection compliance technology must have access to the information at its source as transactions actually occur."},
  {q:"What question should Tyrone ask when looking for valid sources for his business class research paper?",opts:["Do I agree with the viewpoint of this author?","Is this material interesting and easy to read?","Does this source provide relevant graphic aids?","Is the information in this source up to date?"],ans:3,exp:"In a field like business, recent information is important. Tyrone should not let personal biases affect which sources he includes. Graphic aids are nice but not essential for validity."},
  {q:"Theresa carefully follows written directions for an assignment. As she finishes the last step, she realizes her work in step two may not be exactly right. What should she do?",opts:["Ask her supervisor to clarify the directions","Turn in her work quickly so her supervisor can identify corrections","Restart the assignment working off her new thought for step two","Email her work to three coworkers to get their opinions"],ans:0,exp:"If there is concern about the assignment directions, Theresa needs to get clarification from her supervisor. It is better to finish correctly than submit work that doesn't meet the supervisor's intent."},
  {q:"Jack says to Wendi, 'If I understand you correctly, you are saying that you want to change the format of the inventory report so it will be easier for the managers to analyze.' What communication technique is Jack using?",opts:["Passive listening","Expressing an opinion","Paraphrasing","Quoting"],ans:2,exp:"Paraphrasing involves restating a message in other words to confirm the recipient's understanding. Quoting uses the speaker's exact words."},
  {q:"What is the purpose of developing and using graphics in business reports?",opts:["To communicate information","To entertain the audience","To fill up the page layout","To highlight reference material"],ans:0,exp:"The purpose of using graphics in business reports is to communicate information—to explain complex information or highlight the most important content."},
  {q:"Which of the following is a formatting characteristic of a full-block business letter?",opts:["Indented first paragraph","Double-spacing within the paragraph","No paragraph indents","All paragraphs use right justification."],ans:2,exp:"In full-block format, all components use left justification and writers do not indent the first sentence of each paragraph. Single-spacing is used within paragraphs."},
  {q:"Which of the following is an example of persuasive messages that businesses write?",opts:["Electronic mail","Collection letter","Handwritten note","Interoffice memo"],ans:1,exp:"A collection letter is a persuasive message that businesses write to delinquent customers to convince them to send payment or contact the business to make an arrangement."},
  {q:"A characteristic of a simple written report is that it usually is:",opts:["abstract.","formal.","short.","detailed."],ans:2,exp:"Simple written reports present basic information in an abbreviated form so recipients can read it quickly. They are informal, address issues simply, and provide basic rather than detailed information."},
  {q:"Three types of communication usually found in a business with a formal communication network are:",opts:["informational, official, and conversational.","grapevine, informal, and standard.","upward, horizontal, and diagonal.","downward, upward, and lateral."],ans:3,exp:"Formal communication moves in three directions: downward (management to employees), upward (employees to management), and lateral (between staff on the same level)."},
  {q:"Which of the following is most likely to happen to employees who are discourteous to the business's customers?",opts:["They may be promoted.","They may be fired.","They may win an award.","They may lose their benefits."],ans:1,exp:"More people lose their jobs because they can't get along with other people than for any other reason. Establishing positive customer relations is essential; employees who damage these relations risk being fired."},
  {q:"Businesses benefit when employees handle customer inquiries in an effective manner because:",opts:["customers feel the need to ask more questions.","customers feel free to return products.","customers' confidence in the business increases.","customers' total purchases are reduced."],ans:2,exp:"Customers' confidence grows when businesses provide accurate answers. Knowledgeable staff give customers confidence in the products, and total purchases are more likely to increase."},
  {q:"What should help businesspeople adapt their communication styles to appeal to clients from other cultures?",opts:["Being patient, flexible, and empathetic","Being confident, biased, and manipulative","Being sensitive, transparent, and demanding","Being respectful, indifferent, and honest"],ans:0,exp:"Adapting communication styles requires businesspeople to be patient, flexible, empathetic, respectful, honest, confident (but not overly so), and sensitive to clients' cultures and customs."},
  {q:"When providing services to clients, financial professionals have the responsibility to supply:",opts:["payment options.","accurate information.","credit counseling.","bank statements."],ans:1,exp:"Financial professionals often invest money for clients and should provide accurate information about investment performance. Not all financial professionals offer payment options, credit counseling, or bank statements."},
  {q:"Customer Relationship Management (CRM) data are sometimes called 'perishable' data because the data:",opts:["may be non-standardized or unformatted.","are often duplicated.","can become inaccurate over time.","often contain junk or garbage."],ans:2,exp:"CRM data are 'perishable' because while true when recorded, they are likely to become inaccurate over time. For example, someone's address or phone number may change."},
  {q:"Which of the following statements about economic resources is true?",opts:["All economic resources are limited.","All natural resources can be replaced.","Economic resources are considered consumer goods.","Economic resources are the outputs of production."],ans:0,exp:"Economic resources are in limited supply. Some natural resources can be replaced (forests), but others (oil, coal) cannot. Economic resources are inputs, not outputs, of production."},
  {q:"Which of the following factors affecting the business environment is represented by the business's location?",opts:["Cultural","Environmental","Economic","Political"],ans:1,exp:"Access to raw materials, availability of natural resources, amount of pollution, and a business's location are examples of environmental factors affecting the business environment."},
  {q:"In a market economy, what consumers want and need helps to answer the basic economic question of:",opts:["how products will be produced.","who will do the production.","what products will be produced.","how products will be allocated."],ans:2,exp:"In a market economy, factors that affect the decision about what will be produced include which items are profitable, what consumers want and need, and what resources are available."},
  {q:"What exists when a market is legally controlled by one supplier and there are no substitute goods/services readily available?",opts:["Price discrimination","Regulated monopoly","Price competition","Nonprice competition"],ans:1,exp:"Regulated monopolies are allowed to exist when legislators believe one large company can more efficiently serve consumers than several small ones. Price discrimination is illegal."},
  {q:"What type of tax are businesses required to pay on the profits they earn?",opts:["Sales","Excise","Income","Property"],ans:2,exp:"Income tax is a tax on profit. When businesses earn profit from supplying goods and services, they pay a percentage of that profit to the government as income tax."},
  {q:"What usually decreases as the rate of inflation increases?",opts:["Interest rates","Purchasing power","Export quotas","Money supply"],ans:1,exp:"When inflation is high, a dollar buys less. If inflation increases and incomes stay the same, people lose purchasing power and cannot buy the same amount of goods and services."},
  {q:"Which of the following is an internal factor that has an effect on business cycles?",opts:["Inventory levels","Political changes","New discoveries","Foreign conflicts"],ans:0,exp:"Inventory levels are internal because they take place within the economic system. When producers increase inventory optimistically, economic activity expands; when they cut production, it contracts."},
  {q:"The French-Canadian culture relies heavily on nonverbal communication to get messages across. This means it is a(n):",opts:["ethnocentric culture.","religious culture.","corrupt culture.","high-context culture."],ans:3,exp:"A high-context culture relies heavily on nonverbal communication to get messages across. A low-context culture is one in which people speak more directly."},
  {q:"John is generally a good worker, except that he lacks the ability to see what needs to be done without being told. What personal trait is John lacking?",opts:["Empathy","Honesty","Initiative","Creativity"],ans:2,exp:"Initiative is willingness to act without having to be told to do so. A person with initiative is ready, willing, and able to think and act on their own."},
  {q:"Employees who never discuss confidential or personal business information with other employees are demonstrating their:",opts:["ability to communicate.","honesty and integrity.","intelligence and initiative.","orderly and systematic behavior."],ans:1,exp:"Employees demonstrate honesty and integrity when they refuse to violate the trust a company places in them. Many employees have access to confidential information and should only discuss it as company policy dictates."},
  {q:"In order to benefit from criticism, you must take an objective look at it and decide how much of it is:",opts:["too difficult to worry about.","short term versus long term.","from someone you dislike.","valid and based on fact."],ans:3,exp:"To benefit from criticism, look past who gave it to the validity of the criticism itself. If it is relevant and points out areas needing improvement, work on them. It's possible to receive valid criticism from someone you don't like."},
  {q:"Which of the following is a way to demonstrate empathy?",opts:["Give advice to people in need.","Develop a good imagination.","Use tact when speaking.","Ignore a coworker who is different."],ans:2,exp:"Tact is the ability to do or say the right thing in any circumstance. Using tact is one way to demonstrate empathy. Empathetic individuals refrain from criticizing or giving advice."},
  {q:"Melanie dressed for her job interview at a bank in old, comfortable jeans, a sweatshirt, and worn Nikes. Which message is Melanie sending to the interviewer?",opts:["I care a lot about the outcome of this interview.","I would really like to be hired for this job.","I consider my own comfort my first priority.","I'm someone who will support the image of the bank."],ans:2,exp:"Clothing is a form of nonverbal communication. Melanie dressed for her own comfort rather than professionally, signaling to the interviewer that she prioritizes her own comfort over the interview."},
  {q:"What is one factor that determines a manager's credibility with employees?",opts:["Reputation","Creativity","Patience","Aptitude"],ans:0,exp:"A manager with the reputation of being knowledgeable and experienced usually has credibility with employees. Employees are more likely to be persuaded by a manager who has appropriate background and ability."},
  {q:"Which of the following statements is true about determining your personal vision for the future?",opts:["It involves following a step-by-step plan.","It depends more on emotion than logic.","It requires facts and concrete goals.","It is risk free and time bound."],ans:1,exp:"A vision often begins with an abstract idea based on emotion rather than logic. Because a vision is abstract, a step-by-step plan doesn't always work. Working toward a vision requires willingness to take risks over the long term."},
  {q:"When making a plan for improvement, the coachee's job is to:",opts:["give constructive criticism.","use questioning skills.","provide motivation.","take personal responsibility for making the changes."],ans:3,exp:"When making a plan for improvement, the coachee's job is to take personal responsibility for making the changes. Nothing a coach does will be effective if the coachee hasn't taken ownership of the need to improve."},
  {q:"Why are there no specific rules for workers to follow in treating others fairly?",opts:["Businesses object to having rules.","Every workplace is different.","Workers know how to be fair.","Rules are difficult to remember."],ans:1,exp:"There are no hard-and-fast fairness rules because every workplace is different, and each group of workers is different. Workers need training or policies since most people don't automatically know how to be fair."},
  {q:"When Matthew receives a check four times a year for income he has earned on his stock investments, he is receiving:",opts:["deposits.","credit.","dividends.","cash."],ans:2,exp:"A dividend is a sum of money that a corporation pays to a stockholder as earnings on an investment, usually on a quarterly (four times a year) basis."},
  {q:"Choosing to buy an item at the check-out counter is often an example of:",opts:["smart shopping.","poor use of credit.","financial self-control.","impulsive spending."],ans:3,exp:"Buying items at the check-out counter is a classic example of impulsive spending—an unplanned purchase. Choosing not to buy the item would illustrate financial control."},
  {q:"Which of the following is a financial want rather than a financial need?",opts:["Food","Education","Clothing","Shelter"],ans:1,exp:"Financial needs are the basics necessary for survival—food, clothing, and shelter. Education is a financial want; it is not necessary for basic survival."},
  {q:"Melissa writes checks to pay for her rent, utilities, and groceries and keeps a record in her check register. Keeping an accurate check register helps Melissa:",opts:["determine when she needs to add funds to her savings account.","track the amount of money she has spent.","understand the checking account's restrictions and fees.","decide when to order new checks."],ans:1,exp:"The check register is a central location to record and track all checks written and the amount of money spent. It does not help determine when to add savings or order new checks."},
  {q:"Why is it important for individuals to periodically validate their credit histories?",opts:["To avoid being denied credit","To understand credit laws","To find out about different types of credit","To protect themselves from slander"],ans:0,exp:"Inaccurate or false information may appear in a credit history and result in being denied credit. Individuals should review their credit reports and contact credit bureaus to fix inaccurate information."},
  {q:"Henry is a professional banker. Only certain people—'members'—may save at or borrow money from his deposit-taking financial institution. Henry most likely works for a(n):",opts:["mortgage company.","credit union.","insurance company.","CPA firm."],ans:1,exp:"Credit unions are cooperatives providing financial products and services to a group of individuals who share a common interest. Only members may save at or borrow from a credit union."},
  {q:"Thad is investing in a money market, which buys and sells products such as:",opts:["agricultural goods.","shares of stock.","treasury bills.","technology."],ans:2,exp:"Money markets involve the buying and selling of short-term, low-risk financial products such as treasury bills, which are issued by the government."},
  {q:"Which of the following is NOT a factor contributing to financial convergence and consolidation?",opts:["Desire for illiquid assets","Technological advances","Financial deregulation","Desire for lower costs"],ans:0,exp:"Financial firms don't merge because they want illiquid assets (worth very little). Financial convergence and consolidation is driven by technological advances, deregulation, and desire for lower costs."},
  {q:"Under what circumstances would stock prices increase?",opts:["When consumer spending increases","During times of high unemployment","When interest rates increase","During a bear market period"],ans:0,exp:"Increased consumer spending indicates a growing economy and low unemployment. More people working means more money to invest in financial markets, generally increasing stock prices."},
  {q:"Certain health and safety regulations require many types of businesses to:",opts:["offer exercise programs.","purchase new machinery.","routinely inspect equipment.","install security cameras."],ans:2,exp:"Certain health and safety regulations require businesses to routinely inspect equipment to ensure safety. Government inspectors may visit businesses and force them to stop using malfunctioning equipment."},
  {q:"Financial globalization tends to cause an increase in:",opts:["taxes on international transactions.","investors' exposure to business cycle risks.","herd behavior among investors.","limits on foreigners' access to domestic markets."],ans:2,exp:"Financial globalization seems to increase herd behavior—where individuals act together as a group without planned direction. In good times, investors buy together; in bad times, they sell together."},
  {q:"A mutual fund's total liabilities are $5,600,000 and its assets total $7,950,000. There are 31,000,000 shares outstanding. What is the net asset value of the fund?",opts:["7.58%","6.45%","7.29%","8.06%"],ans:0,exp:"Net Asset Value = (Assets - Liabilities) / Shares outstanding = ($7,950,000 - $5,600,000) / 31,000,000 = $2,350,000 / 31,000,000 = $0.0758 = 7.58%."},
  {q:"According to today's stock quotation table, the current price of Macy's stock is $18.99 per share. Last year, the company paid investors a dividend of $0.20 per share. What is the current yield on Macy's stock?",opts:["3.80%","2.00%","1.05%","4.95%"],ans:2,exp:"Current yield = Last year's dividend / Current price = $0.20 / $18.99 = 0.01053 = approximately 1.05%."},
  {q:"A severe storm blows down trees that collapse the roof and break windows of a business. This type of damage results from __________ risks.",opts:["financial","human","economic","natural"],ans:3,exp:"Natural risks are chances of loss from natural phenomena such as a severe storm. Human risks are caused by human weakness; economic risks result from market changes; financial risks involve capital."},
  {q:"When Alana prepares a report so that all of the financial data is clearly disclosed, she is ensuring that the information is:",opts:["flexible.","relevant.","timely.","transparent."],ans:3,exp:"When financial information is fully disclosed and presented in a clear, understandable way, it is transparent. Transparent information is not buried or deliberately presented in a confusing way."},
  {q:"Calculate a business's total cash receipts for one month if it had cash sales of $6,500, credit sales of $2,450, cost of goods sold of $2,725, and total expenses of $1,980.",opts:["$6,500","$8,900","$6,225","$4,245"],ans:0,exp:"Total cash receipts only includes collected money—cash sales of $6,500. Credit sales are not yet collected. Cost of goods sold and expenses are cash outflows, not receipts."},
  {q:"Businesses use budgets to estimate how they will:",opts:["file their taxes.","spend their money.","calculate their assets.","depreciate their assets."],ans:1,exp:"A budget estimates how a business will earn and spend its money. Businesses use budgets to plan how to allocate income to pay expenses—not to file taxes or calculate/depreciate assets."},
  {q:"A financial-information management system can help a financial manager to make which of the following types of decisions?",opts:["Employee scheduling","Capital budgeting","Vendor selections","Adding/dropping products"],ans:1,exp:"A financial-information management system helps financial managers make capital budgeting decisions—developing a plan to acquire and finance long-term business assets."},
  {q:"By protecting financial information from tampering, loss, and unauthorized use, a financial-information management professional acts as a(n) __________ of that financial information.",opts:["agent","interpreter","analyst","steward"],ans:3,exp:"The stewardship function involves protecting financial data from tampering, loss, unauthorized access, and unauthorized use. An agent assists in the sale/promotion of goods but does not take title."},
  {q:"An advantage to businesses that use master data management applications is the __________ of the data.",opts:["complexity","variation","replication","consistency"],ans:3,exp:"Master data management ensures that consistent, accurate data is provided to all employees who use it throughout the organization. Effective applications reduce replication of data records."},
  {q:"A business uses its computer system to search for customers who meet a set of criteria related to sales to identify who is most likely to buy $100,000 in products next year. What process is the business using?",opts:["Accounting","Data mining","Surveying","Industry forecasting"],ans:1,exp:"Data mining is the process of searching computer databases to look for patterns and correlations. Businesses use it to find answers to questions and identify customers with the highest buying potential."},
  {q:"A business owner is concerned employees may be using company credit cards to make personal purchases. Which data-mining technique should the owner use to identify questionable transactions?",opts:["Artificial neural networks","Decision trees","Nearest-neighbor method","Dashboards"],ans:0,exp:"Artificial neural networks are a data-mining technique often used to review financial records to identify possible errors and questionable entries. Decision trees classify data and build models."},
  {q:"Which of the following budgeting software applications tracks a business's cash, interest, and dividends?",opts:["Revenue recognition","Workflow management","Inventory planning","Capital expenses"],ans:0,exp:"Revenue recognition applications help the business track various sources of revenue including cash, interest, and dividends, helping determine how to allocate funds to cover various cash outflows."},
  {q:"Lawrence's manager asked him to prepare a visual representation of key performance indicators including cash flow, liquidity, profitability, and liability. Lawrence should use his company's analytic software to create a(n):",opts:["operating agreement.","profit-and-loss statement.","cost standard.","financial scorecard."],ans:3,exp:"Financial scorecards contain key financial indicators and up-to-date financial information, often presented in charts and graphs. A P&L statement shows profitability over a specific period."},
  {q:"Yvonne is running a query to create, delete, or modify other database objects. What type of query is Yvonne running?",opts:["Select","Data-definition","Crosstab","Pass-through"],ans:1,exp:"Data-definition queries tell the database to create, delete, or modify other database objects. Select and crosstab queries retrieve specific data; pass-through queries are sent to a remote database server."},
  {q:"Which of the following individuals is an internal user of a business's financial data?",opts:["Creditor","Investor","Manager","Tax collector"],ans:2,exp:"Managers are internal users who use financial data to control day-to-day operations and make financial decisions. Investors, creditors, and tax collectors are external users."},
  {q:"The primary purpose of the accounting function is to prepare and present relevant financial information, while the primary purpose of the finance function is to:",opts:["adjust journal entries based on the information provided.","modify accounts receivable based on the information provided.","apply the information to calculate the business's equity.","use the information to make financial decisions."],ans:3,exp:"The finance function is responsible for obtaining funds and managing money to achieve the business's goals. It uses accounting information to make financial decisions."},
  {q:"Which of the following statements is true about accounting systems?",opts:["The managerial accounting system is useful for planning and internal decision making.","The financial accounting system focuses on segments of the company rather than the company as a whole.","The government requires all businesses to use the managerial accounting system.","The financial accounting system is used by external audiences, so reporting flexibility is an advantage."],ans:0,exp:"Managerial accounting systems help managers plan, control resources, and make internal decisions. The government requires the financial accounting system (governed by GAAP) for external reporting."},
  {q:"In relation to recording business transactions, a primary difference between the cost and accrual accounting systems is:",opts:["timing.","scope.","frequency.","complexity."],ans:0,exp:"The cash accounting system records transactions when money is received or spent. The accrual accounting system records transactions when they occur, regardless of when money is exchanged. The difference is timing."},
  {q:"Which of the following is a tool that enables financial managers to identify changes or trends in production costs by reviewing the same types of data from different periods of time?",opts:["Comparative statement","Frequency ratio","Accounts-receivable summary","Sales-transaction log"],ans:0,exp:"A comparative statement compares the same types of data from different time periods, helping businesses identify changes and trends in production activities including production rates and raw-material costs."},
  {q:"A creditor carefully examines a business's financial information to determine whether the business has sufficient money to meet its short-term obligations when they come due. In this situation, the creditor is concerned about the business's:",opts:["profitability.","liquidity.","efficiency.","investment return."],ans:1,exp:"Liquidity refers to having sufficient cash on hand to meet short-term obligations. If the business is unable to meet current short-term obligations, the creditor would likely deny the credit request."},
  {q:"Susan calls different banks to compare interest rates and types of loans to determine which bank is best for purchasing business equipment. Susan is analyzing the financial information to:",opts:["correct inaccurate financial data.","guide her decision making.","determine business profitability.","solve a business problem."],ans:1,exp:"Many businesspeople analyze financial data to make business decisions, such as obtaining a loan with the best interest rates and payment plans. Susan is using the data to guide her decision."},
  {q:"The accounting treatment of capital expenditures should be __________ over multiple reporting periods.",opts:["hedged","flexible","consistent","callable"],ans:2,exp:"The accounting treatment of like items should be consistent from one reporting period to the next. Inconsistent treatment makes data incomparable and less meaningful to users of financial information."},
  {q:"Group orientation sessions for new employees are very important because they:",opts:["explain the duties of each job.","help to motivate employees.","encourage organizational input.","provide in-depth training."],ans:1,exp:"A good orientation program makes new employees feel welcome, gives an overview of the business, and helps motivate them to do their best. It is not used to discuss specific job duties or provide in-depth training."},
  {q:"What does determining the target market's buying behavior involve?",opts:["Finding out where the market is located","Finding out what the market will purchase","Finding out how the market is organized","Finding out why the market exists"],ans:1,exp:"Determining buying behavior involves finding out what the market will purchase. Businesses need to know what the market wants in order to provide those products."},
  {q:"Todd created a graphic organizer using pictures, graphs, and simple statements to sequentially present information about quality-control processes. What did Todd develop?",opts:["Proposal","Outline","Draft","Storyboard"],ans:3,exp:"A storyboard uses a combination of pictures, graphs, and simple statements to present information in sequential order. Outlines are general plans; drafts are preliminary writings; proposals are suggestions."},
  {q:"Carson is a staff accountant who can't find last year's tax return anywhere. Which information management guideline is not being followed?",opts:["Set and consistently follow organizational information management practices.","Make sure that information is accurate.","Make sure that information is retrievable.","Prioritize information management needs according to business needs."],ans:2,exp:"When Carson is unable to find the tax return when he needs it, information is not retrievable. This will slow down his productivity. The information management guideline of retrievability is being violated."},
  {q:"What is the primary function of the Random Access Memory (RAM) component of a computer?",opts:["Serves as a temporary holding area for files and programs","Reads the computer code that provides visual effects","Stores data and programs permanently","Enables the user to apply point-and-click commands"],ans:0,exp:"RAM is a temporary workspace that stores data and programs the user is actively using. A computer with a lot of RAM enables users to open and work on several files simultaneously."},
  {q:"Which of the following demonstrates the correct method to ensure that all words in a phrase are included in a web search?",opts:['(Discipline is the most important part of success)','[There is no tree that the wind has not shaken]',"'To be or not to be'",'"Confidence in itself is the secret of success"'],ans:3,exp:"Enclosing a phrase in double quotation marks ensures all words are included in a web search. Search engines do not generally recognize single quotation marks, brackets, or parentheses for this purpose."},
  {q:"Most businesses maintain records about what customers are buying and how much they are spending in order to:",opts:["analyze the information.","plan an inventory count.","offer quality service.","develop a quality environment."],ans:0,exp:"By analyzing customer purchase records, businesses are able to plan future sales and obtain products that will appeal to customers and encourage them to buy."},
  {q:"Which of the following is a business trend that affects all countries?",opts:["Decreased inflation","Socialism","Increased regulation","Globalization"],ans:3,exp:"Globalization is the rapid and unimpeded flow of capital, labor, and ideas across national borders. It is a trend affecting all countries, driven by technological advancements and trade agreements."},
  {q:"A firm's environmental scan reveals that a country is on the brink of civil war, which would affect the firm's ability to do business in the country. This is an example of a(n) __________ consideration.",opts:["political","economic","cultural","regulatory"],ans:0,exp:"Political considerations are important because government changes such as civil war could indicate other changes affecting the country's business environment, including economic, cultural, and regulatory changes."},
  {q:"Which of the following forms of technology is most useful in operations?",opts:["Smart phones","E-readers","Assistive technology","Computer-aided design"],ans:3,exp:"Computer-aided design allows companies to design, test, and redesign products in the virtual world before trying them in the real world, saving time and money during production."},
  {q:"It is important for a business to evaluate the financial condition of a potential vendor during the vendor-selection process to assess the:",opts:["risk levels of doing business with the vendor.","reliability of the products that the vendor carries.","vendor's levels of customer service.","vendor's required lead times."],ans:0,exp:"If a vendor is not financially stable, there is a risk it may not have resources to meet the business's needs. Poor financial health may affect the vendor's products, service, and lead times."},
  {q:"Which of the following is a production activity?",opts:["Receiving","Advertising","Scheduling","Marketing"],ans:2,exp:"Scheduling is the production activity that establishes the timetable to be followed in production. Marketing, advertising, and receiving are not production activities."},
  {q:"'Big Q' focuses on:",opts:["improving factory conditions.","exceeding customer expectations.","conforming to specifications.","designing and developing products."],ans:1,exp:"'Big Q' focuses on ingraining quality into every aspect of the organization to meet and exceed customer expectations. 'Little Q' focuses on conforming to specifications."},
  {q:"One of the major functions of business maintenance is to:",opts:["prevent fraudulent behavior.","motivate employees.","create a favorable impression.","guarantee the business's success."],ans:2,exp:"The overall impression customers receive as a result of a business's appearance influences their buying behavior. Routine maintenance creates a good impression and attracts customers."},
  {q:"An overall purpose of establishing goals is to increase your chances of:",opts:["achieving immediate success.","satisfying your wants.","enlarging your income.","avoiding making mistakes."],ans:1,exp:"Clear, meaningful goals can serve as guidelines and help you make better decisions. Establishing goals cannot guarantee immediate success or avoidance of mistakes."},
  {q:"Which type of business is known for often being the most innovative?",opts:["Old businesses","Small businesses","New businesses","Large businesses"],ans:1,exp:"Innovations often come from small businesses. Some studies show that small entrepreneurial companies create twice as many innovations as large companies."},
  {q:"The essence of time management is to:",opts:["eliminate the need to prioritize activities.","control events in order to accomplish priorities.","focus on spreading work over a period of time.","set a fixed schedule and follow it."],ans:1,exp:"Time management involves maintaining control over events in your life to balance them—planning and organizing activities. Schedules should have flexibility for unexpected events."},
  {q:"Which of the following is an example of an employee who is meeting his/her employer's expectations?",opts:["Tom spends the first half hour of the workday chatting with Kate.","Allison focuses on her work tasks so she can meet her deadlines.","Rachel sends a text message to her roommate during a meeting.","Calvin tells a customer about his issues with a difficult coworker."],ans:1,exp:"Employers expect employees to perform their work accurately and efficiently. Allison is focused on her work and strives to meet deadlines, meeting employer expectations."},
  {q:"Job seekers can often find out about local employment opportunities by accessing a business's:",opts:["employee newsletter.","website.","online catalog.","annual report."],ans:1,exp:"Many companies post their job openings on their websites. Some businesses allow job seekers to set up accounts to track applications and receive email updates about new job openings."},
  {q:"After a job interview, an applicant should prepare a follow-up letter that:",opts:["is long and detailed.","is short and typed.","includes a résumé.","contains a photo."],ans:1,exp:"A follow-up letter should be short and to the point. Typed letters are preferred. The purpose is to briefly thank the interviewer—it should not be long, include another résumé, or contain a photo."},
  {q:"Which of the following is an example of the impact of technology on the financial-services industry?",opts:["Blurring the lines between banking, insurance, and investments","More walk-in bank customers","Greater demand for investment professionals","Rising concern about fraud and identity theft"],ans:3,exp:"One impact of technology on financial services is rising concern about fraud and identity theft since so many financial products and services are now bought and sold online."},
  {q:"After passing the General Securities Registered Representative Examination, a businessperson obtains licensure that allows him/her to work as a(n):",opts:["estate planner.","accountant.","underwriter.","stockbroker."],ans:3,exp:"Stockbrokers must take and pass the General Securities Registered Representative Examination (or Canadian Securities Course in Canada) to obtain their license to trade securities."},
  {q:"Which of the following would afford finance professionals the best opportunity to build long-lasting relationships with other finance professionals?",opts:["Regularly attending trade shows for the finance industry","Actively participating in a local professional association for the finance industry","Occasionally auditing classes at a local postsecondary institution","Actively attending meetings sponsored by the local chamber of commerce"],ans:1,exp:"Active participation in a professional organization specific to finance allows professionals to serve on committees, hold offices, and attend seminars with other local finance professionals, resulting in long-term relationships."},
  {q:"To build professional relationships, Brynn serves on trade association committees, co-authors articles with other finance professionals, and treats business contacts to dinner or golf. These activities are forms of:",opts:["networking.","cooperating.","advertising.","up-selling."],ans:0,exp:"Networking involves connecting with individuals who might help accomplish career and professional goals. These activities create opportunities to get to know other professionals and build beneficial relationships."},
  {q:"Which of the following risks might result from ethical misconduct?",opts:["Decreased whistle-blowing","Decreased company value","Increased employee support of the company","Increased positive publicity"],ans:1,exp:"Once word spreads about unethical behavior, investors will likely withdraw support, causing company value to decrease. Whistle-blowing will increase, and publicity and employee support will be negative."},
  {q:"To secure confidential financial data transmitted through the Internet, businesses often use:",opts:["cross-platform technology.","encryption techniques.","bots.","debuggers."],ans:1,exp:"Encryption is the process of transforming information into a code so only the recipient can read it. This prevents unauthorized individuals (hackers) from obtaining confidential financial data."},
  {q:"If an accounting firm deliberately conceals information about a client's financial status, the government may charge the business with:",opts:["expropriation.","obstruction of justice.","breach of contract.","substantiation."],ans:1,exp:"Obstruction of justice applies to individuals or businesses that hide important information from law enforcement agencies. Concealing questionable financial data could result in fines or imprisonment."},
  {q:"The primary reason that firms must take steps to control their levels of business risk is to:",opts:["increase their financial liability levels.","increase their visibility in the market.","contribute to the well-being of society.","reduce the chance of financial losses."],ans:3,exp:"Because risk involves the possibility of loss, businesses must control their risk levels to limit financial losses. Businesses can do this through appropriate policies, employee training, and adequate insurance."},
  {q:"Which of the following is an uninsurable external risk to businesses?",opts:["Inventory","Tax increases","Personal injury","Natural disasters"],ans:1,exp:"Businesses cannot control when or by how much a government may increase taxes—these are uninsurable external risks. Inventory, personal injury, and natural disasters are insurable risks."},

  // ── SAMPLE EXAM 14E ──
  {q:"One reason businesses usually are unable to enter into legally binding contracts with minors is because those under the legal age:",opts:["do not have sufficient funds to make payments.","may not understand the consequences of their actions.","are unable to make basic decisions.","cannot make promises to do something for others."],ans:1,exp:"Minors cannot usually enter into legally binding contracts because they may not be old enough to understand the consequences of their actions. They can make basic decisions and promises."},
  {q:"The Sarbanes-Oxley Act of 2002 is legislation that was passed in response to recent:",opts:["collection activities.","investment options.","tax settlements.","accounting scandals."],ans:3,exp:"The Sarbanes-Oxley Act was passed in response to major corporate and accounting scandals (e.g., Enron, WorldCom), which resulted in a loss of public trust in accounting and reporting procedures."},
  {q:"Which of the following mutual funds is most likely to be tax inefficient?",opts:["A fund with a high portfolio turnover rate","A fund with a low portfolio turnover rate","A fund that concentrates on a specialized sector","A fund that attempts to match a broad market index"],ans:0,exp:"A fund with a high portfolio turnover rate replaces a high percentage of its investments every year. Frequent capital gains realizations make it difficult for investors to manage their overall tax obligations."},
  {q:"Which of the following quality management approaches is often used in the finance industry to sustain regulatory compliance?",opts:["Crisis management","Just-in-Time","Reassurance","Six Sigma"],ans:3,exp:"Six Sigma's closed-loop control principles (define-measure-analyze-improve-control) are often incorporated in compliance processes and procedures in the finance industry."},
  {q:"After identifying a potential compliance issue, a virtual auditor should:",opts:["manually load questionable transactions into a spreadsheet for analysis.","delete all exceptions and questionable transactions from the system.","enter all questionable transactions into the operational financial system.","link all related questionable transactions for further investigation."],ans:3,exp:"After detecting a potential compliance issue, the virtual auditor should identify and link all related questionable transactions for further analysis and investigation. They should not be deleted or entered into the operational system."},
  {q:"Which of the following statements contains the most relevant information to include in a business report about the specific market share of computer manufacturers during a particular time frame?",opts:["In 2009, Hewett Packard held 29.1 percent of the market share, followed by Dell, which held 21.9 percent.","In 2009, Hewett Packard shipped more computers than Dell or Apple.","Hewett Packard, Dell, Acer, Toshiba, and Apple sold more computers in 2009 than other manufacturers.","Apple Computers held the fifth highest share of the computer market in 2009."],ans:0,exp:"This option provides the most detailed, specific information about market share during a specific time frame, including specific percentage amounts for one year."},
  {q:"Successful communication depends upon the:",opts:["listener's knowledge of and comfort with the topic.","speaker's ability to speak loudly and the listener's interest in the topic.","speaker and the listener.","speaker's professional qualifications."],ans:2,exp:"Successful communication depends on the active participation of both the speaker and the listener. Communication is not dependent on volume, the listener's knowledge, or the speaker's qualifications."},
  {q:"Strategic management is demonstrated in which of the following phrases?",opts:["Obtaining funds for business projects","Recruiting appropriate employees","Planning and organizing for the future","Regularly updating business processes"],ans:2,exp:"Strategic management involves planning and organizing for the future. Obtaining funds is financial analysis; recruiting is HR management; updating business processes is operations."},
  {q:"Which of the following is a legitimate response for an employee to provide to a customer regarding an inquiry about product pricing?",opts:["If you can wait a moment, I'll check for the price in the computer.","I'm not sure what the pricing is.","You'll need to contact the appropriate person to get the price.","I'm pretty sure that the item costs $39.65."],ans:0,exp:"If an employee doesn't know the price, they should take appropriate steps to obtain it, such as checking the computer. Guessing, saying you don't know, or referring to another person are not good customer service."},
  {q:"An effective technique to use to clarify information when giving verbal directions involves:",opts:["speaking in a loud voice.","taking notes.","demonstrating a procedure.","limiting questions."],ans:2,exp:"Demonstrating a procedure reinforces the verbal explanation with a visual demonstration, making it easier for employees to understand. Speaking loudly and limiting questions do not help clarify information."},
  {q:"What is the main form of written communication between companies?",opts:["Telephone calls","Memorandums","Meetings","Business letters"],ans:3,exp:"Business letters are the most common form of written communication used by businesses to exchange information with other organizations or customers. Memorandums are the main form within a business."},
  {q:"Anna, a new employee with Turbo Electronics, must write a letter to a customer but doesn't know which letter format to use. She should:",opts:["develop the letter in several formats and send the letter her supervisor likes best.","select the block format because it is the most widely used.","select the simplified format because it is impersonal.","ask her supervisor which letter format the company uses."],ans:3,exp:"Companies may prefer specific letter formats to ensure consistency. To save time and effort, Anna should ask her supervisor which format the company uses."},
  {q:"Because Caroline does not have enough time to read an entire 400-page business report, what section should she review to obtain an overview of the most important content?",opts:["Table of contents","Executive summary","Appendices","Conclusions"],ans:1,exp:"The executive summary provides an overview of the entire report and contains the most important information. Businesspeople with time constraints often read only the executive summary."},
  {q:"Employees who always keep their commitments to customers are building positive relationships with those customers by being:",opts:["dependable.","assertive.","creative.","sociable."],ans:0,exp:"Dependable employees do what they say they will do and keep their commitments. Customers appreciate dependable employees and often return to a specific business because of them."},
  {q:"One way to show respect for foreign clients' cultural and social differences is to:",opts:["always speak in your native language.","pronounce their names correctly.","use slang and idioms frequently.","embrace cultural stereotypes."],ans:1,exp:"Learning to say clients' names properly shows respect. Mispronouncing a client's name might insult them. Avoid slang and stereotypes when communicating with clients of different cultures."},
  {q:"Whatever action must be taken in handling a customer complaint, the salesperson should respond in a(n) __________ manner.",opts:["abrupt","skeptical","formal","concerned"],ans:3,exp:"The salesperson's concerned attitude puts the customer in a good frame of mind. If the salesperson is skeptical or abrupt, this may alienate the customer. Professionalism is important."},
  {q:"Jonathan explains both the pros and cons of his insurance products to customers. Hank only explains why customers should purchase his products. Which agent is more likely to retain and grow his client base?",opts:["Jonathan, because he gives his customers too much information.","Jonathan, because his customers feel that they can trust him.","Hank, because he doesn't scare his customers away.","Hank, because he is a very optimistic, upbeat person."],ans:1,exp:"Jonathan presents himself as truthful and trustworthy. Customers are more likely to return to Jonathan and refer others because they trust him. Hank's customers may get angry if something goes wrong they weren't warned about."},
  {q:"What customer-relationship-management analytic would be most suitable for sorting clients based on how likely they are to repurchase a particular product?",opts:["Profitability analysis","Account personalization","Event monitoring","Customer segmentation"],ans:3,exp:"Customer segmentation can segment clients into groupings based on each client's likelihood of purchasing or repurchasing a particular product."},
  {q:"Items that are used to produce goods and services are:",opts:["economic resources.","natural resources.","capital goods.","human resources."],ans:0,exp:"An item becomes an economic resource when it is used to produce a good or service. Economic resources include natural resources, human resources, and capital goods."},
  {q:"Which of the following is a component of verbal communication between individuals?",opts:["Body posture","Listening","Facial expression","Eye contact"],ans:1,exp:"Listening involves not only hearing what the speaker is saying but making appropriate verbal responses. It is an essential component of verbal communication. Facial expressions, eye contact, and posture are nonverbal."},
  {q:"Which of the following elements of a business is NOT structured by organizational design?",opts:["Competitors","People","Information","Technology"],ans:0,exp:"Organizational design structures a business's people, information, and technology to enable the business to achieve its goals. A business cannot structure its competitors."},
  {q:"Which of the following is a true statement about breaking the law?",opts:["It is acceptable in most industries.","It will make a company more popular.","It is necessary for business success.","It may have different consequences than breaching ethics."],ans:3,exp:"Breaking the law and breaching ethics may have different consequences. Breaking the law could result in fines or jail time, while breaching business ethics could result in loss of customers."},
  {q:"A country that has a socialistic command economic system is:",opts:["Great Britain.","the United States.","Switzerland.","Japan."],ans:0,exp:"Great Britain has a socialistic economic system with government ownership of basic means of production but private ownership of businesses as well. Japan, Switzerland, and the US have capitalistic systems."},
  {q:"Which of the following is most likely to reduce risk?",opts:["Dividends","Bonds","Insurance","Stocks"],ans:2,exp:"Insurance transfers the risk factor to another person or business. An insurance policy is a contract in which the insurance company agrees to provide protection against insurable losses."},
  {q:"If each citizen in the United States increased the amount spent on U.S. consumer goods, the gross domestic product (GDP) would probably:",opts:["increase.","decrease.","stay the same.","not be affected."],ans:0,exp:"Personal consumption expenditures are a GDP component representing all consumer goods sold. An increase in consumer goods sales will increase GDP unless there is a drop in other components."},
  {q:"Which of the following is a factor that often enables certain countries to trade successfully with each other?",opts:["Equal governmental systems","Same religious institutions","Similar business subcultures","Identical language traits"],ans:2,exp:"Countries with similar business subcultures understand each other and conduct business in similar ways, enabling successful trade. Different languages, religions, and governmental systems can be barriers."},
  {q:"Which of the following is a benefit to you as an individual of setting high personal standards for honesty and fairness?",opts:["You will not need to be bonded by your employer.","The business will have a good image.","The number of mistakes you make will decrease.","You will have increased self-respect."],ans:3,exp:"Knowing that you always try to be honest and fair bolsters your self-respect. When you respect yourself, it is easier to respect others as well. Improved image is a benefit to the business, not the individual."},
  {q:"How does self-control help you to think clearly?",opts:["By helping you to deal with criticism","By helping you to be defensive","By helping you to be objective","By helping you to deal with coworkers"],ans:2,exp:"Self-control helps you keep your emotions under control, enabling you to be open-minded and objective. This leads to clearer thinking."},
  {q:"Negative feedback makes many individuals uncomfortable because it:",opts:["is so rare.","involves so many people.","points out their shortcomings.","occurs so regularly."],ans:2,exp:"Negative feedback makes individuals uncomfortable because it points out their weaknesses, faults, and shortcomings. Constructive criticism is best shared in private and should not involve many people."},
  {q:"One of the ways that empathy benefits a business's employees directly is by helping them to:",opts:["get along with their coworkers.","focus on people's differences.","plan effectively for the future.","move quickly up the career ladder."],ans:0,exp:"Today's workplace is more diversified than ever. Empathy motivates us to look for similarities instead of focusing on differences, helping employees get along with their coworkers."},
  {q:"Managers are more likely to be able to persuade employees to follow new procedures if the managers have:",opts:["self-motivation.","organizational skills.","enthusiasm.","credibility."],ans:3,exp:"Credibility is believability. If employees believe what managers say, they are more likely to follow their instructions. Managers develop credibility by always being truthful with employees."},
  {q:"Why might group members prefer to use an informal method of consensus building?",opts:["Group members wish to avoid arguing.","The subject matter is controversial.","It allows for face-to-face interaction.","There is more paperwork involved."],ans:2,exp:"Group members prefer informal consensus building because it allows for face-to-face interaction. When the subject matter is controversial, a formal method is more appropriate."},
  {q:"When determining if a personal vision is realistic, a person must determine if the vision will have:",opts:["permanent results.","limited resources.","few setbacks.","measurable goals."],ans:0,exp:"A personal vision involves creating positive change through hard work over the long term. A realistic vision must create permanent results. Not all vision results can be measured on an intangible level."},
  {q:"Which of the following is the first step in the coaching process?",opts:["Identify the problem.","Get a response.","Agree on goals.","Plan for improvement."],ans:0,exp:"Identifying the problem is the first step in the coaching process. You must identify the problem before you can get a response, agree on goals, or form a plan for improvement."},
  {q:"Jeremy is basically healthy, but he works with another employee who suffers from various chronic illnesses. Jeremy and his coworker differ in what way?",opts:["Age","Physical condition","Ethnic heritage","Education"],ans:1,exp:"Jeremy and his coworker differ in physical condition (their basic health). They may or may not differ in age, ethnic heritage, or education."},
  {q:"Which of the following is an example of legal tender issued by the federal government?",opts:["Bank notes","Corporate bonds","Mutual funds","Municipal bonds"],ans:0,exp:"Bank notes are currency (paper money) issued by a country's government. Corporate bonds and municipal bonds are debt instruments; mutual funds are collections of investments."},
  {q:"An amount of money borrowed by an individual or a business simply by signing a promissory note is obtaining a(n):",opts:["secured loan.","regular credit account.","unsecured loan.","travel and entertainment card."],ans:2,exp:"An unsecured loan is obtained without pledging anything as security—the borrower simply signs a written promise to repay. Secured loans require collateral; credit accounts are for purchasing goods."},
  {q:"Brandon is developing a financial plan, and one of his goals is to save enough money to buy a new car in two years. Has Brandon set a SMART goal?",opts:["Yes, his goal is time-bounded and measureable.","No, his goal is not attainable or results-oriented.","No, his goal is not specific or measurable.","Yes, his goal is attainable and specific."],ans:2,exp:"The goal is time-bounded (two years) and results-oriented (a car), but it is not specific or measurable because Brandon hasn't indicated how much he wants to save or how he plans to save it."},
  {q:"When you use money to make money, you are:",opts:["investing.","saving.","rationing.","reimbursing."],ans:0,exp:"Using money to make money is called investing. Saving is setting aside current income for future use. Rationing determines who gets scarce goods; reimbursing means paying someone back."},
  {q:"Incorrect information on an individual's credit report may hinder his/her ability to:",opts:["withdraw money from a savings account.","obtain a bank loan.","pay monthly credit-card balances.","earn interest on stock holdings."],ans:1,exp:"Banks obtain credit reports to make decisions about providing loans. Inaccurate information can result in an individual being denied a bank loan, making periodic credit report review important."},
  {q:"How do finance companies commonly raise capital?",opts:["Issuing notes, bonds, and other obligations","Investing funds from premium payments","Investing deposits from savers","Establishing mutual funds and investment banks"],ans:0,exp:"Finance companies raise capital by issuing notes, bonds, and other obligations, then use this capital to provide loans to businesses and consumers. Insurance companies invest premium funds; deposit-taking institutions accept savers' deposits."},
  {q:"Debt markets buy and sell ___________, and equity markets buy and sell _________.",opts:["grain, gold","corporate stock, certificates of deposit","government bonds, corporate stock","gold, government bonds"],ans:2,exp:"Debt markets trade debt securities like government bonds and certificates of deposit. Equity markets trade financial instruments like corporate stock. Grain and gold are sold through commodities markets."},
  {q:"A primary advantage to consumers of convergence and consolidation in the finance industry is:",opts:["guaranteed earnings.","easier decision making.","one-stop shopping.","liquid capital."],ans:2,exp:"Convergence and consolidation create 'one-stop' shopping, reducing the need to go to different financial providers for different financial products."},
  {q:"Which of the following is most likely to have a negative effect on financial markets?",opts:["Interest rates fluctuate daily.","Business expansion slows quickly.","Unemployment rates stabilize steadily.","Consumer spending increases consistently."],ans:1,exp:"Slower business expansion indicates an economic recession. Less work leads to more layoffs, rising unemployment, less consumer spending, and less investment in financial products."},
  {q:"Which of the following has accelerated the globalization of financial markets?",opts:["A decrease in foreign access to domestic markets","An expansion of protectionism practices","The movement toward fixed exchange rates","The reduction of government regulations"],ans:3,exp:"Liberalization and deregulation enable capital to flow more freely across national borders. Globalization has encouraged floating exchange rates; protectionism hinders global financial markets."},
  {q:"Marcus wants to invest a portion of his money in long-term securities to finance his son's college education and his own retirement. To make the best investment decisions, Marcus should obtain the services of a:",opts:["credit-union representative.","loan officer.","licensed tax accountant.","certified financial planner."],ans:3,exp:"Financial planners help clients develop investment plans and recommend financial products. Tax accountants, loan officers, and credit-union representatives don't usually provide comprehensive financial planning and investment advice."},
  {q:"What does an income statement show about a company over a period of time?",opts:["Liabilities","Reliability","Equity","Profitability"],ans:3,exp:"The income statement shows a company's profitability over a period of time. Reliability and equity are not directly shown on the income statement. Liabilities appear on the balance sheet."},
  {q:"Chase saw that his commodities investment dropped .002 points from Monday's close to Tuesday's close. This drop is called the:",opts:["net change.","true value.","net worth.","true yield."],ans:0,exp:"The net change is the difference between a stock's closing price and the previous day's price. Net worth, true value, and true yield do not describe this difference."},
  {q:"The stock table column that tells you how many shares were traded that day is labeled:",opts:["DIV.","NET CHG.","YLD %.","VOL."],ans:3,exp:"VOL (Volume or Sales) records how many shares were traded that day. NET CHG is the net change; DIV is the dividend; YLD% is the yield percentage."},
  {q:"An example of an internal financial risk is:",opts:["consumer buying power.","foreign exchange rate changes.","improper budgeting practices.","credit downgrades."],ans:2,exp:"Improper budgeting practices are an internal financial risk—they directly impact cash flow and come from within the company. Consumer buying power, foreign exchange rates, and credit downgrades are external."},
  {q:"Why would a bank examine a business's balance sheet?",opts:["To determine whether the company qualifies for additional credit","To determine whether to declare the company bankrupt","To meet its oversight responsibilities of the business community","To recognize its most profitable customers"],ans:0,exp:"By examining the balance sheet, banks determine what a business owns and what it owes. If insufficient assets exist, the bank will likely avoid loaning money to the business."},
  {q:"What do many businesses develop to encourage ethical behavior in finance?",opts:["Penalties","Punishments","Sanctions","Standards"],ans:3,exp:"Many businesses develop ethical standards—unwritten rules that govern behavior—to encourage ethical behavior in finance. These standards help employees make the right decisions when managing money."},
  {q:"Why is it important for businesses to keep accurate accounts-receivable information?",opts:["To evaluate interest rates","To forecast sales","To classify stocks","To monitor aging accounts"],ans:3,exp:"Accounts receivable affect the business's cash flow and ability to pay employees and creditors. Businesses should implement follow-up procedures to contact customers with delinquent or aging accounts."},
  {q:"Why has online technology's use increased in financial-information management?",opts:["Recognition that the security of transactions is no longer an issue","Removal of electronic information exchange procedures","Passage of laws that recognize electronic documents as legally binding","Protection of customers' right to privacy"],ans:2,exp:"The passage of laws recognizing electronic documents and signatures as legally binding increased businesses' willingness to accept electronic documents, boosting online technology use in financial-information management."},
  {q:"What must a business do before deciding which data-mining technique to use?",opts:["Filter the raw data","Acquire the desired results","Determine the research question","Analyze product usage patterns"],ans:2,exp:"Before data mining, the business must identify what types of data are needed to answer the research question, then set appropriate computer queries to obtain the data."},
  {q:"Which of the following questions would be the least difficult to answer using data mining techniques?",opts:["What makes some customers a better credit risk than others?","When will this customer place his/her next order?","Why did this customer move her/his checking account to another bank?","What product will a particular customer order next?"],ans:0,exp:"Data mining is effective at classifying groups of people based on shared characteristics (like credit risk). It is much harder to predict individual behavior, motivations, or specific future actions."},
  {q:"If you were using a computer spreadsheet to track your small-business's budget, which of the following should you categorize as investment income?",opts:["Dividends","Credit sales","Cash sales","Interest on debt"],ans:0,exp:"Dividends are income earned on stock investments—investment income. Cash and credit sales are revenue from product sales. Interest on debt is an expense paid by the business."},
  {q:"Which of the following questions should the user of financial analysis applications be able to answer?",opts:["Why are products being added to the company's product mix?","Which projects are business priorities?","What will the company's actual amount of profit margin be next year?","What is the change in the company's liquidity?"],ans:3,exp:"Financial analysis applications help businesses gain insight into financial health, such as changes in liquidity. They can identify trends but cannot accurately forecast an exact future profit margin or identify project priorities."},
  {q:"The purpose of using the locking function for a database is to:",opts:["set queries to retrieve data from specific data fields.","allow users to import data from external programs.","develop reports and summarize various data.","ensure that only one person can edit data fields."],ans:3,exp:"The locking function prevents more than one person at a time from making changes to the database, ensuring data integrity when multiple users can view the same information simultaneously."},
  {q:"Investment firms must accurately report their financial position because:",opts:["they are trusted to maintain an accurate accounting of people's revenue and expenses.","others rely on the information when making credit and/or investment decisions.","they maintain both brick-and-mortar and virtual businesses for trading.","people know that investment firms would not take advantage of them."],ans:1,exp:"Others rely on investment firms' financial information when making credit and investment decisions. It's essential that investment firms share their actual financial situation rather than manipulate numbers."},
  {q:"Which of the following establishes the guidelines for the way that a publicly owned company reports its financial position?",opts:["The federal government","The board of directors","The accounting department","The stockholders"],ans:0,exp:"Governments require businesses to provide certain types of financial information to regulatory agencies and shareholders. Public corporations must provide verified financial information to shareholders and investors."},
