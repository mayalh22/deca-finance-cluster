  {q:"Which of the following statements regarding accounting and finance is correct?",opts:["Accounting is much broader than finance, which focuses on investments.","Accounting focuses on the past, while finance focuses on the future.","Financial managers typically report to the vice president of accounting.","The finance department focuses on assets, while accountants track liabilities."],ans:1,exp:"Accountants track and analyze financial transactions to determine past financial performance. Finance professionals use that information to predict and plan for the future."},
  {q:"What type of accounting system is used for internal decision making, is not governed by generally accepted accounting principles, and emphasizes the future?",opts:["Managerial","Tax","Financial","Double entry"],ans:0,exp:"Managerial accounting systems aid managers with decision making, planning, and controlling. They are not required by law, do not follow GAAP, and are not designed for external audiences."},
  {q:"If a trend indicates that a business is making more money, the business is most likely to have identified the trend by comparing its __________ from previous time periods.",opts:["advertising budgets","profitability ratios","interest rates","payroll records"],ans:1,exp:"Profitability ratios measure the business's ability to generate profit. Comparing profitability ratios from consecutive periods (e.g., quarterly) can show whether the business is generating more money."},
  {q:"An automotive parts supplier must decide whether to extend a credit line to a new business customer. Before approving or denying credit, what should the supplier do?",opts:["Analyze the customer's credit application, credit report, bank information, and financial statements","Contact company shareholders and ask for permission to extend credit to the customer","Discuss the customer's request for credit with the supplier's financial accountants","Evaluate the qualifications and work histories of the customer's management team"],ans:0,exp:"Businesses commonly analyze a customer's credit application, credit report, bank information, and financial statements to determine whether to extend credit. Financial history is more important than management qualifications."},
  {q:"Which of the following sources of financial data might a manager use to analyze expense variances?",opts:["Cash receipts","Customer invoices","Payroll reports","Productivity reports"],ans:2,exp:"Payroll reports indicate the flow of funds out of a firm to its employees—a business expense. Managers use them to analyze expense variances. Customer invoices and cash receipts focus on revenue."},
  {q:"Making sure a company follows laws and regulations describes the HR management activity of:",opts:["staffing.","compliance.","compensation and benefits.","employee relations."],ans:1,exp:"Compliance is the HR management activity that ensures a company follows all applicable laws and regulations. Staffing ensures appropriate employees are available; compensation and benefits manages pay."},
  {q:"Businesses should keep promises to customers in both personal interactions with employees and:",opts:["advertising.","newspaper articles.","coworker interactions.","future products."],ans:0,exp:"Keeping promises to customers involves both personal interactions and advertising. Companies must make good on their promises regardless of what method they used to make them."},
  {q:"While researching information for a business report, Tara reads: 'Although unemployment has dropped slightly, many politicians have indicated that they believe the government has done enough to get our country out of this recession.' This is an example of information that contains:",opts:["statistics.","historical facts.","criticism.","poll data."],ans:2,exp:"Politicians expressing disapproval (that the government has done enough) is criticism—a statement of disapproval based on opinion or beliefs rather than facts."},
  {q:"If a company is managing its information effectively, the data should be accurate and: [14E]",opts:["encrypted.","relevant.","anonymous.","positive."],ans:1,exp:"To make appropriate decisions, companies need accurate and relevant information. Relevant information is applicable to the decision at hand—not all information needs to be encrypted."},
  {q:"JavaScript, BETA, AppleScript, and Ubercode are examples of computer:",opts:["service providers.","search engines.","programming languages.","disk drives."],ans:2,exp:"Programming languages are the code that instructs a computer to carry out specific actions. Search engines crawl the Web; service providers provide internet access; disk drives store data."},
  {q:"An upscale department store tracks customer purchases made with store credit cards and tailors promotional messages to specific clients based on their purchases. What software allows the retailer to manage this strategy?",opts:["Spreadsheet","Word processing","Database","Systems tools"],ans:2,exp:"Database software allows companies to collect, store, and organize customer information, then use it to send certain messages to specific customers. Spreadsheet and word-processing software do not perform these functions."},
  {q:"How long are businesses required to keep their records?",opts:["On a seasonal basis","Varies greatly","Indefinitely","One year"],ans:1,exp:"The length of time that businesses must keep records varies greatly. Some records must be kept indefinitely; others may be kept on a seasonal basis or for only one year. The law often determines how long."},
  {q:"What type of information should a company's marketing department review to make sure that enough products are available to meet customer demand for an upcoming sales promotion?",opts:["Performance","Financial","Operations","Inventory"],ans:3,exp:"By reviewing inventory reports, employees can see how much stock is available and how much needs to be ordered to ensure stock is available during the sales promotion."},
  {q:"Warehousing and shipping methods are operations considerations related to:",opts:["scheduling.","logistics.","maintenance needs.","expense control."],ans:1,exp:"Logistics refers to the function of operations that manages the flow of goods and services from production to consumption, including all processes involved in storing (warehousing) and transporting goods (shipping)."},
  {q:"What does the Occupational Safety and Health Administration (OSHA) require all companies to have available for use?",opts:["Emergency generator units","Replacement office equipment","Adequate first-aid supplies","Back-up power sources"],ans:2,exp:"OSHA requires companies of all sizes to have adequate first-aid supplies available for use. It does not require emergency generators, replacement equipment, or back-up power sources."},
  {q:"What do you need to identify if there are complicated jobs that members of the group are unable to perform?",opts:["Support services","Alternative tasks","Technical equipment","Replacement items"],ans:0,exp:"Support services are technical or complicated activities that project members cannot do themselves. You must identify the other people, organizations, and businesses that need to be involved in the project."},
  {q:"What is an important activity that businesses should include in project planning to improve the chances of the project being successful?",opts:["Orientation","Communication","Negotiation","Compensation"],ans:1,exp:"Communication is an exchange of information and is essential for project success. Everyone involved needs to know the goals, strategies, and expected outcomes to provide input and perform their assigned tasks."},
  {q:"What do managers often use to evaluate project results?",opts:["Standards","Techniques","Resources","Activities"],ans:0,exp:"Standards are specifications or statements used as a basis for making comparisons. Managers compare project results with the established standards to determine if the project was effective."},
  {q:"An important aspect of a quality culture in the workplace is the belief that:",opts:["change is unnecessary.","management has the best ideas.","there are ways to improve.","individual performance is most important."],ans:2,exp:"In a quality culture, employees share the belief that all business functions must consistently achieve standards of excellence and that there are always ways to improve those standards."},
  {q:"Why is it important for a business to keep its selling area neat and clean?",opts:["To please vendors","To satisfy inspectors","To attract customers","To interest employees"],ans:2,exp:"Customers prefer to shop at businesses that are clean and neat. Keeping the selling area in good condition promotes an image that appeals to customers and encourages them to buy."},
  {q:"A man comes to pick up his order and Courtney tells him it hasn't arrived yet. She asks for his order number again so she can double-check it and find out where it is. Which step of the seven-step problem-solving method does this situation illustrate?",opts:["State and check assumptions","Collect information","Define the problem","Evaluate the solution"],ans:1,exp:"Courtney is collecting information about the man's order so she can find out why it hasn't arrived on time. The problem has already been defined—the man's order is missing."},
  {q:"To allow your ideas to flow freely when trying to be creative, you should avoid being:",opts:["determined.","independent.","self-critical.","curious."],ans:2,exp:"Few things stop creativity like criticism. Censoring your ideas limits the number and quality of ideas that appear. Independence, curiosity, and determination are traits creative people often have."},
  {q:"Which of the following items might show up on a daily 'to-do' list?",opts:["Marketing department meeting at 1:30","Research at least five career paths","Move to New York City","Read 20 articles in BusinessWeek"],ans:0,exp:"A marketing department meeting at 1:30 is a specific, time-bound item for today's to-do list. Researching career paths and reading 20 articles belong on weekly/monthly lists. Moving to New York is a goal."},
  {q:"Which of the following is a technique for effectively beginning an employment interview?",opts:["Give name clearly","Tell a joke","Speak loudly","Take the initiative"],ans:0,exp:"An effective technique for getting off to a good start is to smile and give your name clearly when you greet the interviewer. This sends a positive signal and creates a good first impression."},
  {q:"Under which of the following circumstances is it appropriate for applicants to prepare interview follow-up letters?",opts:["Before they agree to pre-employment testing","When they are no longer interested in the job","After they have submitted application forms","In order to send information with résumés"],ans:1,exp:"One reason for sending follow-up letters is to be courteous and thank the interviewer. Applicants should send follow-up letters even if no longer interested, as this builds positive relationships for future opportunities."},
  {q:"Which of the following is usually the most effective way of developing career opportunities?",opts:["Interviewing","Networking","Mentoring","Counseling"],ans:1,exp:"Research indicates that more people get jobs and advance in their careers through networking than through any other way. Individuals who network regularly often obtain the positions they want."},
  {q:"Which of the following jobs involves determining the value of property?",opts:["Real estate appraiser","Underwriter","Real estate agent","Actuary"],ans:0,exp:"A real estate appraiser determines the value of a specific property. A real estate agent assists buyers and sellers. An underwriter calculates risk of loss. An actuary assesses risk using statistical analysis."},
  {q:"If you wanted to pursue a career that specializes in helping corporations and governments issue securities, you would work in:",opts:["a brokerage house.","a stock exchange.","investment banking.","financial planning."],ans:2,exp:"Investment banks trade securities, help businesses and governments issue securities, and handle mergers and acquisitions. Brokerage houses trade securities for clients; stock exchanges are where trading is conducted."},
  {q:"A primary aspect of Bridget's job is to evaluate her company's internal financial information and external factors affecting the company's financial well-being, then make financial recommendations. Which certification is Bridget most likely to have?",opts:["Chartered Life Underwriter (CLU)","Chartered Financial Analyst (CFA)","Certified Loan Officer (CLO)","Certified Annuity Specialist (CAS)"],ans:1,exp:"The CFA certification is comprehensive and beneficial to finance professionals who focus on the long-range financial well-being of businesses and organizations. It requires passing three levels of exams."},
  {q:"Which of the following provides an opportunity for building professional, finance-oriented relationships?",opts:["Market segmentation","Product development","Brainstorming","Networking"],ans:3,exp:"Networking involves communicating with all people you know who might help with career opportunities. Finance professionals can build new business relationships, obtain referrals, and acquire leads through networking."},
  {q:"How do ethics relate to risk management?",opts:["Risk management is insurance for lapses in business ethics.","Risk management is all about the ethical treatment of customers.","The best form of risk management is adherence to business ethics.","The best form of business ethics is risk management."],ans:2,exp:"Every breach of business ethics represents a potential risk for businesses. The best thing businesses can do to overcome most risks is to practice business ethics—doing the right thing."},
  {q:"Which of the following is a method that businesses use to reduce the risk of unauthorized access to confidential computer data?",opts:["Groupware applications","Decryption software","Passwords","Spooling"],ans:2,exp:"Businesses often assign computer passwords to allow only authorized employees to view secured information, reducing the risk of confidential information getting into the wrong hands."},
  {q:"Which of the following is a risk associated with management's failure to follow business regulations?",opts:["Effective reporting methods","Lower insurance premiums","Expected customer-satisfaction levels","Financial losses in relation to lawsuits"],ans:3,exp:"If a business doesn't comply with laws and a lawsuit results, the business may be required to pay money to the plaintiff. This is a financial loss associated with noncompliance."},
  {q:"What can businesses do to reduce risks associated with noncompliance?",opts:["Allocate operating funds","Evaluate competitors","Obtain customer feedback","Monitor regulations"],ans:3,exp:"It is important for a business to continuously monitor government regulations to ensure compliance and make changes if necessary to become compliant, reducing risks associated with noncompliance."},
  {q:"Why is the choice of a risk measure for internal and external risk of great practical importance?",opts:["It determines the minimum reserve requirements in financial trading.","It determines the maximum number of clients that can be served effectively by a financial institution.","It identifies the types of risks that the financial institution will encounter.","It designates the audience that will receive the resulting financial reports."],ans:0,exp:"Different measures can result in a lower or higher minimum reserve requirement, which results in a lower or higher profit for the financial institution—making the choice of risk measure very important."}

// State
let pileX = [];
let pileY = [];
let pileU = [];
let current = null;
let answered = false;
let queue = [];
let queueSource = '';

function initPiles() {
  pileX = [];
  pileY = [];
  pileU = ALL_QUESTIONS.map((_, i) => i);
  buildQueue();
}

function buildQueue() {
  if (pileU.length > 0) {
    queue = shuffle([...pileU]);
    queueSource = 'unseen';
  } else if (pileY.length > 0) {
    queue = shuffle([...pileY]);
    queueSource = 'review';
  } else {
    queue = shuffle([...pileX]);
    queueSource = 'mastered';
  }
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function nextQuestion() {
  if (queue.length === 0) {
    showRoundComplete();
    return;
  }
  current = queue.shift();
  render();
}

function render() {
  const q = ALL_QUESTIONS[current];
  const total = ALL_QUESTIONS.length;

  document.getElementById('count-x').textContent = pileX.length;
  document.getElementById('count-y').textContent = pileY.length;
  document.getElementById('count-u').textContent = pileU.length;

  const progress = pileX.length / total;
  document.getElementById('progress-bar').style.width = `${progress * 100}%`;

  document.getElementById('meta').textContent = `Question from ${queueSource === 'review' ? 'Review (Incorrect)' : queueSource === 'mastered' ? 'Mastered' : 'Unseen'}  |  ${pileX.length}/${total} mastered`;

  document.getElementById('question').textContent = q.q;
  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.opts.forEach((o, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.textContent = `${['A','B','C','D'][i]}. ${o}`;
    btn.onclick = () => choose(i);
    opts.appendChild(btn);
  });
  document.getElementById('explanation').style.display = 'none';
  document.getElementById('wrong-choice-note').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';
  answered = false;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const q = ALL_QUESTIONS[current];
  const btns = document.querySelectorAll('.opt');
  btns.forEach(b => b.disabled = true);
  const correct = q.ans;
  btns[correct].classList.add('correct');

  const exp = document.getElementById('explanation');

  if (i === correct) {
    pileU = pileU.filter(x => x !== current);
    pileY = pileY.filter(x => x !== current);
    if (!pileX.includes(current)) pileX.push(current);

    exp.className = '';
    exp.style.display = 'block';
    exp.innerHTML = `<strong>✓ Correct → Mastered Pile.</strong><br><br>${q.exp}`;
    document.getElementById('wrong-choice-note').style.display = 'none';
  } else {
    btns[i].classList.add('wrong');

    pileU = pileU.filter(x => x !== current);
    pileX = pileX.filter(x => x !== current);
    if (!pileY.includes(current)) pileY.push(current);

    const wrongNote = document.getElementById('wrong-choice-note');
    wrongNote.style.display = 'block';
    wrongNote.innerHTML = `<strong>You chose: ${['A','B','C','D'][i]}. ${q.opts[i]}</strong> — This is incorrect.`;

    exp.className = 'wrong-exp';
    exp.style.display = 'block';
    exp.innerHTML = `<strong>✗ Incorrect → Review Pile.</strong> Correct answer: <strong>${['A','B','C','D'][correct]}. ${q.opts[correct]}</strong><br><br>${q.exp}`;
  }

  document.getElementById('count-x').textContent = pileX.length;
  document.getElementById('count-y').textContent = pileY.length;
  document.getElementById('count-u').textContent = pileU.length;
  document.getElementById('progress-bar').style.width = `${(pileX.length / ALL_QUESTIONS.length) * 100}%`;

  document.getElementById('next-btn').style.display = 'inline-block';
}

function showRoundComplete() {
  document.getElementById('quiz-screen').style.display = 'none';
  const rc = document.getElementById('round-complete');
  rc.style.display = 'block';

  if (pileU.length === 0 && pileY.length === 0) {
    document.getElementById('round-title').textContent = 'All Questions Mastered!';
    document.getElementById('round-sub').textContent = `You've mastered all ${ALL_QUESTIONS.length} questions! Keep reviewing to stay sharp.`;
    document.getElementById('continue-btn').textContent = 'Review All Again →';
  } else if (pileU.length === 0) {
    document.getElementById('round-title').textContent = 'All Unseen Questions Done!';
    document.getElementById('round-sub').textContent = `Mastered: ${pileX.length} | Question from ${pileY.length} pile questions to retry.`;
    document.getElementById('continue-btn').textContent = 'Start Review Pile →';
  } else {
    document.getElementById('round-title').textContent = 'Review Round Complete!';
    document.getElementById('round-sub').textContent = `Mastered: ${pileX.length} | Still in review: ${pileY.length} | Unseen: ${pileU.length}`;
    document.getElementById('continue-btn').textContent = 'Continue →';
  }
}

document.getElementById('next-btn').onclick = () => nextQuestion();

document.getElementById('continue-btn').onclick = () => {
  document.getElementById('round-complete').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';

  if (pileU.length === 0 && pileY.length === 0) {
    pileX = [];
    pileU = ALL_QUESTIONS.map((_, i) => i);
  }
  buildQueue();
  nextQuestion();
};

initPiles();
nextQuestion();
</script>
