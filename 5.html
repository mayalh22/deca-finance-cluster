<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DECA Finance Quiz</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Roboto', sans-serif; background: #fff; color: #152238; min-height: 100vh; }
  #app { max-width: 720px; margin: 0 auto; padding: 40px 24px; }
  #progress-bar-wrap { background: #e0e0e0; height: 4px; border-radius: 2px; margin-bottom: 32px; }
  #progress-bar { background: #009b47; height: 4px; border-radius: 2px; transition: width 0.3s; }
  #meta { font-size: 13px; color: #888; margin-bottom: 20px; font-weight: 500; letter-spacing: 0.5px; }
  #pile-info { font-size: 13px; color: #555; margin-bottom: 12px; display: flex; gap: 16px; }
  .pile-badge { padding: 3px 10px; border-radius: 12px; font-weight: 700; font-size: 12px; }
  .pile-x { background: #e6f9ef; color: #009b47; border: 1px solid #009b47; }
  .pile-y { background: #fff0f0; color: #c0392b; border: 1px solid #c0392b; }
  .pile-u { background: #f0f0f0; color: #888; border: 1px solid #ccc; }
  #question { font-size: 18px; font-weight: 500; line-height: 1.5; margin-bottom: 28px; color: #152238; }
  .opt { display: block; width: 100%; text-align: left; background: #fff; border: 2px solid #e0e0e0; color: #152238; padding: 14px 18px; margin-bottom: 10px; font-size: 15px; font-family: 'Roboto', sans-serif; cursor: pointer; border-radius: 4px; transition: border-color 0.15s; }
  .opt:hover:not(:disabled) { border-color: #009b47; }
  .opt.correct { border-color: #009b47; background: #f0fff6; color: #152238; }
  .opt.wrong { border-color: #c0392b; background: #fff5f5; color: #152238; }
  .opt:disabled { cursor: default; }
  #explanation { display: none; background: #f7f7f7; border-left: 4px solid #009b47; padding: 16px 18px; margin-top: 20px; font-size: 14px; line-height: 1.6; color: #333; border-radius: 0 4px 4px 0; }
  #explanation.wrong-exp { border-left-color: #c0392b; }
  #wrong-choice-note { display: none; background: #fff5f5; border-left: 4px solid #c0392b; padding: 12px 18px; margin-top: 12px; font-size: 14px; line-height: 1.6; color: #333; border-radius: 0 4px 4px 0; }
  #next-btn { display: none; margin-top: 24px; background: #009b47; color: #fff; border: none; padding: 14px 32px; font-size: 15px; font-family: 'Roboto', sans-serif; font-weight: 700; cursor: pointer; border-radius: 4px; letter-spacing: 0.5px; }
  #next-btn:hover { background: #007a38; }
  #round-complete { display: none; text-align: center; padding: 60px 0; }
  #round-complete h2 { font-size: 28px; font-weight: 700; color: #152238; margin-bottom: 8px; }
  #round-complete p { font-size: 16px; color: #555; margin-bottom: 32px; }
  #continue-btn { background: #c0392b; color: #fff; border: none; padding: 14px 36px; font-size: 15px; font-family: 'Roboto', sans-serif; font-weight: 700; cursor: pointer; border-radius: 4px; }
  #continue-btn:hover { background: #a93226; }
</style>
</head>
<body>
<div id="app">
  <div id="quiz-screen">
    <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
    <div id="pile-info">
      <span class="pile-badge pile-x">✓ Mastered: <span id="count-x">0</span></span>
      <span class="pile-badge pile-y">✗ Review: <span id="count-y">0</span></span>
      <span class="pile-badge pile-u">? Unseen: <span id="count-u">0</span></span>
    </div>
    <div id="meta"></div>
    <div id="question"></div>
    <div id="options"></div>
    <div id="wrong-choice-note"></div>
    <div id="explanation"></div>
    <button id="next-btn">Next →</button>
  </div>
  <div id="round-complete">
    <h2 id="round-title"></h2>
    <p id="round-sub"></p>
    <button id="continue-btn">Keep Going →</button>
  </div>
</div>
<script>
const ALL_QUESTIONS = [
  // ── EXAM 1123 ──
  {q:"Which of the following is a type of intangible business property that is protected by law?",opts:["Equipment","Inventory","Acreage","Trademark"],ans:3,exp:"A trademark is a symbol, design, or word used by a business to identify a good or service and is registered with the government to prevent its use by others. Equipment, inventory, and acreage are tangible property."},
  {q:"When filing a tort against a business, the plaintiff must establish that the defendant:",opts:["damaged property intentionally.","breached the duty of care.","conspired with a competitor.","violated the doctrine of sovereign immunity."],ans:1,exp:"The duty of care is the basic principle expecting all individuals and businesses to exhibit socially responsible behavior. A plaintiff must establish that the defendant breached this duty."},
  {q:"Which of the following is an example of a voluntary debtor-creditor relationship?",opts:["Requiring specific information","Receiving a monetary gift","Obtaining a loan from a bank","Owing punitive damages"],ans:2,exp:"Obtaining a loan from a bank is voluntary because the business (debtor) seeks funds from the bank (creditor) through a loan-application process. Punitive damages are an involuntary debtor-creditor relationship."},
  {q:"Chris purchased stock in HRR, posted false information online to hype it up, drove up the price, then sold for a large profit—leaving other investors with worthless stock. What type of investment scam did Chris commit?",opts:["Phishing","Pyramid scheme","Ponzi scheme","Pump and dump"],ans:3,exp:"Pump and dump involves buying a small stock, hyping it online to drive the price up, then selling at the peak and leaving victims with a worthless stock."},
  {q:"Which of the following statements best describes the taxation of Roth IRAs?",opts:["Contributions and withdrawals during retirement are both taxed.","Contributions are tax deductible, but withdrawals during retirement are taxed.","Contributions are taxed, but withdrawals during retirement are not.","Contributions and withdrawals during retirement are tax deductible."],ans:2,exp:"Roth IRA contributions are made with after-tax dollars, but earnings and qualified withdrawals during retirement are tax-free."},
  {q:"Compliance in the finance industry involves financial institutions operating within:",opts:["specific territories.","regulatory guidelines.","organizational plans.","different relationships."],ans:1,exp:"Compliance means following governmental rules and regulations. Its purpose is to make the industry safe for consumers and maintain the stability of the financial system."},
  {q:"In general, a governance, risk, and compliance (GRC) software system identifies and measures risk; monitors the risk-management system; routinely checks adherence to company-wide policies; and ensures compliance with:",opts:["reporting requirements.","union demands.","product standards.","contingency plans."],ans:0,exp:"GRC software ensures compliance with reporting requirements enforced by federal and state government agencies and other regulatory commissions."},
  {q:"While conducting a staff meeting, the speaker noticed that Colin was texting on his smartphone. Colin's nonverbal behavior indicates that he was:",opts:["distracted.","annoyed.","listening to the speaker.","interested in the topic."],ans:0,exp:"Since Colin was looking at his phone and texting, he was distracted and probably not paying attention to the speaker."},
  {q:"Before DiAnn presents her new idea to her boss, she searches the Internet and jots down two statistics that reinforce the idea. This is an example of:",opts:["obtaining primary information.","supporting ideas with evidence.","giving alternative ideas.","clarifying a new idea."],ans:1,exp:"Ideas that are evidence-based are more easily accepted. DiAnn is collecting secondary information to support/validate her original idea."},
  {q:"Alma is preparing a presentation about her department's budget that shows parts in relation to the whole. Alma should consider using a:",opts:["table.","pie chart.","line graph.","bar graph."],ans:1,exp:"A pie chart shows parts in relation to the whole—the best way to illustrate how budget components add up to form the whole."},
  {q:"What type of letter should a business include when sending copies of a contract to a vendor?",opts:["Request","Acknowledgment","Claim","Transmittal"],ans:3,exp:"A transmittal letter accompanies important business papers such as contracts, indicating how many copies are included and if any action is required."},
  {q:"Identify the type of appeal used in: 'This new book is written by Dr. Juliet Browne, who holds a doctorate from Harvard and is Chair of the World Health Organization.'",opts:["Emotions","Reason","Credibility","Shock value"],ans:2,exp:"Credibility is achieved when the audience has confidence in the persuader. Dr. Browne's title and degree make her a credible source."},
  {q:"What is a type of informal communication that coworkers often use to communicate with each other?",opts:["Network","Feedback","Grapevine","Structured"],ans:2,exp:"Grapevine is an oral communication method in which information is passed around the company informally, not formally announced or verified."},
  {q:"What is one of the benefits to a business of reinforcing service orientation through communication?",opts:["Rewards customers for their support","Promotes the sale of new products","Builds positive relationships with customers","Encourages employees to be aggressive"],ans:2,exp:"Communicating effectively with customers builds trust, which tends to build positive relationships. Loyal customers often remain because they trust the business will treat them well."},
  {q:"Karl apologized for a delayed order, checked with the transportation company, and immediately called Mr. Schwarz with the delivery update. In this situation, Karl reinforced the company's image by:",opts:["delegating work tasks.","giving vague answers.","providing efficient follow-up.","complimenting the customer."],ans:2,exp:"Karl worked quickly and called back with specific information—an example of efficient follow-up that builds favorable relationships with customers."},
  {q:"What is an important aspect of a customer-centric business?",opts:["Reducing the number of touch points with customers","Limiting the employees' decision making","Being satisfied with the status quo","Aligning business activities with customer needs"],ans:3,exp:"A customer-centric business focuses on customer needs and wants, ensuring its objectives and activities align with those needs and continuously improving to accommodate changing wants."},
  {q:"When providing product information to clients, finance professionals should use:",opts:["standard responses.","technical terms.","financial acronyms.","simple explanations."],ans:3,exp:"Clients may not be familiar with finance industry jargon or acronyms. Finance professionals should use simple, clear language clients understand."},
  {q:"Beverly discovered erroneous duplicate entries of $25,628 in accounts receivable, causing incorrect collection letters to be sent. What should Beverly do to save these customer relationships and prevent future errors?",opts:["Contact each customer by phone and apologize","Complete an accounting software update","Complete a data cleansing of the erroneous entries","Use funds from accounts payable to pay the debt"],ans:2,exp:"Data cleansing removes duplicate/erroneous entries, ensuring customers are not bothered in the future. Software updates alone won't fix bad data already in the system."},
  {q:"The process or activity of using goods is called:",opts:["production.","consumption.","exchange.","distribution."],ans:1,exp:"Consumption is when everyone uses goods and services to satisfy unlimited wants. Production makes goods; exchange involves money payments; distribution divides payments."},
  {q:"Which is an example of a change in the relative price ratio when red apples originally cost $0.60/lb and green apples $0.80/lb?",opts:["Red @ $0.30; green @ $0.40","Red @ $0.90; green @ $0.80","Red @ $0.45; green @ $0.60","Red @ $1.20; green @ $1.60"],ans:1,exp:"Red @ $0.90 and green @ $0.80 is the only combination that changes the ratio (was 3:4, now 9:8). The other options maintain the same 3:4 ratio."},
  {q:"Determining what consumers want in order to promote and sell those goods and services is a function of the business activity of:",opts:["risk management.","quality management.","production.","marketing."],ans:3,exp:"Marketing identifies what consumers want and plans how to promote and sell those goods and services to consumers."},
  {q:"Which of the following describes the matrix organizational structure?",opts:["It is a combination of two other organizational structures.","It includes only traditional departments such as sales and marketing.","It is separated by product lines.","It is the oldest organizational structure being used."],ans:0,exp:"The matrix organizational structure is a combination of the functional structure and the divisional structure—a newer organizational design."},
  {q:"Seeing the big picture instead of smaller, individual parts is an organizational learning concept known as:",opts:["systems thinking.","team learning.","shared organizational vision.","personal mastery."],ans:0,exp:"Systems thinking focuses on the big picture rather than seeing smaller, individual parts of the organization."},
  {q:"The general economic growth of a country is supported by its:",opts:["level of productivity.","standard of living.","gross domestic product.","wealth of goods and services."],ans:0,exp:"The general economic growth of a country depends upon its level of productivity. GDP measures economic growth; standard of living and wealth of goods are results of productivity."},
  {q:"Colleen will vote next week on the new contract her union negotiated with management. Union and management are in the __________ stage of the collective-bargaining process.",opts:["contract settlement","ratification of contract","preparation and research","tentative agreement"],ans:3,exp:"Tentative agreement is the stage where union and management have agreed on terms but still need union members to approve or reject the contract."},
  {q:"An economy with a high unemployment level tends to have:",opts:["rapid GDP growth.","a high supply of money.","fewer monetary policies.","a lower rate of inflation."],ans:3,exp:"When many people are out of work, they lose buying power, less money circulates, and demand for goods/services is low—which tends to slow or lower the rate of inflation."},
  {q:"Jon decided to promote Bill instead of Maggie to regional manager because he thinks women aren't assertive enough in business situations. Jon is stereotyping on the basis of:",opts:["age.","ethnicity.","religion.","gender."],ans:3,exp:"Assuming men are more assertive than women in business is a gender stereotype—a distorted belief. Many women are very assertive in business situations."},
  {q:"One way that individuals exhibit self-confidence is by being:",opts:["creative.","enthusiastic.","emotional.","reserved."],ans:1,exp:"Self-confident people believe in themselves and usually display enthusiasm—great interest or excitement in what they do."},
  {q:"Maureen becomes angry and defensive whenever her supervisor asks her to correct mistakes. Maureen's attitude is not a good response to criticism because:",opts:["it indicates that Maureen wants to call attention to herself.","there is no reason to be angry about criticism.","Maureen has no right to be angry on the job.","it prevents Maureen from hearing the criticism clearly."],ans:3,exp:"Defensiveness raises a barrier between you and the speaker. If Maureen listened with an open mind, she might learn how to correct and avoid future mistakes."},
  {q:"Which of the following is an example of an employee respecting the privacy of a coworker?",opts:["Speaking up for a coworker who is being unfairly criticized","Leaving the room when a salesperson takes a telephone call","Giving feedback about a project to a coworker or manager","Answering a coworker's telephone when s/he is at lunch"],ans:1,exp:"An employee who respects others' privacy would leave the room when a coworker takes a telephone call, gaining the trust and respect of coworkers."},
  {q:"Barry's family is originally from Ireland. Their customs, habits, and traditions are known as their:",opts:["stereotype.","culture.","diversity.","religion."],ans:1,exp:"The customs, habits, and traditions of a particular group of people are known as their culture."},
  {q:"Insecure people are often afraid to become assertive because they think they will:",opts:["damage their relationships.","have to please others.","be considered childish.","lose their independence."],ans:0,exp:"Insecure people are anxious about interpersonal relationships and fear that being assertive may ruin a friendship or end a relationship."},
  {q:"Keeping the end goal in mind refers to which standard of excellence that achievement-oriented people set?",opts:["Results","Improvement","Trying something new","Competition"],ans:0,exp:"Keeping the end goal in mind refers to being results-oriented—a characteristic of achievement-oriented people who like to objectively evaluate their successes."},
  {q:"One way a leader can encourage others to work toward a shared vision is by:",opts:["guaranteeing a profit for the business.","describing the objective.","reviewing the new assignment.","explaining how they will benefit."],ans:3,exp:"People tend to work harder to achieve a vision if they understand how they will benefit. A leader should explain those benefits to encourage employees."},
  {q:"Coaching is mostly about:",opts:["talking.","organizing.","instructing.","listening."],ans:3,exp:"Coaching is mostly about listening. Coaches must truly understand what the other person is saying and where s/he's coming from."},
  {q:"Which of the following people would make the best entrepreneur?",opts:["A risk-averse person who wants to work 9-to-5","A person who lacks self-confidence","A risk-taker who has a strong work ethic","A person who often works so hard she makes herself sick"],ans:2,exp:"Entrepreneurship requires risk-taking, a strong work ethic, and self-confidence. It often requires working much longer hours than 9-to-5."},
  {q:"When the U.S. federal government owes money to a contracted employee or business, the government must pay according to the:",opts:["Early Bird Act.","Prompt Payment Act.","Secure Contracting Act.","Government Guidelines Act."],ans:1,exp:"The Prompt Payment Act governs when the U.S. federal government must pay contracted employees or businesses."},
  {q:"Financial planning can be described as a way to:",opts:["retire with a substantial amount of money in the bank.","stop all impulsive purchases.","achieve your professional goals.","realize what it takes to get the things you really want."],ans:3,exp:"Financial planning is a good way to realize what it takes to get the things you really want—not a guarantee for retirement savings or stopping impulsive purchases."},
  {q:"The key factors involved in compounding growth are the amount of money you invest, how much your investment grows each year, and:",opts:["your educational background and career.","how you earn the money that you invest.","how long your money is invested.","your mutual fund manager's education."],ans:2,exp:"The three key factors in compounding growth are: how much you invest, how much it grows each year, and how long your money is invested. Time is the most impactful factor."},
  {q:"What is the first step Cameron should take to protect himself from identity theft after he loses his wallet?",opts:["Advise law enforcement authorities about the loss","Contact the appropriate government agency to replace credit cards","Cancel all of his credit and debit cards","Change the passwords for his online banking accounts"],ans:2,exp:"The first thing Cameron should do is cancel his credit and debit cards to protect himself in case someone finds his wallet and attempts to use them."},
  {q:"Which of the following are examples of deposit-taking financial institutions?",opts:["Commercial banks, corporations, and mutual savings banks","Credit unions, savings and loan associations, and commercial banks","Savings and loan associations, mutual savings banks, and insurance firms","Commercial banks, credit unions, and brokerages"],ans:1,exp:"Credit unions, commercial banks, savings and loan associations, and mutual savings banks are deposit-taking institutions. Corporations, brokerages, and insurance firms are not."},
  {q:"If Hannah wants to invest in the capital markets, what types of securities should she purchase?",opts:["Corporate bonds and treasury bills","Common stock and certificates of deposit","Treasury bills and certificates of deposit","Corporate bonds and preferred stock"],ans:3,exp:"Capital markets buy and sell long-term securities like corporate bonds and preferred/common stock. Treasury bills and CDs are money market (short-term) securities."},
  {q:"Supervised by the Federal Reserve Board, The DAB Company provides investment advisory services, insurance underwriting, securities underwriting, and merchant banking services. What does the DAB Company exemplify?",opts:["An accounting firm","A financial holding company","A central bank","A commodities investor"],ans:1,exp:"Financial holding companies provide a wide variety of financial services and are supervised by the Federal Reserve Board."},
  {q:"According to most analysts, the three economic indicators that stock market investors and traders should pay the closest attention to are:",opts:["inflation, unemployment, and bond rates.","interest rates, overhead expenses, and inflation.","Gross Domestic Product, overhead expenses, and unemployment.","Gross Domestic Product, unemployment, and inflation."],ans:3,exp:"GDP, unemployment, and inflation are the three economic indicators most closely watched by stock market investors. Overhead expenses and bond rates are not economic indicators."},
  {q:"What do some investors use to hedge the risk of investing in the foreign exchange market?",opts:["No-load funds","Emerging markets","Venture capital","Derivatives"],ans:3,exp:"Derivatives are financial instruments whose value depends upon other instruments or market indices. Investors use them to hedge or reduce risk in the volatile foreign exchange market."},
  {q:"What type of financial statement includes an accounting of the shareholders' equity for a company?",opts:["Annual report","Income statement","Cash flow statement","Balance sheet"],ans:3,exp:"The balance sheet lists assets and liabilities. Shareholders' equity (assets minus liabilities) appears in the liabilities section. The income statement shows profitability over time."},
  {q:"The most common headings on a stock table include the 52-week high and low, stock symbol, estimated dividend per share, yield %, volume, closing price, net change and the:",opts:["net income.","earnings per share.","price-earnings ratio.","stockholder's equity."],ans:2,exp:"The price-earnings (PE) ratio is commonly found on stock tables. Investors study the PE ratio to assess whether a stock is overvalued or undervalued compared to competitors."},
  {q:"Businesses usually invest in:",opts:["bonds.","themselves.","stocks.","real estate."],ans:1,exp:"Businesses most commonly invest back into themselves by developing new products, purchasing the latest technologies, and expanding into new markets."},
  {q:"One advantage to businesses of using electronic funds transfer technology to collect accounts receivable is that it eliminates:",opts:["check processing.","liquidity reporting.","sales discounting.","payee outsourcing."],ans:0,exp:"Electronic funds transfer lets customers pay invoices electronically, eliminating the need to handle checks, fill out deposit slips, and wait for check processing."},
  {q:"A business's balance sheet lists $3,800 in cash, $15,125 in accounts payable, $2,775 in taxes, $10,350 in machinery and equipment, and $6,280 in salaries. Calculate the business's total liabilities.",opts:["$27,030","$18,470","$15,225","$24,180"],ans:3,exp:"Total liabilities = accounts payable + taxes + salaries = $15,125 + $2,775 + $6,280 = $24,180. Cash and machinery are assets, not liabilities."},
  {q:"When preparing a statement of equity, what does a business deduct from its total net income to obtain its retained earnings?",opts:["Bad debt","Depreciation of assets","Sales tax payable","Dividends paid"],ans:3,exp:"Retained earnings are the income a corporation keeps after paying dividends to stockholders. Depreciation, sales tax payable, and bad debt are not deducted on the statement of equity."},
  {q:"A characteristic of managerial accounting is that it focuses on:",opts:["reporting the business's long-term investment goals.","capturing the business's day-to-day financial activities.","developing the business's annual report.","preparing and submitting the business's tax forms."],ans:1,exp:"Managerial accounting focuses on capturing, maintaining, and interpreting accounting information for internal use and decision making—including day-to-day financial activities."},
  {q:"A company purchases an expensive new software system and divides the cost between two departments that will use the system. This is an example of cost:",opts:["allocation.","accumulation.","dividing.","precision."],ans:0,exp:"Cost allocation is the assignment of costs to cost objects such as a project, department, or customer. The company is allocating the software cost to two departments."},
  {q:"When a business has been running successfully for several years, what would be a probable next financial step?",opts:["Acquiring start-up funds","Purchasing a second location","Deciding on financial goals","Determining product prices"],ans:1,exp:"A successful, established business may be in the expansion stage of its lifecycle, which could mean considering purchasing a second location."},
  {q:"What is one downside of debt financing that could be cited to prove it's not a good idea for a small restaurant wanting to expand?",opts:["They will need to sell stock in their business.","Shareholders will own part of their business.","They will have to pay interest on the borrowed amount.","They will be required to repay the money immediately."],ans:2,exp:"A downside of debt financing is that the borrower must pay interest on the borrowed amount, meaning they will owe more than what was initially borrowed."},
  {q:"Ethan is developing common-size financial statements to compare financial performance across several different companies. Ethan is conducting __________ analysis.",opts:["horizontal","vertical","ratio","trend"],ans:1,exp:"Vertical analysis calculates each item on a financial statement as a percentage of the total, producing common-size statements that allow comparison across companies."},
  {q:"Which of the following equations should employees know when verifying the accuracy of a business's balance sheet?",opts:["Assets = Liabilities + Owner's Equity","Owner's Equity = Available Cash - Liabilities","Assets = Owner's Equity - Liabilities","Owner's Equity = Liabilities + Available Cash"],ans:0,exp:"The balance sheet equation is Assets = Liabilities + Owner's Equity. If assets don't equal liabilities plus owner's equity, the balance sheet contains an error."},
  {q:"You want to have $8,000 in three years to purchase a car. You can earn 4% compound interest. How much should you invest today?",opts:["$7,364.10","$7,111.75","$7,692.31","$7,821.47"],ans:1,exp:"PV = $8,000 / (1.04)³ = $8,000 / 1.1249 = $7,111.75. This is the present value formula for compound interest."},
  {q:"Effective financial-information management involves implementing processes that help companies:",opts:["revise economic indicators.","track their ongoing projects.","interpret government regulations.","make appropriate business decisions."],ans:3,exp:"Financial data must be accurate, current, and relevant so businesspeople can make sound business decisions. Making decisions on incorrect data could be very costly."},
  {q:"Which of the following is an example of a businessperson exhibiting unethical behavior in relation to a business's financial information?",opts:["A banker requests financial information from a business to process a loan.","An auditor verifies the accuracy of a corporation's financial statements.","An unauthorized employee reviews a client's financial information.","A manager examines the business's financial records to develop a budget."],ans:2,exp:"Businesses have an ethical duty to protect clients' financial information. An unauthorized employee reviewing client financial information violates that duty."},
  {q:"The foundation of the principle of least authority is that computer data are more secure when access to specific types of data is only available to:",opts:["the customers who request it.","mid-level managers.","personnel during set time periods.","the people who need it."],ans:3,exp:"By limiting access to those who need it, confidential data are more secure and less likely to be seen or modified by unauthorized people."},
  {q:"Which budgeting software tool could Tara use to assess the potential impact of a loan versus a line of credit on her business?",opts:["Zero-based modeling","Decision trees","Environmental scanning","Debt modeling"],ans:3,exp:"Debt modeling tools allow the user to input the terms of a loan or line of credit (interest rate, term, principal) to assess its potential impact on the business."},
  {q:"What financial analysis application does a business use to evaluate changes in its cash position from month to month?",opts:["Expense","Cash flow","Fixed costs","Performance"],ans:1,exp:"Cash flow is the movement of funds into and out of the business. Evaluating cash flow helps the business forecast and determine the amount of cash available at any given time."},
  {q:"Before approving a loan application, a bank is likely to analyze the applicant's:",opts:["inflation rate.","debt ratio.","brand preferences.","performance goals."],ans:1,exp:"The debt ratio indicates the applicant's current level of debt relative to assets (e.g., income, home). A high debt ratio with few liquid assets means a higher risk of default."},
  {q:"The first task in the HR management activity of staffing is:",opts:["determining job descriptions.","screening and selecting applicants.","determining need.","recruiting."],ans:2,exp:"The first task in staffing is determining need. A company cannot fill positions with appropriate employees until it knows exactly where human resources are lacking."},
  {q:"Business customers differ from final consumers in that:",opts:["there is a greater emphasis on personal selling in business-to-business marketing.","business customers don't care about service as much as consumers do.","consumers tend to buy in bulk more often than businesses do.","consumer products tend to be more technical in nature."],ans:0,exp:"In B2B marketing there is a greater emphasis on personal selling, whereas in consumer marketing the emphasis is on promotion and advertising."},
  {q:"Amy says, 'I think the primary reason that last year's sales were higher than this year's is because Jansen Electronics has taken a portion of our market share.' This is an example of:",opts:["comparative criticism.","a fact.","historical data.","an opinion."],ans:3,exp:"Amy is stating her point of view or belief about why sales varied—this is an opinion. She isn't presenting any data to support her statement."},
  {q:"What do most businesses use to store information for future use?",opts:["Scanners","Display screens","Computer systems","Firewalls"],ans:2,exp:"Computer systems consist of hardware and software components that enable computers to function, including storing information for future use. Firewalls protect against unauthorized access."},
  {q:"What web-based tool will help Adian save and organize websites containing relevant information for his final report?",opts:["Personal intranet connection","Notebook with color-coded dividers","Word-processing memo template","Browser bookmarking applications"],ans:3,exp:"Browser bookmarking applications allow users to select websites and store their URLs for easy access, and organize sites into folders by categories."},
  {q:"In which of the following situations would a business use a spreadsheet software program to estimate the effect of change on its financial situation?",opts:["A salesperson kept all appointments.","Mailing labels are needed for a catalog.","Customers purchased more products.","Sales are expected to increase by 5%."],ans:3,exp:"Spreadsheet programs allow businesses to make various assumptions about sales (e.g., a 5% increase) and quickly calculate the effect on net income using automatic formulas."},
  {q:"What application enables a business to identify when a record was added to a database?",opts:["Validation rules","Date/Time stamp","Data replication","Sort"],ans:1,exp:"The date/time stamp identifies the date and time a particular record was added to the database, helping track employees' keying activities and when customers were added."},
  {q:"The primary purpose for record keeping is to provide information about what is happening with the:",opts:["industry.","country.","economy.","business."],ans:3,exp:"The primary function of record keeping is to provide information about the status of the business—such as whether it is making a profit or spending too much on expenses."},
  {q:"Which of the following is an example of how a business or industry has a unique relationship with its environment?",opts:["Social and cultural attitudes change over time.","An economy in prosperity will eventually experience recession.","Demand for skilled nursing care rises as the population ages.","New technology causes new laws to be enacted."],ans:2,exp:"The impact of demographics (aging population) on the health care industry demonstrates the unique relationship between businesses and their environments."},
  {q:"Determine the mode for a customer-survey question using: 7, 5, 3, 7, 7, 9, 5, 7, 9, 9",opts:["5","3","7","9"],ans:2,exp:"The mode is the number that appears most frequently. 3 appears 1 time; 5 appears 2 times; 9 appears 3 times; 7 appears 4 times. The mode is 7."},
  {q:"Which of the following is a common challenge for project managers?",opts:["Laws and regulations","Poorly defined goals","A surplus of resources","A lack of risk"],ans:1,exp:"Poorly defined project goals are one of the many challenges that project managers routinely face. A surplus of resources would be good; laws and regulations typically don't pose a challenge."},
  {q:"Which project-planning tool helps businesses to effectively plan and use time?",opts:["Policies","Objectives","Schedules","Guidelines"],ans:2,exp:"Schedules identify what tasks need to be done and how long they will take, organizing work and establishing completion dates to ensure work is done on time."},
  {q:"Which of the following is NOT a benefit of a post-implementation review?",opts:["Identifying ways to improve project planning","Identifying cost-savings opportunities for future projects","Identifying cost-savings opportunities for the current project","Identifying ways to improve the company's processes"],ans:2,exp:"A post-implementation review is conducted after a project is finished, so there is no opportunity to save money on the current project—only on future ones."},
  {q:"Purchasing is important to international businesses because:",opts:["supplies should be delivered in a timely fashion.","good relations with vendors reduce prices.","quality standards should be maintained.","controlling costs increases competitiveness."],ans:3,exp:"Effective purchasing controls costs, enabling businesses to lower selling prices and remain competitive in world markets."},
  {q:"An advantage to businesses of using quality control methods is that these methods often:",opts:["involve time.","reduce costs.","increase waste.","require directions."],ans:1,exp:"It is more costly not to provide quality than to implement quality control methods. Quality control helps ensure work is done correctly, reducing the cost of correcting mistakes."},
  {q:"An organization with a quality culture would have executive-level managers who are:",opts:["flexible, indifferent, and not responsible for quality.","good at delegating all commitments for quality assurance.","committed and involved and take responsibility for quality.","able to enlist the expertise of outside contractors for quality."],ans:2,exp:"In a quality culture, executive-level managers are both committed and involved and take responsibility for quality—they do not delegate that responsibility."},
  {q:"Joan achieved her goal of becoming a junior partner in five years. This achievement made her feel good, so she set a new goal to be a senior partner in 10 years. Joan has received which benefit of goal setting?",opts:["Helps you to understand yourself","Gives you a way to measure your progress","Helps you to stay on task","Raises your level of self-esteem"],ans:3,exp:"Raising your self-esteem increases self-confidence and encourages you to go on to achieve other goals. Achieving one goal raised Joan's self-esteem so she feels capable of reaching a higher goal."},
  {q:"Recognizing your strengths and weaknesses helps you to accept yourself, which is one of the foundations of:",opts:["safety.","social acceptance.","self-esteem.","self-fulfillment."],ans:2,exp:"Self-esteem is the regard or respect you have for yourself. People who have self-esteem understand themselves and like who they are."},
  {q:"Diana prepares bills and invoices for her company. Her career is in the area of:",opts:["marketing communications.","corporate finance.","securities and investments.","professional selling."],ans:1,exp:"Preparing bills and invoices is part of corporate finance, which manages capital structure, budgeting, acquisition, financial modeling, funding, dividends, and taxation."},
  {q:"Which of the following would be an acceptable answer on a job application about why you left a previous job?",opts:["'I was expected to do too much work.'","'I was seeking a more responsible job.'","'I couldn't get along with my supervisor.'","'I wanted to get out of a difficult situation.'"],ans:1,exp:"'I was seeking a more responsible job' is positive—indicating the applicant is interested in getting ahead. The other options are negative and reflect poorly on the applicant."},
  {q:"Bobbi, who works for an insurance company, calculates the risk of loss, establishes premium rates, and designs insurance policies to cover risk. Bobbi works as a(n):",opts:["underwriter.","agent.","accountant.","financial analyst."],ans:0,exp:"Underwriters calculate the risk of loss, establish premium rates, and design policies to cover risk. Insurance agents sell policies; accountants analyze financial data; analysts evaluate investments."},
  {q:"Corporate governance is primarily concerned with __________ desires.",opts:["vendors'","CEO's","stakeholders'","competitors'"],ans:2,exp:"Corporate governance revolves around balancing the desires of all stakeholders—including customers, financiers, the community, the government, and managers."},
  {q:"Which of the following is a benefit of corporate governance?",opts:["It encourages transparency.","It decreases investor confidence.","It creates a less definable brand.","It maximizes corruption."],ans:0,exp:"Corporate governance creates a more transparent business environment, which can increase investor confidence, create a defined brand, and minimize corruption."},
  {q:"Which of the following is a positive characteristic for the members of a corporation's board of directors to possess?",opts:["Independent thinking","Conformity","Indecisiveness","Single-minded attitude"],ans:0,exp:"Independent thinking involves questioning current policies and proposed actions so the board acts in the best interests of the corporation and shareholders. Conformity leads to poor decision-making."},
  {q:"Which employee reports directly to a corporation's board of directors?",opts:["Chief executive officer","Accounting manager","Vice president of operations","Director of sales"],ans:0,exp:"The corporation's CEO reports directly to the board of directors. The VP of operations likely reports to the CEO; accounting manager and director of sales are mid-level managers."},
  {q:"Ryan is a college student who spends free time tutoring second-grade students at a local elementary school. What technique is Ryan using to obtain work experience?",opts:["Volunteering","Informational interview","Job shadowing","Internship"],ans:0,exp:"Volunteer work involves donating time without pay. By volunteering to tutor, Ryan can determine if he enjoys teaching young children and whether to pursue a teaching career."},
  {q:"Is the following statement true or false: Once a law has been enacted, trade organizations/associations are unable to affect the way that law will be enforced.",opts:["True, members have no way of influencing enforcement of laws.","False, there are exceptions that apply to every law.","False, organizations/associations often can change unfavorable regulations to more favorable ones.","True, laws cannot be changed and must be obeyed."],ans:2,exp:"Organizations/associations frequently can change unfavorable regulations to more favorable ones by serving as liaisons between the industry/profession and the regulatory agency."},
  {q:"One way to build professional relationships in the finance industry is to:",opts:["encourage others to discuss their finances.","read about industry trends.","implement a referral system.","print new business cards for distribution."],ans:2,exp:"A referral system encourages clients or associates to provide referrals. Satisfied clients may refer friends or colleagues to their financial planners, building professional relationships."},
  {q:"To manage potential risks from unethical conduct, many companies build internal infrastructures that typically include appropriate audit procedures, a code of conduct, and a __________ policy.",opts:["whistleblower","credit","monetary","constituent"],ans:0,exp:"A whistleblower policy encourages and enables employees to report unethical behavior without fear of negative repercussions such as demotion or firing."},
  {q:"Many computer software programs help businesses determine their levels of business risk, which is helpful when they develop:",opts:["monetary regulations.","content theories.","endorsement records.","contingency plans."],ans:3,exp:"Businesses use risk-management software to obtain numerical data about risk levels and help develop contingency plans—alternative courses of action for when circumstances increase or decrease risk."},
  {q:"How does forming a captive insurance company typically impact a corporation's federal tax liability?",opts:["Reduces tax due on the captive's premiums","Increases tax due on the captive's loss reserves","Increases the corporation's sales tax liabilities","Eliminates the corporation's state tax liabilities"],ans:0,exp:"Forming a captive insurance company can reduce, eliminate, or defer federal taxes due on the corporation's insurance premiums. It typically decreases, not increases, tax on loss reserves."},
  {q:"To control online transactional risks, a business should consider outsourcing its technology needs when it lacks:",opts:["internal expertise.","financial resources.","secondary data.","external training."],ans:0,exp:"If a business doesn't have employees with the expertise to handle secure online transaction technology, it should consider hiring a consultant or firm with the appropriate knowledge."},
  {q:"It is important for companies to practice enterprise risk management (ERM) because:",opts:["most risks are predictable and manageable.","it leads to loss of shareholder value.","most risks are unexpected.","it increases business costs in the long run."],ans:0,exp:"ERM is important because most business risks are predictable and manageable. If a company can plan for risks, it can minimize losses. ERM should reduce costs in the long run."},
  {q:"Why should managers know how to do the work of the workers they supervise?",opts:["To create a team spirit among employees","To establish a chain of command","To have realistic expectations for workers","To coordinate employees' efforts"],ans:2,exp:"Knowing the jobs of workers they supervise helps managers know how work should be done and be realistic about the amount of work they expect workers to complete."},

  // ── EXAM 1143 ──
  {q:"A business might conduct a compliance audit to:",opts:["manipulate financial data to indicate profitability.","ensure that it is following government regulations.","develop efficient production processes.","evaluate its vendors' performance."],ans:1,exp:"A compliance audit can detect discrepancies and help a business determine what it needs to do to comply with government regulations. Manipulating financial data is unethical and illegal."},
  {q:"The nature of an agent's work and the level of an agent's control are factors that determine if a __________ relationship exists.",opts:["principal-collaborator","tutor-student","master-servant","controller-associate"],ans:2,exp:"The master-servant relationship in legal terms refers to the amount of control a principal has over an agent. It is important in addressing business legal issues, especially liability questions."},
  {q:"What type of law is intended to enforce the rules and regulations of governmental agencies?",opts:["Procedural","Statutory","Commercial","Administrative"],ans:3,exp:"Administrative law deals with the rules and regulations established by governmental agencies. It implements the rules, which also involves resolving disputes."},
  {q:"In which of the following types of business ownership does the owner bear the entire risk of loss?",opts:["Sole proprietorship","General partnership","Open corporation","Private enterprise"],ans:0,exp:"In a sole proprietorship, the owner is personally responsible for all debts of the business. Partnerships share risk; corporations spread risk among many investors."},
  {q:"Financial managers who are legally responsible for their clients' investments must demonstrate fiduciary responsibility, which involves:",opts:["acting in the best interests of their clients.","selling financial products that generate the highest commissions.","making risky investments without their clients' knowledge.","speaking with their clients once a year to review their portfolios."],ans:0,exp:"A fiduciary has been given legal authority to act on behalf of a client and must act in the best interest of that client, making wise financial decisions to achieve the client's goals."},
  {q:"Which of the following is a tax-deductible gift?",opts:["Charitable donation","Vacation home","Stocks","Inherited items"],ans:0,exp:"Charitable donations are tax deductible. Vacation homes, stocks, and inherited items are taxable gifts."},
  {q:"What reasoning process does a virtual auditor use to identify financial system transactions that are very similar to each other but not exactly alike?",opts:["Cross-source reasoning","Contextual reasoning","Temporal reasoning","Comparative reasoning"],ans:3,exp:"Comparative reasoning identifies financial system transactions that are very similar but not exactly alike, helping determine if one transaction was entered multiple times or if two entries are separate."},
  {q:"What do environmental distractions to active listening include?",opts:["Strong opinions about the topic","The speaker's appearance and manner","Personal matters that cause us to worry","Poor lighting and noise"],ans:3,exp:"Environmental distractions such as poor lighting or noise are aspects of the setting that take away from a listener's ability to listen. The speaker's appearance and personal matters are not environmental."},
  {q:"Chris asks his coworker Ali for help on his project. She agrees verbally, but she is frowning, crossing her arms, and avoiding eye contact. Ali most likely:",opts:["is not transmitting any message through her body language.","means exactly what she communicated verbally.","is happy and comfortable with the idea of helping Chris.","feels uncomfortable or unhappy with the idea of helping Chris."],ans:3,exp:"Ali's body language (frown, crossed arms, no eye contact) likely means she doesn't want to help Chris, even though she agreed verbally. Body language is just as important as words."},
  {q:"When giving verbal directions to employees about how to complete a task, it is often helpful to:",opts:["speak softly.","use visuals.","use complex words.","limit body language."],ans:1,exp:"Using visuals such as diagrams or charts reinforces verbal directions and helps the audience understand the explanation, overcoming the challenge of giving verbal directions."},
  {q:"Samantha has been chosen to participate in a group discussion on a topic she knows very little about. Which of the following should she do to become a valuable participant?",opts:["Ask to be excused from the group","Resist the urge to comment until she becomes an expert","Ask questions to clarify other participants' comments","Take the leadership role to give the group an open mind"],ans:2,exp:"Asking clarifying questions assists the entire group in learning about the topic. No one knows everything, and diverse viewpoints through give-and-take are the purpose of group work."},
  {q:"Why is it important for speakers to rehearse an oral presentation?",opts:["Rehearsing provides the speaker with verbal feedback from the intended audience.","Rehearsing encourages the speaker to develop notes for the presentation.","Rehearsing allows the speaker to analyze the accuracy of the message content.","Rehearsing helps the speaker improve the delivery of the message."],ans:3,exp:"Rehearsing provides an opportunity to ensure appropriate pitch, monitor nonverbal behavior, time the presentation, and decide what revisions are needed before the final event."},
  {q:"You have a big paper due and only need to check your grammar, punctuation, and spelling. Which step of the writing process do you have left to complete?",opts:["Removing","Revising","Rearranging","Editing"],ans:3,exp:"During editing, you give words and sentences a close look and correct grammar, punctuation, and spelling. Revising involves bigger changes like rearranging or removing whole sections."},
  {q:"Which of the following are characteristics of a well-written executive summary?",opts:["Error free, simple, and creative","Clear, concise, and error free","Creative, concise, and informal","Concise, informal, and error free"],ans:1,exp:"A well-written executive summary should be clear, concise, and error free. Because it is part of a formal report, it should follow a formal format—it does not need to be creative."},
  {q:"Which of the following would most benefit from a customer-service mindset that helps to reduce complaints and increase profits?",opts:["Customers","Employees","Businesses","Competitors"],ans:2,exp:"Reduced complaints, repeat business, and greater profits are normally the results of a customer-service mindset—these benefit businesses. Competitors would not benefit."},
  {q:"In most cases, the person who initially listens to customer complaints is the:",opts:["store owner.","sales manager.","buyer.","salesperson."],ans:3,exp:"The salesperson is the point of contact for customers in most situations. If the problem originated on the sales floor, the salesperson would be approached first."},
  {q:"One way a company can reinforce its image is by:",opts:["developing a financial plan.","training its employees.","conducting a competitive analysis.","identifying economic resources."],ans:1,exp:"The manner in which employees perform their tasks affects how people view the company. Training employees to respond and service customers in a specific way reinforces the company's image."},
  {q:"An important aspect of ethical behavior by financial services providers is ensuring that their clients:",opts:["diversify their portfolios by investing more than half in hedge funds.","purchase high-risk investments to generate better financial returns.","understand the potential risks and rewards of different financial products.","preplan future investment strategies for unexpected financial bonuses."],ans:2,exp:"Ethical financial services providers communicate the rewards and risks associated with various financial instruments so clients fully understand their options. Acting in the client's best interest is key."},
  {q:"What is the primary purpose of data-cleansing processes?",opts:["To correct non-response errors","To control the employees' intranet access","To maintain a useful customer database","To monitor the system for security breaches"],ans:2,exp:"Data cleansing removes duplicate records, updates expired data, and completes incomplete fields, resulting in a database with useful, relevant, and accurate data for sound business decisions."},
  {q:"George is checking newspaper ads for the best place to buy a dishwasher at a reasonable price. What type of product is the dishwasher?",opts:["Convenience","Shopping","Capital","Specialty"],ans:1,exp:"Shopping goods are consumer products purchased after comparing products and stores to get the best quality, price, and/or service. George is comparing before purchasing."},
  {q:"During a recession, prices rise while the value of money decreases, yet workers are willing to pay the rising prices because their wages rise by the same amount. This is a good example of the effects of _________ prices.",opts:["unfair","competitive","relative","objective"],ans:2,exp:"Relative prices come into play when both wages and prices rise or fall at the same rate, so consumers are willing to pay the new price."},
  {q:"A business's philanthropic responsibility involves its contributions to:",opts:["political campaigns.","charity.","scientific research.","the economy."],ans:1,exp:"Philanthropic responsibility involves a business's contributions to charity. It is part of a business's overall social responsibility."},
  {q:"The two basic types of business risk are:",opts:["theft and death.","incompetence and carelessness.","pure and speculative.","fires and floods."],ans:2,exp:"Pure risks carry the possibility of loss or no loss. Speculative risks may result in a loss, no change, or a gain. Fires/floods are natural risks; theft/death and incompetence are human risks."},
  {q:"According to the classical theory of unemployment, the best solution for unemployment is to:",opts:["decrease inflation.","increase prices.","encourage spending.","cut wages."],ans:3,exp:"According to classical theory, cutting wages stops the cycle of unemployment. If wages aren't allowed to rise too high, unemployment will be controlled."},
  {q:"When a nation can produce a product for less than other nations, it is said to have a(n):",opts:["comparative advantage.","absolute advantage.","trade quota.","trade surplus."],ans:1,exp:"Absolute advantage is achieved when a country can produce a product for less than other nations. Comparative advantage involves relative efficiency, not absolute cost."},
  {q:"A country is experiencing civil unrest. What is likely to happen to the value of its currency?",opts:["It will not be affected.","It will increase.","It will stabilize.","It will decrease."],ans:3,exp:"Political instability causes foreign business partners and investors to decrease their activities, causing the country's currency value to decrease."},
  {q:"To expand into foreign markets, an American business owner purchases a small manufacturing plant in Thailand. Which entry mode is the business owner using?",opts:["Independent trade intermediary","Joint venture","Wholly owned subsidiary","Franchise"],ans:2,exp:"A wholly owned subsidiary is a manufacturing plant owned and controlled by the American parent company. A joint venture involves two businesses sharing resources; a franchise is a contractual agreement."},
  {q:"Which of the following characteristics tends to have a close relationship with initiative?",opts:["Truthfulness","Insecurity","Rudeness","Industriousness"],ans:3,exp:"Industrious people are energetic and hardworking, closely related to their willingness to look for jobs to do. Rudeness and insecurity tend to prevent individuals from possessing initiative."},
  {q:"What should you do when you become annoyed with coworkers or customers?",opts:["Avoid talking with them whenever possible.","Tell them to be quiet and stop bothering you.","Treat them the way you want them to treat you.","Complain about them during a staff meeting."],ans:2,exp:"Regardless of where you are, interactions should be respectful and kind. Treat the people around you the way you would want them to treat you—with dignity, care, and respect."},
  {q:"Qualified employees who behave unethically on the job may harm themselves by being:",opts:["sent to a training program.","passed over for promotions.","held legally responsible.","rotated to similar positions."],ans:1,exp:"Coworkers and supervisors notice unethical behavior and may lose respect for those employees, causing them to be passed over for promotions because supervisors don't trust them."},
  {q:"Sara doesn't take responsibility for her decisions, and she feels bitter because she thinks others have treated her unfairly. She is experiencing:",opts:["resentment.","denial.","remorse.","guilt."],ans:0,exp:"Resentment is a feeling of bitterness that other people have treated you unfairly. People become resentful when they fail to take responsibility and relinquish control to outside circumstances."},
  {q:"Writing a letter to your grandmother is an example of:",opts:["nonverbal communication.","verbal communication.","speech.","body language."],ans:1,exp:"Verbal communication is the exchange of information through the use of words, including writing and speech. Writing uses words, so it is verbal—not nonverbal—communication."},
  {q:"Which of the following is an example of unethical behavior involving confidential information?",opts:["An employee tells a coworker how much the sales manager earned in bonuses last year.","An accounts-receivable employee provides his/her manager with an aging-accounts report.","A manager advises a subordinate that s/he is being laid off due to financial problems.","A manager tells her staff she will be on maternity leave from April through June."],ans:0,exp:"It is unethical for employees to discuss anyone else's salary with coworkers. This can result in bad feelings, resentment, low morale, and reduced productivity."},
  {q:"Randall is working extra hours and now isn't sure he'll have enough time to study for his finals. He's feeling a lot of pressure and tension, also known as:",opts:["job satisfaction.","productivity.","stress.","employee turnover."],ans:2,exp:"Stress is the mental, physical, or emotional feeling of pressure or tension—what you feel when overwhelmed, overworked, or worried."},
  {q:"Employees from different departments participate in a group to solve problems related to the company's production processes. This is an example of a:",opts:["short-term committee.","quality circle.","standing committee.","product team."],ans:1,exp:"A quality circle is a problem-solving group of coworkers who study and discuss work situations or problems in order to recommend solutions to management."},
  {q:"When sharing ideas, consensus-building group members should:",opts:["eliminate a few ideas right away.","consider too few rather than too many ideas.","automatically say no to ideas they don't understand.","listen actively to other group members."],ans:3,exp:"Active listening allows group members to understand what's being discussed and build upon their own ideas. Don't reject ideas you don't understand—they may be good once explained."},
  {q:"Which of the following statements regarding international trade is true?",opts:["Internet-based companies can easily become involved in international trade.","Only large companies typically benefit from conducting international trade.","Companies shipping internationally must use freight-forwarding services.","Foreign language skills are required to conduct international trade."],ans:0,exp:"A company with a website can easily be found by people in foreign countries, and online services make international transactions easy. Small businesses represent a large majority of international trade."},
  {q:"A credit plan that allows customers to make purchases within their credit limit and pay all or part of the balance due each month is referred to as a(n) __________ credit plan.",opts:["budget","open","revolving","coupon"],ans:2,exp:"A revolving credit account limits the total amount owed. Customers who don't pay the full amount each month are charged interest. An open plan requires full payment each period."},
  {q:"If Fiona has a fatal accident or terminal disease, she wants to make sure her children's financial needs are met until they finish college. What type of insurance should Fiona purchase?",opts:["Worker's compensation","Life","Liability","Property"],ans:1,exp:"Life insurance protects others from financial losses related to the insured's death. Death benefits cover beneficiaries' living expenses, education, etc."},
  {q:"To make sure he develops a realistic personal budget, Marcel should always:",opts:["consult with a bookkeeper.","pay his bills on time.","verify his past credit rating.","track and record his expenses."],ans:3,exp:"Realistic budgets require both income and expense knowledge. Tracking and recording expenses shows bill amounts and due dates, which is essential for developing a realistic budget."},
  {q:"Which of the following is NOT a key factor involved with compounding growth?",opts:["The amount of money you invest","The risk of the stock market","How long your money is invested","How much your investment grows each year"],ans:1,exp:"The risk of the stock market is not a key factor in compounding growth. The three key factors are: amount invested, how long it's invested, and how much it grows each year."},
  {q:"When Armand is comparing his checkbook balance with his bank statement, he must make sure that he has subtracted the __________ from his checkbook.",opts:["payroll deposits","accumulated interest","transaction fees","check numbers"],ans:2,exp:"Some financial institutions charge transaction fees for checking accounts. These fees must be subtracted from the checkbook balance. Interest and payroll deposits are added, not subtracted."},
  {q:"What is a primary responsibility of an investment bank?",opts:["Accept deposits from individual savers","Pool contributions and invest for employees","Use funds from premiums to offer loans","Help firms raise funds by issuing securities"],ans:3,exp:"Investment banks locate outside sources of money for firms, typically helping them raise funds by issuing securities (e.g., stocks and bonds)."},
  {q:"Which of the following are examples of agricultural products traded on commodity market exchanges?",opts:["Corn, hogs, and bread","Sheep, cereal, and wheat","Wheat, livestock, and corn","Cattle, cereal, and grain"],ans:2,exp:"Agricultural commodities include livestock (sheep, hogs, cattle) and grains (wheat, corn). Bread and cereal are processed products made from grains and are not traded on commodity exchanges."},
  {q:"What is a common course of action for small banking institutions interested in competing globally and improving their efficiencies, viability, and profitability?",opts:["Dissolving their financial holding companies","Rapidly expanding their operations","Following global regulations more closely","Consolidating with larger banks"],ans:3,exp:"Many small banking institutions consolidate or merge with larger banks to compete globally and improve efficiencies, viability, and profitability."},
  {q:"What do bond yields typically do during an economic expansion?",opts:["Drop to near zero","Gradually decrease","Increase","Remain unchanged"],ans:2,exp:"During economic expansion, production, employment, income, and interest rates rapidly increase. As businesses borrow more money at higher rates, bond yields go up."},
  {q:"An increase in free-flowing capital is a benefit of:",opts:["financial globalization.","investor innovation.","global protectionism.","economic conservatism."],ans:0,exp:"Financial globalization leads to the integration of financial markets, offering equal access to market participants regardless of their home countries. Protectionism hinders free capital flow."},
  {q:"The section of the SEC website that houses companies' filings is called:",opts:["EDGAR.","EDWIN.","EDMUND.","EDWARD."],ans:0,exp:"EDGAR stands for Electronic Data Gathering and Retrieval. It is the section of the SEC website that houses companies' filings."},
  {q:"A potential investor can assess a stock's volatility by comparing the highest paid price in the past 52 weeks with the:",opts:["price-earnings ratio.","rate of return.","lowest paid price in 52 weeks.","estimated dividends."],ans:2,exp:"To analyze volatility, an investor can compare the highest price paid with the lowest price paid within a 52-week period. A sharp price swing indicates high volatility."},
  {q:"Accountants are legally required to follow established guidelines when preparing financial documents to ensure that the information presented is:",opts:["transparent and subjective.","clear and consistent.","subjective and consistent.","irrational and clear."],ans:1,exp:"Governments require businesses to follow the same standards so financial reports are prepared in a consistent way, making information clear, objective, and transparent to all users."},
  {q:"Stockholders monitor a business's income statement because they are the business's:",opts:["employees.","customers.","owners.","managers."],ans:2,exp:"Stockholders have part ownership of a business and use the income statement to monitor profit levels and determine if they are getting a good return on their investment."},
  {q:"When preparing a statement of changes in an owner's equity document, which of the following is specifically represented on the statement?",opts:["New investments by the owner","Property taxes paid by the owner","Depreciation of company assets","Lost revenue due to discharged debt"],ans:0,exp:"New investments or withdrawals by the owner are specifically represented on a statement of changes in owner's equity, along with net income or loss."},
  {q:"A new employee left JRB Manufacturing two weeks after completing the company's training program. The expense of training is a(n) __________ for the company.",opts:["external cost","sunk cost","current asset","capital liability"],ans:1,exp:"Sunk costs are costs incurred and cannot be recovered. Since the employee left, the business will not recoup the training costs because the employee is no longer there to perform the work."},
  {q:"Axis Manufacturing wants to determine how purchasing parts from a specialized dealer (instead of producing them in-house) will influence company costs and revenues. They should conduct a(n) __________ analysis.",opts:["trade-off","incremental","fishbone","SWOT"],ans:1,exp:"Incremental (marginal/differential) analysis studies the revenues and costs of different alternatives, such as making a part in-house vs. buying it from an outside source."},
  {q:"Which of the following is a responsibility of a managerial accountant?",opts:["Conducting a cost analysis and explaining the findings to management","Compiling the company's financial information for release to the public","Making managerial decisions regarding planning, pricing, and sales","Training employees and management on personal financial literacy"],ans:0,exp:"Managerial accountants conduct cost analyses and explain findings to management for informed financial decisions. They are strictly internal—their work is not released to the public."},
  {q:"What type of variance analysis involves determining the difference between the standard costs and actual costs of raw materials used for production?",opts:["Selling price","Purchase price","Material yield","Fixed overhead"],ans:1,exp:"Purchase price variance analysis determines the difference between standard and actual costs of raw materials. When vendors increase prices, it costs more to produce an item."},
  {q:"How does analysis of standard costs differ from analysis of a budget?",opts:["A budget analysis shows forecasted amounts, while standard cost analysis shows actual costs.","A budget analysis provides an overview, while standard cost analysis shows the details of variances.","A budget analysis deals with quality and quantity, while standard cost analysis deals only with quantity.","A budget analysis is conducted by all staff, while standard cost analysis is conducted by a departmental manager."],ans:1,exp:"Budget analysis shows overall variances, but standard cost analysis reveals the causes (details)—whether too much was paid for materials, too much time was spent on labor, etc."},
  {q:"Gathering and communicating financial information that businesses can use to plan their operations is the focus of __________ accounting.",opts:["accrual","managerial","financial","equity"],ans:1,exp:"Managerial accounting involves obtaining and analyzing financial data to help businesses make decisions about how to operate. Financial accounting focuses on external users."},
  {q:"Amelia places $250 in a savings account that pays 6.25% interest compounded annually. Calculate the value of her savings account in two years.",opts:["$274.86","$282.23","$290.60","$297.77"],ans:1,exp:"Year 1: $250 × 0.0625 = $15.63; $250 + $15.63 = $265.63. Year 2: $265.63 × 0.0625 = $16.60; $265.63 + $16.60 = $282.23."},
  {q:"Business managers often use financial information management data to:",opts:["calculate the level of corporate groupthink.","determine if liability insurance is needed.","develop secondary equity markets.","forecast financial inflows and outflows."],ans:3,exp:"Financial information management collects, maintains, and reports data about financial transactions. Business managers often use these data to forecast financial inflows and outflows when developing a budget."},
  {q:"For privacy and security purposes, businesses should use encryption techniques and firewalls to protect customers when they:",opts:["report changes in interest rates.","suspect pilferage is occurring.","post general product information on their message boards.","conduct online financial transactions."],ans:3,exp:"Encryption and firewalls reduce risks associated with computer hacking and identity theft during online financial transactions. Posting general product info is not a security issue."},
  {q:"What is a benefit of managing budgeting data efficiently through budgeting applications?",opts:["Decreases the need for having an audit trail","Increases amount of time that needs to be spent on value-added activities","Increases management's confidence in budgets","Decreases auditors' ability to trace the numbers used in budgets"],ans:2,exp:"Efficient budgeting applications increase management's confidence in budgets, financial statements, and performance scorecards, while decreasing time needed for accounting cycles."},
  {q:"Businesses often use computer spreadsheet software for 'what if' financial planning by plugging different numerical data into formulas, which provide possible:",opts:["distribution methods.","production strategies.","financial outcomes.","accounting standards."],ans:2,exp:"By inputting different values into spreadsheet formulas, businesses can calculate various outcomes and determine the best course of action under particular circumstances."},
  {q:"Lean operations focus on increasing efficiency by reducing __________, while Six Sigma focuses on continuously improving __________ throughout the business.",opts:["automation, standards","wages, automation","waste, quality","standards, waste"],ans:2,exp:"Lean operations eliminate waste to improve efficiency. Six Sigma continuously sets higher quality goals, building on previous goals to maximize outputs and minimize production costs."},
  {q:"Which of the following are factors that affect a business's decision to offer credit to a customer?",opts:["Income, debt ratio, and credit rating","Debt ratio, credit rating, and education","Credit rating, objectives, and income","Debt ratio, education, and objectives"],ans:0,exp:"Income, debt ratio, and credit rating indicate to the business if the customer is a good credit risk. The customer's objectives and educational level are not primary considerations."},
  {q:"Noreen, a human resources manager, attends job fairs, places ads online, and partners with an outside employment agency to find applicants. This aspect of staffing is known as:",opts:["onboarding activities.","interviewing.","orientation.","recruitment."],ans:3,exp:"Recruiting is the aspect of staffing that involves seeking out and attracting qualified potential employees. Interviewing, orientation, and onboarding happen after candidates are identified."},
  {q:"Which of the following is a long-term goal?",opts:["Finishing your English paper","Passing your history test tomorrow","Washing the dishes","Getting a job at a publishing company"],ans:3,exp:"Getting a job at a publishing company is a long-term goal. Finishing an English paper, passing a history test, and washing dishes are short-term goals achievable in the very near future."},
  {q:"ChemTech International plans to build a new research facility and needs a detailed document for potential vendors outlining how they should submit bids. What type of document is being prepared?",opts:["Business plan","Summary of qualifications","Executive summary","Request for proposal"],ans:3,exp:"A request for proposal (RFP) is an invitation for potential vendors to present bids to obtain a contract. It includes specific information and detailed instructions about how the proposal should be written."},
  {q:"If a company is managing its information effectively, the data should be accurate and:",opts:["relevant.","encrypted.","anonymous.","positive."],ans:0,exp:"To make appropriate decisions, companies need accurate and relevant information. Irrelevant information—even if accurate—won't lead to good decisions."},
  {q:"Mr. Edwards dropped a flash drive containing confidential customer information from his employer's computer network. This situation is an example of a risk related to:",opts:["information security.","patent protection.","employee privacy.","data entry."],ans:0,exp:"Businesses must take reasonable care to protect and secure customers' personal information to reduce the risk of fraudulent behavior. Removing digital information from facilities creates security risk."},
  {q:"Which of the following is available to all people around the world who have access to a computer with connectivity?",opts:["Extranet","Intranet","Internet","Broadband"],ans:2,exp:"The Internet is a worldwide network of computers enabling users to access information and communicate. Intranets and Extranets are limited to authorized users. Broadband is a type of technology."},
  {q:"Martin selects a standardized group of slides and enters appropriate text and graphics in each. What is he using to design his presentation?",opts:["Premade slides","Wizard","Blank slides","Templates"],ans:3,exp:"Templates allow the user to enter information into a set of standardized slides that all have a similar look. Wizard uses already-prepared slide shows to suggest content."},
  {q:"When developing a web page, it is best to:",opts:["use short blocks of text.","incorporate a variety of fonts.","leave space for banner ads.","avoid the use of graphics."],ans:0,exp:"Web surfers want information quickly and scan rather than read in detail. Short blocks of text are most effective. Too many fonts make text difficult to read."},
  {q:"Jonas is a data scientist who looks through his firm's databases and eliminates redundant data. Jonas is performing:",opts:["digital analysis.","data normalization.","data filtering.","information scanning."],ans:1,exp:"Data normalization involves efficiently organizing data in a database, including eliminating redundant data and ensuring data is stored in ways that make sense."},
  {q:"Businesses often maintain records about vendors' pricing, delivery terms, and credit policies and use the information to:",opts:["follow safe shipping procedures.","negotiate higher discounts.","monitor inventory levels.","award purchasing contracts."],ans:3,exp:"By comparing vendor information, a business can make an informed decision about the best vendor and award purchasing contracts to the most appropriate one."},
  {q:"The reason why an employee should report an employer's noncompliance with safety regulations is to:",opts:["keep the business from selling substitute goods to consumers.","protect the well-being of the business's employees and customers.","maintain the business's reputation in the competitive environment.","ensure that employees receive fair pay for any overtime they work."],ans:1,exp:"If a business is not following safety regulations, it is not protecting the well-being of its employees and customers. Reporting allows the government to ensure corrective action before an accident occurs."},
  {q:"Which of the following demonstrates a good security practice?",opts:["Noelle chats with customers while ringing up sales.","Tom checks the amount and date on all personal checks.","Kelsey keeps her purse on a shelf underneath the register.","Jane leaves with the bank deposit at the same time each day."],ans:1,exp:"Checking the amount and date on checks, verifying the signature matches ID, and recording ID information reduces the risk of identity theft and fraud."},
  {q:"Using the project plan schedule, calculate the number of hours allocated to complete Tasks 2 and 4 during the third week. (Task 2 Week 3: 10 hrs; Task 4 Week 3: 20 hrs)",opts:["25","30","35","40"],ans:1,exp:"Task 2 in Week 3 = 10 hours; Task 4 in Week 3 = 20 hours. Total = 10 + 20 = 30 hours."},
  {q:"The first step in maintaining an inventory of supplies for the business is to:",opts:["develop a list of supplies that the business needs.","conduct research to find vendors that sell the supplies.","compare prices among vendors.","organize a space to store the supplies."],ans:0,exp:"To maintain an inventory of supplies, a business should first determine which supplies employees need to perform their jobs. After that, vendors can be located, prices compared, and storage organized."},
  {q:"When developing a request for quotation (RFQ) for prospective vendors, a business should always include:",opts:["specifications and deadlines.","prices and a purchase order.","guidelines and discounts.","statistics and a checklist."],ans:0,exp:"The RFQ summarizes the details about the business's needs, bid requirements, and deadlines. Prices, purchase orders, discounts, and checklists are not typically included in RFQs."},
  {q:"Employees involved in production scheduling are responsible for:",opts:["establishing the path inputs take through production.","issuing orders for production activities to begin.","estimating how long each step in production will take.","obtaining the resources needed in production."],ans:2,exp:"Scheduling establishes the timetable to be followed in production. Employees look at the number of steps in the production process and estimate how long each step will take."},
